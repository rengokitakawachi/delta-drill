本文のとおりです。マクロ経済スライドとは、少子化による労働力人口の減少や平均余命の延びを年金額に反映させる仕組みで、所得・賃金の伸びを単純に年金額に反映させず、その伸びを調整するものです。根拠は法27条の4等。"},{"law":"総則","cat":"給付水準の下限","q":"政府は、所得代替率が100分の60を下回ることが見込まれる場合には、調整期間の終了について検討を行うものとされている。","a":false,"exp":"×。平16法附則2条。所得代替率が100分の50を下回ることが見込まれる場合に、調整期間の終了について検討を行うものとされている。","page":34,"detail":"×。平16法附則2条に反します。p.34の本文では、所得代替率が「100分の50」を下回ることが見込まれる場合に、調整期間の終了について検討を行うものとされています。100分の60ではありません。所得代替率は給付水準の下限として法定されています。根拠は平16法附則2条。"},{"law":"総則","cat":"用語の定義","q":"「配偶者」、「夫」及び「妻」には、婚姻の届出をしていないが、事実上婚姻関係と同様の事情にある者を含む。","a":true,"exp":"〇。法5条7項。「配偶者」「夫」「妻」には、婚姻の届出をしていないが事実上婚姻関係と同様の事情にある者を含む。","page":25,"detail":"〇。法5条7項のとおりです。p.25の本文では、「配偶者」「夫」及び「妻」には、婚姻の届出をしていないが、事実上婚姻関係と同様の事情にある者(いわゆる内縁関係にある者)を含むとされています。根拠は法5条7項。"},{"law":"総則","cat":"保険料免除期間","q":"保険料免除期間は、第1号被保険者期間のほか、第2号被保険者及び第3号被保険者としての被保険者期間にも存在する。","a":false,"exp":"×。法5条2項。保険料免除期間は、第1号被保険者期間についてのみ存在し、第2号・第3号被保険者期間には存在しない。","page":26,"detail":"×。法5条2項に反します。p.26の本文では、保険料免除期間は「第1号被保険者としての被保険者期間についてのみ存在します」と明記され、第2号被保険者及び第3号被保険者としての被保険者期間には保険料免除期間は存在しないとされています。根拠は法5条2項。"},{"law":"総則","cat":"保険料全額免除期間","q":"保険料全額免除期間とは、法定免除、申請全額免除、学生納付特例の規定により納付することを要しないものとされた保険料に係る期間を合算した期間をいう。","a":true,"exp":"〇。法5条3項。保険料全額免除期間とは、法定免除・申請全額免除・学生納付特例により納付を要しないものとされた保険料に係る期間を合算した期間をいう。","page":27,"detail":"〇。法5条3項のとおりです。p.27の本文では、保険料全額免除期間とは、第1号被保険者としての被保険者期間であって、法定免除・申請全額免除・学生納付特例(納付猶予を含む)の規定により納付することを要しないものとされた保険料に係る期間を合算した期間をいうとされています。追納されたものとみなされる期間は含みません。根拠は法5条3項。"},{"law":"被保険者","cat":"第1号被保険者","q":"第1号被保険者は、日本国内に住所を有する20歳以上65歳未満の者であって、第2号被保険者及び第3号被保険者以外の者である。","a":false,"exp":"×。法7条1項1号。第1号被保険者は、日本国内に住所を有する20歳以上60歳未満の者であって、第2号被保険者及び第3号被保険者以外の者である。","page":40,"detail":"×。法7条1項1号に反します。p.40の本文では、第1号被保険者は「日本国内に住所を有する20歳以上60歳未満の者」であって、第2号被保険者及び第3号被保険者以外の者とされています。65歳未満ではなく60歳未満である点が誤りです。根拠は法7条1項1号。"},{"law":"被保険者","cat":"第2号被保険者","q":"65歳以上の厚生年金保険の被保険者は、老齢給付等の受給権を有しない者に限り、第2号被保険者となる。","a":true,"exp":"〇。法7条1項2号、附則3条。65歳以上の場合、老齢給付等の受給権を有しない者に限り第2号被保険者となる。","page":41,"detail":"〇。法7条1項2号、附則3条のとおりです。p.41の本文の注意書きでは、65歳以上の場合、老齢給付等の受給権を有しない者に限り第2号被保険者となるとされています。65歳未満の厚生年金被保険者は当然に第2号被保険者です。根拠は法7条1項2号、附則3条。"},{"law":"被保険者","cat":"第2号被保険者","q":"第2号被保険者となるための要件には、国内居住要件及び国籍要件がある。","a":false,"exp":"×。法7条1項2号。第2号被保険者となるための要件に、国内居住要件や国籍要件はない。","page":41,"detail":"×。法7条1項2号に反します。p.41の本文では、第2号被保険者(厚生年金保険の被保険者)となるための要件に「国内居住要件や国籍要件はありません」と明記されています。根拠は法7条1項2号。"},{"law":"被保険者","cat":"第3号被保険者","q":"第3号被保険者は、第2号被保険者の配偶者であって、主として第2号被保険者の収入により生計を維持する被扶養配偶者のうち20歳以上60歳未満の者である。","a":true,"exp":"〇。法7条1項3号。第3号被保険者は、主として第2号被保険者の収入により生計を維持する被扶養配偶者のうち20歳以上60歳未満の者である。","page":42,"detail":"〇。法7条1項3号のとおりです。p.42の本文では、第3号被保険者は、第2号被保険者の配偶者であって、主として第2号被保険者の収入により生計を維持する被扶養配偶者のうち20歳以上60歳未満の者とされています。根拠は法7条1項3号。"},{"law":"被保険者","cat":"第3号被保険者","q":"厚生年金保険法に基づく老齢給付等を受けることができる者は、第3号被保険者となることができない。","a":false,"exp":"×。法7条1項3号。厚生年金保険法に基づく老齢給付等を受けることができる者であっても、第3号被保険者となる。","page":42,"detail":"×。法7条1項3号に反します。p.42の本文の注意書きでは、厚生年金保険法に基づく老齢給付等を受けることができる者であっても第3号被保険者となるとされています。第1号被保険者と異なり老齢給付等の受給による除外はありません。根拠は法7条1項3号。"},{"law":"被保険者","cat":"65歳未満の任意加入","q":"日本国内に住所を有する60歳以上65歳未満の者は、厚生労働大臣に申し出て、任意加入被保険者になることができる。","a":true,"exp":"〇。法附則5条1項。日本国内に住所を有する60歳以上65歳未満の者は、厚生労働大臣に申し出て被保険者になることができる。","page":43,"detail":"〇。法附則5条1項のとおりです。p.43の本文では、任意加入できる者として「日本国内に住所を有する60歳以上65歳未満の者」が挙げられ、これらの者は厚生労働大臣に申し出て被保険者になることができます。受給資格期間の充足や年金額の増額が制度趣旨です。根拠は法附則5条1項。"},{"law":"被保険者","cat":"特例による任意加入","q":"特例による任意加入被保険者の対象は、令和7年改正により、昭和40年4月1日以前に生まれた者まで拡大されている。","a":false,"exp":"×。令7法附則40条1項。令和7年改正で、対象は昭和50年4月1日以前生まれの者まで拡大されている。","page":45,"detail":"×。令7法附則40条1項に反します。p.44・p.45の本文では、特例による任意加入被保険者の対象は、平成16年改正で昭和40年4月1日以前生まれの者まで拡大され、さらに令和7年改正で「昭和50年4月1日以前生まれ」の者まで拡大されています。昭和40年4月1日以前生まれにとどまる記述は誤りです。根拠は令7法附則40条1項。"},{"law":"被保険者","cat":"任意加入の留意点","q":"特例による任意加入被保険者は、付加保険料を納付することができる。","a":false,"exp":"×。法附則9条の2第1項等。任意加入被保険者は付加保険料を納付できるが、特例による任意加入被保険者は納付することができない。","page":45,"detail":"×。p.45の本文に反します。本文では、任意加入被保険者は付加保険料を納付することができますが、「特例による任意加入被保険者は納付することができません」とされています。特例任意加入者はまず本来保険料の納付で受給権発生に専念する必要があるためです。根拠は法附則9条の2第1項等。"},{"law":"被保険者","cat":"任意加入の留意点","q":"任意加入被保険者には、保険料免除の規定は適用されない。","a":true,"exp":"〇。任意加入被保険者には保険料免除の規定は適用されない。なお寡婦年金・死亡一時金・脱退一時金の適用については第1号被保険者とみなされる。","page":45,"detail":"〇。p.45の本文のとおりです。任意加入被保険者(特例による者を含む)には保険料免除の規定は適用されません。一方、寡婦年金・死亡一時金・脱退一時金の規定の適用については第1号被保険者とみなされます。根拠は法附則5条9項・10項等。"},{"law":"被保険者","cat":"特例任意加入と寡婦年金","q":"特例による65歳以上の任意加入被保険者が死亡した場合、死亡一時金は支給され得るが、寡婦年金は支給されない。","a":true,"exp":"〇。法附則5条9項等。特例による65歳以上の任意加入被保険者が死亡した場合、死亡一時金は支給され得るが、寡婦年金は支給されない。","page":45,"detail":"〇。p.45の本文のとおりです。本文では、任意加入被保険者は寡婦年金・死亡一時金・脱退一時金の適用について第1号被保険者とみなされるが、特例による65歳以上の任意加入被保険者が死亡した場合、死亡一時金は支給され得るが寡婦年金は支給されないと明記されています。根拠は法附則5条9項等。"},{"law":"届出・資格得喪","cat":"第1号資格取得","q":"第1号被保険者は、20歳に達したときに資格を取得し、この「20歳に達した日」とは20歳の誕生日の前日をいう。","a":true,"exp":"〇。法8条。第1号被保険者は20歳に達したときに資格を取得し、「20歳に達した日」とは20歳の誕生日の前日をいう。","page":46,"detail":"〇。法8条のとおりです。p.46の本文では、第1号被保険者は20歳に達したとき等に資格を取得し、注意書きで「20歳に達した日」とは20歳の誕生日の前日をいうとされています。いずれの種別も事由該当の日に資格を取得します。根拠は法8条。"},{"law":"届出・資格得喪","cat":"第2号資格取得","q":"厚生年金保険の被保険者は、20歳未満又は60歳以上であっても、第2号被保険者の資格を取得する。","a":true,"exp":"〇。法8条。第2号被保険者は厚生年金保険の被保険者の資格を取得したときに資格を取得し、20歳未満・60歳以上であっても取得する。","page":47,"detail":"〇。法8条のとおりです。p.47の本文では、第2号被保険者は厚生年金保険の被保険者の資格を取得したときに資格を取得し、注意書きで「20歳未満、60歳以上であっても、被保険者資格を取得します」とされています。根拠は法8条。"},{"law":"届出・資格得喪","cat":"第3号資格取得","q":"被扶養配偶者となった者は、20歳未満であっても直ちに第3号被保険者の資格を取得する。","a":false,"exp":"×。法8条。20歳未満で被扶養配偶者となっても、20歳に達するまでは第3号被保険者の資格を取得しない。","page":47,"detail":"×。法8条に反します。p.47の本文では、第3号被保険者の資格取得は被扶養配偶者となったとき又は20歳に達したときとされ、「20歳未満で被扶養配偶者となっても、20歳に達するまでは資格を取得しません」と明記されています。直ちに取得するという記述は誤りです。根拠は法8条。"},{"law":"届出・資格得喪","cat":"第1号資格喪失","q":"第1号被保険者は、60歳に達したときは、その日に被保険者資格を喪失する。","a":true,"exp":"〇。法9条。第1号被保険者は60歳に達したときはその日に資格を喪失する。死亡や国内に住所を有しなくなったときは翌日喪失となる。","page":48,"detail":"〇。法9条のとおりです。p.48の本文では、第1号被保険者は60歳に達したときは「その日」に資格を喪失します。一方、死亡したとき・日本国内に住所を有しなくなったときは「その翌日」喪失となります。根拠は法9条。"},{"law":"届出・資格得喪","cat":"第1号資格喪失","q":"第1号被保険者が日本国内に住所を有しなくなったときは、その日に被保険者資格を喪失する。","a":false,"exp":"×。法9条。日本国内に住所を有しなくなったときは、その翌日に資格を喪失する。なお60歳到達はその日に喪失する。","page":48,"detail":"×。法9条に反します。p.48の本文では、第1号被保険者が日本国内に住所を有しなくなったときは「その翌日」に資格を喪失するとされています。その日ではありません。なお60歳到達はその日に喪失します。根拠は法9条。"},{"law":"届出・資格得喪","cat":"第2号資格喪失","q":"第2号被保険者は、65歳に達してもなお、老齢給付等の受給権を有しない者は資格を喪失しない。","a":true,"exp":"〇。法9条、附則4条。65歳に達しても、老齢給付等の受給権を有しない者は第2号被保険者の資格を喪失しない。","page":48,"detail":"〇。法9条、附則4条のとおりです。p.48の本文の第2号被保険者の資格喪失では、65歳に達したときはその日に喪失しますが、「65歳に達しても、老齢給付等の受給権を有しない者は資格を喪失しません」と明記されています。根拠は法9条、附則4条。"},{"law":"届出・資格得喪","cat":"種別の変更","q":"強制被保険者と任意加入被保険者との間の変更は、種別の変更として扱われ、資格の喪失及び再取得は生じない。","a":false,"exp":"×。強制被保険者と任意加入被保険者との間の変更は、いったん資格を喪失し新たに資格を取得したものとして扱う。種別の変更ではない。","page":49,"detail":"×。p.49の本文に反します。本文では、種別の変更(例えば第1号から第2号)は資格を喪失し再取得したものとしては扱わない一方、「強制被保険者と任意加入被保険者との間の変更は、いったん資格を喪失し、新たに資格を取得したものとして扱います」とされています。種別の変更として扱うとする点が誤りです。根拠は法附則5条等。"},{"law":"届出・資格得喪","cat":"被保険者期間の計算","q":"被保険者期間は、被保険者の資格を取得した日の属する月からその資格を喪失した日の属する月までを算入する。","a":false,"exp":"×。法11条1項。資格を取得した日の属する月から、資格を喪失した日の属する月の前月までを被保険者期間に算入する。","page":54,"detail":"×。法11条1項に反します。p.54の本文では、被保険者の資格を取得した日の属する月から、その資格を喪失した日の属する月の「前月まで」を被保険者期間に算入するとされています。喪失日の属する月まで算入するのではありません。根拠は法11条1項。"},{"law":"届出・資格得喪","cat":"同月得喪","q":"被保険者がその資格を取得した日の属する月にその資格を喪失したときは、その月を1か月として被保険者期間に算入する。","a":true,"exp":"〇。法11条2項。資格を取得した日の属する月にその資格を喪失したときは、その月を1か月として被保険者期間に算入する。","page":54,"detail":"〇。法11条2項のとおりです。p.54の本文では、被保険者がその資格を取得した日の属する月にその資格を喪失したときは、その月を1か月として被保険者期間に算入するとされています(同月得喪)。根拠は法11条2項。"},{"law":"届出・資格得喪","cat":"種別変更時の計算","q":"被保険者の種別ごとの被保険者期間を計算する場合、種別に変更があった月は、変更前の種別の被保険者であった月とみなす。","a":false,"exp":"×。法11条の2。種別に変更があった月は、変更後の種別の被保険者であった月とみなす。同一月に2回以上変更があったときは最後の種別とみなす。","page":55,"detail":"×。法11条の2に反します。p.55の本文では、種別ごとの被保険者期間を計算する場合、種別に変更があった月は「変更後の種別」の被保険者であった月とみなすとされています。変更前ではありません。同一月に2回以上変更があったときは最後の種別とみなします。根拠は法11条の2。"},{"law":"届出・資格得喪","cat":"第1号の届出","q":"第1号被保険者の資格の取得の届出は、当該事実があった日から14日以内に、所定の事項を記載した届書を市町村長に提出して行わなければならない。","a":true,"exp":"〇。則1条の4第1項。第1号被保険者の資格取得の届出は、当該事実があった日から14日以内に市町村長に提出して行う。","page":56,"detail":"〇。則1条の4第1項のとおりです。p.56の本文では、第1号被保険者の資格取得の届出は、当該事実があった日から14日以内に、所定の事項を記載した届書を市町村長に提出して行うとされています。根拠は則1条の4第1項。"},{"law":"届出・資格得喪","cat":"第2号の届出","q":"第2号被保険者にも、第1号被保険者と同様の届出に係る規定が適用される。","a":false,"exp":"×。法附則7条の4。第2号被保険者には、届出に係る規定は適用されない。","page":56,"detail":"×。法附則7条の4に反します。p.56の本文の注意書きでは「第2号被保険者には、届出に係る規定は適用されません」と明記されています。第1号被保険者と同様の届出規定が適用されるという記述は誤りです。根拠は法附則7条の4。"},{"law":"届出・資格得喪","cat":"第1号資格喪失の届出","q":"第1号被保険者が死亡したとき又は60歳に達したときに該当する資格喪失の場合は、資格の喪失の届出を行う必要はない。","a":true,"exp":"〇。則3条1項。「死亡したとき」又は「60歳に達したとき」による資格喪失の場合は、資格喪失の届出を行う必要はない。","page":57,"detail":"〇。則3条1項のとおりです。p.57の本文では、第1号被保険者の資格喪失の届出は原則14日以内に市町村長へ行いますが、「死亡したとき」又は「60歳に達したとき」による資格喪失の場合は、資格の喪失の届出を行う必要はないとされています。根拠は則3条1項。"},{"law":"届出・資格得喪","cat":"第3号の届出","q":"第3号被保険者は、その資格の取得及び喪失に関する事項等を市町村長に届け出なければならない。","a":false,"exp":"×。法12条5項。第3号被保険者は、その資格の取得及び喪失に関する事項等を厚生労働大臣に届け出なければならない(日本年金機構に提出)。","page":58,"detail":"×。法12条5項に反します。p.58の本文では、第3号被保険者は、その資格の取得及び喪失に関する事項等を「厚生労働大臣」に届け出なければならないとされ、届書は日本年金機構に提出します。市町村長に届け出るのではありません。根拠は法12条5項。"},{"law":"届出・資格得喪","cat":"届出の経由","q":"第1号厚生年金被保険者である第2号被保険者の被扶養配偶者である第3号被保険者に係る届出は、その配偶者である第2号被保険者を使用する事業主を経由して行う。","a":true,"exp":"〇。法12条6項。当該第3号被保険者に係る届出は、その配偶者である第2号被保険者を使用する事業主を経由して行う。","page":61,"detail":"〇。法12条6項のとおりです。p.61の本文では、第1号厚生年金被保険者である第2号被保険者の被扶養配偶者である第3号被保険者に係る届出は、その配偶者である第2号被保険者を使用する事業主を経由して行うとされています。根拠は法12条6項。"},{"law":"届出・資格得喪","cat":"第3号保険料納付済期間","q":"第3号被保険者に係る届出が行われた日の属する月前の被保険者期間のうち、当該届出が行われた日の属する月の前々月までの2年間のうちにあるものは、保険料納付済期間に算入される。","a":true,"exp":"〇。法附則7条の3第1項。届出が行われた日の属する月の前々月までの2年間のうちにある期間は保険料納付済期間に算入され、それ以前は原則算入されない。","page":63,"detail":"〇。法附則7条の3第1項のとおりです。p.63の本文では、第3号被保険者に係る届出が行われた日の属する月前の被保険者期間のうち、届出が行われた日の属する月の前々月までの2年間のうちにあるものは保険料納付済期間に算入され、それ以前は原則算入されないとされています。根拠は法附則7条の3第1項。"},{"law":"届出・資格得喪","cat":"国民年金原簿","q":"国民年金原簿には、第2号被保険者のうち第2号・第3号・第4号厚生年金被保険者であるものについても、記録されている。","a":false,"exp":"×。法附則7条の5第1項。国民年金原簿には、第2号被保険者のうち第2号・第3号・第4号厚生年金被保険者であるものは記録されていない。","page":73,"detail":"×。法附則7条の5第1項に反します。p.73の本文の注意書きでは、国民年金原簿には、第2号被保険者のうち第2号厚生年金被保険者・第3号厚生年金被保険者・第4号厚生年金被保険者であるものについては「記録されていません」とされています。根拠は法附則7条の5第1項。"},{"law":"届出・資格得喪","cat":"基礎年金番号通知書","q":"基礎年金番号通知書は、市町村長を経由して交付することができる。","a":false,"exp":"×。則116条等。基礎年金番号通知書は、厚生労働大臣(作成・交付に係る事務は日本年金機構に委託)から直接交付され、市町村長を経由して交付することはできない。","page":73,"detail":"×。則116条等に反します。p.73の本文の注意書きでは、基礎年金番号通知書は、厚生労働大臣(作成・交付に係る事務は日本年金機構に委託)から「直接交付」され、「市町村長を経由して交付することはできません」と明記されています。根拠は則116条、法109条の10第1項。"},{"law":"給付通則","cat":"給付の種類","q":"国民年金の独自給付である第1号被保険者期間に係る一時金として、寡婦年金及び死亡一時金がある。","a":false,"exp":"×。法15条。寡婦年金は第1号被保険者期間に係る独自給付の年金であり、独自給付の一時金は死亡一時金である。","page":78,"detail":"×。法15条に反します。p.78の本文の給付の種類の表では、第1号被保険者期間に係る独自給付のうち、年金は寡婦年金及び付加年金、一時金は死亡一時金とされています。寡婦年金は一時金ではなく年金であり、独自給付の一時金は死亡一時金です。根拠は法15条。"},{"law":"給付通則","cat":"裁定","q":"給付を受ける権利は、その権利を有する者の請求に基づいて、厚生労働大臣が裁定する。","a":true,"exp":"〇。法16条。給付を受ける権利は、受給権者の請求に基づいて厚生労働大臣が裁定する。","page":80,"detail":"〇。法16条のとおりです。p.80の本文では、給付を受ける権利は、その権利を有する者(受給権者)の請求に基づいて、厚生労働大臣が裁定するとされています。受給権を得ただけでは支給は開始されず、裁定請求が必要です。根拠は法16条。"},{"law":"給付通則","cat":"年金額の端数処理","q":"年金給付の額に50銭未満の端数が生じたときはこれを切り捨て、50銭以上1円未満の端数が生じたときはこれを1円に切り上げる。","a":true,"exp":"〇。法17条1項。年金給付の額に50銭未満の端数は切り捨て、50銭以上1円未満の端数は1円に切り上げる。","page":81,"detail":"〇。法17条1項のとおりです。p.81の本文では、年金給付の額に50銭未満の端数が生じたときはこれを切り捨て、50銭以上1円未満の端数が生じたときはこれを1円に切り上げるとされています。これは裁定時又は額の改定時の端数処理です。根拠は法17条1項。"},{"law":"給付通則","cat":"支払期月","q":"年金給付は、毎年1月、3月、5月、7月、9月及び11月の6期に、それぞれの前月までの分を支払う。","a":false,"exp":"×。法18条3項。年金給付は、毎年2月、4月、6月、8月、10月及び12月の6期に、それぞれの前月までの分を支払う。","page":83,"detail":"×。法18条3項に反します。p.83の本文では、年金給付は、毎年「2月、4月、6月、8月、10月及び12月」の6期に、それぞれの前月までの分を支払うとされています。1月・3月・5月等の奇数月ではありません。根拠は法18条3項。"},{"law":"給付通則","cat":"死亡の推定","q":"船舶が沈没した際現にその船舶に乗っていた者の生死が6か月間わからない場合に、その事故にあった日に死亡したものと推定する。","a":false,"exp":"×。法18条の3。生死が3か月間わからない場合等に、その事故にあった日に死亡したものと推定する。","page":84,"detail":"×。法18条の3に反します。p.84の本文では、船舶が沈没した際現にその船舶に乗っていた者等の生死が「3か月間」わからない場合等に、その事故にあった日に死亡したものと推定するとされています。6か月間ではありません。根拠は法18条の3。"},{"law":"給付通則","cat":"失踪宣告","q":"失踪宣告が行われると、生死不明の状態が続き5年経過したとき、その者を死亡したものとみなす。","a":false,"exp":"×。民法30条、31条。普通失踪では、生死不明の状態が続き7年経過したとき死亡したものとみなされる。","page":84,"detail":"×。民法30条、31条に反します。p.84の本文では、失踪宣告が行われると、生死不明の状態が続き「7年経過」したとき、その者を死亡したものとみなすとされています(普通失踪)。5年ではありません。根拠は民法30条、31条。"},{"law":"給付通則","cat":"未支給年金の請求権者","q":"未支給の年金の支給を請求することができるのは、死亡した受給権者の配偶者、子、父母、孫、祖父母、兄弟姉妹又はこれら以外の3親等内の親族であって、死亡当時生計を同じくしていた者である。","a":true,"exp":"〇。法19条1項。未支給年金を請求できるのは、配偶者、子、父母、孫、祖父母、兄弟姉妹又はこれら以外の3親等内の親族で、死亡当時生計を同じくしていた者である。","page":86,"detail":"〇。法19条1項のとおりです。p.86の本文では、未支給の年金を請求できるのは、死亡した受給権者の配偶者、子、父母、孫、祖父母、兄弟姉妹又はこれらの者以外の3親等内の親族であって、死亡当時その者と生計を同じくしていた者とされています。根拠は法19条1項。"},{"law":"給付通則","cat":"未支給年金の判例","q":"死亡した受給権者が有していた年金の請求権は、相続の対象となる。","a":false,"exp":"×。平7.11.7最高裁判決。死亡した受給権者が有していた年金の請求権は、相続の対象とはならない。","page":87,"detail":"×。平7.11.7最高裁判決に反します。p.87の本文の判例では、死亡した受給権者が有していた年金の請求権は「相続の対象とはなりません」とされています。未支給年金は遺族が自己の名で請求する固有の権利です。根拠は平7.11.7最高裁判決。"},{"law":"給付通則","cat":"充当","q":"年金給付の過誤払による返還金債権の金額に充当できるのは厚生年金保険法による年金たる保険給付であり、国民年金の年金給付との間では充当を行うことはできない。","a":false,"exp":"×。法21条の2。返還金債権に充当できるのは弁済すべき者に支払うべき国民年金の年金給付であり、厚生年金保険法による保険給付との間では充当を行うことはできない。","page":90,"detail":"×。法21条の2に反します。p.90の本文では、過誤払による返還金債権に充当できるのは、弁済をすべき者に支払うべき国民年金の年金給付(遺族基礎年金)であり、注意書きで「厚生年金保険法による年金たる保険給付との間では充当を行うことはできません」とされています。問題文は充当できる対象を逆に説明しており誤りです。根拠は法21条の2。"},{"law":"給付通則","cat":"受給権の保護","q":"老齢基礎年金又は付加年金を受ける権利は、いかなる場合であっても差し押さえることができない。","a":false,"exp":"×。法24条等。給付を受ける権利は原則差し押さえられないが、老齢基礎年金又は付加年金を国税滞納処分により差し押さえる場合はこの限りでない。","page":97,"detail":"×。法24条等に反します。p.97の本文では、給付を受ける権利は原則として譲渡・担保提供・差押えができませんが、「老齢基礎年金又は付加年金を受ける権利を国税滞納処分(その例による処分を含みます)により差し押さえる場合は、この限りではありません」とされています。脱退一時金・特別一時金も差押え可能です。いかなる場合も不可とする点が誤りです。根拠は法24条等。"},{"law":"給付通則","cat":"公課の禁止","q":"老齢基礎年金及び付加年金についても、給付として支給を受けた金銭を標準として租税その他の公課を課することは禁止されている。","a":false,"exp":"×。法25条等。老齢基礎年金、付加年金、脱退一時金、特別一時金は課税することが禁止されていない。","page":97,"detail":"×。法25条等に反します。p.97の本文では、原則として給付として支給を受けた金銭には公課を課せませんが、注意書きで「老齢基礎年金、付加年金、脱退一時金、特別一時金は、課税することが禁止されていません」とされています。これらに課税禁止が及ぶとする点が誤りです。根拠は法25条等。"},{"law":"給付通則","cat":"損害賠償請求権","q":"政府が第三者の行為による事故について給付をしたときに損害賠償の請求権を取得した場合、給付を行う責を免れる期間は最長で36か月間とされている。","a":true,"exp":"〇。法22条等。政府が給付を行う責を免れる期間は、最長で36か月間とされている。","page":96,"detail":"〇。法22条等のとおりです。p.96の本文の参考では、政府が第三者の行為による事故について給付をしたときに損害賠償請求権を取得し、受給権者が第三者から損害賠償を受けたとき給付を行う責を免れる期間は、最長で36か月間とされています。根拠は法22条、平30.11.21年管管発1121第1号。"},{"law":"給付通則","cat":"基準年度以後改定率","q":"基準年度以後改定率の改定については、名目手取り賃金変動率(物価変動率を上回るときは物価変動率)を基準とする。","a":false,"exp":"×。法27条の3。基準年度以後改定率の改定については、物価変動率(物価変動率が名目手取り賃金変動率を上回るときは名目手取り賃金変動率)を基準とする。","page":100,"detail":"×。法27条の3に反します。p.100の本文では、基準年度以後改定率の改定については「物価変動率(物価変動率が名目手取り賃金変動率を上回るときは、名目手取り賃金変動率)」を基準とするとされています。問題文は物価変動率と名目手取り賃金変動率を逆に記述しており誤りです。根拠は法27条の3。"},{"law":"老齢基礎年金","cat":"支給要件","q":"老齢基礎年金は、保険料納付済期間又は保険料免除期間を有する者が65歳に達したときに支給するが、保険料納付済期間と保険料免除期間とを合算した期間が10年に満たないときはこの限りでない。","a":true,"exp":"〇。法26条。保険料納付済期間と保険料免除期間とを合算した期間が10年(受給資格期間)以上ある者が65歳に達したときに支給する。","page":109,"detail":"〇。法26条のとおりです。p.109の本文では、老齢基礎年金は保険料納付済期間又は保険料免除期間を有する者が65歳に達したときに支給するが、保険料納付済期間と保険料免除期間とを合算した期間が10年に満たないときはこの限りでないとされています。この10年が受給資格期間です。根拠は法26条。"},{"law":"老齢基礎年金","cat":"受給資格期間","q":"老齢基礎年金の受給資格期間は25年とされている。","a":false,"exp":"×。法26条。老齢基礎年金の受給資格期間は、保険料納付済期間と保険料免除期間とを合算した期間が10年以上であることとされている。","page":109,"detail":"×。法26条に反します。p.109の本文では、老齢基礎年金の受給資格期間は、保険料納付済期間と保険料免除期間とを合算した期間が「10年以上」であることとされています。25年ではなく、平成29年8月以降は10年に短縮されています。根拠は法26条。"},{"law":"老齢基礎年金","cat":"受給資格期間の例外","q":"保険料納付済期間と保険料免除期間との合算が10年未満であっても、これに合算対象期間を加えた期間が10年以上となれば、老齢基礎年金の受給資格期間を満たす。","a":true,"exp":"〇。法附則9条1項。保険料納付済期間、保険料免除期間及び合算対象期間を合算した期間が10年以上となれば、受給資格期間を満たす。","page":110,"detail":"〇。法附則9条1項のとおりです。p.110の本文では、保険料納付済期間と保険料免除期間との合算が10年未満であっても、これに合算対象期間(カラ期間)を加えた期間が10年以上となれば、老齢基礎年金の受給資格期間を満たすとされています。合算対象期間は額には反映されません。根拠は法附則9条1項。"},{"law":"老齢基礎年金","cat":"満額の年金額","q":"老齢基礎年金の額(満額)は、780,900円に改定率を乗じて得た額である。","a":true,"exp":"〇。法27条。老齢基礎年金の額(満額)は、780,900円に改定率を乗じて得た額である。","page":119,"detail":"〇。法27条のとおりです。p.119の本文では、老齢基礎年金の額(満額)は、780,900円に改定率を乗じて得た額とされています。20歳から60歳までの40年(480月)すべて保険料を納付した場合の額です。根拠は法27条。"},{"law":"老齢基礎年金","cat":"年金額の加算","q":"老齢基礎年金の受給権者が生計を維持する配偶者や子を有していたときは、それを理由として年金額に加算が行われる。","a":false,"exp":"×。法27条。老齢基礎年金には、生計を維持する配偶者や子を有していたとしても、それを理由とする加算は行われない。","page":119,"detail":"×。法27条に反します。p.119の本文の注意書きでは、受給権者が生計を維持する配偶者や子を有していたとしても、それを理由として年金額に加算は行われないとされています。障害基礎年金や遺族基礎年金と異なり、老齢基礎年金には加算がありません。根拠は法27条。"},{"law":"老齢基礎年金","cat":"額の計算","q":"保険料全額免除期間(学生納付特例期間及び納付猶予期間を除く)の月数は、老齢基礎年金の額の計算において2分の1に相当する月数として算定される。","a":true,"exp":"〇。法27条等。保険料全額免除期間(学生納付特例・納付猶予を除く)の月数は、2分の1に相当する月数として算定される(国庫負担2分の1の場合)。","page":120,"detail":"〇。法27条等のとおりです。p.120・p.121の本文では、保険料全額免除期間(学生納付特例期間及び納付猶予期間を除く)の月数は、老齢基礎年金の額の計算において「2分の1」に相当する月数として算定されます。これは国庫負担2分の1に対応します。根拠は法27条等。"},{"law":"老齢基礎年金","cat":"額の計算","q":"学生納付特例期間及び納付猶予期間は、老齢基礎年金の額に反映される。","a":false,"exp":"×。法27条等。学生納付特例期間及び納付猶予期間は、老齢基礎年金の額には反映されない(受給資格期間には算入される)。","page":120,"detail":"×。法27条等に反します。p.120の本文では、「学生納付特例期間及び納付猶予期間は、老齢基礎年金の額に反映されません」と明記されています。これらは受給資格期間には算入されますが、額の計算には反映されません。根拠は法27条等。"},{"law":"老齢基礎年金","cat":"振替加算の要件","q":"振替加算は、老齢基礎年金の受給権者であって大正15年4月2日から昭和41年4月1日までの間に生まれた者であること等を満たした場合に行われる。","a":true,"exp":"〇。昭60法附則14条1項。振替加算は、老齢基礎年金の受給権者(65歳以上)で大正15年4月2日から昭和41年4月1日までの間に生まれた者であること等を満たした場合に行われる。","page":124,"detail":"〇。昭60法附則14条1項のとおりです。p.124の本文では、振替加算は、老齢基礎年金の受給権者(65歳以上)であって大正15年4月2日から昭和41年4月1日までの間に生まれた者であること等を満たした場合に行われるとされています。配偶者の加給年金が振り替えられるものです。根拠は昭60法附則14条1項。"},{"law":"老齢基礎年金","cat":"振替加算と離婚","q":"振替加算が加算された老齢基礎年金の受給権者が配偶者と離婚した場合、離婚を理由として振替加算の額に相当する部分の支給が停止される。","a":false,"exp":"×。老齢基礎年金の受給権者が配偶者と離婚したとしても、離婚を理由として振替加算の額に相当する部分の支給が停止されることはない。","page":127,"detail":"×。p.127の本文に反します。本文では、老齢基礎年金の受給権者が配偶者と離婚したとしても、離婚を理由として振替加算の額に相当する部分の支給が停止されることはないと明記されています。離婚は支給停止事由ではありません。根拠は昭60法附則14条等。"},{"law":"老齢基礎年金","cat":"全部繰上げ","q":"老齢基礎年金の支給繰上げの請求は、60歳以上65歳未満の間に行うことができ、繰上げ支給の老齢厚生年金の支給繰上げの請求をすることができる者は、その請求と同時に行わなければならない。","a":true,"exp":"〇。法附則9条の2第1項・2項。支給繰上げの請求は60歳以上65歳未満で行え、繰上げ支給の老齢厚生年金の繰上げ請求ができる者はその請求と同時に行わなければならない。","page":128,"detail":"〇。法附則9条の2第1項・2項のとおりです。p.128の本文では、支給繰上げの請求は60歳以上65歳未満で行え、繰上げ支給の老齢厚生年金(経過的な繰上げを含む)の支給繰上げの請求をすることができる者は、その請求と同時に行わなければならないとされています。根拠は法附則9条の2第1項・2項。"},{"law":"老齢基礎年金","cat":"繰上げ減額率","q":"昭和37年4月2日以後生まれの者に係る繰上げの減額率は、「1000分の5×繰上げ月数」によって計算される。","a":false,"exp":"×。令3令附則2条2項等。昭和37年4月2日以後生まれの者に係る減額率は「1000分の4×繰上げ月数」によって計算される。1000分の5は昭和16年4月2日から昭和37年4月1日生まれの者。","page":129,"detail":"×。令3令附則2条2項等に反します。p.129の本文では、昭和37年4月2日以後生まれの者に係る減額率は「1000分の4×繰上げ月数」で計算されます。1000分の5は昭和16年4月2日から昭和37年4月1日までに生まれた者に係るものです。問題文の1000分の5は誤りです。根拠は令3令附則2条2項等。"},{"law":"老齢基礎年金","cat":"繰上げの効果","q":"支給繰上げの請求をした場合、寡婦年金の受給権は消滅する。","a":true,"exp":"〇。法附則9条の2第4項等。支給繰上げの請求をした場合、寡婦年金の受給権は消滅する。","page":135,"detail":"〇。法附則9条の2第4項等のとおりです。p.135の本文の支給繰上げの効果では、支給繰上げの請求をした場合、寡婦年金の受給権は消滅すると明記されています。また請求後は寡婦年金の支給を受けることもできません。根拠は法附則9条の2第4項等。"},{"law":"老齢基礎年金","cat":"繰上げの効果","q":"繰上げ支給の老齢基礎年金の受給権者は、任意加入被保険者となることができる。","a":false,"exp":"×。繰上げ支給の老齢基礎年金の受給権者は、任意加入被保険者となることはできない。","page":135,"detail":"×。p.135の本文に反します。本文の支給繰上げの効果では、「繰上げ支給の老齢基礎年金の受給権者は、任意加入被保険者となることはできません」と明記されています。根拠は法附則等。"},{"law":"老齢基礎年金","cat":"繰上げと振替加算","q":"老齢基礎年金の支給を繰り上げた場合、振替加算は繰上げの時点から行われる。","a":false,"exp":"×。老齢基礎年金の支給を繰り上げても、振替加算は65歳に達するまでは行われない。","page":135,"detail":"×。p.135の本文に反します。本文の支給繰上げの効果では、「老齢基礎年金の支給を繰り上げても、振替加算は、65歳に達するまでは行われません」とされています。繰上げの時点から行われるという記述は誤りです。根拠は昭60法附則等。"},{"law":"老齢基礎年金","cat":"繰下げ増額率","q":"繰下げ支給の老齢基礎年金の増額率は、「1000分の7×繰下げ月数」によって計算される。","a":true,"exp":"〇。法28条4項等。繰下げ支給の増額率は「1000分の7×繰下げ月数」で計算される。繰下げ月数は最大120である。","page":138,"detail":"〇。法28条4項等のとおりです。p.138の本文では、繰下げ支給の老齢基礎年金の増額率は「1000分の7×繰下げ月数」で計算され、繰下げ月数は最大120(75歳まで)とされています。根拠は法28条4項、令4条の5。"},{"law":"老齢基礎年金","cat":"繰下げ月数","q":"昭和27年4月2日以後生まれの者に係る繰下げ月数の最大値は60である。","a":false,"exp":"×。令3令附則2条1項等。昭和27年4月2日以後生まれの者(70歳に達していない者)に係る繰下げ月数の最大値は120である。","page":138,"detail":"×。令3令附則2条1項等に反します。p.138の本文では、昭和27年4月2日以後生まれの者(70歳に達していない者)等に係る繰下げ月数の最大値は「120」とされています。60ではありません(60は昭和16年4月2日以後昭和27年4月1日以前生まれ等)。根拠は令3令附則2条1項等。"},{"law":"老齢基礎年金","cat":"失権","q":"老齢基礎年金の受給権は、受給権者が死亡したときのほか、障害の状態が軽減したときにも消滅する。","a":false,"exp":"×。法29条。老齢基礎年金の受給権は、受給権者が死亡したときに消滅し、死亡以外の事由では消滅しない。","page":139,"detail":"×。法29条に反します。p.139の本文では、老齢基礎年金の受給権は受給権者が死亡したときに消滅し、注意書きで「死亡以外の事由で老齢基礎年金の受給権は消滅しません」とされています。障害の軽減は失権事由ではありません。根拠は法29条。"},{"law":"付加年金","cat":"支給要件","q":"付加年金は、付加保険料に係る保険料納付済期間を有する者が老齢基礎年金の受給権を取得したときに支給される。","a":true,"exp":"〇。法43条。付加年金は、付加保険料に係る保険料納付済期間を有する者が老齢基礎年金の受給権を取得したときに支給される。","page":144,"detail":"〇。法43条のとおりです。p.144の本文では、付加年金は、付加保険料に係る保険料納付済期間を有する者が老齢基礎年金の受給権を取得したときに、その者に支給するとされています。第1号被保険者独自の上乗せ給付です。根拠は法43条。"},{"law":"付加年金","cat":"支給額","q":"付加年金の額は、300円に付加保険料の保険料納付済期間の月数を乗じて得た額である。","a":false,"exp":"×。法44条。付加年金の額は、200円に付加保険料の保険料納付済期間の月数を乗じて得た額である。改定率の規定は適用されない。","page":144,"detail":"×。法44条に反します。p.144の本文では、付加年金の額は「200円×付加保険料の保険料納付済期間の月数」とされ、改定率の規定は適用されません。300円ではありません。付加保険料月額400円に対し2年で元が取れる計算です。根拠は法44条。"},{"law":"付加年金","cat":"付加年金と障害・遺族","q":"付加保険料を納付していた場合、付加年金は障害基礎年金や遺族基礎年金にも上乗せされる。","a":false,"exp":"×。法43条。付加年金は老齢基礎年金に上乗せして支給されるものであり、障害基礎年金や遺族基礎年金には上乗せされない。","page":144,"detail":"×。法43条に反します。p.144の本文では、付加年金はあくまでも老齢基礎年金に上乗せして支給されるものであり、付加保険料を納付していたとしても「障害基礎年金や遺族基礎年金には上乗せされません」と明記されています。根拠は法43条。"},{"law":"付加年金","cat":"失権","q":"付加年金の受給権は、受給権者が死亡したときに消滅する。","a":true,"exp":"〇。法48条。付加年金の受給権は、受給権者が死亡したときに消滅する。","page":145,"detail":"〇。法48条のとおりです。p.145の本文では、付加年金の受給権は、受給権者が死亡したときに消滅するとされています。根拠は法48条。"},{"law":"障害基礎年金","cat":"初診日要件","q":"障害基礎年金の初診日要件は、初診日において被保険者であること、又は被保険者であった者であって日本国内に住所を有し60歳以上65歳未満であることのいずれかに該当することである。","a":true,"exp":"〇。法30条1項。初診日要件は、初診日において被保険者であること、又は被保険者であった者で日本国内に住所を有し60歳以上65歳未満であることのいずれかに該当することである。","page":149,"detail":"〇。法30条1項のとおりです。p.149の本文の初診日要件では、初診日において、被保険者であること、又は被保険者であった者であって日本国内に住所を有し60歳以上65歳未満であること、のいずれかに該当することが要件とされています。根拠は法30条1項。"},{"law":"障害基礎年金","cat":"障害認定日","q":"障害認定日とは、初診日から起算して1年6か月を経過した日、又はその期間内に傷病が治った場合はその治った日をいう。","a":true,"exp":"〇。法30条1項。障害認定日とは、初診日から起算して1年6か月を経過した日、又はその期間内に傷病が治ったときはその治った日をいう。","page":149,"detail":"〇。法30条1項のとおりです。p.149の本文では、障害認定日とは、初診日から起算して1年6か月を経過した日、又はその期間内にその傷病が「治った」ときはその治った日をいうとされています。治った日には症状が固定し治療の効果が期待できない状態に至った日も含みます。根拠は法30条1項。"},{"law":"障害基礎年金","cat":"障害等級","q":"障害基礎年金の障害等級は、障害の程度に応じて重度のものから1級、2級及び3級とされている。","a":false,"exp":"×。法30条2項。障害基礎年金の障害等級は、障害の程度に応じて重度のものから1級及び2級とされている。3級は障害厚生年金にある。","page":149,"detail":"×。法30条2項に反します。p.149の本文では、障害等級は、障害の程度に応じて重度のものから「1級及び2級」とされています。3級は障害厚生年金にあり、障害基礎年金には3級はありません。根拠は法30条2項、令別表。"},{"law":"障害基礎年金","cat":"保険料納付要件","q":"障害基礎年金の保険料納付要件は、初診日の前日において、初診日の属する月の前々月までの被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が、当該被保険者期間の3分の2以上であることである。","a":true,"exp":"〇。法30条1項。保険料納付済期間と保険料免除期間を合算した期間が、初診日の属する月の前々月までの被保険者期間の3分の2以上であることが要件である。","page":150,"detail":"〇。法30条1項のとおりです。p.150の本文の保険料納付要件では、初診日の前日において、初診日の属する月の前々月までに被保険者期間がある場合、当該被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が、当該被保険者期間の3分の2以上であることが要件とされています。根拠は法30条1項。"},{"law":"障害基礎年金","cat":"保険料納付要件の特例","q":"初診日が令和18年4月1日前にある傷病による障害については、初診日の属する月の前々月までの1年間のうちに保険料の未納がないときは、保険料納付要件を満たしたとされる。","a":true,"exp":"〇。昭60法附則20条1項。初診日が令和18年4月1日前にある傷病については、初診日の属する月の前々月までの1年間に未納がないときは納付要件を満たす。ただし初診日に65歳以上のときは適用されない。","page":150,"detail":"〇。昭60法附則20条1項のとおりです。p.150の本文の保険料納付要件の特例では、初診日が令和18年4月1日前にある傷病については、初診日の属する月の前々月までの1年間のうちに保険料納付済期間及び保険料免除期間以外の被保険者期間がない(未納がない)ときは納付要件を満たすとされています。ただし初診日に65歳以上のときは適用されません。根拠は昭60法附則20条1項。"},{"law":"障害基礎年金","cat":"事後重症","q":"事後重症による障害基礎年金は、要件に該当した場合に当然に受給権が発生する。","a":false,"exp":"×。法30条の2第1項。事後重症による障害基礎年金は、請求により受給権が発生する。65歳に達する日の前日までに請求しなければならない。","page":151,"detail":"×。法30条の2第1項に反します。p.151の本文では、事後重症による障害基礎年金は「請求により受給権が発生」し、要件に該当した者は65歳に達する日の前日までの間に請求できるとされています。要件該当により当然に受給権が発生するのではありません。根拠は法30条の2第1項。"},{"law":"障害基礎年金","cat":"基準障害","q":"基準障害による障害基礎年金の請求は、65歳に達した日以後においても行うことができる。","a":true,"exp":"〇。法30条の3第1項。基準障害による障害基礎年金は要件に該当するときに受給権が発生し、その請求は65歳に達した日以後においても行うことができる。","page":154,"detail":"〇。法30条の3第1項のとおりです。p.154の本文では、基準障害による障害基礎年金は要件に該当するときに受給権が発生し、その請求は「65歳に達した日以後においても行うことができます」とされています。事後重症が65歳までに請求を要する点と対比されます。根拠は法30条の3第1項。"},{"law":"障害基礎年金","cat":"20歳前傷病","q":"初診日において20歳未満であった者であっても、初診日において被保険者である者には、原則の障害基礎年金が支給される。","a":true,"exp":"〇。法30条。20歳未満であっても、初診日において被保険者である者には、原則の障害基礎年金が支給される。","page":155,"detail":"〇。法30条のとおりです。p.155の本文の注意書きでは、20歳未満であっても、初診日において被保険者である者は、原則の障害基礎年金が支給されるとされています。20歳前の傷病による障害基礎年金(法30条の4)とは区別されます。根拠は法30条。"},{"law":"障害基礎年金","cat":"年金額","q":"障害基礎年金の額は、1級が780,900円×改定率×100分の125、2級が780,900円×改定率である。","a":true,"exp":"〇。法33条。障害基礎年金の額は、1級が780,900円×改定率×100分の125、2級が780,900円×改定率である。被保険者期間の長短にかかわりなく定額である。","page":160,"detail":"〇。法33条のとおりです。p.160の本文では、障害基礎年金の額は、1級が「780,900円×改定率×100分の125」、2級が「780,900円×改定率」とされています。注意書きのとおり、年金額は被保険者期間の長短にかかわりなく定額です。根拠は法33条。"},{"law":"障害基礎年金","cat":"加算額対象の子","q":"障害基礎年金の加算額の対象となる子は、18歳に達する日以後の最初の3月31日までの間にある子、又は20歳未満であって障害等級に該当する障害の状態にある子である。","a":true,"exp":"〇。法33条の2第1項。加算額の対象となる子は、18歳到達年度末までの間にある子、又は20歳未満で障害等級(1級・2級)に該当する子である。","page":161,"detail":"〇。法33条の2第1項のとおりです。p.161の本文では、加算額の対象となる子は、18歳に達する日以後の最初の3月31日までの間にある子、又は20歳未満であって障害等級(1級又は2級)に該当する障害の状態にある子とされています。根拠は法33条の2第1項。"},{"law":"障害基礎年金","cat":"加算額","q":"障害基礎年金の子の加算額は、3人目までが224,700円×改定率、4人目以降が74,900円×改定率である。","a":false,"exp":"×。法33条の2第1項等。子の加算額は、2人目までが1人につき224,700円×改定率、3人目以降が1人につき74,900円×改定率である。","page":161,"detail":"×。法33条の2第1項等に反します。p.161の本文では、子の加算額は「2人目まで」が1人につき224,700円×改定率、「3人目以降」が1人につき74,900円×改定率とされています。問題文は区分の境を3人目までと4人目以降にしており誤りです。根拠は法33条の2第1項等。"},{"law":"障害基礎年金","cat":"労災との調整","q":"障害基礎年金は、その受給権者が当該傷病による障害について労働基準法の規定による障害補償を受けることができるときは、6年間、その支給を停止する。","a":true,"exp":"〇。法36条。障害基礎年金は、当該傷病による障害について労働基準法の規定による障害補償を受けることができるときは、6年間支給を停止する。","page":165,"detail":"〇。法36条のとおりです。p.165の本文では、障害基礎年金は、その受給権者が当該傷病による障害について労働基準法の規定による障害補償を受けることができるときは、6年間、その支給を停止するとされています。根拠は法36条。"},{"law":"障害基礎年金","cat":"20歳前傷病の支給停止","q":"20歳前の傷病による障害基礎年金は、受給権者が日本国内に住所を有していないときであっても、その支給は停止されない。","a":false,"exp":"×。法36条の2第1項等。20歳前の傷病による障害基礎年金は、受給権者が日本国内に住所を有していないときは、その間支給を停止する。","page":166,"detail":"×。法36条の2第1項等に反します。p.166の本文では、20歳前の傷病による障害基礎年金は、受給権者が「日本国内に住所を有していないとき」は、その間その支給を停止するとされています。拠出を伴わない給付であることに伴う支給停止事由です。根拠は法36条の2第1項等。"},{"law":"障害基礎年金","cat":"失権","q":"障害基礎年金の受給権者は、障害等級に該当する程度の障害の状態に該当しなくなったときは、直ちにその受給権が消滅する。","a":false,"exp":"×。法35条等。障害状態に該当しなくなったとしても直ちには失権せず、不該当である間はまず支給停止となる。3年経過等の要件で失権する。","page":167,"detail":"×。法35条等に反します。p.167の本文の注意書きでは、障害状態に該当しなくなったとしても直ちには失権せず、不該当である間はまず支給停止となるとされています。失権は、3級不該当のまま3年経過(65歳到達等)等の要件によります。根拠は法35条、36条等。"},{"law":"遺族基礎年金","cat":"支給要件","q":"遺族基礎年金は、被保険者が死亡したとき等に、その者の配偶者又は子に支給される。","a":true,"exp":"〇。法37条。遺族基礎年金は、被保険者又は被保険者であった者が所定の要件に該当する場合に、その者の配偶者又は子に支給される。","page":170,"detail":"〇。法37条のとおりです。p.170の本文では、遺族基礎年金は、被保険者又は被保険者であった者が所定の要件に該当する場合に、その者の配偶者又は子に支給するとされています。根拠は法37条。"},{"law":"遺族基礎年金","cat":"支給要件","q":"被保険者であった者であって日本国内に住所を有し、かつ70歳未満の者が死亡したときは、遺族基礎年金が支給される。","a":false,"exp":"×。法37条。被保険者であった者であって日本国内に住所を有し、かつ60歳以上65歳未満の者が死亡したときに支給される。","page":170,"detail":"×。法37条に反します。p.170の本文では、被保険者であった者であって日本国内に住所を有し、かつ「60歳以上65歳未満」の者が死亡したときに支給するとされています。70歳未満ではありません。根拠は法37条。"},{"law":"遺族基礎年金","cat":"長期要件","q":"保険料納付済期間と保険料免除期間とを合算した期間が25年以上である者が死亡したときは、遺族基礎年金が支給される。","a":true,"exp":"〇。法37条。保険料納付済期間と保険料免除期間とを合算した期間が25年以上である者が死亡したときは、遺族基礎年金が支給される。この場合保険料納付要件は問われない。","page":170,"detail":"〇。法37条のとおりです。p.170の本文では、保険料納付済期間と保険料免除期間とを合算した期間が25年以上である者が死亡したとき(長期要件)に遺族基礎年金が支給されるとされています。p.172のとおり、この場合は保険料納付要件は問われません。根拠は法37条。"},{"law":"遺族基礎年金","cat":"保険料納付要件","q":"遺族基礎年金の保険料納付要件を満たさなければならないのは死亡した者であり、遺族である配偶者が保険料を滞納していたとしても遺族基礎年金を受給することができる。","a":true,"exp":"〇。法37条1項。保険料納付要件を満たすのはあくまで死亡した者であり、遺族である配偶者が保険料を滞納していても遺族基礎年金を受給できる。","page":172,"detail":"〇。法37条1項のとおりです。p.172の本文の注意書きでは、保険料納付要件を満たさなければならないのはあくまで死亡した者であり、遺族である配偶者が保険料を滞納していたとしても遺族基礎年金を受給することができるとされています。根拠は法37条1項。"},{"law":"遺族基礎年金","cat":"遺族の範囲","q":"遺族基礎年金の支給対象となる子は、現に婚姻しておらず、かつ18歳に達する日以後最初の3月31日までの間にある、又は20歳未満で障害等級に該当する障害状態にある子である。","a":true,"exp":"〇。法37条の2第1項。対象となる子は、現に婚姻しておらず、18歳到達年度末までの間にある、又は20歳未満で障害等級(1級・2級)に該当する子である。","page":173,"detail":"〇。法37条の2第1項のとおりです。p.173の本文では、対象となる子は、現に婚姻しておらず、かつ、18歳に達する日以後最初の3月31日までの間にある、又は20歳未満であって障害等級(1級又は2級)に該当する障害状態にある子とされています。根拠は法37条の2第1項。"},{"law":"遺族基礎年金","cat":"基本年金額","q":"遺族基礎年金の基本年金額は、死亡した者の保険料納付済期間の月数に応じて算定された額である。","a":false,"exp":"×。法38条。遺族基礎年金の基本年金額は、保険料納付済期間や保険料免除期間の月数にかかわらず、780,900円に改定率を乗じて得た額である。","page":174,"detail":"×。法38条に反します。p.174の本文では、遺族基礎年金の基本年金額は、保険料納付済期間の月数や保険料免除期間の月数にかかわらず、「780,900円に改定率を乗じて得た額」とされています。死亡者の納付済期間の月数に応じて算定するのではありません。根拠は法38条。"},{"law":"遺族基礎年金","cat":"配偶者の受給","q":"配偶者が遺族基礎年金を受給するには、少なくとも1人の子がいなければならない。","a":true,"exp":"〇。法39条等。遺族基礎年金は「子のある配偶者」又は「子」に支給され、配偶者が受給するには少なくとも1人の子がいなければならない。","page":175,"detail":"〇。法39条等のとおりです。p.175の本文では、遺族基礎年金は「子のある配偶者」又は「子」に支給されるため、配偶者が受給するには少なくとも1人の子がいなければならないとされています。配偶者が基本年金額のみを受けることはありません。根拠は法39条、37条の2第1項。"},{"law":"遺族基礎年金","cat":"災害補償との調整","q":"遺族基礎年金は、被保険者等の死亡について労働基準法の規定による遺族補償が行われるべきものであるときは、死亡日から6年間、その支給を停止する。","a":true,"exp":"〇。法41条1項。遺族基礎年金は、労働基準法の規定による遺族補償が行われるべきものであるときは、死亡日から6年間支給を停止する。","page":177,"detail":"〇。法41条1項のとおりです。p.177の本文では、遺族基礎年金は、当該被保険者等の死亡について労働基準法の規定による遺族補償が行われるべきものであるときは、「死亡日から6年間」その支給を停止するとされています。根拠は法41条1項。"},{"law":"遺族基礎年金","cat":"所在不明","q":"配偶者に対する遺族基礎年金は、その者の所在が3か月以上明らかでないときは、子の申請によって支給を停止する。","a":false,"exp":"×。法41条の2。配偶者の所在が1年以上明らかでないときは、子の申請によって、所在が明らかでなくなった時にさかのぼって支給を停止する。","page":178,"detail":"×。法41条の2に反します。p.178の本文では、配偶者に対する遺族基礎年金は、その者の所在が「1年以上」明らかでないときは、子の申請によって、所在が明らかでなくなった時にさかのぼって支給を停止するとされています。3か月以上ではありません。根拠は法41条の2。"},{"law":"遺族基礎年金","cat":"失権","q":"遺族基礎年金の受給権は、受給権者が婚姻したときは消滅する。","a":true,"exp":"〇。法40条。遺族基礎年金の受給権は、受給権者が死亡したとき、婚姻したとき、養子となったとき(直系血族・直系姻族の養子を除く)に消滅する。","page":179,"detail":"〇。法40条のとおりです。p.179の本文の失権事由では、遺族基礎年金の受給権は、受給権者が死亡したとき、婚姻したとき、養子となったとき(直系血族又は直系姻族の養子となった場合を除く)等に消滅するとされています。婚姻は配偶者・子共通の失権事由です。根拠は法40条。"},{"law":"遺族基礎年金","cat":"子の失権","q":"子に係る遺族基礎年金の受給権は、子が18歳に達した日以後の最初の3月31日が終了したとき(障害等級に該当する障害の状態にあるときを除く)に消滅する。","a":true,"exp":"〇。法40条。子の受給権は、18歳到達年度末が終了したとき(障害等級に該当する状態にあるときを除く)、20歳に達したとき等に消滅する。","page":179,"detail":"〇。法40条のとおりです。p.179の本文の子のみの失権事由では、18歳に達した日以後の最初の3月31日が終了したとき(障害等級に該当する障害の状態にあるときを除く)、20歳に達したとき等に子の受給権は消滅するとされています。根拠は法40条。"},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金支給要件","q":"寡婦年金は、死亡日の前日において死亡日の属する月の前月までの第1号被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が10年以上である夫が死亡したこと等を要件とする。","a":true,"exp":"〇。法49条1項。寡婦年金は、第1号被保険者期間に係る保険料納付済期間と保険料免除期間との合算が10年以上である夫が死亡したこと等を要件とする。","page":182,"detail":"〇。法49条1項のとおりです。p.182の本文では、寡婦年金は、死亡日の前日において死亡日の属する月の前月までの第1号被保険者としての被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が10年以上である夫が死亡したこと等を要件とするとされています。この10年に合算対象期間は含みません。根拠は法49条1項。"},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金支給要件","q":"寡婦年金は、夫との婚姻関係(内縁関係を含む)が10年以上継続していた65歳未満の妻に支給される。","a":true,"exp":"〇。法49条1項。寡婦年金は、夫との婚姻関係(内縁関係を含む)が10年以上継続していた65歳未満の妻に支給される。","page":182,"detail":"〇。法49条1項のとおりです。p.182の本文では、寡婦年金の支給要件として、夫との婚姻関係(内縁関係を含む)が10年以上継続していたこと、65歳未満の妻であること等が挙げられています。根拠は法49条1項。"},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金支給要件","q":"夫が障害基礎年金の支給を受けていたことがある場合であっても、所定の要件を満たせば寡婦年金は支給される。","a":false,"exp":"×。法49条1項。夫が老齢基礎年金又は障害基礎年金の支給を受けていたときは、寡婦年金は支給されない。","page":182,"detail":"×。法49条1項に反します。p.182の本文では、寡婦年金の要件として、夫が老齢基礎年金の支給を受けていないこと、障害基礎年金の支給を受けていないことが挙げられています。夫が障害基礎年金の支給を受けていたことがある場合は支給されません。根拠は法49条1項。"},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金の額","q":"寡婦年金の額は、夫の第1号被保険者期間に係る保険料納付済期間及び保険料免除期間について老齢基礎年金の額の計算の例によって計算した額の4分の3に相当する額である。","a":true,"exp":"〇。法50条。寡婦年金の額は、夫の第1号被保険者期間分について老齢基礎年金の額の計算の例によって計算した額の4分の3に相当する額である。","page":184,"detail":"〇。法50条のとおりです。p.184の本文では、寡婦年金の額は、夫の第1号被保険者期間に係る保険料納付済期間及び保険料免除期間について老齢基礎年金の額の計算の例によって計算した額の「4分の3」に相当する額とされています。なお付加保険料を納付していても寡婦年金の額には反映されません。根拠は法50条。"},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金の失権","q":"寡婦年金の受給権は、妻が65歳に達したときは、老齢基礎年金の受給権を取得していない限り消滅しない。","a":false,"exp":"×。法51条。寡婦年金の受給権は、妻が65歳に達したときは、老齢基礎年金の受給権の取得の有無にかかわらず消滅する。","page":184,"detail":"×。法51条に反します。p.184の本文の失権事由では、寡婦年金の受給権は妻が「65歳に達したとき」に消滅し、注意書きで「老齢基礎年金の受給権の取得の有無にかかわらず、失権します」とされています。寡婦年金は60歳から65歳までの所得保障です。根拠は法51条。"},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金支給要件","q":"死亡一時金は、保険料納付済期間の月数等を合算した月数が36月以上である第1号被保険者としての被保険者期間を有する者が死亡したこと等を要件とする。","a":true,"exp":"〇。法52条の2第1項。死亡一時金は、保険料納付済期間の月数等を合算した月数が36月以上である者が死亡したこと等を要件とする。","page":185,"detail":"〇。法52条の2第1項のとおりです。p.185の本文では、死亡一時金は、死亡日の前日において前月までの第1号被保険者期間に係る保険料納付済期間の月数等(一部免除期間は割合換算)を合算した月数が36月以上である者が死亡したこと等を要件とするとされています。根拠は法52条の2第1項。"},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金支給要件","q":"死亡した者が老齢基礎年金又は障害基礎年金の支給を受けたことがある場合には、死亡一時金は支給されない。","a":true,"exp":"〇。法52条の2第1項。死亡した者が老齢基礎年金又は障害基礎年金の支給を受けたことがある場合には、死亡一時金は支給されない。","page":185,"detail":"〇。法52条の2第1項のとおりです。p.185の本文では、死亡一時金の要件として、死亡した者が老齢基礎年金又は障害基礎年金の支給を受けたことがないことが挙げられています。これらの支給を受けたことがある場合は支給されません。根拠は法52条の2第1項。"},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金の額","q":"死亡一時金の額は、合算した月数が36月以上180月未満の場合、120,000円である。","a":true,"exp":"〇。法52条の4。死亡一時金の額は、合算月数が36月以上180月未満の場合120,000円であり、月数に応じて段階的に増額され420月以上で320,000円となる。","page":187,"detail":"〇。法52条の4のとおりです。p.187の本文の支給額の表では、合算した月数が36月以上180月未満の場合120,000円とされ、月数に応じて段階的に増額され、420月以上で320,000円となります。根拠は法52条の4。"},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金の加算","q":"付加保険料に係る保険料納付済期間が3年以上ある者が死亡した場合は、死亡一時金の額に8,500円が加算される。","a":true,"exp":"〇。法52条の4。付加保険料に係る保険料納付済期間が3年以上ある者が死亡した場合は、本来の額に8,500円が加算される。","page":187,"detail":"〇。法52条の4のとおりです。p.187の本文では、付加保険料に係る保険料納付済期間が3年以上ある者が死亡した場合は、本来の額に8,500円が加算されるとされています。根拠は法52条の4。"},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金の遺族","q":"死亡一時金を受けることができる遺族の順位は、配偶者、子、父母、孫、祖父母、兄弟姉妹の順序である。","a":true,"exp":"〇。法52条の3第2項。死亡一時金を受けるべき者の順位は、配偶者、子、父母、孫、祖父母、兄弟姉妹の順序である。","page":187,"detail":"〇。法52条の3第2項のとおりです。p.187の本文では、死亡一時金を受けることができる遺族は配偶者、子、父母、孫、祖父母又は兄弟姉妹であって生計を同じくしていた者であり、受けるべき者の順位は配偶者、子、父母、孫、祖父母、兄弟姉妹の順序とされています。根拠は法52条の3第2項。"},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金と死亡一時金","q":"同一人の死亡により寡婦年金と死亡一時金を受けることができるときは、その者の選択により、どちらか一つを支給し、他は支給しない。","a":true,"exp":"〇。法52条の6。同一人の死亡により寡婦年金と死亡一時金を受けることができるときは、選択によりどちらか一つを支給し、他は支給しない。","page":188,"detail":"〇。法52条の6のとおりです。p.188の本文では、同一人の死亡により寡婦年金と死亡一時金を受けることができるときは、その者の選択により、どちらか一つを支給し、他は支給しないとされています。寡婦年金を選択すると死亡一時金の受給権は消滅します。根拠は法52条の6。"},{"law":"その他の給付","cat":"脱退一時金","q":"脱退一時金は、保険料納付済期間等の月数が6月以上である日本国籍を有しない者であって、老齢基礎年金の受給資格期間を満たしていないもの等が請求することができる。","a":true,"exp":"〇。法附則9条の3の2第1項。脱退一時金は、保険料納付済期間等の月数が6月以上の日本国籍を有しない者で、老齢基礎年金の受給資格期間を満たしていないもの等が請求できる。","page":193,"detail":"〇。法附則9条の3の2第1項のとおりです。p.193の本文では、脱退一時金は、保険料納付済期間等の月数が6月以上である日本国籍を有しない者(被保険者でない者に限る)であって、老齢基礎年金の受給資格期間を満たしていないもの等が請求できるとされています。根拠は法附則9条の3の2第1項。"},{"law":"その他の給付","cat":"脱退一時金","q":"脱退一時金は、最後に被保険者の資格を喪失した日等から起算して3年を経過しているときは、請求することができない。","a":false,"exp":"×。法附則9条の3の2第1項。脱退一時金は、最後に被保険者資格を喪失した日(国内に住所を有していた場合は初めて住所を有しなくなった日)から起算して2年を経過しているときは請求できない。","page":193,"detail":"×。法附則9条の3の2第1項に反します。p.193の本文では、脱退一時金は、最後に被保険者の資格を喪失した日(同日に国内に住所を有していた者は同日後初めて住所を有しなくなった日)から起算して「2年」を経過しているときは請求できないとされています。3年ではありません。根拠は法附則9条の3の2第1項。"},{"law":"その他の給付","cat":"絶対的給付制限","q":"故意に障害又はその直接の原因となった事故を生じさせた者の当該障害については、これを支給事由とする障害基礎年金は、支給されない。","a":true,"exp":"〇。法69条。故意に障害又はその直接の原因となった事故を生じさせた者の当該障害については、障害基礎年金は支給されない。","page":196,"detail":"〇。法69条のとおりです。p.196の本文の絶対的給付制限では、故意に障害又はその直接の原因となった事故を生じさせた者の当該障害については、これを支給事由とする障害基礎年金は支給しないとされています。根拠は法69条。"},{"law":"その他の給付","cat":"給付制限と自殺","q":"自殺は、故意の犯罪行為又は重大な過失に該当しないので、給付制限の対象とはならない。","a":true,"exp":"〇。昭34.9.16年福発69号。自殺は、故意の犯罪行為又は重大な過失に該当しないので、給付制限の対象とはならない。","page":196,"detail":"〇。昭34.9.16年福発69号のとおりです。p.196の本文の通達では、自殺は、故意の犯罪行為又は重大な過失に該当しないので、給付制限の対象とはならないとされています。根拠は昭34.9.16年福発69号。"},{"law":"その他の給付","cat":"円滑な実施","q":"政府は、国民年金事業の円滑な実施を図るための教育及び広報等の事業の全部又は一部を、日本年金機構に行わせることができる。","a":true,"exp":"〇。法74条3項。政府は、円滑な実施を図るための事業の全部又は一部を日本年金機構に行わせることができる。","page":200,"detail":"〇。法74条3項のとおりです。p.200の本文では、政府は国民年金事業の円滑な実施を図るための教育及び広報、相談その他の援助、情報提供等の事業を行うことができ、これらの事業の全部又は一部を日本年金機構に行わせることができるとされています。根拠は法74条1項・3項。"},{"law":"保険料・免除","cat":"国庫負担の割合","q":"国庫は、第1号被保険者に係る基礎年金の給付に要する費用の3分の1を負担する。","a":false,"exp":"×。法85条1項。国庫は、第1号被保険者に係る基礎年金の給付に要する費用の2分の1を負担する。平成16年改正前は3分の1であった。","page":204,"detail":"×。法85条1項に反します。p.204の本文では、国庫は、第1号被保険者に係る基礎年金の給付に要する費用の「2分の1」を負担するとされています。p.205のとおり平成16年改正前は3分の1でしたが、特定年度(平成26年度)以後は恒久的に2分の1です。根拠は法85条1項。"},{"law":"保険料・免除","cat":"国庫負担の割合","q":"全額免除期間に係る老齢基礎年金の給付に要する費用については、国庫が費用の全額を負担する。","a":true,"exp":"〇。法85条1項。全額免除期間(学生納付特例・納付猶予を除く)に係る老齢基礎年金の給付に要する費用は、国庫が費用の全額を負担する。","page":205,"detail":"〇。法85条1項のとおりです。p.205の本文では、全額免除期間(学生納付特例及び納付猶予により納付を要しないとされた期間を除く)に係る老齢基礎年金の給付に要する費用は、国庫が費用の全額を負担するとされています。根拠は法85条1項。"},{"law":"保険料・免除","cat":"国庫負担の割合","q":"20歳前の傷病による障害基礎年金の給付に要する費用については、給付のうち100分の60部分が国庫負担となる。","a":true,"exp":"〇。法85条1項。20歳前の傷病による障害基礎年金は、100分の20に残り100分の80部分の2分の1を加え、給付のうち100分の60部分が国庫負担となる。","page":205,"detail":"〇。法85条1項のとおりです。p.205の本文では、20歳前の傷病による障害基礎年金の給付に要する費用は、100分の20に、その他の部分(100分の80部分)について2分の1を加え、給付のうち「100分の60部分」が国庫負担となるとされています。根拠は法85条1項。"},{"law":"保険料・免除","cat":"保険料の徴収","q":"政府は、第2号被保険者及び第3号被保険者としての被保険者期間についても、保険料を徴収する。","a":false,"exp":"×。法94条の6。第2号被保険者及び第3号被保険者としての被保険者期間については、政府は保険料を徴収せず、これらの者は保険料を納付することを要しない。","page":208,"detail":"×。法94条の6に反します。p.208の本文では、第2号被保険者及び第3号被保険者としての被保険者期間については、政府は保険料を徴収せず、これらの被保険者は保険料を納付することを要しないとされています。徴収するという記述は誤りです。根拠は法94条の6。"},{"law":"保険料・免除","cat":"保険料の額","q":"令和8年度の保険料額は、17,920円である。","a":true,"exp":"〇。法87条3項等。令和8年度の保険料額は、法定額17,000円に保険料改定率1.054を乗じて得た17,920円である。","page":208,"detail":"〇。法87条3項等のとおりです。p.208・p.209の本文では、令和8年度の保険料額は、法定額17,000円に保険料改定率1.054を乗じて得た17,920円とされています(5円未満切捨て・5円以上10円未満切上げの端数処理後)。根拠は法87条3項。"},{"law":"保険料・免除","cat":"付加保険料","q":"第1号被保険者は、厚生労働大臣に申し出て、本来の保険料のほか、月額400円の付加保険料を納付する者となることができる。","a":true,"exp":"〇。法87条の2第1項。第1号被保険者は、申出により本来の保険料のほか月額400円の付加保険料を納付する者となることができる。","page":210,"detail":"〇。法87条の2第1項のとおりです。p.210の本文では、第1号被保険者は、厚生労働大臣に申し出て、その申出をした日の属する月以後の各月につき、本来の保険料のほか、月額400円の付加保険料を納付する者となることができるとされています。根拠は法87条の2第1項。"},{"law":"保険料・免除","cat":"付加保険料","q":"国民年金基金の加入員は、付加保険料を納付する者となることができる。","a":false,"exp":"×。法87条の2第1項。国民年金基金の加入員及び保険料の全部又は一部の免除を受けている者は、付加保険料を納付する者となることができない。","page":210,"detail":"×。法87条の2第1項に反します。p.210の本文では、付加保険料を納付できない者として、保険料の全部又は一部の免除を受けている者と「国民年金基金の加入員」が挙げられています。基金の加入員は付加保険料を納付する者となることができません。根拠は法87条の2第1項。"},{"law":"保険料・免除","cat":"産前産後免除","q":"被保険者は、出産予定月の前月から出産予定月の翌々月までの期間に係る保険料は、納付することを要しない。","a":true,"exp":"〇。法88条の2。被保険者は、出産予定月の前月(多胎妊娠の場合は3か月前)から出産予定月の翌々月までの期間に係る保険料は納付することを要しない。","page":212,"detail":"〇。法88条の2のとおりです。p.212の本文では、被保険者は、出産予定月の前月(多胎妊娠の場合は3か月前)から出産予定月の翌々月までの期間に係る保険料は、納付することを要しないとされています。根拠は法88条の2。"},{"law":"保険料・免除","cat":"産前産後免除","q":"産前産後保険料免除期間は、保険料免除期間として取り扱われ、保険料納付済期間には算入されない。","a":false,"exp":"×。法5条1項等。産前産後保険料免除期間は、保険料納付済期間に算入される。","page":212,"detail":"×。法5条1項等に反します。p.212の本文では、産前産後保険料免除期間は「保険料納付済期間に算入されます」と明記されています。他の免除と異なり、保険料免除期間ではなく納付済期間として扱われ、満額計算に反映されます。根拠は法5条1項、88条の2。"},{"law":"保険料・免除","cat":"保険料免除の対象","q":"保険料免除の対象となるのは第1号被保険者だけであり、任意加入被保険者及び特例による任意加入被保険者は対象とならない。","a":true,"exp":"〇。法附則5条10項等。保険料免除の対象となるのは第1号被保険者だけで、任意加入被保険者及び特例による任意加入被保険者は対象とならない。","page":213,"detail":"〇。法附則5条10項等のとおりです。p.213の本文の注意書きでは、保険料免除の対象となるのは第1号被保険者だけであり、任意加入被保険者及び特例による任意加入被保険者は対象とならないとされています。根拠は法附則5条10項等。"},{"law":"保険料・免除","cat":"法定免除","q":"被保険者が法定免除事由に該当するに至ったときは、その該当するに至った日の属する月の前月からこれに該当しなくなる日の属する月までの期間に係る保険料は、既に納付されたものを除き、納付することを要しない。","a":true,"exp":"〇。法89条1項。法定免除事由に該当するに至ったときは、該当した日の属する月の前月から該当しなくなる日の属する月までの保険料は、既に納付されたものを除き納付を要しない。","page":214,"detail":"〇。法89条1項のとおりです。p.214の本文では、被保険者が法定免除事由に該当するに至ったときは、その該当するに至った日の属する月の前月からこれに該当しなくなる日の属する月までの期間に係る保険料は、既に納付されたものを除き、納付することを要しないとされています。根拠は法89条1項。"},{"law":"保険料・免除","cat":"申請全額免除","q":"申請全額免除の所得要件における政令で定める額は、(扶養親族等の数+1)×35万円+32万円である。","a":true,"exp":"〇。法90条1項、令6条の7。申請全額免除の所得基準は、(扶養親族等の数+1)×35万円+32万円である。","page":216,"detail":"〇。法90条1項、令6条の7のとおりです。p.216・p.219の本文では、申請全額免除の所得基準(政令で定める額)は「(扶養親族等の数+1)×35万円+32万円」とされています。根拠は法90条1項、令6条の7。"},{"law":"保険料・免除","cat":"学生納付特例","q":"学生納付特例の所得は、学生等本人及び親元の世帯の所得状況により判定される。","a":false,"exp":"×。法90条の3。学生納付特例の所得は、学生等本人の所得状況により判定され、親元の世帯の所得状況は問わない。","page":220,"detail":"×。法90条の3に反します。p.220の本文の注意書きでは、学生納付特例の所得は「学生等本人の所得状況により判定され、親元の世帯の所得状況は問いません」とされています。本人及び親元世帯で判定するという記述は誤りです。根拠は法90条の3。"},{"law":"保険料・免除","cat":"学生納付特例","q":"学生等である期間については、法定免除の規定は適用されない。","a":false,"exp":"×。法89条1項。学生等である期間であっても、法定免除の規定は適用される。","page":220,"detail":"×。法89条1項に反します。p.214・p.220の本文によれば、法定免除は障害基礎年金の受給権者等の法定の事由に該当すれば適用され、学生等である期間であることはこれを妨げません。学生であっても法定免除事由に該当すれば法定免除の規定は適用されます。根拠は法89条1項。"},{"law":"保険料・免除","cat":"納付猶予","q":"納付猶予の申請の審査においては、世帯主の所得状況が考慮される。","a":false,"exp":"×。平16法附則19条等。納付猶予では、配偶者が要件に該当しないときは免除されないが、世帯主の所得状況は考慮されない。","page":223,"detail":"×。平16法附則19条等に反します。p.223の本文では、納付猶予は配偶者が要件に該当しないときは免除されない一方、「世帯主の所得状況は考慮されません」と明記されています。世帯主の所得状況が考慮されるという記述は誤りです。根拠は平16法附則19条、平26法附則14条。"},{"law":"保険料・免除","cat":"保険料の納期限","q":"毎月の保険料は、翌月末日までに納付しなければならない。","a":true,"exp":"〇。法91条。毎月の保険料は、翌月末日までに納付しなければならない。","page":226,"detail":"〇。法91条のとおりです。p.226の本文では、毎月の保険料は、翌月末日までに納付しなければならないとされています。根拠は法91条。"},{"law":"保険料・免除","cat":"前納","q":"保険料の前納は、厚生労働大臣が定める期間につき、原則として6月又は年を単位として行う。","a":true,"exp":"〇。令7条。保険料の前納は、原則として6月又は年を単位として行う。年単位の前納は1年又は2年とされている。","page":230,"detail":"〇。令7条のとおりです。p.230の本文では、保険料の前納は、厚生労働大臣が定める期間につき、原則として6月又は年を単位として行うとされ、参考で年を単位とする前納は1年又は2年とされています。根拠は令7条。"},{"law":"保険料・免除","cat":"追納","q":"追納することができる保険料は、承認の日の属する月前5年以内の期間に係るものに限られる。","a":false,"exp":"×。法94条1項。追納することができる保険料は、承認の日の属する月前10年以内の期間に係るものに限られる。","page":234,"detail":"×。法94条1項に反します。p.234の本文では、追納することができる保険料は、承認の日の属する月前「10年以内」の期間に係るものに限るとされています。5年以内ではありません。根拠は法94条1項。"},{"law":"保険料・免除","cat":"追納","q":"老齢基礎年金の受給権者は、保険料を追納することができる。","a":false,"exp":"×。法94条1項。老齢基礎年金の受給権者は、追納することはできない。また合算対象期間や保険料を滞納した期間も追納できない。","page":233,"detail":"×。法94条1項に反します。p.233の本文では、追納の対象となる免除等の保険料につき「老齢基礎年金の受給権者は、追納することはできません」とされています。また合算対象期間や保険料を滞納した期間も追納できません。根拠は法94条1項。"},{"law":"保険料・免除","cat":"追納と付加保険料","q":"付加保険料については、追納することができる。","a":false,"exp":"×。法94条1項等。付加保険料については、追納することはできない。","page":233,"detail":"×。法94条1項等に反します。p.233の本文では、追納の対象は法定免除・申請全額免除・学生納付特例・納付猶予又は一部免除に係る保険料であり、「付加保険料については、追納することはできません」と明記されています。根拠は法94条1項等。"},{"law":"保険料・免除","cat":"延滞金","q":"延滞金の計算は、督促状の指定期限の翌日から算定する。","a":false,"exp":"×。法97条1項。延滞金の計算は、本来の納期限の翌日から算定する。督促状の指定期限からではない。","page":241,"detail":"×。法97条1項に反します。p.241の本文の注意書きでは、延滞金の計算は「本来の納期限の翌日から算定します。督促状の指定期限からではありません」と明記されています。根拠は法97条1項。"},{"law":"保険料・免除","cat":"基礎年金拠出金","q":"厚生年金保険の実施者たる政府は基礎年金拠出金を納付し、実施機関たる共済組合等は基礎年金拠出金を負担する。","a":false,"exp":"×。法94条の2第1項・2項。厚生年金保険の実施者たる政府は基礎年金拠出金を負担し、実施機関たる共済組合等はこれを納付する。","page":244,"detail":"×。法94条の2第1項・2項に反します。p.244の本文では、厚生年金保険の実施者たる政府は基礎年金拠出金を「負担」し、実施機関たる共済組合等はこれを「納付」するとされています。問題文は負担と納付を逆に記述しており誤りです。根拠は法94条の2第1項・2項。"},{"law":"その他","cat":"審査請求","q":"被保険者の資格に関する処分、給付に関する処分等に不服がある者は、社会保険審査官に対して審査請求をし、その決定に不服がある者は社会保険審査会に対して再審査請求をすることができる。","a":true,"exp":"〇。法101条1項。被保険者の資格・給付・徴収金に関する処分に不服がある者は、社会保険審査官に審査請求し、その決定に不服がある者は社会保険審査会に再審査請求できる。","page":250,"detail":"〇。法101条1項のとおりです。p.250の本文では、被保険者の資格に関する処分、給付に関する処分、徴収金に関する処分に不服がある者は、社会保険審査官に対して審査請求をし、その決定に不服がある者は社会保険審査会に対して再審査請求をすることができるとされています(二審制)。根拠は法101条1項。"},{"law":"その他","cat":"審査請求","q":"脱退一時金に関する処分に不服がある者は、社会保険審査官に対して審査請求をすることができる。","a":false,"exp":"×。法附則9条の3の2第5項。脱退一時金に関する処分に不服がある者は、社会保険審査会に対して審査請求をすることができる(二審制でない)。","page":250,"detail":"×。法附則9条の3の2第5項に反します。p.250の本文では、脱退一時金に関する処分に不服がある者は、「社会保険審査会」に対して審査請求することができるとされています(二審制でない)。社会保険審査官への審査請求ではありません。根拠は法附則9条の3の2第5項。"},{"law":"その他","cat":"審査請求期間","q":"審査請求は、処分のあったことを知った日の翌日から起算して3か月を経過したときは、することができない。","a":true,"exp":"〇。社会保険審査官及び社会保険審査会法4条1項。審査請求は、処分のあったことを知った日の翌日から起算して3か月を経過したときはできない。","page":250,"detail":"〇。社会保険審査官及び社会保険審査会法4条1項のとおりです。p.250の本文では、審査請求は、処分のあったことを知った日の翌日から起算して3か月を経過したときはすることができないとされています(再審査請求は決定書謄本送付日の翌日から2か月)。根拠は社会保険審査官及び社会保険審査会法4条1項。"},{"law":"その他","cat":"審査請求","q":"国民年金原簿の訂正の請求に係る決定に不服がある場合は、社会保険審査官に対して審査請求をすることができる。","a":false,"exp":"×。法101条等。国民年金原簿の訂正の請求に係る決定に不服がある場合であっても、社会保険審査官や社会保険審査会に審査請求することはできない。","page":250,"detail":"×。法101条等に反します。p.250の本文の注意書きでは、「国民年金原簿の訂正の請求」に係る決定に不服がある場合であっても、社会保険審査官や社会保険審査会に対して審査請求することはできないとされています。根拠は法101条等。"},{"law":"その他","cat":"時効","q":"年金給付を受ける権利は、その支給すべき事由が生じた日から5年を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法102条1項。年金給付を受ける権利は、その支給すべき事由が生じた日から5年を経過したときは、時効によって消滅する。","page":253,"detail":"〇。法102条1項のとおりです。p.253の本文では、年金給付を受ける権利は、その支給すべき事由が生じた日から5年を経過したときは、時効によって消滅するとされています(全額支給停止中は時効は進行しません)。根拠は法102条1項。"},{"law":"その他","cat":"時効","q":"保険料その他国民年金法の規定による徴収金を徴収する権利及び死亡一時金を受ける権利は、これらを行使することができる時から3年を経過したときは時効によって消滅する。","a":false,"exp":"×。法102条4項。保険料その他の徴収金を徴収する権利及び死亡一時金を受ける権利は、行使できる時から2年を経過したときに時効消滅する。","page":253,"detail":"×。法102条4項に反します。p.253の本文では、保険料その他国民年金法の規定による徴収金を徴収する権利及び死亡一時金を受ける権利は、これらを行使することができる時から「2年」を経過したときに時効によって消滅するとされています。3年ではありません。根拠は法102条4項。"},{"law":"国民年金基金","cat":"基金の種類","q":"地域型国民年金基金の地区は、原則として一の都道府県の区域の全部とし、都道府県につき1個とされている。","a":true,"exp":"〇。法118条の2等。地域型基金の地区は原則一の都道府県の区域の全部とし、都道府県につき1個とされている。職能型基金は同種の事業・業務につき全国を通じて1個である。","page":262,"detail":"〇。法118条の2等のとおりです。p.262の本文では、地域型基金の地区は原則として一の都道府県の区域の全部とし、都道府県につき1個とされています。職能型基金の地区は全国とし、同種の事業又は業務につき全国を通じて1個です。根拠は法115条の2、118条の2。"},{"law":"国民年金基金","cat":"基金の組織","q":"産前産後期間の保険料免除の規定の適用を受ける者は、国民年金基金を組織する者から除かれている。","a":false,"exp":"×。法116条1項。法定免除や申請全額免除等を受けている者は除かれるが、産前産後期間の保険料免除の規定の適用を受ける者は、組織する者から除かれていない。","page":263,"detail":"×。法116条1項に反します。p.263の本文では、法定免除・申請全額免除・学生納付特例・納付猶予・一部免除を受けている者及び農業者年金の被保険者は基金を組織する者から除かれますが、注意書きで「産前産後期間の保険料免除の規定の適用を受ける者は、国民年金基金を組織する者から除かれていません」とされています。根拠は法116条1項。"},{"law":"国民年金基金","cat":"設立要件","q":"地域型基金は加入員が1,000人以上、職能型基金は加入員が3,000人以上いなければ、設立することができない。","a":true,"exp":"〇。法119条4項・5項。地域型基金は加入員1,000人以上、職能型基金は加入員3,000人以上いなければ設立できない。","page":264,"detail":"〇。法119条4項・5項のとおりです。p.264の本文では、地域型基金は加入員が1,000人以上、職能型基金は加入員が3,000人以上いなければ設立することができないとされています。根拠は法119条4項・5項。"},{"law":"国民年金基金","cat":"加入員","q":"国民年金基金の加入員は、同時に2以上の基金の加入員となることができる。","a":false,"exp":"×。法127条1項。国民年金基金の加入員は、同時に2以上の基金の加入員となることはできない。","page":268,"detail":"×。法127条1項に反します。p.268の本文の注意書きでは、「同時に2以上の基金の加入員となることはできません」と明記されています。根拠は法127条1項。"},{"law":"国民年金基金","cat":"加入員の資格喪失","q":"国民年金基金の加入員は、自ら基金に申し出ることにより、任意にその資格を喪失することができる。","a":false,"exp":"×。法127条3項等。加入員は基金に申し出て任意に資格を喪失することはできず、法定の事由によってのみ資格を喪失する。","page":269,"detail":"×。法127条3項等に反します。p.269の本文の注意書きでは、加入員が基金に申し出て、任意に資格を喪失することはできないとされ、被保険者資格の喪失等の法定の事由(❶から❻)によってのみ資格を喪失するとされています。根拠は法127条3項等。"},{"law":"国民年金基金","cat":"掛金の額","q":"掛金の額は、原則として1か月につき68,000円を超えてはならないものとされている。","a":true,"exp":"〇。基金令35条。掛金の額は、原則として1か月につき68,000円を超えてはならない。一定の要件で102,000円以下とできる場合がある。","page":271,"detail":"〇。基金令35条のとおりです。p.271の本文では、掛金の額は、原則として1か月につき68,000円を超えてはならないとされています。なお保険料免除期間の全部につき追納を行った加入員は、一定の期間に限り1月102,000円以下とできる場合があります。根拠は基金令34条、35条。"}],"kounen":[{"law":"総則","cat":"管掌","q":"厚生年金保険は、日本年金機構が管掌する。","a":false,"exp":"×。法2条により、厚生年金保険は政府が管掌する。日本年金機構ではない。","page":14,"detail":"×。法2条は「厚生年金保険は、政府が管掌します」と定めており、管掌者は政府であって日本年金機構ではありません。日本年金機構は法100条の4により厚生労働大臣の権限に係る事務を委任されて行う実施機関ですが、保険を管掌するのはあくまで政府です。よって本肢は誤りです。根拠条文は法2条。"},{"law":"総則","cat":"実施機関","q":"第1号厚生年金被保険者の実施機関は、厚生労働大臣である。","a":true,"exp":"〇。法2条の5第1項のとおり。第2号は国家公務員共済組合等、第4号は日本私立学校振興・共済事業団である。","page":15,"detail":"○。法2条の5第1項により、厚生年金保険の実施機関は被保険者の種別ごとに定められ、第1号厚生年金被保険者(第2号から第4号以外の被保険者)に係る実施機関は厚生労働大臣とされています。実施機関は当該種別の被保険者に係る資格、標準報酬、保険給付、保険料等の事務を行います。したがって本肢は正しいです。根拠条文は法2条の5第1項。"},{"law":"総則","cat":"被保険者の種別","q":"私立学校教職員共済制度の加入者たる厚生年金保険の被保険者は、第3号厚生年金被保険者である。","a":false,"exp":"×。法2条の5第1項により、私立学校教職員共済制度の加入者は第4号厚生年金被保険者である。第3号は地方公務員共済組合の組合員である。","page":15,"detail":"×。法2条の5第1項の表によれば、私立学校教職員共済制度の加入者たる厚生年金保険の被保険者は「第4号厚生年金被保険者」であり、その実施機関は日本私立学校振興・共済事業団です。第3号厚生年金被保険者は地方公務員共済組合の組合員たる被保険者を指します。よって第3号とする本肢は誤りです。根拠条文は法2条の5第1項。"},{"law":"総則","cat":"財務大臣への委任","q":"厚生労働大臣が財務大臣に滞納処分等の権限を委任することができるのは、納付義務者が滞納している保険料等の額が3,000万円以上であること等の事情に該当する場合である。","a":false,"exp":"×。法100条の5第1項、令4条の2の16により、滞納している保険料等の額は5,000万円以上であることが要件である。3,000万円ではない。24か月分以上の滞納等も要件となる。","page":18,"detail":"×。法100条の5第1項等によれば、厚生労働大臣が財務大臣に滞納処分等の権限を委任できるのは、❶24か月分以上の保険料を滞納していること、❷財産隠ぺいのおそれ、❸滞納している保険料等の額が「5,000万円以上」であること、❹納付について誠実な意思を有すると認められないこと、の「いずれにも該当する場合」です。本肢の「3,000万円以上」は誤りで、正しくは5,000万円以上です。根拠条文は法100条の5第1項、令4条の2の16等。"},{"law":"総則","cat":"用語の定義","q":"「配偶者」、「夫」及び「妻」には、婚姻の届出をしている者に限られ、事実上婚姻関係と同様の事情にある者は含まれない。","a":false,"exp":"×。法3条2項により、「配偶者」、「夫」及び「妻」には、婚姻の届出をしていないが事実上婚姻関係と同様の事情にある者を含む。内縁関係にある者も含まれる。","page":21,"detail":"×。法3条2項は「『配偶者』、『夫』及び『妻』には、婚姻の届出をしていないが、事実上婚姻関係と同様の事情にある者を含みます」と定めています。すなわち届出をしている法律上の配偶者に限らず、いわゆる事実婚関係にある者も含まれます。よって事実婚を含まないとする本肢は誤りです。根拠条文は法3条2項。"},{"law":"総則","cat":"財政均衡期間","q":"財政均衡期間は、財政の現況及び見通しが作成される年以降おおむね60年間とされている。","a":false,"exp":"×。法2条の4により、財政均衡期間はおおむね100年間である。60年間ではない。有限均衡方式を採用している。","page":22,"detail":"×。法2条の4❷は「財政均衡期間は、財政の現況及び見通しが作成される年以降おおむね100年間とされています」と定めています。年金財政はおおむね100年間の財政均衡期間において給付と負担の均衡を図る有限均衡方式を採用しています。本肢の「おおむね60年間」は誤りで、正しくはおおむね100年間です。根拠条文は法2条の4。"},{"law":"総則","cat":"財政の現況及び見通し","q":"政府は、少なくとも5年ごとに、財政の現況及び見通しを作成しなければならない。","a":true,"exp":"〇。法2条の4のとおり。財政検証を行うこととしたものである。作成したときは遅滞なく公表しなければならない。","page":22,"detail":"○。法2条の4❶は「政府は、少なくとも5年ごとに、…厚生年金保険事業の財政に係る収支についてその現況及び財政均衡期間における見通し(財政の現況及び見通し)を作成しなければなりません」と定めており、これに基づき財政検証が行われます。少なくとも5年ごととする本肢は正しいです。根拠条文は法2条の4。"},{"law":"総則","cat":"保険料水準固定","q":"平成16年の改正では、所得代替率について、40%を上回る水準を確保することとした。","a":false,"exp":"×。平16法附則2条により、所得代替率は50%を上回る水準を確保することとされた。40%ではない。最終的な保険料水準を18.3%に固定し、マクロ経済スライドを導入した。","page":23,"detail":"×。平16法附則2条によれば、平成16年改正では、新しく年金を受給し始める時点での標準的な年金額の現役男子の平均標準報酬額(公租公課控除後)に対する比率である所得代替率について「50%を上回る水準を確保することとし」、50%を下回ることが見込まれる場合には調整の終了等の措置を講じるとされました。本肢の「40%」は誤りで、正しくは50%です。根拠条文は平16法附則2条。"},{"law":"総則","cat":"調整期間","q":"調整期間の開始年度は、平成17年度とされている。","a":true,"exp":"〇。令2条のとおり。調整期間においてはいわゆるマクロ経済スライドが行われる。","page":23,"detail":"○。法32条、34条、令2条によれば、保険給付の額を調整する期間である「調整期間の開始年度は、平成17年度とされています」。調整期間が設けられた場合、いわゆるマクロ経済スライドが行われます。本肢は正しいです。根拠条文は法32条、34条、令2条。"},{"law":"適用事業所・被保険者","cat":"強制適用事業所","q":"適用業種に該当する個人経営の事業所であって、常時5人以上の従業員を使用するものは、強制適用事業所となる。","a":true,"exp":"〇。法6条1項のとおり。個人で適用業種かつ常時5人以上を使用する場合は強制適用である。5人未満であれば任意適用となる。","page":26,"detail":"○。法6条1項❶は、適用業種に該当する事業所又は事務所であって「常時5人以上の従業員を使用するもの」を強制適用事業所としています。テキストの表でも、個人経営の事業所は適用業種かつ5人以上であれば強制適用となります。よって本肢は正しいです。根拠条文は法6条1項。"},{"law":"適用事業所・被保険者","cat":"強制適用事業所","q":"法人の事業所は、適用業種であるか否かを問わず、常時従業員を使用するものであれば強制適用事業所となる。","a":true,"exp":"〇。法6条1項のとおり。法人の事業所は業種を問わず、常時従業員を使用すれば強制適用となる。","page":26,"detail":"○。法6条1項❷は、❶のもののほか「国、地方公共団体又は法人の事業所又は事務所であって、常時従業員を使用するもの」を強制適用事業所としています。法人については業種を問わず、また5人未満でも常時従業員を使用していれば強制適用となります。テキストの表でも法人は適用業種か否かを問わず強制適用です。よって本肢は正しいです。根拠条文は法6条1項。"},{"law":"適用事業所・被保険者","cat":"適用業種","q":"旅館、飲食店、クリーニング、理容などのサービス業は、適用業種に含まれる。","a":false,"exp":"×。法6条1項により、サービス業は適用業種以外の事業である。農林水産業などの第1次産業、宗教業も適用業種以外である。","page":27,"detail":"×。法6条1項の「適用業種以外の事業」に「旅館、飲食店、クリーニング、理容、接客などのサービス業」が挙げられており、これらは適用業種に含まれません。適用業種は物の製造・販売、運送、金融、教育、医療等の事業に限られます。よってサービス業を適用業種に含めるとする本肢は誤りです。根拠条文は法6条1項。"},{"law":"適用事業所・被保険者","cat":"任意適用事業所","q":"任意適用事業所の認可を受けようとするときは、当該事業所に使用される者の4分の3以上の同意を得て、厚生労働大臣に申請しなければならない。","a":false,"exp":"×。法6条4項により、任意適用の認可は2分の1以上の同意で足りる。4分の3以上ではない。任意適用の取消しが4分の3以上の同意を要する。","page":28,"detail":"×。法6条4項によれば、任意適用の認可を受けようとするときは、事業主は当該事業所に使用される者(適用除外事由該当者及び特定4分の3未満短時間労働者を除く)の「2分の1以上の同意」を得て厚生労働大臣に申請しなければなりません。本肢の「4分の3以上」は誤りで、正しくは2分の1以上です。根拠条文は法6条3項・4項。"},{"law":"適用事業所・被保険者","cat":"任意適用の取消し","q":"任意適用事業所の適用取消しの認可を受けようとするときは、当該事業所に使用される者の2分の1以上の同意を得て申請しなければならない。","a":false,"exp":"×。法8条により、任意適用の取消しは4分の3以上の同意が必要である。2分の1以上ではない。なお任意適用の認可は2分の1以上で足りる。","page":28,"detail":"×。法8条によれば、任意適用事業所の適用取消しの認可を受けようとするときは、当該事業所に使用される者(適用除外事由該当者及び特定4分の3未満短時間労働者を除く)の「4分の3以上の同意」を得て厚生労働大臣に申請しなければなりません。本肢の「2分の1以上」は誤りで、正しくは4分の3以上です(任意適用の申請の2分の1以上と混同しないこと)。根拠条文は法8条。"},{"law":"適用事業所・被保険者","cat":"擬制適用","q":"強制適用事業所が従業員数の減少などにより強制適用事業所に該当しなくなったときは、任意適用事業所に係る厚生労働大臣の認可があったものとみなされる。","a":true,"exp":"〇。法7条のとおり。これを擬制適用という。特に手続は必要ない。なお船舶は除かれる。","page":28,"detail":"○。法7条は、強制適用事業所(船舶を除く)が業種の変更又は従業員数の減少などにより強制適用事業所に該当しなくなったときは、その事業所について「任意適用事業所に係る厚生労働大臣の認可があったものとみなされます」と定めています(擬制適用)。この場合、特に手続は必要ありません。よって本肢は正しいです。根拠条文は法7条。"},{"law":"適用事業所・被保険者","cat":"船舶の一括","q":"2以上の船舶の船舶所有者が同一である場合には、厚生労働大臣の承認を受けて、一の適用事業所とすることができる。","a":false,"exp":"×。法8条の3により、2以上の船舶が同一所有者である場合は法律上当然に一の適用事業所とされ、承認を受ける必要はない。","page":29,"detail":"×。法8条の3によれば、2以上の船舶の船舶所有者が同一である場合には、当該2以上の船舶は「法律上当然に」一の適用事業所とされ、承認を受ける必要はありません。厚生労働大臣の承認を要するのは法8条の2の(船舶を除く)2以上の適用事業所の一括であり、船舶とは取扱いが異なります。よって承認を受けてとする本肢は誤りです。根拠条文は法8条の3。"},{"law":"適用事業所・被保険者","cat":"当然被保険者","q":"適用事業所に使用される70歳未満の者は、厚生年金保険の当然被保険者となる。","a":true,"exp":"〇。法9条のとおり。ただし適用除外事由に該当する者は被保険者とならない。","page":31,"detail":"○。法9条は「適用事業所に使用される70歳未満の者は、厚生年金保険の被保険者とします」と定めており、この被保険者を当然被保険者といいます。所定の要件に該当すれば法律上当然に適用を受けます(適用除外事由に該当する者を除く)。よって本肢は正しいです。根拠条文は法9条、則3条1項。"},{"law":"適用事業所・被保険者","cat":"任意単独被保険者","q":"任意単独被保険者の資格取得の認可を受けるには、その事業所の事業主の同意を得なければならないが、資格喪失の際には事業主の同意は必要ない。","a":true,"exp":"〇。法10条、11条のとおり。資格取得には事業主の同意が必要だが、資格喪失には事業主の同意は不要である。","page":32,"detail":"○。法10条・11条によれば、任意単独被保険者の資格取得の認可を受けるには「その事業所の事業主の同意を得なければなりません」が、資格喪失の際は「事業主の同意は必要ありません」。事業主には保険料の半額負担義務等が課せられるため資格取得時には同意を要する一方、喪失時にはこれを要しません。よって本肢は正しいです。根拠条文は法10条、法11条。"},{"law":"適用事業所・被保険者","cat":"高齢任意加入被保険者","q":"高齢任意加入被保険者となるためには、事業所に使用される65歳以上の者であることが要件となる。","a":false,"exp":"×。法附則4条の3により、高齢任意加入被保険者は70歳以上の者が対象である。65歳以上ではない。老齢給付の受給権を有しないこと等が要件となる。","page":33,"detail":"×。法附則4条の3第1項によれば、高齢任意加入被保険者となるための要件の一つは「事業所に使用される70歳以上の者であること」です。これは70歳に達しても老齢厚生年金等の受給権を有しない者の受給権確保のための制度です。本肢の「65歳以上」は誤りで、正しくは70歳以上です。根拠条文は法附則4条の3第1項。"},{"law":"適用事業所・被保険者","cat":"適用除外","q":"2か月以内の期間を定めて使用される者であって、当該定めた期間を超えて使用されることが見込まれないものは、適用除外となる。","a":true,"exp":"〇。法12条のとおり。ただし定めた期間を超えて引き続き使用されるに至ったときは、その日から被保険者となる。","page":36,"detail":"○。法12条❶⑵によれば、臨時に使用される者のうち「2か月以内の期間を定めて使用される者であって、当該定めた期間を超えて使用されることが見込まれないもの」は適用除外とされ、被保険者となりません。ただし定めた期間を超えて引き続き使用されるに至ったときは、その日から被保険者となります。よって本肢は正しいです。根拠条文は法12条。"},{"law":"適用事業所・被保険者","cat":"適用除外","q":"季節的業務に使用される者は、当初から継続して6か月を超える予定で使用される場合であっても、被保険者とならない。","a":false,"exp":"×。法12条により、季節的業務は当初から継続して4か月を超える予定で使用される者は当初から被保険者となる。6か月は臨時的事業の事業所の例外の基準である。","page":36,"detail":"この肢は誤りです。テキストの適用除外では、❸季節的業務に使用される者(船員を除く)は被保険者としませんが、例外として「当初から継続して4か月を超える予定で使用される者は、当初から被保険者となります」とされています。6か月の基準は❹臨時的事業の事業所に使用される者についてのもので、季節的業務とは別です。したがって6か月を超える予定であれば4か月超の予定にも該当するため、当初から被保険者となります。根拠条文は法12条です。"},{"law":"適用事業所・被保険者","cat":"短時間労働者の適用除外","q":"短時間労働者であって、1週間の所定労働時間が20時間未満であり、かつ報酬の月額賃金が88,000円未満である等の場合は、被保険者としない。","a":true,"exp":"〇。法12条のとおり。20時間未満、月額88,000円未満、学生等のいずれかに該当する短時間労働者は適用除外となる。","page":37,"detail":"この肢は正しいです。テキストの適用除外❺では、通常の労働者の所定労働時間・日数の4分の3未満である短時間労働者であって、⑴1週間の所定労働時間が20時間未満であること、⑵月額賃金(資格取得時決定の例により算定した額)が88,000円未満であること、⑶高校・大学の学生等であること、のいずれかに該当するものを被保険者としないとしています。本肢はこの要件に沿っており正しいです。根拠条文は法12条です。"},{"law":"適用事業所・被保険者","cat":"資格喪失","q":"当然被保険者は、70歳に達したとき、その翌日に被保険者の資格を喪失する。","a":false,"exp":"×。法14条により、70歳に達したときはその日に資格を喪失する。翌日ではない。死亡や事業所に使用されなくなったときは翌日喪失である。","page":40,"detail":"この肢は誤りです。テキストの当然被保険者の資格喪失の時期では、❺「70歳に達したとき」は〔その日〕に資格を喪失するとされており、その翌日ではありません。なお老齢厚生年金の受給権の有無にかかわらず資格を喪失します。死亡や事業所に使用されなくなったとき等は〔その翌日〕喪失であるのと区別が必要です。根拠条文は法14条です。"},{"law":"適用事業所・被保険者","cat":"資格の得喪の確認","q":"被保険者の資格の取得及び喪失は、厚生労働大臣の確認によって、その効力を生じる。","a":true,"exp":"〇。法18条1項のとおり。ただし認可や申出による場合等は確認を要しない。第2号から第4号厚生年金被保険者には確認の規定は適用されない。","page":42,"detail":"この肢は正しいです。テキストの被保険者資格の取得及び喪失の効力では、「被保険者の資格の取得及び喪失は、厚生労働大臣の確認によって、その効力を生じます」とされています。ただし任意単独被保険者の資格取得や認可による喪失等、認可や申出による場合は確認を要しません。根拠条文は法18条1項です。"},{"law":"適用事業所・被保険者","cat":"被保険者期間の計算","q":"被保険者期間を計算する場合には、被保険者の資格を取得した月からその資格を喪失した月までをこれに算入する。","a":false,"exp":"×。法19条1項により、資格を取得した月から資格を喪失した月の前月までを算入する。喪失した月そのものは含まない。","page":44,"detail":"この肢は誤りです。テキストの被保険者期間の計算【原則】では、「被保険者の資格を取得した月からその資格を喪失した月の前月まで」を被保険者期間に算入するとされており、喪失した月までではありません。被保険者期間は月によるものとして計算します。根拠条文は法19条1項です。"},{"law":"適用事業所・被保険者","cat":"同月得喪","q":"被保険者の資格を取得した月にその資格を喪失し、同月にさらに国民年金の第1号被保険者となった場合であっても、その月は厚生年金保険の被保険者期間に算入される。","a":false,"exp":"×。法19条2項により、同月得喪があった月にさらに国民年金の第1号又は第3号被保険者となった場合は、その月は厚生年金保険の被保険者期間には含めない。","page":44,"detail":"この肢は誤りです。テキストの被保険者期間の計算【同月得喪】では、資格を取得した月にその資格を喪失したときはその月を1か月として算入しますが、「同月得喪があった月に、さらに、国民年金の第1号被保険者又は第3号被保険者となった場合は、その月は、厚生年金保険の被保険者期間には含めません」とされています。よって本肢の場合は算入されません。根拠条文は法19条1項です。"},{"law":"適用事業所・被保険者","cat":"第3種被保険者の特例","q":"昭和61年4月1日から平成3年3月31日までの第3種被保険者であった期間は、実際の期間を3分の4倍した期間で被保険者期間を計算する。","a":false,"exp":"×。昭60法附則47条により、当該期間は実際の期間を5分の6倍した期間で計算する。3分の4倍は昭和61年3月31日以前の期間である。平成3年4月1日以後は実際の期間で計算する。","page":46,"detail":"この肢は誤りです。テキストの第3種被保険者であった期間の計算では、「昭和61年4月1日から平成3年3月31日までの期間」は実際の期間を5分の6倍した期間で計算します。3分の4倍するのは昭和61年3月31日以前の期間であり、平成3年4月1日以後は実際の期間そのままです。本肢は倍率を取り違えており誤りです。根拠条文は昭60法附則47条2項から4項です。"},{"law":"適用事業所・被保険者","cat":"厚生年金保険原簿","q":"第1号厚生年金被保険者であり又はあった者は、厚生年金保険原簿に記録された自己に係る特定厚生年金保険原簿記録が事実でないと思料するときは、厚生労働大臣に対し訂正の請求をすることができる。","a":true,"exp":"〇。法28条の2第1項のとおり。訂正請求は請求書を日本年金機構に提出して行う。","page":50,"detail":"この肢は正しいです。テキストの訂正の請求では、「第1号厚生年金被保険者であり、又はあった者は、厚生年金保険原簿に記録された自己に係る特定厚生年金保険原簿記録が事実でない、又は…記録されていないと思料するときは…厚生労働大臣に対し、厚生年金保険原簿の訂正の請求をすることができます」とされています。本肢はこれに沿っており正しいです。根拠条文は法28条の2第1項です。"},{"law":"標準報酬月額・標準賞与額","cat":"報酬の定義","q":"「報酬」には、臨時に受けるもの及び3か月を超える期間ごとに受けるものも含まれる。","a":false,"exp":"×。法3条1項3号により、臨時に受けるもの及び3か月を超える期間ごとに受けるものは報酬から除かれる。3か月を超える期間ごとに受けるものは賞与となる。","page":54,"detail":"この肢は誤りです。テキストの報酬の定義では、「報酬」とは労働者が労働の対償として受ける全てのものをいいますが、「ただし、臨時に受けるもの及び3か月を超える期間ごとに受けるものは、報酬から除かれます」とされています。本肢はこれらを含むとしている点で誤りです。なお3か月を超える期間ごとに受けるものは賞与に該当します。根拠条文は法3条1項3号です。"},{"law":"標準報酬月額・標準賞与額","cat":"賞与の定義","q":"「賞与」とは、労働者が労働の対償として受ける全てのもののうち、3か月を超える期間ごとに受けるものをいう。","a":true,"exp":"〇。法3条1項4号のとおり。名称を問わず3か月を超える期間ごとに受けるものが賞与となる。","page":54,"detail":"この肢は正しいです。テキストの賞与の定義では、「賞与」とは賃金、給料、俸給、手当、賞与その他いかなる名称であるかを問わず、労働者が労働の対償として受ける全てのもののうち、「3か月を超える期間ごとに受けるもの」をいうとされています。本肢はこの定義に沿っており正しいです。根拠条文は法3条1項4号です。"},{"law":"標準報酬月額・標準賞与額","cat":"標準報酬月額等級","q":"標準報酬月額は、現在32の等級に区分されており、その月額は88,000円を下限とし、650,000円を上限としている。","a":true,"exp":"〇。法20条1項のとおり。第1級88,000円から第32級650,000円まで32等級に区分されている。","page":56,"detail":"この肢は正しいです。テキストの標準報酬月額では、標準報酬月額は被保険者の報酬月額に基づき標準報酬月額等級表の等級区分によって定め、「現在32の等級に区分されており、その月額は88,000円を下限とし、650,000円を上限としています」とされています。第1級が88,000円、第32級が650,000円です。本肢はこれに沿っており正しいです。根拠条文は法20条1項です。"},{"law":"標準報酬月額・標準賞与額","cat":"等級区分の改定","q":"標準報酬月額の等級区分の改定を行う場合、改定に際して社会保障審議会の意見を聴く必要はない。","a":true,"exp":"〇。法20条2項のとおり。全被保険者の標準報酬月額を平均した額の100分の200に相当する額が最高等級を超える等の場合に改定できるが、社会保障審議会の意見を聴く必要はない。","page":57,"detail":"この肢は正しいです。テキストの標準報酬月額の等級区分の改定では、毎年3月31日における全被保険者の標準報酬月額を平均した額の100分の200に相当する額が最高等級の標準報酬月額を超える状態が継続すると認められるとき、その年の9月1日から政令で等級区分の改定を行うことができるとされ、「改定に際して、社会保障審議会の意見を聴く必要はありません」と明記されています。本肢はこれに沿っており正しいです。根拠条文は法20条2項です。"},{"law":"標準報酬月額・標準賞与額","cat":"資格取得時決定の有効期間","q":"6月1日から12月31日までの間に被保険者の資格を取得した場合、資格取得時決定による標準報酬月額は、その資格を取得した月からその年の8月までの各月の標準報酬月額とする。","a":false,"exp":"×。法22条2項により、6月1日から12月31日までに取得した場合は翌年8月までの各月の標準報酬月額とする。その年の8月までではない。1月1日から5月31日までに取得した場合がその年の8月までである。","page":59,"detail":"この肢は誤りです。テキストの有効期間(資格取得時決定)では、「6月1日から12月31日までの間に被保険者の資格を取得した場合」は、その資格を取得した月から「翌年の8月まで」の各月の標準報酬月額とされます。その年の8月までとなるのは1月1日から5月31日までに資格を取得した場合です。本肢は適用期間を取り違えており誤りです。根拠条文は法22条2項です。"},{"law":"標準報酬月額・標準賞与額","cat":"定時決定","q":"定時決定は、被保険者が毎年7月1日現に使用される事業所において、同日前3か月間に受けた報酬の総額を基礎として行われる。","a":true,"exp":"〇。法21条1項のとおり。3か月間とは4月、5月、6月のことである。報酬支払基礎日数17日未満の月は除く。","page":60,"detail":"この肢は正しいです。テキストの定時決定では、「被保険者が毎年7月1日現に使用される事業所において、同日前3か月間…に受けた報酬の総額をその期間の月数で除して得た額を報酬月額として、標準報酬月額を決定」するとされ、「3か月間とは、4月、5月、6月のことです」と説明されています。本肢はこれに沿っており正しいです。根拠条文は法21条1項です。"},{"law":"標準報酬月額・標準賞与額","cat":"定時決定の有効期間","q":"定時決定により決定された標準報酬月額は、その年の8月から翌年7月までの各月の標準報酬月額とする。","a":false,"exp":"×。法21条2項により、定時決定による標準報酬月額の有効期間はその年の9月から翌年8月までである。8月から翌年7月までではない。","page":60,"detail":"この肢は誤りです。テキストの有効期間(定時決定)では、「定時決定により決定された標準報酬月額は、その年の9月から翌年8月までの各月の標準報酬月額とします」とされています。本肢は「8月から翌年7月まで」としており、適用開始・終了月が1か月ずれている点で誤りです。根拠条文は法21条2項です。"},{"law":"標準報酬月額・標準賞与額","cat":"随時改定","q":"随時改定は、継続した3か月間に受けた報酬の総額を3で除して得た額が、その者の標準報酬月額の基礎となった報酬月額に比べて著しく高低を生じた場合に行われる。","a":true,"exp":"〇。法23条1項のとおり。原則として標準報酬月額等級で2等級以上の差が生じたことが要件である。各月とも報酬支払基礎日数17日以上が必要である。","page":61,"detail":"この肢は正しいです。テキストの随時改定では、「継続した3か月間…に受けた報酬の総額を3で除して得た額が、その者の標準報酬月額の基礎となった報酬月額に比べて、著しく高低を生じた場合」に、必要があると認めるときその月の翌月から改定できるとされています。各月とも報酬支払基礎日数17日(短時間労働者は11日)以上が必要で、原則として標準報酬月額等級で2等級以上の差が要件です。本肢はこれに沿っており正しいです。根拠条文は法23条1項です。"},{"law":"標準報酬月額・標準賞与額","cat":"育児休業等を終了した際の改定","q":"育児休業等を終了した際の改定は、標準報酬月額が2等級以上変動していなければ行われない。","a":false,"exp":"×。法23条の2により、育児休業等を終了した際の改定は、標準報酬月額が2等級以上変動していなくとも行われる。随時改定の要件を満たさなくとも改定される。","page":62,"detail":"この肢は誤りです。テキストの育児休業等を終了した際の改定では、注意書きとして「標準報酬月額が2等級以上変動していなくとも改定が行われます」と明記されており、随時改定の要件を満たさなくとも改定するための規定です。よって2等級以上の変動がなければ行われないとする本肢は誤りです。根拠条文は法23条の2第1項です。"},{"law":"標準報酬月額・標準賞与額","cat":"育児休業等を終了した際の改定","q":"育児休業等を終了した際の改定の申出があった場合、育児休業等終了日の翌日から起算して3か月を経過した日の属する月の翌月から標準報酬月額が改定される。","a":false,"exp":"×。法23条の2第2項により、育児休業等終了日の翌日から起算して2か月を経過した日の属する月の翌月から改定される。3か月ではない。","page":62,"detail":"この肢は誤りです。テキストの育児休業等を終了した際の改定の時期では、「申出があった場合、育児休業等終了日の翌日から起算して2か月を経過した日の属する月の翌月から標準報酬月額が改定されます」とされています。本肢は3か月としており誤りです。根拠条文は法23条の2第2項です。"},{"law":"標準報酬月額・標準賞与額","cat":"標準賞与額の決定","q":"標準賞与額は、その月に受けた賞与額に1,000円未満の端数を生じたときはこれを切り捨て、当該標準賞与額が150万円を超えるときは150万円とする。","a":true,"exp":"〇。法24条の4第1項のとおり。標準賞与額の上限は1か月150万円である。健康保険の1年度573万円とは異なる。","page":66,"detail":"この肢は正しいです。テキストの標準賞与額の決定では、「その月に当該被保険者が受けた賞与額に基づき、これに1,000円未満の端数を生じたときはこれを切り捨て」て標準賞与額を決定し、「当該標準賞与額が150万円…を超えるときは、これを150万円とします」とされています。150万円は1か月(1月)あたりの上限です。本肢はこれに沿っており正しいです。根拠条文は法24条の4第1項です。"},{"law":"標準報酬月額・標準賞与額","cat":"養育期間標準報酬月額特例","q":"3歳に満たない子を養育する被保険者の標準報酬月額の特例の対象となるのは、子の母及び子の父のいずれも対象になる。","a":true,"exp":"〇。法26条1項のとおり。標準報酬月額が従前標準報酬月額を下回る月について、従前標準報酬月額を年金額計算の基礎とする。","page":68,"detail":"この肢は正しいです。テキストの養育期間標準報酬月額特例の対象では、❶3歳に満たない子を養育する被保険者又は被保険者であった者、❷3歳に満たない子を養育していた被保険者又は被保険者であった者が対象とされ、「子の母及び子の父いずれも対象になります」と明記されています。本肢はこれに沿っており正しいです。根拠条文は法26条1項です。"},{"law":"保険給付の通則","cat":"裁定","q":"保険給付を受ける権利は、受給権者の請求に基づいて、実施機関が裁定する。","a":true,"exp":"〇。法33条のとおり。受給権者の請求に基づき実施機関が裁定する。","page":75,"detail":"設問のとおりであり○。本文「2 裁定」によれば「保険給付を受ける権利は、その権利を有する者(『受給権者』といいます)の請求に基づいて、実施機関が裁定します」とされている。すなわち保険給付の権利は法律上当然に確定するのではなく、受給権者の請求を前提として実施機関の裁定によって具体的に確定する。根拠は法33条である。"},{"law":"保険給付の通則","cat":"年金の支給期間","q":"年金の支給は、年金を支給すべき事由が生じた月から始め、権利が消滅した月の前月で終わるものとする。","a":false,"exp":"×。法36条1項により、年金の支給は支給事由が生じた月の翌月から始め、権利が消滅した月で終わる。","page":77,"detail":"本文「支給期間」によれば「年金の支給は、年金を支給すべき事由が生じた月の翌月から始め、権利が消滅した月で終わるものとします」とされている。設問は「事由が生じた月から始め」「消滅した月の前月で終わる」としている点で誤りであり×。正しくは事由が生じた月の『翌月』から始め、権利が消滅した『月』で終わる。根拠は法36条1項である。"},{"law":"保険給付の通則","cat":"支払期月","q":"年金は、毎年1月、3月、5月、7月、9月及び11月の6期に、それぞれの前月分までを支払う。","a":false,"exp":"×。法36条3項により、年金の支払期月は2月、4月、6月、8月、10月及び12月の6期である。奇数月ではない。","page":77,"detail":"本文「支払期月」によれば「年金は、毎年2月、4月、6月、8月、10月及び12月の6期に、それぞれの前月分までを支払います」とされている。設問は「1月、3月、5月、7月、9月及び11月」としている点で誤りであり×。正しい支払期月は偶数月(2・4・6・8・10・12月)である。根拠は法36条3項である。"},{"law":"保険給付の通則","cat":"併給調整","q":"老齢厚生年金の受給権者が65歳に達している場合、老齢厚生年金と遺族厚生年金を併給することができる。","a":true,"exp":"〇。法38条1項のとおり。65歳以上の場合、老齢厚生年金と遺族厚生年金の併給が認められる。一方、障害厚生年金と老齢厚生年金は併給できない。","page":83,"detail":"設問のとおりであり○。本文「併給の調整」によれば、原則は1人1年金であるが、遺族厚生年金の受給権者が他の年金たる保険給付を受けられる場合でも「老齢厚生年金〔その受給権者が65歳に達しているものに限ります〕を除きます」とされ、併給調整の対象外となる。本文の表でも老齢厚生年金と遺族厚生年金は「65歳以上○」とされ、65歳以上であれば両者を併給できる。根拠は法38条1項である。"},{"law":"保険給付の通則","cat":"公課の禁止","q":"障害厚生年金は、課税することが禁止されていない。","a":false,"exp":"×。法41条2項により、租税公課は原則として保険給付として支給を受けた金銭を標準として課することができない。課税が禁止されていないのは老齢厚生年金、特例老齢年金、脱退手当金、脱退一時金である。障害厚生年金は課税が禁止される。","page":87,"detail":"本文「公課の禁止」によれば「租税その他の公課は、保険給付として支給を受けた金銭を標準として、課することができません」とされ、原則として保険給付には課税できない。ただし例外として「老齢厚生年金、特例老齢年金、脱退手当金、脱退一時金は、課税することが禁止されていません」とされている。障害厚生年金は原則どおり課税が禁止されるため、「課税が禁止されていない」とする設問は誤りであり×。根拠は法41条2項ほかである。"},{"law":"保険給付の通則","cat":"再評価率の改定","q":"再評価率は、原則として、毎年度、名目手取り賃金変動率を基準として改定する。","a":true,"exp":"〇。法43条の2のとおり。新規裁定者は名目手取り賃金変動率、既裁定者(基準年度以後)は物価変動率を基準とする。調整期間中はマクロ経済スライドにより改定する。","page":88,"detail":"設問のとおりであり○。本文「再評価率の改定」の原則によれば、再評価率は「毎年度、物価変動率に実質賃金変動率及び可処分所得割合変化率を乗じて得た率(『名目手取り賃金変動率』といいます)を基準として改定」する(新規裁定者)。基準年度以後再評価率(既裁定者)については物価変動率を基準とする。根拠は法43条の2~43条の5である。"},{"law":"老齢厚生年金","cat":"支給要件","q":"老齢厚生年金は、被保険者期間を有する者が、65歳以上であり、保険料納付済期間と保険料免除期間とを合算した期間が10年以上であるときに支給される。","a":true,"exp":"〇。法42条のとおり。受給資格期間は10年である。厚生年金保険の被保険者期間が1か月でもあれば支給される。","page":96,"detail":"設問のとおりであり○。本文「支給要件:老齢厚生年金」によれば、老齢厚生年金は被保険者期間を有する者が「❶65歳以上であること」「❷保険料納付済期間と保険料免除期間とを合算した期間が10年以上であること(受給資格期間を満たしていること)」のいずれにも該当するに至ったときに支給される。根拠は法42条である。"},{"law":"老齢厚生年金","cat":"年金額","q":"老齢厚生年金の額は、被保険者であった全期間の平均標準報酬額の1000分の7.125に相当する額に被保険者期間の月数を乗じて得た額である。","a":false,"exp":"×。法43条1項により、老齢厚生年金の給付乗率は1000分の5.481である。1000分の7.125は総報酬制導入前(平均標準報酬月額)の乗率である。","page":98,"detail":"本文「年金額:老齢厚生年金」によれば、老齢厚生年金の額は「被保険者であった全期間の平均標準報酬額の1000分の5.481に相当する額に被保険者期間の月数を乗じて得た額」である。設問の「1000分の7.125」は誤りであり×。7.125は給付乗率表における総報酬制導入前(平均標準報酬月額に乗じる率)の昭和21年4月2日以後生まれの値であり、平均標準報酬額に乗じる原則乗率は5.481である。根拠は法43条1項である。"},{"law":"老齢厚生年金","cat":"在職定時改定","q":"在職定時改定は、受給権者が毎年7月1日において被保険者である場合に、基準日の属する月の翌月から年金額を改定するものである。","a":false,"exp":"×。法43条2項により、在職定時改定の基準日は9月1日である。7月1日ではない。なお在職定時改定は特別支給の老齢厚生年金については行われない。","page":100,"detail":"本文「在職定時改定」によれば、在職定時改定は「受給権者が毎年9月1日(『基準日』といいます)において被保険者である場合」に「基準日の属する月の翌月から、年金の額を改定」するものである。設問は基準日を「7月1日」としている点で誤りであり×。正しくは基準日は9月1日である。根拠は法43条2項である。"},{"law":"老齢厚生年金","cat":"退職時改定","q":"在職定時改定は、特別支給の老齢厚生年金についても行われる。","a":false,"exp":"×。法附則9条により、在職定時改定は特別支給の老齢厚生年金については行われない。退職時改定は特別支給の老齢厚生年金についても行われる。","page":100,"detail":"本文「在職定時改定」の注意書きによれば「在職定時改定は、特別支給の老齢厚生年金については行われません」とされている。したがって設問は誤りであり×。なお退職時改定については本文で「特別支給の老齢厚生年金についても行われます」とされており、両者の取扱いの違いに注意が必要である。根拠は法43条2項・附則9条である。"},{"law":"老齢厚生年金","cat":"経過措置の計算式","q":"平成15年4月1日前の被保険者期間については、平均標準報酬月額に1000分の7.125を乗じて計算する。","a":true,"exp":"〇。平12法附則20条1項のとおり。総報酬制導入前は平均標準報酬月額に1000分の7.125、導入後は平均標準報酬額に1000分の5.481を乗じる。","page":102,"detail":"設問のとおりであり○。本文「経過措置:老齢厚生年金の額【計算式A】」によれば、被保険者期間の全部又は一部が平成15年4月1日前(総報酬制導入前)であるときは、平成15年3月以前の期間は「平均標準報酬月額×7.125/1000×被保険者期間の月数」で計算する。総報酬制導入後(平成15年4月以後)は「平均標準報酬額×5.481/1000」で計算する。根拠は平12法附則20条1項である。"},{"law":"老齢厚生年金","cat":"従前額保障","q":"従前額保障に係る給付乗率は、総報酬制導入前が1000分の7.5、総報酬制導入後が1000分の5.769となる。","a":true,"exp":"〇。平12法附則21条のとおり。平成12年改正で給付乗率が一律5%引き下げられたため、改正前の計算式による額を保障する経過措置である。","page":104,"detail":"設問のとおりであり○。本文「経過措置:老齢厚生年金の額【計算式B】」(従前額保障)によれば、従前額保障に係る給付乗率は平成15年3月以前(総報酬制導入前)が平均標準報酬月額に乗じる「7.5/1000」、平成15年4月以後(導入後)が平均標準報酬額に乗じる「5.769/1000」である。これらに従前額改定率を乗じて年金額を計算する。根拠は平12法附則21条である。"},{"law":"老齢厚生年金","cat":"経過的加算","q":"経過的加算額の計算において、被保険者期間の月数の上限は、昭和21年4月2日以後生まれの者については480月とされている。","a":true,"exp":"〇。昭60法附則59条のとおり。生年月日に応じて上限が異なり、昭和21年4月2日以後生まれは480月である。","page":106,"detail":"設問のとおりであり○。本文「経過的加算」の被保険者期間の月数の上限の表によれば、生年月日に応じて上限が定められており「昭和21年4月2日以後生まれ」の者については上限が「480月」とされている。なお昭和4年4月1日以前生まれは420月など、生年月日が古いほど上限月数は少ない。根拠は昭60法附則59条2項ほかである。"},{"law":"老齢厚生年金","cat":"経過的加算","q":"特別支給の老齢厚生年金が支給されない者には、経過的加算額は加算されない。","a":false,"exp":"×。昭60法附則59条により、特別支給の老齢厚生年金が支給されない者にも経過的加算額は加算される。","page":106,"detail":"本文「経過的加算」の注意書きによれば「特別支給の老齢厚生年金が支給されない者にも、経過的加算額は加算されます」とされている。したがって設問は誤りであり×。経過的加算額は特別支給の老齢厚生年金の有無にかかわらず加算される。根拠は昭60法附則59条2項である。"},{"law":"老齢厚生年金","cat":"加給年金額","q":"老齢厚生年金の加給年金額は、老齢厚生年金の額の計算の基礎となる被保険者期間の月数が240未満の場合は加算されない。","a":true,"exp":"〇。法44条1項のとおり。被保険者期間の月数が240以上であることが加給年金額加算の要件である。中高齢の期間短縮措置に該当する場合は240月とみなされる。","page":107,"detail":"設問のとおりであり○。本文「加給年金額:老齢厚生年金」によれば「老齢厚生年金の額の計算の基礎となる被保険者期間の月数が240未満の場合、加給年金額は加算されません」とされている。なお中高齢の期間短縮措置に該当する場合は240月とみなされるため加算される。根拠は法44条1項である。"},{"law":"老齢厚生年金","cat":"加給年金額の対象","q":"老齢厚生年金の加給年金額の対象となる配偶者は、受給権者がその権利を取得した当時その者によって生計を維持していた70歳未満の配偶者である。","a":false,"exp":"×。法44条1項により、加給年金額の対象となる配偶者は65歳未満の配偶者である。70歳未満ではない。","page":107,"detail":"本文「加給年金額:老齢厚生年金」によれば、加給年金額の対象となる配偶者は受給権取得当時に生計を維持していた「65歳未満の配偶者」である。設問は「70歳未満」としている点で誤りであり×。正しくは65歳未満である。根拠は法44条1項である。"},{"law":"老齢厚生年金","cat":"生計維持","q":"加給年金額の対象となる生計を維持していた者とは、厚生労働大臣の定める年額650万円以上の収入を将来にわたって有すると認められる者以外のものである。","a":false,"exp":"×。法44条5項、令3条の5により、生計維持の収入基準は年額850万円である。650万円ではない。所得ベースであれば655万5,000円以上となる。","page":107,"detail":"本文「生計維持」によれば、生計を維持していた者とは「厚生労働大臣の定める金額(年額850万円)以上の収入を将来にわたって有すると認められる者以外のもの」等である。設問は「650万円」としている点で誤りであり×。正しくは年額850万円であり、所得ベースであれば655万5,000円以上となる。根拠は法44条5項、令3条の5第1項である。"},{"law":"老齢厚生年金","cat":"加給年金額の額","q":"加給年金額の対象となる子3人目以降については、1人につき224,700円に改定率を乗じて得た額が加算される。","a":false,"exp":"×。法44条2項により、子3人目以降は1人につき74,900円×改定率である。224,700円×改定率は配偶者及び子2人目までの法定額である。","page":109,"detail":"本文「加給年金額の額」の表によれば、配偶者及び子2人目までは1人につき「224,700円×改定率」、子3人目以降は1人につき「74,900円×改定率」とされている。設問は子3人目以降を「224,700円×改定率」としている点で誤りであり×。224,700円が適用されるのは配偶者及び子2人目までであり、子3人目以降は74,900円である。根拠は法44条2項である。"},{"law":"老齢厚生年金","cat":"特別加算","q":"配偶者の加給年金額に対する特別加算は、配偶者の生年月日に応じて加算額が決まる。","a":false,"exp":"×。昭60法附則60条により、特別加算額は配偶者ではなく受給権者の生年月日に応じて決まる。昭和18年4月2日以後生まれの受給権者は165,800円×改定率が加算される。","page":110,"detail":"本文「特別加算」の加算額および注意書きによれば、配偶者の加給年金額に対する特別加算は「その受給権者の生年月日に応じて」行われ、「配偶者の生年月日ではなく、受給権者の生年月日に応じて加算額が決まっています」とされている。設問は「配偶者の生年月日に応じて」としている点で誤りであり×。根拠は昭60法附則60条2項である。"},{"law":"老齢厚生年金","cat":"加給年金額の減額改定","q":"加給年金額が加算された老齢厚生年金については、配偶者が65歳に達したときは、その該当するに至った月の翌月から加給年金額を加算しないものとして年金額を改定する。","a":true,"exp":"〇。法44条4項のとおり。配偶者が65歳に達したときは加給年金額が加算されなくなる。死亡や離婚等も減額事由となる。","page":110,"detail":"設問のとおりであり○。本文「加給年金額の改定:老齢厚生年金」の減額によれば、加給年金額が加算された老齢厚生年金については、配偶者又は子が一定事由に該当するに至ったときはその加給年金額を加算しないものとし「その該当するに至った月の翌月から、年金の額を改定します」とされ、その事由の一つに「❹配偶者が、65歳に達したとき」が挙げられている。根拠は法44条4項である。"},{"law":"老齢厚生年金","cat":"加給年金額の支給停止","q":"加給年金額の対象となる配偶者が、年金額の計算の基礎となる被保険者期間の月数が240以上である老齢厚生年金の支給を受けることができるときは、その間、当該配偶者に係る加給年金額の支給を停止する。","a":true,"exp":"〇。法46条6項のとおり。配偶者が240月以上の老齢厚生年金や障害給付を受けられるときは加給年金額が支給停止される。","page":111,"detail":"設問は正しい。本文「加給年金額の支給停止:老齢厚生年金」では、加給年金額の対象となる配偶者が「老齢厚生年金(年金額の計算の基礎となる被保険者期間の月数が240以上〔中高齢の期間短縮措置に該当するときはその期間以上〕であるものに限ります)」の支給を受けることができるときは、「その間、当該配偶者に係る加給年金額の支給を停止します」と規定されている。配偶者自身が240月以上の老齢厚生年金を受けられる場合は重複給付を避けるため停止される。なお老齢を支給事由とする給付は、その全額が支給停止されているときであっても加給年金額は停止される点に注意。根拠条文は法44条1項、46条6項、令3条の7。"},{"law":"老齢厚生年金","cat":"支給の繰下げ","q":"老齢厚生年金の支給繰下げの申出は、その受給権を取得した日から起算して1年を経過した日前に当該老齢厚生年金を請求していなかった者ができる。","a":true,"exp":"〇。法44条の3第1項のとおり。受給権取得から1年を経過した日前に請求していなかった者が繰下げの申出をできる。","page":112,"detail":"設問は正しい。本文「支給の繰下げの対象」では、「老齢厚生年金の受給権を有する者であってその受給権を取得した日から起算して1年を経過した日(『1年を経過した日』といいます)前に当該老齢厚生年金を請求していなかったものは、実施機関に当該老齢厚生年金の支給繰下げの申出をすることができます」と規定されている。設問はこの規定どおりであり正しい。ただし受給権取得時や取得から1年を経過した日までの間に他の年金たる給付の受給権者となったとき等は申出ができない。根拠条文は法44条の3第1項。"},{"law":"老齢厚生年金","cat":"支給の繰下げ","q":"老齢厚生年金の支給の繰下げの申出は、老齢基礎年金の繰下げと同時に行わなければならない。","a":false,"exp":"×。法附則12条等により、老齢厚生年金の繰下げの申出は単独で行うことができる。老齢基礎年金を受給しながら老齢厚生年金の繰下げを行うことも可能である。","page":114,"detail":"設問は誤り。本文「支給繰下げの留意点」では「支給の繰下げの申出は、老齢厚生年金単独で行うことができます。つまり、老齢基礎年金を受給しながら、支給の繰下げを行うことができるということです」と規定されている。したがって老齢厚生年金の繰下げは老齢基礎年金の繰下げと同時に行う必要はなく、単独で行える。設問は「同時に行わなければならない」としている点が誤り。根拠条文は法44条の3、法附則12条ほか。"},{"law":"老齢厚生年金","cat":"繰下げ加算額","q":"繰下げ支給の老齢厚生年金の増額率は、1000分の4に受給権取得月から申出をした日の属する月の前月までの月数を乗じて得た率である。","a":false,"exp":"×。令3条の5の2により、繰下げの増額率は1000分の7に月数を乗じて得た率である。1000分の4は繰上げの減額率である。当該月数は120を限度とする。","page":115,"detail":"設問は誤り。本文「繰下げ加算額」では、増額率は「1000分の7に受給権取得月から支給繰下げの申出をした日の属する月の前月までの月数〔当該月数が120を超えるときは、120〕を乗じて得た率」と規定されている。設問は「1000分の4」としている点が誤りで、正しくは「1000分の7」である。1000分の4は繰上げ支給における減額率であり混同に注意。なお乗じる月数は120を限度とする。根拠条文は令3条の5の2第1項。"},{"law":"老齢厚生年金","cat":"特別支給の繰下げ","q":"特別支給の老齢厚生年金には、支給の繰下げの制度がある。","a":false,"exp":"×。法附則12条により、特別支給の老齢厚生年金には支給の繰下げの制度はない。ただし特別支給の老齢厚生年金の受給権を有していた者でも65歳からの老齢厚生年金の繰下げを申し出ることはできる。","page":114,"detail":"設問は誤り。本文「支給繰下げの留意点」では「特別支給の老齢厚生年金には、支給の繰下げの制度はありません」と明記されている。したがって特別支給の老齢厚生年金に繰下げの制度があるとする設問は誤り。ただし「特別支給の老齢厚生年金の受給権を有していた者であっても、(本来の老齢厚生年金の)支給の繰下げを申し出ることができます」とされる点には注意が必要である。根拠条文は法附則12条ほか。"},{"law":"在職老齢年金","cat":"支給停止","q":"在職老齢年金は、総報酬月額相当額と基本月額との合計額が支給停止調整額を超えるときに、その超える部分の2分の1に相当する額に12を乗じて得た額の支給が停止される。","a":true,"exp":"〇。法46条1項のとおり。超過額の2分の1相当が支給停止基準額となる。","page":118,"detail":"設問は正しい。本文「在職老齢年金による支給停止」では、総報酬月額相当額と基本月額との合計額が支給停止調整額を超えるとき、「総報酬月額相当額と基本月額との合計額から支給停止調整額を控除して得た額の2分の1に相当する額に12を乗じて得た額(『支給停止基準額』といいます)に相当する部分の支給を停止します」と規定されている。設問はこの計算式どおりであり正しい。なお支給停止基準額が老齢厚生年金の額以上であるときは全部の支給を停止する。根拠条文は法46条1項。"},{"law":"在職老齢年金","cat":"基本月額","q":"基本月額とは、加給年金額及び経過的加算額を含めた老齢厚生年金の額を12で除して得た額である。","a":false,"exp":"×。法46条1項により、基本月額は加給年金額、繰下げ加算額及び経過的加算額を除いた老齢厚生年金の額を12で除して得た額である。これらを含めない。","page":120,"detail":"設問は誤り。本文「基本月額」では「『基本月額』とは、老齢厚生年金の額(加給年金額、繰下げ加算額及び経過的加算額を除きます)を12で除して得た額です」と規定されている。設問は加給年金額及び経過的加算額を「含めた」額としている点が誤りで、正しくはこれらを「除いた」額を12で除して得た額である。加給年金額・繰下げ加算額・経過的加算額はいずれも基本月額の計算に含めない。根拠条文は法46条1項、昭60法附則62条1項。"},{"law":"在職老齢年金","cat":"支給停止調整額","q":"在職老齢年金の支給停止調整額は、令和8年度の法定額においては48万円である。","a":false,"exp":"×。法46条3項により、支給停止調整額は令和8年度の法定額において65万円である。48万円ではない。","page":122,"detail":"設問は誤り。本文「支給停止調整額」では「支給停止調整額は、令和8年度(法定額)においては65万円です」と規定されている。設問は「48万円」としている点が誤りで、正しくは65万円である。なお65万円に各年度の名目賃金変動率を乗じて得た額が一定額を超え又は下るに至った場合には改定される。根拠条文は法46条3項。"},{"law":"在職老齢年金","cat":"在職老齢年金と老齢基礎年金","q":"在職老齢年金制度の適用を受けた場合であっても、老齢基礎年金の支給には影響を及ぼさず、老齢基礎年金は全額支給される。","a":true,"exp":"〇。法46条1項のとおり。在職老齢年金による支給停止は老齢厚生年金についてのみ行われ、老齢基礎年金は全額支給される。","page":121,"detail":"設問は正しい。本文では「在職老齢年金制度の適用を受けたとしても、老齢基礎年金の支給に影響は及ぼしません。つまり、老齢基礎年金は全額支給されます」と明記されている。在職老齢年金による支給停止は老齢厚生年金についての調整であり、老齢基礎年金には影響しないため全額支給される。設問はこの内容どおりであり正しい。根拠条文は法46条1項ほか。"},{"law":"在職老齢年金","cat":"資格喪失月","q":"被保険者資格を取得した月は在職老齢年金による支給調整の対象とならないが、被保険者資格を喪失した月は支給調整の対象となる。","a":true,"exp":"〇。法46条のとおり。資格取得月は対象外、資格喪失月は対象となる。月末退職し翌月に再就職しない場合は退職月まで支給停止される。","page":119,"detail":"設問は正しい。本文「在職老齢年金の対象」の注記では「被保険者資格を取得した月は、支給調整の対象とはなりません。被保険者資格を喪失した月は、支給調整の対象となります」と規定されている。さらに「月末退職し翌月に再就職しない場合は退職月まで支給停止とし、資格喪失日が属する月(退職月の翌月)は支給停止は行われません」とされる。設問はこの内容どおりであり正しい。根拠条文は法46条1項、27条。"},{"law":"特別支給の老齢厚生年金","cat":"支給要件","q":"特別支給の老齢厚生年金は、当分の間、65歳未満の者が、60歳以上であること、1年以上の被保険者期間を有すること、保険料納付済期間と保険料免除期間とを合算した期間が10年以上であることのいずれにも該当するに至ったときに支給される。","a":true,"exp":"〇。法附則8条のとおり。60歳以上、被保険者期間1年以上、受給資格期間10年以上が要件である。","page":123,"detail":"設問は正しい。本文「支給要件:特別支給の老齢厚生年金」では、「当分の間、65歳未満の者が、次のいずれにも該当するに至ったとき」として、「❶60歳以上であること」「❷1年以上の被保険者期間を有すること」「❸保険料納付済期間と保険料免除期間とを合算した期間が10年以上であること」を掲げている。設問はこの3要件をすべて正しく述べており正しい。なお「10年」には合算対象期間を含めることもできる。根拠条文は法附則8条。"},{"law":"特別支給の老齢厚生年金","cat":"支給されない者","q":"昭和36年4月2日以後に生まれた男子には、原則として特別支給の老齢厚生年金は支給されない。","a":true,"exp":"〇。法附則8条の2のとおり。男子は昭和36年4月2日以後生まれ、女子(第1号)は昭和41年4月2日以後生まれには特別支給の老齢厚生年金が支給されない。","page":124,"detail":"設問は正しい。本文「特別支給の老齢厚生年金が支給されない者」では、「❶昭和36年4月2日以後に生まれた男子(❸及び❹に該当する者を除きます)」には特別支給の老齢厚生年金は支給されないと規定されている。設問はこの内容どおりであり原則として正しい。ただし坑内員・船員の特例該当者(❸)や特定警察職員等(❹)は除かれる。根拠条文は法附則8条の2。"},{"law":"特別支給の老齢厚生年金","cat":"支給されない者","q":"昭和36年4月2日以後に生まれた女子(第1号厚生年金被保険者期間を有する者)には、原則として特別支給の老齢厚生年金は支給されない。","a":false,"exp":"×。法附則8条の2により、第1号厚生年金被保険者期間を有する女子は昭和41年4月2日以後生まれに支給されない。昭和36年4月2日以後は男子の基準である。","page":124,"detail":"設問は誤り。本文「特別支給の老齢厚生年金が支給されない者」では、女子(第1号厚生年金被保険者期間を有する者)について「❷昭和41年4月2日以後に生まれた女子」には支給されないと規定されている。設問は「昭和36年4月2日以後に生まれた女子」としている点が誤りで、正しくは昭和41年4月2日以後生まれである。男子より5年遅い生年月日区分となる。根拠条文は法附則8条の2。"},{"law":"特別支給の老齢厚生年金","cat":"報酬比例部分の支給開始","q":"報酬比例部分相当のみの年金が支給される場合には、加給年金額の加算がある。","a":false,"exp":"×。法附則9条により、報酬比例部分相当のみの年金が支給される場合には加給年金額の加算はない。定額部分が支給される場合に加給年金額が加算される。","page":129,"detail":"設問は誤り。本文「年金額:特別支給の老齢厚生年金」の注意では「報酬比例部分相当の年金のみが支給される場合には、加給年金額の加算はありません」と規定されている。加給年金額が加算されるのは定額部分が支給される場合(特例の「定額部分+報酬比例部分+加給年金額」)である。設問は報酬比例部分相当のみの年金に加算があるとしている点が誤り。根拠条文は法附則9条、9条の2第2項・3項。"},{"law":"特別支給の老齢厚生年金","cat":"定額部分","q":"定額部分の額は、1,628円に改定率を乗じた額に被保険者期間の月数を乗じて得た額である。","a":true,"exp":"〇。法附則9条の2のとおり。定額部分には報酬額や賞与額は反映されず、加入期間に応じて算定される。「1,628円」は老齢基礎年金の満額の1か月分の額を意味する。","page":130,"detail":"設問は正しい。本文「定額部分」では「定額部分 = 1,628円 × 改定率( × 政令で定める率 )× 被保険者期間の月数」と規定されている。設問は「1,628円に改定率を乗じた額に被保険者期間の月数を乗じて得た額」としており、この計算式どおりであり正しい。なお「1,628円×改定率」に生じた50銭未満等の端数は所定の方法で処理し、被保険者期間の月数には生年月日に応じた上限(原則480月)がある。根拠条文は法附則9条の2第2項。"},{"law":"特別支給の老齢厚生年金","cat":"坑内員・船員の特例","q":"坑内員たる被保険者であった期間と船員たる被保険者であった期間とを合算して15年以上であるときは、生年月日に応じた支給開始年齢から定額部分と報酬比例部分とを併せた特別支給の老齢厚生年金が支給される。","a":true,"exp":"〇。法附則9条の4のとおり。15年以上とは第3種被保険者の期間特例を適用しない実期間で算定した期間である。","page":128,"detail":"設問は正しい。本文「坑内員・船員の特例:特別支給の老齢厚生年金」では「坑内員たる被保険者であった期間と船員たる被保険者であった期間とを合算して15年以上であるときは、生年月日に応じた支給開始年齢から定額部分と報酬比例部分とを併せた特別支給の老齢厚生年金が支給されます」と規定されている。設問はこの内容どおりであり正しい。なお「15年以上」は第3種被保険者期間の特例を適用しない実期間で算定する。根拠条文は法附則8条の2第3項、9条の4。"},{"law":"特別支給の老齢厚生年金","cat":"障害者の特例","q":"障害者の特例及び長期加入者の特例は、いずれも被保険者である間は適用されない。","a":true,"exp":"〇。法附則9条の2、9条の3のとおり。これらの特例は被保険者でないことが要件である。","page":132,"detail":"設問は正しい。本文「特別支給の老齢厚生年金の年金額の特例」の注意では「障害者の特例、長期加入者の特例は、いずれも被保険者である間は適用されません」と明記されている。これらの特例はいずれも受給権者が「被保険者でなく」かつ所定の要件に該当する場合に定額部分が加算されるものである。設問はこの内容どおりであり正しい。根拠条文は法附則9条の2、9条の3。"},{"law":"特別支給の老齢厚生年金","cat":"長期加入者の特例","q":"長期加入者の特例は、特別支給の老齢厚生年金の受給権者が、被保険者でなく、かつその者の被保険者期間が40年以上であるときに適用される。","a":false,"exp":"×。法附則9条の3により、長期加入者の特例は被保険者期間が44年以上であるときに適用される。40年以上ではない。","page":133,"detail":"設問は誤り。本文「長期加入者の特例」では「特別支給の老齢厚生年金の受給権者が、その権利を取得した当時、被保険者でなく、かつ、その者の被保険者期間が44年以上であるときは、その年金額を『障害者の特例』の規定の例により計算します」と規定されている。設問は「40年以上」としている点が誤りで、正しくは「44年以上」である。なお2以上の種別の期間を有する場合、この44年以上の要件は各号の被保険者期間ごとに判断する。根拠条文は法附則9条の3第1項。"},{"law":"特別支給の老齢厚生年金","cat":"失権","q":"特別支給の老齢厚生年金の受給権は、その受給権者が65歳に達したときに消滅する。","a":true,"exp":"〇。法附則10条のとおり。死亡したとき又は65歳に達したときに失権する。65歳からは新たに老齢厚生年金の受給権が発生する。","page":154,"detail":"設問は正しい。本文「失権:特別支給の老齢厚生年金」では、特別支給の老齢厚生年金の受給権は「❶死亡したとき」「❷65歳に達したとき」のいずれかに該当したときに消滅すると規定されている。設問は受給権者が65歳に達したときに受給権が消滅するとしており、この内容どおりであり正しい。65歳到達により本来の老齢厚生年金へ移行するためである。根拠条文は法附則10条。"},{"law":"特別支給の老齢厚生年金","cat":"特例老齢年金","q":"特例老齢年金は、保険料納付済期間と保険料免除期間とを合算した期間が10年未満であること、60歳以上であること、1年以上の第1号厚生年金被保険者期間を有すること、第1号厚生年金被保険者期間と旧共済組合の組合員期間とを合算した期間が20年以上あることのいずれにも該当する者に支給される。","a":true,"exp":"〇。法附則28条の3のとおり。受給資格期間を満たさないが旧共済組合員期間と合算して20年以上ある者への経過的な給付である。","page":155,"detail":"設問は正しい。本文「特例老齢年金」では、「次のいずれにも該当するに至ったとき」として、「❶保険料納付済期間と保険料免除期間とを合算した期間が10年未満であること」「❷60歳以上であること」「❸1年以上の第1号厚生年金被保険者期間を有すること」「❹第1号厚生年金被保険者期間と旧共済組合の組合員期間とを合算した期間が20年以上あること」を掲げ、その者に特例老齢年金を支給するとしている。設問はこの4要件をすべて正しく述べており正しい。根拠条文は法附則28条の3第1項。"},{"law":"繰上げ","cat":"減額率","q":"昭和37年4月2日以後生まれの者に係る繰上げの減額率は、1000分の5に繰上げ月数を乗じて計算される。","a":false,"exp":"×。令3令附則6条により、昭和37年4月2日以後生まれの者の減額率は1000分の4×繰上げ月数である。昭和37年4月1日以前生まれの者が1000分の5×繰上げ月数となる。","page":141,"detail":"設問は誤りです。本文「減額率の適用」では、令和4年3月31日において60歳に達していない者(昭和37年4月2日以後生まれの者)に係る減額率は「1000分の4×繰上げ月数」によって計算されるとあります。一方、「昭和37年4月1日以前に生まれた者に係る減額率は、1000分の5×繰上げ月数によって計算される」とされており、設問は生年月日と乗率の対応が逆になっています。したがって、昭和37年4月2日以後生まれの者の乗率は1000分の5ではなく1000分の4が正しいです。根拠は法附則13条の4第4項、令8条の2の3第1項、令3令附則6条です。"},{"law":"繰上げ","cat":"繰上げ支給の老齢厚生年金","q":"繰上げ支給の老齢厚生年金の受給権者については、65歳に達するまでは加給年金額は加算されない。","a":true,"exp":"〇。法附則7条の3のとおり。繰上げ支給の老齢厚生年金では65歳に達するまで加給年金額が加算されない。","page":144,"detail":"設問のとおりで正しいです。繰上げ支給の老齢厚生年金は、65歳に達する前に支給を受けるものであり、本文の年金額の計算では「請求日前被保険者期間に基づき計算した老齢厚生年金額」から減額率を乗じた額を控除して支給額を算出します。加給年金額は本来65歳から加算される性質のものであり、繰上げ受給者については65歳に達するまで加算されません。根拠は法附則7条の3です。"},{"law":"繰上げ","cat":"雇用保険との調整","q":"特別支給の老齢厚生年金の受給権者が雇用保険法に規定する基本手当の支給を受けるため求職の申込みをしたときは、当該求職の申込みがあった月から、特別支給の老齢厚生年金の支給を停止する。","a":false,"exp":"×。法附則7条の4により、特別支給の老齢厚生年金は求職の申込みがあった月の翌月から支給停止される。求職の申込みがあった月からではない。","page":149,"detail":"設問は誤りです。本文「基本手当との調整:特別支給の老齢厚生年金」では、特別支給の老齢厚生年金の受給権者が基本手当の支給を受けるため求職の申込みをしたときは「当該求職の申込みがあった月の翌月から」調整対象期間の各月において支給を停止するとされています。設問は「求職の申込みがあった月から」としており、正しくは「翌月から」であるため誤りです。根拠は法附則7条の4第1項、11条の5です。"},{"law":"繰上げ","cat":"高年齢雇用継続給付との調整","q":"特別支給の老齢厚生年金の受給権者の標準報酬月額が、みなし賃金日額に30を乗じて得た額の64%未満であるときは、標準報酬月額の100分の4に相当する額に12を乗じて得た額の支給が停止される。","a":true,"exp":"〇。法附則7条の5のとおり。在職老齢年金の支給停止基準額に加えて、高年齢雇用継続給付との調整による支給停止が行われる。","page":152,"detail":"設問のとおりで正しいです。本文「高年齢雇用継続給付との調整:特別支給の老齢厚生年金」では、受給権者の標準報酬月額が「みなし賃金日額に30を乗じて得た額の64%未満であるとき」は、在職老齢年金等による支給停止に加えて「標準報酬月額の100分の4に相当する額」に12を乗じて得た額の支給停止が行われるとされています。設問はこの内容と一致します。根拠は法附則7条の4、11条の6等です。"},{"law":"障害厚生年金","cat":"初診日要件","q":"障害厚生年金の初診日要件は、初診日において被保険者であることである。","a":true,"exp":"〇。法47条1項のとおり。20歳未満であっても被保険者であれば初診日要件を満たす。","page":158,"detail":"設問のとおりで正しいです。本文「初診日要件」では、障害厚生年金の初診日要件は「初診日において被保険者であること」とされています。なお初診日とは、その疾病又は負傷及びこれらに起因する疾病について初めて医師又は歯科医師の診療を受けた日をいい、20歳未満であっても被保険者であれば初診日要件を満たします。根拠は法47条1項です。"},{"law":"障害厚生年金","cat":"障害認定日","q":"障害認定日とは、初診日から起算して1年を経過した日、又はその期間内にその傷病が治ったときはその治った日である。","a":false,"exp":"×。法47条1項により、障害認定日は初診日から起算して1年6か月を経過した日である。1年ではない。治った日には症状が固定し治療の効果が期待できない状態に至った日も含まれる。","page":159,"detail":"設問は誤りです。本文「障害認定日」では、障害認定日とは「初診日から起算して1年6か月を経過した日」、又はその期間内にその傷病が治ったときは「その治った日」とされています。設問は「1年を経過した日」としており、正しくは「1年6か月を経過した日」であるため誤りです。なお治った日には症状が固定し治療の効果が期待できない状態に至った日も含まれます。根拠は法47条1項です。"},{"law":"障害厚生年金","cat":"障害等級","q":"厚生年金保険法の障害等級は、重度のものから1級及び2級の2段階とされている。","a":false,"exp":"×。法47条2項により、厚生年金保険の障害等級は1級、2級及び3級の3段階である。3級まである点が国民年金と異なる。","page":159,"detail":"設問は誤りです。本文「障害等級」では、障害等級は障害の程度に応じて重度のものから「1級、2級及び3級」とし、各級の障害の状態は政令で定められているとされています。設問は1級及び2級の2段階としていますが、厚生年金保険法の障害等級は1級・2級・3級の3段階であるため誤りです。根拠は法47条2項です。"},{"law":"障害厚生年金","cat":"障害等級3級","q":"障害等級3級の障害厚生年金の支給を受ける者には、障害基礎年金が支給されない。","a":true,"exp":"〇。3級は厚生年金保険独自の等級であり、障害基礎年金(1級・2級)は支給されない。","page":159,"detail":"設問のとおりで正しいです。本文の「障害等級」の注意書きにおいて、「障害等級3級の障害厚生年金の支給を受ける者には、障害基礎年金が支給されません」と明記されています。障害基礎年金は1級又は2級に限られ、厚生年金保険独自の等級である3級には障害基礎年金が支給されません。根拠は法47条2項です。"},{"law":"障害厚生年金","cat":"保険料納付要件","q":"障害厚生年金の保険料納付要件は、初診日の前日において、初診日の属する月の前々月までの被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が、当該被保険者期間の3分の2以上であることである。","a":true,"exp":"〇。法47条1項のとおり。原則の保険料納付要件は3分の2以上である。","page":160,"detail":"設問のとおりで正しいです。本文「保険料納付要件:障害厚生年金」では、初診日の前日において、当該初診日の属する月の前々月までに国民年金の被保険者期間がある場合は、当該被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が「当該被保険者期間の3分の2以上であること」が要件とされています。設問はこの原則の納付要件と一致します。根拠は法47条1項です。"},{"law":"障害厚生年金","cat":"事後重症","q":"事後重症による障害厚生年金は、障害認定日において障害等級に該当しなかった者が、その日後70歳に達する日の前日までの間において障害等級に該当する程度の障害の状態に該当するに至った場合に請求できる。","a":false,"exp":"×。法47条の2により、事後重症は65歳に達する日の前日までの間に障害等級に該当した場合に請求できる。70歳ではない。請求により受給権が発生する。","page":161,"detail":"設問は誤りです。本文「支給要件:事後重症による障害厚生年金」では、障害認定日において障害等級に該当する程度の障害の状態になかった者が「その日後65歳に達する日の前日までの間」において障害等級に該当する程度の障害の状態に該当するに至った場合に請求できるとされています。設問は「70歳に達する日の前日まで」としており、正しくは「65歳に達する日の前日まで」であるため誤りです。根拠は法47条の2第1項・2項です。"},{"law":"障害厚生年金","cat":"基準障害","q":"基準障害による障害厚生年金は、基準障害と他の障害とを併合して障害等級3級に該当する程度の障害の状態に至った場合にも支給される。","a":false,"exp":"×。法47条の3により、基準障害と他の障害とを併合して障害等級1級又は2級に該当する程度の障害の状態に至ることが要件である。3級では要件に該当しない。","page":162,"detail":"設問は誤りです。本文「支給要件:基準障害による障害厚生年金」では、基準障害と他の障害とを併合して「障害等級の1級又は2級に該当する程度の障害の状態」に該当するに至ることが要件とされています。さらに注意書きで「基準障害と他の障害とを併合して障害等級3級となっても要件に該当しません」と明記されており、3級では支給されないため設問は誤りです。根拠は法47条の3第1項・2項です。"},{"law":"障害厚生年金","cat":"年金額の月数保障","q":"障害厚生年金の額の計算の基礎となる被保険者期間の月数が240に満たないときは、これを240とする。","a":false,"exp":"×。法50条1項により、障害厚生年金の被保険者期間の月数が300に満たないときは300とする。240ではない。","page":166,"detail":"設問は誤りです。本文「年金額:障害厚生年金」では、障害厚生年金の額は老齢厚生年金の額の規定の例により計算した額とし、「当該障害厚生年金の額の計算の基礎となる被保険者期間の月数が300に満たないときは、これを300とします」とされています。設問は「240に満たないときはこれを240とする」としており、正しくは「300」であるため誤りです。根拠は法50条1項、51条です。"},{"law":"
