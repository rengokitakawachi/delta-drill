31日以内|1箇月以内|2箇月以内】の期間を定めて雇用される者をいう。","exp":"法42条。","page":36},{"law":"求職者給付(基本手当)","cat":"受給資格","text":"基本手当は、被保険者が失業した場合において、【離職の日以前2年間|離職の日以前1年間|離職の日以前3年間|離職の日以前6箇月間】に、被保険者期間が通算して【12箇月以上|6箇月以上|24箇月以上|10箇月以上】あるときに支給される。特定理由離職者又は特定受給資格者は、離職の日以前1年間に、被保険者期間が通算して【6箇月以上|12箇月以上|3箇月以上|9箇月以上】あるときに支給される。","exp":"法13条。算定対象期間と被保険者期間。","page":68},{"law":"求職者給付(基本手当)","cat":"算定対象期間","text":"算定対象期間は、原則として、離職の日以前2年間とされ、特定理由離職者又は特定受給資格者に係る算定対象期間は、離職の日以前【2年間又は1年間|1年間|2年間|3年間又は2年間】とされる。","exp":"法13条1項・2項。","page":72},{"law":"求職者給付(基本手当)","cat":"被保険者期間","text":"被保険者期間は、被保険者であった期間のうち、当該被保険者でなくなった日等の各前日から各前月の喪失応当日までさかのぼった各期間で、賃金の支払の基礎となった日数が【11日以上|14日以上|10日以上|15日以上】あるものを被保険者期間の1箇月として計算する。","exp":"法14条1項。賃金支払基礎日数11日以上。","page":74},{"law":"求職者給付(基本手当)","cat":"基本手当の支給","text":"基本手当は、受給資格者が失業している日(失業していることについての【認定|確認|証明|決定】を受けた日に限る)について支給する。","exp":"法15条1項。","page":80},{"law":"求職者給付(基本手当)","cat":"求職の申込み","text":"失業の認定を受けようとする受給資格者は、離職後、【公共職業安定所に出頭|労働基準監督署に出頭|都道府県労働局に出頭|市町村役場に出頭】し、求職の申込みをしなければならない。","exp":"法15条2項。","page":80},{"law":"求職者給付(基本手当)","cat":"失業の認定の方法","text":"失業の認定は、受給資格者が求人者に面接したこと、職業を紹介され又は職業指導を受けたこと、その他【求職活動|就職活動|職業訓練|求人応募】を行ったことを確認して行う。","exp":"法15条5項。","page":82},{"law":"求職者給付(基本手当)","cat":"賃金日額","text":"賃金日額は、算定対象期間において被保険者期間として計算された最後の【6箇月間|3箇月間|12箇月間|1年間】に支払われた賃金の総額を【180|360|365|90】で除して得た額とする。","exp":"法17条1項。","page":90},{"law":"求職者給付(基本手当)","cat":"基本手当の日額・給付率","text":"基本手当の日額は、賃金日額に給付率を乗じて算定し、給付率は、離職日に60歳未満である受給資格者については100分の80から【100分の50|100分の45|100分の60|100分の40】まで、60歳以上65歳未満である受給資格者については100分の80から【100分の45|100分の50|100分の40|100分の60】までの範囲で、賃金日額に応じて決定される。","exp":"法16条・17条。基本手当の給付率。","page":95},{"law":"求職者給付(基本手当)","cat":"待期","text":"基本手当は、受給資格者が離職後最初に公共職業安定所に出頭し求職の申込みをした日以後において、失業している日が【通算して7日|通算して14日|継続して7日|通算して3日】に満たない間は、支給されない。これを待期という。","exp":"法21条。待期7日。","page":88},{"law":"求職者給付(基本手当)","cat":"待期日数","text":"待期は、【一の受給期間内に1回|受給資格ごとに1回|毎回|1年に1回】をもって足り、受給期間内に就職して新たな受給資格を取得することなく、再び失業した場合には、すでに待期を満了している者については再び要求されない。","exp":"法21条。","page":88},{"law":"求職者給付(基本手当)","cat":"受給期間","text":"基本手当は、原則として、受給資格に係る離職の日(基準日)の翌日から起算して【1年|2年|1年6箇月|6箇月】の期間(受給期間)内の失業している日について、所定給付日数に相当する日数分を限度として支給する。","exp":"法20条1項。受給期間1年。","page":104},{"law":"求職者給付(基本手当)","cat":"受給期間の特例","text":"基準日において【45歳以上65歳未満|45歳未満|60歳以上65歳未満|35歳以上45歳未満】であって算定基礎期間が1年以上の就職が困難な者である受給資格者(所定給付日数360日)については、基準日の翌日から起算して【1年に60日|1年に30日|1年に90日|1年に120日】を加えた期間を受給期間とする。","exp":"法20条1項。","page":104},{"law":"求職者給付(基本手当)","cat":"受給期間の延長","text":"受給期間内に、妊娠、出産、育児その他の理由により引き続き【30日以上|31日以上|15日以上|60日以上】職業に就くことができない者は、その申出によって、当該日数が加算され、最高【4年|3年|2年|4年6箇月】まで受給期間を延長することができる。","exp":"法20条1項。","page":105},{"law":"求職者給付(基本手当)","cat":"傷病手当","text":"傷病手当については、基本手当の減額、【待期|給付制限|受給期間|算定対象期間】、未支給の基本手当の請求手続、不正受給による給付制限の規定が準用される。","exp":"法37条9項。","page":122},{"law":"求職者給付(基本手当)","cat":"離職理由による給付制限","text":"正当な理由がなく自己の都合によって退職した場合等は、待期期間の満了後【1箇月以上3箇月以内|2箇月以上3箇月以内|1箇月以上2箇月以内|3箇月】の間で公共職業安定所長の定める期間は、基本手当は支給されない。","exp":"法33条1項。","page":117},{"law":"求職者給付(基本手当)","cat":"延長給付","text":"受給資格者が公共職業安定所長の指示した公共職業訓練等(その期間が【2年|1年|3年|2年6箇月】を超えるものを除く)を受ける場合には、所定給付日数を超えてその者に基本手当を支給することができる。","exp":"法24条。訓練延長給付。","page":110},{"law":"求職者給付(所定給付日数)","cat":"所定給付日数の意義","text":"所定給付日数とは、一の受給資格に基づき基本手当を支給する日数の【上限|限度|総日数|基準】であり、基準日における年齢、算定基礎期間、離職理由等によって定められている。","exp":"法22条・23条。","page":100},{"law":"求職者給付(所定給付日数)","cat":"一般の受給資格者","text":"一般の受給資格者の所定給付日数は、算定基礎期間が1年以上10年未満で【90日|120日|150日|180日】、10年以上20年未満で【120日|90日|150日|180日】、20年以上で【150日|120日|180日|240日】とされる。","exp":"法22条1項。","page":100},{"law":"求職者給付(所定給付日数)","cat":"就職が困難な者","text":"就職が困難な者の所定給付日数は、算定基礎期間1年未満で【150日|90日|180日|300日】、45歳未満で【300日|330日|270日|360日】、45歳以上65歳未満で【360日|300日|330日|390日】とされる。","exp":"法22条2項。","page":100},{"law":"求職者給付(所定給付日数)","cat":"高年齢求職者給付金","text":"高年齢求職者給付金の額は、基本手当の日額に支給日数を乗じて一時金で支給され、支給日数は算定基礎期間1年未満で【30日|50日|40日|20日】、1年以上で【50日|30日|60日|40日】とされる。","exp":"法37条の4。","page":134},{"law":"求職者給付(所定給付日数)","cat":"高年齢求職者給付金の受給期限","text":"高年齢求職者給付金の支給を受けることができる期限(受給期限)は、離職の日の翌日から起算して【1年|6箇月|2年|1年6箇月】を経過する日までである。","exp":"法37条の4。","page":134},{"law":"求職者給付(所定給付日数)","cat":"特例一時金","text":"特例一時金の額は、原則として基本手当の日額の【30日分|40日分|50日分|20日分】とされているが、当分の間、【40日分|30日分|50日分|60日分】とすることとされている。","exp":"法40条1項、附則8条。","page":142},{"law":"求職者給付(所定給付日数)","cat":"日雇労働求職者給付金","text":"日雇労働求職者給付金は、日雇労働被保険者が失業した場合において、その失業の日の属する月の前【2月間|3月間|1月間|6月間】に、その者について、印紙保険料が通算して【26日分以上|28日分以上|24日分以上|31日分以上】納付されているときに支給される。","exp":"法45条。","page":146},{"law":"就職促進給付","cat":"就職促進給付の種類","text":"就職促進給付は、就業促進手当、移転費及び【求職活動支援費|広域求職活動費|職業訓練受講費|就職支援費】とする。","exp":"法10条4項。","page":156},{"law":"就職促進給付","cat":"就業促進手当の種類","text":"就業促進手当は、再就職手当、【就業促進定着手当|就業手当|再就職定着手当|早期再就職手当】及び常用就職支度手当とする。","exp":"則82条。","page":156},{"law":"就職促進給付","cat":"再就職手当の支給要件","text":"再就職手当は、安定した職業に就いた日の前日における基本手当の支給残日数が当該受給資格に基づく所定給付日数の【3分の1以上|2分の1以上|3分の2以上|4分の1以上】ある受給資格者が、一定の要件に該当するときに支給される。","exp":"法56条の3第1項。","page":157},{"law":"就職促進給付","cat":"再就職手当の額","text":"再就職手当の額は、支給残日数が所定給付日数の3分の1以上3分の2未満のとき基本手当日額に支給残日数の【10分の6|10分の7|10分の5|10分の8】を乗じた額、3分の2以上のとき基本手当日額に支給残日数の【10分の7|10分の6|10分の8|10分の5】を乗じた額とされる。","exp":"法56条の3第3項。","page":158},{"law":"教育訓練給付","cat":"支給要件","text":"教育訓練給付金は、基準日に一般被保険者又は高年齢被保険者である者等であって、厚生労働大臣が指定する教育訓練を受け、当該教育訓練を【修了|受講開始|受講申込み|登録】したときに支給される。","exp":"法60条の2第1項。","page":177},{"law":"教育訓練給付","cat":"教育訓練給付金の額","text":"教育訓練給付金の額は、受講のために支払った費用の額に支給率を乗じて計算した額とし、支給率は100分の20以上【100分の80|100分の70|100分の60|100分の50】以下の範囲内において厚生労働省令で定める率とされる。","exp":"法60条の2第4項。教育訓練給付率。","page":181},{"law":"教育訓練給付","cat":"支給率の区分","text":"支給率は、一般教育訓練を受け修了した者は【100分の20|100分の40|100分の30|100分の50】、特定一般教育訓練を受け修了した者は【100分の40|100分の20|100分の50|100分の60】、専門実践教育訓練を受け修了した者は【100分の50|100分の70|100分の40|100分の80】とされる。","exp":"則101条の2の7。","page":181},{"law":"教育訓練給付","cat":"対象期間の特例","text":"一般被保険者又は高年齢被保険者でなくなった日から教育訓練を開始することができない者が申し出た場合には、当該日から起算して【20年|10年|4年|5年】を経過する日までの間に申し出ることで、当該教育訓練を開始することができない日数を加算することができる。","exp":"則101条の2の5。","page":177},{"law":"雇用継続給付(高年齢)","cat":"高年齢雇用継続基本給付金","text":"高年齢雇用継続基本給付金は、被保険者に対して支給対象月に支払われた賃金の額が、みなし賃金日額に30を乗じて得た額の【100分の75|100分の85|100分の61|100分の64】に相当する額を下るに至った場合に、当該支給対象月について支給される。","exp":"法61条1項。","page":210},{"law":"雇用継続給付(高年齢)","cat":"支給額の原則","text":"高年齢雇用継続基本給付金の額は、みなし賃金日額に30を乗じて得た額の【100分の64|100分の61|100分の75|100分の50】未満に低下した場合は、支給対象月の賃金額に【100分の15|100分の10|100分の20|100分の25】を乗じて得た額とされる。","exp":"法61条5項。","page":213},{"law":"雇用継続給付(高年齢)","cat":"みなし賃金日額","text":"みなし賃金日額とは、被保険者を受給資格者と、当該被保険者が【60歳に達した日|65歳に達した日|離職の日|被保険者となった日】(その日に被保険者であった期間が【5年|10年|1年|3年】未満であるときは、5年以上となった日)を受給資格に係る離職の日とみなして算定される賃金日額に相当する額をいう。","exp":"法61条2項。","page":211},{"law":"雇用継続給付(高年齢)","cat":"高年齢再就職給付金","text":"高年齢再就職給付金は、再就職後の支給対象月に支払われた賃金の額が、基本手当の日額の算定の基礎となった賃金日額に30を乗じて得た額の【100分の75|100分の85|100分の61|100分の64】に相当する額を下るときに支給される。","exp":"法61条の2。","page":215},{"law":"雇用継続給付(高年齢)","cat":"介護休業給付金の支給要件","text":"介護休業給付金は、被保険者が対象家族を介護するための介護休業をした場合等に支給され、同一の対象家族について介護休業を開始した日から終了した日までの日数を合算して得た日数が【93日|90日|180日|92日】に達した日後の介護休業については支給されない。","exp":"法61条の4。","page":219},{"law":"雇用継続給付(高年齢)","cat":"介護休業給付金の額","text":"介護休業給付金の額は、原則として休業開始時賃金日額に支給日数を乗じた額の【100分の40|100分の50|100分の67|100分の30】とされているが、当分の間、【100分の67|100分の50|100分の40|100分の80】に相当する額とすることとされている。","exp":"法61条の4、附則12条。","page":220},{"law":"育児休業給付","cat":"育児休業給付金の支給要件","text":"育児休業給付金は、被保険者が【1歳に満たない子|2歳に満たない子|3歳に満たない子|1歳6箇月に満たない子】を養育するための育児休業をしたこと、及び育児休業を開始した日前2年間に、みなし被保険者期間が通算して【12箇月以上|6箇月以上|24箇月以上|10箇月以上】あることのいずれにも該当するときに支給される。","exp":"法61条の7第1項。","page":221},{"law":"育児休業給付","cat":"育児休業給付金の額","text":"育児休業給付金の額は、1支給単位期間について、休業開始時賃金日額に支給日数を乗じて得た額の【100分の50|100分の40|100分の67|100分の60】(支給に係る休業日数が通算して【180日|150日|360日|240日】に達するまでの間に限り、【100分の67|100分の50|100分の80|100分の40】)に相当する額とされる。","exp":"法61条の7第6項。育児休業給付率67%/50%。","page":228},{"law":"育児休業給付","cat":"支給対象となる育児休業","text":"育児休業給付金の支給対象となるためには、支給単位期間において公共職業安定所長が就業していると認める日数が【10日以下|11日以下|14日以下|10日未満】(10日を超える場合は就業していると認める時間が【80時間以下|100時間以下|60時間以下|80時間未満】)であることが必要である。","exp":"則101条の22。","page":222},{"law":"育児休業給付","cat":"育児休業の分割取得","text":"被保険者が同一の子について【3回以上|2回以上|4回以上|3回目以後】の育児休業をした場合における3回目以後の育児休業については、育児休業給付金は、支給しない。","exp":"法61条の7第2項。","page":227},{"law":"育児休業給付","cat":"出生時育児休業給付金の額","text":"出生時育児休業給付金の額は、休業開始時賃金日額に支給日数(その日数が【28日|30日|14日|56日】を超えるときは、28日)を乗じて得た額の【100分の67|100分の50|100分の80|100分の40】に相当する額とされる。","exp":"法61条の8第4項。","page":231},{"law":"育児休業給付","cat":"出生後休業支援給付金","text":"出生後休業支援給付金は、被保険者が対象期間内にその子を養育するための休業(【出生後休業|産後休業|出生時育児休業|育児休業】)をした場合において、一定の要件のいずれにも該当するときに支給される。","exp":"法61条の10。","page":234},{"law":"育児休業給付","cat":"育児時短就業給付金","text":"育児時短就業給付金は、被保険者が、その【2歳に満たない子|1歳に満たない子|3歳に満たない子|1歳6箇月に満たない子】を養育するための所定労働時間を短縮することによる就業(育児時短就業)をした場合において、一定の要件に該当するとき、支給対象月について支給される。","exp":"法61条の12。","page":240},{"law":"雇用保険二事業","cat":"雇用安定事業","text":"政府は、被保険者等に関して、【失業の予防|失業の防止|離職の防止|雇用の維持】、雇用状態の是正、雇用機会の増大その他雇用の安定を図るため、雇用安定事業として所定の事業を行うことができる。","exp":"法62条1項。","page":246},{"law":"雇用保険二事業","cat":"能力開発事業","text":"政府は、被保険者等に関し、職業生活の全期間を通じて、これらの者の能力を開発し、及び向上させることを促進するため、【能力開発事業|職業能力開発事業|職業訓練事業|人材開発事業】として所定の事業を行うことができる。","exp":"法63条1項。","page":250},{"law":"費用・不服申立て・その他","cat":"国庫負担","text":"国庫は、求職者給付(高年齢求職者給付金を除く)、教育訓練給付(教育訓練休暇給付金に限る)及び雇用継続給付(介護休業給付金に限る)、育児休業給付等の支給に要する費用の【一部を負担|全部を負担|2分の1を負担|4分の1を負担】する。","exp":"法66条。","page":256},{"law":"費用・不服申立て・その他","cat":"審査請求","text":"被保険者となったこと等の確認、失業等給付等に関する処分に不服のある者は、【雇用保険審査官|労働保険審査官|社会保険審査官|労働基準監督官】に対して審査請求をし、その決定に不服のある者は、【労働保険審査会|社会保険審査会|中央労働委員会|労働政策審議会】に対して再審査請求をすることができる。","exp":"法69条1項。","page":259},{"law":"費用・不服申立て・その他","cat":"審査請求期間","text":"審査請求は、処分があったことを知った日の翌日から起算して【3箇月|2箇月|6箇月|60日】を経過したときは、することができない。再審査請求は、決定書の謄本が送付された日の翌日から起算して【2箇月|3箇月|1箇月|60日】を経過したときは、することができない。","exp":"労働保険審査官及び労働保険審査会法。","page":259},{"law":"費用・不服申立て・その他","cat":"時効","text":"失業等給付等の支給を受け、又はその返還を受ける権利は、これらを行使することができる時から【2年|5年|3年|1年】を経過したときは、時効によって消滅する。","exp":"法74条。","page":261},{"law":"費用・不服申立て・その他","cat":"処分の取消しの訴え","text":"確認、失業等給付等に関する処分の取消しの訴えは、当該処分についての審査請求に対する【雇用保険審査官|労働保険審査会|社会保険審査官|労働保険審査官】の決定を経た後でなければ、提起することができない。","exp":"法71条。審査請求前置主義。","page":260}],"choushu":[{"law":"総則・定義","cat":"徴収法の趣旨","text":"労働保険の保険料の徴収等に関する法律は、労働保険の事業の【効率的な運営|適正な運営|円滑な運営|健全な運営】を図るため、労働保険の保険関係の成立及び消滅、労働保険料の納付の手続、労働保険事務組合等に関し必要な事項を定めるものとする。","exp":"法1条。趣旨規定。","page":12},{"law":"総則・定義","cat":"労働保険の定義","text":"労働保険とは、労働者災害補償保険法による労働者災害補償保険及び雇用保険法による雇用保険の【総称|総合|統合|総体】であり、政府が徴収する保険料を労働保険料という。","exp":"法2条1項、10条1項。","page":12},{"law":"総則・定義","cat":"保険年度・期間計算","text":"保険年度とは、4月1日から翌年【3月31日|3月末日の翌日|12月31日|翌々年3月31日】までをいう。期間を計算する場合、期間の初日は算入せず翌日から起算するが、その期間が【午前0時|午前6時|正午|午後0時】から始まるときはその日から起算する。","exp":"法2条4項、民法140条。","page":12},{"law":"賃金の範囲","cat":"賃金の定義","text":"賃金とは、賃金、給料、手当、賞与その他名称のいかんを問わず、【労働の対償|労務提供の対価|労働の代償|勤労の報酬】として事業主が労働者に支払うもの(通貨以外のもので支払われるものであって、厚生労働省令で定める範囲外のものを除く)をいう。","exp":"法2条2項。","page":14},{"law":"賃金の範囲","cat":"現物給与の範囲","text":"賃金に算入すべき通貨以外のもので支払われる賃金の範囲は、食事、被服及び住居の利益のほか、所轄労働基準監督署長又は所轄公共職業安定所長の定めるところにより、現物給与の価額は【都道府県|市町村|事業場|全国一律】ごとに定められている。","exp":"法2条3項、則3条、平25.2.4基労徴発0204第2号。","page":14},{"law":"賃金の範囲","cat":"退職金の取扱い","text":"退職を事由に支払われる退職金であって、退職時に支払われるもの又は事業主の都合等により退職前に一時金として支払われるものについては、一般保険料の算定基礎となる賃金総額に【算入しない|算入する|2分の1を算入する|全額算入する】ものとされている。","exp":"平15.10.1基徴発1001001号。","page":15},{"law":"賃金の範囲","cat":"賃金総額の特例","text":"請負による建設の事業については、賃金総額を請負金額に【労務費率|労務比率|賃金率|請負率】を乗じて算定する特例が設けられており、賃金総額を正確に算定することが困難な事業に適用される。","exp":"法11条3項、則12条~15条。","page":50},{"law":"保険関係の成立・消滅","cat":"保険関係の成立","text":"労災保険及び雇用保険の適用事業の事業主については、その事業が【開始された日|開始された日の翌日|労働者を使用した日|認可を受けた日】に、その事業につき労働保険の保険関係が成立する。これは【法律上当然|認可により|届出により|申請により】に成立する。","exp":"法3条、法4条。強制適用事業。","page":24},{"law":"保険関係の成立・消滅","cat":"保険関係成立の届出","text":"保険関係が成立した事業の事業主は、その成立した日(翌日起算)から【10日以内|20日以内|50日以内|5日以内】に、その成立した日、事業主の氏名又は名称及び住所、事業の種類、事業の行われる場所その他厚生労働省令で定める事項を政府に届け出なければならない。","exp":"法4条の2第1項、則4条2項。保険関係成立届。","page":25},{"law":"保険関係の成立・消滅","cat":"変更事項の届出","text":"保険関係が成立している事業の事業主は、届出事項のうち厚生労働省令で定める事項に変更があったときは、変更が生じた日の翌日から起算して【10日以内|20日以内|14日以内|30日以内】に、その旨を政府に届け出なければならない。","exp":"法4条の2第2項、則5条。名称、所在地等変更届。","page":26},{"law":"保険関係の成立・消滅","cat":"労災保険関係成立票","text":"労災保険に係る保険関係が成立している事業のうち【建設の事業|立木の伐採の事業|製造の事業|すべての事業】に係る事業主は、労災保険関係成立票を見やすい場所に掲げなければならない。","exp":"則77条。","page":27},{"law":"保険関係の成立・消滅","cat":"暫定任意適用事業の成立","text":"暫定任意適用事業の保険関係は、その事業が強制適用事業に該当した場合以外においては、事業主の申請に基づく【厚生労働大臣|都道府県労働局長|所轄労働基準監督署長|政府】の認可により成立し、認可があった日にその事業につき保険関係が成立する。","exp":"法附則2条、整備法5条。","page":28},{"law":"保険関係の成立・消滅","cat":"任意加入の同意要件","text":"雇用保険暫定任意適用事業では、事業主が任意加入の申請をすること、厚生労働大臣の認可を受けること、及びその事業に使用される労働者の【2分の1以上|過半数|3分の2以上|4分の3以上】の同意を得ることのいずれをも満たした場合に、保険関係が成立する。","exp":"法附則2条、整備法5条。労災は同意不要。","page":28},{"law":"保険関係の成立・消滅","cat":"保険関係の消滅","text":"保険関係が成立している事業が廃止され、又は終了したときは、その事業についての保険関係は、その【翌日|当日|10日後|消滅を届け出た日】に消滅する。手続は不要だが労働保険料の精算をしなければならない。","exp":"法5条。","page":30},{"law":"保険関係の成立・消滅","cat":"暫定任意適用事業の消滅","text":"保険関係の消滅の申請をした場合、厚生労働大臣の認可があった日の【翌日|当日|認可申請の日|10日後】に、その事業についての保険関係が消滅する。","exp":"法附則4条1項、整備法8条1項。","page":33},{"law":"保険関係の成立・消滅","cat":"有期事業の一括の要件","text":"有期事業の一括は、事業主が同一人であること、それぞれの事業が有期事業であること、概算保険料に相当する額が【160万円未満|180万円未満|100万円未満|200万円未満】であり、かつ建設の事業にあっては請負金額が【1億8,000万円未満|1億9,000万円未満|1億6,000万円未満|2億円未満】であること等の要件すべてを満たす場合に行われる。","exp":"法7条、則6条。","page":36},{"law":"保険関係の成立・消滅","cat":"請負事業の一括","text":"労災保険に係る保険関係が成立している建設の事業のうち、数次の請負によって行われる事業については、【法律上当然|申請により|認可により|届出により】に、下請負人の事業を元請負人の事業にまとめて一つの保険関係とし、全体を一つの事業とみなす。","exp":"法8条。下請負事業の分離は任意。","page":38},{"law":"労働保険料の種類・算定","cat":"一般保険料率","text":"一般保険料率は、労災保険及び雇用保険に係る保険関係が成立している事業については労災保険率に【雇用保険率|二事業率|失業等給付率|労使折半率】を加えた率を用い、労災保険のみが成立している事業については労災保険率を用いる。","exp":"法12条1項。","page":52},{"law":"労働保険料の種類・算定","cat":"労災保険率の決定基準","text":"労災保険率は、労災保険法の規定による保険給付及び社会復帰促進等事業に要する費用の予想額に照らし、将来にわたって、労災保険の事業に係る【財政の均衡|収支の均衡|財政の安定|収支の相償】を保つことができるものでなければならない。","exp":"法12条2項。","page":52},{"law":"労働保険料の種類・算定","cat":"労災保険率の範囲","text":"労災保険率は、事業の種類ごとに最高【1000分の88|1000分の89|1000分の80|1000分の118】から最低【1000分の2.5|1000分の3|1000分の2|1000分の0.6】までの間で定められており、すべての事業の種類において非業務災害率である【1000分の0.6|1000分の0.5|1000分の1|1000分の3】が含まれている。","exp":"則16条2項、別表1。","page":53},{"law":"労働保険料の種類・算定","cat":"特別加入保険料の算定","text":"第1種特別加入保険料の算定方法は、保険料算定基礎額の総額に第1種特別加入保険料率を乗じて得た額であり、保険料算定基礎額に【1,000円未満|1円未満|100円未満|10,000円未満】の端数があるときは切り捨てる。","exp":"法13条、則21条。","page":62},{"law":"労働保険料の種類・算定","cat":"第3種特別加入保険料率","text":"第3種特別加入保険料率は、派遣元、派遣先の事業の種類等を問わず、一律に【1000分の3|1000分の4|1000分の2|1000分の3.5】である。","exp":"則23条の3。","page":66},{"law":"労働保険料の種類・算定","cat":"労働保険料の負担:労災","text":"労災保険に係る一般保険料、第1種・第2種・第3種特別加入保険料は、その【全額|2分の1|3分の2|大部分】を事業主が負担する。","exp":"法31条3項。","page":140},{"law":"労働保険料の種類・算定","cat":"労働保険料の負担:雇用","text":"雇用保険に係る一般保険料のうち【二事業率|失業等給付率|労使折半分|二事業負担率】に係る保険料はその全額を事業主が負担し、それ以外の一般保険料は、事業主及び被保険者が【2分の1ずつ|事業主が3分の2|3分の1ずつ|事業主が4分の3】負担する。","exp":"法31条1項・3項。","page":140},{"law":"申告・納付・延納","cat":"概算・確定の仕組み","text":"労働保険料については、保険料の算定の対象となる期間の初めに【概算額|見込額|予定額|暫定額】で申告・納付し、その期間が終了したら確定額を申告して過不足を精算する仕組みをとっている。","exp":"法15条等。年度更新の基本構造。","page":70},{"law":"申告・納付・延納","cat":"概算保険料の申告納付:継続事業","text":"継続事業の事業主は、保険年度ごとに、労働保険料を概算保険料申告書に添えて、その保険年度の【6月1日|4月1日|5月1日|6月10日】(当日起算)から【40日以内|50日以内|20日以内|30日以内】(毎年【7月10日|7月31日|6月30日|8月10日】まで)に納付しなければならない。","exp":"法15条1項、則38条1項。年度更新。","page":72},{"law":"申告・納付・延納","cat":"概算保険料の申告納付:有期事業","text":"有期事業の事業主は、労働保険料を概算保険料申告書に添えて、保険関係が成立した日(翌日起算)から【20日以内|10日以内|40日以内|50日以内】に納付しなければならない。","exp":"法15条2項。","page":73},{"law":"申告・納付・延納","cat":"賃金総額見込額の特例","text":"その保険年度の賃金総額の見込額が、直前の保険年度の賃金総額の【100分の50|100分の100|100分の200|100分の40】以上【100分の200|100分の150|100分の100|100分の300】以下である場合には、直前の保険年度の賃金総額を当該保険年度の賃金総額の見込額とする。","exp":"法15条1項、則24条1項。","page":75},{"law":"申告・納付・延納","cat":"労働保険料の申告先・納付方法","text":"労働保険料の申告は、概算保険料申告書、増加概算保険料申告書及び確定保険料申告書を、【所轄都道府県労働局歳入徴収官|所轄労働基準監督署長|所轄公共職業安定所長|厚生労働大臣】に提出することにより行い、納付は印紙保険料を除き、納入告知書に係るものを除き納付書によって行わなければならない。","exp":"則38条1項・4項。","page":78},{"law":"申告・納付・延納","cat":"口座振替による納付","text":"政府は、事業主から、印紙保険料以外の労働保険料の納付をその預金口座のある金融機関に委託して行うことを希望する旨の申出があった場合には、その納付が確実と認められ、かつ、その申出を承認することが労働保険料の徴収上【有利|適当|円滑|効率的】と認められるときに限り、その申出を承認することができる。","exp":"法21条の2第1項。","page":81},{"law":"申告・納付・延納","cat":"概算保険料の認定決定","text":"事業主が所定の申告・納期限までに申告書を提出しないとき等に該当する場合には、政府は、その事業主が申告納付すべき労働保険料の額を決定し、これを事業主に通知する。これを認定決定といい、通知を受けた事業主は通知を受けた日の翌日から起算して【15日以内|10日以内|20日以内|30日以内】に納付する。","exp":"法15条3項・4項。","page":83},{"law":"申告・納付・延納","cat":"増加概算保険料の要件","text":"賃金総額の見込額が増加した場合で、増加後の賃金総額等の見込額が増加前の見込額の【100分の200|100分の150|100分の100|100分の110】を超え、かつその差額が【13万円以上|16万円以上|10万円以上|40万円以上】であるときは、増加概算保険料を申告・納付しなければならない。","exp":"法16条、則25条1項。","page":84},{"law":"申告・納付・延納","cat":"増加概算保険料の申告納付","text":"事業主は、賃金総額等の増加が見込まれた日又は一般保険料率が変更された日(翌日起算)から【30日以内|20日以内|40日以内|14日以内】に、増加後の見込額に基づく労働保険料の額と納付した労働保険料との差額を増加概算保険料申告書に添えて納付しなければならない。","exp":"法16条。継続・有期で同一。","page":85},{"law":"申告・納付・延納","cat":"概算保険料の追加徴収","text":"政府は、一般保険料率、特別加入保険料率の引上げを行ったときは、労働保険料を追加徴収する。所轄都道府県労働局歳入徴収官は、通知を発する日から起算して【30日|20日|15日|10日】を経過した日をその納期限と定める。","exp":"法17条、則26条。金額の多少を問わない。","page":86},{"law":"申告・納付・延納","cat":"延納の要件:継続事業","text":"継続事業の事業主が概算保険料申告書を提出する際に延納の申請をした場合で、納付すべき概算保険料の額が【40万円|75万円|20万円|50万円】(労災又は雇用のいずれか一方のみが成立している事業については【20万円|40万円|10万円|25万円】)以上であること、又は労働保険事務組合に労働保険事務の処理を委託していることのいずれかに該当するときは、延納することができる。","exp":"法18条、則27条1項。","page":87},{"law":"申告・納付・延納","cat":"延納の方法:継続事業","text":"継続事業の延納は、保険年度を【3期|2期|4期|6期】に分割して納付することができ、前保険年度より引き続き成立している場合の各期の納期限は、第1期が7月10日、第2期が【10月31日|10月10日|11月30日|12月31日】、第3期が翌年【1月31日|1月10日|2月28日|12月31日】である。","exp":"則27条。","page":88},{"law":"申告・納付・延納","cat":"延納の要件:有期事業","text":"有期事業の事業主が概算保険料申告書を提出する際に延納の申請をした場合で、納付すべき概算保険料の額が【75万円以上|40万円以上|100万円以上|50万円以上】であること、又は労働保険事務組合に委託していることのいずれかに該当するときは延納できる。事業の全期間が【6箇月以内|1年以内|3箇月以内|2箇月以内】のものは延納できない。","exp":"法18条、則28条1項。","page":90},{"law":"年度更新","cat":"年度更新の内容","text":"継続事業において、毎年度、前年度の確定保険料の申告・納付と当年度の概算保険料の申告・納付の手続を、保険年度の6月1日から【7月10日|7月31日|6月30日|8月10日】までに行う。これを年度更新という。","exp":"法15条・19条。","page":72},{"law":"年度更新","cat":"確定保険料の申告:継続事業","text":"継続事業の事業主は、保険年度ごとに、確定保険料申告書を、次の保険年度の6月1日(当日起算)から【40日以内|50日以内|20日以内|30日以内】(毎年7月10日まで)に提出しなければならない。","exp":"法19条1項。","page":96},{"law":"年度更新","cat":"確定保険料の申告:有期事業","text":"有期事業の事業主は、確定保険料申告書を、保険関係が消滅した日(当日起算)から【50日以内|40日以内|20日以内|10日以内】に提出しなければならない。","exp":"法19条2項。保険関係消滅日は事業終了日の翌日。","page":97},{"law":"年度更新","cat":"確定保険料の認定決定","text":"確定保険料について、事業主が所定の申告・納期限までに申告書を提出しないとき等に該当する場合には、政府は、その事業主が申告すべき労働保険料の額を決定し、これを【納入告知書|納付書|通知書|認定通知書】により事業主に通知する。これを認定決定という。","exp":"法19条4項、則38条5項。","page":100},{"law":"年度更新","cat":"還付・充当","text":"概算保険料額が確定保険料額を超える場合、その超える額は、次の保険年度の概算保険料又は未納の労働保険料その他の徴収金等に充当されるか、事業主に還付される。確定保険料については、【延納|還付|充当|分割納付】は認められていない。","exp":"法19条3項・6項。","page":101},{"law":"年度更新","cat":"労働保険料の還付請求","text":"事業主が、確定保険料申告書を提出する際に、又は認定決定の通知を受けた日の翌日から起算して【10日以内|20日以内|30日以内|15日以内】に超過額の還付を請求したときは、官署支出官又は所轄都道府県労働局資金前渡官吏が、その超過額を還付する。","exp":"則36条1項。還付加算金の制度はない。","page":102},{"law":"メリット制","cat":"メリット制の趣旨","text":"一定規模以上の事業については、納付した保険料額と支払われた保険給付等の額との比率(【収支率|保険料率|災害率|給付率】)に応じ、労災保険率又は確定保険料の額を、一定の範囲内で引き上げ又は引き下げをする。これをメリット制といい、雇用保険率には適用されない。","exp":"法12条3項。","page":106},{"law":"メリット制","cat":"継続事業のメリット制:収支率要件","text":"継続事業のメリット制は、連続する【3保険年度|2保険年度|5保険年度|4保険年度】間の収支率が【100分の85|100分の90|100分の80|100分の75】を超え、又は【100分の75|100分の70|100分の85|100分の80】以下である場合に適用される。","exp":"法12条3項、則17条。","page":107},{"law":"メリット制","cat":"継続事業のメリット制:事業継続要件","text":"継続事業のメリット制は、連続する3保険年度中の最後の保険年度に属する3月31日(基準日)において、労災保険に係る保険関係が成立した後【3年以上|2年以上|5年以上|1年以上】経過している事業であることが事業継続要件である。","exp":"法12条3項、則17条。","page":107},{"law":"メリット制","cat":"継続事業のメリット制:効果","text":"基準労災保険率から非業務災害率を減じた率を【100分の40|100分の45|100分の35|100分の30】の範囲内において厚生労働省令で定める率だけ引き上げ又は引き下げた率に非業務災害率を加えた率を、基準日の属する保険年度の【次の次の|次の|当該|3年後の】保険年度の労災保険率とする。","exp":"法12条3項。","page":110},{"law":"メリット制","cat":"特例メリット制","text":"中小事業主が労働者の安全又は衛生を確保するための措置を講じたときは、基準労災保険率から非業務災害率を減じた率を引き上げ又は引き下げる範囲を、【100分の45|100分の40|100分の35|100分の50】に拡大する。これを特例メリット制といい、当然には適用されず所定の手続を要する。","exp":"法12条の2。","page":112},{"law":"メリット制","cat":"有期事業のメリット制:適用要件","text":"有期事業のメリット制は、建設の事業又は立木の伐採の事業のうち、確定保険料の額が【40万円以上|75万円以上|100万円以上|160万円以上】である事業等が、収支率要件を満たす場合に適用され、確定保険料の額を引き上げ又は引き下げる。","exp":"法20条1項、則35条1項。","page":114},{"law":"メリット制","cat":"有期事業のメリット制:引上げ引下げ範囲","text":"有期事業のメリット制では、建設の事業については【100分の40|100分の35|100分の45|100分の30】の範囲内、立木の伐採の事業については【100分の35|100分の40|100分の30|100分の45】の範囲内で、確定保険料の額を引き上げ又は引き下げる。","exp":"則35条2項、別表6。非業務災害率に係る部分は対象外。","page":116},{"law":"印紙保険料","cat":"印紙保険料の納付方法","text":"印紙保険料は、雇用保険の日雇労働被保険者について、事業主が一般保険料のほかに、日雇労働被保険者手帳に、雇用保険印紙を貼付、【消印|割印|押印|検印】して納付する保険料である。","exp":"法22条等。","page":120},{"law":"印紙保険料","cat":"印紙保険料の額","text":"印紙保険料の額は、日雇労働被保険者1人につき1日当たり、賃金の日額に応じて、第1級【176円|146円|96円|180円】、第2級【146円|176円|96円|100円】、第3級【96円|146円|176円|76円】である。","exp":"法22条1項。","page":120},{"law":"印紙保険料","cat":"雇用保険印紙による納付","text":"事業主は、日雇労働被保険者を使用した場合には、その者に賃金を支払う都度、日雇労働被保険者手帳の該当日欄に雇用保険印紙をはり、【消印|割印|押印|検印】することによって、印紙保険料を納付しなければならない。","exp":"法23条1項・2項、則40条1項。","page":122},{"law":"印紙保険料","cat":"雇用保険印紙購入通帳","text":"事業主は、雇用保険印紙を購入しようとするときは、あらかじめ、雇用保険印紙購入通帳交付申請書を【所轄公共職業安定所長|所轄労働基準監督署長|所轄都道府県労働局長|郵便局長】に提出して、雇用保険印紙購入通帳の交付を受けなければならない。","exp":"則42条1項。","page":123},{"law":"印紙保険料","cat":"印紙保険料の認定決定","text":"事業主が印紙保険料の納付を怠った場合には、政府は、その事業主が納付すべき印紙保険料の額を決定し、納入告知書により事業主に通知する。認定決定に係る印紙保険料は、雇用保険印紙では納付することはできず、【現金|雇用保険印紙|納付書|口座振替】により納付しなければならない。","exp":"法25条1項、則38条3項・5項。","page":127},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金が徴収される場合","text":"事業主が認定決定に係る確定保険料又はその不足額を納付しなければならない場合等には、政府は追徴金を徴収する。【概算保険料|印紙保険料|確定保険料|一般保険料】については、認定決定された場合でも、追徴金は徴収されない。","exp":"法21条1項。","page":130},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金の額","text":"追徴金の額は、確定保険料については納付すべき額(1,000円未満切捨て)に【100分の10|100分の25|100分の5|100分の20】を乗じて得た額、印紙保険料については認定決定された額に【100分の25|100分の10|100分の20|100分の30】を乗じて得た額である。","exp":"法21条1項、25条2項。","page":131},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金の納期限","text":"所轄都道府県労働局歳入徴収官は、追徴金を徴収しようとする場合には、通知を発する日から起算して【30日|20日|15日|10日】を経過した日をその納期限と定め、納入告知書により、事業主に追徴金の額及び納期限を通知しなければならない。","exp":"法21条3項、則26条。","page":131},{"law":"追徴金・延滞金・不服申立て","cat":"督促","text":"労働保険料その他徴収法の規定による徴収金を納付しない者があるときは、政府は、期限を指定して督促しなければならない。督促状により指定すべき期限は、督促状を発する日から起算して【10日以上|14日以上|20日以上|7日以上】経過した日でなければならず、督促は滞納処分及び延滞金徴収の前提要件となる。","exp":"法27条、28条。","page":135},{"law":"追徴金・延滞金・不服申立て","cat":"延滞金","text":"政府は、労働保険料の納付を督促したときは、労働保険料の額に、納期限の翌日からその完納又は財産差押えの日の前日までの期間の日数に応じ、年【14.6%|7.3%|10.95%|9.0%】(当該納期限の翌日から【2箇月|3箇月|1箇月|6箇月】を経過する日までの期間については、年【7.3%|14.6%|2.4%|3.0%】)の割合を乗じて計算した延滞金を徴収する。","exp":"法28条1項。追徴金には延滞金は徴収されない。","page":136},{"law":"追徴金・延滞金・不服申立て","cat":"不服申立て","text":"労働保険料に関する処分その他徴収法の規定による行政庁の処分について不服がある場合には、行政不服審査法の規定に基づき【厚生労働大臣|労働保険審査会|社会保険審査官|都道府県労働局長】に審査請求をすることができる。不服申立ての前置がないので、審査請求をすることなく、処分取消しの訴えを提起することができる。","exp":"行政不服審査法。","page":158},{"law":"追徴金・延滞金・不服申立て","cat":"時効","text":"労働保険料その他徴収法の規定による徴収金を徴収し、又はその還付を受ける権利は、これらを行使することができる時から【2年|5年|3年|10年】を経過したときは、時効によって消滅する。政府が行う徴収の告知又は督促は、時効の【更新|完成猶予|停止|中断】の効力を生じる。","exp":"法41条。","page":159},{"law":"労働保険事務組合","cat":"労働保険事務組合の意義","text":"事業協同組合その他の事業主の団体又はその連合団体は、構成員である事業主その他厚生労働省令で定める事業主の委託を受けて、これらの者が行うべき労働保険料の納付その他の労働保険に関する事項(【印紙保険料|一般保険料|確定保険料|概算保険料】に関する事項を除く。労働保険事務という)を処理することができる。","exp":"法33条1項。","page":145},{"law":"労働保険事務組合","cat":"事務組合の認可","text":"事業主の団体又はその連合団体は、労働保険事務組合としての業務を行おうとするときは、【厚生労働大臣|都道府県労働局長|所轄公共職業安定所長|政府】の認可を受けなければならない。認可に係る権限は、都道府県労働局長に委任されている。","exp":"法33条2項。","page":145},{"law":"労働保険事務組合","cat":"委託できる事業規模要件","text":"労働保険事務組合に委託できるのは、金融業・保険業・不動産業・小売業は常時【50人以下|100人以下|30人以下|20人以下】、卸売業・サービス業は常時【100人以下|50人以下|300人以下|200人以下】、その他の事業は常時【300人以下|100人以下|500人以下|1000人以下】の労働者を使用する事業主であり、使用労働者数は【企業単位|事業場単位|事業主単位|事業所単位】で判断する。","exp":"法33条1項、則62条。","page":148},{"law":"労働保険事務組合","cat":"事務組合に対する通知等","text":"政府は、委託事業主に対してすべき労働保険料の納入の告知その他の通知及び還付金の還付については、これを労働保険事務組合に対してすることができ、事務組合に対してした通知等は、【委託事業主|労働保険事務組合|被保険者|政府】に対してしたものとみなされる。","exp":"法34条。","page":151},{"law":"労働保険事務組合","cat":"事務組合の納付責任","text":"事業主が労働保険料その他の徴収金の納付のため、金銭を労働保険事務組合に交付したときは、その【金額の限度|全額|2分の1の限度|交付額の2倍の限度】で、労働保険事務組合は、政府に対して当該徴収金の納付の責めに任ずる。","exp":"法35条1項。金銭の交付を受けていない分は責任を負わない。","page":152},{"law":"労働保険事務組合","cat":"報奨金","text":"政府は、当分の間、委託に基づき労働保険事務組合が納付すべき労働保険料が督促することなく完納されたとき等は、当該労働保険事務組合に対して、【予算の範囲内|必要な範囲内|相当の範囲内|全額の範囲】で、労働保険料に係る報奨金を交付することができる。","exp":"整備法23条、報奨金政令1条1項。","page":154},{"law":"労働保険事務組合","cat":"帳簿の備付け","text":"労働保険事務組合は、その処理する労働保険事務に関する事項を記載した帳簿を事務所に備えておかなければならず、労働保険料等徴収及び納付簿は【3年間|4年間|2年間|5年間】、雇用保険被保険者関係届出事務等処理簿は【4年間|3年間|2年間|5年間】保存しなければならない。","exp":"法36条、則68条、72条。","page":153}],"kenpo":[{"law":"総則","cat":"目的","text":"健康保険法は、労働者又はその被扶養者の【業務災害|労働災害|業務上の事由|通勤災害】以外の疾病、負傷もしくは死亡又は出産に関して保険給付を行い、もって国民の生活の安定と福祉の向上に寄与することを目的とする。","exp":"法1条。業務災害以外の事故を対象とする。","page":12},{"law":"総則","cat":"基本的理念","text":"健康保険制度については、これが【医療保険制度の基本|社会保障制度の基本|国民皆保険の中核|医療提供体制の基本】をなすものであることにかんがみ、その在り方に関して常に検討が加えられ、その結果に基づき、医療保険の運営の効率化、給付の内容及び費用の負担の適正化並びに国民が受ける医療の質の向上を総合的に図りつつ、実施されなければならない。","exp":"法2条。","page":14},{"law":"総則","cat":"法人の役員の特例","text":"被保険者又はその被扶養者が【法人の役員|事業主|使用者|代表者】であるときは、当該被保険者又はその被扶養者のその法人の役員としての業務に起因する疾病、負傷又は死亡に関して保険給付は、行わない。","exp":"法53条の2。","page":13},{"law":"総則","cat":"報酬の定義","text":"報酬とは、賃金、給料、俸給、手当、賞与その他いかなる名称であるかを問わず、労働者が、労働の対償として受けるすべてのものをいう。ただし、臨時に受けるもの及び【3箇月を超える期間ごとに受けるもの|1箇月を超える期間ごとに受けるもの|6箇月を超える期間ごとに受けるもの|毎月受けるもの】を除く。","exp":"法3条5項。","page":80},{"law":"保険者","cat":"保険者","text":"健康保険(日雇特例被保険者の保険を除く)の保険者は、【全国健康保険協会|国民健康保険組合|共済組合|日本年金機構】及び健康保険組合とする。","exp":"法4条。日雇特例被保険者の保険の保険者は全国健康保険協会のみ。","page":14},{"law":"保険者","cat":"協会管掌健康保険","text":"全国健康保険協会は、健康保険組合の組合員でない被保険者の保険を管掌する。協会が管掌する健康保険の事業に関する業務のうち、被保険者の資格の取得及び喪失の確認、標準報酬月額及び標準賞与額の決定並びに【保険料の徴収|保険給付の支給|被扶養者の認定|療養費の支給】(任意継続被保険者に係るものを除く)並びにこれらに附帯する業務は、厚生労働大臣が行う。","exp":"法5条。","page":15},{"law":"保険者","cat":"協会の事務所","text":"全国健康保険協会は、主たる事務所を【東京都|大阪府|各都道府県|厚生労働省内】に、従たる事務所(支部という)を各都道府県に設置する。","exp":"法7条の4。","page":16},{"law":"被保険者","cat":"被保険者の定義","text":"被保険者とは、適用事業所に使用される者及び【任意継続被保険者|日雇特例被保険者|特例退職被保険者|被扶養者】をいう。ただし、適用除外事由に該当する者は、日雇特例被保険者となる場合を除き、被保険者となることができない。","exp":"法3条1項。","page":53},{"law":"被保険者","cat":"適用事業所","text":"適用事業所とは、適用業種に該当する事業所であって、常時【5人以上|常時1人以上|10人以上|常時3人以上】の従業員を使用するもの、又は国、地方公共団体もしくは法人の事業所であって常時従業員を使用するものをいう。","exp":"法3条3項。","page":49},{"law":"被保険者","cat":"任意適用事業所","text":"適用事業所以外の事業所の事業主は、【厚生労働大臣の認可|都道府県知事の認可|保険者の承認|労働基準監督署長の許可】を受けて、当該事業所を適用事業所とすることができる。この認可を受けようとするときは、当該事業所に使用される者の【2分の1以上|過半数|3分の2以上|4分の3以上】の同意を得て、厚生労働大臣に申請しなければならない。","exp":"法31条。","page":50},{"law":"被保険者","cat":"資格取得の時期","text":"被保険者(任意継続被保険者を除く)は、【適用事業所に使用されるに至った日|適用事業所に使用された日の翌日|被保険者となることを申し出た日|資格取得届を提出した日】、その使用される事業所が適用事業所となった日、適用除外事由に該当しなくなった日のいずれかの日から、被保険者の資格を取得する。","exp":"法35条。","page":63},{"law":"被保険者","cat":"資格喪失の時期","text":"被保険者(任意継続被保険者を除く)は、死亡したとき、その事業所に使用されなくなったとき、適用除外事由に該当するに至ったときのいずれかに該当するに至った日の【翌日|当日|5日後|その月の末日】から、被保険者の資格を喪失する。","exp":"法36条。","page":64},{"law":"被保険者","cat":"資格取得届の期限","text":"事業主は、被保険者の資格を取得した者があるときは、当該事実があった日から【5日以内|10日以内|14日以内|20日以内】に、所定の事項を記載した資格取得届を日本年金機構又は健康保険組合に提出しなければならない。","exp":"則24条1項。","page":63},{"law":"被保険者","cat":"被扶養者の範囲","text":"被保険者の【直系尊属|直系卑属|祖父母のみ|父母のみ】、配偶者(事実上婚姻関係と同様の事情にある者を含む)、子、孫及び兄弟姉妹であって、主としてその被保険者により生計を維持するものは、被扶養者となる。","exp":"法3条7項。年齢要件はない。","page":73},{"law":"被保険者","cat":"被扶養者(3親等内)","text":"被保険者の【3親等内の親族|2親等内の親族|4親等内の親族|6親等内の親族】であって、その被保険者と【同一の世帯|同一の住居|同一生計|同居又は別居】に属し、主としてその被保険者により生計を維持するものは、被扶養者となる。","exp":"法3条7項。","page":73},{"law":"任意継続被保険者","cat":"資格要件","text":"適用事業所に使用されなくなったため等により被保険者の資格を喪失した者であって、資格の喪失の日の前日まで継続して【2箇月以上|1箇月以上|6箇月以上|1年以上】被保険者であった者は、保険者に申し出て、継続して当該保険者の被保険者となることができる。この被保険者を任意継続被保険者という。","exp":"法3条4項。","page":67},{"law":"任意継続被保険者","cat":"資格取得の申出","text":"任意継続被保険者の資格取得の申出は、被保険者の資格を喪失した日から【20日以内|14日以内|10日以内|1箇月以内】にしなければならない。保険者は、正当な理由があると認めるときは、20日を経過した後の申出であっても、受理することができる。","exp":"法37条1項。","page":67},{"law":"任意継続被保険者","cat":"資格取得の時期","text":"任意継続被保険者は、被保険者の【資格を喪失した日|資格を喪失した日の翌日|申出をした日|申出をした日の翌日】に、その資格を取得する。任意継続被保険者の資格取得の申出は、被保険者の資格を喪失した日から【20日以内|14日以内|10日以内|1箇月以内】にしなければならない。","exp":"昭2.2.1保理330号、法37条1項。","page":68},{"law":"任意継続被保険者","cat":"資格喪失","text":"任意継続被保険者は、任意継続被保険者となった日から起算して【2年を経過|1年を経過|3年を経過|65歳に達した】したとき、死亡したとき、保険料を納付期日までに納付しなかったとき等に、その資格を喪失する。","exp":"法38条。","page":68},{"law":"任意継続被保険者","cat":"保険料の負担","text":"任意継続被保険者は、保険料の【全額|2分の1|3分の2|4分の3】を負担する。一般の被保険者及び被保険者を使用する事業主は、それぞれ保険料額の【2分の1|3分の1|3分の2|全額】を負担するが、任意継続被保険者には事業主が存在しないためである。","exp":"法161条1項。","page":263},{"law":"標準報酬月額","cat":"等級区分","text":"標準報酬月額は、被保険者の報酬月額に基づき、標準報酬月額等級表の等級区分によって定める。標準報酬月額は、現在【50|49|47|30】の等級に区分されており、その月額は【58,000円|63,000円|88,000円|50,000円】を下限とし、【1,390,000円|1,210,000円|1,500,000円|1,355,000円】を上限としている。","exp":"法40条1項。第1級58,000円から第50級1,390,000円。","page":84},{"law":"標準報酬月額","cat":"等級区分の改定","text":"毎年3月31日における標準報酬月額等級の最高等級に該当する被保険者数の被保険者総数に占める割合が【100分の1.5|100分の1|100分の3|100分の2】を超える場合において、その状態が継続すると認められるときは、その年の【9月1日|4月1日|10月1日|翌年4月1日】から、政令で、当該最高等級の上に更に等級を加える標準報酬月額の等級区分の改定を行うことができる。","exp":"法40条2項。","page":85},{"law":"標準報酬月額","cat":"資格取得時決定","text":"保険者等は、被保険者の資格を取得した者があるときは、所定の額を【報酬月額|標準報酬月額|平均報酬|基本給】として、標準報酬月額を決定する。","exp":"法42条。","page":89},{"law":"標準報酬月額","cat":"定時決定","text":"定時決定により決定された標準報酬月額は、その年の【9月|10月|7月|4月】から翌年【8月|9月|翌年3月|翌年6月】までの各月の標準報酬月額とする。報酬月額は、原則として【4月、5月、6月|5月、6月、7月|3月、4月、5月|7月、8月、9月】に受けた報酬の総額を3で除して得た額による。","exp":"法41条。","page":90},{"law":"標準報酬月額","cat":"随時改定","text":"報酬月額に著しい変動が生じた場合に標準報酬月額を見直す決定を【随時改定|定時決定|資格取得時決定|臨時改定】という。育児休業等を終了した際の改定及び産前産後休業を終了した際の改定は、随時改定の要件を満たさなくとも、標準報酬月額を見直すことができるようにした規定である。","exp":"法43条等。","page":92},{"law":"標準賞与額","cat":"決定","text":"保険者等は、被保険者が賞与を受けた月において、その月に受けた賞与額に基づき、これに【1,000円未満|1円未満|100円未満|1万円未満】の端数を生じたときは、これを切り捨てて、標準賞与額を決定する。ただし、その年度における標準賞与額の累計額が【573万円|540万円|573,000円|600万円】を超えることとなる場合には、当該累計額が573万円となるようその月の標準賞与額を決定する。","exp":"法45条1項。年度は4月1日から翌年3月31日まで。累計は保険者単位。","page":104},{"law":"標準賞与額","cat":"賞与支払届","text":"事業主は、被保険者に賞与を支払ったときは、【5日以内|10日以内|翌月10日まで|14日以内】に、賞与額その他の事項を記載した賞与支払届を提出しなければならない。","exp":"則27条。","page":105},{"law":"療養の給付","cat":"療養の給付の範囲","text":"被保険者の疾病又は負傷に関しては、診察、薬剤又は治療材料の支給、処置、手術その他の治療、居宅における療養上の管理及びその療養に伴う世話その他の看護、【病院又は診療所への入院|介護施設への入所|自宅療養|訪問診療】及びその療養に伴う世話その他の看護の療養の給付を行う。","exp":"法63条1項。現物給付。","page":109},{"law":"療養の給付","cat":"受給方法","text":"療養の給付を受けようとする者は、自己の選定する保険医療機関等から【電子資格確認等|被保険者証の提出|本人確認書類の提示|マイナンバーの提示】により、被保険者であることの確認を受け、療養の給付を受けるものとする。","exp":"法63条3項。","page":113},{"law":"療養の給付","cat":"入院時食事療養費","text":"被保険者(特定長期入院被保険者を除く)が、自己の選定する病院又は診療所から、療養の給付と併せて受けた食事療養に要した費用について、入院時食事療養費を支給する。入院時食事療養費は【現物給付|現金給付|療養費|償還払い】として支給される。","exp":"法85条。","page":132},{"law":"療養の給付","cat":"入院時食事療養費の額","text":"入院時食事療養費の額は、食事療養に要する平均的な費用の額を勘案して厚生労働大臣が定める基準により算定した費用の額から、【食事療養標準負担額|一部負担金|生活療養標準負担額|自己負担限度額】を控除した額とする。","exp":"法85条2項。","page":132},{"law":"療養の給付","cat":"療養費","text":"保険者は、療養の給付等を行うことが困難であると認めるとき等は、療養の給付等に代えて、療養費を支給することができる。療養費の額は、療養に要した費用の額を【標準|限度|基準|上限】として保険者が定める。","exp":"法87条。","page":142},{"law":"療養の給付","cat":"移送費","text":"被保険者が療養の給付を受けるため、病院又は診療所に移送されたときは、移送費として、厚生労働省令で定めるところにより算定した金額を支給する。移送費は、保険者が必要であると認める場合に限り、支給される。【単なる通院|緊急の入院|医師の指示による転院|災害時の搬送】は支給対象とならない。","exp":"法97条、則81条。","page":152},{"law":"一部負担金","cat":"負担割合","text":"療養の給付を受ける者は、70歳に達する日の属する月以前である場合は【100分の30|100分の20|100分の10|100分の25】、70歳に達する日の属する月の翌月以後である場合は【100分の20|100分の30|100分の10|100分の25】、当該翌月以後であって報酬の額が政令で定める額以上であるとき(現役並み所得者)は【100分の30|100分の20|100分の10|100分の25】を、療養の給付に要する費用として算定した額に乗じて得た額を、一部負担金として支払わなければならない。","exp":"法74条1項。","page":120},{"law":"一部負担金","cat":"現役並み所得者","text":"療養の給付を受ける月の標準報酬月額が【28万円以上|53万円以上|26万円以上|50万円以上】である者は、現役並み所得者となる。ただし収入の額が520万円(被扶養者がいない者は383万円)に満たない者は除外申請ができる。","exp":"令34条。","page":120},{"law":"傷病手当金","cat":"支給要件","text":"被保険者(任意継続被保険者を除く)が療養のため労務に服することができないときは、その労務に服することができなくなった日から起算して【3日|4日|7日|2日】を経過した日から労務に服することができない期間、傷病手当金を支給する。","exp":"法99条1項。当初3日は待期期間。","page":154},{"law":"傷病手当金","cat":"待期","text":"待期期間は、労務不能となった日から起算して労務不能の日が【3日間継続|3日間通算|連続2日間|連続7日間】して満了する。待期が完成しない場合は不支給となる。有給休暇で処理した場合や公休日も待期の3日間に含めることができる。","exp":"法99条1項。","page":155},{"law":"傷病手当金","cat":"支給額","text":"傷病手当金の額は、1日につき、傷病手当金の支給を始める日の属する月以前の直近の継続した【12箇月間|6箇月間|3箇月間|24箇月間】の各月の標準報酬月額を平均した額の【30分の1|22分の1|31分の1|28分の1】に相当する額の【3分の2|2分の1|100分の60|10分の8】に相当する金額とする。","exp":"法99条2項。","page":156},{"law":"傷病手当金","cat":"支給期間","text":"傷病手当金の支給期間は、同一の疾病又は負傷及びこれにより発した疾病に関しては、その支給を始めた日から【通算して|継続して|連続して|累計で】【1年6箇月間|1年間|3年間|2年間】とする。労務不能となった当初の3日間(待期期間)は支給しない。","exp":"法99条4項。","page":158},{"law":"出産に関する給付","cat":"出産育児一時金","text":"被保険者が出産したときは、出産育児一時金として、政令で定める金額を支給する。支給対象となる出産は、妊娠【4箇月以上|85日以上|3箇月以上|6箇月以上】の出産に限られ、生産、死産、流産又は早産を問わず支給される。","exp":"法101条。","page":163},{"law":"出産に関する給付","cat":"出産育児一時金の額","text":"出産育児一時金の額は、政令で定める金額として【48万8,000円|50万円|42万円|40万4,000円】とし、加算対象出産であるときは、これに【3万円|1万2,000円|5万円|2万円】を超えない範囲内で保険者が定める額を加算した額とする。支給額は【一児につき|1回の出産につき|被保険者につき|世帯につき】規定された額である。","exp":"令36条。","page":164},{"law":"出産に関する給付","cat":"出産手当金","text":"被保険者(任意継続被保険者を除く)が出産したときは、出産の日以前【42日|56日|98日|44日】(多胎妊娠の場合においては【98日|42日|56日|84日】)から出産の日後【56日|42日|98日|84日】までの間において、労務に服さなかった期間、出産手当金を支給する。","exp":"法102条1項。","page":166},{"law":"出産に関する給付","cat":"出産手当金の額","text":"出産手当金の額は、支給を始める日の属する月以前の直近の継続した12箇月間の各月の標準報酬月額を平均した額の【30分の1|22分の1|31分の1|28分の1】に相当する額の【3分の2|2分の1|100分の60|10分の8】に相当する金額とする(傷病手当金の算定方法と同様)。","exp":"法102条2項。","page":166},{"law":"出産に関する給付","cat":"傷病手当金との調整","text":"出産手当金を支給する場合においては、その期間、傷病手当金は支給しない。これにより受けられる出産手当金の額が傷病手当金の額より少ないときは、その【差額|全額|合算額|2分の1】を支給する。","exp":"法103条。","page":167},{"law":"出産に関する給付","cat":"継続給付(傷病手当金・出産手当金)","text":"傷病手当金又は出産手当金の継続給付は、被保険者の資格を喪失した日の前日まで引き続き【1年以上被保険者|2箇月以上被保険者|6箇月以上被保険者|3年以上被保険者】であったこと、及びその資格を喪失した際に傷病手当金又は出産手当金の支給を受けている者であることに該当する場合に支給される。","exp":"法104条。","page":174},{"law":"高額療養費","cat":"支給要件(大枠)","text":"療養の給付について支払われた一部負担金の額等から所定の額を控除した額(一部負担金等の額)が【著しく高額|高額療養費算定基準額を超えて高額|一定額を超えて高額|政令で定める額以上で高額】であるときは、その給付を受けた者に対し、高額療養費を支給する。","exp":"法115条。詳細は政令で定める。","page":191},{"law":"高額療養費","cat":"70歳未満世帯合算","text":"被保険者又はその被扶養者が受けた療養に係る一部負担金等世帯合算額が高額療養費算定基準額を超える場合に、高額療養費を支給する。合算の対象となるのは、一部負担金等の額が【21,000円以上|10,000円以上|44,400円以上|25,000円以上】のものに限る。","exp":"令41条。","page":192},{"law":"高額療養費","cat":"長期高額特定疾病","text":"被保険者又はその被扶養者が厚生労働大臣の定める特定疾病に係る療養を受けた場合(長期高額特定疾病患者)は、同一の月に一の病院等から受けた当該療養に係る一部負担金等の額が【10,000円|20,000円|21,000円|44,400円】を超えるときは、その超えた額が高額療養費として支給される。","exp":"令42条。","page":196},{"law":"高額療養費","cat":"高額介護合算療養費","text":"健康保険の一部負担金等の額を合算した額及び介護保険の介護サービス利用者負担額等の合計額が著しく高額である場合に、【高額介護合算療養費|高額療養費|高額介護サービス費|介護合算給付】を支給する。","exp":"法115条の2。","page":202},{"law":"保険料","cat":"被保険者の保険料額","text":"被保険者に関する保険料額は、各月について、被保険者が介護保険第2号被保険者であるときは一般保険料等額と【介護保険料額|特定保険料額|基本保険料額|調整保険料額】との合算額、それ以外の被保険者であるときは一般保険料等額とする。","exp":"法156条1項。","page":245},{"law":"保険料","cat":"協会けんぽの一般保険料率","text":"全国健康保険協会が管掌する健康保険の被保険者に関する一般保険料率は、【1000分の30|1000分の40|1000分の3|1000分の50】から【1000分の130|1000分の120|1000分の100|1000分の82】までの範囲内において、支部被保険者を単位として全国健康保険協会が決定する。","exp":"法160条1項。","page":246},{"law":"保険料","cat":"組合の一般保険料率","text":"健康保険組合が管掌する健康保険の被保険者に関する一般保険料率は、【1000分の30|1000分の40|1000分の3|1000分の50】から【1000分の130|1000分の120|1000分の100|1000分の95】までの範囲内において、決定する。","exp":"法160条13項。","page":247},{"law":"保険料","cat":"一般保険料率の構成","text":"一般保険料率とは、基本保険料率と【特定保険料率|介護保険料率|調整保険料率|後期高齢者支援金率】とを合算した率をいう。","exp":"法156条1項。","page":245},{"law":"保険料","cat":"介護保険料率","text":"介護保険料率は、各年度において保険者が納付すべき【介護納付金|介護給付費|介護負担金|後期高齢者支援金】の額を、当該年度における当該保険者が管掌する介護保険第2号被保険者である被保険者の総報酬額の総額の見込額で除して得た率を基準として、保険者が定める。","exp":"法160条16項。","page":250},{"law":"保険料","cat":"保険料の負担","text":"被保険者及び被保険者を使用する事業主は、それぞれ保険料額の【2分の1|3分の1|3分の2|全額】を負担する。任意継続被保険者は、その【全額|2分の1|3分の2|4分の3】を負担する。","exp":"法161条1項。","page":260},{"law":"通則・その他","cat":"埋葬料","text":"被保険者が死亡したときは、その者により生計を維持していた者であって、【埋葬を行う者|遺族|親族|喪主】に対し、埋葬料として、政令で定める金額を支給する。死亡の原因が自殺であっても、埋葬料は支給される。","exp":"法100条1項。","page":160},{"law":"通則・その他","cat":"埋葬の費用の支給","text":"被保険者が死亡したが、埋葬料の支給を受けるべき者がない場合においては、【埋葬を行った者|埋葬を行う予定の者|遺族|生計維持者】に対し、埋葬に要した費用に相当する金額を支給する。","exp":"法100条2項。","page":160},{"law":"通則・その他","cat":"時効","text":"保険料等を徴収し、又はその還付を受ける権利及び保険給付を受ける権利は、これらを行使することができる時から【2年|5年|3年|10年】を経過したときは、時効によって消滅する。","exp":"法193条1項。","page":293},{"law":"通則・その他","cat":"審査請求の期限","text":"被保険者の資格又は標準報酬に関する処分に対する審査請求は、原処分があった日の翌日から起算して【2年|3箇月|1年|6箇月】を経過したときは、することができない。","exp":"法189条。","page":282},{"law":"通則・その他","cat":"国庫補助(協会けんぽ)","text":"国庫は、毎年度、健康保険事業の事務の執行に要する費用を負担するほか、全国健康保険協会が管掌する健康保険の主な保険給付等に要する費用の額に【1000分の164|1000分の130|1000分の200|1000分の160】を乗じて得た額を補助する。","exp":"法151条・153条。","page":238}],"kokunen":[{"law":"総則","cat":"目的","text":"国民年金制度は、日本国憲法第二十五条第二項に規定する理念に基づき、老齢、障害又は死亡によつて国民生活の安定がそこなわれることを国民の【共同連帯|相互扶助|社会連帯|連帯責任】によつて防止し、もつて健全な国民生活の維持及び向上に寄与することを目的とする。","exp":"法1条。目的条文。憲法25条2項の理念に基づく。","page":14},{"law":"総則","cat":"国民年金の給付","text":"国民年金は、前条の目的を達成するため、国民の老齢、障害又は死亡に関して必要な【給付|保険給付|年金給付|年金】を行うものとする。","exp":"法2条。保険給付とはいわず給付という。","page":14},{"law":"総則","cat":"管掌","text":"国民年金事業は、【政府|厚生労働大臣|日本年金機構|市町村】が、管掌する。","exp":"法3条1項。保険者は政府だけ。国民年金基金は保険者ではない。","page":15},{"law":"総則","cat":"財政の均衡","text":"国民年金事業の財政は、【長期的|短期的|中期的|年度ごと】にその均衡が保たれたものでなければならず、著しくその均衡を失すると見込まれる場合には、速やかに所要の措置が講ぜられなければならない。","exp":"法4条の2。財政検証の基本理念。","page":30},{"law":"総則","cat":"財政の現況及び見通し","text":"政府は、少なくとも【五年|三年|十年|毎年】ごとに、保険料及び国庫負担の額並びに国民年金法による給付に要する費用の額その他の国民年金事業の財政に係る収支についてその現況及び財政均衡期間における見通しを作成しなければならない。","exp":"法4条の3。財政均衡期間はおおむね100年間。","page":31},{"law":"総則","cat":"保険料納付済期間","text":"保険料納付済期間とは、第一号被保険者としての被保険者期間のうち納付された保険料に係るもの及び産前産後期間の保険料免除の規定により納付することを要しないものとされた保険料に係るもの、【第二号被保険者|任意加入被保険者|特例任意加入被保険者|被用者】としての被保険者期間並びに第三号被保険者としての被保険者期間を合算した期間をいう。","exp":"法5条1項。","page":26},{"law":"総則","cat":"保険料免除期間","text":"保険料免除期間とは、保険料全額免除期間、【保険料四分の三免除期間|保険料三分の二免除期間|保険料四分の一納付期間|保険料三分の一免除期間】、保険料半額免除期間及び保険料四分の一免除期間を合算した期間をいう。","exp":"法5条2項。第1号被保険者期間についてのみ存在する。","page":26},{"law":"総則","cat":"配偶者の定義","text":"配偶者、夫及び妻には、婚姻の届出をしていないが、事実上【婚姻関係と同様の事情にある者|内縁関係にある者|同居している者|生計を一にする者】を含むものとする。","exp":"法5条7項。事実婚を含む。","page":25},{"law":"被保険者","cat":"第1号被保険者","text":"日本国内に住所を有する【二十歳以上|十八歳以上|十五歳以上|二十歳】【六十歳未満|六十五歳未満|七十歳未満|六十歳以下】の者であつて、第二号被保険者及び第三号被保険者のいずれにも該当しないもの(被用者年金の老齢給付等を受けることができる者等を除く)を第一号被保険者とする。","exp":"法7条1項1号。自営業者、学生など。","page":40},{"law":"被保険者","cat":"第2号被保険者","text":"【厚生年金保険|健康保険|共済組合|被用者年金】の被保険者を第二号被保険者とする。ただし、六十五歳以上の者にあつては、老齢給付等の受給権を有しない者に限る。","exp":"法7条1項2号、附則3条。国内居住要件・国籍要件はない。","page":41},{"law":"被保険者","cat":"第3号被保険者","text":"第二号被保険者の配偶者であつて主として第二号被保険者の収入により生計を維持するもの(被扶養配偶者)のうち【二十歳以上|十八歳以上|十六歳以上|二十歳】【六十歳未満|六十五歳未満|七十歳未満|六十歳以下】の者を第三号被保険者とする。","exp":"法7条1項3号。専業主婦・主夫など。","page":42},{"law":"被保険者","cat":"任意加入被保険者","text":"日本国内に住所を有する【六十歳以上|六十五歳以上|五十五歳以上|二十歳以上】【六十五歳未満|七十歳未満|六十歳未満|六十五歳以下】の者は、厚生労働大臣に申し出て、被保険者となることができる。","exp":"法附則5条1項。受給資格期間や年金額の確保のため。","page":43},{"law":"被保険者","cat":"資格取得(第1号)","text":"第一号被保険者は、【二十歳に達したとき|十八歳に達したとき|二十歳に達した日の翌日|二十五歳に達したとき】、又は日本国内に住所を有するに至つたときに、その日に被保険者の資格を取得する。","exp":"法8条。20歳に達した日は誕生日の前日。","page":46},{"law":"被保険者","cat":"資格喪失(第1号)","text":"第一号被保険者は、死亡したときはその翌日に、日本国内に住所を有しなくなつたときはその翌日に、【六十歳に達したとき|六十五歳に達したとき|六十歳に達した日の翌日|五十五歳に達したとき】はその日に、被保険者の資格を喪失する。","exp":"法9条。","page":48},{"law":"被保険者","cat":"被保険者期間の計算","text":"被保険者期間を計算する場合には、月によるものとし、被保険者の資格を取得した日の属する月からその資格を喪失した日の属する月の【前月|当月|翌月|前々月】までをこれに算入する。","exp":"法11条1項。暦月単位。","page":54},{"law":"被保険者","cat":"同月得喪","text":"被保険者の資格を取得した日の属する月にその資格を喪失したときは、その月を【一箇月|算入しない期間|二箇月|半月】として被保険者期間に算入する。","exp":"法11条2項。","page":54},{"law":"被保険者","cat":"届出義務","text":"被保険者(第三号被保険者を除く)は、その資格の取得及び喪失に関する事項、種別の変更に関する事項並びに氏名及び住所の変更に関する事項を【市町村長|厚生労働大臣|日本年金機構|都道府県知事】に届け出なければならない。","exp":"法12条1項。第2号被保険者には届出規定は適用されない。","page":56},{"law":"給付通則","cat":"給付の種類","text":"国民年金の給付は、老齢基礎年金、障害基礎年金、遺族基礎年金、付加年金、【寡婦年金|脱退一時金|加給年金|中高齢寡婦加算】及び死亡一時金とする。","exp":"法15条。基礎年金と第1号被保険者期間に係る独自給付。","page":78},{"law":"給付通則","cat":"裁定","text":"給付を受ける権利は、その権利を有する者(受給権者)の請求に基づいて、【厚生労働大臣|日本年金機構|市町村長|政府】が裁定する。","exp":"法16条。請求手続が必要。","page":80},{"law":"給付通則","cat":"端数処理","text":"年金給付を受ける権利を裁定する場合等において、年金給付の額に【五十銭未満|一円未満|五十円未満|五銭未満】の端数が生じたときはこれを切り捨て、五十銭以上一円未満の端数が生じたときはこれを【一円|十円|五十銭|百円】に切り上げる。","exp":"法17条1項。","page":81},{"law":"給付通則","cat":"支払期月","text":"年金給付は、毎年【二月|一月|三月|二月及び八月】、四月、六月、八月、十月及び十二月の六期に、それぞれの前月までの分を支払う。","exp":"法18条3項。","page":83},{"law":"給付通則","cat":"死亡の推定","text":"船舶が沈没し転覆し滅失し若しくは行方不明となつた際現にその船舶に乗つていた者等の生死が【三箇月間|一箇月間|六箇月間|一年間】わからない場合等には、死亡を支給事由とする給付に関する規定の適用については、その事故にあつた日に死亡したものと【推定|みなす|確定|認定】する。","exp":"法18条の3。","page":84},{"law":"給付通則","cat":"未支給年金の請求権者","text":"未支給の年金の支給を請求することができるのは、受給権者の死亡の当時その者と生計を同じくしていたその者の配偶者、子、父母、孫、祖父母、兄弟姉妹又はこれらの者以外の【三親等内の親族|二親等内の親族|四親等内の親族|六親等内の親族】である。","exp":"法19条1項。","page":86},{"law":"給付通則","cat":"併給の調整","text":"年金給付(老齢基礎年金等を除く)は、その受給権者が他の年金給付又は厚生年金保険法による年金たる保険給付を受けることができるときは、その間、その支給を【停止|減額|調整|打切り】する。","exp":"法20条1項。一人一年金の原則。","page":92},{"law":"給付通則","cat":"受給権の保護","text":"給付を受ける権利は、譲り渡し、【担保に供し|質入れし|貸し付け|相続させ】、又は差し押えることができない。ただし、老齢基礎年金又は付加年金を受ける権利を国税滞納処分により差し押える場合は、この限りでない。","exp":"法24条。","page":97},{"law":"給付通則","cat":"公課の禁止","text":"租税その他の公課は、給付として支給を受けた金銭を標準として、課することができない。ただし、【老齢基礎年金|障害基礎年金|遺族基礎年金|寡婦年金】、付加年金、脱退一時金又は特別一時金については、この限りでない。","exp":"法25条。","page":97},{"law":"老齢基礎年金","cat":"支給要件","text":"老齢基礎年金は、保険料納付済期間又は保険料免除期間を有する者が【六十五歳|六十歳|七十歳|六十五歳未満】に達したときに、その者に支給する。ただし、その者の保険料納付済期間と保険料免除期間とを合算した期間が【十年|二十五年|五年|十五年】に満たないときは、この限りでない。","exp":"法26条。10年の要件を受給資格期間という。","page":109},{"law":"老齢基礎年金","cat":"年金額(満額)","text":"老齢基礎年金の額は、【七十八万九百円|七十八万円|八十一万六千円|七十二万円】に改定率を乗じて得た額とする。","exp":"法27条。20歳から60歳までの40年間保険料を納付した場合の満額。","page":119},{"law":"老齢基礎年金","cat":"満額以外の年金額","text":"保険料納付済期間の月数が【四百八十|四百二十|三百六十|五百四十】に満たない者については、七十八万九百円に改定率を乗じて得た額に、保険料納付済期間の月数等を合算した月数を四百八十で除して得た数を乗じて得た額とする。","exp":"法27条。フルペンション減額方式。","page":120},{"law":"老齢基礎年金","cat":"保険料納付済期間(第2号)","text":"老齢基礎年金の額の計算における保険料納付済期間には、第二号被保険者としての被保険者期間のうち【二十歳以上|十八歳以上|十六歳以上|二十歳】【六十歳未満|六十五歳未満|七十歳未満|六十歳以下】の期間が算入される。","exp":"法附則。20歳未満・60歳以後の第2号期間は合算対象期間。","page":111},{"law":"老齢基礎年金","cat":"支給の繰上げ","text":"老齢基礎年金の受給権を有する者は、【六十五歳|六十歳|七十歳|六十六歳】に達する前に、厚生労働大臣に老齢基礎年金の繰上げ支給の請求をすることができ、その額は繰上げ月数に応じて減額される。","exp":"法附則9条の2。請求は取消し不可。","page":128},{"law":"老齢基礎年金","cat":"繰上げの減額率","text":"繰上げ支給の老齢基礎年金の減額率は、【千分の四|千分の五|千分の七|百分の四】に繰上げ月数を乗じて得た率とする。","exp":"令12条。繰上げ月数の最高は60、減額率の最高は24%。0.4%×繰上げ月数。","page":129},{"law":"老齢基礎年金","cat":"支給の繰下げ","text":"老齢基礎年金の受給権を有する者であつて【六十六歳|六十五歳|七十歳|六十七歳】に達する前に当該老齢基礎年金を請求していなかつたものは、厚生労働大臣に老齢基礎年金の繰下げ支給の申出をすることができる。","exp":"法28条1項。本則に規定。","page":136},{"law":"老齢基礎年金","cat":"繰下げの増額率","text":"繰下げ支給の老齢基礎年金の増額率は、【千分の七|千分の四|千分の五|百分の七】に繰下げ月数を乗じて得た率とし、繰下げ月数は最大【百二十|六十|百八十|百】月とする。","exp":"法28条4項、令4条の5。0.7%×繰下げ月数。最大75歳。","page":138},{"law":"老齢基礎年金","cat":"繰下げみなし(75歳)","text":"六十六歳に達した日後に繰下げの申出をした者が【七十五歳|七十歳|八十歳|七十二歳】に達した日後にある者である場合、七十五歳に達した日において、支給繰下げの申出があつたものとみなす。","exp":"法28条1項。繰下げの上限は75歳。","page":137},{"law":"老齢基礎年金","cat":"失権","text":"老齢基礎年金の受給権は、受給権者が【死亡したとき|婚姻をしたとき|六十五歳に達したとき|養子となつたとき】は、消滅する。","exp":"法29条。死亡以外の事由では消滅しない。","page":139},{"law":"付加年金","cat":"支給要件","text":"付加年金は、付加保険料に係る保険料納付済期間を有する者が【老齢基礎年金|障害基礎年金|遺族基礎年金|寡婦年金】の受給権を取得したときに、その者に支給する。","exp":"法43条。第1号被保険者の独自給付。","page":144},{"law":"付加年金","cat":"年金額","text":"付加年金の額は、【二百円|四百円|百円|三百円】に付加保険料に係る保険料納付済期間の月数を乗じて得た額とする。","exp":"法44条。改定率の規定は適用されない。","page":144},{"law":"付加年金","cat":"支給停止","text":"付加年金は、老齢基礎年金がその【全額|一部|半額|四分の三】につき支給を停止されているときは、その間、その支給を停止する。","exp":"法47条。","page":145},{"law":"付加年金","cat":"付加保険料","text":"【第一号被保険者|第二号被保険者|第三号被保険者|任意加入被保険者】は、厚生労働大臣に申し出て、その申出をした日の属する月以後の各月につき、【四百円|二百円|三百円|五百円】の付加保険料を納付する者となることができる。","exp":"法87条の2第1項。月額400円。","page":210},{"law":"障害基礎年金","cat":"初診日要件","text":"障害基礎年金は、初診日において被保険者であること、又は被保険者であつた者であつて日本国内に住所を有し【六十歳以上|六十五歳以上|五十五歳以上|二十歳以上】【六十五歳未満|七十歳未満|六十歳未満|六十五歳以下】であることのいずれかに該当する者に支給される。","exp":"法30条1項。","page":149},{"law":"障害基礎年金","cat":"障害認定日","text":"障害認定日とは、初診日から起算して【一年六月|一年|二年|六月】を経過した日(その期間内にその傷病が治つた場合においては、その治つた日)をいう。","exp":"法30条1項。治った日には症状固定日を含む。","page":149},{"law":"障害基礎年金","cat":"障害等級","text":"障害等級は、障害の程度に応じて重度のものから一級及び【二級|三級|二級及び三級|一級のみ】とし、各級の障害の状態は、政令で定める。","exp":"法30条2項。精神の障害も対象。","page":149},{"law":"障害基礎年金","cat":"保険料納付要件","text":"初診日の前日において、当該初診日の属する月の【前々月|前月|当月|三月前】までに被保険者期間がある場合は、当該被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が、当該被保険者期間の【三分の二以上|二分の一以上|四分の三以上|三分の一以上】であること。","exp":"法30条1項。","page":150},{"law":"障害基礎年金","cat":"保険料納付要件の特例","text":"初診日が【令和十八年四月一日前|令和八年四月一日前|令和十六年四月一日前|令和二十八年四月一日前】にある傷病による障害については、初診日の属する月の前々月までの【一年間|二年間|六月間|三年間】のうちに保険料納付済期間及び保険料免除期間以外の被保険者期間がないときは、保険料納付要件を満たしたものとされる。","exp":"昭60法附則20条1項。直近1年要件。","page":150},{"law":"障害基礎年金","cat":"事後重症","text":"障害認定日において障害等級に該当しなかつた者が、その日後【六十五歳|六十歳|七十歳|六十五歳未満】に達する日の前日までの間において障害等級に該当する程度の障害の状態に至つたときは、その者は、その期間内に請求することができる。","exp":"法30条の2。請求により受給権発生。","page":151},{"law":"障害基礎年金","cat":"20歳前傷病","text":"初診日において【二十歳未満|十八歳未満|二十歳以下|二十歳に達する前】であつた者が、障害認定日以後に二十歳に達したときは二十歳に達した日において、障害等級に該当する程度の障害の状態にあるときは、その者に障害基礎年金を支給する。","exp":"法30条の4。保険料拠出を前提としない給付。","page":155},{"law":"障害基礎年金","cat":"年金額","text":"障害基礎年金の額は、一級については七十八万九百円に改定率を乗じて得た額の【百分の百二十五|百分の百二十|百分の百五十|百分の百七十五】に相当する額、二級については七十八万九百円に改定率を乗じて得た額とする。","exp":"法33条。被保険者期間の長短にかかわらず定額。","page":160},{"law":"障害基礎年金","cat":"加算額","text":"障害基礎年金の額は、受給権者によつて生計を維持しているその者の子(【十八歳に達する日以後の最初の三月三十一日|十八歳未満|十五歳に達する日以後の最初の三月三十一日|二十歳に達する日以後の最初の三月三十一日】までの間にある子、又は二十歳未満であつて障害等級に該当する障害の状態にある子)があるときは、加算した額とする。","exp":"法33条の2第1項。","page":161},{"law":"障害基礎年金","cat":"併合認定","text":"障害基礎年金の受給権者に対して更に障害基礎年金を支給すべき事由が生じたときは、前後の障害を併合した障害の程度による障害基礎年金を支給する。この場合、従前の障害基礎年金の受給権は【消滅|停止|存続|調整】する。","exp":"法31条。","page":158},{"law":"遺族基礎年金","cat":"支給要件","text":"遺族基礎年金は、被保険者が死亡したとき、被保険者であつた者であつて日本国内に住所を有し【六十歳以上|六十五歳以上|五十五歳以上|二十歳以上】【六十五歳未満|七十歳未満|六十歳未満|六十五歳以下】の者が死亡したとき等に、その者の配偶者又は子に支給する。","exp":"法37条。","page":170},{"law":"遺族基礎年金","cat":"死亡日要件(長期)","text":"保険料納付済期間と保険料免除期間とを合算した期間が【二十五年以上|十年以上|二十年以上|四十年以上】である者が死亡したときは、その者の配偶者又は子に遺族基礎年金を支給する。","exp":"法37条。長期要件では保険料納付要件は問われない。","page":170},{"law":"遺族基礎年金","cat":"遺族の範囲(配偶者)","text":"遺族基礎年金を受けることができる配偶者は、被保険者又は被保険者であつた者の死亡の当時その者によつて生計を維持し、かつ、遺族の範囲に属する【子と生計を同じく|子を有|子と同居|生計を維持】する配偶者とする。","exp":"法37条の2第1項。子のある配偶者。","page":173},{"law":"遺族基礎年金","cat":"遺族の範囲(子)","text":"遺族基礎年金を受けることができる子は、被保険者等の死亡の当時その者によつて生計を維持し、【十八歳に達する日以後の最初の三月三十一日|十八歳未満|十五歳に達する日以後の最初の三月三十一日|二十歳に達する日以後の最初の三月三十一日】までの間にあるか又は二十歳未満であつて障害等級に該当する障害の状態にあり、かつ、現に婚姻をしていない子とする。","exp":"法37条の2第1項。","page":173},{"law":"遺族基礎年金","cat":"基本年金額","text":"遺族基礎年金の額(基本年金額)は、【七十八万九百円|七十八万円|八十一万六千円|七十二万円】に改定率を乗じて得た額とする。","exp":"法38条。保険料納付済期間の月数等にかかわらず定額。","page":174},{"law":"遺族基礎年金","cat":"加算額","text":"配偶者に支給する遺族基礎年金の額は、基本年金額に、生計を同じくする子につきそれぞれ【七万四千九百円|二十二万四千七百円|二万四千九百円|七万四千円】に改定率を乗じて得た額(そのうち【二人|一人|三人|二人目以降】までについてはそれぞれ【二十二万四千七百円|七万四千九百円|二十二万四千円|二十八万四千七百円】に改定率を乗じて得た額)を加算した額とする。","exp":"法39条1項。","page":175},{"law":"遺族基礎年金","cat":"子の支給停止","text":"子に対する遺族基礎年金は、配偶者が遺族基礎年金の受給権を有するとき、又は生計を同じくするその子の父若しくは母があるときは、その間、その【支給を停止|失権|減額|併給調整】する。","exp":"法41条2項。配偶者に優先支給。","page":177},{"law":"遺族基礎年金","cat":"失権","text":"遺族基礎年金の受給権は、受給権者が死亡したとき、【婚姻をしたとき|六十五歳に達したとき|障害が軽減したとき|所得が増加したとき】、又は直系血族若しくは直系姻族以外の者の養子となつたときは、消滅する。","exp":"法40条1項。配偶者と子に共通の失権事由。","page":179},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金の支給要件","text":"寡婦年金は、第一号被保険者としての被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が【十年以上|二十五年以上|二十年以上|五年以上】である夫が死亡した場合において、夫の死亡の当時夫によつて生計を維持し、かつ、夫との婚姻関係が【十年以上|二十五年以上|五年以上|三年以上】継続した【六十五歳未満|六十歳未満|七十歳未満|六十五歳以下】の妻に支給する。","exp":"法49条1項。妻への所得保障、保険料の掛け捨て防止。","page":182},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金の額","text":"寡婦年金の額は、夫の死亡日の属する月の前月までの第一号被保険者としての被保険者期間について老齢基礎年金の額の計算の例によつて計算した額の【四分の三|二分の一|三分の二|四分の一】に相当する額とする。","exp":"法50条。付加保険料は反映されない。","page":184},{"law":"寡婦年金・死亡一時金","cat":"寡婦年金の失権","text":"寡婦年金の受給権は、妻が【六十五歳|六十歳|七十歳|六十五歳未満】に達したとき、死亡したとき、婚姻をしたとき、又は繰上げ支給の老齢基礎年金の受給権を取得したときは、消滅する。","exp":"法51条、附則9条の2。","page":184},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金の支給要件","text":"死亡一時金は、第一号被保険者としての被保険者期間に係る保険料納付済期間の月数等を合算した月数が【三十六月以上|二十五年以上|三年|六十月以上】である者が死亡した場合において、その者が老齢基礎年金又は障害基礎年金の支給を受けたことがないときに、その遺族に支給する。","exp":"法52条の2第1項。保険料の掛け捨て防止。","page":185},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金の遺族の範囲","text":"死亡一時金を受けることができる遺族は、死亡した者の配偶者、子、父母、孫、祖父母又は兄弟姉妹であつて、その者の死亡の当時その者と【生計を同じくしていた|生計を維持していた|同居していた|扶養されていた】ものとする。","exp":"法52条の3第1項。受給順位は配偶者、子、父母、孫、祖父母、兄弟姉妹。","page":187},{"law":"寡婦年金・死亡一時金","cat":"死亡一時金と寡婦年金の調整","text":"同一人の死亡について寡婦年金の支給を受けることができる者が死亡一時金の支給を受けることができる場合には、その者の【選択|併給|按分|順位】により、その一を支給し、他は支給しない。","exp":"法52条の6。","page":188},{"law":"保険料・免除","cat":"保険料の額","text":"保険料の額は、年度ごとにあらかじめ定められた額(法定額)に【保険料改定率|改定率|物価変動率|保険料率】を乗じて得た額とする。","exp":"法87条3項。令和8年度の保険料額は17,920円。","page":208},{"law":"保険料・免除","cat":"納付義務","text":"被保険者は、保険料を納付しなければならない。【世帯主|配偶者|事業主|親権者】は、その世帯に属する被保険者の保険料を連帯して納付する義務を負う。","exp":"法88条。配偶者の一方も連帯納付義務を負う。","page":211},{"law":"保険料・免除","cat":"産前産後免除","text":"被保険者が出産の予定日の属する月(出産予定月)の【前月|前々月|当月|二月前】(多胎妊娠の場合は【三月前|二月前|四月前|六月前】)から出産予定月の【翌々月|翌月|三月後|当月】までの期間に係る保険料は、納付することを要しない。","exp":"法88条の2。産前産後保険料免除期間は保険料納付済期間に算入。","page":212},{"law":"保険料・免除","cat":"法定免除","text":"被保険者が【障害基礎年金|障害厚生年金|老齢基礎年金|遺族基礎年金】の受給権者であるとき、生活保護法による生活扶助を受けるとき等に該当するに至つたときは、その期間に係る保険料は、既に納付されたものを除き、納付することを要しない。","exp":"法89条1項。法定免除。","page":214},{"law":"保険料・免除","cat":"申請全額免除","text":"【前年の所得|前々年の所得|当年の所得見込み|世帯の所得】が、その者の扶養親族等の有無及び数に応じて政令で定める額以下であるとき等に該当する被保険者から申請があつたときは、厚生労働大臣は、その指定する期間に係る保険料につき、これを納付することを要しないものとし、当該期間を保険料全額免除期間に算入することができる。","exp":"法90条1項。所得基準は(扶養親族等の数+1)×35万円+32万円。","page":216},{"law":"保険料・免除","cat":"保険料一部免除","text":"申請に基づき厚生労働大臣が行う保険料一部免除には、その【四分の三|三分の二|四分の一|半額】を納付することを要しないものとする処分、その半額を納付することを要しないものとする処分、その四分の一を納付することを要しないものとする処分がある。","exp":"法90条の2。多段階免除。","page":218},{"law":"保険料・免除","cat":"学生納付特例","text":"学生等である被保険者であつて前年の所得が政令で定める額以下であるとき等に該当する者から申請があつたときは、厚生労働大臣は、その指定する期間に係る保険料につき、これを納付することを要しないものとすることができる。この学生納付特例期間は、老齢基礎年金の受給資格期間には算入されるが、年金額には【反映されない|反映される|二分の一が反映される|全額反映される】。","exp":"法90条の3。本人の所得で判定。","page":220},{"law":"保険料・免除","cat":"保険料の納期限","text":"毎月の保険料は、【翌月末日|当月末日|翌々月末日|翌月十日】までに、納付しなければならない。","exp":"法91条。","page":226},{"law":"保険料・免除","cat":"前納","text":"被保険者は、将来の一定期間の保険料を前納することができる。前納は、原則として【六月|一月|三月|二年】又は年を単位として行う。","exp":"法93条1項、令7条。前納額は割引される。","page":230},{"law":"保険料・免除","cat":"追納","text":"被保険者又は被保険者であつた者は、厚生労働大臣の承認を受け、保険料免除等の規定により納付することを要しないものとされた保険料の全部又は一部につき追納することができる。追納できる保険料は、承認の日の属する月前【十年以内|二年以内|五年以内|三年以内】の期間に係るものに限る。","exp":"法94条1項。老齢基礎年金の受給権者は追納できない。","page":233},{"law":"国民年金基金","cat":"基金の給付","text":"国民年金基金は、国民年金法の目的を達成するため、加入員の【老齢|障害|死亡|老齢及び障害】に関して必要な給付を行う。","exp":"法115条。老齢基礎年金への上乗せ。","page":262},{"law":"国民年金基金","cat":"基金の組織","text":"地域型国民年金基金は、【第一号被保険者|第二号被保険者|全被保険者|任意加入被保険者】であつて、基金の地区内に住所を有する者をもつて組織する。職能型国民年金基金は、第一号被保険者であつて、基金の地区内において同種の事業又は業務に従事する者をもつて組織する。","exp":"法116条1項。","page":263},{"law":"国民年金基金","cat":"加入員","text":"第一号被保険者は、その者が住所を有する地区に係る地域型基金又はその従事する事業若しくは業務に係る職能型基金に申し出て、その加入員となることができる。同時に【二以上|三以上|二|複数】の基金の加入員となることはできない。","exp":"法127条1項。申出をした日に資格取得。","page":268}],"kounen":[{"law":"総則","cat":"目的","text":"厚生年金保険法は、労働者の【老齢|退職|傷病|失業】、【障害|障がい|身体障害|心身障害】又は【死亡|遺族|死別|扶養】について保険給付を行い、労働者及びその【遺族|家族|被扶養者|配偶者】の生活の安定と福祉の向上に寄与することを目的とする。","exp":"法1条。目的条文。","page":14},{"law":"総則","cat":"管掌・実施機関","text":"厚生年金保険は、【政府|実施機関|日本年金機構|厚生労働大臣】が管掌する。実施機関は被保険者の種別ごとに定められ、第1号厚生年金被保険者については【厚生労働大臣|政府|日本年金機構|地方厚生局長】が、第4号厚生年金被保険者については【日本私立学校振興・共済事業団|国家公務員共済組合連合会|地方公務員共済組合連合会|厚生労働大臣】が実施機関となる。","exp":"法2条、2条の5。","page":14},{"law":"総則","cat":"財政の均衡","text":"厚生年金保険事業の財政は、【長期的|中期的|短期的|恒久的】にその均衡が保たれたものでなければならず、著しくその均衡を失すると見込まれる場合には、【速やかに|直ちに|遅滞なく|計画的に】所要の【措置|改定|検証|調整】が講ぜられなければならない。","exp":"法2条の3。","page":22},{"law":"総則","cat":"財政の現況及び見通し","text":"政府は、少なくとも【5年|3年|10年|毎年】ごとに、保険料及び国庫負担の額並びに保険給付に要する費用の額その他の財政に係る収支についてその現況及び財政均衡期間における【見通し|検証|報告書|計画】を作成しなければならず、これを作成したときは、【遅滞なく|速やかに|直ちに|当該年度内に】これを【公表|報告|告示|送付】しなければならない。","exp":"法2条の4。財政検証。","page":22},{"law":"総則","cat":"財政均衡期間・保険料水準","text":"財政均衡期間は、財政の現況及び見通しが作成される年以降おおむね【100年間|50年間|95年間|75年間】とされ、平成16年改正では最終的な保険料水準を【18.3%|18.5%|16.4%|17.8%】に固定し、給付水準を自動的に調整する【マクロ経済スライド|物価スライド|賃金スライド|財政検証】を導入した。","exp":"法2条の4、平16法附則2条。","page":23},{"law":"総則","cat":"用語の定義","text":"配偶者、夫及び妻には、婚姻の届出をしていないが、事実上【婚姻関係|養子縁組|親族関係|同居関係】と同様の事情にある者を【含む|含まない|準ずる|除く】。保険料納付済期間及び保険料免除期間とは、【国民年金法|厚生年金保険法|健康保険法|労働保険法】に規定する保険料納付済期間及び保険料免除期間をいう。","exp":"法3条1項・2項。","page":21},{"law":"適用事業所・被保険者","cat":"強制適用事業所","text":"適用業種に該当する事業所であって、常時【5人以上|1人以上|10人以上|常時従業員】を使用するもの、又は国、地方公共団体若しくは【法人|個人|組合|団体】の事業所であって常時従業員を使用するものは、【適用事業所|任意適用事業所|擬制適用事業所|特定適用事業所】とされる。","exp":"法6条1項。","page":26},{"law":"適用事業所・被保険者","cat":"任意適用事業所","text":"適用事業所以外の事業所の事業主は、【厚生労働大臣|実施機関|日本年金機構|地方厚生局長】の認可を受けて当該事業所を適用事業所とすることができ、その認可を受けようとするときは、当該事業所に使用される者の【2分の1|3分の2|4分の3|過半数】以上の同意を得て申請しなければならない。なお任意適用の取消しの認可には【4分の3|2分の1|3分の2|過半数】以上の同意を要する。","exp":"法6条、8条。","page":28},{"law":"適用事業所・被保険者","cat":"当然被保険者・任意単独被保険者","text":"適用事業所に使用される【70歳未満|65歳未満|75歳未満|60歳未満】の者は当然被保険者となる。適用事業所以外の事業所に使用される70歳未満の者は、【厚生労働大臣|実施機関|日本年金機構|地方厚生局長】の認可を受けて被保険者となることができ、認可を受けるにはその事業所の【事業主|被保険者|労働組合|配偶者】の同意を要する。","exp":"法9条、10条。任意単独被保険者。","page":31},{"law":"適用事業所・被保険者","cat":"高齢任意加入被保険者","text":"事業所に使用される【70歳以上|65歳以上|75歳以上|60歳以上】の者であって、【老齢厚生年金|障害厚生年金|遺族厚生年金|障害手当金】その他の老齢又は退職を支給事由とする年金給付の受給権を有しないものは、所定の手続により被保険者となることができる。これを【高齢任意加入被保険者|任意単独被保険者|当然被保険者|第4種被保険者】という。","exp":"法附則4条の3。","page":33},{"law":"適用事業所・被保険者","cat":"適用除外","text":"2か月以内の期間を定めて使用される者であって、当該定めた期間を超えて使用されることが【見込まれない|見込まれる|不明である|予定される】ものは適用除外となるが、当該定めた期間を超えて引き続き使用されるに至ったときは、【その日|その翌日|当初|翌月初日】から被保険者となる。また所在地が一定しない事業所に使用される者は使用期間の長短にかかわらず被保険者と【ならない|なる|みなされる|推定される】。","exp":"法12条。","page":36},{"law":"適用事業所・被保険者","cat":"適用除外(短時間労働者)","text":"短時間労働者のうち、1週間の所定労働時間が【20時間|30時間|15時間|25時間】未満であること、報酬月額が【88,000円|68,000円|98,000円|108,000円】未満であること、又は高等学校の生徒・大学の学生等であることのいずれかに該当するものは、被保険者と【しない|する|みなす|推定する】。","exp":"法12条。","page":37},{"law":"適用事業所・被保険者","cat":"資格の取得・喪失","text":"当然被保険者は適用事業所に使用されるに至った【日|翌日|月の初日|翌月初日】に資格を取得し、被保険者が死亡したときはその【翌日|当日|翌月初日|翌々日】に、70歳に達したときはその【当日|翌日|翌月初日|属する月の末日】に資格を喪失する。","exp":"法13条、14条。","page":40},{"law":"適用事業所・被保険者","cat":"資格得喪の確認","text":"被保険者の資格の取得及び喪失は、【厚生労働大臣|実施機関|日本年金機構|事業主】の確認によってその効力を生じ、確認は、事業主の【届出|申請|報告|通知】、被保険者であった者の【請求|申出|申請|通知】又は厚生労働大臣の【職権|認可|承認|裁定】により行う。","exp":"法18条。","page":42},{"law":"適用事業所・被保険者","cat":"被保険者期間の計算","text":"被保険者期間を計算する場合には、【月|日|年|週】によるものとし、被保険者の資格を取得した月からその資格を喪失した月の【前月|当月|翌月|前々月】までをこれに算入する。資格を取得した月にその資格を喪失したときは、その月を【1か月|0か月|半月|2か月】として算入する。","exp":"法19条。同月得喪。","page":44},{"law":"標準報酬","cat":"報酬・賞与の定義","text":"報酬とは、いかなる名称であるかを問わず、労働者が、労働の【対償|代償|報奨|対価】として受ける全てのものをいうが、臨時に受けるもの及び【3か月|1か月|6か月|2か月】を超える期間ごとに受けるものは除かれる。賞与とは、労働の対償として受ける全てのもののうち、【3か月|1か月|6か月|2か月】を超える期間ごとに受けるものをいう。","exp":"法3条1項3号・4号。","page":54},{"law":"標準報酬","cat":"標準報酬月額","text":"標準報酬月額は、被保険者の【報酬月額|平均報酬額|賃金月額|標準賞与額】に基づき、標準報酬月額等級表の等級区分によって定め、現在【32|31|50|30】の等級に区分され、その月額は【88,000円|58,000円|98,000円|68,000円】を下限とし、650,000円を上限としている。","exp":"法20条1項。","page":56},{"law":"標準報酬","cat":"定時決定","text":"実施機関は、被保険者が毎年【7月1日|4月1日|9月1日|7月10日】現に使用される事業所において、同日前【3か月間|6か月間|1か月間|2か月間】(報酬支払の基礎となった日数が【17日|11日|15日|20日】未満である月を除く)に受けた報酬の総額をその期間の月数で除して得た額を報酬月額として、標準報酬月額を決定する。","exp":"法21条1項。4・5・6月。","page":60},{"law":"標準報酬","cat":"随時改定","text":"随時改定は、継続した【3か月間|6か月間|1か月間|2か月間】に受けた報酬の総額を3で除して得た額が、従前の報酬月額に比べて著しく高低を生じた場合に、原則として標準報酬月額等級で【2等級以上|1等級以上|3等級以上|4等級以上】の差が生じたことを要件として、その著しく高低を生じた月の【翌月|当月|翌々月|前月】から行う。","exp":"法23条1項。","page":61},{"law":"標準報酬","cat":"標準賞与額","text":"実施機関は、賞与額に基づき【1,000円|100円|10,000円|1円】未満の端数を切り捨てて標準賞与額を決定し、当該標準賞与額が1か月【150万円|573万円|139万円|160万円】を超えるときは、これをその額とする。なお現物給与の価額は、その地方の【時価|相場|市価|公定価格】によって【厚生労働大臣|実施機関|日本年金機構|事業主】が定める。","exp":"法24条の4、25条。","page":66},{"law":"標準報酬","cat":"養育期間標準報酬月額特例","text":"【3歳|1歳|6歳|2歳】に満たない子を養育する被保険者等が【実施機関|厚生労働大臣|事業主|日本年金機構】に申し出た場合において、各月の標準報酬月額が基準月の標準報酬月額(従前標準報酬月額)を【下回る|上回る|超える|等しい】ときは、当該従前標準報酬月額を平均標準報酬額の計算の基礎となる標準報酬月額とみなす。","exp":"法26条。","page":68},{"law":"保険給付の通則","cat":"保険給付の種類・裁定","text":"厚生年金保険法による保険給付は、老齢厚生年金、【障害厚生年金|障害基礎年金|障害共済年金|傷病手当金】、遺族厚生年金及び【障害手当金|脱退一時金|遺族一時金|埋葬料】とする。保険給付を受ける権利は、受給権者の【請求|申請|届出|申出】に基づいて、【実施機関|厚生労働大臣|日本年金機構|政府】が裁定する。","exp":"法32条、33条。","page":74},{"law":"保険給付の通則","cat":"支給期間・支払期月","text":"年金の支給は、支給すべき事由が生じた月の【翌月|当月|翌々月|前月】から始め、権利が消滅した月で終わる。年金は、毎年【2月、4月、6月、8月、10月及び12月|1月、4月、7月及び10月|3月、6月、9月及び12月|奇数月のみ】の6期に、それぞれの【前月分|当月分|前々月分|翌月分】までを支払う。","exp":"法36条。","page":77},{"law":"保険給付の通則","cat":"未支給の保険給付","text":"未支給の保険給付の支給を請求することができるのは、死亡した受給権者の【配偶者、子、父母、孫、祖父母、兄弟姉妹|配偶者及び子に限る|配偶者のみ|3親等内の親族に限る】であって、その者の死亡の当時その者と【生計を同じくしていた|生計を維持していた|同居していた|扶養していた】者であり、その受けるべき順位は配偶者、【子|父母|孫|兄弟姉妹】、父母の順序である。","exp":"法37条。","page":78},{"law":"保険給付の通則","cat":"受給権の保護・公課","text":"保険給付を受ける権利は、【譲り渡し、担保に供し、又は差し押さえる|相続し、譲渡し|放棄し、移転し|分割し、移転し】ことができない。ただし【老齢厚生年金|障害厚生年金|遺族厚生年金|障害手当金】を受ける権利を国税滞納処分により差し押さえる場合等は、この限りでない。租税その他の公課は、保険給付として支給を受けた金銭を標準として課することが【できない|できる|制限される|許される】。","exp":"法41条。","page":87},{"law":"保険給付の通則","cat":"年金額の改定・併給調整","text":"年金たる保険給付の額は、【国民の生活水準|国民所得|国内総生産|消費者物価】、賃金その他の諸事情に著しい変動が生じた場合には、【速やかに|遅滞なく|直ちに|計画的に】改定の措置が講ぜられなければならない。また年金たる保険給付は、受給権者が他の年金たる保険給付等を受けることができるときは、その間、その支給を【停止|減額|併給|按分】する。","exp":"法43条の2、38条。","page":88},{"law":"保険給付の通則","cat":"端数処理","text":"保険給付を受ける権利を裁定する場合等において、保険給付の額に【50銭|1円|5銭|10銭】未満の端数が生じたときはこれを切り捨て、50銭以上1円未満の端数が生じたときはこれを【1円|10円|100円|1,000円】に切り上げる。年金の支払期月ごとの支払額に【1円|50銭|10円|100円】未満の端数が生じたときは、これを切り捨てる。","exp":"法35条、36条の2。","page":76},{"law":"老齢厚生年金","cat":"支給要件","text":"老齢厚生年金は、被保険者期間を有する者が、【65歳以上|60歳以上|70歳以上|62歳以上】であること、保険料納付済期間と保険料免除期間とを合算した期間が【10年以上|25年以上|20年以上|15年以上】であることのいずれにも該当するに至ったときに、その者に【支給する|支給することができる|支給を停止する|裁定する】。","exp":"法42条。受給資格期間10年。","page":96},{"law":"老齢厚生年金","cat":"年金額","text":"老齢厚生年金の額は、被保険者であった全期間の【平均標準報酬額|平均標準報酬月額|標準報酬月額|平均報酬月額】の1000分の【5.481|7.125|7.5|5.769】に相当する額に被保険者期間の月数を乗じて得た額である。平均標準報酬額は、各月の標準報酬月額と標準賞与額にそれぞれ【再評価率|改定率|従前額改定率|調整率】を乗じて得た額の総額を被保険者期間の月数で除して得た額をいう。","exp":"法43条1項。","page":98},{"law":"老齢厚生年金","cat":"在職定時改定・退職時改定","text":"受給権者が毎年【9月1日|7月1日|4月1日|9月30日】(基準日)において被保険者である場合は、基準日の属する月の【翌月|当月|翌々月|前月】から年金の額を改定する(在職定時改定)。被保険者である受給権者が資格を喪失し、被保険者となることなくして資格を喪失した日から起算して【1か月|3か月|6か月|2か月】を経過したときは、退職時改定を行う。","exp":"法43条2項・3項。","page":100},{"law":"老齢厚生年金","cat":"経過的加算","text":"経過的加算額の計算における定額部分相当額は、【1,628円|780,900円|224,700円|1,621円】に改定率を乗じた額に被保険者期間の月数を乗じて算定し、その月数には生年月日に応じた【上限|下限|最低保障|乗率】が設けられている。これは特別支給の老齢厚生年金の【定額部分|報酬比例部分|加給年金額|経過的寡婦加算】と老齢基礎年金との差額を埋め合わせるものである。","exp":"法附則9条の2第2項。","page":106},{"law":"老齢厚生年金","cat":"加給年金額の対象・生計維持","text":"老齢厚生年金の加給年金額は、受給権者がその権利を取得した当時その者によって生計を維持していた【65歳未満|60歳未満|70歳未満|55歳未満】の配偶者等があるときに加算されるが、被保険者期間の月数が【240|300|180|120】未満の場合は加算されない。生計維持は、年額【850万円|650万円|800万円|1,000万円】以上の収入を将来にわたって有すると認められる者以外であることを要する。","exp":"法44条1項・5項。","page":107},{"law":"老齢厚生年金","cat":"加給年金額・特別加算","text":"加給年金額は、配偶者及び子2人目までは1人につき【224,700円|74,900円|165,800円|390,500円】に改定率を乗じた額、子3人目以降は1人につき【74,900円|224,700円|165,800円|99,500円】に改定率を乗じた額である。配偶者の加給年金額には、【受給権者|配偶者|被保険者|子】の生年月日に応じて特別加算が行われる。","exp":"法44条2項、昭60法附則60条。","page":109},{"law":"老齢厚生年金","cat":"加給年金額の支給停止","text":"加給年金額の対象となる配偶者が、年金額の計算の基礎となる被保険者期間の月数が【240以上|300以上|180以上|120以上】である老齢厚生年金、障害厚生年金(【1級から3級|1級又は2級|1級のみ|2級又は3級】)又は障害基礎年金等の支給を受けることができるときは、その間、当該配偶者に係る加給年金額の支給を【停止する|減額する|併給する|按分する】。","exp":"法46条6項ほか。","page":111},{"law":"老齢厚生年金","cat":"支給の繰下げ","text":"老齢厚生年金の受給権を取得した日から起算して【1年|6か月|2年|5年】を経過した日前に当該老齢厚生年金を請求していなかったものは、【支給繰下げ|支給繰上げ|支給停止|裁定】の申出をすることができ、繰下げの増額率は1000分の【7|5|8|10】に繰下げ月数(【120|60|180|240】を限度)を乗じて得た率である。","exp":"法44条の3、令3条の5の2。","page":112},{"law":"老齢厚生年金","cat":"在職老齢年金の支給停止","text":"在職老齢年金では、【総報酬月額相当額|標準報酬月額|報酬月額|平均標準報酬額】と基本月額との合計額が支給停止調整額を超えるとき、その超える部分の【2分の1|3分の1|全部|4分の3】に相当する額に12を乗じて得た額(支給停止基準額)に相当する部分の支給を停止する。支給停止調整額は、令和8年度においては【65万円|62万円|50万円|48万円】である。","exp":"法46条。本問は令和8年度65万円を正解とする。","page":122},{"law":"老齢厚生年金","cat":"総報酬月額相当額・基本月額","text":"総報酬月額相当額とは、標準報酬月額とその月以前の【1年間|6か月間|2年間|1か月間】の標準賞与額の総額を【12|6|24|18】で除して得た額とを合算して得た額であり、基本月額とは、老齢厚生年金の額(加給年金額、繰下げ加算額及び【経過的加算額|報酬比例部分|定額部分|特別加算額】を除く)を12で除して得た額である。","exp":"法46条1項。","page":120},{"law":"老齢厚生年金","cat":"特別支給の支給要件","text":"当分の間、【65歳未満|60歳未満|70歳未満|62歳未満】の者が、60歳以上であること、【1年以上|2年以上|1か月以上|10年以上】の被保険者期間を有すること、保険料納付済期間と保険料免除期間とを合算した期間が【10年以上|25年以上|20年以上|15年以上】であることのいずれにも該当するに至ったときは、特別支給の老齢厚生年金を支給する。","exp":"法附則8条。","page":123},{"law":"老齢厚生年金","cat":"障害者・長期加入者の特例","text":"特別支給の老齢厚生年金の受給権者が、その権利を取得した当時、【被保険者でなく|被保険者であり|70歳以上であり|在職中であり】、かつその者の被保険者期間が【44年|40年|45年|35年】以上であるときは、その年金額を障害者の特例の規定の例により計算し、【定額部分|報酬比例部分|加給年金額のみ|経過的加算】が加算される。","exp":"法附則9条の3。長期加入者の特例。","page":133},{"law":"障害厚生年金","cat":"支給要件・初診日","text":"障害厚生年金は、【初診日|障害認定日|傷病発生日|受診日】要件、障害認定日要件及び【保険料納付|被保険者期間|加入期間|受給資格】要件のすべてを満たした場合に支給される。初診日においては【被保険者|受給権者|70歳未満の者|65歳未満の者】であることを要し、20歳未満であっても被保険者であれば初診日要件を満たす。","exp":"法47条1項。","page":158},{"law":"障害厚生年金","cat":"障害認定日・障害等級","text":"障害認定日とは、初診日から起算して【1年6か月|1年|2年|3年】を経過した日、又はその期間内に傷病が治ったときはその治った日をいう。厚生年金保険法の障害等級は、重度のものから【1級、2級及び3級|1級及び2級|1級から3級及び障害手当金|1級から5級】とし、各級の障害の状態は【政令|厚生労働省令|法律|告示】で定められている。","exp":"法47条。","page":159},{"law":"障害厚生年金","cat":"保険料納付要件","text":"障害厚生年金の保険料納付要件は、初診日の【前日|当日|属する月|前月】において、初診日の属する月の【前々月|前月|当月|前年同月】までに国民年金の被保険者期間がある場合に、当該被保険者期間に係る保険料納付済期間と保険料免除期間とを合算した期間が、当該被保険者期間の【3分の2|4分の3|2分の1|3分の1】以上であることである。","exp":"法47条1項。","page":160},{"law":"障害厚生年金","cat":"事後重症","text":"事後重症による障害厚生年金は、障害認定日において障害等級に該当しなかった者が、その日後【65歳に達する日の前日|60歳に達する日の前日|70歳に達する日の前日|55歳に達する日の前日】までの間に障害等級に該当する程度の障害の状態に該当するに至った場合に、【請求|職権|届出|申出】により受給権が発生し、当該請求があった日の属する月の【翌月|当月|翌々月|前月】から支給される。","exp":"法47条の2。","page":161},{"law":"障害厚生年金","cat":"年金額・最低保障","text":"障害厚生年金の額の計算の基礎となる被保険者期間の月数が【300|240|180|360】に満たないときは、これを300として計算する。障害等級【1級|2級|3級|1・2級】に該当する者の額は報酬比例部分相当額の100分の【125|100|150|200】に相当する額であり、最低保障額は障害基礎年金の額に【4分の3|3分の2|2分の1|3分の1】を乗じて得た額である。","exp":"法50条。","page":166},{"law":"障害厚生年金","cat":"額の改定・併合認定","text":"障害厚生年金の受給権者は、実施機関に対し、障害の程度が【増進|軽減|変動|固定】したことによる額の改定を【請求|申請|届出|申出】することができ、原則として受給権を取得した日等から起算して【1年|6か月|2年|3年】を経過した日後でなければ行うことができない。さらに障害厚生年金(障害等級【1級又は2級|3級|1級から3級|2級又は3級】に限る)を支給すべき事由が生じたときは併合認定が行われる。","exp":"法52条、48条。","page":170},{"law":"障害手当金","cat":"支給要件・額","text":"障害手当金は、傷病が【治った|発症した|認定された|固定した】日において、その傷病により政令で定める程度の障害の状態にあること及び【保険料納付|被保険者期間|加入期間|受給資格】要件を満たした場合に支給され、その額は障害厚生年金の額の規定の例により計算した額の100分の【200|125|100|150】に相当する額である。","exp":"法55条・57条。","page":176},{"law":"遺族厚生年金","cat":"支給要件","text":"遺族厚生年金は、被保険者であった者が、被保険者の資格を喪失した後に、被保険者であった間に初診日がある傷病により当該初診日から起算して【5年|3年|2年|10年】を経過する日前に死亡したとき(【短期要件|長期要件|特例要件|経過要件】)、又は保険料納付済期間と保険料免除期間とを合算した期間が【25年|10年|20年|15年】以上である者が死亡したときに、所定の遺族に支給する。","exp":"法58条。","page":182},{"law":"遺族厚生年金","cat":"遺族の範囲","text":"遺族厚生年金を受けることができる遺族は、被保険者等の死亡当時その者によって【生計を維持していた|生計を同じくしていた|扶養していた|同居していた】配偶者、子、父母、孫又は祖父母である。ただし夫、父母、祖父母にあっては【55歳以上|60歳以上|50歳以上|65歳以上】であること、子・孫にあっては現に婚姻していないことかつ【18歳に達する日以後最初の3月31日までの間|20歳に達するまでの間|15歳に達するまでの間|16歳に達するまでの間】にあること等を要する。","exp":"法59条。","page":184},{"law":"遺族厚生年金","cat":"年金額","text":"遺族厚生年金の額は、原則として、死亡した者の被保険者期間を基礎として老齢厚生年金の額の規定の例により計算した額の【4分の3|3分の2|2分の1|3分の1】に相当する額であり、【短期要件|長期要件|特例要件|経過要件】に該当する場合は計算の基礎となる被保険者期間の月数が【300|240|180|360】に満たないときはこれを300として計算する。","exp":"法60条1項。","page":187},{"law":"遺族厚生年金","cat":"中高齢の寡婦加算","text":"中高齢の寡婦加算は、遺族厚生年金の受給権者である【妻|夫|配偶者|子】であって、その権利を取得した当時【40歳以上65歳未満|35歳以上65歳未満|40歳以上60歳未満|45歳以上65歳未満】であったもの等に加算され、その額は遺族基礎年金の額に【4分の3|3分の2|2分の1|3分の1】を乗じて得た額である。","exp":"法62条1項。","page":192},{"law":"遺族厚生年金","cat":"支給停止・失権","text":"夫、父母又は祖父母に対する遺族厚生年金は、受給権者が【60歳|55歳|65歳|50歳】に達するまでの期間、その支給を停止する。遺族厚生年金の受給権を取得した当時【30歳未満|35歳未満|25歳未満|40歳未満】である妻が、当該遺族厚生年金と同一支給事由の遺族基礎年金の受給権を取得しないときは、当該受給権を取得した日から起算して【5年|10年|3年|2年】を経過したときに失権する。","exp":"法65条の2、63条。","page":200},{"law":"遺族厚生年金","cat":"死亡の推定・遺族の順位","text":"船舶が沈没等した際現にその船舶に乗っていた被保険者等の生死が【3か月間|6か月間|1か月間|1年間】わからない場合には、その船舶が沈没等した日に、その者は死亡したものと【推定|みなす|確定|認定】する。なお遺族厚生年金には、労働者災害補償保険の遺族補償年金と異なり【転給|併給|分割|加算】制度はない。","exp":"法59条の2、59条2項。","page":184},{"law":"保険料","cat":"保険料額・保険料率","text":"保険料額は、【標準報酬月額及び標準賞与額|報酬月額及び賞与額|平均標準報酬額|報酬の総額】にそれぞれ【保険料率|保険料額|調整率|改定率】を乗じて得た額であり、第1号厚生年金被保険者に係る保険料率は平成29年9月以降【1000分の183.00|1000分の181.82|1000分の178.28|1000分の185.00】で固定されている。","exp":"法81条、平16法附則33条。18.3%。","page":243},{"law":"保険料","cat":"保険料の負担・納付","text":"被保険者及び被保険者を使用する事業主は、それぞれ保険料の【半額|全額|3分の2|4分の3】を負担し、【事業主|被保険者|実施機関|日本年金機構】は、その使用する被保険者及び自己の負担する保険料を納付する義務を負う。毎月の保険料は、【翌月末日|当月末日|翌々月末日|翌月10日】までに納付しなければならない。","exp":"法82条、83条。","page":246},{"law":"保険料","cat":"保険料の徴収の特例","text":"育児休業等をしている被保険者が使用される事業所の事業主が実施機関に申し出たときは、所定の月の当該被保険者に係る保険料の徴収を【行わない|半額とする|繰り上げる|猶予する】。この特例の対象となるのは、最長で子が【3歳|1歳|2歳|6歳】に達するまでの間であり、これらの期間は保険料の【拠出を行った期間|納付猶予期間|免除期間|未納期間】とされる。","exp":"法81条の2。","page":244},{"law":"不服申立て・雑則等","cat":"時効","text":"保険料その他の徴収金を徴収し、又はその還付を受ける権利は、これらを行使することができる時から【2年|5年|3年|10年】を経過したときは、時効によって消滅する。保険給付を受ける権利は、その支給すべき事由が生じた日から【5年|2年|3年|10年】を経過したときは、時効によって消滅し、その全額につき支給を停止されている間は時効は【進行しない|進行する|更新される|完成する】。","exp":"法92条1項。","page":277},{"law":"適用事業所・被保険者","cat":"被保険者の種別","text":"国家公務員共済組合の組合員たる厚生年金保険の被保険者は【第2号|第1号|第3号|第4号】厚生年金被保険者、地方公務員共済組合の組合員たる厚生年金保険の被保険者は【第3号|第2号|第1号|第4号】厚生年金被保険者、私立学校教職員共済制度の加入者たる厚生年金保険の被保険者は【第4号|第1号|第2号|第3号】厚生年金被保険者とされる。","exp":"法2条の5第1項。","page":15},{"law":"老齢厚生年金","cat":"特別支給の支給開始年齢","text":"報酬比例部分の支給開始年齢の引上げにより、最終的に特別支給の老齢厚生年金が支給されないのは、【昭和36年4月2日以後|昭和34年4月2日以後|昭和38年4月2日以後|昭和41年4月2日以後】生まれの男子、及び【昭和41年4月2日以後|昭和36年4月2日以後|昭和39年4月2日以後|昭和42年4月2日以後】生まれの女子(第1号厚生年金被保険者である者等に限る)である。坑内員・船員の特例は、両期間を合算して【15年以上|20年以上|10年以上|25年以上】であることを要する。","exp":"法附則8条の2、9条の4。","page":127},{"law":"障害厚生年金","cat":"支給停止","text":"障害厚生年金は、その受給権者が当該傷病について【労働基準法|労働者災害補償保険法|健康保険法|国家公務員災害補償法】の規定による障害補償を受ける権利を取得したときは、【6年間|3年間|5年間|2年間】、その支給を停止し、また受給権者が障害等級に該当する程度の障害の状態に【該当しなくなった|該当した|軽減した|固定した】ときは、その障害の状態に該当しない間、その支給を停止する。","exp":"法54条。","page":173}],"roui":[{"law":"労働施策総合推進法","cat":"目的","text":"労働施策総合推進法は、労働市場の機能が適切に発揮され、労働者の多様な事情に応じた雇用の安定及び職業生活の充実並びに【労働生産性|職業能力|生産活動|労働の質】の向上を促進して、労働者がその有する能力を有効に発揮することができるようにし、これを通じて、労働者の職業の安定と経済的社会的地位の向上とを図るとともに、経済及び社会の発展並びに【完全雇用|安定雇用|雇用機会|労働力確保】の達成に資することを目的とする。","exp":"法1条1項。少子高齢化等の経済社会情勢の変化に対応した総合的施策。","page":12},{"law":"労働施策総合推進法","cat":"パワハラ防止措置","text":"事業主は、職場において行われる優越的な関係を背景とした言動であって、【業務上必要かつ相当な範囲|社会通念上相当な範囲|業務上の合理的な範囲|通常の業務の範囲】を超えたものによりその雇用する労働者の就業環境が害されることのないよう、当該労働者からの相談に応じ、適切に対応するために必要な体制の整備その他の雇用管理上必要な措置を講じなければならない。","exp":"法30条の2第1項。いわゆるパワーハラスメント防止の雇用管理上の措置義務。","page":20},{"law":"職業安定法","cat":"目的","text":"職業安定法は、労働施策総合推進法と相まって、公共に奉仕する公共職業安定所その他の職業安定機関が職業紹介事業等を行うこと等により、各人にその有する能力に適合する職業に就く機会を与え、及び産業に必要な【労働力|労働者|人材|雇用】を充足し、もって職業の安定を図るとともに、経済及び社会の発展に寄与することを目的とする。","exp":"法1条。職業選択の自由(法2条)・均等待遇(法3条)に続く総則規定。","page":23},{"law":"職業安定法","cat":"職業選択の自由","text":"何人も、【公共の福祉|法律|公序良俗|社会の利益】に反しない限り、職業を自由に選択することができる。","exp":"法2条。憲法22条の職業選択の自由を受けた規定。","page":23},{"law":"職業安定法","cat":"労働条件等の明示","text":"公共職業安定所、特定地方公共団体及び職業紹介事業者等は、職業紹介、労働者の募集又は労働者供給に当たり、求職者等に対し、その者が従事すべき【業務の内容|職種|労働の内容|担当業務】及び賃金、労働時間その他の労働条件を明示しなければならない。","exp":"法5条の3第1項。書面交付等による明示が必要な事項がある。","page":28},{"law":"労働者派遣法","cat":"目的","text":"労働者派遣法は、職業安定法と相まって労働力の需給の適正な調整を図るため労働者派遣事業の適正な運営の確保に関する措置を講ずるとともに、【派遣労働者の保護|派遣労働者の福祉|派遣労働者の権利|労働者の地位】等を図り、もって派遣労働者の雇用の安定その他福祉の増進に資することを目的とする。","exp":"法1条。派遣就業は臨時的・一時的なものであることを原則とする。","page":44},{"law":"労働者派遣法","cat":"労働者派遣の定義","text":"労働者派遣とは、自己の雇用する労働者を、当該雇用関係の下に、かつ、【他人の指揮命令|派遣先の指揮命令|自己の指揮命令|当該他人の管理】を受けて、当該他人のために労働に従事させることをいい、当該他人に対し当該労働者を当該他人に雇用させることを約してするものを含まない。","exp":"法2条1号。雇用させることを約する場合は労働者供給に該当。","page":45},{"law":"高年齢者雇用安定法","cat":"目的","text":"高年齢者雇用安定法は、定年の引上げ、【継続雇用制度|定年延長制度|再雇用制度|勤務延長制度】の導入等による高年齢者の安定した雇用の確保の促進、高年齢者等の再就職の促進、定年退職者その他の高年齢退職者に対する就業の機会の確保等の措置を総合的に講じ、もって高年齢者等の職業の安定その他福祉の増進を図るとともに、経済及び社会の発展に寄与することを目的とする。","exp":"法1条。","page":84},{"law":"高年齢者雇用安定法","cat":"高年齢者の定義","text":"高年齢者とは、【55歳|60歳|65歳|50歳】以上の者をいう。","exp":"法2条1項、則1条。なお高年齢者等には中高年齢者(45歳以上)である求職者等を含む。","page":85},{"law":"高年齢者雇用安定法","cat":"定年年齢","text":"事業主がその雇用する労働者の定年の定めをする場合には、当該定年は、【60歳|65歳|55歳|70歳】を下回ることができない。","exp":"法8条。例外として坑内作業の業務に従事する労働者は60歳未満も可。","page":86},{"law":"高年齢者雇用安定法","cat":"高年齢者雇用確保措置","text":"定年(【65歳|70歳|60歳|65歳以上】未満のものに限る)の定めをしている事業主は、その雇用する高年齢者の65歳までの安定した雇用を確保するため、当該定年の引上げ、継続雇用制度の導入、当該定年の定めの廃止のいずれかの措置を講じなければならない。","exp":"法9条1項。義務規定。","page":86},{"law":"高年齢者雇用安定法","cat":"高年齢者就業確保措置","text":"定年(65歳以上70歳未満のものに限る)の定めをしている事業主等は、その雇用する高年齢者について、当該定年の引上げ、65歳以上継続雇用制度の導入、当該定年の定めの廃止等の措置を講ずることにより、65歳から【70歳|75歳|65歳|68歳】までの安定した雇用を確保するよう【努め|措置を講じ|義務を負わ|配慮し】なければならない。","exp":"法10条の2第1項。70歳までの就業確保は努力義務。","page":87},{"law":"障害者雇用促進法","cat":"目的","text":"障害者雇用促進法は、障害者の雇用義務等に基づく雇用の促進等のための措置、雇用の分野における障害者と障害者でない者との均等な機会及び待遇の確保等のための措置、【職業リハビリテーション|社会リハビリテーション|医療リハビリテーション|職業訓練】の措置その他障害者がその能力に適合する職業に就くこと等を通じてその職業生活において自立することを促進するための措置を総合的に講じ、もって障害者の職業の安定を図ることを目的とする。","exp":"法1条。","page":97},{"law":"障害者雇用促進法","cat":"障害者の定義","text":"障害者とは、身体障害、知的障害又は【精神障害|発達障害|高次脳機能障害|難病】(発達障害を含む)その他の心身の機能の障害があるため、長期にわたり、職業生活に相当の制限を受け、又は職業生活を営むことが著しく困難な者をいう。","exp":"法2条1号。","page":98},{"law":"障害者雇用促進法","cat":"差別の禁止","text":"事業主は、賃金の決定、教育訓練の実施、福利厚生施設の利用その他の待遇について、労働者が障害者であることを理由として、障害者でない者と【不当な差別的取扱い|差別的取扱い|不利益な取扱い|区別的取扱い】をしてはならない。","exp":"法35条。募集・採用は法34条で均等な機会の付与義務。","page":99},{"law":"男女雇用機会均等法","cat":"目的","text":"男女雇用機会均等法は、法の下の平等を保障する日本国憲法の理念にのっとり雇用の分野における男女の均等な機会及び待遇の確保を図るとともに、女性労働者の就業に関して【妊娠中及び出産後の健康|母性の健康|妊娠中の健康|出産後の健康】の確保を図る等の措置を推進することを目的とする。","exp":"法1条。","page":118},{"law":"男女雇用機会均等法","cat":"募集・採用の差別禁止","text":"事業主は、労働者の募集及び採用について、その性別にかかわりなく【均等な機会|平等な機会|同一の機会|公平な取扱い】を与えなければならない。","exp":"法5条。差別禁止規定の違反に罰則はない。","page":119},{"law":"男女雇用機会均等法","cat":"間接差別の禁止","text":"事業主は、性別以外の事由を要件とする措置のうち、措置の要件を満たす男性及び女性の比率その他の事情を勘案して実質的に性別を理由とする差別となるおそれがある措置として厚生労働省令で定めるものについては、業務の性質に照らして実施が特に必要である場合その他の【合理的な理由|正当な理由|やむを得ない理由|相当な理由】がある場合でなければ、これを講じてはならない。","exp":"法7条。身長・体重・体力要件、転勤要件、転勤経験要件が省令で定められている。","page":122},{"law":"男女雇用機会均等法","cat":"妊娠・出産等を理由とする不利益取扱いの禁止","text":"事業主は、その雇用する女性労働者が妊娠したこと、出産したこと、労働基準法の規定による産前の休業を請求し、又は産前産後の休業をしたことその他の妊娠又は出産に関する事由を理由として、当該女性労働者に対して【解雇|不利益な取扱い|降格|減給】その他不利益な取扱いをしてはならない。","exp":"法9条3項。妊娠中・出産後1年以内の解雇は原則無効。","page":123},{"law":"男女雇用機会均等法","cat":"セクハラ防止措置","text":"事業主は、職場において行われる【性的な言動|性的言動|わいせつな言動|性差別的言動】に対するその雇用する労働者の対応によりその労働者がその労働条件につき不利益を受け、又は当該性的な言動により当該労働者の就業環境が害されることのないよう、当該労働者からの相談に応じ、適切に対応するために必要な体制の整備その他の雇用管理上必要な措置を講じなければならない。","exp":"法11条1項。対価型・環境型のセクシュアルハラスメントが対象。","page":124},{"law":"育児・介護休業法","cat":"目的","text":"育児介護休業法は、育児休業及び介護休業に関する制度等を設けるとともに、子の養育又は家族の介護を行う労働者等の【雇用の継続|雇用の安定|継続雇用|雇用の維持】及び再就職の促進を図り、もってこれらの者の職業生活と家庭生活との両立に寄与することを通じて、これらの者の福祉の増進を図り、あわせて経済及び社会の発展に資することを目的とする。","exp":"法1条。","page":137},{"law":"育児・介護休業法","cat":"育児休業の定義","text":"育児休業とは、労働者が、その子を【養育|監護|保育|看護】するためにする休業をいう。","exp":"法2条1号。労働者には日々雇用される者を含まない。","page":138},{"law":"育児・介護休業法","cat":"介護休業・要介護状態","text":"介護休業とは、労働者が、その要介護状態にある対象家族を介護するためにする休業をいい、要介護状態とは、負傷、疾病又は身体上もしくは精神上の障害により、【2週間|1週間|1箇月|2日】以上の期間にわたり【常時介護|常時又は随時介護|介護|世話】を必要とする状態をいう。","exp":"法2条2号・3号。対象家族は配偶者・父母・子・配偶者の父母等。","page":138},{"law":"パートタイム・有期雇用労働法","cat":"目的","text":"短時間労働者及び有期雇用労働者の雇用管理の改善等に関する法律は、短時間・有期雇用労働者について、その適正な労働条件の確保、雇用管理の改善、通常の労働者への転換の推進等に関する措置等を講ずることにより、通常の労働者との【均衡のとれた待遇|均等な待遇|同一の待遇|公正な待遇】の確保等を図ることを通じて短時間・有期雇用労働者がその有する能力を有効に発揮することができるようにし、もってその福祉の増進を図ることを目的とする。","exp":"法1条。","page":179},{"law":"パートタイム・有期雇用労働法","cat":"短時間労働者の定義","text":"短時間労働者とは、1週間の所定労働時間が同一の事業主に雇用される通常の労働者の1週間の所定労働時間に比し【短い|短く所定労働日数も少ない|著しく短い|2割以上短い】労働者をいう。","exp":"法2条。何時間未満という要件は特にない。","page":180},{"law":"パートタイム・有期雇用労働法","cat":"不合理な待遇の禁止","text":"事業主は、その雇用する短時間・有期雇用労働者の基本給、賞与その他の待遇のそれぞれについて、当該待遇に対応する通常の労働者の待遇との間において、職務の内容、当該職務の内容及び配置の変更の範囲その他の事情のうち、当該待遇の性質及び当該待遇を行う目的に照らして適切と認められるものを考慮して、【不合理|不当|差別的|不公正】と認められる相違を設けてはならない。","exp":"法8条。いわゆる均衡待遇規定。","page":181},{"law":"パートタイム・有期雇用労働法","cat":"差別的取扱いの禁止","text":"事業主は、職務の内容が通常の労働者と同一の短時間・有期雇用労働者であって、雇用関係が終了するまでの全期間において、その職務の内容及び配置が当該通常の労働者の変更の範囲と同一の範囲で変更されることが見込まれるもの(通常の労働者と【同視すべき|同一の|同程度の|均衡のとれた】短時間・有期雇用労働者)については、短時間・有期雇用労働者であることを理由として、差別的取扱いをしてはならない。","exp":"法9条。いわゆる均等待遇規定。","page":182},{"law":"最低賃金法","cat":"目的","text":"最低賃金法は、賃金の低廉な労働者について、賃金の最低額を保障することにより、労働条件の改善を図り、もって、労働者の生活の安定、【労働力の質的向上|労働生産性の向上|労働者の地位向上|雇用の安定】及び事業の公正な競争の確保に資するとともに、国民経済の健全な発展に寄与することを目的とする。","exp":"法1条。","page":200},{"law":"最低賃金法","cat":"最低賃金額の単位","text":"最低賃金額は、【時間|日|月|時間又は日】によって定めるものとする。","exp":"法3条。「時間又は日」ではなく時間によって定める。","page":202},{"law":"最低賃金法","cat":"最低賃金の効力","text":"使用者は、最低賃金の適用を受ける労働者に対し、その最低賃金額以上の賃金を支払わなければならない。最低賃金の適用を受ける労働者と使用者との間の労働契約で最低賃金額に達しない賃金を定めるものは、その部分については【無効|取消し|変更|有効】とし、無効となった部分は、最低賃金と同様の定めをしたものとみなす。","exp":"法4条1項・2項。労働基準法13条と同様の強行的・直律的効力。","page":202},{"law":"最低賃金法","cat":"地域別最低賃金の原則","text":"地域別最低賃金は、地域における労働者の生計費及び賃金並びに【通常の事業の賃金支払能力|事業の賃金支払能力|企業の支払能力|平均的な賃金水準】を考慮して定められなければならない。労働者の生計費を考慮するに当たっては、労働者が健康で文化的な最低限度の生活を営むことができるよう、生活保護に係る施策との整合性に配慮するものとする。","exp":"法9条2項・3項。「企業収益」を考慮するのではない。","page":204},{"law":"最低賃金法","cat":"派遣労働者の最低賃金","text":"労働者派遣法に規定する派遣中の労働者については、その【派遣先|派遣元|労働者の住所地|就業を指示した地】の事業の事業場の所在地を含む地域について決定された地域別最低賃金において定める最低賃金額により最低賃金の効力の規定を適用する。","exp":"法13条。派遣元ではなく派遣先の地域別最低賃金を適用。","page":205},{"law":"労働組合法","cat":"目的","text":"労働組合法は、労働者が使用者との交渉において【対等の立場|平等の立場|有利な立場|自由な立場】に立つことを促進することにより労働者の地位を向上させること、労働者が自主的に労働組合を組織し、団結することを擁護すること並びに使用者と労働者との関係を規制する労働協約を締結するための団体交渉をすること及びその手続を助成することを目的とする。","exp":"法1条1項。労働三法の一つ。","page":218},{"law":"労働組合法","cat":"刑事免責","text":"労働組合の団体交渉その他の行為であって労働組合法の目的を達成するためにした正当なものについては、【刑法35条|刑法36条|刑法37条|憲法28条】の規定が適用される。ただし、いかなる場合においても、【暴力の行使|威力の行使|実力行使|争議行為】は、労働組合の正当な行為と解釈されない。","exp":"法1条2項。正当な争議行為等は犯罪を構成しない。","page":219},{"law":"労働組合法","cat":"労働組合の定義","text":"労働組合とは、労働者が主体となって自主的に労働条件の維持改善その他【経済的地位の向上|社会的地位の向上|労働条件の向上|生活の向上】を図ることを主たる目的として組織する団体又は連合団体をいう。","exp":"法2条。共済事業のみを目的とするもの、主として政治運動を目的とするもの等は労組法上の労働組合とは認められない。","page":220},{"law":"労働組合法","cat":"労働者の定義","text":"労働組合法における労働者とは、職業の種類を問わず、賃金、給料その他これに準ずる【収入|報酬|給与|所得】によって生活する者をいう。","exp":"法3条。失業者も含む。プロスポーツ選手も該当し得る。","page":221},{"law":"労働組合法","cat":"労働組合の規約","text":"労働組合の規約には、総会は少なくとも毎年1回開催すること、同盟罷業は、組合員又は組合員の直接無記名投票により選挙された代議員の【直接無記名投票|記名投票|挙手|代議員会の決議】の【過半数|3分の2|4分の3|3分の1】による決定を経なければ開始しないこと等の規定を含まなければならない。","exp":"法5条2項。労働委員会の資格審査に係る要件。","page":222},{"law":"労働組合法","cat":"不当労働行為(不利益取扱い)","text":"使用者は、労働者が労働組合の組合員であること、労働組合に加入したこと、これを結成しようとしたこと、又は労働組合の【正当な行為|正当な組合活動|組合活動|争議行為】をしたことを理由として、その労働者を解雇し、その他その労働者に対して不利益な取扱いをしてはならない。","exp":"法7条1号。不当労働行為の類型の一つ。","page":223},{"law":"労働組合法","cat":"不当労働行為(黄犬契約・団交拒否)","text":"使用者は、労働者が労働組合に加入しないこと、又は労働組合から脱退することを雇用条件とすること(【黄犬契約|不利益取扱い|支配介入|団交拒否】)をしてはならず、また、使用者が雇用する労働者の代表者と団体交渉をすることを【正当な理由|合理的な理由|やむを得ない理由|相当な理由】がなくて拒むことをしてはならない。","exp":"法7条2号・3号。","page":223},{"law":"労働組合法","cat":"不当労働行為(支配介入・経費援助)","text":"使用者は、労働者が労働組合を結成し、又は運営することを支配し、又はこれに介入すること、及び労働組合の運営のための経費の支払につき【経理上の援助|経済的な援助|資金的援助|物的援助】を与えることをしてはならない。","exp":"法7条3号。ただし最小限の広さの事務所供与等は経理上の援助に当たらない。","page":223},{"law":"労働組合法","cat":"損害賠償","text":"使用者は、同盟罷業その他の争議行為であって【正当|適法|合法|平和的】なものによって損害を受けたことを理由として、労働組合又はその組合員に対し賠償を請求することができない。","exp":"法8条。民事免責。","page":225},{"law":"労働組合法","cat":"労働協約の効力発生","text":"労働組合と使用者又はその団体との間の労働条件その他に関する労働協約は、【書面|公正証書|文書又は口頭|電磁的記録】に作成し、両当事者が署名し、又は記名押印することによってその効力を生ずる。","exp":"法14条。要式行為。","page":226},{"law":"労働組合法","cat":"労働協約の期間","text":"労働協約は、【3年|2年|5年|1年】を超える有効期間の定めをすることができない。3年を超える有効期間を定めた場合は、3年の有効期間の定めをしたものとみなす。有効期間の定めがない労働協約は、署名し又は記名押印した文書により、解約しようとする日の少なくとも【90日|60日|30日|1箇月】前に予告することにより解約できる。","exp":"法15条。","page":226},{"law":"労働組合法","cat":"規範的効力","text":"労働協約に定める労働条件その他の労働者の待遇に関する基準に違反する労働契約の部分は、【無効|取消し|変更|有効】とする。この場合において無効となった部分は、基準の定めるところによる。労働契約に定めがない部分についても、同様とする。","exp":"法16条。労働協約の規範的効力。","page":226},{"law":"労働組合法","cat":"一般的拘束力(事業場単位)","text":"一の工場事業場に常時使用される同種の労働者の【4分の3|過半数|3分の2|5分の4】以上の数の労働者が一の労働協約の適用を受けるに至ったときは、当該工場事業場に使用される他の同種の労働者に関しても、当該労働協約が適用される。","exp":"法17条。工場事業場単位の一般的拘束力。","page":227},{"law":"労働組合法","cat":"地域的の一般的拘束力","text":"一の地域において従業する同種の労働者の【大部分|4分の3以上|過半数|3分の2以上】が一の労働協約の適用を受けるに至ったときは、当該労働協約の当事者の双方又は一方の申立てに基づき、【労働委員会|中央労働委員会|厚生労働省|裁判所】の決議により、厚生労働大臣又は都道府県知事は、当該地域において従業する他の同種の労働者及びその使用者も当該労働協約の適用を受けるべきことの決定をすることができる。","exp":"法18条1項。","page":228},{"law":"労働組合法","cat":"労働委員会の組織","text":"労働委員会は、使用者を代表する者、労働者を代表する者及び公益を代表する者各【同数|3名|過半数|5名】をもって組織する。","exp":"法19条。中央労働委員会と都道府県労働委員会がある。","page":228},{"law":"労働組合法","cat":"不当労働行為の申立期間","text":"労働委員会は、申立てが行為の日(継続する行為にあってはその終了日)から【1年|6箇月|2年|3箇月】を経過した事件に係るものであるときは、その申立てを受けることができない。","exp":"法27条2項。","page":229},{"law":"労働関係調整法","cat":"目的","text":"労働関係調整法は、労働組合法と相まって、労働関係の公正な調整を図り、労働争議を【予防|防止|抑制|回避】し、又は解決して、産業の平和を維持し、もって経済の興隆に寄与することを目的とする。","exp":"法1条。労働三法の一つ。","page":232},{"law":"労働関係調整法","cat":"労働争議の定義","text":"労働争議とは、労働関係の当事者間において、労働関係に関する【主張が一致しない|対立する|紛争が生じた|交渉が決裂した】で、そのために争議行為が発生している状態又は発生するおそれがある状態をいう。","exp":"法6条。","page":232},{"law":"労働関係調整法","cat":"争議行為の定義","text":"争議行為とは、同盟罷業、怠業、【作業所閉鎖|ロックアウト|ボイコット|ピケッティング】その他労働関係の当事者が、その主張を貫徹することを目的として行う行為及びこれに対抗する行為であって、業務の正常な運営を阻害するものをいう。","exp":"法7条。","page":232},{"law":"労働関係調整法","cat":"公益事業の争議行為の予告","text":"公益事業に関する事件につき関係当事者が争議行為をするには、その争議行為をしようとする日の少なくとも【10日|30日|5日|7日】前までに、労働委員会及び厚生労働大臣又は都道府県知事にその旨を通知しなければならない。","exp":"法37条1項。公益事業は運輸・郵便・電気・水道・医療等。","page":233},{"law":"労働関係調整法","cat":"緊急調整","text":"【内閣総理大臣|厚生労働大臣|中央労働委員会|都道府県知事】は、事件が公益事業に関するものであるため等に、争議行為により国民経済の運行を著しく阻害し、又は国民の日常生活を著しく危うくするおそれがあると認められる事件について、そのおそれが現実に存するときに限り、緊急調整の決定をすることができる。決定の公表があったときは、関係当事者は公表の日から【50日間|30日間|60日間|90日間】は争議行為をなすことができない。","exp":"法35条の2、38条。","page":234},{"law":"労働関係調整法","cat":"調整の方法","text":"労働委員会が行う労働争議の調整方法には、あっせん、調停及び仲裁がある。このうち仲裁における仲裁裁定は、【労働協約|確定判決|労働契約|就業規則】と同一の効力を有する。","exp":"法12条以下。仲裁は判定型の紛争解決制度。","page":235},{"law":"個別労働関係紛争解決促進法","cat":"目的","text":"個別労働関係紛争解決促進法は、労働条件その他労働関係に関する事項についての個々の労働者と事業主との間の紛争(個別労働関係紛争)について、【あっせん|調停|仲裁|労働審判】の制度を設けること等により、その実情に即した迅速かつ適正な解決を図ることを目的とする。","exp":"法1条。都道府県労働局長の助言・指導、紛争調整委員会のあっせん制度。","page":236},{"law":"労働契約法","cat":"目的","text":"労働契約法は、労働者及び使用者の自主的な交渉の下で、労働契約が合意により成立し、又は変更されるという【合意の原則|労使対等の原則|契約自由の原則|信義誠実の原則】その他労働契約に関する基本的事項を定めることにより、合理的な労働条件の決定又は変更が円滑に行われるようにすることを通じて、労働者の保護を図りつつ、個別の労働関係の安定に資することを目的とする。","exp":"法1条。","page":239},{"law":"労働契約法","cat":"労働契約の原則","text":"労働契約は、労働者及び使用者が【対等の立場|平等の立場|自由な立場|誠実の原則】における合意に基づいて締結し、又は変更すべきものとする。労働者及び使用者は、労働契約を遵守するとともに、信義に従い誠実に、権利を行使し、及び義務を履行しなければならず、労働契約に基づく権利の行使に当たっては、それを濫用することがあってはならない。","exp":"法3条1項・4項・5項。仕事と生活の調和への配慮も原則の一つ。","page":240},{"law":"労働契約法","cat":"安全配慮義務","text":"使用者は、労働契約に伴い、労働者がその生命、身体等の安全を確保しつつ労働することができるよう、必要な【配慮|措置|注意|対策】をするものとする。","exp":"法5条。電通事件等で確立した安全配慮義務を明文化。","page":241},{"law":"労働契約法","cat":"労働契約の成立","text":"労働契約は、労働者が使用者に使用されて労働し、使用者がこれに対して賃金を支払うことについて、労働者及び使用者が【合意|契約|書面による合意|届出】することによって成立する。","exp":"法6条。","page":242},{"law":"労働契約法","cat":"就業規則による不利益変更の禁止","text":"使用者は、労働者と合意することなく、就業規則を変更することにより、労働者の不利益に労働契約の内容である労働条件を変更することは【できない|できる|協議すればできる|意見聴取すればできる】。","exp":"法9条。原則禁止。ただし法10条の合理的変更は例外。","page":243},{"law":"労働契約法","cat":"就業規則変更の効力","text":"使用者が就業規則の変更により労働条件を変更する場合において、変更後の就業規則を労働者に周知させ、かつ、就業規則の変更が、労働者の受ける不利益の程度、労働条件の変更の必要性、変更後の就業規則の内容の相当性、労働組合等との交渉の状況その他の事情に照らして【合理的|相当|妥当|適切】なものであるときは、労働契約の内容である労働条件は、当該変更後の就業規則に定めるところによる。","exp":"法10条。合理性の立証責任は使用者側が負う。","page":243},{"law":"労働契約法","cat":"解雇権濫用法理","text":"解雇は、客観的に合理的な理由を欠き、社会通念上相当であると認められない場合は、その権利を濫用したものとして、【無効|取消し|違法|不当】とする。","exp":"法16条。日本食塩製造事件等の判例法理を明文化。","page":246},{"law":"労働契約法","cat":"懲戒権濫用法理","text":"使用者が労働者を懲戒することができる場合において、当該懲戒が、当該懲戒に係る労働者の行為の性質及び態様その他の事情に照らして、【客観的に合理的な理由|正当な理由|合理的な理由|相当な理由】を欠き、社会通念上相当であると認められない場合は、その権利を濫用したものとして、当該懲戒は、無効とする。","exp":"法15条。","page":246},{"law":"労働契約法","cat":"無期転換ルール","text":"同一の使用者との間で締結された2以上の有期労働契約の契約期間を通算した期間(通算契約期間)が【5年|3年|10年|1年】を超える労働者が、現に締結している有期労働契約の契約期間が満了する日までの間に、満了する日の翌日から労務が提供される期間の定めのない労働契約の締結の申込みをしたときは、使用者は当該申込みを承諾したものとみなす。","exp":"法18条1項。いわゆる無期転換申込権。","page":247},{"law":"労働契約法","cat":"雇止め法理","text":"有期労働契約が過去に反復して更新され、雇止めが解雇と【社会通念上同視|実質的に同視|事実上同視|同一視】できると認められる場合等に、使用者が更新の申込みを拒絶することが、客観的に合理的な理由を欠き、社会通念上相当であると認められないときは、使用者は、従前の有期労働契約の内容である労働条件と同一の労働条件で当該申込みを承諾したものとみなす。","exp":"法19条。東芝柳町工場事件・日立メディコ事件の判例法理を明文化。","page":250},{"law":"労働契約法","cat":"契約期間中の解雇","text":"使用者は、有期労働契約について、【やむを得ない事由|正当な事由|合理的な事由|相当な事由】がある場合でなければ、その契約期間が満了するまでの間において、労働者を解雇することができない。","exp":"法17条1項。期間途中の解雇は解雇権濫用法理よりも狭く解される。","page":247},{"law":"職業能力開発促進法","cat":"目的","text":"職業能力開発促進法は、労働施策総合推進法と相まって、【職業訓練|職業能力開発|技能習得|人材育成】及び職業能力検定の内容の充実強化等のための施策等を総合的かつ計画的に講ずることにより、職業に必要な労働者の能力を開発し、及び向上させることを促進し、もって、職業の安定と労働者の地位の向上を図るとともに、経済及び社会の発展に寄与することを目的とする。","exp":"法1条。","page":254},{"law":"求職者支援法","cat":"目的","text":"求職者支援法は、【特定求職者|失業者|雇用保険を受給できない求職者|未就職者】に対し、職業訓練の実施、当該職業訓練を受けることを容易にするための給付金の支給その他の就職に関する支援措置を講ずることにより、特定求職者の就職を促進し、もって特定求職者の職業及び生活の安定に資することを目的とする。","exp":"法1条。特定求職者は雇用保険の受給資格者等を除く求職者。","page":259},{"law":"賃金の支払の確保等に関する法律","cat":"目的","text":"賃金の支払の確保等に関する法律は、企業経営が安定を欠くに至った場合及び労働者が事業を退職する場合における賃金の支払等の適正化を図るため、【貯蓄金|前払退職金|賃金|積立金】の保全措置及び賃金の支払を受けることが困難となった労働者に対する保護措置その他賃金の支払の確保に関する措置を講じ、もって労働者の生活の安定に資することを目的とする。","exp":"法1条。","page":208},{"law":"賃金の支払の確保等に関する法律","cat":"退職労働者の賃金に係る遅延利息","text":"事業主は、その事業を退職した労働者の賃金(退職手当を除く)の全部又は一部を退職の日までに支払わなかった場合には、当該労働者に対し、退職の日の翌日からその支払をする日までの期間について、まだ支払われていない賃金の額に年【14.6%|7.3%|3%|6%】を乗じて得た金額を遅延利息として支払わなければならない。","exp":"法6条、令1条。","page":209},{"law":"中小企業退職金共済法","cat":"目的","text":"中小企業退職金共済法は、中小企業の従業員について、中小企業者の【相互扶助|共済|連帯|協同】の精神に基づき、その拠出による退職金共済制度を確立し、もってこれらの従業員の福祉の増進と中小企業の振興に寄与することを目的とする。","exp":"法1条。独立行政法人勤労者退職金共済機構が運営。","page":212},{"law":"女性活躍推進法","cat":"目的","text":"女性活躍推進法は、男女共同参画社会基本法の基本理念にのっとり、女性の職業生活における活躍の推進について、その基本原則を定め、並びに国、地方公共団体及び事業主の責務を明らかにするとともに、基本方針及び事業主の【行動計画|事業計画|推進計画|基本計画】の策定等について定めることにより、女性の職業生活における活躍を迅速かつ重点的に推進することを目的とする。","exp":"法1条。一般事業主行動計画の策定義務は常時雇用労働者101人以上の事業主。","page":194},{"law":"労働経済","cat":"労働力人口の定義","text":"労働力人口とは、【15歳以上|16歳以上|18歳以上|15歳以上65歳未満】の人口のうち、就業者と完全失業者を合わせたものをいう。これに対し非労働力人口とは、15歳以上の人口のうち、就業者と完全失業者以外の者をいう。","exp":"労働力調査(総務省統計局)の用語。","page":298},{"law":"労働経済","cat":"労働力率の定義","text":"労働力率(労働力人口比率)とは、15歳以上の人口に占める【労働力人口|就業者数|生産年齢人口|完全失業者数】の割合をいう。","exp":"労働力調査の用語。百分比で表示される。","page":298},{"law":"労働経済","cat":"完全失業率の定義","text":"完全失業率とは、【労働力人口|15歳以上人口|生産年齢人口|就業者数】に占める完全失業者の割合をいい、その算式は(完全失業者数/労働力人口)×100(%)である。","exp":"労働力調査の用語。完全失業者は仕事がなく・すぐ就ける・求職活動をしたの3条件を満たす者。","page":298},{"law":"労働経済","cat":"有効求人倍率の定義","text":"有効求人倍率とは、【有効求職者数|新規求職者数|完全失業者数|求人数】(前月から繰り越された数＋新規の数)に対する有効求人数の割合をいう。これに対し新規求人倍率は、その月に新たに登録された新規求職申込件数に対する新規求人数の割合をいう。","exp":"職業安定業務統計の用語。有効求人倍率は景気とほぼ一致、新規求人倍率は先行的に動く。","page":298},{"law":"労働経済","cat":"生産年齢人口の定義","text":"生産年齢人口とは、【15歳以上|16歳以上|18歳以上|20歳以上】【65歳未満|60歳未満|70歳未満|64歳以下】の年齢に該当する人口をいう。","exp":"労働経済の基礎用語。","page":299},{"law":"労働経済","cat":"求人倍率の定義","text":"求人倍率とは、求職者に対する【求人数|求人倍率|有効求人数|新規求人数】の割合をいい、その算式は求人数/求職者数である。","exp":"職業安定業務統計の用語。","page":298},{"law":"労働経済","cat":"完全失業者の定義","text":"完全失業者とは、仕事がなくて調査週間中に少しも仕事をしなかった者であり、かつ、仕事があれば【すぐ就くことができる|就職を希望する|働く意思がある|求職中である】者であって、調査週間中に仕事を探す活動や事業を始める準備をしていた者をいう。","exp":"労働力調査の用語。3条件をすべて満たす者。","page":298}],"shaichi":[{"law":"国民健康保険法","cat":"
