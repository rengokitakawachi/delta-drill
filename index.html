知書により通知し、通知を受けた事業主は通知を受けた日の翌日から起算して15日以内に納付しなければならない。","a":true,"exp":"〇。法19条4項・5項。確定保険料の認定決定は納入告知書により通知し、通知を受けた日(翌日起算)から15日以内に納付する。","page":100,"detail":"〇。法19条4項・5項、則38条5項のとおり、確定保険料について政府(都道府県労働局歳入徴収官)が認定決定したときは、納入告知書により通知し、通知を受けた事業主はその通知を受けた日(翌日起算)から15日以内に納付しなければならない。本問は正しい。"},{"law":"年度更新","cat":"確定保険料の延納","q":"確定保険料については、延納が認められている。","a":false,"exp":"×。注意書き。確定保険料については、延納は認められていない。延納が認められるのは概算保険料である。","page":101,"detail":"×。p.101注意書きのとおり、確定保険料については延納は認められていない。延納が認められるのは概算保険料(当初・認定決定・増加・追加徴収)であるため本問は誤りである。"},{"law":"年度更新","cat":"還付加算金","q":"労働保険料には、還付加算金の制度が設けられている。","a":false,"exp":"×。ポイント解説。労働保険料には還付加算金の制度は設けられていない。","page":102,"detail":"×。p.102ポイント解説のとおり、労働保険料には還付加算金の制度は設けられていない。本問は還付加算金の制度が設けられているとしている点で誤りである。"},{"law":"年度更新","cat":"一般拠出金","q":"一般拠出金は、労災保険の保険関係が成立している事業の事業主から毎年度徴収され、賃金総額に一般拠出金率(一律1000分の0.02)を乗じて計算した額を申告・納付する。","a":true,"exp":"〇。一般拠出金は石綿健康被害者の救済費用に充てるため、賃金総額×一般拠出金率(一律1000分の0.02)を確定保険料の申告に併せて申告・納付する。","page":102,"detail":"〇。一般拠出金は、石綿による健康被害の救済費用に充てるため、労災保険の保険関係が成立している事業の事業主から毎年度徴収され、確定保険料の申告に併せて、一般保険料の計算の基礎となる賃金総額に一般拠出金率(一律1000分の0.02)を乗じて計算した額を申告・納付する。なお一般拠出金は労働保険料とは別個のものである。"},{"law":"メリット制","cat":"制度趣旨","q":"メリット制は労災保険率に適用されるものであり、雇用保険率にはメリット制は適用されない。","a":true,"exp":"〇。注意書き。メリット制は労災保険率(又は有期事業の確定保険料)に適用され、雇用保険率には適用されない。","page":106,"detail":"〇。p.106注意書きのとおり、メリット制は労災保険率(継続事業・一括有期事業)又は確定保険料の額(有期事業)に適用されるものであり、雇用保険率にはメリット制は適用されない。本問は正しい。"},{"law":"メリット制","cat":"継続事業の適用要件","q":"継続事業に係るメリット制の収支率要件は、連続する3保険年度間の収支率が100分の80を超え又は100分の70以下であることである。","a":false,"exp":"×。法12条3項、則17条。継続事業のメリット制の収支率要件は、収支率が100分の85を超え又は100分の75以下であることである。","page":107,"detail":"×。法12条3項、則17条のとおり、継続事業のメリット制の収支率要件は、連続する3保険年度間の収支率が100分の85を超え又は100分の75以下であることである。100分の80・100分の70ではないため本問は誤りである。"},{"law":"メリット制","cat":"継続事業の適用要件","q":"継続事業に係るメリット制の事業継続要件は、基準日において、労災保険に係る保険関係が成立した後3年以上経過していることである。","a":true,"exp":"〇。法12条3項。事業継続要件は、最後の保険年度に属する3月31日(基準日)において、労災保険に係る保険関係成立後3年以上経過していることである。","page":107,"detail":"〇。法12条3項のとおり、継続事業のメリット制の事業継続要件は、連続する3保険年度中の最後の保険年度に属する3月31日(基準日)において、労災保険に係る保険関係が成立した後3年以上経過していることである。本問は正しい。"},{"law":"メリット制","cat":"収支率","q":"メリット収支率の算定において、通勤災害及び複数業務要因災害に係る保険給付の額は、収支率に係る保険給付等の額の算定の基礎から除かれる。","a":true,"exp":"〇。則。通勤災害及び複数業務要因災害に係る保険給付の額・特別支給金の額は、収支率の保険給付等の額の算定基礎から除かれる。","page":109,"detail":"〇。則のとおり、メリット収支率の算定において、複数業務要因災害に係る保険給付の額及び通勤災害に係る保険給付の額並びにこれらの特別支給金の額は、収支率に係る保険給付等の額の算定の基礎から除かれる(事業主が災害補償責任を負わない・事業主に直接関係がないため)。本問は正しい。"},{"law":"メリット制","cat":"継続事業の効果","q":"継続事業に係るメリット制が適用されると、基準労災保険率から非業務災害率を減じた率を100分の40の範囲内で引き上げ又は引き下げた率に非業務災害率を加えた率が、基準日の属する保険年度の次の次の保険年度の労災保険率となる。","a":true,"exp":"〇。法12条3項。継続事業のメリット制では、100分の40の範囲内で引上げ・引下げを行い、基準日の属する保険年度の次の次の保険年度の労災保険率(メリット労災保険率)とする。","page":110,"detail":"〇。法12条3項のとおり、継続事業のメリット制が適用されると、基準労災保険率から非業務災害率を減じた率を100分の40の範囲内において厚生労働省令で定める率だけ引き上げ又は引き下げた率に非業務災害率を加えた率(メリット労災保険率)が、基準日の属する保険年度の次の次の保険年度の労災保険率となる。本問は正しい。"},{"law":"メリット制","cat":"特例メリット制","q":"特例メリット制(労災保険率の特例)が適用されると、基準労災保険率から非業務災害率を減じた率を引き上げ又は引き下げる範囲は、100分の45に拡大される。","a":true,"exp":"〇。法12条の2。特例メリット制では、引上げ・引下げの範囲が100分の45に拡大される。","page":112,"detail":"〇。法12条の2のとおり、特例メリット制(労災保険率の特例)が適用されると、中小事業主が安全衛生確保措置を講じた場合に、基準労災保険率から非業務災害率を減じた率を引き上げ又は引き下げる範囲が、通常の100分の40から100分の45に拡大される。本問は正しい。"},{"law":"メリット制","cat":"特例メリット制","q":"特例メリット制は、所定の要件を満たせば法律上当然に適用される。","a":false,"exp":"×。注意書き。特例メリット制は法律上当然に適用されるものではなく、所定の手続(申告書の提出等)をしなければ適用されない。","page":112,"detail":"×。p.112注意書きのとおり、特例メリット制は法律上当然に適用されるものではなく、安全衛生措置について所轄都道府県労働局長の確認を受け、労災保険率特例適用申告書を提出する等の所定の手続をしなければ適用されない。本問は法律上当然に適用されるとしている点で誤りである。"},{"law":"メリット制","cat":"特例メリット制の対象","q":"特例メリット制は、継続事業のメリット制が適用される事業のうち、建設の事業及び立木の伐採の事業を含むすべての事業が対象となる。","a":false,"exp":"×。法12条の2。特例メリット制は、継続事業のメリット制が適用される事業であって「建設の事業及び立木の伐採の事業以外」の事業が対象である。","page":112,"detail":"×。法12条の2のとおり、特例メリット制は、継続事業のメリット制が適用される事業であって「建設の事業及び立木の伐採の事業以外」の事業が対象である。建設の事業及び立木の伐採の事業は対象とならないため、これらを含むすべての事業が対象とする本問は誤りである。"},{"law":"メリット制","cat":"有期事業のメリット制","q":"有期事業のメリット制は、収支率の状況を将来の労災保険率に反映させ、翌年度の労災保険率を引き上げ又は引き下げることとしている。","a":false,"exp":"×。有期事業では収支率を将来の労災保険率に反映できないため、確定保険料の額を引き上げ又は引き下げることとしている。","page":114,"detail":"×。p.114のとおり、有期事業では収支率の状況を将来の労災保険率に反映させることができないため、継続事業とは異なり「確定保険料の額」を引き上げ又は引き下げることとしている。翌年度の労災保険率を引き上げ又は引き下げるわけではないため本問は誤りである。"},{"law":"メリット制","cat":"有期事業のメリット制","q":"有期事業のメリット制は、建設の事業又は立木の伐採の事業のうち、確定保険料の額が40万円以上である事業等が、収支率要件を満たす場合に適用される。","a":true,"exp":"〇。法20条1項、則35条1項。有期事業のメリット制は、確定保険料40万円以上等の建設・立木の伐採の事業が収支率要件を満たす場合に適用される。","page":114,"detail":"〇。法20条1項、則35条1項のとおり、有期事業のメリット制は、建設の事業又は立木の伐採の事業のうち、確定保険料の額が40万円以上である事業等(建設は請負金額1億1,000万円以上等)が、収支率要件(収支率が100分の85超又は100分の75以下)を満たす場合に適用される。本問は正しい。"},{"law":"メリット制","cat":"有期事業のメリット制の効果","q":"有期事業のメリット制の引上げ・引下げの範囲は、建設の事業については100分の40の範囲内、立木の伐採の事業については100分の35の範囲内である。","a":true,"exp":"〇。則35条2項。有期事業のメリット制の引上げ・引下げの範囲は、建設の事業100分の40、立木の伐採の事業100分の35の範囲内である。","page":116,"detail":"〇。則35条2項・別表6のとおり、有期事業のメリット制による引上げ・引下げの範囲は、建設の事業については100分の40の範囲内、立木の伐採の事業については100分の35の範囲内である。本問は正しい。"},{"law":"メリット制","cat":"有期事業のメリット制の準用","q":"有期事業のメリット制は、第1種特別加入保険料及び第2種特別加入保険料に係る確定保険料の額について準用されている。","a":false,"exp":"×。法20条2項。有期事業のメリット制は第1種特別加入保険料に係る確定保険料の額については準用されているが、第2種特別加入保険料については準用されていない。","page":116,"detail":"×。法20条2項のとおり、有期事業のメリット制は第1種特別加入保険料に係る確定保険料の額については準用されているが、第2種特別加入保険料に係る確定保険料の額については準用されていない。本問は第2種特別加入保険料も準用されているとしている点で誤りである。"},{"law":"印紙保険料","cat":"印紙保険料の額","q":"印紙保険料の額は、日雇労働被保険者1人につき1日当たり、第1級176円、第2級146円、第3級96円である。","a":true,"exp":"〇。法22条1項。印紙保険料の額は、第1級176円、第2級146円、第3級96円である。","page":120,"detail":"〇。法22条1項のとおり、印紙保険料の額は、日雇労働被保険者1人につき1日当たり、賃金の日額に応じて第1級176円、第2級146円、第3級96円である。本問は正しい。"},{"law":"印紙保険料","cat":"印紙保険料の等級","q":"印紙保険料の第1級は、賃金の日額が8,200円以上の者に適用される。","a":false,"exp":"×。法22条1項。第1級は賃金の日額11,300円以上に適用される。8,200円以上11,300円未満は第2級である。","page":120,"detail":"×。法22条1項のとおり、印紙保険料の第1級(176円)は賃金の日額が11,300円以上の者に適用される。8,200円以上11,300円未満は第2級(146円)、8,200円未満は第3級(96円)である。第1級を8,200円以上とする本問は誤りである。"},{"law":"印紙保険料","cat":"印紙保険料の納付","q":"事業主は、日雇労働被保険者を使用した場合には、その者に賃金を支払う都度、日雇労働被保険者手帳の該当日欄に雇用保険印紙をはり、消印することによって印紙保険料を納付する。","a":true,"exp":"〇。法23条1項・2項。事業主は、賃金を支払う都度、日雇労働被保険者手帳に雇用保険印紙をはり消印することにより印紙保険料を納付する。","page":122,"detail":"〇。法23条1項・2項、則40条1項のとおり、事業主は日雇労働被保険者を使用した場合には、その者に賃金を支払う都度、日雇労働被保険者手帳の該当日欄に雇用保険印紙をはり、消印することによって印紙保険料を納付しなければならない。本問は正しい。"},{"law":"印紙保険料","cat":"雇用保険印紙購入通帳","q":"雇用保険印紙購入通帳は、その交付の日の属する保険年度に限り、その効力を有する。","a":true,"exp":"〇。則42条2項。雇用保険印紙購入通帳は、交付の日の属する保険年度に限り効力を有する。","page":123,"detail":"〇。則42条2項のとおり、雇用保険印紙購入通帳は、その交付の日の属する保険年度に限り、その効力を有する。引き続き購入する場合は有効期間の更新を受ける必要がある。本問は正しい。"},{"law":"印紙保険料","cat":"購入通帳の有効期間の更新","q":"雇用保険印紙購入通帳の有効期間の更新申請は、有効期間が満了する日の翌日の2か月前から満了する日までの間に行わなければならない。","a":false,"exp":"×。則42条3項～5項。更新申請は、有効期間が満了する日の翌日の1か月前から満了する日までの間(毎年3月1日から3月31日)に行う。2か月前ではない。","page":124,"detail":"×。則42条3項〜5項のとおり、雇用保険印紙購入通帳の有効期間の更新申請は、有効期間が満了する日の翌日の「1か月前」から満了する日までの間(毎年3月1日から3月31日まで)に行わなければならない。2か月前ではないため本問は誤りである。"},{"law":"印紙保険料","cat":"雇用保険印紙の買戻し","q":"雇用保険印紙が変更されたことにより買戻しを申し出る場合、買戻しの期間は、雇用保険印紙が変更された日から6か月間とされている。","a":true,"exp":"〇。則43条3項。雇用保険印紙の変更による買戻しの期間は、変更された日から6か月間である。この場合、所轄公共職業安定所長の確認は不要である。","page":125,"detail":"〇。則43条3項のとおり、雇用保険印紙が変更されたことにより買戻しを申し出る場合、買戻しの期間は雇用保険印紙が変更された日から6か月間とされている。この場合は所轄公共職業安定所長の確認は不要である(保険関係消滅時・被保険者不使用時は確認が必要)。本問は正しい。"},{"law":"印紙保険料","cat":"印紙保険料の認定決定","q":"認定決定に係る印紙保険料は、雇用保険印紙により納付することができる。","a":false,"exp":"×。注意書き、則38条3項。認定決定に係る印紙保険料は、雇用保険印紙では納付できず、現金により日本銀行又は所轄都道府県労働局収入官吏に納付しなければならない。","page":127,"detail":"×。p.127注意書き、則38条3項のとおり、認定決定に係る印紙保険料は雇用保険印紙では納付することができず、現金により日本銀行又は所轄都道府県労働局収入官吏に納付しなければならない。本問は雇用保険印紙により納付できるとしている点で誤りである。"},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金","q":"事業主が認定決定に係る確定保険料又はその不足額を納付しなければならない場合には、政府は追徴金を徴収する。","a":true,"exp":"〇。法21条1項。事業主が認定決定に係る確定保険料又はその不足額を納付しなければならない場合には、政府は追徴金を徴収する。","page":130,"detail":"〇。法21条1項のとおり、事業主が認定決定に係る確定保険料又はその不足額を納付しなければならない場合には、政府は追徴金を徴収する。ただし天災その他やむを得ない理由による場合や額が1,000円未満の場合は徴収されない。本問は正しい。"},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金","q":"概算保険料については、認定決定された場合には追徴金が徴収される。","a":false,"exp":"×。注意書き。概算保険料については、認定決定された場合でも追徴金は徴収されない。追徴金が徴収されるのは確定保険料及び印紙保険料である。","page":130,"detail":"×。p.130注意書きのとおり、概算保険料については認定決定された場合でも追徴金は徴収されない。追徴金が徴収されるのは認定決定に係る確定保険料(その不足額)及び納付を怠った印紙保険料であるため、本問は誤りである。"},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金の額","q":"確定保険料に係る追徴金の額は、納付すべき額(1,000円未満の端数は切捨て)に100分の25を乗じて得た額である。","a":false,"exp":"×。法21条1項。確定保険料に係る追徴金は、納付すべき額に100分の10を乗じた額である。100分の25は印紙保険料に係る追徴金の率である。","page":131,"detail":"×。法21条1項のとおり、確定保険料に係る追徴金の額は、納付すべき額(1,000円未満の端数は切捨て)に「100分の10」を乗じて得た額である。100分の25は印紙保険料に係る追徴金の率であるため本問は誤りである。"},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金の額","q":"印紙保険料に係る追徴金の額は、認定決定された印紙保険料の額(1,000円未満の端数は切捨て)に100分の10を乗じて得た額である。","a":false,"exp":"×。法25条2項。印紙保険料に係る追徴金は、認定決定された印紙保険料の額に100分の25を乗じて得た額である。100分の10ではない。","page":131,"detail":"×。法25条2項のとおり、印紙保険料に係る追徴金の額は、認定決定された印紙保険料の額(1,000円未満の端数は切捨て)に「100分の25」を乗じて得た額である。100分の10ではないため本問は誤りである(100分の10は確定保険料に係る追徴金の率)。"},{"law":"追徴金・延滞金・不服申立て","cat":"追徴金","q":"事業主が天災その他やむを得ない理由により、認定決定された確定保険料又はその不足額を納付しなければならなくなった場合には、追徴金は徴収されない。","a":true,"exp":"〇。天災その他やむを得ない理由により認定決定された確定保険料等を納付しなければならなくなった場合には、追徴金は徴収されない。","page":130,"detail":"〇。p.130のとおり、事業主が天災その他やむを得ない理由により認定決定された確定保険料又はその不足額を納付しなければならなくなった場合には、追徴金は徴収されない。なお「天災その他やむを得ない理由」に法令の不知や営業の不振は含まれない。本問は正しい。"},{"law":"追徴金・延滞金・不服申立て","cat":"督促","q":"督促状により指定すべき期限は、督促状を発する日から起算して14日以上経過した日でなければならない。","a":false,"exp":"×。法27条等。督促状により指定すべき期限は、督促状を発する日から起算して10日以上経過した日でなければならない。14日ではない。","page":135,"detail":"×。法27条等のとおり、督促状により指定すべき期限は、督促状を発する日から起算して「10日以上」経過した日でなければならない。14日ではないため本問は誤りである。督促は滞納処分・時効更新・延滞金徴収の前提要件となる。"},{"law":"追徴金・延滞金・不服申立て","cat":"延滞金","q":"延滞金は、納期限の翌日からその完納又は財産差押えの日の前日までの期間の日数に応じ、原則として年14.6%(納期限の翌日から2か月を経過する日までの期間は年7.3%)の割合を乗じて計算する。","a":true,"exp":"〇。法28条1項。延滞金は原則として年14.6%、納期限の翌日から2か月を経過する日までの期間は年7.3%の割合で計算する。","page":136,"detail":"〇。法28条1項のとおり、延滞金は、労働保険料の額に、納期限の翌日からその完納又は財産差押えの日の前日までの期間の日数に応じ、原則として年14.6%(納期限の翌日から2か月を経過する日までの期間については年7.3%)の割合を乗じて計算する。本問は正しい(当分の間の特例あり)。"},{"law":"追徴金・延滞金・不服申立て","cat":"延滞金","q":"追徴金が督促された場合には、追徴金についても延滞金が徴収される。","a":false,"exp":"×。注意書き。追徴金は労働保険料ではないため、督促されたとしても延滞金は徴収されない。","page":136,"detail":"×。p.136注意書きのとおり、追徴金は労働保険料ではないため、督促されたとしても延滞金は徴収されない。本問は追徴金についても延滞金が徴収されるとしている点で誤りである。なお概算保険料には追徴金は課されないが延滞金は課されることがある。"},{"law":"追徴金・延滞金・不服申立て","cat":"延滞金が徴収されない場合","q":"延滞金の額が100円未満であるとき、又は労働保険料の額が1,000円未満であるときは、延滞金は徴収されない。","a":true,"exp":"〇。法28条1項・5項。延滞金の額が100円未満のとき、又は労働保険料の額が1,000円未満のときは、延滞金は徴収されない。","page":138,"detail":"〇。法28条1項・5項のとおり、延滞金の額が100円未満であるとき、又は労働保険料の額が1,000円未満であるときは、延滞金は徴収されない。本問は正しい。"},{"law":"追徴金・延滞金・不服申立て","cat":"延滞金が徴収されない場合","q":"納付義務者の住所又は居所がわからないため、公示送達の方法によって督促したときは、延滞金は徴収されない。","a":true,"exp":"〇。法28条5項。公示送達の方法によって督促したときは、延滞金は徴収されない。","page":138,"detail":"〇。法28条5項のとおり、納付義務者の住所又は居所がわからないため公示送達の方法によって督促したときは、延滞金は徴収されない。公示送達は確実に本人に督促が通知されるとは限らないためである。本問は正しい。"},{"law":"追徴金・延滞金・不服申立て","cat":"労働保険料の負担","q":"雇用保険に係る一般保険料のうち二事業率に係る保険料を除いた部分は、事業主及び被保険者が3分の1ずつ負担する。","a":false,"exp":"×。法31条1項。雇用保険に係る一般保険料のうち二事業率に係る保険料以外は、事業主及び被保険者が2分の1ずつ負担する。二事業率に係る保険料は全額事業主負担である。","page":140,"detail":"×。法31条1項のとおり、雇用保険に係る一般保険料のうち二事業率に係る保険料以外の部分は、事業主及び被保険者が「2分の1ずつ」負担する。3分の1ずつではないため本問は誤りである。なお二事業率に係る保険料は全額事業主が負担する。"},{"law":"追徴金・延滞金・不服申立て","cat":"印紙保険料の負担","q":"印紙保険料は、事業主及び日雇労働被保険者が2分の1ずつ負担し、その額に1円未満の端数があるときは事業主が負担する。","a":true,"exp":"〇。法31条2項。印紙保険料は事業主及び日雇労働被保険者が2分の1ずつ負担し、1円未満の端数は事業主が負担する。","page":141,"detail":"〇。法31条2項のとおり、印紙保険料は事業主及び日雇労働被保険者が2分の1ずつ負担し、その額に1円未満の端数があるときは事業主が負担する。本問は正しい。"},{"law":"追徴金・延滞金・不服申立て","cat":"時効","q":"労働保険料その他徴収法の規定による徴収金を徴収し、又はその還付を受ける権利は、これらを行使することができる時から3年を経過したときは、時効によって消滅する。","a":false,"exp":"×。法41条。労働保険料その他徴収法の規定による徴収金を徴収し又は還付を受ける権利は、2年を経過したときに時効によって消滅する。3年ではない。","page":159,"detail":"×。法41条のとおり、労働保険料その他徴収法の規定による徴収金を徴収し、又はその還付を受ける権利は、これらを行使することができる時から「2年」を経過したときに時効によって消滅する。3年ではないため本問は誤りである。"},{"law":"追徴金・延滞金・不服申立て","cat":"不服申立て","q":"徴収法には独自の不服申立ての規定が設けられていないため、行政庁の処分について不服がある場合には、行政不服審査法の規定に基づき厚生労働大臣に審査請求をすることができる。","a":true,"exp":"〇。徴収法には独自の不服申立ての規定がないため、行政不服審査法に基づき厚生労働大臣に審査請求をすることができる。","page":158,"detail":"〇。p.158のとおり、徴収法には独自の不服申立ての規定が設けられていないことから、労働保険料に関する処分その他徴収法の規定による行政庁の処分について不服がある場合には、行政不服審査法の規定に基づき厚生労働大臣に審査請求をすることができる。本問は正しい。"},{"law":"追徴金・延滞金・不服申立て","cat":"不服申立て","q":"徴収法による行政庁の処分については、審査請求の前置が必要であり、審査請求を経なければ処分取消しの訴えを提起することができない。","a":false,"exp":"×。注意書き。徴収法による処分については不服申立ての前置がないため、審査請求をすることなく処分取消しの訴えを提起することができる。","page":158,"detail":"×。p.158注意書きのとおり、徴収法による行政庁の処分については不服申立ての前置がないため、審査請求をすることなく処分取消しの訴えを提起することができる。審査請求の前置が必要とする本問は誤りである。"},{"law":"追徴金・延滞金・不服申立て","cat":"罰則","q":"雇用保険印紙の「譲渡等の禁止」の規定に違反した場合には、6か月以下の拘禁刑又は30万円以下の罰金に処せられる。","a":false,"exp":"×。比較。雇用保険印紙の譲渡等の禁止の規定違反には、罰則は設けられていない。","page":162,"detail":"×。p.162の比較のとおり、雇用保険印紙の「譲渡等の禁止」の規定違反には罰則は設けられていない。本問は6か月以下の拘禁刑又は30万円以下の罰金に処せられるとしている点で誤りである(印紙保険料の貼付・消印義務違反等には当該罰則がある)。"},{"law":"労働保険事務組合","cat":"認可","q":"事業主の団体又はその連合団体は、労働保険事務組合としての業務を行おうとするときは、都道府県労働局長の認可を受けなければならない。","a":false,"exp":"×。法33条2項。労働保険事務組合としての業務を行うには厚生労働大臣の認可が必要である(認可に係る権限は都道府県労働局長に委任されている)。","page":145,"detail":"×。法33条2項のとおり、事業主の団体又はその連合団体が労働保険事務組合としての業務を行おうとするときは、厚生労働大臣の認可を受けなければならない。認可に係る権限は都道府県労働局長に委任されているが、認可の主体は厚生労働大臣であるため、都道府県労働局長の認可とする本問は誤り。"},{"law":"労働保険事務組合","cat":"委託事業主の範囲","q":"労働保険事務組合に労働保険事務の処理を委託することができるのは、卸売業・サービス業については常時100人以下、その他の事業については常時300人以下の労働者を使用する事業主である。","a":true,"exp":"〇。則62条。委託できる事業規模は、金融業・保険業・不動産業・小売業は常時50人以下、卸売業・サービス業は常時100人以下、その他は常時300人以下である。","page":148,"detail":"〇。則62条のとおり、労働保険事務組合に労働保険事務の処理を委託できる事業規模は、金融業・保険業・不動産業・小売業は常時50人以下、卸売業・サービス業は常時100人以下、その他の事業は常時300人以下である。本問は卸売業・サービス業及びその他の事業の規模を正しく記している。"},{"law":"労働保険事務組合","cat":"委託事業主の範囲","q":"労働保険事務組合に委託できるのは継続事業の事業主のみであり、有期事業の事業主は委託することができない。","a":false,"exp":"×。注意書き。継続事業、有期事業いずれの事業主についても、事業規模要件を満たせば労働保険事務組合に委託することができる。","page":148,"detail":"×。p.148注意書きのとおり、継続事業・有期事業のいずれの事業主についても、事業規模要件を満たせば労働保険事務組合に労働保険事務の処理を委託することができる。有期事業の事業主が委託できないわけではないため本問は誤りである。"},{"law":"労働保険事務組合","cat":"使用労働者数の判断","q":"労働保険事務の処理を委託できるかの判断における使用労働者数は、企業単位ではなく事業場単位で判断する。","a":false,"exp":"×。則62条。委託に係る使用労働者数は、事業場単位ではなく企業単位で判断する。","page":148,"detail":"×。則62条のとおり、委託に係る使用労働者数は、事業場単位ではなく企業単位で判断する。本問は事業場単位で判断するとしている点で誤りである(ただし場所的に独立した異種事業を行う場合は個々の事業ごとに判断する)。"},{"law":"労働保険事務組合","cat":"委託できない事務","q":"労災保険の保険給付に関する請求書等に係る事務手続及びその代行は、労働保険事務組合に委託できない労働保険事務である。","a":true,"exp":"〇。法33条1項等。印紙保険料に関する事項、労災・雇用保険の保険給付に関する請求書等の事務手続、雇用保険二事業に係る事務手続等は委託できない。","page":149,"detail":"〇。法33条1項等のとおり、労災保険・雇用保険の保険給付に関する請求書等に係る事務手続及びその代行は、労働保険事務組合に委託できない労働保険事務である。ほかに印紙保険料に関する事項、雇用保険二事業に係る事務手続等も委託できない。本問は正しい。"},{"law":"労働保険事務組合","cat":"事務組合の責任","q":"委託に基づき事業主が労働保険料その他の徴収金の納付のため金銭を労働保険事務組合に交付したときは、その金額の限度で、労働保険事務組合は政府に対して納付の責めに任ずる。","a":true,"exp":"〇。法35条1項。事業主が納付のため金銭を労働保険事務組合に交付したときは、その金額の限度で事務組合が政府に対し納付の責めに任ずる。","page":152,"detail":"〇。法35条1項のとおり、委託に基づき事業主が労働保険料その他の徴収金の納付のため金銭を労働保険事務組合に交付したときは、その金額の限度で、労働保険事務組合は政府に対して当該徴収金の納付の責めに任ずる。金銭の交付を受けていない徴収金については納付責任を負わない。本問は正しい。"},{"law":"労働保険事務組合","cat":"事務組合の責任","q":"政府が追徴金又は延滞金を徴収する場合において、その徴収について労働保険事務組合の責めに帰すべき理由があるときは、その限度で、労働保険事務組合が政府に対して納付の責めに任ずる。","a":true,"exp":"〇。法35条2項。追徴金又は延滞金について事務組合の責めに帰すべき理由があるときは、その限度で事務組合が納付の責めに任ずる。","page":152,"detail":"〇。法35条2項のとおり、政府が追徴金又は延滞金を徴収する場合において、その徴収について労働保険事務組合の責めに帰すべき理由があるときは、その限度で、労働保険事務組合が政府に対して当該徴収金の納付の責めに任ずる。本問は正しい。"},{"law":"労働保険事務組合","cat":"事務組合の責任","q":"政府は、労働保険事務組合が納付すべき徴収金については、委託事業主に対して直ちに徴収することができる。","a":false,"exp":"×。法35条3項。政府は、労働保険事務組合に対し滞納処分をしてもなお徴収すべき残余がある場合に限り、その残余の額を委託事業主から徴収できる。","page":152,"detail":"×。法35条3項のとおり、政府は、労働保険事務組合が納付すべき徴収金については、当該労働保険事務組合に対して滞納処分をしてもなお徴収すべき残余がある場合に限り、その残余の額を委託事業主から徴収することができる。委託事業主に対して直ちに徴収できるわけではないため本問は誤りである。"},{"law":"労働保険事務組合","cat":"変更の届出","q":"労働保険事務組合は、認可申請書等に記載された一定の事項に変更を生じた場合には、その変更があった日の翌日から起算して10日以内に届け出なければならない。","a":false,"exp":"×。則65条。労働保険事務組合の変更の届出は、変更があった日の翌日から起算して14日以内に行う。10日以内ではない。","page":147,"detail":"×。則65条のとおり、労働保険事務組合は、認可申請書等に記載された一定の事項に変更を生じた場合には、その変更があった日の翌日から起算して「14日以内」に届け出なければならない。10日以内ではないため本問は誤りである。"},{"law":"労働保険事務組合","cat":"帳簿の保存","q":"労働保険事務組合が備える雇用保険被保険者関係届出事務等処理簿の保存期間は、4年間である。","a":true,"exp":"〇。則68条等。労働保険事務組合の雇用保険被保険者関係届出事務等処理簿の保存期間は4年間である(委託事業主名簿・徴収及び納付簿は3年間)。","page":153,"detail":"〇。則68条・72条のとおり、労働保険事務組合が備える雇用保険被保険者関係届出事務等処理簿の保存期間は4年間である。なお労働保険事務等処理委託事業主名簿及び労働保険料等徴収及び納付簿の保存期間は3年間である。本問は正しい。"},{"law":"労働保険事務組合","cat":"報奨金の額","q":"労働保険料に係る報奨金の額は、1,000万円と所定の算式により計算した額のうち、いずれか高い額以内となる。","a":false,"exp":"×。報奨金政令2条1項。報奨金の額は、1,000万円と所定の算式による額のうち、いずれか「低い」額以内である。","page":155,"detail":"×。報奨金政令2条1項のとおり、労働保険料に係る報奨金の額は、1,000万円と所定の算式(常時15人以下の労働者を使用する事業の事業主の委託分の前年度労働保険料の額に100分の2を乗じた額に所定額を加えた額)により計算した額のうち、いずれか「低い」額以内となる。高い額ではないため本問は誤り。"},{"law":"労働保険事務組合","cat":"報奨金の交付申請","q":"報奨金の交付を受けようとする労働保険事務組合は、交付申請書を10月15日までにその主たる事務所の所在地を管轄する都道府県労働局長に提出しなければならない。","a":true,"exp":"〇。報奨金省令2条。報奨金の交付申請書は、10月15日までに主たる事務所の所在地を管轄する都道府県労働局長に提出する。","page":155,"detail":"〇。報奨金省令2条のとおり、報奨金の交付を受けようとする労働保険事務組合は、労働保険事務組合報奨金交付申請書を10月15日までに、その主たる事務所の所在地を管轄する都道府県労働局長に提出しなければならない。本問は正しい。"}],"kenpo":[{"law":"総則","cat":"目的","q":"健康保険法は、労働者又はその被扶養者の<b>業務災害</b>(労災保険法に規定する業務災害)以外の疾病、負傷もしくは死亡又は出産に関して保険給付を行うことを目的とする。","a":true,"exp":"〇。法1条。健康保険は業務災害以外の事由を対象とし、業務災害は労災保険が担う。","page":12,"detail":"〇が正解です。法1条は、健康保険法は労働者又はその被扶養者の業務災害(労災保険法に規定する業務災害)以外の疾病、負傷もしくは死亡又は出産に関して保険給付を行い、もって国民の生活の安定と福祉の向上に寄与することを目的とすると規定しています(p.12)。事故に応じた適用区分では、業務災害は労災保険、業務災害以外は健康保険、通勤災害は労災保険が未適用なら健康保険から給付されます。問題文は法1条の文言どおりであり、正しい記述です。"},{"law":"総則","cat":"目的","q":"被保険者が副業として行う請負業務中の業務上の傷病について、労災保険の保険給付が受けられない場合であっても、健康保険の保険給付の対象とはならない。","a":false,"exp":"×。平25.8.14事務連絡。副業の請負業務中等で労災保険給付が受けられない場合は、健康保険の保険給付の対象となる。","page":12,"detail":"×が正解です。平25.8.14事務連絡(p.12)は、被保険者が副業として行う請負業務中やインターンシップ中における業務上の傷病について、労災保険の保険給付が受けられない場合は、健康保険の保険給付の対象となるとしています。問題文は対象とならないとしている点が誤りです。本来業務災害は労災保険が担いますが、労災保険給付が受けられない場合には健康保険が補完します。"},{"law":"総則","cat":"基本的理念","q":"健康保険制度の基本的理念は、平成9年の法律改正で規定されたものである。","a":true,"exp":"〇。法2条。財政が危機的状況となったことから、平成9年改正で実施方法を規定した。","page":14,"detail":"〇が正解です。法2条の基本的理念(p.14)は、健康保険制度を医療保険制度の基本をなすものとして、高齢化の進展や社会経済情勢の変化等に対応し、医療保険の運営の効率化、給付内容及び費用負担の適正化等を総合的に図りつつ実施されなければならないと定めています。テキストの制定の経緯では、健康保険の財政が危機的状況となったことから、平成9年の法律改正でその実施方法を規定したものとされており、問題文は正しい記述です。"},{"law":"総則","cat":"保険者","q":"健康保険(日雇特例被保険者の保険を除く)の保険者は、全国健康保険協会及び健康保険組合である。","a":true,"exp":"〇。法4条。日雇特例被保険者の保険の保険者は全国健康保険協会のみである。","page":14,"detail":"〇が正解です。法4条(p.14)は、健康保険(日雇特例被保険者の保険を除く)の保険者は、全国健康保険協会及び健康保険組合であると規定しています。一方、法123条により日雇特例被保険者の保険の保険者は全国健康保険協会のみとされます。問題文はこの区分どおりであり正しい記述です。"},{"law":"総則","cat":"役員の特例","q":"被保険者又はその被扶養者が法人の役員であるときは、被保険者の数が10人未満である適用事業所に使用される法人の役員としての業務であって所定のものを除き、その法人の役員としての業務に起因する疾病等に関して保険給付は行わない。","a":false,"exp":"×。法53条の2。除外されるのは被保険者の数が「5人未満」である適用事業所に使用される法人の役員としての業務である。","page":13,"detail":"×が正解です。法53条の2(p.13)は、被保険者又はその被扶養者が法人の役員であるときは、その法人の役員としての業務に起因する疾病、負傷又は死亡に関して保険給付は行わないとしつつ、被保険者の数が5人未満である適用事業所に使用される法人の役員としての業務であって厚生労働省令で定めるものを除くとしています。問題文は10人未満としている点が誤りで、正しくは5人未満です。"},{"law":"保険者(協会)","cat":"厚生労働大臣の業務","q":"全国健康保険協会管掌健康保険の事業のうち、被保険者の資格の取得及び喪失の確認、標準報酬月額及び標準賞与額の決定並びに保険料の徴収(任意継続被保険者に係るものを除く)等は、厚生労働大臣が行う。","a":true,"exp":"〇。法5条。これらの業務は協会ではなく厚生労働大臣が行う。任意継続被保険者の保険料徴収は協会が行う。","page":15,"detail":"〇が正解です。法5条(p.15)は、全国健康保険協会管掌健康保険の事業に関する業務のうち、被保険者の資格の取得及び喪失の確認、標準報酬月額及び標準賞与額の決定並びに保険料の徴収(任意継続被保険者に係るものを除く)並びにこれらに附帯する業務は、厚生労働大臣が行うと規定しています。任意継続被保険者に係る保険料の徴収は協会が行います。問題文は正しい記述です。"},{"law":"保険者(協会)","cat":"設立・事務所","q":"全国健康保険協会は、主たる事務所を東京都に、従たる事務所(支部)を各都道府県に設置する。","a":true,"exp":"〇。法7条の4。協会は法人であり、支部を各都道府県に置く。","page":16,"detail":"〇が正解です。法7条の4(p.16)は、全国健康保険協会は、主たる事務所を東京都に、従たる事務所(支部)を各都道府県に設置すると規定しています。また協会は法人とされます(法7条の3)。問題文は条文どおりであり正しい記述です。"},{"law":"保険者(協会)","cat":"役員","q":"全国健康保険協会には、役員として、理事長1人、理事8人以内及び監事2人を置く。","a":false,"exp":"×。法7条の9。協会の役員は、理事長1人、理事「6人以内」及び監事2人である。","page":18,"detail":"×が正解です。法7条の9(p.18)は、全国健康保険協会に、役員として理事長1人、理事6人以内及び監事2人を置くと規定しています。問題文は理事8人以内としている点が誤りで、正しくは理事6人以内です。理事長は協会を代表し業務を執行し、監事は業務の執行及び財務の状況を監査します。"},{"law":"保険者(協会)","cat":"役員の任期","q":"全国健康保険協会の役員の任期は、原則として4年である。","a":false,"exp":"×。法7条の12。役員の任期は3年である。補欠の役員の任期は前任者の残任期間となる。","page":19,"detail":"×が正解です。法7条の12(p.19)は、全国健康保険協会の役員の任期は3年であると規定しています。問題文は4年としている点が誤りです。なお補欠の役員の任期は前任者の残任期間となり、役員は再任されることができます。"},{"law":"保険者(協会)","cat":"運営委員会","q":"全国健康保険協会の運営委員会の委員は9人以内とし、事業主、被保険者及び協会の業務の適正な運営に必要な学識経験を有する者のうちから、厚生労働大臣が各同数を任命する。委員の任期は2年である。","a":true,"exp":"〇。法7条の18。事業主・被保険者・学識経験者を各同数任命し、任期は2年である。","page":20,"detail":"〇が正解です。法7条の18(p.20)は、運営委員会の委員は9人以内とし、事業主、被保険者及び協会の業務の適正な運営に必要な学識経験を有する者のうちから、厚生労働大臣が各同数を任命すると規定し、委員の任期は2年であるとしています。問題文は条文どおりであり正しい記述です。"},{"law":"保険者(協会)","cat":"事業年度","q":"全国健康保険協会の事業年度は、毎年4月1日に始まり、翌年3月31日に終わる。","a":true,"exp":"〇。法7条の25。協会は毎事業年度の決算を翌事業年度の5月31日までに完結しなければならない。","page":22,"detail":"〇が正解です。法7条の25(p.22)は、全国健康保険協会の事業年度は、毎年4月1日に始まり、翌年3月31日に終わると規定しています。また法7条の28により、協会は毎事業年度の決算を翌事業年度の5月31日までに完結しなければなりません。問題文は正しい記述です。"},{"law":"保険者(組合)","cat":"設立(単一組合)","q":"1又は2以上の適用事業所について常時700人以上の被保険者を使用する事業主は、健康保険組合を設立することができる。","a":true,"exp":"〇。法11条、令1条の3。単一組合は700人以上、総合組合は合算して常時3,000人以上が要件である。","page":26,"detail":"〇が正解です。法11条、令1条の3(p.26)は、単一組合について、1又は2以上の適用事業所について常時700人以上の被保険者を使用する事業主は健康保険組合を設立することができると規定しています。総合組合は事業主が共同して設立し、被保険者の数を合算して常時3,000人以上とすることが要件です。問題文は単一組合の700人以上の要件どおりで正しい記述です。"},{"law":"保険者(組合)","cat":"設立(総合組合)","q":"適用事業所の事業主が共同して健康保険組合を設立する場合、被保険者の数は合算して常時5,000人以上でなければならない。","a":false,"exp":"×。法11条、令1条の3。総合組合の被保険者数は合算して常時3,000人以上でなければならない。","page":26,"detail":"×が正解です。法11条、令1条の3(p.26)は、適用事業所の事業主が共同して健康保険組合を設立する場合(総合組合)、被保険者の数は合算して常時3,000人以上でなければならないと規定しています。問題文は5,000人以上としている点が誤りで、正しくは3,000人以上です。"},{"law":"保険者(組合)","cat":"設立の手続","q":"健康保険組合を設立しようとするときは、設立しようとする適用事業所に使用される被保険者の2分の1以上の同意を得て規約を作り、厚生労働大臣の認可を受けなければならない。","a":true,"exp":"〇。法12条。2以上の適用事業所で設立する場合、2分の1以上の同意は各適用事業所について得なければならない。","page":26,"detail":"〇が正解です。法12条(p.26)は、健康保険組合を設立しようとするときは、設立しようとする適用事業所に使用される被保険者の2分の1以上の同意を得て規約を作り、厚生労働大臣の認可を受けなければならないと規定しています。2以上の適用事業所について設立する場合、2分の1以上の同意は各適用事業所について得なければなりません。問題文は正しい記述です。"},{"law":"保険者(組合)","cat":"成立","q":"健康保険組合は、設立の認可の申請をした時に成立する。","a":false,"exp":"×。法15条。健康保険組合は、設立の「認可を受けた時」に成立する。","page":27,"detail":"×が正解です。法15条(p.27)は、健康保険組合は、設立の認可を受けた時に成立すると規定しています。問題文は認可の申請をした時に成立するとしている点が誤りで、正しくは認可を受けた時です。設立の認可があったときは、速やかに規約を公告し、組合会を招集して設立の経過等を報告しなければなりません。"},{"law":"保険者(組合)","cat":"組合会議員","q":"組合会議員の定数は奇数とし、その半数は設立事業所の事業主側から選定し、他の半数は被保険者である組合員において互選する。","a":false,"exp":"×。法18条。組合会議員の定数は「偶数」とし、労使同数で構成される。","page":29,"detail":"×が正解です。法18条(p.29)は、組合会議員の定数は偶数とし、その半数は設立事業所の事業主において事業主及び設立事業所に使用される者のうちから選定し、他の半数は被保険者である組合員において互選すると規定しています。問題文は定数を奇数としている点が誤りで、正しくは偶数で労使同数の構成です。"},{"law":"保険者(組合)","cat":"合併・分割","q":"健康保険組合は、合併又は分割しようとするときは、組合会において組合会議員の定数の3分の2以上の多数により議決し、厚生労働大臣の認可を受けなければならない。","a":false,"exp":"×。法23条、24条。合併・分割の議決は、組合会議員の定数の4分の3以上の多数による。解散の議決も4分の3以上である。","page":32,"detail":"×が正解です。法23条1項・24条1項(p.32・p.33)は、健康保険組合が合併又は分割しようとするときは、組合会において組合会議員の定数の4分の3以上の多数により議決し、厚生労働大臣の認可を受けなければならないと規定しています。問題文は3分の2以上としている点が誤りで、正しくは4分の3以上です。解散の議決(法26条)も4分の3以上です。"},{"law":"保険者(組合)","cat":"設立事業所の増減","q":"健康保険組合がその設立事業所を増減させようとするときは、関係する適用事業所の事業主の全部及びその適用事業所に使用される被保険者の2分の1以上の同意を得なければならず、厚生労働大臣の認可は必要ない。","a":true,"exp":"〇。法25条。設立事業所の増減には厚生労働大臣の認可は不要である点に注意。","page":33,"detail":"〇が正解です。法25条1項(p.33)は、健康保険組合がその設立事業所を増加させ又は減少させようとするときは、その増減に係る適用事業所の事業主の全部及びその適用事業所に使用される被保険者の2分の1以上の同意を得なければならないと規定しています。テキストの注意書きのとおり、設立事業所の増減には厚生労働大臣の認可は必要ありません。問題文は正しい記述です。"},{"law":"保険者(組合)","cat":"解散","q":"健康保険組合が解散したときは、全国健康保険協会が、解散により消滅した健康保険組合の権利義務を承継する。","a":true,"exp":"〇。法26条4項。解散事由は組合会の4分の3以上の議決、事業継続の不能、厚生労働大臣の解散命令である。","page":34,"detail":"〇が正解です。法26条4項(p.34)は、全国健康保険協会は、解散により消滅した健康保険組合の権利義務を承継すると規定しています。健康保険組合の解散事由は、組合会議員の定数の4分の3以上の多数による組合会の議決、組合の事業の継続の不能、厚生労働大臣の解散の命令の3つです(法26条1項)。問題文は正しい記述です。"},{"law":"保険者(組合)","cat":"指定健康保険組合","q":"指定健康保険組合が定める健全化計画は、指定の日の属する年度の翌年度を初年度とする5か年間の計画である。","a":false,"exp":"×。法28条、令29条。健全化計画は、指定の日の属する年度の翌年度を初年度とする「3か年間」の計画である。","page":35,"detail":"×が正解です。法28条、令29条・30条(p.35)は、指定健康保険組合が定める健全化計画について、指定の日の属する年度の翌年度を初年度とする3か年間の計画とすると規定しています。問題文は5か年間としている点が誤りで、正しくは3か年間です。指定の要件は支出超過の継続かつ財源率が1000分の95を超える状態の継続等です。"},{"law":"保険者(組合)","cat":"地域型健康保険組合","q":"地域型健康保険組合は、合併が行われた日の属する年度及びこれに続く5か年度に限り、法定の範囲内において、不均一の一般保険料率を決定することができる。","a":true,"exp":"〇。法附則3条の2。この一般保険料率の決定は厚生労働大臣の認可を受けなければならない。","page":37,"detail":"〇が正解です。法附則3条の2第1項・2項(p.37)は、地域型健康保険組合は、合併が行われた日の属する年度及びこれに続く5か年度に限り、法定の範囲内において不均一の一般保険料率を決定することができると規定しています。この一般保険料率の決定は厚生労働大臣の認可を受けなければなりません。問題文は正しい記述です。"},{"law":"保険者の選択","cat":"選択の届出","q":"被保険者が同時に2以上の事業所に使用される場合で保険者が2以上あるときは、同時に2以上の事業所に使用されるに至った日から10日以内に、保険者を選択する届出をしなければならない。","a":true,"exp":"〇。則1条の3、2条。2以上の事業所勤務の届出も10日以内に行う。","page":39,"detail":"〇が正解です。則1条の3・2条(p.39)は、被保険者が同時に2以上の事業所に使用される場合で保険者が2以上あるときは、その保険を管掌する保険者を選択しなければならず、その選択の届出は同時に2以上の事業所に使用されるに至った日から10日以内にしなければならないと規定しています。2以上の事業所勤務の届出も10日以内です。問題文は正しい記述です。"},{"law":"権限の委任","cat":"財務大臣への委任","q":"厚生労働大臣は、所定の事情のいずれにも該当する場合に、財務大臣に滞納処分等の権限を委任できるが、その事情の一つに「納付義務者が12か月分以上の保険料を滞納していること」がある。","a":false,"exp":"×。法204条の2、令63条。委任の要件は「24か月分以上」の保険料を滞納していること等である。","page":43,"detail":"×が正解です。法204条の2第1項、令63条(p.43)は、厚生労働大臣が財務大臣に滞納処分等の権限を委任できる要件の一つとして、納付義務者が24か月分以上の保険料を滞納していることを挙げています。問題文は12か月分以上としている点が誤りで、正しくは24か月分以上です。ほかに滞納額5,000万円以上等の要件があります。"},{"law":"権限の委任","cat":"地方厚生局長等","q":"健康保険組合の設立の認可に係る厚生労働大臣の権限は、地方厚生局長等に委任されていない。","a":true,"exp":"〇。法205条。組合の設立認可に係る権限は地方厚生局長等に委任されていない点に注意する。","page":43,"detail":"〇が正解です。法205条(p.43)に基づく地方厚生局長等への権限の委任について、テキストの注意書きは、健康保険組合の設立の認可に係る厚生労働大臣の権限は地方厚生局長等に委任されていないと明記しています。任意適用事業所の認可や規約の変更に係る認可等は委任されますが、組合の設立認可は委任されません。問題文は正しい記述です。"},{"law":"適用事業所","cat":"強制適用","q":"適用業種に該当する事業所であって、常時5人以上の従業員を使用するものは、強制適用事業所となる。","a":true,"exp":"〇。法3条3項。法人の事業所は業種・人数を問わず強制適用となる。個人の適用業種で5人未満は任意適用である。","page":49,"detail":"〇が正解です。法3条3項(p.49)に基づき、適用業種に該当する事業所であって常時5人以上の従業員を使用するものは強制適用事業所となります。テキストの図表のとおり、法人の事業所は業種・人数を問わず強制適用となり、個人の適用業種で5人未満は任意適用です。問題文は正しい記述です。"},{"law":"適用事業所","cat":"従業員数の計算","q":"強制適用事業所の従業員数の計算において、適用除外者は常時使用される者であっても従業員数の計算に含めない。","a":false,"exp":"×。通達。従業員数は常時使用される者すべてについて計算するので、適用除外者であっても常時使用される者は計算に含める。","page":49,"detail":"×が正解です。通達(p.49)は、従業員数は常時使用される者すべてについて計算するので、適用除外者であっても常時使用される者は従業員数の計算に含めると規定しています。問題文は適用除外者を計算に含めないとしている点が誤りです。常時使用される者であれば適用除外者も計算に含めます。"},{"law":"適用事業所","cat":"任意適用","q":"任意適用事業所の認可を受けようとするときは、当該事業所に使用される者(被保険者となるべき者に限る)の2分の1以上の同意を得て、厚生労働大臣に申請しなければならない。","a":true,"exp":"〇。法31条。従業員の多数が希望しても事業主に認可申請の義務は生じない。","page":50,"detail":"〇が正解です。法31条、則21条(p.50)は、任意適用事業所の認可を受けようとするときは、当該事業所に使用される者(被保険者となるべき者に限る)の2分の1以上の同意を得て、厚生労働大臣に申請しなければならないと規定しています。テキストの注意書きのとおり、従業員の多数が希望しても事業主に認可申請の義務は生じません。問題文は正しい記述です。"},{"law":"適用事業所","cat":"任意適用の取消し","q":"任意適用の取消しの認可を受けようとするときは、当該事業所に使用される者(被保険者である者に限る)の3分の2以上の同意を得て、厚生労働大臣に申請しなければならない。","a":false,"exp":"×。法33条。任意適用の取消しは被保険者である者の4分の3以上の同意が必要である。任意適用の認可は2分の1以上の同意である。","page":51,"detail":"×が正解です。法33条、則22条(p.51)は、任意適用の取消しの認可を受けようとするときは、当該事業所に使用される者(被保険者である者に限る)の4分の3以上の同意を得て、厚生労働大臣に申請しなければならないと規定しています。問題文は3分の2以上としている点が誤りで、正しくは4分の3以上です。任意適用の認可は2分の1以上の同意です。"},{"law":"適用事業所","cat":"擬制適用","q":"強制適用事業所が業種の変更又は従業員数の減少等により強制適用事業所に該当しなくなったときは、任意適用の認可があったものとみなされ、特に手続は必要ない。","a":true,"exp":"〇。法32条。擬制適用により引き続き健康保険が適用され、被保険者資格も継続する。","page":51,"detail":"〇が正解です。法32条(p.51)は、強制適用事業所が業種の変更又は従業員数の減少等により強制適用事業所に該当しなくなったときは、任意適用事業所に係る認可があったものとみなされると規定しています(擬制適用)。これにより引き続き健康保険が適用され、その事業所に使用される者は引き続き被保険者とされます。特に手続は必要ありません。問題文は正しい記述です。"},{"law":"被保険者","cat":"適用除外(臨時使用)","q":"2か月以内の期間を定めて使用される者であって、当該定めた期間を超えて使用されることが見込まれないものは、適用除外となるが、当該定めた期間を超えて引き続き使用されるに至ったときは、その日から被保険者となる。","a":true,"exp":"〇。法3条1項。実態として期間を超えて使用される見込みがある場合は、当初から被用者保険の適用対象となる。","page":56,"detail":"〇が正解です。法3条1項(p.56)は、2か月以内の期間を定めて使用される者であって当該定めた期間を超えて使用されることが見込まれないものは適用除外とし、当該定めた期間を超え引き続き使用されるに至ったときはその日から被保険者となるとしています。さらに実態として期間を超えて使用される見込みがある場合は当初から適用対象とされます。問題文は正しい記述です。"},{"law":"被保険者","cat":"適用除外(季節的業務)","q":"季節的業務に使用される者は適用除外となるが、当初から継続して6か月を超える予定で使用される者は、当初から被保険者となる。","a":false,"exp":"×。法3条1項。季節的業務は当初から継続して4か月を超える予定で使用される者が当初から被保険者となる。臨時的事業の事業所は6か月超である。","page":56,"detail":"×が正解です。法3条1項(p.56)は、季節的業務に使用される者は適用除外としつつ、当初から継続して4か月を超える予定で使用される者は当初から被保険者となるとしています。問題文は6か月を超える予定としている点が誤りで、季節的業務は4か月超です。臨時的事業の事業所は6か月超とされ、両者を混同しないよう注意が必要です。"},{"law":"被保険者","cat":"適用除外(臨時的事業)","q":"臨時的事業の事業所に使用される者は適用除外となるが、当初から継続して6か月を超える予定で使用される者は、当初から被保険者となる。","a":true,"exp":"〇。法3条1項。臨時的事業の事業所(展示会・博覧会等)は6か月超、季節的業務は4か月超で当初から被保険者となる。","page":57,"detail":"〇が正解です。法3条1項(p.57)は、臨時的事業の事業所(展示会、博覧会などの業務)に使用される者は適用除外としつつ、当初から継続して6か月を超える予定で使用される者は当初から被保険者となるとしています。季節的業務は4か月超、臨時的事業の事業所は6か月超という違いがあります。問題文は正しい記述です。"},{"law":"被保険者","cat":"適用除外(短時間労働者)","q":"4分の3基準を満たさない短時間労働者で、1週間の所定労働時間が30時間未満であること等のいずれかに該当するものは、被保険者とされない。","a":false,"exp":"×。法3条1項。要件の一つは「1週間の所定労働時間が20時間未満であること」である。30時間ではない。","page":57,"detail":"×が正解です。法3条1項(p.57)は、4分の3基準を満たさない短時間労働者が適用除外とされる要件の一つとして、1週間の所定労働時間が20時間未満であることを挙げています。問題文は30時間未満としている点が誤りで、正しくは20時間未満です。ほかに月額賃金88,000円未満であること、学生であること等の要件があります。"},{"law":"被保険者","cat":"日々雇い入れられる者","q":"臨時に使用される者で日々雇い入れられる者は適用除外となるが、2か月を超えて引き続き使用されるに至ったときは、その日から被保険者となる。","a":false,"exp":"×。法3条1項。日々雇い入れられる者は「1か月を超えて」引き続き使用されるに至ったときに、その日から被保険者となる。","page":56,"detail":"×が正解です。法3条1項(p.56)は、臨時に使用される者で日々雇い入れられる者は適用除外としつつ、1か月を超えて引き続き使用されるに至ったときはその日から被保険者となるとしています。問題文は2か月を超えてとしている点が誤りで、正しくは1か月を超えてです。引き続きの判断では公休日も労務に服したとみなして期間に含めます。"},{"law":"被保険者","cat":"特定適用事業所","q":"特定適用事業所とは、事業主が同一である1又は2以上の適用事業所であって、当該適用事業所に使用される特定労働者の総数が常時100人を超えるものをいう。","a":false,"exp":"×。平24法附則。特定適用事業所は、特定労働者の総数が常時「50人」を超えるものをいう。","page":59,"detail":"×が正解です。平24法附則(p.59)は、特定適用事業所を、事業主が同一である1又は2以上の適用事業所であって、当該適用事業所に使用される特定労働者の総数が常時50人を超えるものとしています。問題文は100人を超えるとしている点が誤りで、正しくは50人を超えるです。特定労働者は70歳未満の者のうち特定4分の3未満短時間労働者以外のものをいいます。"},{"law":"被保険者","cat":"資格取得の時期","q":"試用期間が定められている場合には、試用期間が満了した日から被保険者の資格を取得する。","a":false,"exp":"×。通達。試用期間が定められている場合でも、雇入れ当初の日から被保険者の資格を取得する。","page":63,"detail":"×が正解です。通達(p.63)は、使用されるに至った日とは事実上の使用関係が発生した日をいい、試用期間が定められている場合でも雇入れ当初の日から被保険者の資格を取得するとしています。問題文は試用期間が満了した日から取得するとしている点が誤りで、正しくは雇入れ当初の日から取得します。"},{"law":"被保険者","cat":"資格取得届","q":"事業主は、被保険者の資格を取得した者があるときは、当該事実があった日から5日以内に、資格取得届を日本年金機構又は健康保険組合に提出しなければならない。","a":true,"exp":"〇。則24条。被保険者が被扶養者を有するときは資格取得届に被扶養者届を添付する。","page":63,"detail":"〇が正解です。則24条1項(p.63)は、事業主は被保険者の資格を取得した者があるときは、当該事実があった日から5日以内に資格取得届を日本年金機構又は健康保険組合に提出しなければならないと規定しています。被保険者が被扶養者を有するときは資格取得届に被扶養者届を添付しなければなりません。問題文は正しい記述です。"},{"law":"被保険者","cat":"資格喪失の時期","q":"被保険者は、その事業所に使用されなくなったときは、当該事実があった日から、被保険者の資格を喪失する。","a":false,"exp":"×。法36条。死亡、使用されなくなったとき等は、該当するに至った日の翌日から資格を喪失する。ただし同日に資格取得事由に該当したときはその日に喪失する。","page":64,"detail":"×が正解です。法36条(p.64)は、被保険者は、死亡したとき、その事業所に使用されなくなったとき等のいずれかに該当するに至った日の翌日から被保険者の資格を喪失すると規定しています。問題文は該当した日に喪失するとしている点が誤りで、正しくは翌日からです。ただしその事実があった日に更に資格取得事由に該当したときはその日に喪失します。"},{"law":"被保険者","cat":"後期高齢者医療","q":"75歳の誕生日を迎える者は、75歳の誕生日に後期高齢者医療の被保険者資格を取得し、同日において健康保険の資格を喪失する。","a":true,"exp":"〇。平20通達。75歳到達日(障害認定の場合は認定日)に後期高齢者医療の資格を取得し、同日に健康保険の資格を喪失する。","page":64,"detail":"〇が正解です。平20.2.20保保発0220003号(p.64)は、75歳の誕生日を迎える者は75歳の誕生日(障害認定を受ける場合は認定日)に後期高齢者医療の被保険者資格を取得し、同日において健康保険の資格を喪失するとしています。問題文は通達どおりであり正しい記述です。"},{"law":"被保険者","cat":"資格の確認","q":"被保険者の資格の取得及び喪失は、保険者等の確認によってその効力を生じるが、任意継続被保険者の資格の取得及び喪失については確認は行われない。","a":true,"exp":"〇。法39条。任意適用事業所の適用取消しによる喪失や任意継続・特例退職被保険者の得喪については確認が行われない。","page":66,"detail":"〇が正解です。法39条1項(p.66)は、被保険者の資格の取得及び喪失は保険者等の確認によってその効力を生じると規定しつつ、任意適用事業所の適用取消しの認可があったことによる資格喪失並びに任意継続被保険者又は特例退職被保険者の資格の取得及び喪失については確認は行われないとしています。問題文は正しい記述です。"},{"law":"被保険者","cat":"派遣労働者","q":"派遣労働者は、派遣先事業主との間に指揮命令関係があるので、派遣先事業所の健康保険の適用を受ける。","a":false,"exp":"×。通達。派遣労働者は派遣元事業主との間に雇用関係があるので、派遣元事業所の健康保険の適用を受ける。","page":55,"detail":"×が正解です。テキスト(p.55)は、派遣労働者は派遣元事業主との間に雇用関係があるので、派遣元事業所の健康保険の適用を受けるとしています。問題文は派遣先事業所の適用を受けるとしている点が誤りで、正しくは派遣元事業所の適用を受けます。指揮命令関係ではなく雇用関係で判断します。"},{"law":"被保険者","cat":"資格取得届(期限)","q":"事業主は、被保険者の資格を取得した者があるときは、当該事実があった日から10日以内に、資格取得届を提出しなければならない。","a":false,"exp":"×。則24条。事業主は資格を取得した事実があった日から「5日以内」に資格取得届を提出しなければならない。","page":63,"detail":"×が正解です。則24条1項(p.63)は、事業主は被保険者の資格を取得した者があるときは、当該事実があった日から5日以内に資格取得届を提出しなければならないと規定しています。問題文は10日以内としている点が誤りで、正しくは5日以内です。"},{"law":"任意継続被保険者","cat":"資格要件","q":"任意継続被保険者となるには、被保険者の資格の喪失の日の前日まで継続して6か月以上被保険者であったことが必要である。","a":false,"exp":"×。法3条4項。任意継続被保険者は資格喪失の日の前日まで継続して2か月以上被保険者であったことが要件である。","page":67,"detail":"×が正解です。法3条4項(p.67)は、任意継続被保険者となる要件として、被保険者の資格の喪失の日の前日まで継続して2か月以上被保険者であったことを挙げています。問題文は6か月以上としている点が誤りで、正しくは2か月以上です。この期間には日雇特例被保険者、任意継続被保険者又は共済組合の組合員であった期間は含みません。"},{"law":"任意継続被保険者","cat":"申出期限","q":"任意継続被保険者の資格取得の申出は、被保険者の資格を喪失した日から20日以内にしなければならない。","a":true,"exp":"〇。法37条。保険者は正当な理由があると認めるときは、20日を経過した後の申出でも受理できる。","page":67,"detail":"〇が正解です。法37条1項(p.67)は、任意継続被保険者の資格取得の申出は、被保険者の資格を喪失した日から20日以内にしなければならないと規定しています。保険者は正当な理由があると認めるときは、20日を経過した後の申出であっても受理することができます。正当な理由には法律の不知は含まれません。問題文は正しい記述です。"},{"law":"任意継続被保険者","cat":"資格取得の時期","q":"任意継続被保険者は、申出が受理された日に、その資格を取得する。","a":false,"exp":"×。昭2通達。任意継続被保険者は、被保険者の資格を喪失した日に、その資格を取得する。","page":68,"detail":"×が正解です。昭2.2.1保理330号(p.68)は、任意継続被保険者は被保険者の資格を喪失した日にその資格を取得するとしています。問題文は申出が受理された日に取得するとしている点が誤りで、正しくは資格を喪失した日に取得します。なお特例退職被保険者は申出が受理された日から取得する点と区別が必要です。"},{"law":"任意継続被保険者","cat":"資格喪失","q":"任意継続被保険者は、任意継続被保険者となった日から起算して2年を経過したときは、その翌日に資格を喪失する。","a":true,"exp":"〇。法38条。保険料を納付期日(原則その月の10日)までに納付しなかったときもその翌日に喪失する。","page":68,"detail":"〇が正解です。法38条(p.68)は、任意継続被保険者は、任意継続被保険者となった日から起算して2年を経過したときにその翌日に資格を喪失すると規定しています。また保険料を納付期日(原則としてその月の10日)までに納付しなかったときも、その翌日に資格を喪失します(正当な理由があると認められた場合を除く)。問題文は正しい記述です。"},{"law":"任意継続被保険者","cat":"資格喪失(任意脱退)","q":"任意継続被保険者でなくなることを希望する旨を保険者に申し出た場合、その申出が受理された日の属する月の末日が到来したときに、その翌日に資格を喪失する。","a":true,"exp":"〇。法38条。任意脱退の申出により、申出受理日の属する月の末日到来の翌日に資格を喪失する。","page":68,"detail":"〇が正解です。法38条(p.68)は、任意継続被保険者でなくなることを希望する旨を保険者に申し出た場合、その申出が受理された日の属する月の末日が到来したときに、その翌日に資格を喪失すると規定しています。問題文は条文どおりであり正しい記述です。"},{"law":"特例退職被保険者","cat":"傷病手当金","q":"特例退職被保険者には、原則として一般の被保険者に準じた保険給付が行われるが、傷病手当金(継続給付を含む)は支給されない。","a":true,"exp":"〇。法附則3条。特例退職被保険者は任意継続被保険者とみなされ、傷病手当金及び出産手当金は支給されない。","page":71,"detail":"〇が正解です。法附則3条(p.71)は、特例退職被保険者は健康保険法の適用について原則として任意継続被保険者とみなされるとしつつ、保険給付については一般の被保険者に準じるが傷病手当金(継続給付を含む)は支給されないとしています。出産手当金も支給されません。問題文は正しい記述です。"},{"law":"特例退職被保険者","cat":"2年経過","q":"特例退職被保険者は、資格を取得した日から2年を経過したときに、その資格を喪失する。","a":false,"exp":"×。法38条1号、附則3条6項。特例退職被保険者は資格を取得した日から2年を経過しても資格を喪失しない。","page":71,"detail":"×が正解です。法38条1号、附則3条6項(p.71)に基づき、特例退職被保険者については資格を取得した日から2年を経過しても資格を喪失しないとされています。問題文は2年経過時に資格を喪失するとしている点が誤りです。特例退職被保険者の資格喪失事由には2年経過は含まれません。"},{"law":"被扶養者","cat":"範囲(直系尊属等)","q":"被保険者の直系尊属、配偶者、子、孫及び兄弟姉妹であって、主としてその被保険者により生計を維持するものは、同一世帯に属していなくても被扶養者となる。","a":true,"exp":"〇。法3条7項。これらの者は生計維持のみで足り、同一世帯要件は不要である。3親等内の親族等は同一世帯要件が加わる。","page":73,"detail":"〇が正解です。法3条7項(p.73)は、被保険者の直系尊属、配偶者(事実婚を含む)、子、孫及び兄弟姉妹であって主としてその被保険者により生計を維持するものは被扶養者となると規定しています。これらの者は生計維持要件のみで足り、同一世帯要件は不要です。3親等内の親族等には同一世帯要件が加わります。問題文は正しい記述です。"},{"law":"被扶養者","cat":"配偶者の直系尊属","q":"配偶者の直系尊属(配偶者の父母等)は、被保険者の直系尊属に含まれるため、同一世帯に属していなくても被扶養者となる。","a":false,"exp":"×。法3条7項。配偶者の直系尊属は被保険者の直系尊属には含まれず、3親等内の親族として同一世帯要件が必要である。","page":73,"detail":"×が正解です。法3条7項(p.73)に基づき、配偶者の直系尊属は被保険者本人の直系尊属には含まれません。テキストは、直系尊属とは被保険者本人の父母、祖父母、曾祖父母等であり配偶者の直系尊属は含まないと明記しています。配偶者の父母等は3親等内の親族として同一世帯要件及び生計維持要件が必要です。問題文は誤りです。"},{"law":"被扶養者","cat":"3親等内の親族","q":"3親等内の親族には、甥姪は含まれるが、従姉妹、従兄弟は含まれない。","a":true,"exp":"〇。法3条7項。曾孫、伯父伯母、叔父叔母、甥姪は含まれるが、従姉妹、従兄弟は含まれない。","page":73,"detail":"〇が正解です。法3条7項(p.73)に基づくテキストの解説では、3親等内の親族には曾孫、伯父伯母、叔父叔母、甥姪は含まれるが、従姉妹、従兄弟は含まれないとしています。なお継子、継母は3親等内の親族となります。問題文は正しい記述です。"},{"law":"被扶養者","cat":"国内居住要件","q":"被扶養者の国内居住要件として、外国において留学をする学生は、日本国内に住所を有しなくても国内居住要件を満たすものとして扱われる。","a":true,"exp":"〇。法3条7項、則37条の2。外国留学の学生、外国に赴任する被保険者に同行する者等は例外的に要件を満たす。","page":74,"detail":"〇が正解です。法3条7項、則37条の2(p.74)は、被扶養者の国内居住要件について、日本国内に住所を有するもの又は外国において留学をする学生その他渡航目的等を考慮して日本国内に生活の基礎があると認められるものとしています。外国留学の学生、外国に赴任する被保険者に同行する者等は例外的に要件を満たします。問題文は正しい記述です。"},{"law":"被扶養者","cat":"生計維持(同一世帯)","q":"被保険者と同一世帯に属する認定対象者の年間収入は、原則として150万円未満であり、かつ被保険者の年間収入の2分の1未満であることが要件となる。","a":false,"exp":"×。通達。同一世帯の場合の収入要件は原則130万円未満(60歳以上又は障害者は180万円未満)であり、かつ被保険者の年間収入の2分の1未満である。","page":75,"detail":"×が正解です。通達(p.75)は、被保険者と同一世帯に属する認定対象者の年間収入の要件を、原則130万円未満(60歳以上又は障害者は180万円未満)であり、かつ被保険者の年間収入の2分の1未満であるとしています。問題文は150万円未満としている点が誤りで、原則は130万円未満です。"},{"law":"被扶養者","cat":"生計維持(19歳以上23歳未満)","q":"認定対象者の年間収入を130万円未満とする要件について、当該認定対象者(被保険者の配偶者を除く)が19歳以上23歳未満である場合には150万円未満となる。","a":true,"exp":"〇。令7通達。19歳以上23歳未満の者(配偶者を除く)は150万円未満の収入要件となる。","page":75,"detail":"〇が正解です。令7通達(p.75)に基づき、認定対象者の年間収入を130万円未満とする要件について、当該認定対象者(被保険者の配偶者を除く)が19歳以上23歳未満である場合には150万円未満となります。問題文は通達どおりであり正しい記述です。年間収入には雇用保険の失業等給付、公的年金、傷病手当金や出産手当金も含まれます。"},{"law":"被扶養者","cat":"届出","q":"被保険者は、被扶養者を有するに至ったときは、5日以内に、被扶養者届を事業主を経由して厚生労働大臣又は健康保険組合に提出しなければならない。","a":true,"exp":"〇。則38条。被保険者が任意継続被保険者であるときは、直接、保険者に提出する。","page":77,"detail":"〇が正解です。則38条1項(p.77)は、被保険者は被扶養者を有するに至ったときは、5日以内に被扶養者届を事業主を経由して厚生労働大臣又は健康保険組合に提出しなければならないと規定しています。被保険者が任意継続被保険者であるときは、直接保険者に提出します。問題文は正しい記述です。"},{"law":"標準報酬","cat":"報酬の定義","q":"報酬とは、労働者が労働の対償として受けるすべてのものをいうが、臨時に受けるもの及び3か月を超える期間ごとに受けるものは除かれる。","a":true,"exp":"〇。法3条5項。3か月を超える期間ごとに受けるもの(支給回数が年3回以下)はボーナスとして賞与に該当する。","page":80,"detail":"〇が正解です。法3条5項(p.80)は、報酬とは労働者が労働の対償として受けるすべてのものをいうが、臨時に受けるもの及び3か月を超える期間ごとに受けるものを除くと規定しています。3か月を超える期間ごとに受けるものとは年間を通じて支給回数が3回以下のものをいい、いわゆるボーナスとして賞与に該当します。問題文は正しい記述です。"},{"law":"標準報酬","cat":"賞与の判定","q":"賞与の支給が給与規定等によって年間を通じ3回以下の支給につき客観的に定められているときは、当該賞与は報酬に該当する。","a":false,"exp":"×。通達。年間を通じ4回以上の支給につき客観的に定められているとき等は、当該賞与は報酬に該当する。年3回以下なら賞与となる。","page":80,"detail":"×が正解です。通達(p.80)は、賞与の支給が給与規定、賃金協約等の諸規定によって年間を通じ4回以上の支給につき客観的に定められているとき等は、当該賞与は報酬に該当するとしています。問題文は年間を通じ3回以下の支給につき定められているときは報酬に該当するとしている点が誤りで、年3回以下なら賞与となります。"},{"law":"標準報酬","cat":"報酬とならないもの","q":"解雇予告手当及び事業主が恩恵的に支給する結婚祝い金は、いずれも報酬に該当しない。","a":true,"exp":"〇。通達。解雇予告手当、退職金、病気見舞金、結婚祝い金、実費弁償(出張旅費等)は報酬に該当しない。","page":81,"detail":"〇が正解です。通達(p.81)は、解雇予告手当、退職を事由に支払われる退職金、事業主が恩恵的に支給する病気見舞金・結婚祝い金、実費弁償(出張旅費、赴任旅費等)はいずれも労働の対償とは認められないため報酬に該当しないとしています。問題文は解雇予告手当及び結婚祝い金がいずれも報酬に該当しないとしており、正しい記述です。"},{"law":"標準報酬月額","cat":"等級区分","q":"標準報酬月額は、現在50の等級に区分されており、その月額は58,000円を下限とし、1,390,000円を上限としている。","a":true,"exp":"〇。法40条。第1級58,000円から第50級1,390,000円まで50等級に区分されている。","page":84,"detail":"〇が正解です。法40条1項(p.84)は、標準報酬月額は被保険者の報酬月額に基づき標準報酬月額等級表の等級区分によって定めると規定しており、テキストでは現在50の等級に区分され、その月額は58,000円を下限とし1,390,000円を上限としています。第1級58,000円から第50級1,390,000円までの50等級です。問題文は正しい記述です。"},{"law":"標準報酬月額","cat":"等級区分の改定","q":"毎年3月31日における標準報酬月額の最高等級該当者が被保険者総数に占める割合が100分の3を超え、その状態が継続すると認められるときは、その年の9月1日から最高等級の上に等級を加える改定を行うことができる。","a":false,"exp":"×。法40条。最高等級該当者の割合が100分の1.5を超え、その状態が継続すると認められるときに改定できる。","page":85,"detail":"×が正解です。法40条2項(p.85)は、毎年3月31日における最高等級該当者が被保険者総数に占める割合が100分の1.5を超え、その状態が継続すると認められるときは、その年の9月1日から最高等級の上に等級を加える改定を行うことができると規定しています。問題文は100分の3を超えるとしている点が誤りで、正しくは100分の1.5です。"},{"law":"標準報酬月額","cat":"資格取得時決定","q":"資格取得時決定において、月、週その他一定期間によって報酬が定められる場合には、資格を取得した日の現在の報酬の額を、その期間の総日数で除して得た額の30倍に相当する額を報酬月額とする。","a":true,"exp":"〇。法42条1項。その期間が週であるときの総日数は7日となる。","page":89,"detail":"〇が正解です。法42条1項(p.89)は、資格取得時決定において、月、週その他一定期間によって報酬が定められる場合には、資格を取得した日の現在の報酬の額を、その期間の総日数で除して得た額の30倍に相当する額を報酬月額とすると規定しています。その期間が週であるときの総日数は7日となります。問題文は正しい記述です。"},{"law":"標準報酬月額","cat":"定時決定","q":"定時決定は、被保険者が毎年7月1日現に使用される事業所において、同日前3か月間(4月・5月・6月)に受けた報酬の総額をその期間の月数で除して得た額を報酬月額として行う。","a":true,"exp":"〇。法41条。報酬支払基礎日数が17日(短時間労働者は11日)未満である月は除いて算定する。","page":90,"detail":"〇が正解です。法41条(p.90)は、定時決定は被保険者が毎年7月1日現に使用される事業所において、同日前3か月間(4月・5月・6月)に受けた報酬の総額をその期間の月数で除して得た額を報酬月額として行うと規定しています。報酬支払基礎日数が17日(短時間労働者は11日)未満である月は除いて算定します。問題文は正しい記述です。"},{"law":"標準報酬月額","cat":"定時決定(基礎日数)","q":"定時決定において、報酬支払基礎日数が15日未満である月は、その月を除いて算定する。","a":false,"exp":"×。法41条。報酬支払基礎日数が17日(短時間労働者は11日)未満である月を除いて算定する。15日ではない。","page":90,"detail":"×が正解です。法41条(p.90)は、定時決定において報酬支払基礎日数が17日(厚生労働省令で定める短時間労働者にあっては11日)未満である月は、その月を除いて算定すると規定しています。問題文は15日未満としている点が誤りで、正しくは17日未満(短時間労働者は11日未満)です。"},{"law":"標準報酬月額","cat":"定時決定の有効期間","q":"定時決定により決定された標準報酬月額は、その年の10月から翌年9月までの各月の標準報酬月額とする。","a":false,"exp":"×。法41条。定時決定された標準報酬月額は、その年の「9月から翌年8月まで」の各月の標準報酬月額とする。","page":92,"detail":"×が正解です。法41条2項(p.92)は、定時決定により決定された標準報酬月額は、その年の9月から翌年8月までの各月の標準報酬月額とすると規定しています。問題文は10月から翌年9月までとしている点が誤りで、正しくは9月から翌年8月までです。"},{"law":"標準報酬月額","cat":"随時改定","q":"随時改定は、継続した3か月間(各月とも報酬支払基礎日数が17日以上)に受けた報酬の総額を3で除して得た額が、従前の標準報酬月額に比べて原則として2等級以上の差を生じた場合に行われる。","a":true,"exp":"〇。法43条。固定的賃金の変動、2等級以上の差、3か月間の基礎日数17日以上の3要件をすべて満たす必要がある。","page":92,"detail":"〇が正解です。法43条1項(p.92)に基づき、随時改定は、継続した3か月間(各月とも報酬支払基礎日数が17日〔短時間労働者は11日〕以上)に受けた報酬の総額を3で除して得た額が、従前の標準報酬月額に比べて著しく高低を生じた場合に行われます。テキスト(p.93)のとおり、固定的賃金の変動、原則2等級以上の差、3か月間の基礎日数17日以上の3要件をすべて満たす必要があります。問題文は正しい記述です。"},{"law":"標準報酬月額","cat":"随時改定の要件","q":"残業手当の増加だけでも、3か月間の報酬総額の平均額が2等級以上変動すれば随時改定の対象となる。","a":false,"exp":"×。通達。固定的賃金の変動が必要であり、非固定的賃金である残業手当の増加のみでは随時改定の対象とならない。","page":93,"detail":"×が正解です。テキスト(p.93)は、残業手当の増加だけでは随時改定の対象とはならないとしており、随時改定には固定的賃金の変動が必要です。残業手当は非固定的賃金であり、その増加のみでは随時改定の対象となりません。問題文は残業手当の増加だけでも対象となるとしている点が誤りです。"},{"law":"標準報酬月額","cat":"随時改定の時期","q":"随時改定では、昇給又は降給のあった月から起算して3か月目の月に標準報酬月額が改定される。","a":false,"exp":"×。通達。昇給等が行われた月から起算して4か月目の月に随時改定が行われる(昇給月の翌々月を著しい高低が生じた月とし、その翌月から改定)。","page":94,"detail":"×が正解です。テキスト(p.94)は、昇給又は降給のあった月の翌々月を著しい高低が生じた月として、その翌月から標準報酬月額が改定されるとしており、昇給等が行われた月から起算して4か月目の月に随時改定が行われます。問題文は3か月目の月に改定されるとしている点が誤りで、正しくは4か月目の月です。"},{"law":"標準報酬月額","cat":"育児休業等終了時改定","q":"育児休業等を終了した際の改定は、標準報酬月額が2等級以上変動していなくとも、所定の要件を満たせば改定が行われる。","a":true,"exp":"〇。法43条の2。随時改定の要件を満たさなくても標準報酬月額を改定できる。被保険者の申出が必要である。","page":96,"detail":"〇が正解です。法43条の2第1項(p.96)は、育児休業等を終了した際の改定について、標準報酬月額が2等級以上変動していなくとも、随時改定の要件を満たさなくても所定の要件を満たせば標準報酬月額を改定できるとしています。この改定には被保険者の申出が必要であり、申出がなければ改定は行われません。問題文は正しい記述です。"},{"law":"標準報酬月額","cat":"産前産後休業","q":"産前産後休業とは、出産の日以前42日(多胎妊娠の場合は98日)から出産の日後56日までの間で、妊娠又は出産に関する事由を理由として労務に服さない期間をいう。","a":true,"exp":"〇。法43条の3。多胎妊娠の場合の産前期間は98日である。","page":98,"detail":"〇が正解です。法43条の3第1項(p.98)は、産前産後休業とは、出産の日(出産の日が予定日後であるときは予定日)以前42日(多胎妊娠の場合は98日)から出産の日後56日までの間で、妊娠又は出産に関する事由を理由として労務に服さない期間をいうと規定しています。多胎妊娠の場合の産前期間は98日です。問題文は正しい記述です。"},{"law":"標準報酬月額","cat":"保険者算定","q":"保険者算定は、定時決定において4月から6月のいずれの月も報酬支払基礎日数が17日(短時間労働者は11日)未満であるなど算定が困難であるとき、又は算定した額が著しく不当であるときに行われる。","a":true,"exp":"〇。法44条。保険者が健康保険組合であるときは、算定方法を規約で定めなければならない。","page":100,"detail":"〇が正解です。法44条1項(p.100)は、保険者算定について、定時決定において4月から6月のいずれの月も報酬支払基礎日数が17日(短時間労働者は11日)未満であるなど算定が困難であるとき、又は算定した額が著しく不当であるときに行うとしています。保険者が健康保険組合であるときは、その算定方法を規約で定めなければなりません。問題文は正しい記述です。"},{"law":"標準報酬月額","cat":"任意継続被保険者","q":"任意継続被保険者の標準報酬月額は、資格喪失時の標準報酬月額と、前年9月30日における全被保険者の標準報酬月額の平均額に基づく標準報酬月額とのうち、いずれか多い額である。","a":false,"exp":"×。法47条。任意継続被保険者の標準報酬月額は、これら2つのうちいずれか少ない額である。","page":103,"detail":"×が正解です。法47条(p.103)は、任意継続被保険者の標準報酬月額について、資格を喪失したときの標準報酬月額と、前年(1月から3月までは前々年)の9月30日における全被保険者の標準報酬月額を平均した額に基づく標準報酬月額とのうち、いずれか少ない額とすると規定しています。問題文はいずれか多い額としている点が誤りで、正しくは少ない額です。"},{"law":"標準報酬月額","cat":"任意継続(少ない/多い)","q":"任意継続被保険者の標準報酬月額は、資格喪失時の標準報酬月額と前年9月30日の全被保険者平均額に基づく標準報酬月額とのうち、いずれか高い額である。","a":false,"exp":"×。法47条。任意継続被保険者の標準報酬月額は、これら2つのうちいずれか低い(少ない)額である。","page":103,"detail":"×が正解です。法47条(p.103)は、任意継続被保険者の標準報酬月額について、資格喪失時の標準報酬月額と前年9月30日の全被保険者の標準報酬月額を平均した額に基づく標準報酬月額とのうち、いずれか少ない(低い)額とすると規定しています。問題文はいずれか高い額としている点が誤りで、正しくは低い(少ない)額です。"},{"law":"標準賞与額","cat":"年度累計の上限","q":"標準賞与額は、その月に受けた賞与額に1,000円未満の端数を切り捨てた額であり、その年度における累計額が573万円を超えることとなる場合には、当該累計額が573万円となるよう決定する。","a":true,"exp":"〇。法45条。年度は4月1日から翌年3月31日まで。累計は保険者単位とする。","page":104,"detail":"〇が正解です。法45条1項(p.104)は、標準賞与額は、その月に受けた賞与額に1,000円未満の端数を生じたときはこれを切り捨てた額とし、その年度(4月1日から翌年3月31日まで)における標準賞与額の累計額が573万円を超えることとなる場合には、当該累計額が573万円となるよう決定すると規定しています。累計は保険者単位とされます。問題文は正しい記述です。"},{"law":"標準賞与額","cat":"賞与支払届","q":"事業主は、賞与を支払ったときは、その日から5日以内に、賞与支払届を日本年金機構又は健康保険組合に提出しなければならない。","a":true,"exp":"〇。則27条。同一月に賞与が2回支払われた場合は合算し、最後の賞与が支払われた日から5日以内に提出する。","page":105,"detail":"〇が正解です。則27条1項(p.105)は、事業主は賞与を支払ったときは、その日から5日以内に賞与支払届を日本年金機構又は健康保険組合に提出しなければならないと規定しています。同一月に賞与が2回支払われた場合には、その額を合算して、最後の賞与が支払われた日から5日以内に提出します。問題文は正しい記述です。"},{"law":"標準賞与額","cat":"資格喪失月の賞与","q":"被保険者資格を喪失した日の属する月において、被保険者資格を喪失する前に支払われた賞与は、保険料の賦課の対象になり、標準賞与額として決定される。","a":false,"exp":"×。法156条等。資格喪失日の属する月に喪失前に支払われた賞与は、保険料の賦課の対象にはならないが、標準賞与額として決定され累計額に算入される。","page":105,"detail":"×が正解です。法45条1項、156条3項及び平19.5.1庁保険発0501001号(p.105)に基づき、被保険者資格を喪失した日の属する月において喪失前に支払われた賞与は、保険料の賦課の対象にはなりませんが、標準賞与額として決定され、年度における標準賞与額の累計額に算入されます。問題文は保険料の賦課の対象になるとしている点が誤りです。"},{"law":"療養の給付","cat":"範囲","q":"被保険者の疾病又は負傷に関する療養の給付の範囲には、診察、薬剤又は治療材料の支給、処置・手術その他の治療、居宅における療養上の管理及びその療養に伴う世話その他の看護、病院又は診療所への入院及びその療養に伴う世話その他の看護が含まれる。","a":true,"exp":"〇。法63条1項。療養の給付は現物給付により行われる。","page":109,"detail":"〇が正解です。法63条1項(p.109)は、被保険者の疾病又は負傷に関する療養の給付として、診察、薬剤又は治療材料の支給、処置・手術その他の治療、居宅における療養上の管理及びその療養に伴う世話その他の看護、病院又は診療所への入院及びその療養に伴う世話その他の看護を行うと規定しています。療養の給付は現物給付により行われます。問題文は正しい記述です。"},{"law":"療養の給付","cat":"範囲外","q":"定期健康診断、正常分娩、単なる美容整形手術等は、いずれも療養の給付の対象とならない。","a":true,"exp":"〇。通達。これらは療養の給付の対象外であるが、健康診断で疾病の疑いがあるとされた場合の精密検査は対象となり得る。","page":109,"detail":"〇が正解です。通達(p.109)は、定期健康診断、正常分娩、単なる美容整形手術等は療養の給付の対象ではないとしています。ただし健康診断の結果、疾病の疑いがあると診断された場合の精密検査は療養の給付の対象となり得ます。問題文はこれらがいずれも対象とならないとしており、正しい記述です。"},{"law":"療養の給付","cat":"病院と診療所","q":"医療法において、20人以上の患者を入院させるための施設を有する医療機関を病院、患者を入院させるための施設を有しないもの又は19人以下の患者を入院させる施設を有する医療機関を診療所という。","a":true,"exp":"〇。医療法1条の5。病院は20人以上、診療所は19人以下又は入院施設なしである。","page":112,"detail":"〇が正解です。医療法1条の5(p.112)は、20人以上の患者を入院させるための施設を有する医療機関を病院、患者を入院させるための施設を有しないもの又は19人以下の患者を入院させるための施設を有する医療機関を診療所と定めています。問題文は条文どおりであり正しい記述です。"},{"law":"療養の給付","cat":"資格確認書の有効期限","q":"資格確認書の有効期限は、交付又は提供の日から起算して2年を超えない範囲内において保険者が定める。","a":false,"exp":"×。則47条。資格確認書の有効期限は、交付又は提供の日から起算して「5年」を超えない範囲内において保険者が定める。","page":114,"detail":"×が正解です。則47条2項(p.114)は、資格確認書の有効期限は、交付又は提供の日から起算して5年を超えない範囲内において保険者が定めると規定しています。問題文は2年を超えない範囲としている点が誤りで、正しくは5年を超えない範囲です。"},{"law":"一部負担金","cat":"負担割合(70歳未満)","q":"70歳に達する日の属する月以前である被保険者が療養の給付を受ける際の一部負担金の割合は、100分の30である。","a":true,"exp":"〇。法74条。70歳未満は3割負担である。","page":120,"detail":"〇が正解です。法74条1項(p.120)は、70歳に達する日の属する月以前である被保険者(70歳未満)が療養の給付を受ける際の一部負担金の割合を100分の30と定めています。問題文は条文どおりであり正しい記述です。70歳以上は原則100分の20、現役並み所得者は100分の30です。"},{"law":"一部負担金","cat":"負担割合(70歳以上)","q":"70歳に達する日の属する月の翌月以後である被保険者(現役並み所得者を除く)が療養の給付を受ける際の一部負担金の割合は、100分の30である。","a":false,"exp":"×。法74条。70歳以上(現役並み所得者を除く)の一部負担金の割合は100分の20である。現役並み所得者は100分の30である。","page":120,"detail":"×が正解です。法74条1項(p.120)は、70歳に達する日の属する月の翌月以後である被保険者(現役並み所得者を除く)の一部負担金の割合を100分の20と定めています。問題文は100分の30としている点が誤りで、正しくは100分の20です。なお現役並み所得者は100分の30となります。"},{"law":"一部負担金","cat":"現役並み所得者","q":"療養の給付を受ける月の標準報酬月額が53万円以上である者は、原則として現役並み所得者となる。","a":false,"exp":"×。令34条。療養の給付を受ける月の標準報酬月額が「28万円以上」である者が原則として現役並み所得者となる。","page":120,"detail":"×が正解です。令34条(p.120)は、療養の給付を受ける月の標準報酬月額が28万円以上である者を原則として現役並み所得者とすると規定しています。問題文は53万円以上としている点が誤りで、正しくは28万円以上です。ただし収入額が520万円(被扶養者がいない者は383万円)に満たない者は申請により現役並み所得者となりません。"},{"law":"一部負担金","cat":"端数処理","q":"一部負担金の額に5円未満の端数があるときはこれを切り捨て、5円以上10円未満の端数があるときはこれを10円に切り上げる。","a":true,"exp":"〇。法75条。一部負担金の端数処理は四捨五入ではなく、5円未満切捨て・5円以上切上げである。","page":121,"detail":"〇が正解です。法75条(p.121)は、一部負担金の額に5円未満の端数があるときはこれを切り捨て、5円以上10円未満の端数があるときはこれを10円に切り上げると規定しています。四捨五入ではなく、5円未満切捨て・5円以上切上げです。問題文は正しい記述です。"},{"law":"一部負担金","cat":"不正利得(医療機関)","q":"保険者は、保険医療機関等が偽りその他不正の行為によって療養の給付に関する費用の支払を受けたときは、その支払った額のほか、その額に100分の40を乗じて得た額を支払わせることができる。","a":true,"exp":"〇。法58条。不正請求をした保険医療機関等に対しては、返還額に加えて100分の40の加算金を課すことができる。","page":213,"detail":"〇が正解です。法58条(p.213)は、保険者は、保険医療機関、保険薬局又は指定訪問看護事業者が偽りその他不正の行為によって療養の給付に関する費用の支払等を受けたときは、当該保険医療機関等に対し、その支払った額につき返還させるほか、その返還させる額に100分の40を乗じて得た額を支払わせることができると規定しています。問題文は正しい記述です。"},{"law":"療養担当機関","cat":"保険医の登録拒否","q":"厚生労働大臣は、保険医又は保険薬剤師の登録を取り消され、その取消しの日から5年を経過していない者については、登録をしないことができる。","a":true,"exp":"〇。法71条2項。登録の拒否事由の一つであり、登録をしないこととするときは地方社会保険医療協議会の議を経る。","page":125,"detail":"〇が正解です。法71条2項では、登録の申請があった場合に厚生労働大臣が登録をしないことができる拒否事由を定めており、その一つに「申請者が、保険医又は保険薬剤師の登録を取り消され、その取消しの日から5年を経過していないとき」が掲げられています。設問はこの規定どおりで、ほかに健康保険法等の規定により罰金の刑に処せられた者、保険医・保険薬剤師として著しく不適当と認められる者なども拒否事由とされています。なお、登録をしないこととするときは、地方社会保険医療協議会の議を経なければなりません（法71条3項）。"},{"law":"療養担当機関","cat":"保険医の登録抹消","q":"保険医又は保険薬剤師は、1か月以上の予告期間を設けて、その登録の抹消を求めることができる。","a":true,"exp":"〇。法79条2項。保険医・保険薬剤師の登録には有効期間は設けられていない。","page":125,"detail":"〇が正解です。法79条2項により、保険医又は保険薬剤師は、1か月以上の予告期間を設けて、その登録の抹消を求めることができます。テキストでも、登録については有効期間が設けられていない点が注意点として示されており、保険医療機関等の指定（6年で効力を失う）との違いを押さえる必要があります。設問は条文どおりで正しい記述です。"},{"law":"療養担当機関","cat":"指定の有効期間","q":"保険医療機関又は保険薬局に係る指定は、指定の日から起算して3年を経過したときは、その効力を失う。","a":false,"exp":"×。法68条。保険医療機関等の指定は、指定の日から起算して「6年」を経過したときにその効力を失う。","page":128,"detail":"×が正解です。法68条では、保険医療機関又は保険薬局に係る指定は、指定の日から起算して「6年」を経過したときにその効力を失うとされており、設問の「3年」は誤りです。なお、病院又は病床を有する診療所を除く保険医療機関等であって厚生労働省令で定めるもの（個人開業医や個人薬局）については、効力を失う日前6か月から同日前3か月までの間に別段の申出がないときは指定の申請があったものとみなされる自動更新の規定があります。"},{"law":"療養担当機関","cat":"指定の辞退","q":"保険医療機関又は保険薬局は、1か月以上の予告期間を設けて、その指定を辞退することができる。","a":true,"exp":"〇。法79条1項。保険医療機関等は1か月以上の予告期間を設けて指定を辞退することができる。","page":129,"detail":"〇が正解です。法79条1項により、保険医療機関又は保険薬局は、1か月以上の予告期間を設けて、その指定を辞退することができます。これは保険医・保険薬剤師の登録抹消（法79条2項）と同じ予告期間であり、設問は条文どおりで正しい記述です。"},{"law":"療養担当機関","cat":"書類の保存","q":"保険医療機関は、療養の給付の担当に関する帳簿及び書類その他の記録を、その完結の日から3年間(患者の診療録は5年間)保存しなければならない。","a":true,"exp":"〇。療養担当規則9条。診療録は5年間、その他の記録は3年間の保存義務がある。","page":130,"detail":"〇が正解です。保険医療機関及び保険医療養担当規則9条により、保険医療機関は、療養の給付の担当に関する帳簿及び書類その他の記録を、その完結の日から3年間（患者の診療録にあっては5年間）保存しなければなりません。診療録（カルテ）は5年間、それ以外の記録は3年間という区別がポイントで、設問は規則どおりで正しい記述です。"},{"law":"入院時食事療養費","cat":"食事療養標準負担額","q":"入院時食事療養費における一般の被保険者の食事療養標準負担額は、1食につき300円である。","a":false,"exp":"×。則58条等。一般の被保険者の食事療養標準負担額は1食につき510円である。1食300円は小児慢性特定疾病児童等又は指定難病患者である。","page":133,"detail":"×が正解です。則58条等及び令7.3.24厚労告64号によれば、一般の被保険者（減額対象者以外）の食事療養標準負担額は1食につき「510円」です。設問の1食300円は、減額対象者のうち低所得者等に該当しない小児慢性特定疾病児童等又は指定難病患者の額であり、混同してはなりません。なお、低所得者・低所得者Ⅱは入院90日以下で240円・90日超で190円、低所得者Ⅰは110円とされています。"},{"law":"入院時食事療養費","cat":"特定長期入院被保険者","q":"特定長期入院被保険者とは、療養病床への入院及びその療養に伴う世話その他の看護を受ける際、65歳に達する日の属する月の翌月以後である被保険者をいう。","a":true,"exp":"〇。法85条。65歳以上の被保険者が療養病床に入院する場合は、入院時生活療養費の対象となる。","page":110,"detail":"〇が正解です。法85条等及びテキストp.110によれば、特定長期入院被保険者とは、療養病床への入院及びその療養に伴う世話その他の看護であって、当該療養を受ける際、65歳に達する日の属する月の翌月以後である被保険者（65歳以上の被保険者が療養病床に入院する場合）をいいます。この者は食事療養が療養の給付に含まれず、入院時生活療養費の対象となります。設問は定義どおりで正しい記述です。"},{"law":"入院時生活療養費","cat":"制度趣旨","q":"入院時生活療養費は、特定長期入院被保険者について、介護保険との均衡等の観点から食費及び居住費の負担を求めることとしたために創設された。","a":true,"exp":"〇。平成18年改正で創設された。生活療養標準負担額を控除した額が支給される。","page":135,"detail":"〇が正解です。入院時生活療養費は、特定長期入院被保険者について、介護保険との均衡等の観点から食費及び居住費の負担を求めることとしたために、平成18年の改正で創設された制度です（法85条の2）。支給額は、厚生労働大臣が定める基準により算定した費用の額から生活療養標準負担額を控除した額であり、現物給付として支給されます。設問は制度趣旨どおりで正しい記述です。"},{"law":"保険外併用療養費","cat":"対象","q":"保険外併用療養費の支給対象となる療養は、評価療養、患者申出療養及び選定療養である。","a":true,"exp":"〇。法86条。これらを受けたときに療養の給付に相当する部分について保険外併用療養費が支給される。","page":138,"detail":"〇が正解です。法86条1項により、被保険者が保険医療機関等のうち自己の選定するものから、評価療養、患者申出療養又は選定療養を受けたときは、その療養に要した費用について保険外併用療養費が支給されます。保険診療と保険外診療の併用は原則自由診療となりますが、これら3類型については療養の給付に相当する部分について保険給付を行う仕組みです。設問は条文どおりで正しい記述です。"},{"law":"保険外併用療養費","cat":"選定療養(入院期間)","q":"別に厚生労働大臣が定める方法により計算した入院期間が90日を超えた日以後の入院及びその療養に伴う世話その他の看護(所定のものを除く)は、選定療養に該当する。","a":false,"exp":"×。令6.3.27厚労告122号。入院期間が「180日」を超えた日以後の入院等が選定療養に該当する。","page":140,"detail":"×が正解です。令6.3.27厚労告122号の選定療養の列挙では、「別に厚生労働大臣が定める方法により計算した入院期間が180日を超えた日以後の入院及びその療養に伴う世話その他の看護（別に厚生労働大臣が定める状態等にある者を除く）」が選定療養に該当するとされており、設問の「90日」は誤りで、正しくは「180日」です。ほかに病床数200以上の病院の初診・再診なども選定療養に該当します。"},{"law":"療養費","cat":"支給要件","q":"保険者は、療養の給付等を行うことが困難であると認めるとき、又は被保険者が保険医療機関等以外の者から診療等を受けた場合で保険者がやむを得ないものと認めるときは、療養の給付等に代えて療養費を支給することができる。","a":true,"exp":"〇。法87条。海外で診療を受けたとき、緊急のため保険医療機関を探す余裕がなかったとき等が該当する。","page":142,"detail":"〇が正解です。法87条1項により、保険者は、療養の給付等を行うことが困難であると認めるとき、又は被保険者が保険医療機関等以外の者から診療等を受けた場合で保険者がやむを得ないものと認めるときは、療養の給付等に代えて療養費を支給することができます。テキストでは具体例として、無医村で売薬を服用したとき、海外で診療を受けたとき、緊急のため保険医療機関を探す余裕がなかったとき等が示されています。設問は条文どおりで正しい記述です。"},{"law":"療養費","cat":"柔道整復師の施術","q":"医師の同意により柔道整復師の施術を受けたときの費用は、療養費の支給対象となる。","a":true,"exp":"〇。通達。医師の同意は口頭又は書面により与えられる。ただし入院中の患者の後療は支給対象とならない。","page":143,"detail":"〇が正解です。テキストp.143の通達（昭24.4.13保険発167号ほか）では、医師の同意により柔道整復師の施術を受けたときの費用は療養費の支給対象となるとされ、医師の同意は口頭又は書面により与えられることを要するとされています。ただし、保険医療機関に入院中の患者の後療については、柔道整復師の施術を受けた場合であっても療養費の支給対象とはなりません。設問は通達どおりで正しい記述です。"},{"law":"訪問看護療養費","cat":"訪問看護を行う者","q":"訪問看護を行う「厚生労働省令で定める者」は、保健師、助産師、准看護師、理学療法士、作業療法士及び言語聴覚士である。","a":true,"exp":"〇。則68条。看護師のほか、これらの者が訪問看護を行うことができる。","page":147,"detail":"〇が正解です。則67条・68条により、訪問看護を行う「厚生労働省令で定める者」は、保健師、助産師、准看護師、理学療法士、作業療法士及び言語聴覚士とされています。看護師のほかこれらの者が訪問看護を行うことができます。設問は規則どおりで正しい記述です。"},{"law":"訪問看護療養費","cat":"日数の限度","q":"指定訪問看護は、末期の悪性腫瘍など厚生労働大臣が定める疾病等を除き、利用者1人につき週5日を限度とする。","a":false,"exp":"×。令4.3.4厚労告59号。指定訪問看護は原則として利用者1人につき週3日を限度とする。","page":146,"detail":"×が正解です。テキストp.146の参考（令4.3.4厚労告59号）によれば、指定訪問看護は、末期の悪性腫瘍など厚生労働大臣が定める疾病等を除き、利用者1人につき「週3日」を限度とするとされており、設問の「週5日」は誤りです。"},{"law":"移送費","cat":"支給要件","q":"移送費は、移送により適切な療養を受けたこと、移送の原因である疾病又は負傷により移動することが著しく困難であったこと、緊急その他やむを得なかったことのいずれにも該当すると保険者が認める場合に支給される。","a":true,"exp":"〇。法97条、則81条。単なる通院は支給対象とならず、一部負担金等の自己負担額はない。","page":152,"detail":"〇が正解です。法97条及び則81条により、移送費は、保険者が必要であると認める場合に限り支給され、具体的には、移送により適切な療養を受けたこと、移送の原因である疾病又は負傷により移動することが著しく困難であったこと、緊急その他やむを得なかったことのいずれにも該当すると認める場合に支給されます。単なる通院は支給対象とならず、一部負担金等の自己負担額はありません。設問は条文どおりで正しい記述です。"},{"law":"傷病手当金","cat":"待期","q":"傷病手当金は、被保険者が療養のため労務に服することができないときは、その労務に服することができなくなった日から起算して3日を経過した日から、労務に服することができない期間支給される。","a":true,"exp":"〇。法99条。最初の3日間が待期期間であり、有給休暇で処理した場合や公休日も待期に含まれる。","page":154,"detail":"〇が正解です。法99条1項により、傷病手当金は、被保険者（任意継続被保険者を除く）が療養のため労務に服することができないとき、その労務に服することができなくなった日から起算して3日を経過した日から、労務に服することができない期間支給されます。最初の3日間が待期期間であり、テキストの通達では、有給休暇で処理した場合でも待期は完成し、公休日も待期の3日間に含めることができるとされています。設問は条文どおりで正しい記述です。"},{"law":"傷病手当金","cat":"支給額","q":"傷病手当金の額は、1日につき、支給開始日の属する月以前の直近の継続した12か月間の各月の標準報酬月額を平均した額の30分の1に相当する額の3分の2に相当する金額である。","a":true,"exp":"〇。法99条2項。被扶養者の有無や入院・自宅療養を問わず同じ算定方法による。","page":156,"detail":"〇が正解です。法99条2項により、傷病手当金の額は、1日につき、支給を始める日の属する月以前の直近の継続した12か月間の各月の標準報酬月額を平均した額の30分の1に相当する額の3分の2に相当する金額です。テキストでは、被扶養者の有無にかかわらず、また入院療養であるか自宅療養であるかにかかわらず同じ算定方法によるとされています。設問は条文どおりで正しい記述です。"},{"law":"傷病手当金","cat":"支給額(率)","q":"傷病手当金の額は、1日につき、標準報酬月額の平均額の30分の1に相当する額の4分の3に相当する金額である。","a":false,"exp":"×。法99条2項。傷病手当金の額は、標準報酬月額の平均額の30分の1に相当する額の3分の2に相当する金額である。","page":156,"detail":"×が正解です。法99条2項により、傷病手当金の額は、標準報酬月額の平均額の30分の1に相当する額の「3分の2」に相当する金額であり、設問の「4分の3」は誤りです。出産手当金も同様の算定方法（3分の2）によります。"},{"law":"傷病手当金","cat":"支給期間","q":"傷病手当金の支給期間は、同一の疾病又は負傷及びこれにより発した疾病に関しては、その支給を始めた日から通算して1年6か月間である。","a":true,"exp":"〇。法99条4項。途中に無支給期間がある場合、その日数分について支給期間は減少しない(通算化)。","page":158,"detail":"〇が正解です。法99条4項により、傷病手当金の支給期間は、同一の疾病又は負傷及びこれにより発した疾病に関しては、その支給を始めた日から通算して1年6か月間とされています。テキストの計算例のとおり、支給した日数の累計が支給期間の日数に達するまで支給され、途中に無支給期間がある場合には、その日数分について支給期間は減少しません（通算化）。設問は条文どおりで正しい記述です。"},{"law":"傷病手当金","cat":"支給期間(誤り)","q":"傷病手当金の支給期間は、同一の疾病又は負傷に関しては、その支給を始めた日から起算して暦に従って2年間であり、無支給期間があってもその分は延長されない。","a":false,"exp":"×。法99条4項。傷病手当金の支給期間は、支給を始めた日から「通算して1年6か月間」であり、無支給期間の日数分は支給期間が減少しない。","page":158,"detail":"×が正解です。法99条4項により、傷病手当金の支給期間は、支給を始めた日から「通算して1年6か月間」であり、設問の「暦に従って2年間」は誤りです。また通算化により、途中に無支給期間がある場合には、その日数分について支給期間は減少しません。設問は支給期間の年数も通算化の説明も誤っています。"},{"law":"傷病手当金","cat":"労災との調整","q":"労災保険の休業補償給付を受けている間に傷病手当金の支給要件を満たした場合、傷病手当金の額が休業補償給付の額を上回るときは、その差額が支給される。","a":true,"exp":"〇。昭33通達。原則として傷病手当金は支給されないが、傷病手当金の額が上回るときは差額が支給される。","page":157,"detail":"〇が正解です。テキストp.157の通達（昭33.7.8保険発95号）によれば、労災保険の休業補償給付を受けている間に傷病手当金の支給要件を満たしたとしても、傷病手当金は原則として支給されませんが、傷病手当金の額が休業補償給付の額を上回るときは、その差額が支給されます。設問は通達どおりで正しい記述です。"},{"law":"傷病手当金","cat":"死亡日","q":"傷病手当金の支給を受ける者が死亡した場合、死亡当日については傷病手当金は支給されない。","a":false,"exp":"×。通達。傷病手当金の支給を受ける者が死亡した場合、死亡当日についても支給される。","page":159,"detail":"×が正解です。テキストp.159の通達によれば、傷病手当金の支給を受ける者が死亡した場合、死亡当日についても支給されるとされており、設問の「支給されない」は誤りです。なお、事業主が保険料未納であっても、それを原因として傷病手当金の支給が停止又は終了することはありません。"},{"law":"傷病手当金","cat":"報酬との調整","q":"疾病にかかり、又は負傷した場合において報酬の全部又は一部を受けることができる者に対しては、報酬を受けることができる期間は傷病手当金を支給しないが、その報酬の額が傷病手当金の額より少ないときはその差額を支給する。","a":true,"exp":"〇。法108条1項。報酬を受けられる期間は傷病手当金を支給せず、報酬額が傷病手当金額より少ないときは差額を支給する。","page":168,"detail":"〇が正解です。法108条1項により、疾病にかかり又は負傷した場合において報酬の全部又は一部を受けることができる者に対しては、報酬を受けることができる期間は傷病手当金を支給せず、その受けることができる報酬の額が傷病手当金の額より少ないときは、その差額を支給します。設問は条文どおりで正しい記述です。"},{"law":"傷病手当金","cat":"待期日数","q":"傷病手当金は、労務に服することができなくなった日から起算して2日を経過した日から支給される。","a":false,"exp":"×。法99条。傷病手当金は労務に服することができなくなった日から起算して「3日」を経過した日(待期3日間満了)から支給される。","page":154,"detail":"×が正解です。法99条1項により、傷病手当金は、労務に服することができなくなった日から起算して「3日」を経過した日（待期3日間が満了した日）から支給されるのであり、設問の「2日」は誤りです。最初の3日間が待期期間であり、有給休暇で処理した場合や公休日も待期に含まれます。"},{"law":"死亡に関する給付","cat":"埋葬料","q":"被保険者が死亡したときは、その者により生計を維持していた者であって、埋葬を行う者に対し、埋葬料として政令で定める金額を支給する。","a":true,"exp":"〇。法100条。死亡の原因が自殺であっても埋葬料は支給される。生計維持は一部でも維持されていればよい。","page":160,"detail":"〇が正解です。法100条により、被保険者が死亡したときは、その者により生計を維持していた者であって埋葬を行う者に対し、埋葬料として政令で定める金額を支給します。テキストの注意のとおり、死亡の原因が自殺であっても埋葬料は支給され、また「生計を維持していた者」とは被保険者により生計の一部でも維持されていればよく、同一世帯か否か、民法上の親族か否かは問いません。設問は条文どおりで正しい記述です。"},{"law":"死亡に関する給付","cat":"埋葬料の額","q":"埋葬料の額は、政令で定める金額であり、3万円である。","a":false,"exp":"×。令35条。埋葬料及び家族埋葬料の額は定額の5万円である。","page":160,"detail":"×が正解です。令35条により、埋葬料及び家族埋葬料の額は定額の「5万円」とされており、設問の「3万円」は誤りです。"},{"law":"死亡に関する給付","cat":"埋葬の費用","q":"被保険者が死亡したが埋葬料の支給を受けるべき者がない場合は、埋葬を行った者に対し、埋葬に要した費用に相当する金額を支給する。","a":true,"exp":"〇。法100条。現実に埋葬を行った者に支給し、生計維持関係などは問われない。","page":160,"detail":"〇が正解です。法100条により、被保険者が死亡したが埋葬料の支給を受けるべき者がない場合においては、埋葬を行った者に対し、埋葬に要した費用に相当する金額を支給します。テキストでは、これは現実に埋葬を行った者に支給するものであり、生計維持関係などは問われないとされています。なお保険事故発生日は、埋葬料の場合は死亡日、埋葬の費用の支給の場合は埋葬を行った日です。設問は条文どおりで正しい記述です。"},{"law":"出産に関する給付","cat":"出産育児一時金(出産の定義)","q":"出産育児一時金の支給対象となる出産は、妊娠4か月以上の出産に限られ、生産、死産、流産又は早産を問わず支給される。","a":true,"exp":"〇。法101条等。妊娠4か月以上(妊娠85日以上)の出産が対象である。父が不明の私生児出産でも支給される。","page":163,"detail":"〇が正解です。法101条等及びテキストp.163によれば、出産育児一時金の支給対象となる出産は、妊娠4か月以上（妊娠1か月を28日として計算した妊娠85日以上）の出産に限られ、これに該当すれば生産、死産、流産（人工流産を含む）又は早産を問わず支給されます。また通達では、出産に関する給付は主として母体保護を目的とするため、父が不明の私生児出産であっても支給されるとされています。設問は正しい記述です。"},{"law":"出産に関する給付","cat":"出産育児一時金の額","q":"産科医療補償制度に加入する病院等での出産でない場合の出産育児一時金の支給額は、一児につき42万円である。","a":false,"exp":"×。令36条。出産育児一時金の支給額は一児につき48万8,000円である(加算対象出産の場合は3万円を超えない範囲内で加算)。","page":164,"detail":"×が正解です。令36条及び令5.3.30保保発0330第13号によれば、出産育児一時金の支給額は一児につき「48万8,000円」であり、設問の「42万円」は誤りです。産科医療補償制度に加入する病院等での加算対象出産（在胎週数22週以降）の場合は、48万8,000円に3万円を超えない範囲内で保険者が定める額を加算した額となります。"},{"law":"出産に関する給付","cat":"出産手当金(支給期間)","q":"出産手当金は、出産の日以前42日(多胎妊娠の場合は98日)から出産の日後56日までの間において、労務に服さなかった期間支給される。","a":true,"exp":"〇。法102条。出産の日当日は出産の日以前に含まれる。出産日が予定日より遅れた場合、その遅れた期間も含めて支給される。","page":166,"detail":"〇が正解です。法102条1項により、出産手当金は、出産の日（出産の日が予定日後であるときは予定日）以前42日（多胎妊娠の場合は98日）から出産の日後56日までの間において、労務に服さなかった期間支給されます。テキストのとおり、出産の日当日は出産の日以前に含まれ、出産日が予定日より遅れた場合は、その遅れた期間も含めて支給されます。設問は条文どおりで正しい記述です。"},{"law":"出産に関する給付","cat":"出産手当金の額","q":"出産手当金の額は、傷病手当金の算定方法と同様の方法により算定した額である。","a":true,"exp":"〇。法102条2項。標準報酬月額の平均額の30分の1に相当する額の3分の2に相当する金額である。","page":166,"detail":"〇が正解です。法102条2項により、出産手当金の額は、傷病手当金の支給額の算定方法と同様の方法により算定した額とされています。すなわち、支給を始める日の属する月以前の直近の継続した12か月間の各月の標準報酬月額を平均した額の30分の1に相当する額の3分の2に相当する金額です。設問は条文どおりで正しい記述です。"},{"law":"出産に関する給付","cat":"出産手当金(任意継続)","q":"任意継続被保険者が出産したときは、出産手当金が支給される。","a":false,"exp":"×。法102条1項。出産手当金の支給対象は被保険者(任意継続被保険者を除く)である。傷病手当金も同様に任意継続被保険者は除かれる。","page":166,"detail":"×が正解です。法102条1項により、出産手当金の支給対象は「被保険者（任意継続被保険者を除く）」であり、任意継続被保険者が出産しても出産手当金は支給されません。傷病手当金（法99条1項）も同様に任意継続被保険者は支給対象から除かれます。設問は誤りです。"},{"law":"出産に関する給付","cat":"出産の定義(月数)","q":"出産育児一時金の支給対象となる出産は、妊娠5か月以上の出産に限られる。","a":false,"exp":"×。通達。支給対象となる出産は妊娠4か月以上(妊娠85日以上)の出産に限られる。","page":163,"detail":"×が正解です。テキストp.163によれば、出産育児一時金の支給対象となる出産は「妊娠4か月以上（妊娠85日以上）」の出産に限られるのであり、設問の「妊娠5か月以上」は誤りです。妊娠1か月を28日として計算するため、妊娠4か月は妊娠85日に当たります。"},{"law":"手当金の調整","cat":"傷病手当金と出産手当金","q":"出産手当金を支給する場合においては、その期間、傷病手当金は支給しないが、受けられる出産手当金の額が傷病手当金の額より少ないときは、その差額を支給する。","a":true,"exp":"〇。法103条。出産手当金を優先し、傷病手当金が支払われたときは出産手当金の内払とみなす。","page":167,"detail":"〇が正解です。法103条により、出産手当金を支給する場合においては、その期間、傷病手当金は支給せず、受けられる出産手当金の額が傷病手当金の額より少ないときは、その差額を支給します。出産手当金を優先する調整であり、出産手当金を支給すべき場合に傷病手当金が支払われたときは、その傷病手当金（差額支給分を除く）は出産手当金の内払とみなされます。設問は条文どおりで正しい記述です。"},{"law":"手当金の調整","cat":"傷病手当金と障害厚生年金","q":"傷病手当金の支給を受けるべき者が、同一の疾病等につき障害厚生年金の支給を受けることができるときは、原則として傷病手当金は支給しないが、障害年金の額が傷病手当金の額より少ないときはその差額が支給される。","a":true,"exp":"〇。法108条3項。障害年金の額は、障害厚生年金の額(障害基礎年金を含む場合は合算額)を360で除して得た額で比較する。","page":169,"detail":"〇が正解です。法108条3項により、傷病手当金の支給を受けるべき者が同一の疾病等につき障害厚生年金の支給を受けることができるときは、原則として傷病手当金は支給されませんが、障害年金の額が傷病手当金の額より少ない場合はその差額が支給されます。比較に用いる「障害年金の額」は、障害厚生年金の額（同一事由の障害基礎年金を受けられるときはその合算額）を360で除して得た額です。設問は正しい記述です。"},{"law":"資格喪失後の給付","cat":"継続給付の要件","q":"傷病手当金又は出産手当金の継続給付は、被保険者の資格を喪失した日の前日まで引き続き1年以上被保険者であったこと、及び資格喪失の際に傷病手当金又は出産手当金の支給を受けていることが要件である。","a":true,"exp":"〇。法104条。「引き続き1年以上」は1日の空白もなければ転職・転勤があっても通算される。","page":174,"detail":"〇が正解です。法104条により、傷病手当金又は出産手当金の継続給付は、被保険者の資格を喪失した日の前日まで引き続き1年以上被保険者であったこと、及び資格喪失の際に傷病手当金又は出産手当金の支給を受けていることが要件です。テキストのとおり「引き続き1年以上」とは、その間に転勤や転職で事業所や保険者が変わっても、被保険者資格に1日の空白もなければ通算されます。設問は条文どおりで正しい記述です。"},{"law":"資格喪失後の給付","cat":"継続給付(待期未完成)","q":"傷病手当金の継続給付の要件である「資格喪失の際に支給を受けている者」には、休業3日目に退職した場合も含まれる。","a":false,"exp":"×。通達。休業3日目に退職した場合は、待期完成前(被保険者である間に支給を受けていない)であるため、資格喪失後に傷病手当金は支給されない。","page":175,"detail":"×が正解です。テキストp.175の通達（昭27.6.12保文発3367号）によれば、継続給付の要件である「資格喪失の際に支給を受けている者」には、現実に支給を受けている者や報酬を受けていることにより支給停止されている者は含まれますが、休業3日目に退職した場合は待期が完成しておらず被保険者である間に支給を受けていないため、資格喪失後に傷病手当金は支給されません。設問は誤りです。"},{"law":"資格喪失後の給付","cat":"出産育児一時金","q":"資格喪失後の出産育児一時金は、資格喪失日の前日まで引き続き1年以上被保険者であり、かつ資格を喪失した日後3か月以内に出産したことが要件である。","a":false,"exp":"×。法106条。資格喪失後の出産育児一時金は、資格を喪失した日後「6か月以内」に出産したことが要件である。","page":178,"detail":"×が正解です。法106条により、資格喪失後の出産育児一時金は、資格を喪失した日の前日まで引き続き1年以上被保険者であったこと、及び資格を喪失した日後「6か月以内」に出産したことが要件であり、設問の「3か月以内」は誤りです。出産日が遅れ、資格喪失後6か月を経過したときは支給されません。"},{"law":"被扶養者の給付","cat":"家族療養費(給付割合)","q":"被扶養者が6歳に達する日以後の最初の3月31日の翌日以後であって70歳に達する日の属する月以前である場合、家族療養費の給付割合は100分の70である。","a":true,"exp":"〇。法110条。義務教育就学前(6歳到達後最初の3月31日以前)は100分の80である。","page":184,"detail":"〇が正解です。法110条2項により、家族療養費の給付割合は、被扶養者が6歳到達後最初の3月31日の翌日以後であって70歳に達する日の属する月以前である場合は100分の70とされています。義務教育就学前（6歳到達後最初の3月31日以前）は100分の80です。設問は条文どおりで正しい記述です。"},{"law":"被扶養者の給付","cat":"家族療養費(70歳以上)","q":"現役並み所得者である被保険者の被扶養者が70歳に達する日の属する月の翌月以後である場合、家族療養費の給付割合は100分の80である。","a":false,"exp":"×。法110条。現役並み所得者である被保険者の被扶養者(70歳以上)の給付割合は100分の70である。それ以外の70歳以上は100分の80である。","page":184,"detail":"×が正解です。法110条2項により、現役並み所得者である被保険者の被扶養者が70歳に達する日の属する月の翌月以後である場合の給付割合は「100分の70」であり、設問の「100分の80」は誤りです。それ以外の70歳以上の被扶養者は100分の80です。"},{"law":"被扶養者の給付","cat":"家族療養費(支給対象)","q":"家族療養費は、被扶養者本人に対して支給される。","a":false,"exp":"×。法110条。被扶養者に関する保険給付はすべて被保険者に対して行われる。被保険者が資格を喪失した場合、その資格喪失日から被扶養者に関する保険給付は行われない。","page":183,"detail":"×が正解です。法110条1項により、家族療養費は被扶養者本人ではなく「被保険者」に対して支給されます。テキストのとおり、被扶養者に関する保険給付はすべて被保険者に対して行われるものであり、被保険者が退職や死亡によりその資格を喪失した場合には、その資格喪失日から被扶養者に関する保険給付は行われません。設問は誤りです。"},{"law":"被扶養者の給付","cat":"出産手当金・傷病手当金の不存在","q":"被扶養者を対象とした出産手当金及び傷病手当金はない。","a":true,"exp":"〇。被扶養者に係る給付には家族出産育児一時金はあるが、出産手当金及び傷病手当金に相当する給付はない。","page":187,"detail":"〇が正解です。テキストp.187によれば、被扶養者に係る給付には家族療養費・家族訪問看護療養費・家族移送費・家族埋葬料・家族出産育児一時金がありますが、被扶養者を対象とした出産手当金及び傷病手当金に相当する給付はありません。これらは被保険者本人の所得保障を目的とする給付であるためです。設問は正しい記述です。"},{"law":"高額療養費","cat":"世帯合算(70歳未満)","q":"70歳未満の者に係る一部負担金等世帯合算額の合算の対象となるのは、一部負担金等の額が21,000円以上のものに限られる。","a":true,"exp":"〇。令41条等。70歳未満は21,000円以上のものが合算対象となる。食事療養標準負担額・生活療養標準負担額は含まれない。","page":192,"detail":"〇が正解です。令41条等により、70歳未満の者に係る一部負担金等世帯合算額の合算対象となるのは、同一の月にそれぞれ一の病院等から受けた療養に係る一部負担金等の額が「21,000円以上」のものに限られます。テキストの注意のとおり、食事療養標準負担額及び生活療養標準負担額は一部負担金等世帯合算額には含まれません。設問は正しい記述です。"},{"law":"高額療養費","cat":"多数回該当","q":"療養のあった月以前の12か月以内に既に高額療養費が支給されている月数が2か月以上である世帯は、高額療養費算定基準額が3か月目から軽減される。","a":false,"exp":"×。令42条。多数回該当は、12か月以内に既に高額療養費が支給されている月数が「3か月以上」である世帯について、「4か月目」から軽減される。","page":194,"detail":"×が正解です。令42条により、多数回該当は、療養のあった月以前の12か月以内に既に高額療養費が支給されている月数が「3か月以上」である世帯について、「4か月目」から高額療養費算定基準額が軽減される制度であり、設問の「2か月以上」「3か月目から」は誤りです。なお保険者が変わった場合は支給回数は通算されません。"},{"law":"高額療養費","cat":"算定基準額(70歳未満ウ)","q":"標準報酬月額28万円以上53万円未満の被保険者の70歳未満の高額療養費算定基準額(原則)は、80,100円+(医療費-267,000円)×100分の1である。","a":true,"exp":"〇。令42条。所得区分ウの算定式である。多数回該当の場合は44,400円となる。","page":194,"detail":"〇が正解です。令42条の70歳未満の高額療養費算定基準額の表により、所得区分ウ（標準報酬月額28万円以上53万円未満）の原則の算定式は「80,100円＋（医療費－267,000円）×100分の1」です。設問はこの所得区分ウの算定式どおりであり、多数回該当の場合は44,400円となります。正しい記述です。"},{"law":"高額療養費","cat":"70歳以上(個人単位外来)","q":"70歳以上の者(現役並み所得者を除く)の外来療養に係る個人単位の高額療養費算定基準額は、所得区分が一般の場合18,000円(年間上限144,000円)である。","a":true,"exp":"〇。令42条。低所得者は8,000円である。現役並み所得者には個人単位の外来の高額療養費制度は適用されない。","page":195,"detail":"〇が正解です。令41条5項・42条5項等により、70歳以上の者（現役並み所得者を除く）の外来療養に係る個人単位の高額療養費算定基準額は、所得区分が一般の場合18,000円（年間上限144,000円）、低所得者の場合8,000円とされています。現役並み所得者には個人単位の外来の高額療養費制度は適用されません。設問は表どおりで正しい記述です。"},{"law":"高額療養費","cat":"特定疾病","q":"被保険者又はその被扶養者が厚生労働大臣の定める特定疾病に係る療養を受けた場合、同一の月に一の病院等から受けた当該療養に係る一部負担金等の額が10,000円を超えるときは、その超えた額が高額療養費として支給される。","a":true,"exp":"〇。令41条等。人工透析患者のうち70歳未満の上位所得者(標準報酬月額53万円以上)は自己負担限度額が20,000円となる。","page":198,"detail":"〇が正解です。令41条9項・42条9項等により、被保険者又はその被扶養者が厚生労働大臣の定める特定疾病（人工腎臓を実施している慢性腎不全、血友病、抗ウイルス剤を投与する後天性免疫不全症候群）に係る療養を受けた場合、同一の月に一の病院等から受けた当該療養に係る一部負担金等の額が10,000円を超えるときは、その超えた額が高額療養費として支給されます。人工透析患者のうち70歳未満の上位所得者（標準報酬月額53万円以上）は自己負担限度額が20,000円となります。設問は正しい記述です。"},{"law":"高額療養費","cat":"75歳到達月","q":"月の途中で75歳の誕生日を迎えて後期高齢者医療の被保険者となる場合、75歳到達月については、75歳到達者個人単位で自己負担限度額をそれぞれ本来額の2分の1の額とする。","a":true,"exp":"〇。令41条等。75歳到達月の自己負担限度額の特例により、本来額の2分の1とする。","page":199,"detail":"〇が正解です。令41条等のテキストp.199によれば、高額療養費は保険者ごとに月単位で計算するため、月の途中で75歳の誕生日を迎えて後期高齢者医療の被保険者となる場合、同一月に従前の医療保険と後期高齢者医療の双方で自己負担限度額まで負担することが起こり得ます。これを避けるため、75歳到達月については、75歳到達者個人単位で自己負担限度額をそれぞれ本来額の2分の1の額とします。設問は正しい記述です。"},{"law":"高額介護合算療養費","cat":"計算期間","q":"高額介護合算療養費における介護合算一部負担金等世帯合算額を計算するための計算期間は、前年8月1日から7月31日までの期間である。","a":true,"exp":"〇。令41条の2。計算期間の末日(7月31日)を基準日という。","page":203,"detail":"〇が正解です。令41条の2第1項により、高額介護合算療養費における介護合算一部負担金等世帯合算額を計算するための計算期間は、前年8月1日から7月31日までの期間とされています。テキストのとおり、計算期間の末日（7月31日）を基準日といい、基準日に被保険者である者（基準日被保険者）に支給されます。設問は正しい記述です。"},{"law":"高額介護合算療養費","cat":"支給基準額","q":"高額介護合算療養費の支給基準額は、厚生労働大臣が定める額(5,000円)である。","a":false,"exp":"×。令43条の2、平20厚労告。高額介護合算療養費の支給基準額は500円である。","page":204,"detail":"×が正解です。令43条の2第1項及び平20.3.31厚労告225号により、高額介護合算療養費の支給基準額は、支給の事務の執行に要する費用を勘案して厚生労働大臣が定める額である「500円」であり、設問の「5,000円」は誤りです。高額介護合算療養費は、介護合算一部負担金等世帯合算額が介護合算算定基準額と支給基準額の合計を超える場合に支給されます。"},{"law":"通則","cat":"付加給付","q":"保険者が健康保険組合である場合には、法定の保険給付に併せて、規約で定めるところにより、付加給付を行うことができる。","a":true,"exp":"〇。法53条。一部負担金の払戻しや傷病手当金の上乗せ・期間延長等を付加給付として行うことができる。","page":208,"detail":"〇が正解です。法53条により、保険者が健康保険組合である場合には、法定の保険給付に併せて、規約で定めるところにより付加給付を行うことができます。テキストの参考のとおり、被保険者が支払った一部負担金の一部を払い戻したり、傷病手当金について法定支給期間内にその額を上乗せしたり、法定支給期間終了後に期間を延長して支給することなどができます。設問は条文どおりで正しい記述です。"},{"law":"通則","cat":"給付制限(闘争等)","q":"被保険者が闘争、泥酔又は著しい不行跡により給付事由を生じさせたときは、当該給付事由に係る保険給付の全部を必ず行わない。","a":false,"exp":"×。法117条。闘争、泥酔又は著しい不行跡の場合は、当該給付事由に係る保険給付の「全部又は一部を行わないことができる」である。","page":216,"detail":"×が正解です。法117条により、被保険者が闘争、泥酔又は著しい不行跡により給付事由を生じさせたときは、当該給付事由に係る保険給付の「全部又は一部を行わないことができる」とされており、設問の「全部を必ず行わない」は誤りです。これは保険者の裁量による相対的な給付制限です。"},{"law":"通則","cat":"給付制限(少年院等)","q":"被保険者又は被保険者であった者が少年院その他これに準ずる施設に収容されたとき等は、死亡に関する保険給付も含めて、その期間に係る保険給付は行わない。","a":false,"exp":"×。法118条。少年院等にある場合、疾病・負傷・出産に係る給付は行わないが、死亡に関する保険給付は給付制限の対象ではない。","page":216,"detail":"×が正解です。法118条1項により、被保険者又は被保険者であった者が少年院その他これに準ずる施設に収容されたとき等は、疾病、負傷又は出産に係る保険給付（傷病手当金及び出産手当金は厚生労働省令で定める場合に限る）は行われませんが、テキストの注意のとおり、死亡に関する保険給付は給付制限の対象ではありません。したがって「死亡に関する保険給付も含めて」とする設問は誤りです。"},{"law":"通則","cat":"労災等との調整","q":"被保険者に係る療養の給付や傷病手当金等の支給は、同一の疾病、負傷又は死亡について労災保険法等によりこれらに相当する給付を受けることができる場合には、行わない。","a":true,"exp":"〇。法55条。労災保険等の業務災害に係る給付を受けられる場合は健康保険の給付は行われない。","page":209,"detail":"〇が正解です。法55条1項により、被保険者に係る療養の給付や傷病手当金等の支給は、同一の疾病、負傷又は死亡について、労災保険法、国家公務員災害補償法又は地方公務員災害補償法等によりこれらに相当する給付を受けることができる場合には行われません。業務災害等に係る給付は労災保険等で対応するため、健康保険からは重ねて給付しないという調整です。設問は条文どおりで正しい記述です。"},{"law":"通則","cat":"損害賠償(代位取得)","q":"保険者は、給付事由が第三者の行為によって生じた場合において保険給付を行ったときは、その給付の価額の限度において、保険給付を受ける権利を有する者が第三者に対して有する損害賠償の請求権を取得する。","a":true,"exp":"〇。法57条1項。損害賠償請求権は当然に移転し、第三者への通知やその承諾を要件としない。","page":211,"detail":"〇が正解です。法57条1項により、保険者は、給付事由が第三者の行為によって生じた場合において保険給付を行ったときは、その給付の価額の限度において、保険給付を受ける権利を有する者が第三者に対して有する損害賠償の請求権を取得します（代位取得）。テキストの通達（昭31.11.7保文発9218号）のとおり、この損害賠償請求権は当然に移転するものであり、第三者への通知やその承諾を要件とするものではありません。設問は正しい記述です。"},{"law":"日雇特例被保険者","cat":"標準賃金日額","q":"日雇特例被保険者の標準賃金日額は、賃金日額に基づき第1級から第11級までの等級区分による。","a":true,"exp":"〇。法124条。第1級は標準賃金日額3,000円、第11級は24,750円である。","page":223,"detail":"〇が正解です。法124条により、日雇特例被保険者の標準賃金日額は、賃金日額に基づき第1級から第11級までの等級区分によります。テキストの等級表のとおり、第1級は標準賃金日額3,000円（賃金日額3,500円未満）、第11級は標準賃金日額24,750円（賃金日額23,000円以上）です。設問は条文どおりで正しい記述です。"},{"law":"日雇特例被保険者","cat":"保険料納付要件(出産育児一時金)","q":"日雇特例被保険者が出産育児一時金の支給を受けるためには、出産日の属する月前2月間に通算して26日分以上保険料を納付していることが要件である。","a":false,"exp":"×。法144条等。出産育児一時金は出産日の属する月「前4月間」に通算して26日分以上の保険料納付が要件である。","page":225,"detail":"×が正解です。法144条等及びテキストp.225によれば、日雇特例被保険者が出産育児一時金の支給を受けるためには、出産日の属する月「前4月間」に通算して26日分以上保険料を納付していることが要件であり、設問の「前2月間」は誤りです。なお、療養の給付等を受けるための納付要件は、前2月間に通算26日分以上又は前6月間に通算78日分以上です。"},{"law":"日雇特例被保険者","cat":"療養の給付の支給期間","q":"日雇特例被保険者の同一の疾病又は負傷に対する療養の給付は、療養の給付等の開始の日から1年間(厚生労働大臣が指定する結核性疾病については5年間)の範囲内で行われる。","a":true,"exp":"〇。法129条。結核性疾病は5年間である。","page":227,"detail":"〇が正解です。法129条によれば、日雇特例被保険者の同一の疾病又は負傷に対する療養の給付は、療養の給付等の開始の日から1年間（厚生労働大臣が指定する疾病である結核性疾病については5年間）の範囲内で行われます。この期間が経過した後であっても、保険料納付要件を満たす月については支給されます。設問は条文どおりで正しい記述です。"},{"law":"費用負担","cat":"国庫負担","q":"国庫は、毎年度、予算の範囲内で、健康保険事業の事務の執行に要する費用を負担する。","a":true,"exp":"〇。法151条。健康保険組合に対して交付する国庫負担金は、各健康保険組合における被保険者数を基準として厚生労働大臣が算定する。","page":238,"detail":"〇が正解です。法151条により、国庫は、毎年度、予算の範囲内で、健康保険事業の事務の執行に要する費用を負担します。テキストのとおり、健康保険組合に対して交付する国庫負担金は、各健康保険組合における被保険者数を基準として厚生労働大臣が算定し、概算払をすることができます。設問は条文どおりで正しい記述です。"},{"law":"費用負担","cat":"国庫補助(割合)","q":"国庫補助の「政令で定める割合」は、法附則により、当分の間、1000分の200とされている。","a":false,"exp":"×。法153条、附則5条。国庫補助の割合は1000分の130から1000分の200までの範囲内で、当分の間「1000分の164」とされている。","page":242,"detail":"×が正解です。法153条及び附則5条により、国庫補助の「政令で定める割合」は、1000分の130から1000分の200までの範囲内とされ、法附則により当分の間「1000分の164」とされています。したがって設問の「1000分の200」は誤りです。なお、出産育児一時金、家族出産育児一時金、埋葬料、家族埋葬料の支給に要する費用については国庫補助はありません。"},{"law":"保険料","cat":"徴収主体","q":"全国健康保険協会管掌健康保険の任意継続被保険者に関する保険料は、厚生労働大臣が徴収する。","a":false,"exp":"×。法155条等。協会管掌健康保険の任意継続被保険者の保険料は全国健康保険協会が徴収する。一般の被保険者は厚生労働大臣が徴収する。","page":244,"detail":"×が正解です。法155条等及びテキストp.244の表によれば、全国健康保険協会管掌健康保険の任意継続被保険者に関する保険料は「全国健康保険協会」が徴収するのであり、設問の「厚生労働大臣」は誤りです。協会けんぽの一般の被保険者の保険料は厚生労働大臣が徴収し、健康保険組合管掌の被保険者の保険料は当該健康保険組合が徴収します。"},{"law":"保険料","cat":"一般保険料率(範囲)","q":"全国健康保険協会が管掌する健康保険の被保険者に関する一般保険料率は、1000分の30から1000分の130までの範囲内において、支部被保険者を単位として全国健康保険協会が決定する。","a":true,"exp":"〇。法160条。支部被保険者を単位とする一般保険料率を都道府県単位保険料率という。組合管掌健康保険も同範囲内で決定する。","page":246,"detail":"〇が正解です。法160条1項により、全国健康保険協会が管掌する健康保険の被保険者に関する一般保険料率は、1000分の30から1000分の130までの範囲内において、支部被保険者を単位として全国健康保険協会が決定します。支部被保険者を単位として決定する一般保険料率を都道府県単位保険料率といいます。設問は条文どおりで正しい記述です。"},{"law":"保険料","cat":"収支の見通し","q":"全国健康保険協会は、5年ごとに、翌事業年度以降の5年間についての健康保険事業の収支の見通しを作成し、公表する。","a":false,"exp":"×。法160条。全国健康保険協会は「2年ごとに」、翌事業年度以降の5年間についての収支の見通しを作成・公表する。","page":248,"detail":"×が正解です。法160条6項及びテキストp.248によれば、全国健康保険協会は「2年ごとに」、翌事業年度以降の5年間についての被保険者数及び総報酬額の見通し、保険給付に要する費用の額、保険料の額その他の健康保険事業の収支の見通しを作成し、公表するとされており、設問の「5年ごとに」は誤りです。見通しの対象期間は翌事業年度以降の5年間ですが、作成・公表の頻度は2年ごとです。"},{"law":"保険料","cat":"納付義務","q":"事業主は、被保険者が負担すべき保険料額を被保険者から徴収できなかったときは、その被保険者の負担分については納付する義務を負わない。","a":false,"exp":"×。法161条、昭2通達。事業主は被保険者から徴収できたか否かにかかわらず、保険料の全額を納付する義務を負う。","page":260,"detail":"×が正解です。法161条2項及びテキストp.260の通達（昭2.2.14保理218号）によれば、事業主は、被保険者が負担すべき保険料額を被保険者から徴収できたか否かにかかわらず、その全額（事業主負担分及び被保険者負担分）を納付する義務を負うとされており、設問の「納付する義務を負わない」は誤りです。"},{"law":"保険料","cat":"督促の期限","q":"保険料等を滞納する者があるときの督促状により指定する期限は、督促状を発する日から起算して7日以上を経過した日でなければならない。","a":false,"exp":"×。法180条。督促状により指定する期限は、督促状を発する日から起算して「10日以上」を経過した日でなければならない。","page":271,"detail":"×が正解です。法180条3項により、督促状により指定する期限は、督促状を発する日から起算して「10日以上」を経過した日でなければならないとされており、設問の「7日以上」は誤りです。ただし、納期限経過後に保険料の繰上徴収に該当する事由が発生したときは、10日以内の日を指定することができます。"},{"law":"保険料","cat":"先取特権","q":"保険料等の先取特権の順位は、国税及び地方税と同順位とされている。","a":false,"exp":"×。法182条。保険料等の先取特権の順位は、国税及び地方税に次ぐものとされている。","page":274,"detail":"×が正解です。法182条により、保険料等の先取特権の順位は、国税及び地方税に「次ぐ」ものとされており、設問の「国税及び地方税と同順位」は誤りです。すなわち国税・地方税に劣後する順位となります。"},{"law":"保険料","cat":"一般保険料率の構成","q":"一般保険料率とは、基本保険料率と特定保険料率とを合算した率をいう。","a":true,"exp":"〇。法160条等。基本保険料率は一般保険料率から特定保険料率を控除した率を基準として保険者が定める。","page":245,"detail":"〇が正解です。法160条14項及びテキストp.245によれば、一般保険料率とは、基本保険料率と特定保険料率とを合算した率をいいます。基本保険料率は一般保険料率から特定保険料率を控除した率を基準として保険者が定め、特定保険料率は前期高齢者納付金等・後期高齢者支援金等・流行初期医療確保拠出金等の額を被保険者の総報酬額の総額の見込額で除して得た率を基準として保険者が定めます。設問は正しい記述です。"},{"law":"保険料","cat":"育児休業等の徴収特例","q":"育児休業等を開始した日の属する月とその育児休業等が終了する日の翌日が属する月とが同一である場合、当該月における育児休業等の日数が14日以上であれば、当該月の標準報酬月額に係る保険料は免除される。","a":true,"exp":"〇。法159条。同一月内の育児休業等は14日以上で標準報酬月額に係る保険料が免除される(標準賞与額に係る保険料は1か月超でないと免除されない)。","page":255,"detail":"〇が正解です。法159条及びテキストp.255によれば、育児休業等を開始した日の属する月とその育児休業等が終了する日の翌日が属する月とが同一である場合、当該月における育児休業等の日数が14日以上であれば、当該月の標準報酬月額に係る保険料は免除されます。ただしこの場合は育児休業等の期間が1か月以下である者に該当するため、標準賞与額に係る保険料は免除されません（標準賞与額に係る保険料が免除されるのは育児休業等が1か月を超える場合）。設問は正しい記述です。"},{"law":"保険料","cat":"産前産後休業の徴収特例","q":"産前産後休業をしている被保険者が使用される事業所の事業主が保険者等に申出をしたときは、産前産後休業を開始した日の属する月からその産前産後休業が終了する日の翌日が属する月の前月までの期間、当該被保険者に関する保険料を徴収しない。","a":true,"exp":"〇。法159条の3。産前産後休業期間中は被保険者負担分・事業主負担分どちらの保険料も徴収されない。","page":257,"detail":"〇が正解です。法159条の3により、産前産後休業をしている被保険者が使用される事業所の事業主が保険者等に申出をしたときは、産前産後休業を開始した日の属する月からその産前産後休業が終了する日の翌日が属する月の前月までの期間、当該被保険者に関する保険料を徴収しません。テキストp.258のとおり、この特例が適用される場合は被保険者負担分・事業主負担分どちらの保険料も徴収されません。設問は条文どおりで正しい記述です。"},{"law":"保険料","cat":"負担","q":"被保険者及び被保険者を使用する事業主は、それぞれ保険料額の2分の1を負担するが、任意継続被保険者はその全額を負担する。","a":true,"exp":"〇。法161条。健康保険組合は規約で定めるところにより事業主の負担割合を増加できる。","page":260,"detail":"〇が正解です。法161条1項により、被保険者及び被保険者を使用する事業主は、それぞれ保険料額の2分の1を負担しますが、任意継続被保険者はその全額を自己負担します。テキストのとおり、健康保険組合は規約で定めるところにより、事業主の負担すべき一般保険料等額又は介護保険料額の負担の割合を増加することができます。設問は条文どおりで正しい記述です。"},{"law":"保険料","cat":"納付期限","q":"毎月の保険料は、翌月末日までに納付しなければならないが、任意継続被保険者に関する保険料については、その月の10日までに納付しなければならない。","a":true,"exp":"〇。法164条。一般の保険料は翌月末日、任意継続被保険者は当月10日(初めて納付すべき保険料は保険者が指定する日)である。","page":261,"detail":"〇が正解です。法164条1項により、毎月の保険料は翌月末日までに納付しなければなりませんが、任意継続被保険者に関する保険料については、その月の10日（初めて納付すべき保険料については保険者が指定する日）までに納付しなければなりません。設問は条文どおりで正しい記述です。"},{"law":"保険料","cat":"任意継続被保険者の前納","q":"任意継続被保険者は、将来の一定期間の保険料を前納することができ、前納は4月から9月まで又は10月から翌年3月までの6か月間、又は4月から翌年3月までの12か月間を単位として行う。","a":true,"exp":"〇。法165条、令48条等。前納された保険料は各月の初日が到来したときに納付されたものとみなされる。","page":264,"detail":"〇が正解です。法165条及び令48条〜51条等により、任意継続被保険者は将来の一定期間の保険料を前納することができ、前納は4月から9月まで又は10月から翌年3月までの6か月間、又は4月から翌年3月までの12か月間を単位として行います。テキストのとおり、前納された保険料については、前納に係る期間の各月の初日が到来したときに、それぞれその月の保険料が納付されたものとみなされます。設問は条文どおりで正しい記述です。"},{"law":"保険料","cat":"延滞金","q":"督促をしたときは、保険者等は、徴収金額に納期限の翌日から徴収金完納等の日の前日までの期間の日数に応じ、年14.6%(督促が保険料に係るもので納期限の翌日から3か月を経過する日までの期間は年7.3%)の割合を乗じて計算した延滞金を徴収する。","a":true,"exp":"〇。法181条。延滞金の額に100円未満の端数があるとき等は延滞金を徴収しない。","page":273,"detail":"〇が正解です。法181条1項により、督促をしたときは、保険者等は、徴収金額に納期限の翌日から徴収金完納又は財産差押えの日の前日までの期間の日数に応じ、年14.6%（当該督促が保険料に係るもので納期限の翌日から3か月を経過する日までの期間は年7.3%）の割合を乗じて計算した延滞金を徴収します。テキストp.274のとおり、延滞金として計算した金額が100円未満のときは延滞金を徴収しません。設問は条文どおりで正しい記述です。"},{"law":"保険料","cat":"繰上徴収","q":"保険料は、納付義務者が破産手続開始の決定を受けたとき、法人である納付義務者が解散した場合、被保険者の使用される事業所が廃止された場合等には、納期前であってもすべて徴収することができる。","a":true,"exp":"〇。法172条。繰上徴収を行う場合は督促をする必要はない。","page":265,"detail":"〇が正解です。法172条により、保険料は、納付義務者が国税・地方税等の滞納により滞納処分を受けるとき、強制執行を受けるとき、破産手続開始の決定を受けたとき、企業担保権の実行手続の開始があったとき、競売の開始があったとき、法人である納付義務者が解散した場合、被保険者の使用される事業所が廃止された場合等には、納期前であってもすべて徴収することができます。テキストのとおり、繰上徴収を行う場合は督促をする必要はありません。設問は正しい記述です。"},{"law":"保険料","cat":"納付期限(一般)","q":"事業主が納付する毎月の保険料は、その月の末日までに納付しなければならない。","a":false,"exp":"×。法164条。毎月の保険料は「翌月末日」までに納付しなければならない。任意継続被保険者は当月10日までである。","page":261,"detail":"×が正解です。法164条1項により、事業主が納付する毎月の保険料は「翌月末日」までに納付しなければならないのであり、設問の「その月の末日まで」は誤りです。なお、任意継続被保険者に関する保険料は当月10日までに納付しなければなりません。"},{"law":"不服申立て","cat":"審査請求(処分)","q":"被保険者の資格に関する処分、標準報酬に関する処分、保険給付に関する処分に不服がある者は、社会保険審査官に対して審査請求をし、その決定に不服がある者は社会保険審査会に対して再審査請求をすることができる。","a":true,"exp":"〇。法189条。被保険者だけでなく事業主も審査請求及び再審査請求をすることができる。","page":282,"detail":"〇が正解です。法189条1項により、被保険者の資格に関する処分、標準報酬に関する処分、保険給付に関する処分に不服がある者は、社会保険審査官に対して審査請求をし、その決定に不服がある者は社会保険審査会に対して再審査請求をすることができます。テキストのとおり、被保険者だけでなく事業主も審査請求及び再審査請求をすることができます。設問は条文どおりで正しい記述です。"},{"law":"不服申立て","cat":"審査請求(保険料)","q":"保険料等の賦課もしくは徴収の処分又は督促及び滞納処分に不服がある者は、社会保険審査官に対して審査請求をすることができる。","a":false,"exp":"×。法190条。保険料等の賦課・徴収の処分等に不服がある者は、社会保険審査会に対して審査請求をすることができる(社会保険審査官ではない)。","page":282,"detail":"×が正解です。法190条により、保険料等の賦課もしくは徴収の処分又は督促及び滞納処分に不服がある者は、「社会保険審査会」に対して審査請求をすることができるのであり、設問の「社会保険審査官」は誤りです。資格・標準報酬・保険給付に関する処分は社会保険審査官に審査請求し、保険料等に関する処分は社会保険審査会に直接審査請求するという違いを押さえる必要があります。"},{"law":"不服申立て","cat":"審査請求の期間","q":"処分に対する審査請求は、処分があったことを知った日の翌日から起算して6か月を経過したときは、することができない。","a":false,"exp":"×。社会保険審査官及び社会保険審査会法4条。審査請求は、処分があったことを知った日の翌日から起算して「3か月」を経過したときはすることができない。","page":284,"detail":"×が正解です。社会保険審査官及び社会保険審査会法4条1項により、処分に対する審査請求は、処分があったことを知った日の翌日から起算して「3か月」を経過したときはすることができないとされており、設問の「6か月」は誤りです。ただし、正当な事由によりこの期間内に審査請求をすることができなかったことを疎明したときはこの限りではありません。"},{"law":"時効","cat":"消滅時効","q":"保険料等を徴収し、又はその還付を受ける権利及び保険給付を受ける権利は、これらを行使することができる時から2年を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法193条。保険料等の納入の告知又は督促は、時効の更新の効力を有する。","page":293,"detail":"〇が正解です。法193条1項により、保険料等を徴収し、又はその還付を受ける権利及び保険給付を受ける権利は、これらを行使することができる時から2年を経過したときは、時効によって消滅します。テキストp.293のとおり、保険料等の納入の告知又は督促は、時効の更新の効力を有します（法193条2項）。設問は条文どおりで正しい記述です。"},{"law":"時効","cat":"埋葬料の起算日","q":"埋葬料の請求権の消滅時効の起算日は、埋葬を行った日の翌日である。","a":false,"exp":"×。通達。埋葬料の請求権の起算日は死亡日の翌日である。埋葬を行った日の翌日が起算日となるのは埋葬の費用の支給の請求権である。","page":293,"detail":"×が正解です。テキストp.293の時効の起算日の表によれば、埋葬料の請求権の消滅時効の起算日は「死亡日の翌日」であり、設問の「埋葬を行った日の翌日」は誤りです。「埋葬を行った日の翌日」が起算日となるのは、埋葬の費用の支給の請求権です。両者を混同しないことがポイントです。"},{"law":"雑則等","cat":"印紙税","q":"健康保険に関する書類には、印紙税を課さない。","a":true,"exp":"〇。法195条。ただし、被保険者が療養費の請求に添付する療養に要した費用の証明書は印紙税の免除の対象とならない。","page":294,"detail":"〇が正解です。法195条により、健康保険に関する書類には印紙税を課しません。ただしテキストp.294の通達（昭30.10.24保文発9945号）のとおり、被保険者が療養費の請求に添付する療養に要した費用の証明書は、印紙税の免除の対象となりません。設問は条文どおりで正しい記述です。"},{"law":"届出等","cat":"書類の保存","q":"事業主は、健康保険に関する書類を、その完結の日より3年間、保存しなければならない。","a":false,"exp":"×。則34条。事業主の書類保存義務は完結の日より「2年間」である(保険医療機関の記録保存は原則3年・診療録5年)。","page":292,"detail":"×が正解です。則34条により、事業主の健康保険に関する書類の保存義務は、その完結の日より「2年間」であり、設問の「3年間」は誤りです。保険医療機関の記録保存（療養担当規則9条）は原則3年・診療録5年であり、事業主の保存義務（2年）と区別する必要があります。"},{"law":"届出等","cat":"資格取得届の届出先","q":"事業主が提出する資格取得届及び資格喪失届の提出先は、日本年金機構又は健康保険組合である。","a":true,"exp":"〇。則24条、29条。資格取得・喪失の届出先は日本年金機構又は健康保険組合である。","page":63,"detail":"〇が正解です。則24条及び則29条により、事業主が提出する資格取得届及び資格喪失届の提出先は、日本年金機構又は健康保険組合です。資格取得届は当該事実があった日から5日以内に提出しなければならず、日本年金機構に提出するものは所轄労働基準監督署長又は所轄公共職業安定所長を経由して提出することもできます。設問は規則どおりで正しい記述です。"},{"law":"罰則","cat":"事業主の罰則","q":"事業主が正当な理由がなくて、届出の規定に違反して届出をせず、又は虚偽の届出をしたとき等は、6か月以下の拘禁刑又は50万円以下の罰金に処する。","a":true,"exp":"〇。法208条。届出義務違反、督促状に指定する期限までに保険料を納付しないとき等が該当する。","page":298,"detail":"〇が正解です。法208条により、事業主が正当な理由がなくて、届出の規定に違反して届出をせず、又は虚偽の届出をしたとき、督促状に指定する期限までに保険料を納付しないとき、立入検査等の規定による文書の提出等をせず質問に答弁しないとき等は、6か月以下の拘禁刑又は50万円以下の罰金に処せられます。設問は条文どおりで正しい記述です。"},{"law":"保健事業・福祉事業","cat":"保健事業","q":"保険者は、特定健康診査及び特定保健指導を行うものとされ、また健康教育、健康相談等の被保険者等の健康の保持増進のために必要な事業を行うように努めなければならない。","a":true,"exp":"〇。法150条。特定健康診査等は行う義務、その他の保健事業は努力義務である。","page":278,"detail":"〇が正解です。法150条1項・2項により、保険者は、特定健康診査及び特定保健指導（特定健康診査等）を行うものとされ、これは義務です。また、健康教育、健康相談及び健康診査並びに健康管理及び疾病の予防に係る被保険者等の自助努力についての支援その他の被保険者等の健康の保持増進のために必要な事業を行うように努めなければならないとされ、これは努力義務です。設問は条文どおりで正しい記述です。"}],"kokunen":[{"law":"総則","cat":"目的","q":"国民年金制度は、日本国憲法25条2項に規定する理念に基づき、老齢、障害又は死亡によって国民生活の安定がそこなわれることを国民の<b>共同連帯</b>によって防止することを目的としている。","a":true,"exp":"〇。法1条のとおり。老齢、障害又は死亡によって国民生活の安定がそこなわれることを国民の共同連帯によって防止することを目的としている。","page":14,"detail":"〇。法1条のとおりで正しい記述です。p.14の本文では、国民年金制度は日本国憲法25条2項に規定する理念に基づき、老齢、障害又は死亡によって国民生活の安定がそこなわれることを国民の「共同連帯」によって防止し、もって健全な国民生活の維持及び向上に寄与することを目的とする、と定めています。憲法25条2項は社会保障的義務を国に課すもので、これを受けた目的規定です。根拠は法1条。"},{"law":"総則","cat":"管掌","q":"国民年金事業は政府が管掌し、国民年金基金も国民年金事業の保険者の一つである。","a":false,"exp":"×。法3条1項。国民年金事業は政府が管掌し、いわゆる保険者は政府だけである。国民年金基金は保険者ではない。","page":15,"detail":"×。法3条1項に反します。p.15の本文のとおり、国民年金事業は政府が管掌し、いわゆる保険者は政府だけです。本文には「国民年金基金は保険者ではありません」と明記されており、基金を保険者の一つとする点が誤りです。根拠は法3条1項。"},{"law":"総則","cat":"事務の区分","q":"市町村が処理することとされている国民年金事業の事務は、地方自治法に定める第2号法定受託事務とされている。","a":false,"exp":"×。法6条。市町村が処理することとされている事務は、第1号法定受託事務とされている。","page":16,"detail":"×。法6条に反します。p.16の本文では、市町村が処理することとされている国民年金事業の事務は、地方自治法に定める「第1号法定受託事務」とされています。第2号ではなく第1号である点が誤りです。根拠は法6条。"},{"law":"総則","cat":"財務大臣への委任","q":"財務大臣への滞納処分等の権限の委任の要件の一つに、納付義務者が13か月分以上の保険料を滞納していることがある。","a":true,"exp":"〇。法109条の5第1項、令11条の10。13か月分以上の保険料滞納が要件の一つとされている。","page":20,"detail":"〇。法109条の5第1項、令11条の10のとおりです。p.20の本文では、財務大臣への滞納処分等の権限の委任の要件の一つとして「納付義務者が13か月分以上の保険料を滞納していること」が挙げられています。ほかに財産隠ぺいのおそれ、所得要件、誠実な納付意思が認められないこと等も要件です。根拠は法109条の5第1項、令11条の10。"},{"law":"総則","cat":"財務大臣への委任","q":"財務大臣への滞納処分等の権限の委任の所得要件は、納付義務者の前年の所得が500万円以上であることとされている。","a":false,"exp":"×。法109条の5第1項、令11条の10。所得要件は、前年の所得(1月から6月までは前々年の所得)が1,000万円以上であることである。","page":20,"detail":"×。p.20の本文に反します。所得要件は、納付義務者の前年の所得(1月から6月までにおいては前々年の所得)が「1,000万円以上」であることとされており、500万円ではありません。これは他の隠ぺいのおそれ等の要件と並ぶ委任要件の一つです。根拠は法109条の5第1項、令11条の10。"},{"law":"総則","cat":"財政方式","q":"国民年金制度における財政方式は、おおむね100年間で財政の均衡を図り、その財政の均衡期間の終了時に給付費1年分程度を保有する有限均衡方式とされている。","a":true,"exp":"〇。財政方式は、おおむね100年間で財政の均衡を図り、均衡期間終了時に給付費1年分程度を保有する有限均衡方式とされている。","page":30,"detail":"〇。p.30の本文のとおりです。平成16年改正以後の財政方式は有限均衡方式であり、おおむね100年程度の期間について給付と負担の均衡を図り、その財政の均衡期間の終了時に給付費1年分程度を保有する方式とされています。改正前は永久均衡方式でした。根拠は法等。"},{"law":"総則","cat":"財政検証","q":"政府は、少なくとも3年ごとに、保険料及び国庫負担の額並びに給付に要する費用の額その他の財政に係る収支についてその現況及び見通しを作成しなければならない。","a":false,"exp":"×。法4条の3。政府は、少なくとも5年ごとに財政の現況及び見通しを作成しなければならない。","page":31,"detail":"×。法4条の3に反します。p.31の本文では、政府は「少なくとも5年ごとに」、保険料・国庫負担の額・給付に要する費用の額その他の財政に係る収支についてその現況及び見通し(財政の現況及び見通し)を作成しなければならないとされています。3年ごとではありません。根拠は法4条の3。"},{"law":"総則","cat":"財政均衡期間","q":"財政均衡期間は、財政の現況及び見通しが作成される年以降おおむね100年間とされている。","a":true,"exp":"〇。法4条の3。財政均衡期間は、財政の現況及び見通しが作成される年以降おおむね100年間とされている。","page":31,"detail":"〇。法4条の3のとおりです。p.31の本文では、財政均衡期間は、財政の現況及び見通しが作成される年以降おおむね100年間とすると定めています。これは有限均衡方式における給付と負担の均衡を図るべき期間です。根拠は法4条の3。"},{"law":"総則","cat":"調整期間","q":"調整期間の開始年度は、平成16年度とされている。","a":false,"exp":"×。法16条の2等。調整期間の開始年度は、平成17年度とされている。調整期間が設けられた場合はマクロ経済スライドが行われる。","page":32,"detail":"×。p.32の本文に反します。本文には「調整期間の開始年度は、平成17年度とされています」と明記されており、平成16年度ではありません。調整期間が設けられた場合はいわゆるマクロ経済スライドが行われます。根拠は法16条の2、令4条の2の2。"},{"law":"総則","cat":"マクロ経済スライド","q":"マクロ経済スライドとは、少子化による労働力人口の減少や平均余命の延びを年金額に反映させる仕組みである。","a":true,"exp":"〇。法27条の4等。マクロ経済スライドは、少子化による労働力人口の減少や平均余命の延びを年金額に反映させる仕組みである。","page":33,"detail":"〇。p.33の
