目的","text":"国民健康保険法は、国民健康保険事業の健全な運営を確保し、もって社会保障及び【国民保健|公衆衛生|国民の健康|国民医療】の向上に寄与することを目的とする。","exp":"国保法1条","page":28},{"law":"国民健康保険法","cat":"国民健康保険","text":"国民健康保険は、被保険者の疾病、負傷、出産又は【死亡|障害|高齢|失業】に関して必要な保険給付を行う。","exp":"国保法2条","page":28},{"law":"国民健康保険法","cat":"保険者","text":"【都道府県|市町村|国|広域連合】は、当該都道府県内の市町村(特別区を含む)とともに、国民健康保険を行うものとし、国民健康保険組合は、国民健康保険を行うことができる。","exp":"国保法3条","page":28},{"law":"国民健康保険法","cat":"国民健康保険組合の設立","text":"国民健康保険組合を設立しようとするときは、主たる事務所の所在地の【都道府県知事|厚生労働大臣|市町村長|国民健康保険団体連合会】の認可を受けなければならず、認可の申請は、【15人以上|10人以上|20人以上|30人以上】の発起人が規約を作成し、組合員となるべき者【300人以上|100人以上|500人以上|200人以上】の同意を得て行う。","exp":"国保法17条","page":29},{"law":"国民健康保険法","cat":"特別会計","text":"都道府県及び市町村は、国民健康保険に関する収入及び支出について、政令の定めるところにより、それぞれ【特別会計|一般会計|事業会計|国民健康保険会計】を設けなければならない。","exp":"国保法10条","page":30},{"law":"国民健康保険法","cat":"被保険者","text":"都道府県の区域内に【住所|居所|住民票|本籍】を有する者は、当該都道府県が当該都道府県内の市町村とともに行う国民健康保険の被保険者とする。","exp":"国保法5条","page":32},{"law":"国民健康保険法","cat":"適用除外","text":"健康保険の被保険者(日雇特例被保険者を除く)とその被扶養者、【生活保護法|生活困窮者自立支援法|児童福祉法|社会福祉法】による生活保護を受けている世帯に属する者、高齢者医療確保法の規定による被保険者は、都道府県等が行う国民健康保険の被保険者としない。","exp":"国保法6条","page":33},{"law":"国民健康保険法","cat":"一部負担金","text":"保険医療機関等について療養の給付を受ける者は、原則として療養の給付に要する費用の額に【10分の3|10分の2|10分の1|10分の4】を乗じて得た額を、一部負担金として、当該保険医療機関等に支払わなければならない。","exp":"国保法42条1項","page":40},{"law":"国民健康保険法","cat":"損害賠償請求権","text":"市町村及び組合は、給付事由が第三者の行為によって生じた場合において、保険給付を行ったときは、その【給付の価額|損害額|全額|2分の1の額】の限度において、被保険者が第三者に対して有する損害賠償の請求権を取得する。","exp":"国保法64条1項","page":44},{"law":"国民健康保険法","cat":"受給権の保護","text":"保険給付を受ける権利は、譲り渡し、【担保に供し|質入れし|相続させ|貸し付け】、又は差し押えることができない。","exp":"国保法67条","page":43},{"law":"国民健康保険法","cat":"公課の禁止","text":"租税その他の公課は、保険給付として支給を受けた【金品|金銭|現金|給付金】を標準として、課することができない。","exp":"国保法68条","page":43},{"law":"国民健康保険法","cat":"時効","text":"保険料その他国民健康保険法の規定による徴収金を徴収し、又はその還付を受ける権利及び保険給付を受ける権利は、これらを行使することができる時から【2年|5年|3年|10年】を経過したときは、時効によって消滅する。","exp":"国保法110条1項","page":61},{"law":"国民健康保険法","cat":"国民健康保険団体連合会","text":"国民健康保険団体連合会は、会員である都道府県及び市町村が行う国民健康保険事業並びに国民健康保険組合が行う国民健康保険事業の【健全な運営|円滑な運営|適正な運営|効率的な運営】に資することを目的とする。","exp":"国保法83条等","page":57},{"law":"国民健康保険法","cat":"審査請求","text":"保険給付に関する処分又は保険料その他の徴収金に関する処分に不服がある者は、【国民健康保険審査会|社会保険審査会|国民健康保険団体連合会|都道府県知事】に審査請求をすることができる。","exp":"国保法91条","page":59},{"law":"高齢者医療確保法","cat":"目的","text":"高齢者医療確保法は、国民の高齢期における適切な医療の確保を図るため、【医療費の適正化|医療費の抑制|医療の効率化|医療提供体制の整備】を推進するための計画の作成及び保険者による健康診査等の実施に関する措置を講ずるとともに、高齢者の医療について、国民の共同連帯の理念等に基づき、前期高齢者に係る保険者間の費用負担の調整、後期高齢者に対する適切な医療の給付等を行うために必要な制度を設け、もって国民保健の向上及び高齢者の福祉の増進を図ることを目的とする。","exp":"高確法1条","page":64},{"law":"高齢者医療確保法","cat":"基本的理念","text":"国民は、【自助と連帯|共同連帯|相互扶助|社会連帯】の精神に基づき、自ら加齢に伴って生ずる心身の変化を自覚して常に健康の保持増進に努めるとともに、高齢者の医療に要する費用を公平に負担するものとする。","exp":"高確法2条","page":64},{"law":"高齢者医療確保法","cat":"高齢者医療制度","text":"高齢者医療制度とは、【前期高齢者|65歳以上の者|高齢者|65歳未満の者】に係る保険者間の費用負担の調整及び後期高齢者医療制度をいう。","exp":"高確法3条","page":64},{"law":"高齢者医療確保法","cat":"全国医療費適正化計画","text":"厚生労働大臣は、医療費適正化に関する施策についての基本的な方針を定めるとともに、【6年|5年|3年|10年】ごとに、6年を1期として、医療費適正化を推進するための計画(全国医療費適正化計画)を定めるものとする。","exp":"高確法8条1項","page":68},{"law":"高齢者医療確保法","cat":"後期高齢者医療の運営主体","text":"市町村は、後期高齢者医療の事務を処理するため、都道府県の区域ごとに当該区域内の【すべての市町村|希望する市町村|過半数の市町村|都道府県内の市】が加入する広域連合(後期高齢者医療広域連合)を設けるものとする。","exp":"高確法48条","page":78},{"law":"高齢者医療確保法","cat":"後期高齢者医療","text":"後期高齢者医療は、高齢者の疾病、負傷又は【死亡|出産|障害|要介護】に関して必要な給付を行うものとする。","exp":"高確法47条","page":78},{"law":"高齢者医療確保法","cat":"被保険者","text":"後期高齢者医療広域連合の区域内に住所を有する【75歳以上|70歳以上|65歳以上|80歳以上】の者、及び当該区域内に住所を有する【65歳以上75歳未満|60歳以上75歳未満|65歳以上70歳未満|70歳以上75歳未満】の者であって、政令で定める程度の障害の状態にある旨の当該後期高齢者医療広域連合の認定を受けたものは、被保険者とする。","exp":"高確法50条","page":79},{"law":"高齢者医療確保法","cat":"被保険者資格の取得時期","text":"当該後期高齢者医療広域連合の区域内に住所を有する者が【75歳|70歳|65歳|80歳】に達したとき、又は75歳以上の者が当該後期高齢者医療広域連合の区域内に住所を有するに至ったときから、その資格を取得する。","exp":"高確法52条","page":79},{"law":"高齢者医療確保法","cat":"一部負担金","text":"療養の給付を受ける者は、原則として療養の給付に要する費用の額に【100分の10|100分の20|100分の30|100分の0】を乗じて得た額を一部負担金として支払うが、一定以上の所得がある者は【100分の20|100分の10|100分の30|100分の15】、現役並み所得者は【100分の30|100分の20|100分の10|100分の25】とされる。","exp":"高確法67条1項、令7条","page":83},{"law":"高齢者医療確保法","cat":"後期高齢者負担率","text":"後期高齢者負担率は、所定の計算式による率を基礎として、【2年|3年|1年|6年】ごとに政令で定めることとされており、令和8年度及び令和9年度における後期高齢者負担率は、【100分の13.27|100分の11.72|100分の10|100分の12.27】である。","exp":"高確法100条2項","page":90},{"law":"高齢者医療確保法","cat":"保険料の賦課額の限度","text":"保険料の賦課額は、基礎賦課額及び子ども・子育て支援納付金賦課額の合計額とし、基礎賦課額は【85万円|80万円|66万円|100万円】を、子ども・子育て支援納付金賦課額は2万1,000円を、それぞれ超えることができない。","exp":"高確法施行令18条1項","page":91},{"law":"高齢者医療確保法","cat":"審査請求","text":"後期高齢者医療給付に関する処分又は保険料その他の徴収金に関する処分に不服がある者は、【後期高齢者医療審査会|国民健康保険審査会|社会保険審査会|介護保険審査会】に審査請求をすることができる。","exp":"高確法128条1項","page":97},{"law":"高齢者医療確保法","cat":"時効","text":"保険料その他高齢者医療確保法の規定による徴収金を徴収し、又はその還付を受ける権利及び後期高齢者医療給付を受ける権利は、これらを行使することができる時から【2年|5年|3年|10年】を経過したときは、時効によって消滅する。","exp":"高確法160条1項","page":98},{"law":"介護保険法","cat":"目的","text":"介護保険法は、加齢に伴って生ずる心身の変化に起因する疾病等により要介護状態となった者等について、これらの者が【尊厳|権利|生活|自立】を保持し、その有する能力に応じ自立した日常生活を営むことができるよう、必要な保健医療サービス及び福祉サービスに係る給付を行うため、国民の共同連帯の理念に基づき介護保険制度を設け、もって国民の保健医療の向上及び福祉の増進を図ることを目的とする。","exp":"介保法1条","page":102},{"law":"介護保険法","cat":"保険者","text":"【市町村|都道府県|国|広域連合】及び特別区は、介護保険を行うものとされている。","exp":"介保法3条1項。政府は保険者ではない","page":103},{"law":"介護保険法","cat":"国民の努力及び義務","text":"国民は、自ら要介護状態となることを予防するため、常に健康の保持増進に努めるとともに、共同連帯の理念に基づき、介護保険事業に要する費用を【公平に負担|応分に負担|共同して負担|公正に負担】するものとする。","exp":"介保法4条","page":103},{"law":"介護保険法","cat":"要介護状態","text":"要介護状態とは、身体上又は精神上の障害があるために、入浴、排せつ、食事等の日常生活における基本的な動作の全部又は一部について、【6箇月間|3箇月間|1年間|2週間】にわたり継続して、【常時介護|常時又は随時介護|介護|日常生活上の支援】を要すると見込まれる状態であって、要介護状態区分のいずれかに該当するものをいう。","exp":"介保法7条1項","page":105},{"law":"介護保険法","cat":"被保険者","text":"市町村の区域内に住所を有する【65歳以上|60歳以上|70歳以上|75歳以上】の者を第1号被保険者とし、市町村の区域内に住所を有する【40歳以上65歳未満|40歳以上60歳未満|45歳以上65歳未満|40歳以上70歳未満】の医療保険加入者を第2号被保険者とする。","exp":"介保法9条","page":108},{"law":"介護保険法","cat":"資格喪失の時期","text":"被保険者は、当該市町村の区域内に住所を有しなくなったときはその【翌日|当日|5日後|その月の末日】から、医療保険加入者でなくなったとき(第2号被保険者のみ)はその日から、その資格を喪失する。","exp":"介保法11条","page":108},{"law":"介護保険法","cat":"保険給付の種類","text":"介護保険法による保険給付は、被保険者の要介護状態に関する介護給付、被保険者の要支援状態に関する予防給付及び条例で定める【市町村特別給付|地域支援事業|総合事業|特例給付】とされている。","exp":"介保法18条","page":110},{"law":"介護保険法","cat":"認定","text":"介護給付又は予防給付を受けようとする被保険者は、市町村による【要介護認定|要介護状態区分の認定|介護認定|要介護判定】又は要支援認定を受けなければならない。","exp":"介保法19条","page":111},{"law":"介護保険法","cat":"保険料の徴収","text":"市町村は、介護保険事業に要する費用に充てるため、保険料を徴収しなければならず、保険料は第1号被保険者に対して課し、第2号被保険者からは保険料を【徴収しない|徴収する|市町村が直接徴収する|2分の1徴収する】。","exp":"介保法129条","page":141},{"law":"介護保険法","cat":"保険料率","text":"保険料率は、保険給付に要する費用の予想額等に照らし、おおむね【3年|5年|2年|6年】を通じ財政の均衡を保つことができるものでなければならない。","exp":"介保法129条3項","page":141},{"law":"介護保険法","cat":"賦課期日","text":"保険料の賦課期日は、当該年度の【初日|末日|属する月の初日|4月1日】である。なお、保険料の徴収は、特別徴収の方法による場合を除くほか、普通徴収の方法による。","exp":"介保法130条、131条","page":142},{"law":"介護保険法","cat":"特別徴収の対象とならない者","text":"老齢等年金給付の額が、【18万円未満|15万円未満|24万円未満|18万円以下】である者、又は老齢等年金給付の支給が停止されていることその他特別の事情を有している者については、特別徴収を行わない。","exp":"介保法135条等","page":142},{"law":"確定給付企業年金法","cat":"目的","text":"確定給付企業年金法は、事業主が従業員と給付の内容を約し、高齢期において従業員がその内容に基づいた給付を受けることができるようにするため、確定給付企業年金について必要な事項を定め、国民の高齢期における所得の確保に係る自主的な努力を支援し、もって【公的年金|国民年金|厚生年金|社会保障】の給付と相まって国民の生活の安定と福祉の向上に寄与することを目的とする。","exp":"確給法1条","page":218},{"law":"確定給付企業年金法","cat":"定義","text":"確定給付企業年金とは、厚生年金適用事業所の事業主が、単独で又は共同して、確定給付企業年金法の規定に基づいて実施する年金制度をいい、【規約型|契約型|事業主型|個人型】と基金型の2種類がある。","exp":"確給法2条","page":218},{"law":"確定給付企業年金法","cat":"実施","text":"厚生年金保険の適用事業所の事業主は、確定給付企業年金に係る規約を作成し、規約型企業年金については【厚生労働大臣の承認|厚生労働大臣の認可|都道府県知事の承認|厚生労働大臣の許可】を、企業年金基金については当該企業年金基金の設立について【厚生労働大臣の認可|厚生労働大臣の承認|厚生労働大臣の許可|都道府県知事の認可】を受けなければならない。","exp":"確給法3条1項","page":220},{"law":"確定給付企業年金法","cat":"加入者","text":"確定給付企業年金を実施する厚生年金適用事業所(実施事業所)に使用される【厚生年金保険の被保険者|健康保険の被保険者|すべての従業員|70歳未満の従業員】は、加入者とする。","exp":"確給法25条","page":221},{"law":"確定給付企業年金法","cat":"給付の種類","text":"事業主等は、法定給付として老齢給付金及び脱退一時金を行うものとし、規約で定めるところにより、これに加え【障害給付金|脱退一時金|老齢給付金|死亡一時金】及び遺族給付金を行うことができる。","exp":"確給法29条","page":222},{"law":"確定給付企業年金法","cat":"年金給付の支給期間","text":"年金給付の支給期間及び支払期月は、規約で定めるところによるが、終身又は【5年以上|10年以上|3年以上|20年以上】にわたり、毎年【1回以上|2回以上|4回以上|12回以上】定期的に支給するものでなければならない。","exp":"確給法33条","page":223},{"law":"確定給付企業年金法","cat":"老齢給付金の支給要件","text":"老齢給付金の支給開始要件は、【60歳以上70歳以下|60歳以上65歳以下|65歳以上70歳以下|60歳以上75歳以下】の規約で定める年齢に達したときに支給するものであることとされ、規約において、【20年|25年|10年|15年】を超える加入者期間を給付を受けるための要件として定めてはならない。","exp":"確給法36条、令28条","page":223},{"law":"確定給付企業年金法","cat":"脱退一時金","text":"脱退一時金は、加入者が死亡以外の資格喪失事由に該当し、かつ規約で定める要件を満たしたときに支給し、支給要件となる加入者期間は、【3年|5年|1年|10年】を超えることはできない。","exp":"確給法41条","page":224},{"law":"確定拠出年金法","cat":"目的","text":"確定拠出年金法は、個人又は事業主が拠出した資金を個人が自己の責任において【運用の指図|運用|資産管理|拠出】を行い、高齢期においてその結果に基づいた給付を受けることができるようにするため、確定拠出年金について必要な事項を定め、国民の高齢期における所得の確保に係る自主的な努力を支援し、もって公的年金の給付と相まって国民の生活の安定と福祉の向上に寄与することを目的とする。","exp":"確拠法1条","page":236},{"law":"確定拠出年金法","cat":"種類","text":"確定拠出年金には、厚生年金適用事業所の事業主が実施する企業型年金と、【国民年金基金連合会|国民年金基金|厚生労働大臣|企業年金連合会】が実施する個人型年金の2種類がある。","exp":"確拠法2条1項～3項","page":236},{"law":"確定拠出年金法","cat":"企業型年金加入者","text":"企業型年金加入者とは、企業型年金において、その者について企業型年金を実施する厚生年金適用事業所の事業主により掛金が拠出され、かつ、その【個人別管理資産|積立金|年金原資|拠出金】について運用の指図を行う者をいう。","exp":"確拠法2条8項","page":238},{"law":"確定拠出年金法","cat":"企業型年金の拠出限度額","text":"各企業型年金加入者に係る1年間の事業主掛金の額の総額は、拠出限度額を超えてはならず、他制度加入者以外のものの拠出限度額は月額【55,000円|23,000円|68,000円|20,000円】(年額相当660,000円)である。","exp":"確拠法20条、令11条","page":245},{"law":"確定拠出年金法","cat":"給付の種類","text":"企業型年金の給付は、老齢給付金、障害給付金及び【死亡一時金|遺族給付金|脱退一時金|遺族一時金】とし、経過措置として脱退一時金が設けられている。","exp":"確拠法28条等","page":250},{"law":"確定拠出年金法","cat":"75歳到達時の支給","text":"企業型年金加入者であった者が、老齢給付金の支給を請求することなく【75歳|70歳|65歳|80歳】に達したときは、資産管理機関は、その者に、企業型記録関連運営管理機関等の裁定に基づいて、老齢給付金を支給する。","exp":"確拠法34条","page":251},{"law":"確定拠出年金法","cat":"個人型年金の実施","text":"国民年金基金連合会は、個人型年金に係る規約を作成し、当該規約について【厚生労働大臣の承認|厚生労働大臣の認可|厚生労働大臣の許可|都道府県知事の承認】を受けなければならない。","exp":"確拠法55条1項","page":253},{"law":"確定拠出年金法","cat":"個人型年金の拠出限度額","text":"個人型年金加入者のうち、第1号加入者及び第4号加入者の拠出限度額は月額【68,000円|23,000円|55,000円|12,000円】、第3号加入者の拠出限度額は月額【23,000円|68,000円|55,000円|20,000円】である。","exp":"確拠法69条、令36条","page":256},{"law":"社会保険労務士法","cat":"使命","text":"社会保険労務士は、労働及び社会保険に関する法令の円滑な実施を通じて適切な労務管理の確立及び個人の尊厳が保持された適正な労働環境の形成に寄与することにより、事業の健全な発達と労働者等の福祉の向上並びに社会保障の向上及び増進に資し、もって豊かな国民生活及び活力ある経済社会の実現に資することを【使命|職責|責務|目的】とする。","exp":"社労士法1条","page":186},{"law":"社会保険労務士法","cat":"職責","text":"社会保険労務士は、常に品位を保持し、業務に関する法令及び実務に精通して、【公正な立場|中立な立場|独立した立場|専門家の立場】で、誠実にその業務を行わなければならない。","exp":"社労士法1条の2","page":186},{"law":"社会保険労務士法","cat":"資格","text":"社会保険労務士試験に合格した者、試験の免除科目が試験科目の全部に及ぶ者で所定の事務に通算【2年以上|3年以上|5年以上|1年以上】従事したもの等、又は弁護士となる資格を有する者は、社会保険労務士となる資格を有する。","exp":"社労士法3条","page":187},{"law":"社会保険労務士法","cat":"業務","text":"社会保険労務士は、労働社会保険諸法令に基づいて行政機関等に提出する申請書等を作成すること、申請書等について、その提出に関する手続を代わってすること、労働社会保険諸法令に基づく【帳簿書類|就業規則|労働者名簿|定款】を作成すること等を業とする。","exp":"社労士法2条","page":188},{"law":"社会保険労務士法","cat":"業務の制限","text":"社会保険労務士又は社会保険労務士法人でない者は、他人の求めに応じ【報酬を得て|営利の目的で|継続的に|事業として】、社会保険労務士の業務(指導・相談業務を除く)に規定する事務を業として行ってはならない。","exp":"社労士法27条","page":191},{"law":"社会保険労務士法","cat":"登録","text":"社会保険労務士となる資格を有する者が社会保険労務士となるには、社会保険労務士名簿に、氏名、生年月日、住所その他厚生労働省令で定める事項の登録を受けなければならず、その登録は【連合会|厚生労働大臣|都道府県社会保険労務士会|都道府県知事】が行う。","exp":"社労士法14条の2","page":194},{"law":"社会保険労務士法","cat":"秘密を守る義務","text":"開業社会保険労務士又は社会保険労務士法人の社員は、正当な理由がなくて、その業務に関して知り得た秘密を他に漏らし、又は【盗用|利用|開示|公表】してはならず、社会保険労務士でなくなった後においても、また同様とする。","exp":"社労士法21条","page":201},{"law":"社会保険労務士法","cat":"名称の使用制限","text":"社会保険労務士でない者は、社会保険労務士又は【社労士|労務士|社会保険士|労務管理士】その他の社会保険労務士に類似する名称を用いてはならない。","exp":"社労士法26条","page":203},{"law":"社会保険労務士法","cat":"懲戒の種類","text":"社会保険労務士に対する懲戒処分は、戒告、【1年以内の業務の停止|6箇月以内の業務の停止|2年以内の業務の停止|3年以内の業務の停止】及び社会保険労務士の資格を失わせる失格処分の3種とされている。","exp":"社労士法25条","page":204},{"law":"社会保険労務士法","cat":"懲戒処分の通知及び公告","text":"厚生労働大臣は、懲戒処分をしたときは、遅滞なく、その旨を、その理由を付記した書面により当該社会保険労務士に通知するとともに、【官報|公報|新聞|連合会会報】をもって公告しなければならない。","exp":"社労士法25条の5","page":207},{"law":"社会保険労務士法","cat":"報告及び検査","text":"厚生労働大臣は、開業社会保険労務士又は社会保険労務士法人の業務の適正な運営を確保するため必要があると認めるときは、その業務に関し必要な【報告|届出|説明|資料の提出】を求め、又はその職員をして事務所に立ち入り、業務に関係のある帳簿書類を検査させることができる。","exp":"社労士法24条1項","page":204},{"law":"児童手当法","cat":"目的","text":"児童手当法は、父母その他の保護者が子育てについての【第一義的責任|主たる責任|養育責任|扶養義務】を有するという基本的認識の下に、児童を養育している者に児童手当を支給することにより、家庭等における生活の安定に寄与するとともに、次代の社会を担う児童の健やかな成長に資することを目的とする。","exp":"児手法1条","page":168},{"law":"児童手当法","cat":"児童の定義","text":"児童とは、【18歳|15歳|20歳|18歳未満】に達する日以後の最初の【3月31日|4月1日|12月31日|誕生日】までの間にある者であって、日本国内に住所を有するもの等をいう。","exp":"児手法3条1項","page":169},{"law":"児童手当法","cat":"支給要件","text":"児童手当は、支給要件児童を【監護|養育|扶養|保護】し、かつ、これと生計を同じくするその父又は母であって、日本国内に住所を有するもの等に支給する。","exp":"児手法4条1項","page":170},{"law":"児童手当法","cat":"支給の開始・終了","text":"児童手当の支給は、受給資格者が認定の請求をした日の属する月の【翌月|当月|属する月|翌々月】から始め、児童手当を支給すべき事由が消滅した日の属する月で終わる。","exp":"児手法8条2項","page":176},{"law":"児童手当法","cat":"児童手当の支払","text":"児童手当は、毎年【2月、4月、6月、8月、10月及び12月|6月、10月及び2月|4月、8月及び12月|毎月】の【6期|3期|4期|2期】に、それぞれの前月までの分を支払う。","exp":"児手法8条4項","page":177},{"law":"児童手当法","cat":"受給権の保護","text":"児童手当の支給を受ける権利は、譲り渡し、【担保に供し|質入れし|相続させ|貸し付け】、又は差し押さえることができない。","exp":"児手法15条","page":179},{"law":"児童手当法","cat":"公課の禁止","text":"租税その他の公課は、児童手当として支給を受けた【金銭|金品|現金|手当】を標準として、課することができない。","exp":"児手法16条","page":179},{"law":"船員保険法","cat":"目的","text":"船員保険法は、船員又はその被扶養者の【職務外の事由|業務外の事由|職務上以外の事由|私傷病】による疾病、負傷もしくは死亡又は出産に関して保険給付を行うとともに、労働者災害補償保険による保険給付と併せて船員の職務上の事由又は通勤による疾病、負傷、障害又は死亡に関して保険給付を行うこと等により、船員の生活の安定と福祉の向上に寄与することを目的とする。","exp":"船保法1条","page":150},{"law":"船員保険法","cat":"保険者","text":"船員保険は、【全国健康保険協会|政府|日本年金機構|国土交通省】が管掌する。","exp":"船保法4条1項","page":151},{"law":"船員保険法","cat":"被保険者","text":"被保険者とは、船員法1条に規定する船員として船舶所有者に使用される者及び【疾病任意継続被保険者|任意継続被保険者|日雇特例被保険者|特例退職被保険者】をいう。","exp":"船保法2条","page":152},{"law":"船員保険法","cat":"船員保険協議会","text":"船員保険事業に関して船舶所有者及び被保険者の意見を聴き、当該事業の円滑な運営を図るため、全国健康保険協会に船員保険協議会を置き、その委員は【12人以内|10人以内|20人以内|15人以内】とし、その委員の任期は【2年|3年|1年|4年】とする。","exp":"船保法6条","page":151},{"law":"社会保障・統計","cat":"社会保障の機能","text":"社会保障の機能としては、主として、生活のリスクに対応し生活の安定を図る生活安定・向上機能、所得を個人や世帯の間で移転させる【所得再分配機能|所得保障機能|資源配分機能|社会統合機能】、景気変動を緩和し経済を安定させる経済安定機能の3つが挙げられる。","exp":"厚生労働白書","page":12},{"law":"社会保障・統計","cat":"社会保障給付費","text":"令和5年度の社会保障給付費の総額は、135兆4,928億円で、部門別の構成割合は年金が【41.6%|33.6%|24.7%|45.0%】、医療が【33.6%|41.6%|24.7%|30.0%】、福祉その他が24.7%となっている。","exp":"令和5年度社会保障給付費","page":13},{"law":"社会保障・統計","cat":"社会保険の区分","text":"社会保険は、医療保険、介護保険、年金保険、雇用保険及び災害補償保険に区分され、適用対象ごとに【地域保険|国民保険|住民保険|公的保険】と職域保険に区分される。","exp":"社会保険の区分","page":13}],"oudan":[{"law":"目的等","cat":"国年の目的","text":"国民年金制度は、老齢、障害又は死亡によって国民生活の安定がそこなわれることを国民の【共同連帯|相互扶助|社会連帯|連帯責任】によって防止し、もって健全な国民生活の維持及び向上に寄与することを目的とする。","exp":"国年は共同連帯・維持及び向上が特徴的文言。","page":11},{"law":"目的等","cat":"健保の目的","text":"健康保険法は、業務災害以外の疾病、負傷若しくは死亡又は出産に関して保険給付を行い、もって国民の生活の安定と【福祉の向上|福祉の増進|生活の向上|健康の保持】に寄与することを目的とする。","exp":"健保は福祉の向上(増進ではない)。","page":11},{"law":"目的等","cat":"厚年の目的","text":"厚生年金保険法は、労働者の老齢、障害又は死亡について保険給付を行い、労働者及びその遺族の生活の安定と【福祉の向上|福祉の増進|生活の向上|権利の保護】に寄与することを目的とする。","exp":"厚年は労働者及びその遺族が対象。","page":11},{"law":"保険者","cat":"保険者の主体","text":"労災保険・雇用保険・国民年金・厚生年金保険の保険者は政府であり、介護保険の保険者は【市町村|都道府県|政府|広域連合】である。","exp":"政府と市町村の対比。","page":12},{"law":"保険者","cat":"健康保険組合の規模","text":"健康保険組合の任意設立の規模は、単一組合が【700人|300人|1,000人|500人】以上、総合組合が【3,000人|5,000人|1,000人|700人】以上であり、設立の認可主体は厚生労働大臣である。","exp":"単一700人・総合3000人・認可は厚労大臣。","page":13},{"law":"保険者","cat":"国保組合の設立","text":"国民健康保険組合は、【15人|10人|20人|30人】以上が発起人となり、組合員となるべき者【300人|100人|500人|200人】以上の同意を得て設立し、その設立の認可主体は都道府県知事である。","exp":"15人発起人・300人同意・都道府県知事認可。","page":13},{"law":"保険者","cat":"国民年金基金の規模","text":"国民年金基金の規模要件は、地域型が【1,000人|3,000人|700人|500人】以上、職能型が【3,000人|1,000人|5,000人|700人】以上であり、設立の認可主体は厚生労働大臣である。","exp":"地域型1000人・職能型3000人・厚労大臣認可。","page":13},{"law":"保険者","cat":"連合会の発起人","text":"国民年金基金連合会は【2以上|3以上|20以上|10以上】の国民年金基金が発起人となり、企業年金連合会は【20以上|2以上|10以上|30以上】の事業主及び企業年金基金が発起人となる。","exp":"国年基金連合会2以上・企業年金連合会20以上。","page":13},{"law":"保険者","cat":"協会の役員","text":"全国健康保険協会には理事長1人、理事【6人|9人|5人|3人】以内及び監事【2人|1人|3人|6人】を置き、理事長及び監事は厚生労働大臣が任命する。","exp":"理事長1人・理事6人以内・監事2人。","page":14},{"law":"保険者","cat":"協会の運営委員会","text":"全国健康保険協会の運営委員会の委員は【9人|6人|12人|3人】以内とし、事業主、被保険者及び学識経験者のうちから厚生労働大臣が各同数を任命する。","exp":"運営委員会9人以内・厚労大臣が各同数任命。","page":14},{"law":"適用","cat":"強制適用の人数","text":"健康保険・厚生年金保険の強制適用事業所は、常時【5人|10人|1人|3人】以上の従業員を使用する適用業種の事業所と、常時従業員を使用する国、地方公共団体又は法人の事業所である。","exp":"5人以上の適用業種・法人等の事業所。","page":16},{"law":"適用","cat":"任意加入・脱退の同意","text":"雇用保険の任意加入の申請には労働者の【2分の1以上|過半数|4分の3以上|3分の2以上】の同意、任意脱退には労働者の【4分の3以上|3分の2以上|過半数|2分の1以上】の同意が必要であり、労災保険の任意脱退は労働者の【過半数|2分の1以上|4分の3以上|3分の2以上】の同意を要件とする。","exp":"雇保の任意加入2分の1以上・脱退4分の3以上・労災過半数。","page":17},{"law":"適用","cat":"適用事業の一括","text":"徴収法の継続事業の一括は厚生労働大臣の【認可|承認|許可|届出】、健康保険・厚生年金保険(船舶以外)の適用事業所の一括は厚生労働大臣の【承認|認可|許可|届出】、厚生年金保険の船舶は法律上当然に一括とされる。","exp":"継続事業は認可・健保厚年は承認・船舶は当然一括。","page":18},{"law":"被保険者","cat":"高年齢被保険者","text":"雇用保険の高年齢被保険者とは、【65歳|60歳|70歳|55歳】以上の被保険者であって、短期雇用特例被保険者及び日雇労働被保険者を除いた者をいう。","exp":"65歳以上(短期・日雇を除く)。","page":22},{"law":"被保険者","cat":"任意継続被保険者","text":"健康保険の任意継続被保険者は、資格喪失の日の前日まで継続して【2箇月|1箇月|6箇月|1年】以上被保険者であった者のうち、保険者に申し出て継続して被保険者となった者で、申出は資格喪失日より【20日|14日|10日|30日】以内に行う。","exp":"継続2か月以上・保険者に申出・20日以内。","page":22},{"law":"被保険者","cat":"介護の被保険者","text":"介護保険の第1号被保険者は市町村の区域内に住所を有する【65歳|60歳|70歳|75歳】以上の者、第2号被保険者は【40歳|45歳|35歳|30歳】以上65歳未満の医療保険加入者である。","exp":"第1号65歳以上・第2号40歳以上65歳未満。","page":23},{"law":"被保険者","cat":"後期高齢者の被保険者","text":"後期高齢者医療の被保険者は、広域連合の区域内に住所を有する【75歳|70歳|65歳|80歳】以上の者、又は政令で定める障害状態にある旨の認定を受けた【65歳|60歳|70歳|55歳】以上75歳未満の者である。","exp":"75歳以上・障害認定で65歳以上75歳未満。","page":23},{"law":"被保険者","cat":"国年第1号","text":"国民年金の第1号被保険者は、日本国内に住所を有する【20歳|18歳|22歳|25歳】以上【60歳|65歳|70歳|55歳】未満の者であって、第2号被保険者及び第3号被保険者に該当しない者である。","exp":"国内居住20歳以上60歳未満。","page":24},{"law":"被保険者","cat":"特例任意加入","text":"特例による任意加入被保険者は、【昭和50年4月1日|昭和40年4月1日|昭和31年4月1日|昭和55年4月1日】以前に生まれた者であって、【65歳|60歳|70歳|55歳】以上70歳未満等に該当し、厚生労働大臣に申し出た者である。","exp":"昭和50年4月1日以前生まれ・65歳以上70歳未満。","page":25},{"law":"被保険者","cat":"厚年の当然被保険者","text":"厚生年金保険の当然被保険者は適用事業所に使用される【70歳|65歳|75歳|60歳】未満の者、高齢任意加入被保険者は【70歳|65歳|75歳|72歳】以上の者である。","exp":"当然被保険者70歳未満・高齢任意加入70歳以上。","page":26},{"law":"被保険者","cat":"任意加入の年齢比較","text":"国民年金の特例任意加入は【65歳|60歳|70歳|55歳】以上70歳未満で厚生労働大臣へ申出、厚生年金保険の高齢任意加入は【70歳|65歳|75歳|68歳】以上である。","exp":"特例任意加入65歳以上70歳未満・高齢任意加入70歳以上。","page":27},{"law":"適用除外","cat":"健保の臨時使用者","text":"健康保険において、2か月以内の期間を定めて使用される者は適用除外だが、定めた期間を超えて引き続き使用されるに至ったときから被保険者となり、季節的業務は当初から継続して【4箇月|2箇月|6箇月|1年】を超える予定、臨時的事業の事業所は【6箇月|4箇月|2箇月|1年】を超える予定で使用される者は当初から被保険者となる。","exp":"2か月超で被保険者・季節的業務4か月・臨時的事業6か月。","page":30},{"law":"適用除外","cat":"短時間労働者の除外","text":"健康保険・厚生年金保険では、通常の労働者の【4分の3未満|2分の1未満|3分の2未満|5分の4未満】の短時間労働者で、週【20時間|30時間|15時間|25時間】未満、報酬月額【88,000円|58,000円|68,000円|98,000円】未満、学生等のいずれかに該当する者は適用除外となる。","exp":"4分の3未満かつ週20時間未満等で適用除外。","page":30},{"law":"適用除外","cat":"特定適用事業所","text":"特定適用事業所とは、事業主が同一である適用事業所であって、使用される特定労働者の総数が常時【50人|100人|500人|30人】を超える場合におけるそれぞれの適用事業所をいう。","exp":"特定労働者の総数が常時50人超。","page":31},{"law":"届出等","cat":"資格取得届の期限","text":"健康保険・厚生年金保険の事業主による資格取得の届出は事実があった日から【5日|10日|14日|翌月10日】以内、厚年の船員被保険者については【10日|5日|14日|20日】以内、雇用保険の事業主による資格取得の届出は事実のあった日の属する月の【翌月10日|5日|10日|14日】までである。","exp":"健保厚年5日以内・船員10日・雇保翌月10日。","page":33},{"law":"届出等","cat":"国年の届出期限","text":"国民年金の第1号被保険者及び第3号被保険者の資格取得等の届出は、事実があった日から【14日|5日|10日|30日】以内であり、厚年の事業主は事実があった日から【5日|14日|10日|20日】以内である。","exp":"国年第1号・第3号は14日以内・厚年事業主5日。","page":33},{"law":"届出等","cat":"手帳等の交付主体","text":"雇用保険の被保険者証・離職票・日雇労働被保険者手帳の交付主体は公共職業安定所長、労働安全衛生法の健康管理手帳の交付主体は【都道府県労働局長|公共職業安定所長|労働基準監督署長|厚生労働大臣】である。","exp":"雇保は公共職業安定所長・健康管理手帳は都道府県労働局長。","page":34},{"law":"届出等","cat":"雇用状況の報告","text":"高年齢者雇用状況等及び障害者雇用状況の報告は、いずれも【6月1日|4月1日|7月1日|6月30日】現在の状況を【7月15日|7月10日|6月30日|7月31日】までに厚生労働大臣に提出する。","exp":"6月1日現在・7月15日まで。","page":35},{"law":"許可等の主体","cat":"安衛法の製造許可","text":"労働安全衛生法において、特定機械等の製造の許可主体は【都道府県労働局長|厚生労働大臣|労働基準監督署長|登録機関】、製造許可物質の製造の許可主体は【厚生労働大臣|都道府県労働局長|労働基準監督署長|内閣総理大臣】である。","exp":"特定機械等は都道府県労働局長・製造許可物質は厚労大臣。","page":37},{"law":"許可等の主体","cat":"許可と届出","text":"最低賃金の減額の特例の許可主体は【都道府県労働局長|労働基準監督署長|厚生労働大臣|公共職業安定所長】、有料職業紹介事業は厚生労働大臣の許可、学校等の行う無料職業紹介事業は厚生労働大臣への届出、労働者派遣事業は厚生労働大臣の許可を要する。","exp":"減額特例は都道府県労働局長・職業紹介許可・学校届出・派遣許可。","page":38},{"law":"許可等の主体","cat":"確定給付企業年金","text":"規約型確定給付企業年金は規約について厚生労働大臣の【承認|認可|許可|届出】、基金型確定給付企業年金は企業年金基金の設立について厚生労働大臣の【認可|承認|許可|届出】を受ける。","exp":"規約型は承認・基金型は認可。","page":39},{"law":"賃金・報酬","cat":"標準賞与額の上限","text":"標準賞与額は、健康保険では年度の累計額【573万円|540万円|150万円|600万円】、厚生年金保険では1か月の額【150万円|573万円|100万円|200万円】を超える部分を除く。","exp":"健保573万円・厚年150万円。","page":42},{"law":"賃金・報酬","cat":"標準報酬月額の等級","text":"標準報酬月額の等級は、健康保険が第1級から第【50級|47級|49級|32級】(下限58,000円、上限1,390,000円)、厚生年金保険が第1級から第【32級|31級|50級|30級】(下限【88,000円|58,000円|98,000円|68,000円】、上限【650,000円|620,000円|1,390,000円|680,000円】)である。","exp":"健保50級・厚年32級と上下限。","page":43},{"law":"賃金・報酬","cat":"給付基礎の期間","text":"平均賃金及び給付基礎日額は算定事由発生日以前【3箇月|6箇月|1箇月|12箇月】間、賃金日額は最後の【6箇月|3箇月|12箇月|1年】間を【180|360|365|90】で除して、標準報酬月額(定時決定)は7月1日前3か月間を基礎として算定する。","exp":"平均賃金3か月・賃金日額6か月÷180・定時決定7月1日前3か月。","page":41},{"law":"端数処理","cat":"延滞金の端数","text":"延滞金は徴収法・健保・厚年が【100円|50円|1,000円|500円】未満切捨て、国民年金が【50円|100円|500円|1円】未満切捨て、延滞金の計算の基礎となる額は国民年金が【500円|1,000円|100円|50円】未満切捨て、徴収法等が【1,000円|500円|100円|10,000円】未満切捨てである。","exp":"延滞金は徴収健保厚年100円・国年50円。","page":45},{"law":"端数処理","cat":"年金給付の端数","text":"国民年金・厚生年金保険の保険給付の裁定時等の額及び計算過程は1円単位で【50銭|1円|5銭|5円】未満切捨て・50銭以上1円未満切上げ、支払期月ごとの支払額は【1円|50銭|10円|100円】未満切捨てである。","exp":"裁定時等50銭基準・支払額1円未満切捨て。","page":45},{"law":"時効と記録の保存","cat":"消滅時効の比較","text":"国民年金・厚生年金保険の年金給付を受ける権利は【5年|2年|3年|10年】、国民年金の死亡一時金及び保険料等の徴収権は【2年|5年|3年|10年】、健康保険の保険給付を受ける権利は【2年|5年|3年|10年】である。","exp":"年金5年・死亡一時金等2年・健保給付2年。","page":47},{"law":"時効と記録の保存","cat":"記録の保存期間","text":"記録の保存期間は、雇用保険法・健康保険法・厚生年金保険法が【2年|3年|4年|5年】間、労働基準法・労災保険法・徴収法が【3年|2年|5年|4年】間である。","exp":"雇保健保厚年2年・労基労災徴収3年。","page":49},{"law":"第三者行為災害","cat":"求償と控除の期間","text":"労災保険の第三者行為災害における求償は災害発生後【5年|3年|7年|2年】以内、控除は災害発生後【7年|5年|3年|10年】以内に支給事由が生じた保険給付を限度として行われる。","exp":"求償5年・控除7年。","page":62},{"law":"未支給の保険給付等","cat":"請求権者の範囲","text":"労災の保険給付・雇保の失業等給付等・国年の年金給付の未支給請求権者は、生計を同じくしていた配偶者、子、父母、孫、祖父母又は兄弟姉妹であるが、厚生年金保険ではこれらの者以外の【3親等内の親族|2親等内の親族|4親等内の親族|6親等内の親族】まで含まれる。","exp":"原則兄弟姉妹まで・厚年は3親等内の親族。","page":59},{"law":"不正利得の徴収","cat":"雇保の2倍徴収","text":"雇用保険では、支給した失業等給付等の全部又は一部の返還と、不正受給した額の【2倍|3倍|同額|1.5倍】に相当する額以下の金額の納付を命ずることができ、事業主等が偽りの届出等をしたときは連帯して納付を命ずることができる。","exp":"雇保は返還・2倍以下の納付・連帯。","page":60},{"law":"併給調整","cat":"障害の併給調整","text":"障害補償等年金(労災)と障害基礎年金(国年)・障害厚生年金(厚年)が同一事由のとき、労災保険の障害補償等年金が【減額支給|支給停止|全額支給|調整支給】となる。","exp":"労災の障害補償等年金が減額支給。","page":64},{"law":"給付制限","cat":"労災の支給制限","text":"労災保険において、故意の犯罪行為又は重大な過失により事故を生じさせたときは、休業・傷病・障害の保険給付について支給のつど【30%|20%|60%|100%】相当額を減額支給するが、二次健康診断等給付は支給制限されない。","exp":"30%減額・二次健康診断等給付は除外。","page":69},{"law":"給付制限","cat":"健保の給付制限期間","text":"健康保険では、偽りその他不正の行為により保険給付を受けようとした者に対し【6箇月|1年|3箇月|2年】以内の期間を定めて傷病手当金又は出産手当金の全部又は一部を支給しない旨を決定でき、その行為があった日から【1年|6箇月|2年|3年】を経過したときは決定できない。","exp":"6か月以内不支給・1年経過後は不可。","page":69},{"law":"療養に係る給付","cat":"費用負担割合","text":"療養に係る給付の費用負担は、労災が通勤災害に限り【200円|100円|300円|0円】、健康保険・国民健康保険が原則【3割|2割|1割|4割】、後期高齢者医療が原則【1割|2割|3割|0割】である。","exp":"労災200円・健保国保3割・後期1割。","page":74},{"law":"休業に係る給付","cat":"待期と支給期間","text":"休業補償給付(労災)の待期は【通算して3日|継続した3日|通算して7日|継続した7日】、傷病手当金(健保)の待期は【継続した3日|通算して3日|継続した7日|通算して4日】であり、傷病手当金の支給期間は支給開始日から通算して【1年6箇月|1年|3年|2年】間が限度である。","exp":"労災通算3日・健保継続3日・支給1年6か月。","page":76},{"law":"休業に係る給付","cat":"支給額の比較","text":"休業補償(労基)は平均賃金の【100分の60|100分の80|100分の100|3分の2】、休業補償給付(労災)は給付基礎日額の【100分の60|100分の80|100分の100|3分の2】、傷病手当金(健保)は算定の基礎となる額の【3分の2|100分の60|2分の1|10分の8】である。","exp":"労基労災100分の60・健保3分の2。","page":76},{"law":"障害に係る給付","cat":"等級の比較","text":"障害基礎年金の等級は【1級・2級|1級から3級|1級から7級|1級のみ】、障害厚生年金の等級は【1級から3級|1級・2級|1級から7級|1級から5級】、労災の障害補償年金の等級は【1級から7級|1級から3級|1級から14級|1級・2級】である。","exp":"障害基礎2級まで・障害厚生3級まで・労災7級まで。","page":78},{"law":"死亡に係る給付","cat":"埋葬料と寡婦加算","text":"健康保険の埋葬料及び家族埋葬料の額はいずれも【5万円|10万円|3万円|7万円】、遺族厚生年金の額は報酬比例部分の年金額の【4分の3|2分の1|3分の2|4分の1】、中高齢寡婦加算は遺族基礎年金の額の【4分の3|2分の1|3分の2|4分の1】である。","exp":"埋葬料5万円・遺族厚生年金等4分の3。","page":89},{"law":"死亡に係る給付","cat":"短期要件の月数保障","text":"遺族厚生年金の短期要件の場合は被保険者期間の月数に【300月|240月|360月|480月】の保障があるが、長期要件の場合は300月の保障がなく実際の被保険者期間の月数による。","exp":"短期要件は300月保障・長期は保障なし。","page":89},{"law":"死亡に係る給付","cat":"生計維持の認定額","text":"年金の加算額等に係る生計維持の認定における厚生労働大臣の定める金額は年額【850万円|800万円|655万5千円|900万円】(所得の場合は年間所得【655万5千円|850万円|600万円|650万円】)であり、第3号被保険者に係る生計維持の認定は日本年金機構が行う。","exp":"年額850万円・所得655万5千円。","page":86},{"law":"死亡に係る給付","cat":"死亡一時金の要件","text":"死亡一時金は第1号被保険者としての保険料納付済期間の月数等を合算した月数が【36月|25年|3年|60月】以上ある者が対象であり、寡婦年金は第1号被保険者期間に係る保険料納付済期間等が【10年|25年|20年|5年】以上、夫が【65歳|60歳|70歳|55歳】未満等を要件とする。","exp":"死亡一時金36月以上・寡婦年金10年以上。","page":83},{"law":"老齢に係る給付","cat":"老齢基礎年金の要件","text":"老齢基礎年金は、保険料納付済期間と保険料免除期間とを合算した期間が【10年|25年|20年|5年】以上あり【65歳|60歳|70歳|68歳】以上であること、付加年金は付加保険料納付済期間を有し【60歳|65歳|55歳|70歳】以上であることが要件である。","exp":"受給資格期間10年・65歳以上・付加年金60歳以上。","page":92},{"law":"老齢に係る給付","cat":"付加年金","text":"付加年金の額は【200円|400円|100円|300円】に付加保険料納付済期間の月数を乗じた額であり、付加保険料は1か月【400円|200円|300円|500円】、令和8年度の国民年金保険料は【17,920円|16,980円|17,000円|18,000円】である。","exp":"付加年金200円×月数・付加保険料400円。","page":92},{"law":"老齢に係る給付","cat":"加算等の対象","text":"特例任意加入の対象は【昭和50年4月1日|昭和40年4月1日|昭和31年4月1日|昭和55年4月1日】以前生まれ、経過的寡婦加算の対象は【昭和31年4月1日|昭和41年4月1日|昭和30年4月1日|昭和26年4月1日】以前生まれ、振替加算の対象は大正15年4月2日から昭和41年4月1日生まれである。","exp":"特例任意加入・経過的寡婦加算・振替加算の生年月日。","page":97},{"law":"費用負担","cat":"国年の国庫負担","text":"国民年金の基礎年金の給付に要する費用の国庫負担は【2分の1|3分の1|4分の1|3分の2】、20歳前傷病による障害基礎年金は【100分の60|100分の100|100分の40|100分の50】(100分の20+その他の部分の2分の1)である。","exp":"基礎年金2分の1・20歳前障害基礎100分の60。","page":99},{"law":"費用負担","cat":"後期高齢者医療の負担","text":"後期高齢者医療の公費負担は国庫負担【12分の3|12分の4|12分の2|12分の6】、調整交付金12分の1、都道府県12分の1、市町村12分の1である。","exp":"国庫12分の3・調整交付金等各12分の1。","page":101},{"law":"費用負担","cat":"介護給付の負担","text":"介護給付・予防給付に要する費用(施設等給付費以外)は国【100分の20|100分の25|100分の12.5|100分の50】、都道府県【100分の12.5|100分の25|100分の20|100分の15】、市町村100分の12.5、保険料【100分の50|100分の45|100分の40|100分の25】である。","exp":"国20%・都道府県12.5%・市町村12.5%・保険料50%。","page":102},{"law":"保険料","cat":"保険料率","text":"厚生年金保険の保険料率は【1000分の183|1000分の150|1000分の200|1000分の91.5】、労災保険率は事業の種類に応じて1000分の2.5から1000分の88、健康保険の一般保険料率は1000分の30から【1000分の130|1000分の120|1000分の100|1000分の82】までの範囲内である。","exp":"厚年183・労災2.5から88・健保30から130。","page":107},{"law":"保険料","cat":"国民年金の保険料","text":"令和8年度の国民年金保険料は【17,000円|16,900円|17,920円|18,000円】に保険料改定率を乗じて【17,920円|16,980円|17,000円|18,300円】、付加保険料は1か月【400円|200円|300円|500円】である。","exp":"令和8年度17920円・付加400円。","page":103},{"law":"保険料","cat":"納付期限","text":"健康保険・厚生年金保険の原則の保険料及び国民年金の第1号被保険者の保険料の納付期限は【翌月末日|当月末日|翌々月末日|翌月10日】、健康保険の任意継続被保険者の保険料は【その月の10日|その月の末日|翌月10日|翌月末日】である。","exp":"原則翌月末日・任意継続その月の10日。","page":107},{"law":"保険料","cat":"国年の産前産後免除","text":"国民年金の産前産後期間中の保険料免除は、出産予定月の【前月|前々月|当月|2か月前】(多胎妊娠は【3箇月前|2箇月前|4箇月前|6箇月前】)から出産予定月の【翌々月|翌月|3か月後|当月】までであり、国民健康保険の産前産後免除も同様である。","exp":"前月(多胎3か月前)から翌々月まで。","page":109},{"law":"督促・延滞金","cat":"督促の義務","text":"徴収法は期限を指定して督促【しなければならない|することができる|するものとする|義務はない】が、健保・厚年・国年は期限を指定して督促【することができる|しなければならない|するものとする|してはならない】とされ、指定期限は督促状を発する日から起算して【10日|14日|20日|7日】以上経過した日である。","exp":"徴収は義務・社保は任意・指定期限10日。","page":112},{"law":"督促・延滞金","cat":"延滞金の算定率","text":"延滞金の算定率は原則年【14.6パーセント|7.3パーセント|10.95パーセント|9パーセント】(納期限の翌日から一定期間は年【7.3パーセント|14.6パーセント|2.4パーセント|3パーセント】)であり、徴収法は労働保険料の額、厚年は保険料額を算定の対象とする。","exp":"原則14.6%・一定期間7.3%。","page":113},{"law":"不服の申立て","cat":"審査機関","text":"労災の保険給付の不服申立ては【労働者災害補償保険審査官|労働保険審査官|社会保険審査官|労災保険審査会】と労働保険審査会、健保・厚年・国年は【社会保険審査官|社会保険審査会|労働保険審査官|健康保険審査官】と社会保険審査会が審査機関である。","exp":"労災は労災審査官等・社保は社会保険審査官等。","page":115},{"law":"不服の申立て","cat":"審査請求の期限","text":"審査請求は原則として処分があったことを知った日の翌日から起算して【3箇月|2箇月|60日|6箇月】、再審査請求は決定書の謄本が送付された日の翌日から起算して【2箇月|3箇月|60日|1箇月】を経過したときはすることができず、労災・雇保の再審査請求は【文書|口頭|書面又は口頭|電磁的記録】でしなければならない。","exp":"審査請求3か月・再審査請求2か月。","page":116},{"law":"不服の申立て","cat":"地域保険の審査機関","text":"国民健康保険の処分の審査機関は【国民健康保険審査会|社会保険審査会|国民健康保険団体連合会|社会保険審査官】、後期高齢者医療の処分は【後期高齢者医療審査会|国民健康保険審査会|社会保険審査会|介護保険審査会】、介護保険の処分は介護保険審査会である。","exp":"国保・後期・介護の審査会。","page":116}],"hrou":[{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"完全失業率","text":"2024年の完全失業率は前年差0.1%ポイント低下の【2.5%|2.6%|2.4%|2.8%】であり、完全失業率は2017年に23年ぶりに2%台となり、2017年以降【8年間|7年間|10年間|5年間】にわたり2%台で推移している。","exp":"完全失業率は8年連続で2%台(白書p.4)","page":4},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"完全失業者数","text":"完全失業者数は前年差2万人減の【176万人|178万人|180万人|170万人】であり、【3年連続|2年連続|4年連続|5年連続】の減少であった。","exp":"白書p.4","page":4},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"有効求人倍率","text":"2024年の有効求人倍率は前年差0.06ポイント低下の【1.25倍|1.31倍|1.20倍|1.18倍】となり3年ぶりに低下し、有効求人倍率は11年連続で1倍を超えたが、2019年の【1.60倍|1.55倍|1.45倍|1.70倍】までは戻っていない。","exp":"白書p.5","page":5},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"正社員有効求人倍率","text":"2024年の正社員の有効求人倍率は前年差0.01ポイント低下の【1.01倍|1.05倍|0.99倍|1.14倍】となり、2019年の1.14倍を下回っているが2年連続で1倍を超えた。","exp":"白書p.5","page":5},{"law":"一般経済の動向","cat":"倒産件数","text":"2024年は倒産件数が前年差1,316件増の【10,006件|8,690件|11,000件|9,000件】となり、【11年ぶり|10年ぶり|3年ぶり|5年ぶり】に倒産件数が10,000件を超えた。","exp":"企業の倒産件数は3年連続で増加(白書p.3)","page":3},{"law":"一般経済の動向","cat":"総雇用者所得","text":"33年ぶりの高水準となった春季労使交渉の賃上げの影響などから、2024年の名目総雇用者所得は【4年連続|3年連続|2年連続|5年連続】増加した。","exp":"白書p.4","page":4},{"law":"労働力人口・労働参加","cat":"労働力人口","text":"労働力人口は前年差32万人増の【6,957万人|6,925万人|7,000万人|6,860万人】で過去最高となり、【2年連続|3年連続|4年連続|1年で】増加した。","exp":"白書p.6","page":6},{"law":"労働力人口・労働参加","cat":"非労働力人口","text":"非労働力人口は前年差53万人減の【4,031万人|4,084万人|4,100万人|3,950万人】となり、【4年連続|3年連続|2年連続|5年連続】で減少した。","exp":"白書p.6","page":6},{"law":"労働力人口・労働参加","cat":"労働力率","text":"15歳以上人口に占める労働力人口の割合である労働力率は【63.3%|62.0%|64.5%|60.0%】であり、2013年以降上昇傾向で推移する中、過去最高水準となった。男性の労働力率は【71.5%|72.0%|70.0%|73.0%】、女性の労働力率は【55.6%|54.2%|56.8%|53.0%】であった。","exp":"白書p.7","page":7},{"law":"労働力人口・労働参加","cat":"年齢別労働力率","text":"労働力率の上昇幅が最も大きかったのは、女性の労働参加が大きく進んでいる【55~64歳|45~54歳|25~34歳|65歳以上】の12.9%ポイントであり、2015年59.2%から2024年【72.1%|70.0%|59.2%|74.0%】に上昇した。","exp":"白書p.7","page":7},{"law":"就業者・雇用者","cat":"就業者数・雇用者数","text":"就業者数は4年連続で増加し前年差34万人増の【6,781万人|6,747万人|6,800万人|6,123万人】、雇用者数は4年連続で増加し前年差47万人増の【6,123万人|6,076万人|6,200万人|6,781万人】となり、いずれも過去最高となった。","exp":"白書p.8","page":8},{"law":"就業者・雇用者","cat":"自営業主","text":"2024年の自営業主・家族従業者は14万人減の【624万人|638万人|600万人|650万人】となり、減少傾向で推移している。","exp":"白書p.8","page":8},{"law":"正規・非正規雇用","cat":"正規雇用労働者","text":"正規雇用労働者数は【3,645万人|3,615万人|3,700万人|2,126万人】であり10年連続で増加した。非正規雇用労働者数は【2,126万人|2,100万人|2,150万人|3,645万人】であり、2019年以降は横ばい圏内で推移している。","exp":"白書p.8","page":8},{"law":"正規・非正規雇用","cat":"女性の正規雇用","text":"2024年の女性の正規雇用労働者数は【1,298万人|1,250万人|1,444万人|1,300万人】であり10年連続で増加したが、非正規雇用労働者数は【1,444万人|1,400万人|1,298万人|1,500万人】であり、2019年以降横ばい圏内で推移している。","exp":"白書p.8","page":8},{"law":"正規・非正規雇用","cat":"両立理由の非正規","text":"家事・育児・介護等と両立しやすいからを理由とする非正規雇用労働者は2024年は【227万人|218万人|240万人|200万人】であり、そのうち女性は【218万人|227万人|200万人|230万人】であった。","exp":"白書p.9","page":9},{"law":"正規・非正規雇用","cat":"不本意非正規","text":"2024年の不本意非正規雇用労働者数は前年差16万人減の【180万人|196万人|200万人|170万人】、不本意非正規雇用労働者割合は前年差0.8%ポイント低下の【8.7%|9.5%|7.5%|10.0%】となり、2年連続で1割を下回り、ともに過去最低水準となった。","exp":"白書p.9","page":9},{"law":"就業者・雇用者","cat":"転職者数","text":"転職者数は2019年に過去最高の【353万人|331万人|290万人|360万人】となった後、2021年に290万人まで減少したが、2022年に増加に転じ、2024年は3年連続増加の【331万人|353万人|290万人|320万人】となった。","exp":"白書p.9","page":9},{"law":"就業者・雇用者","cat":"障害者雇用","text":"2024年の雇用障害者数は前年比5.5%増の【67.7万人|64.2万人|70.0万人|61.4万人】と21年連続で過去最高となり、実雇用率は前年差0.08%ポイント上昇の【2.41%|2.33%|2.50%|2.30%】と13年連続で過去最高となった。","exp":"白書p.10","page":10},{"law":"就業者・雇用者","cat":"障害種別雇用","text":"2024年の精神障害者の雇用者数は前年比【15.7%|10.0%|18.0%|12.0%】増の【15.1万人|13.0万人|16.0万人|12.5万人】と、10%以上の伸び幅を維持している。","exp":"白書p.10","page":10},{"law":"就業者・雇用者","cat":"法定雇用率","text":"法定雇用率は2021年3月に2.3%、2024年4月に【2.5%|2.3%|2.7%|2.6%】に引き上げられ、【2026年7月|2026年4月|2025年4月|2027年4月】には【2.7%|2.5%|2.8%|3.0%】への改定が予定されている。","exp":"白書p.10","page":10},{"law":"就業者・雇用者","cat":"法定雇用率達成割合","text":"2024年の企業の障害者の法定雇用率の達成割合は6月1日時点で前年差4.1%ポイント低下の【46.0%|50.1%|45.0%|48.0%】であったが、長期的には上昇傾向で推移している。","exp":"白書p.10","page":10},{"law":"就業者・雇用者","cat":"外国人労働者","text":"2024年10月末時点の外国人労働者数は約【230万人|205万人|250万人|200万人】となり、直近12年連続で過去最多となった。2023年と2024年は2年連続で前年比【12.4%|10.0%|15.0%|8.0%】増となった。","exp":"白書p.11","page":11},{"law":"就業者・雇用者","cat":"新規学卒者就職率","text":"2025年3月卒の大学新卒者の就職率は前年差0.1%ポイント低下の【98.0%|98.1%|97.3%|99.0%】で1996年度以降で2番目に高く、専修学校(専門課程)新卒者は前年差1.7%ポイント上昇の【99.2%|98.0%|97.5%|100%】で1996年度以降で最高の就職率となった。","exp":"白書p.12","page":12},{"law":"労働時間・休暇","cat":"総実労働時間","text":"2024年の月間総実労働時間は前年差1.4時間減の【137.0時間|138.4時間|140.0時間|130.0時間】であり、一般労働者は前年差1.1時間減の【162.3時間|163.4時間|160.0時間|137.0時間】、パートタイム労働者は前年差0.7時間減の【80.2時間|80.9時間|82.0時間|78.0時間】であった。","exp":"従業員5人以上規模の事業所(白書p.12)","page":12},{"law":"労働時間・休暇","cat":"週60時間以上","text":"週60時間以上就労雇用者の割合は2024年は【4.6%|5.0%|4.0%|5.4%】と前年より0.4%ポイント低下し、2020年以降で低下幅が最も大きくなった。","exp":"白書p.13","page":13},{"law":"労働時間・休暇","cat":"年次有給休暇","text":"年次有給休暇の取得率は男女計・男性・女性いずれについても、比較可能な【1984年|1985年|1990年|2000年】以降、過去最高となった。","exp":"白書p.13","page":13},{"law":"賃金","cat":"現金給与総額","text":"2024年の就業形態計の現金給与総額は前年比【2.8%|3.2%|2.5%|2.0%】増と【4年連続|3年連続|2年連続|5年連続】で増加し、パートタイム労働者の時給は前年比4.3%増の【1,343円|1,300円|1,400円|1,288円】となった。","exp":"白書p.13","page":13},{"law":"賃金","cat":"実質賃金","text":"2024年の実質賃金は就業形態計では前年比0.3%減と【3年連続|2年連続|4年連続|5年連続】で減少したが、一般労働者は前年比0.0%、パートタイム労働者は前年比0.7%増と【3年ぶり|2年ぶり|4年ぶり|5年ぶり】にマイナスから脱した。","exp":"白書p.14","page":14},{"law":"賃金","cat":"特別給与","text":"事業所規模別の特別給与は全ての規模で前年比プラスとなり、特に事業所規模【5~29人|30~99人|100~499人|500人以上】では前年比【12.1%|10.0%|8.0%|15.0%】増加し、他の事業所規模よりも高い伸びであった。","exp":"白書p.14","page":14},{"law":"賃金","cat":"春季労使交渉","text":"連合が公表した2024春季生活闘争の最終回答集計結果では【5.10%|4.90%|5.33%|4.50%】と33年ぶりの高水準となり、厚生労働省の調査では賃上げ率【5.33%|5.10%|4.90%|5.50%】、妥結額【17,415円|16,000円|18,000円|15,000円】であった。","exp":"白書p.15","page":15},{"law":"賃金","cat":"賃金改定","text":"2024年の一人当たり平均賃金の改定額は【11,961円|11,000円|12,500円|10,000円】、改定率は【4.1%|3.8%|4.5%|3.5%】と、現行の調査方法となった【1999年|2000年|1990年|2005年】以降、改定額・改定率ともに最高値となった。","exp":"白書p.15","page":15},{"law":"賃金","cat":"賃上げ実施企業割合","text":"2024年の賃上げ実施企業割合は企業規模計で【91.2%|89.0%|93.0%|95.0%】に達し、5,000人以上の規模の企業では【99.1%|98.0%|100%|97.0%】に達した。","exp":"白書p.16","page":16},{"law":"賃金","cat":"一時金","text":"2024年の夏季一時金の妥結額は【89.9万円|85.0万円|90.0万円|89.1万円】で前年比6.29%増、年末一時金は【89.1万円|89.9万円|85.0万円|90.0万円】で前年比4.93%増と、ともに3年連続で増加した。","exp":"白書p.16","page":16},{"law":"賃金","cat":"労働組合員数","text":"2024年の労働組合員数は【991万人|1,000万人|950万人|1,005万人】と3年連続で1,000万人を割り、推定組織率は【16.1%|16.5%|15.0%|17.0%】となり、ともに4年連続で低下した。パートタイム労働者の労働組合員数は過去最高の【146万人|140万人|150万人|130万人】であった。","exp":"白書p.16","page":16},{"law":"テーマ分析(労働力供給制約)","cat":"GDPシェア","text":"我が国の名目GDPが世界全体に占める割合は1980年は約10%、1991年には15%を超えたが、2010年には【8.6%|10.0%|7.0%|6.0%】、2024年には【3.6%|4.0%|3.0%|5.0%】まで低下した。","exp":"白書p.17","page":17},{"law":"テーマ分析(労働力供給制約)","cat":"将来推計","text":"JILPTの将来推計によると、実質成長ゼロ・労働参加も進まないシナリオでは2040年の就業者は【5,768万人|6,000万人|5,500万人|6,724万人】と、2022年の就業者数6,724万人と比較して約【1,000万人|956万人|800万人|1,200万人】減少すると推計されている。","exp":"白書p.19","page":19},{"law":"テーマ分析(労働力供給制約)","cat":"労働生産性","text":"1980年代の我が国の実質労働生産性の上昇率は約【3.6%|4.0%|3.0%|2.5%】と主要国のなかで最も高い上昇率であったが、2000年代以降は【1%前後|2%前後|0.5%前後|3%前後】にとどまっている。","exp":"白書p.18","page":18},{"law":"テーマ分析(労働力供給制約)","cat":"生成AI活用","text":"生成AIを全社的に活用していると回答した割合は、従業員数300人未満の企業では【1.3%|2.0%|0.5%|3.0%】にとどまる一方、5,000人以上の大企業では【19.0%|15.0%|20.0%|25.0%】であった。","exp":"白書p.20","page":20},{"law":"人手不足","cat":"社会インフラ関連職","text":"社会インフラ関連職の就業者が就業者全体に占める割合は、医療・保健・福祉グループ約11%、保安・運輸・建設グループ約12%、接客・販売・調理グループ約12%を合わせ、全体の約【35%|30%|40%|25%】となる。","exp":"白書p.22","page":22},{"law":"人手不足","cat":"有効求人倍率(職業別)","text":"2024年平均の有効求人倍率は、全職業が【1.14倍|1.25倍|1.00倍|1.20倍】である一方、サービス職業従事者は【2.98倍|2.50倍|3.50倍|2.18倍】、輸送・機械運転従事者は2.18倍、建設・採掘従事者は【5.12倍|4.50倍|6.00倍|3.00倍】となった。","exp":"白書p.22","page":22},{"law":"人手不足","cat":"欠員率","text":"非社会インフラ関連職の欠員率は2024年には【1.7%|2.0%|1.5%|2.5%】まで改善したが、社会インフラ関連職の欠員率はおおむね【5%前後|3%前後|7%前後|4%前後】で高止まりしており、医療・保健・福祉グループは約【6%|5%|7%|8%】と最も高い。","exp":"白書p.23","page":23},{"law":"人手不足","cat":"社会インフラ賃金","text":"社会インフラ関連職の月額賃金は約【32万円|36万円|30万円|35万円】であり、非社会インフラ関連職の約36万円と比べて約【5万円|4万円|6万円|10万円】低い。年間所得は社会インフラ関連職が約436万円、非社会インフラ関連職が約541万円で約【104万円|105万円|100万円|80万円】の開きがある。","exp":"白書p.26","page":26},{"law":"人手不足","cat":"社会インフラ労働時間","text":"月間総労働時間は社会インフラ関連職が約【211時間|209時間|215時間|205時間】、非社会インフラ関連職が約209時間で約【2時間|3時間|5時間|1時間】長く、保安・運輸・建設グループは約【218時間|211時間|220時間|209時間】と他のグループより長い。","exp":"白書p.28","page":28},{"law":"人手不足","cat":"テレワーク活用","text":"テレワークが適用されていたと回答した割合は非社会インフラ関連職の約【20%|15%|25%|30%】に対し、社会インフラ関連職は【5%|10%|3%|8%】に満たない水準であった。","exp":"白書p.29","page":29},{"law":"企業と労働者の関係性","cat":"生え抜き社員","text":"生え抜き社員割合は2008年に約【40%|45%|35%|50%】であったが低下傾向で推移し、2023年には約【37%|40%|35%|30%】となった。","exp":"白書p.36","page":36},{"law":"企業と労働者の関係性","cat":"転職経験率","text":"Indeed Japanの5か国比較調査では、日本の転職経験率は約【60%|50%|70%|65%】となっており、米国の約【90%|85%|95%|80%】及び英国の約【93%|90%|85%|95%】と比べて低い水準にある。","exp":"白書p.35","page":35},{"law":"企業と労働者の関係性","cat":"フレックスタイム制","text":"フレックスタイム制適用労働者の割合は2018年では約【8%|10%|6%|12%】であったが、2024年では約【12%|10%|15%|8%】となっている。","exp":"白書p.36","page":36},{"law":"企業と労働者の関係性","cat":"テレワーク導入","text":"テレワークを実施している人の割合は感染症拡大後の2020年5月調査では約【32%|30%|35%|25%】であったが、2024年7月調査では約【16%|20%|14%|18%】にまで落ち込んでいる。","exp":"白書p.36","page":36},{"law":"労働者の意識変化","cat":"働く目的","text":"内閣府の世論調査では、2024年にはお金を得るために働くが約【63%|60%|65%|55%】に達した一方、生きがいをみつけるために働くは約【13%|15%|10%|20%】まで低下した。","exp":"白書p.37","page":37},{"law":"労働者の意識変化","cat":"仕事と余暇","text":"仕事優先型の回答は1973年に約【44%|40%|48%|35%】だったが減少し、2018年には約【23%|25%|20%|30%】にまで低下し、同年には余暇・仕事両立型が約38%、余暇優先型が約36%となった。","exp":"白書p.38","page":38},{"law":"継続就業を促す雇用管理","cat":"人手不足の現状","text":"企業の約【71%|73%|65%|75%】が事業継続のための人手に、約【73%|71%|70%|80%】が新規事業のための人手に不足感を感じている。","exp":"白書p.39","page":39},{"law":"継続就業を促す雇用管理","cat":"職場環境と継続就業","text":"継続就業希望者の割合は、働きやすいと感じるグループで約【88%|85%|90%|72%】、まあ働きやすいグループで約72%、働きにくいと感じるグループで約【39%|45%|35%|50%】であった。","exp":"白書p.40","page":40},{"law":"継続就業を促す雇用管理","cat":"継続就業施策","text":"継続就業を支えるため、若手の賃金の引上げ(ベースアップ)には約【71%|62%|75%|80%】、若手以外の賃金の引上げには約62%の企業が力を入れ、年次有給休暇の取得促進については約【75%|71%|70%|80%】の企業が実施している。","exp":"白書p.40","page":40}],"hkou":[{"law":"社会保障の役割","cat":"社会保障制度の根拠","text":"現在の社会保障制度の根拠となっているのは、第2次世界大戦後の【1947(昭和22)年|1946(昭和21)年|1950(昭和25)年|1945(昭和20)年】に施行された日本国憲法である。第【25|13|27|14】条において、すべて国民は健康で文化的な最低限度の生活を営む権利を有するとされ、いわゆる生存権が規定されている。","exp":"日本国憲法第25条第2項では国は社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならないとされている(白書p.5)。","page":5},{"law":"社会保障の役割","cat":"社会保障制度審議会勧告","text":"1949(昭和24)年に設置された社会保障制度審議会において、【1950(昭和25)年|1949(昭和24)年|1947(昭和22)年|1961(昭和36)年】に出された社会保障制度に関する勧告では、疾病、負傷、分娩、障害、死亡、老齢、失業、多子その他困窮の原因に対し経済保障の途を講じるものと定義された。","exp":"保険的方法又は直接公の負担において経済保障の途を講じるとされた(白書p.5)。","page":5},{"law":"社会保障制度の概要","cat":"社会保障の4分野","text":"社会保障制度は、①社会保険、②社会福祉、③【公的扶助|生活保護|社会手当|公衆衛生】、④保健医療・公衆衛生からなり、人々の生活を生涯にわたって支えている。","exp":"国民の安心や生活の安定を支えるセーフティネットである(白書p.6)。","page":6},{"law":"社会保障制度の概要","cat":"社会保険の種類","text":"社会保険は、年金・医療・【介護|船員|児童|家族】・雇用・労災の保険からなり、保険事故に遭遇した場合に一定の給付を行いその生活の安定を図ることを目的とした強制加入の保険制度である。","exp":"病気、けが、出産、死亡、老齢、障害、失業などの保険事故に対応する(白書p.6)。","page":6},{"law":"社会保障制度の概要","cat":"公的扶助","text":"公的扶助は、生活に困窮する国民に対して最低限度の生活を保障し、その自立を助けようとする制度であり、その代表が【生活保護制度|社会手当制度|生活困窮者自立支援制度|児童扶養手当制度】である。","exp":"健康で文化的な最低限度の生活を保障する(白書p.6)。","page":6},{"law":"社会保障制度の概要","cat":"自助・共助・公助","text":"日本の福祉社会は、自助・共助・公助の適切な組み合わせによって形作られている。共助とは生活上の様々な困難に対して【社会連帯|相互扶助|共同連帯|連帯責任】の考え方で支え合うこと、公助とはすでに困っている人々の生活を公的に支援することである。","exp":"自助は自ら働き自分の健康や生活は自分で守ることをいう(白書p.7)。","page":7},{"law":"なぜ社会保障が必要か","cat":"社会保障の機能","text":"社会保障には、①生活の安定・向上、②【所得の再分配|所得保障|資源配分|社会統合】、③経済の安定の3つの機能がある。","exp":"個人の力のみでは対応しがたい生活上のリスクに社会全体で対応する(白書p.7)。","page":7},{"law":"なぜ社会保障が必要か","cat":"所得の再分配","text":"所得の再分配は、所得を個人や世帯の間で移転させることにより、所得格差(貧富)の縮小や低所得者の生活の安定を図る機能であり、【高所得者|富裕層|事業主|現役世代】から低所得者、現役世代から高齢世代などへの再分配がある。","exp":"現金給付だけでなくサービスの現物給付もある(白書p.7~8)。","page":7},{"law":"労働施策の役割","cat":"戦後の労働立法","text":"明治時代の労働問題に対応するため【工場法|労働基準法|職工法|労働者保護法】(1911(明治44)年)などが整備され、第二次世界大戦後には労働基準法、労働組合法、労働関係調整法、職業安定法、失業保険法などが制定された。","exp":"日本国憲法において勤労の権利と義務、労働基本権の保障が規定された(白書p.8)。","page":8},{"law":"労働施策の役割","cat":"労働基本権","text":"労働基本権(労働三権)とは、①労働者が労働組合を結成する権利(団結権)、②使用者と団体交渉する権利(団体交渉権)、③団体で行動する権利(【団体行動権(争議権)|争議権のみ|団体協約権|労働協約権】)をいう。","exp":"戦後の日本国憲法で保障された(白書p.8)。","page":8},{"law":"労働施策の役割","cat":"雇用保険法の制定","text":"1973(昭和48)年の第1次石油危機後の経済変動期に、企業の雇用維持努力を支援する制度として、【1974(昭和49)年|1973(昭和48)年|1975(昭和50)年|1947(昭和22)年】に失業保険法を改正した雇用保険法が制定された。","exp":"物価高や戦後初めてのマイナス成長が起こった際に制定された(白書p.9)。","page":9},{"law":"労働施策の役割","cat":"働き方改革","text":"近年の大きな労働施策として、【2018(平成30)年|2019(平成31)年|2015(平成27)年|2020(令和2)年】に働き方改革関連法が成立し、働き過ぎを防ぎ働く人の健康を守り、ワーク・ライフ・バランスを実現する取組みが進められている。","exp":"多様で柔軟な働き方を自分で選択できるようにすることが目的である(白書p.9)。","page":9},{"law":"少子化・人口減少","cat":"人口と高齢化率","text":"日本の人口は【2008(平成20)年|2010(平成22)年|2005(平成17)年|2011(平成23)年】をピークに減少に転じており、高齢化率は1990(平成2)年の【12.1|10.3|14.6|9.0】%から2020(令和2)年には【28.6|29.1|26.6|30.0】%に達している。","exp":"2050(令和32)年には総人口は10,469万人に減少すると推計されている(白書p.11)。","page":11},{"law":"少子化・人口減少","cat":"全世代型社会保障","text":"全世代型社会保障構築会議の2022(令和4)年12月の報告書では、目指すべき方向性として、①少子化・人口減少の流れを変える、②これからも続く超高齢社会に備える、③【地域の支え合い|地域共生社会|共助の強化|地域包括ケア】を強める、を示している。","exp":"政府が開催する社会保障の在り方を議論する会議である(白書p.11)。","page":11},{"law":"少子化・人口減少","cat":"出生数と出生率","text":"2024(令和6)年の出生数は【68万6,061|72万7,277|70万0,000|65万0,000】人であり、合計特殊出生率は【1.15|1.20|1.26|1.10】で、前年の【1.20|1.15|1.26|1.30】より0.05ポイント低下した。","exp":"1989(平成元)年の1.57は1.57ショックと言われた(白書p.11)。","page":11},{"law":"超高齢社会","cat":"高齢者数と生産年齢人口","text":"65歳以上人口(高齢者数)のピークは【2043|2040|2050|2042】年の【3,953万|3,900万|4,000万|3,800万】人と推計され、2050(令和32)年には高齢化率は【37.1|38.0|35.0|40.0】%に上昇、15~64歳の生産年齢人口は【52.9|51.0|55.0|50.0】%まで減少すると推計されている。","exp":"2025(令和7)年までに団塊の世代が全て75歳以上となる(白書p.12)。","page":12},{"law":"超高齢社会","cat":"平均寿命・健康寿命","text":"平均寿命は2023(令和5)年に男性【81.09|81.05|80.50|82.00】年、女性【87.14|87.09|86.50|88.00】年であり、健康寿命(日常生活に制限がない期間の平均)は2022(令和4)年に男性【72.57|72.68|71.00|73.50】年、女性【75.45|75.38|74.00|76.50】年であった。","exp":"平均寿命・健康寿命は延伸傾向にあり先進7か国の中で最も長い(白書p.12)。","page":12},{"law":"超高齢社会","cat":"M字カーブ・L字カーブ","text":"女性の就業率は【30代後半|30代前半|20代後半|40代前半】を底として再び上昇していくいわゆるM字カーブの状況にあり近年その底は浅くなっているが、女性の正規雇用比率には20代後半をピークに減少するいわゆるL字カーブが見られる。","exp":"第1子出産前後の継続就業率は約7割となっている(白書p.13)。","page":13},{"law":"超高齢社会","cat":"非正規雇用比率","text":"非正規雇用労働者にはパートタイム労働者、有期雇用労働者、派遣労働者が含まれ、雇用者に占める割合は2024(令和6)年には【36.8|37.1|35.0|40.0】%となっている。","exp":"2010年以降増加が続き、2022年以降は再び増加している(白書p.14)。","page":14},{"law":"超高齢社会","cat":"年次有給休暇取得率","text":"2023(令和5)年の年次有給休暇の取得率は【65.3|62.1|68.0|60.0】%と、前年より3.2ポイント上昇し、【1984(昭和59)年|1985(昭和60)年|1990(平成2)年|2000(平成12)年】以降過去最高となった。","exp":"年間総実労働時間は減少傾向にある(白書p.14)。","page":14},{"law":"地域の支え合い","cat":"単身世帯の見通し","text":"【2050(令和32)年|2040(令和22)年|2045(令和27)年|2060(令和42)年】には、一般世帯に占める単身世帯は【44.3|40.0|45.0|38.0】%に達し5世帯に2世帯に、高齢者単身世帯は【20.6|18.0|22.0|25.0】%に達し5世帯に1世帯になると推計されている。","exp":"単身世帯、高齢者単身世帯ともに今後も増加が予想されている(白書p.15)。","page":15},{"law":"若者と社会保障","cat":"社会保障への関心","text":"社会保障制度や労働施策について関心がある割合は、医療が【63.6|58.3|68.0|60.0】%、年金が【58.3|63.6|55.0|60.0】%、介護が43.3%、労働時間のきまりが79.5%、賃金のきまりが【80.0|79.5|75.0|85.0】%であった。","exp":"令和6年度少子高齢社会等調査検討事業の調査結果による(白書p.16)。","page":16},{"law":"若者と社会保障","cat":"社会保障教育・労働法教育の経験","text":"社会保障教育の経験があるのは【65.3|62.7|60.0|68.0】%、労働法教育の経験があるのは62.7%であり、ともに【6割|7割|5割|8割】を超えていた。","exp":"社会保障教育の経験者のうち54.2%、労働法教育の経験者のうち70.0%が授業の内容を覚えている(白書p.17)。","page":17},{"law":"若者と社会保障","cat":"情報を得る手段","text":"知識を得るために今後利用したい手段としてはインターネット(HPなど)が【68.4|54.9|70.0|60.0】%で最も多く、心配ごととしてはSNSなどの情報が正しいかどうかわからないが54.9%で最も多かった。","exp":"SNSは56.5%、学校は48.5%が今後利用したい手段としてあげられた(白書p.17)。","page":17},{"law":"社会保障教育・労働法教育","cat":"社会保障教育の議論","text":"厚生労働省において社会保障教育が大きく議論され始めたのは【2011(平成23)年|2012(平成24)年|2009(平成21)年|2015(平成27)年】のことであり、その背景には社会保障と税の一体改革が進められ、特に次世代の主役となる若者に当事者意識を持ってもらうことが重要であったことがある。","exp":"次世代の主役となる若者に当事者意識を持って考えてもらうことが重要であった(白書p.18)。","page":18},{"law":"社会保障教育・労働法教育","cat":"公共の導入","text":"社会保障教育は、【2022(令和4)年度|2021(令和3)年度|2020(令和2)年度|2023(令和5)年度】から高等学校において導入された【公共|現代社会|政治・経済|公民】や、家庭基礎などの授業で行われている。","exp":"公共では財政及び租税の役割、少子高齢社会における社会保障の充実・安定化を関連させて取り扱う(白書p.19)。","page":19},{"law":"最低賃金","cat":"地域別最低賃金","text":"2024(令和6)年度の地域別最低賃金は、全国加重平均で対前年度【51|50|43|55】円引上げの【1,055|1,004|1,000|1,100】円となり、特定最低賃金の全国加重平均額は【1,063|1,055|1,050|1,100】円(2025年4月1日現在)となった。","exp":"地域別最低賃金は各都道府県内の全ての使用者及び労働者に適用される(白書p.22)。","page":22},{"law":"最低賃金","cat":"最低賃金の決定手続","text":"地域別最低賃金は、毎年公労使三者からなる【中央最低賃金審議会|労働政策審議会|地方最低賃金審議会|中央労働委員会】が厚生労働大臣の諮問を受け改定額の目安の答申を行い、これを参考に地方最低賃金審議会で審議の上、【都道府県労働局長|厚生労働大臣|労働基準監督署長|地方最低賃金審議会】が改正決定を行う。","exp":"地域別最低賃金は各都道府県内の全ての使用者及び労働者に適用される(白書p.22)。","page":22},{"law":"非正規雇用","cat":"無期転換ルール","text":"2013(平成25)年4月に全面施行された改正労働契約法では、有期労働契約が繰り返し更新されて通算【5年|3年|10年|1年】を超えたときは、労働者の申込みにより無期労働契約に転換できる制度(無期転換ルール)が導入された。","exp":"あわせて雇止め法理の法定化、不合理な労働条件の相違の禁止規定が設けられた(白書p.24)。","page":24},{"law":"ハラスメント対策","cat":"パワーハラスメントの定義","text":"職場のパワーハラスメントとは、①優越的な関係を背景とした言動であって、②【業務上必要かつ相当な範囲|社会通念上相当な範囲|業務上の合理的な範囲|通常の業務の範囲】を超えたものにより、③労働者の就業環境を害するものの全てを満たすものをいう。","exp":"全ての事業主に防止のための雇用管理上の措置が義務付けられている(白書p.38~39)。","page":38},{"law":"労災保険等制度","cat":"特別加入の対象拡大","text":"フリーランス・事業者間取引適正化等法の制定等を踏まえ、【2024(令和6)年11月1日|2024(令和6)年4月1日|2023(令和5)年11月1日|2025(令和7)年4月1日】から、同法に規定する特定受託事業者が行う事業が新たに労災保険の特別加入制度の対象となった。","exp":"労働者に準じて保護することがふさわしい者の加入を認める制度である(白書p.40)。","page":40},{"law":"年金制度","cat":"賦課方式","text":"公的年金制度は、現役世代の保険料負担でその時々の高齢世代の年金給付をまかなう世代間扶養である【賦課方式|積立方式|修正積立方式|世代間積立方式】を基本とした仕組みで運営されている。","exp":"賃金や物価の変化を年金額に反映させながら生涯にわたって支給される(白書p.58)。","page":58},{"law":"年金制度","cat":"被保険者の種別","text":"公的年金の被保険者数は全体で【6,745万|6,700万|6,800万|6,000万】人(2023年度末)で、第2号被保険者等が4,672万人と全体の約【69|70|65|60】%を占め、第1号被保険者は1,387万人、第3号被保険者は【686万|763万|700万|600万】人となっている。","exp":"被用者保険の適用拡大などにより第2号被保険者等は増加傾向にある(白書p.58)。","page":58},{"law":"年金制度","cat":"マクロ経済スライド","text":"【2004(平成16)年|2000(平成12)年|2009(平成21)年|2012(平成24)年】の年金制度改革により、保険料の上限を固定し、給付水準を前年度よりも名目額を下げずに賃金・物価上昇の範囲内で自動的に調整する仕組み(マクロ経済スライド)が導入された。","exp":"基礎年金国庫負担割合の引上げと積立金の活用を組み合わせている(白書p.58)。","page":58},{"law":"年金制度","cat":"令和6年財政検証","text":"年金制度では少なくとも【5年|3年|10年|4年】に1度財政検証を行っており、令和6(2024)年財政検証では、1人当たり成長率をゼロと見込んだケース以外で、将来的に所得代替率【50|60|45|40】%の給付水準が確保できることが確認された。","exp":"女性や高齢者の労働参加の進展や積立金の運用好調により前回より将来の給付水準が上昇した(白書p.59)。","page":59},{"law":"医療・介護","cat":"介護保険制度","text":"介護保険制度は【2000(平成12)年4月|2000(平成12)年1月|1997(平成9)年4月|2006(平成18)年4月】に社会全体で高齢者介護を支える仕組みとして創設され、介護サービスの利用者は2000年4月の【149万|150万|200万|100万】人から2024年4月には【528万|500万|600万|400万】人と約3.5倍になっている。","exp":"介護費用も2000年度の約3.6兆円から2023年度には約11.7兆円となった(白書p.69)。","page":69},{"law":"医療・介護","cat":"出産育児一時金","text":"出産育児一時金は、出産費用の上昇を踏まえ、2023(令和5)年4月より【42万円|40万4千円|48万8千円|50万円】から【50万円|48万8千円|42万円|55万円】に増額され、2024(令和6)年度から【後期高齢者医療制度|国民健康保険|介護保険|子ども・子育て支援】が費用の一部を支援する仕組みが導入された。","exp":"子育てを社会全体で支援する観点から導入された(白書p.66~67)。","page":66},{"law":"障害者雇用","cat":"法定雇用率","text":"障害者の法定雇用率は段階的に引き上げられ、2024(令和6)年4月に一般事業主は【2.5|2.3|2.7|2.6】%に、2026(令和8)年7月には一般事業主は【2.7|2.5|3.0|2.8】%に引き上げることとされている。","exp":"2024年6月時点の民間企業の実雇用率は2.41%であった(白書p.52~53)。","page":52},{"law":"高年齢者雇用","cat":"高年齢者就業確保措置","text":"高年齢者雇用安定法は、希望者全員について【65歳|60歳|70歳|65歳未満】までの雇用が確保されるよう高年齢者雇用確保措置を義務づけ、さらに【70歳|65歳|75歳|68歳】までの就業機会を確保するための高年齢者就業確保措置を講じる【努力義務|義務|配慮義務|法的義務】を課している。","exp":"高年齢者雇用確保措置は定年引上げ、定年の定めの廃止、継続雇用制度の導入のいずれかである(白書p.49)。","page":49},{"law":"生活保護","cat":"生活保護制度の概要","text":"生活保護制度は、健康で文化的な最低限度の生活を保障するとともにその自立を助長する制度で、社会保障の【最後のセーフティネット|第1のセーフティネット|第2のセーフティネット|中間的セーフティネット】と言われ、保護の種類には生活扶助、住宅扶助、医療扶助等の【8種類|7種類|6種類|10種類】がある。","exp":"2025年1月時点の生活保護受給世帯数は約165万世帯である(白書p.57)。","page":57}],"ikuji":[{"law":"育児・介護休業法","cat":"育児休業","text":"育児休業は、原則として子が【1歳|1歳6か月|2歳|3歳】に達する日（誕生日の前日）まで取得することができる。","exp":"原則は1歳まで。1歳6か月や2歳は延長・再延長の場面の数値であり、原則年齢とは異なる。","page":140},{"law":"育児・介護休業法","cat":"育児休業","text":"育児休業は、子1人につき原則【2回|1回|3回|4回】まで分割して取得することができる。","exp":"令和4年10月改正で分割2回が可能となった。出生時育休（2回）とは別枠である。","page":140},{"law":"育児・介護休業法","cat":"育児休業","text":"子が1歳に達する時点で保育所に入所できない等の事情がある場合、育児休業はまず子が【1歳6か月|1歳|1歳2か月|3歳】に達する日まで延長できる。","exp":"1歳到達時点での1回目の延長は1歳6か月まで。さらに1歳6か月時点でも事情が続けば2歳まで再延長できる（再延長は別問）。","page":142},{"law":"育児・介護休業法","cat":"育児休業","text":"1歳6か月到達後も保育所に入所できない等の場合、育児休業を子が【2歳|1歳6か月|3歳|就学前】に達する日まで再延長することができる。","exp":"再延長の上限は2歳。3歳は短時間勤務措置の対象年齢であって育休延長の上限ではない。","page":143},{"law":"育児・介護休業法","cat":"育児休業","text":"父母がともに育児休業を取得する場合（パパ・ママ育休プラス）、子が【1歳2か月|1歳|1歳6か月|2歳】に達する日まで取得可能期間が延びる。","exp":"パパ・ママ育休プラスは1歳2か月まで。ただし各人が取得できる上限は1年である。","page":154},{"law":"育児・介護休業法","cat":"育児休業","text":"パパ・ママ育休プラスにおいても、各人が育児休業を取得できる期間の上限は【1年|1歳2か月|6か月|93日】である。","exp":"取得可能期間が1歳2か月まで延びても、1人あたりの上限は1年で変わらない。","page":154},{"law":"育児・介護休業法","cat":"育児休業","text":"育児休業の申出は、原則として休業開始予定日の【1か月前|2週間前|1週間前|3か月前】までに行う。","exp":"通常の育児休業は原則1か月前。出生時育休の原則2週間前と区別する。","page":140},{"law":"育児・介護休業法","cat":"育児休業","text":"有期雇用労働者は、子が【1歳6か月|1歳|2歳|3歳】に達する日までに労働契約が満了することが明らかでない場合に育児休業を取得できる。","exp":"有期の取得要件は1歳6か月までに契約満了が明らかでないこと。","page":140},{"law":"育児・介護休業法","cat":"育児休業","text":"労使協定により育児休業の対象から除外できるのは、雇用された期間が【1年未満|6か月未満|2年未満|3か月未満】の労働者などである。","exp":"育児休業では雇用1年未満を労使協定で除外できる。看護等休暇・介護休暇の6か月未満除外はR7.4廃止。","page":140},{"law":"育児・介護休業法","cat":"育児休業","text":"労使協定により、申出後【1年|6か月|1歳以降は6か月|2年】以内に雇用関係が終了することが明らかな労働者を育児休業の対象から除外できる。","exp":"原則1年以内、1歳以降の休業については6か月以内に雇用終了が明らかな者を除外可。","page":140},{"law":"育児・介護休業法","cat":"育児休業","text":"労使協定により、週の所定労働日数が【2日以下|3日以下|1日以下|4日以下】の労働者を育児休業の対象から除外できる。","exp":"週所定2日以下の者は労使協定で除外可能。看護等休暇・介護休暇の除外要件も同じ週2日以下。","page":140},{"law":"育児・介護休業法","cat":"出生時育休","text":"出生時育児休業（産後パパ育休）は、子の出生後【8週間|6週間|4週間|12週間】以内の期間を対象とする。","exp":"令和4年10月新設。対象期間は出生後8週間以内である。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","text":"出生時育児休業は、上記期間内に通算【4週間|2週間|8週間|6週間】（28日）まで取得できる。","exp":"出生後8週間以内に4週間（28日）が上限。8週間という対象期間と混同しない。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","text":"出生時育児休業の取得上限は日数では【28日|14日|56日|93日】である。","exp":"4週間＝28日が上限。93日は介護休業の通算日数である。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","text":"出生時育児休業は【2回|1回|3回|4回】まで分割して取得することができる。","exp":"産後パパ育休は2回まで分割可。ただし初めにまとめて申し出る必要がある。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","text":"出生時育児休業の申出は、原則として休業開始予定日の【2週間前|1か月前|1週間前|2か月前】までに行う。","exp":"産後パパ育休は原則2週間前。通常の育休の1か月前と区別する。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","text":"出生時育児休業中は、【労使協定を締結した場合|本人が希望すれば常に|事業主の一存で|協定なしで】に限り、上限の範囲内で就業させることができる。","exp":"産後パパ育休中の就業は労使協定の締結が前提で、就業日数等に上限がある。","page":148},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"令和7年4月改正により、休暇の名称が「子の看護休暇」から【子の看護等休暇|子の養育休暇|育児看護休暇|子の保育休暇】に改められた。","exp":"R7.4で名称変更とともに対象範囲・事由が拡大された。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"子の看護等休暇の対象は、令和7年4月改正により【小学校第3学年修了まで|小学校就学前まで|小学校第6学年修了まで|3歳まで】の子に拡大された。","exp":"改正前は就学前、改正後は小学校3年生修了まで。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"子の看護等休暇は1年度につき【5日|10日|3日|93日】、子が2人以上の場合は10日を限度に取得できる。","exp":"原則5日、2人以上で10日。介護休暇も同じ日数体系である。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"子の看護等休暇は、子が2人以上の場合は1年度につき【10日|5日|20日|15日】を限度とする。","exp":"対象の子が2人以上で10日。1人の場合の5日と区別する。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"令和7年4月改正で、子の看護等休暇の対象事由に【学級閉鎖等・入園卒園式等|定期健康診断のみ|予防接種のみ|通院のみ】が追加された。","exp":"感染症に伴う学級閉鎖等や入園・卒園式等の行事参加が追加された。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"子の看護等休暇は【時間単位|半日単位のみ|1日単位のみ|月単位】でも取得することができる。","exp":"時間単位取得が可能。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"令和7年4月改正により、子の看護等休暇では勤続【6か月未満|1年未満|3か月未満|2年未満】の労働者を労使協定で除外する規定が廃止された。","exp":"R7.4で勤続6か月未満除外が廃止。残るのは週所定2日以下の除外のみ。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","text":"子の看護等休暇について労使協定で除外できるのは、週の所定労働日数が【2日以下|3日以下|1日以下|4日以下】の労働者である。","exp":"6か月未満除外が廃止された後も、週所定2日以下の除外は残る。","page":160},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"所定外労働の制限（残業免除）の対象は、令和7年4月改正により【小学校就学前|3歳未満|1歳未満|2歳未満】の子を養育する労働者に拡大された。","exp":"改正前は3歳未満、改正後は小学校就学前まで拡大。","page":163},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"所定外労働の制限を請求した労働者については、事業主は【所定労働時間を超える労働|1か月24時間を超える時間外労働|深夜労働|休日労働のみ】をさせてはならない。","exp":"残業ゼロ（所定労働時間を超えさせない）。時間外制限の上限つき規制と区別する。","page":163},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"所定外労働の制限の1回の請求期間は、【1か月以上1年以内|1か月以上6か月以内|2週間以上1年以内|3か月以上1年以内】である。","exp":"1回につき1か月以上1年以内の期間で請求する。","page":163},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"令和7年4月改正により、【介護|出生時育休|看護休暇|短時間勤務】についても所定外労働の制限が新設された。","exp":"R7.4で要介護家族を介護する労働者にも所定外労働の制限（残業免除）が新設された。","page":160},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"時間外労働の制限を請求した労働者には、1か月【24時間|150時間|45時間|36時間】、1年150時間を超える時間外労働をさせてはならない。","exp":"上限つき規制で、ゼロではない。1か月24時間・1年150時間が上限。","page":164},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"時間外労働の制限では、1年【150時間|360時間|720時間|100時間】を超える時間外労働をさせてはならない。","exp":"1か月24時間・1年150時間が上限。労基法36協定の上限値と混同しない。","page":164},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"時間外労働の制限の対象は、【小学校就学前の子|3歳未満の子|小学校3年修了までの子|1歳未満の子】を養育する労働者または要介護家族を介護する労働者である。","exp":"時間外労働の制限は就学前の子が対象。所定外制限も改正後は就学前で同じ。","page":164},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"深夜業の制限を請求した労働者については、【午後10時から午前5時|午後9時から午前6時|午後11時から午前6時|午後8時から午前5時】までの間に労働させてはならない。","exp":"深夜の定義は午後10時～午前5時。労基法の深夜割増と同じ時間帯。","page":166},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","text":"深夜業の制限の対象は、【小学校就学前の子|3歳未満の子|小学校3年修了までの子|2歳未満の子】を養育する労働者または要介護家族を介護する労働者である。","exp":"深夜業の制限は就学前の子・要介護家族が対象。","page":166},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"育児のための所定労働時間の短縮措置（短時間勤務）の対象は、【3歳未満|1歳未満|小学校就学前|2歳未満】の子を養育する労働者である。","exp":"短時間勤務（義務）は3歳未満が対象。原則1日6時間。","page":169},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"育児短時間勤務では、短縮後の所定労働時間を原則【1日6時間|1日5時間|1日4時間|1日7時間】とする措置を含めなければならない。","exp":"原則1日6時間。","page":169},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"令和7年4月改正により、【3歳未満|1歳未満|小学校就学前|2歳未満】の子を養育する労働者に係る育児テレワーク導入が努力義務とされた。","exp":"3歳未満の子について育児目的のテレワーク導入が努力義務化（R7.4）。","page":170},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"令和7年10月新設の柔軟な働き方を実現するための措置の対象は、【3歳から小学校就学前|3歳未満|1歳から3歳|小学校就学後】の子を養育する労働者である。","exp":"R7.10新設。3歳から就学前が対象で、3歳未満の短時間勤務（義務）の後を担う。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"柔軟な働き方を実現するための措置では、事業主は5つの措置から【2つ以上|1つ以上|3つ以上|すべて】を選択して講じなければならない。","exp":"事業主は2つ以上を選択（選択的措置義務）、労働者はそのうち1つを選択利用。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"柔軟な働き方を実現するための措置について、労働者は事業主が講じた措置のうち【1つ|2つ|すべて|3つ】を選択して利用できる。","exp":"事業主は2つ以上講じ、労働者は1つを選択利用する。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"柔軟な働き方を実現するための措置のうちテレワーク等は、利用可能日数が月【10日以上|5日以上|20日以上|15日以上】であることが要件である。","exp":"テレワーク等は月10日以上が要件の一つ。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"柔軟な働き方を実現するための措置のうち養育両立支援休暇は、年【10日以上|5日以上|15日以上|20日以上】であることが要件である。","exp":"養育両立支援休暇は年10日以上が要件。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"柔軟な働き方を実現するための措置の選択肢には、始業時刻等の変更、テレワーク等、保育施設の設置運営等、養育両立支援休暇、【短時間勤務|介護休業|看護休暇|深夜業免除】が含まれる。","exp":"5つの措置は①始業時刻等変更②テレワーク等③保育施設等④養育両立支援休暇⑤短時間勤務。","page":160},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"令和7年10月改正により、仕事と育児の両立に関する【個別の意向聴取・配慮|公表義務|金銭給付|罰則|労使協定締結】が事業主に義務付けられた。","exp":"柔軟な働き方の措置とあわせて、個別の意向聴取・配慮が義務化（R7.10）。","page":169},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"介護のための選択的措置義務は、利用開始から連続【3年以上|1年以上|2年以上|5年以上】の期間で2回以上の利用を認める措置である。","exp":"介護は連続3年以上の期間で2回以上利用できる措置を選択的に講じる。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","text":"介護のための選択的措置では、利用開始から連続3年以上の期間で【2回以上|1回以上|3回以上|4回以上】の利用を可能とする。","exp":"連続3年以上の期間で2回以上の利用が要件。","page":171},{"law":"育児・介護休業法","cat":"介護休業","text":"介護休業の対象となる要介護状態とは、【2週間以上|1週間以上|1か月以上|3週間以上】にわたり常時介護を必要とする状態をいう。","exp":"要介護状態の定義は2週間以上にわたり常時介護を必要とする状態。","page":156},{"law":"育児・介護休業法","cat":"介護休業","text":"介護休業は、対象家族1人につき通算【93日|90日|180日|28日】まで取得できる。","exp":"通算93日が上限。出生時育休の28日や育休とは別の数値。","page":148},{"law":"育児・介護休業法","cat":"介護休業","text":"介護休業は、対象家族1人につき【3回|2回|1回|4回】まで分割して取得できる。","exp":"通算93日を3回まで分割可能。育休の分割2回と区別する。","page":156},{"law":"育児・介護休業法","cat":"介護休業","text":"介護休業の申出は、原則として休業開始予定日の【2週間前|1か月前|1週間前|2か月前】までに行う。","exp":"介護休業は原則2週間前。通常の育児休業の1か月前と異なる。","page":156},{"law":"育児・介護休業法","cat":"介護休業","text":"介護休業の通算93日は、【対象家族1人ごと|労働者の生涯で通算|1年度につき|事業所ごと】に取得できる。","exp":"93日は『対象家族1人につき』通算。対象家族が2人いればそれぞれ93日取得できる（労働者の生涯で93日ではない）。","page":156},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","text":"介護休暇は1年度につき【5日|10日|3日|93日】、対象家族が2人以上の場合は10日を限度に取得できる。","exp":"原則5日、2人以上で10日。看護等休暇と同じ日数体系。","page":162},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","text":"介護休暇は対象家族が2人以上の場合、1年度につき【10日|5日|15日|20日】を限度とする。","exp":"2人以上で10日。1人の5日と区別する。","page":162},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","text":"介護休暇は【時間単位|半日単位のみ|1日単位のみ|週単位】でも取得することができる。","exp":"時間単位取得が可能。","page":162},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","text":"令和7年4月改正により、介護休暇では勤続【6か月未満|1年未満|3か月未満|2年未満】の労働者を労使協定で除外する規定が廃止された。","exp":"R7.4で勤続6か月未満除外が廃止。子の看護等休暇と同様。","page":162},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","text":"介護休業・介護休暇の対象家族には、配偶者（事実婚を含む）、父母、子、配偶者の父母、祖父母、兄弟姉妹、【孫|いとこ|甥姪|叔父叔母】が含まれる。","exp":"対象家族は配偶者・父母・子・配偶者の父母・祖父母・兄弟姉妹・孫。","page":162},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","text":"介護休業の対象家族としての配偶者には、【事実婚を含む|事実婚を含まない|内縁を除く|婚姻届出のある者のみ】とされている。","exp":"配偶者には事実上婚姻関係と同様の事情にある者を含む。","page":156},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","text":"事業主は、育児休業等の申出・取得を理由として労働者に【不利益な取扱い|配置転換のみ|減給のみ|昇給停止のみ】をしてはならない。","exp":"申出・取得を理由とする不利益取扱いは広く禁止される。","page":167},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","text":"事業主は、育児休業等に関する言動による就業環境の害を防止するため【ハラスメント防止措置|努力義務にとどまる対応|罰則の制定|公表のみ】を講じる義務を負う。","exp":"いわゆるマタハラ・パタハラ等の防止措置義務がある。","page":169},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","text":"育児休業の取得状況の公表義務は、令和7年4月から常時雇用する労働者が【300人超|1,000人超|500人超|100人超】の事業主に拡大された。","exp":"R7.4から1,000人超→300人超に拡大。","page":169},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","text":"育児休業取得状況の公表義務の対象は、令和7年4月改正により、常時雇用する労働者が【300人超|1,000人超|500人超|100人超】の事業主に拡大された。","exp":"現行は300人超が対象（改正前は1,000人超）。試験は現行の300人超を問う。","page":169},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","text":"令和4年4月から、育児休業を取得しやすい【雇用環境の整備および個別周知・意向確認|金銭給付|公表のみ|罰則|労使協定締結】が事業主に義務付けられた。","exp":"R4.4から雇用環境整備と個別の周知・意向確認が義務化。","page":167},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","text":"令和7年4月から、【介護離職防止|育児給付増額|公表対象縮小|罰則強化】のための環境整備・情報提供・個別の周知・意向確認が事業主に義務付けられた。","exp":"R7.4で介護離職防止に向けた環境整備・情報提供・個別周知意向確認が新設。","page":167},{"law":"育児・介護休業法","cat":"給付・その他","text":"法24条1項は、【小学校就学前|3歳未満|小学校3年修了まで|1歳未満】の子を養育する労働者に対する育児休業等に準ずる措置を努力義務としている。","exp":"24条1項は就学前の子を養育する労働者への準ずる措置の努力義務。","page"       const wrong=(p.lastOK===false)?1:0;                       // 直近で間違えた

      const score=wrong*1000 + staleDays*15 + (q.w||2)*8 + Math.random()*50;
      return {q,score}; })
    .sort((a,b)=>b.score-a.score).map(o=>o.q);
  const out=unseenOrd.concat(seenOrd);
  return n?out.slice(0,n):out;
}

function connectSync(){
  if(unsub){ unsub(); unsub=null; }
  if(!fbReady){ return; }
  const code=syncCode();
  if(!code){ syncDoc=null; setSyncStatus('オフ',''); return; }
  setSyncStatus('接続中…','');
  try{
    syncDoc=firebase.firestore().collection('sync').doc(code);
    unsub=syncDoc.onSnapshot(snap=>{
      setSyncStatus('● 同期中','ok');
      if(!snap.exists){ pushNow(); return; }
      const ch=mergeRemote(snap.data()||{});
      if(ch){ saveAll(); softRerender(); pushNow(); }
    }, err=>{ setSyncStatus('接続エラー','err'); });
    pushNow();
  }catch(e){ setSyncStatus('接続エラー','err'); }
}
function mergeRemote(d){
  let ch=false;
  if(d.perQ){ for(const id in d.perQ){ const inc=d.perQ[id]||{}, cur=H.perQ[id];
    if(!cur){ H.perQ[id]={seen:inc.seen||0,correct:inc.correct||0,lastOK:(inc.lastOK==null?null:inc.lastOK),streak:inc.streak||0,ts:inc.ts||0}; ch=true; }
    else { const ns=Math.max(cur.seen||0,inc.seen||0), nc=Math.max(cur.correct||0,inc.correct||0); if(ns!==(cur.seen||0)||nc!==(cur.correct||0)){ cur.seen=ns; cur.correct=nc; ch=true; }
      if((inc.ts||0)>(cur.ts||0)){ cur.ts=inc.ts; if(inc.lastOK!=null)cur.lastOK=inc.lastOK; ch=true; } } } }
  if(d.log){ if(!S.logTs)S.logTs={}; for(const k in d.log){
    const rv=d.log[k]||0, lv=S.log[k]||0, rts=(d.logTs&&d.logTs[k])||0, lts=S.logTs[k]||0;
    /* 片方にでもタイムスタンプがあれば最終更新優先(LWW・修正が定着)。無ければ旧来のmax(後方互換) */
    const nv=(rts||lts)?(rts>lts?rv:lv):Math.max(lv,rv);
    if(nv!==lv){ S.log[k]=nv; ch=true; }
    if(rts>lts){ S.logTs[k]=rts; ch=true; }
  } }
  if(d.excluded){ for(const id in d.excluded){ if(d.excluded[id]&&!H.excluded[id]){ H.excluded[id]=1; ch=true; } } }
  if(d.daily){ for(const k in d.daily){ const v=Math.max(S.daily[k]||0,d.daily[k]||0); if(v!==(S.daily[k]||0)){ S.daily[k]=v; ch=true; } } }
  return ch;
}
function pushNow(){ if(!syncDoc) return; try{ flush(); syncDoc.set({perQ:H.perQ, log:S.log, logTs:S.logTs, excluded:H.excluded, daily:S.daily, ts:Date.now()},{merge:true}); }catch(e){} }
function schedulePush(){ if(!syncDoc) return; clearTimeout(pushTimer); pushTimer=setTimeout(pushNow,1500); }

/* ===== 日付・年号 計算ドリル ===== */
function sei2war(y){ if(y>=2019)return '令和'+(y-2018); if(y>=1989)return '平成'+(y-1988); if(y>=1926)return '昭和'+(y-1925); if(y>=1912)return '大正'+(y-1911); return '明治'+(y-1867); }
function rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function genDays(){
  const r=rnd(2,10), y=2018+r, m=rnd(1,12), d=rnd(1,28), N=rnd(10,200), after=Math.random()<0.7;
  const base=new Date(y,m-1,d), res=new Date(base); res.setDate(res.getDate()+(after?N:-N));
  const q='令和'+r+'年'+m+'月'+d+'日 の <b>'+N+'日'+(after?'後':'前')+'</b> は？';
  const ans=sei2war(res.getFullYear())+'年'+(res.getMonth()+1)+'月'+res.getDate()+'日';
  const exp='＝'+y+'/'+m+'/'+d+' の'+N+'日'+(after?'後':'前')+' → '+res.getFullYear()+'/'+(res.getMonth()+1)+'/'+res.getDate()+'。月の大小（4・6・9・11月＝30日、2月＝28/29日）に注意。「◯日後」は＋'+N+'日（起算日は数えない）。';
  return {mode:'sentaku',book:'keisan',law:'計算',cat:'日数',q,answer:ans,exp,page:null};
}
function genSpan(){
  const r=rnd(2,10), y=2018+r, m=rnd(1,11), d=rnd(1,20); const N=rnd(20,150);
  const a=new Date(y,m-1,d), b=new Date(a); b.setDate(b.getDate()+N);
  const q='令和'+r+'年'+m+'月'+d+'日 から 令和'+r+'年'+(b.getMonth()+1)+'月'+b.getDate()+'日 までは <b>何日間</b>？（初日を算入）';
  const ans=(N+1)+'日間';
  const exp='両端を含めると差の日数＋1。'+m+'/'+d+'〜'+(b.getMonth()+1)+'/'+b.getDate()+' は '+N+'日差 → 初日算入で '+(N+1)+'日間。';
  return {mode:'sentaku',book:'keisan',law:'計算',cat:'期間',q,answer:ans,exp,page:null};
}
function safeY(y){ return y!==1989 && y!==2019 && y>=1927 && y<=2033; }
function genEra(){
  const t=rnd(1,4);
  if(t===1){ // 和暦→西暦
    const eras=[['昭和',1925,30,63],['平成',1988,2,30],['令和',2018,2,12]]; const e=eras[rnd(0,2)];
    const yy=rnd(e[2],e[3]); const sei=e[1]+yy;
    return {mode:'sentaku',book:'keisan',law:'計算',cat:'和暦→西暦',q:e[0]+yy+'年 は西暦何年？',answer:'西暦'+sei+'年',
      exp:e[0]+'＋'+e[1]+'＝西暦。'+e[0]+yy+'＝'+e[1]+'＋'+yy+'＝'+sei+'年。（昭和＋1925／平成＋1988／令和＋2018）',page:null};
  }
  if(t===2){ // 西暦→和暦
    let sei; do{ sei=rnd(1955,2030); }while(!safeY(sei));
    return {mode:'sentaku',book:'keisan',law:'計算',cat:'西暦→和暦',q:'西暦'+sei+'年 は和暦で？',answer:sei2war(sei)+'年',
      exp:'西暦'+sei+'＝'+sei2war(sei)+'年。（〜1988=昭和-1925／1989〜2018=平成-1988／2019〜=令和-2018）',page:null};
  }
  if(t===3){ // N年前後
    let sei,N,dir,res; let g=0;
    do{ sei=rnd(1960,2025); N=rnd(5,40); dir=Math.random()<0.5?1:-1; res=sei+dir*N; g++; }while((!safeY(sei)||!safeY(res))&&g<50);
    const startW=sei2war(sei)+'年', resW=sei2war(res)+'年';
    return {mode:'sentaku',book:'keisan',law:'計算',cat:'◯年前後',q:startW+' の <b>'+N+'年'+(dir>0?'後':'前')+'</b> は？（和暦で）',answer:resW,
      exp:startW+'＝西暦'+sei+'年 →'+N+'年'+(dir>0?'後':'前')+'＝西暦'+res+'年＝'+resW+'。年号をまたぐので一度西暦に直すと確実。',page:null};
  }
  // 年齢
  const by=rnd(1955,2005), ref=2026, age=ref-by;
  return {mode:'sentaku',book:'keisan',law:'計算',cat:'年齢',q:sei2war(by)+'年生まれの人は、令和8年（誕生日到来後）で<b>満何歳</b>？',answer:'満'+age+'歳',
    exp:sei2war(by)+'年＝西暦'+by+'年。2026−'+by+'＝'+age+'歳。（誕生日前なら−1歳）',page:null};
}
function fmtW(d){ return sei2war(d.getFullYear())+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }
function genStartRule(){
  const t=rnd(1,4);
  if(t===1){ // 年齢到達日（誕生日の前日）
    const ages=[60,64,65,70,75], A=ages[rnd(0,4)], by=rnd(1955,2000), m=rnd(1,12), d=rnd(1,28);
    const reach=new Date(by+A,m-1,d); reach.setDate(reach.getDate()-1);
    return {mode:'sentaku',book:'keisan',law:'計算',cat:'年齢到達日',q:sei2war(by)+'年'+m+'月'+d+'日 生まれの人が <b>満'+A+'歳に達する日</b> は？',answer:fmtW(reach),
      exp:'「年齢計算ニ関スル法律」により年齢は誕生日の<b>前日</b>に加わる。'+(by+A)+'/'+m+'/'+d+' の前日＝'+fmtW(reach)+'。（例:4/1生まれは3/31に達する→学年・被保険者資格の判定で重要）',page:null};
  }
  if(t===2||t===3){ // 翌日から起算して◯か月/週を経過する日
    const r=rnd(2,10),y=2018+r,m=rnd(1,12),d=rnd(1,27); const ki=new Date(y,m-1,d); ki.setDate(ki.getDate()+1);
    let res,unitTxt;
    if(t===2){ const N=[1,2,3,6][rnd(0,3)]; const ou=new Date(ki); ou.setMonth(ou.getMonth()+N); res=new Date(ou); res.setDate(res.getDate()-1); unitTxt=N+'か月'; }
    else { const N=rnd(1,3); res=new Date(ki); res.setDate(res.getDate()+7*N-1); unitTxt=N+'週間'; }
    return {mode:'sentaku',book:'keisan',law:'計算',cat:'翌日起算',q:'令和'+r+'年'+m+'月'+d+'日 を基準に、<b>その翌日から起算して'+unitTxt+'を経過する日</b> は？',answer:fmtW(res),
      exp:m+'/'+d+'の翌日を起算日とし、'+unitTxt+'後の応当日の<b>前日</b>が「経過する日」→'+fmtW(res)+'。（「経過した日」はさらにその翌日）',page:null};
  }
  // 資格喪失日（退職日の翌日）
  const r=rnd(2,10),y=2018+r,m=rnd(1,12),d=rnd(1,28); const loss=new Date(y,m-1,d); loss.setDate(loss.getDate()+1);
  return {mode:'sentaku',book:'keisan',law:'計算',cat:'資格喪失日',q:'令和'+r+'年'+m+'月'+d+'日 に退職した場合、健康保険・厚生年金保険の <b>被保険者資格を喪失する日</b> は？',answer:fmtW(loss),
    exp:'資格喪失は「事実のあった日（退職日）の<b>翌日</b>」。'+m+'/'+d+'退職→'+fmtW(loss)+'喪失。（保険料は資格喪失日の属する月の"前月"分まで徴収）',page:null};
}
function genCalc(type,n){ const out=[]; for(let i=0;i<n;i++){ if(type==='days')out.push(Math.random()<0.75?genDays():genSpan()); else if(type==='era')out.push(genEra()); else if(type==='rule')out.push(genStartRule()); else { const r=Math.random(); out.push(r<0.3?genDays():(r<0.45?genSpan():(r<0.7?genEra():genStartRule()))); } } return out; }

/* ===== weak ===== */
function weakPool(pool){
  pool=pool.filter(q=>!isExcluded(q.id));
  const wrong=pool.filter(q=>H.perQ[q.id]&&H.perQ[q.id].lastOK===false);
  // group by law to find weak laws
  const grp={}; pool.forEach(q=>{(grp[q.book+'|'+q.law]=grp[q.book+'|'+q.law]||[]).push(q);});
  let fromWeakLaws=[];
  Object.values(grp).forEach(g=>{ const s=statOf(g); if(s.seen>=3&&s.acc<0.7){ fromWeakLaws=fromWeakLaws.concat(g.filter(q=>!(H.perQ[q.id]&&H.perQ[q.id].lastOK===true))); } });
  const ids=new Set(),out=[];
  [...wrong,...fromWeakLaws].forEach(q=>{if(!ids.has(q.id)){ids.add(q.id);out.push(q);}});
  return shuffle(out).slice(0,25);
}
function startWeak(scope){
  const pool=scope.type==='global'?QUESTIONS:byBook[scope.book];
  const list=weakPool(pool);
  if(!list.length){ renderEmptyWeak(scope); return; }
  startSession(list, (scope.type==='global'?'⭐ 全科目の苦手':'⭐ '+BOOKMAP[scope.book].label+' 苦手'), scope);
}
function renderEmptyWeak(scope){

function answer(choice){
  const s=session,item=s.list[s.idx],ok=(choice===item.a);
  rec(item.id,ok); bumpDaily(); renderTdg(); if(ok)s.score++; else s.wrong.push(item);
  document.getElementById('btns').style.display='none';
  const vd=document.getElementById('vd'); vd.className='verdict '+(ok?'ok':'ng'); vd.innerHTML=ok?'⭕ 正解！':'❌ 不正解…';
  if(ok && !s.excludeMode && item.id && H.perQ[item.id] && H.perQ[item.id].streak===3){ vd.innerHTML+=' <span class="autoex">🎉 3回連続正解 → 自動で除外しました</span>'; }
  document.getElementById('ca').textContent=item.a?'⚪︎（正しい）':'✕（誤り）';
  document.getElementById('exp').innerHTML=item.exp;
  document.getElementById('ref').innerHTML=refLine(item);
  document.getElementById('fb').style.display='block';
  const nx=document.getElementById('nx'); nx.textContent=(s.idx===s.list.length-1)?'結果を見る →':'次の問題 →'; nx.onclick=next;
  renderHeader();
}
function next(){ const s=session; s.idx++; if(s.idx>=s.list.length){endSession();} else renderCard(); }
function makeBlank(text){
  const kws=[]; let m; const re=/【([^】]+)】/g; while((m=re.exec(text))!==null)kws.push(m[1]);
  if(!kws.length) return {q:text,answer:'—',full:text};
  const nb=kws.length>=4?(Math.random()<0.4?2:1):1;
  const chosen=shuffle(kws.map((_,i)=>i)).slice(0,nb).sort((a,b)=>a-b);
  const numbered=chosen.length>1; const ans=[]; let c=0,bn=0;
  const q=text.replace(/【([^】]+)】/g,(w,kw)=>{ const pick=chosen.includes(c); c++; if(pick){ bn++; ans.push((numbered?('('+bn+') '):'')+kw); return numbered?('〔　？'+bn+'　〕'):'〔　？　〕'; } return kw; });
  c=0; const full=text.replace(/【([^】]+)】/g,(w,kw)=>{ const pick=chosen.includes(c); c++; return pick?('<b>'+kw+'</b>'):kw; });
  return {q,answer:ans.join(' ／ '),full};
}
function hasChoiceFmt(text){ return !!text && /【[^】]*\|[^】]*】/.test(text); }
function makeBlankChoice(text){
  const items=[]; let m; const re=/【([^】]+)】/g;
  while((m=re.exec(text))!==null){ const p=m[1].split('|').map(x=>x.trim()).filter(Boolean); items.push({correct:p[0], dist:p.slice(1)}); }
  const cand=items.map((it,i)=>i).filter(i=>items[i].dist.length>0);
  const pool=cand.length?cand:items.map((_,i)=>i);
  const pick=pool[Math.floor(Math.random()*pool.length)];
  let c=0; const q=text.replace(/【([^】]+)】/g,(w,inner)=>{ const cur=c++; const correct=inner.split('|')[0].trim(); return cur===pick?'〔　？　〕':correct; });
  c=0; const full=text.replace(/【([^】]+)】/g,(w,inner)=>{ const cur=c++; const correct=inner.split('|')[0].trim(); return cur===pick?('<b>'+correct+'</b>'):correct; });
  const ch=items[pick]; let choices=shuffle([ch.correct, ...ch.dist].slice(0,4));
  return {q, choices, answer:ch.correct, full};
}
function renderSentakuCard(){
  const s=session,item=s.list[s.idx];
  const head=`
    <div class="qhead"><span id="tdg">📅 本日 <b style="color:${todayCount()>=DAILY_GOAL?'#86efac':'var(--gold)'}">${todayCount()}</b>/${DAILY_GOAL}問${todayCount()>=DAILY_GOAL?' 🎉':''}</span><span class="qright"><span class="remain">残り${s.list.length-s.idx-1}問</span>正解 <b>${s.score}</b><button class="stopbtn" onclick="stopSession()">■ 中断</button></span></div>
    <div class="barwrap"><div class="bar" style="width:${s.idx/s.list.length*100}%"></div></div>`;
  const tag=`<div class="tag">${BOOKMAP[item.book].label}・${item.law}${item.w>=3?' <span class="hot">🔥頻出</span>':''} <span style="color:var(--gold)">${item.book==='keisan'?'計算ドリル':'選択式'}</span></div>`;
  const exbtn=item.id?`<button class="exbtn" onclick="${s.excludeMode?'reviveCur()':'excludeCur()'}">${s.excludeMode?'↩︎ 復活（通常出題に戻す）':'🚫 この問題を除外（もう出さない）'}</button>`:'';
  const refhtml=refLine(item);
  const nxLabel=(s.idx===s.list.length-1)?'結果を見る →':'次の問題 →';
  if(hasChoiceFmt(item.text)){
    const r=makeBlankChoice(item.text); s.cur=r;
    main.innerHTML=`${head}<div class="card">${tag}
      <div class="q">${r.q}</div>
      <div class="choices" id="choices">${r.choices.map((c,i)=>'<button class="choice" onclick="chooseAns('+i+')">'+c+'</button>').join('')}</div>
      <div class="feedback" id="fb">
        <div class="verdict" id="vd"></div>
        <div class="sans">正解：<b>${r.answer}</b></div>
        <div class="detail" style="border-left-color:var(--gold)">${r.full}</div>
        ${item.exp?`<div class="exp">${item.exp}</div>`:''}
        <div class="ref">${refhtml}</div>
        <button class="next" id="nx" onclick="next()">${nxLabel}</button>
        ${exbtn}
      </div>
    </div>`;
    return;
  }
  let qhtml,ans,full;
  if(item.text){ const r=makeBlank(item.text); qhtml=r.q; ans=r.answer; full=r.full; } else { qhtml=item.q; ans=item.answer; full=null; }
  main.innerHTML=`${head}<div class="card">${tag}
      <div class="q">${qhtml}</div>
      <div class="btns" id="btns"><button class="next" style="background:var(--gold);color:#3a2c05" onclick="revealS()">答えを見る 👀</button></div>
      <div class="feedback" id="fb">
        <div class="sans">空所の答え：<b>${ans}</b></div>
        ${full?`<div class="detail" style="border-left-color:var(--gold)">${full}</div>`:''}
        ${item.exp?`<div class="exp">${item.exp}</div>`:''}
        <div class="ref">${refhtml}</div>
        <div class="gradebtns">
          <button class="grade ng" onclick="gradeS(false)">❌ あやふや</button>
          <button class="grade ok" onclick="gradeS(true)">⭕ 覚えてた</button>
        </div>
        ${exbtn}
      </div>
    </div>`;
}
function revealS(){ const b=document.getElementById('btns'); if(b)b.style.display='none'; const f=document.getElementById('fb'); if(f)f.style.display='block'; }
function chooseAns(i){
  const s=session,item=s.list[s.idx],r=s.cur; if(!r)return; const ok=(r.choices[i]===r.answer);
  rec(item.id,ok); bumpDaily(); renderTdg(); if(ok)s.score++; else s.wrong.push(item);
  const cont=document.getElementById('choices');
  if(cont){ const bs=cont.querySelectorAll('button'); bs.forEach((b,bi)=>{ b.disabled=true; if(r.choices[bi]===r.answer)b.classList.add('ok'); else if(bi===i)b.classList.add('ng'); }); }
  const vd=document.getElementById('vd'); if(vd){ vd.className='verdict '+(ok?'ok':'ng'); vd.innerHTML=ok?'⭕ 正解！':'❌ 不正解…';
    if(ok&&!s.excludeMode&&item.id&&H.perQ[item.id]&&H.perQ[item.id].streak===3){ vd.innerHTML+=' <span class="autoex">🎉 3回連続正解 → 自動で除外しました</span>'; } }
  const fb=document.getElementById('fb'); if(fb)fb.style.display='block';
  renderHeader();
}
function gradeS(ok){ const s=session,item=s.list[s.idx]; rec(item.id,ok); bumpDaily(); renderTdg(); if(ok)s.score++; else s.wrong.push(item); renderHeader(); next(); }
function stopSession(){ const s=session; if(s&&s.idx>0&&s.idx<s.list.length){ if(!confirm(`ここまで ${s.idx}問 回答しました（履歴は保存済み）。中断しますか？`))return; } if(timer.running)stopStudy(); backFromSession(); }
function backFromSession(){ session=null; if(view==='home'){ goHome(); } else { selectTab('stats'); } }
function endSession(){
  if(timer.running)stopStudy(); /* 解き切ったら計測終了（タイマー停止漏れの暴走を防ぐ） */
  const s=session,pct=s.score/s.list.length;
  let grade,msg;
  if(pct===1){grade='🏆 パーフェクト！';msg='全問正解。完璧です！';}
  else if(pct>=0.85){grade='🌸 合格圏';msg='よく仕上がっています。間違えた論点だけ詰めましょう。';}
  else if(pct>=0.6){grade='📖 あと一歩';msg='苦手タブで弱点を重点復習しましょう。';}
  else{grade='💪 復習しよう';msg='テキストを読み直してから再挑戦を。';}
  let wlist='';
  if(s.wrong.length){ wlist='<div class="stitle" style="margin-top:14px">❌ 復習ポイント</div>'+
    s.wrong.map(w=>`<div class="lrow" style="cursor:default"><div class="lname" style="font-size:13px">${BOOKMAP[w.book].label}・${w.law}</div><div class="lsub" style="color:#cbd5e1">${w.exp}</div><div class="ref">${refLine(w)}</div></div>`).join(''); }
  const sc=s.scope;
  const again = sc.type==='global'?`goHome()`:`enterBook('${sc.book}')`;
  main.innerHTML=`
    <div class="sresult" style="display:flex">
      <div style="color:var(--sub);font-size:13px">${s.title} の結果</div>
      <div class="scorebig">${s.score}<span> / ${s.list.length}</span></div>
      <div class="grade">${grade}</div><div class="gmsg">${msg}</div>
      <div class="rbtns">
        <button class="rbtn primary" onclick="${again}">↩︎ 戻る</button>
        <button class="rbtn ghost" onclick="goHome()">📚 本棚へ</button>
      </div>${wlist}
    </div>`;
  renderHeader();
}

/* ===== book stats ===== */
function renderBookStats(){
  const o=statOf(byBook[curBook]);
  const rows=lawOrder[curBook].map(law=>({law,...statOf(byBookLaw[curBook][law])}));
  /* バー＝正解済問題数÷総問題数（直近の正誤で1問1カウント・0〜100%） */
  const rateOf=r=>r.total?r.mastered/r.total:0;
  rows.sort((a,b)=>{ if(a.seen===0&&b.seen===0)return 0; if(a.seen===0)return 1; if(b.seen===0)return -1; return rateOf(a)-rateOf(b); });
  let html=`<div class="stats">
    <div class="ov">
      <div class="ovcard"><div class="ovnum">${o.distinct}<span style="font-size:13px;color:#64748b">/${o.total}</span></div><div class="ovlbl">出題済</div></div>
      <div class="ovcard"><div class="ovnum">${o.seen}</div><div class="ovlbl">累計回答</div></div>
      <div class="ovcard"><div class="ovnum">${o.acc!==null?Math.round(o.acc*100)+'%':'—'}</div><div class="ovlbl">正答率</div></div>
    </div>
    <div class="stitle"><span>章別の成績（タップで演習開始）</span><span style="font-weight:600">弱い順</span></div>`;
  rows.forEach(r=>{
    const rate=r.seen===0?null:rateOf(r);
    let badge=r.seen===0?'<span class="badge none">未着手</span>':rate>=0.8?'<span class="badge good">得意</span>':(r.seen>=3&&rate<0.6)?'<span class="badge weak">苦手</span>':'';
    const pct=rate!==null?Math.round(rate*100)+'%':'—';
    html+=`<div class="lrow" onclick="selectTab('${r.law.replace(/'/g,"\\'")}')">
      <div class="lname"><span>${r.law}${qw(curBook,r.law)>=3?' <span class="hot">🔥</span>':''}${badge}</span><span class="pct" style="color:${accColor(rate)}">${pct}</span></div>
      <div class="lbar"><div style="width:${rate!==null?rate*100:0}%;background:${accColor(rate)}"></div></div>
      <div class="lsub">正解済 ${r.mastered}/${r.total} ・ 出題 ${r.distinct}/${r.total} ・ 回答 ${r.seen}（正答率 ${r.acc!==null?Math.round(r.acc*100)+'%':'—'}）</div></div>`;
  });
  html+=`<button class="resetbtn" onclick="resetHist()">🗑 全科目の履歴をリセット</button></div>`;
  main.innerHTML=html;
}
function resetHist(){ if(confirm('全科目の回答履歴をすべて消去します。よろしいですか？')){ H={perQ:{}}; save(); renderHeader(); if(view==='book')renderBookStats(); else renderHome(); } }

  const f=e.target.files&&e.target.files[0]; if(!f){return;}
  const r=new FileReader();
  r.onload=function(){ try{ applyImport(JSON.parse(r.result)); }catch(err){ alert('読み込みに失敗しました（ファイル形式が不正です）。'); } e.target.value=''; };
  r.readAsText(f);

goHome();
initFirebase();
