障害厚生年金","cat":"障害等級1級の額","q":"障害の程度が障害等級の1級に該当する者に支給する障害厚生年金の額は、報酬比例部分に相当する額の100分の125に相当する額である。","a":true,"exp":"〇。法50条のとおり。1級は報酬比例部分相当額の100分の125である。所定の要件に該当すれば加給年金額が加算される。","page":166,"detail":"設問のとおりで正しいです。本文「年金額:障害厚生年金【障害等級1級】」では、「障害の程度が障害等級の1級に該当する者に支給する障害厚生年金の額は、報酬比例部分に相当する額の100分の125に相当する額です」と明記されています。計算式も平均標準報酬額×5.481/1000×被保険者期間の月数×125/100+加給年金額とされています。根拠は法50条1項・2項です。"},{"law":"障害厚生年金","cat":"加給年金額","q":"障害厚生年金の加給年金額は、障害等級が1級、2級又は3級に該当する者に、その者の65歳未満の配偶者があるときに加算される。","a":false,"exp":"×。法50条の2により、障害厚生年金の加給年金額は障害等級1級又は2級に該当する者に加算される。3級には加算されない。","page":168,"detail":"設問は誤りです。本文「加給年金額:障害厚生年金」では、障害の程度が「障害等級の1級又は2級に該当する者」に支給する障害厚生年金について、65歳未満の配偶者があるときに加給年金額が加算されるとされています。設問は1級・2級・3級に該当する者としていますが、3級には加給年金額は加算されないため誤りです。根拠は法50条の2第1項・2項です。"},{"law":"障害厚生年金","cat":"最低保障額","q":"障害基礎年金を受けることができない場合において、障害厚生年金の額が障害基礎年金の額(2級の額)に4分の3を乗じて得た額に満たないときは、当該額を障害厚生年金の額とする。","a":true,"exp":"〇。法50条3項のとおり。最低保障額は780,900円×改定率×4分の3である。","page":168,"detail":"設問のとおりで正しいです。本文「障害厚生年金の最低保障額」では、障害基礎年金を受けることができない場合において、障害厚生年金の額が「国民年金法に規定する障害基礎年金の額(2級の額)に4分の3を乗じて得た額に満たないとき」は、当該額(780,900円×改定率×4分の3)を障害厚生年金の額とするとされています。設問はこの内容と一致します。根拠は法50条3項です。"},{"law":"障害厚生年金","cat":"額の改定請求","q":"障害厚生年金の額の改定請求は、原則として、障害厚生年金の受給権を取得した日又は実施機関の診査を受けた日から起算して3年を経過した日後でなければ行うことができない。","a":false,"exp":"×。法52条3項により、障害の程度が増進したことが明らかである場合を除き、受給権取得日又は診査を受けた日から起算して1年を経過した日後でなければ改定請求はできない。3年ではない。","page":170,"detail":"設問は誤りです。本文「年金額の改定:障害厚生年金 受給権者からの改定請求」では、改定請求は障害の程度が増進したことが明らかである等の場合を除き、「障害厚生年金の受給権を取得した日、又は、実施機関の診査を受けた日から起算して1年を経過した日後」でなければ行うことができないとされています。設問は「3年を経過した日後」としており、正しくは「1年を経過した日後」であるため誤りです。根拠は法52条2項・3項です。"},{"law":"障害厚生年金","cat":"支給停止","q":"障害厚生年金は、その受給権者が当該傷病について労働基準法の規定による障害補償を受ける権利を取得したときは、3年間、その支給を停止する。","a":false,"exp":"×。法54条1項により、障害厚生年金は労働基準法の障害補償を受ける権利を取得したときは6年間支給停止される。3年間ではない。","page":173,"detail":"設問は誤りです。本文「支給停止:障害厚生年金」では、障害厚生年金は、その受給権者が当該傷病について労働基準法の規定による障害補償を受ける権利を取得したときは「6年間、その支給を停止します」とされています。設問は「3年間」としており、正しくは「6年間」であるため誤りです。根拠は法54条です。"},{"law":"障害厚生年金","cat":"失権","q":"障害等級に該当する障害の状態にない者が65歳に達したときは、原則として障害厚生年金の受給権は消滅する。","a":true,"exp":"〇。法53条のとおり。ただし障害状態に該当しなくなった日から障害状態に該当することなく3年を経過していないときは除かれる。","page":173,"detail":"設問のとおりで正しいです。本文「失権:障害厚生年金」では、障害等級(1級、2級及び3級)に該当する障害の状態にない者が「65歳に達したとき」は受給権が消滅するとされています。ただし「障害等級に該当する程度の障害の状態に該当しなくなった日から起算して当該障害の状態に該当することなく3年を経過していないときを除く」とされており、設問はこの原則を述べたものとして正しいです。根拠は法53条です。"},{"law":"障害手当金","cat":"支給要件","q":"障害手当金は、初診日から起算して5年を経過する日までの間に、その傷病が治ったこと等を要件として支給される。","a":true,"exp":"〇。法55条のとおり。傷病が治った日にその傷病により政令で定める程度の障害の状態にあること、障害厚生年金と同様の保険料納付要件を満たすこと等が要件である。","page":176,"detail":"設問のとおりで正しいです。本文「支給要件:障害手当金」では、障害手当金の支給要件として、初診日において被保険者であったこと、「初診日から起算して5年を経過する日までの間に、その傷病が治ったこと」、治った日において政令で定める程度の障害の状態にあること、障害厚生年金と同様の保険料納付要件を満たすことが挙げられています。設問はこの要件と一致します。根拠は法55条です。"},{"law":"障害手当金","cat":"支給額","q":"障害手当金の額は、障害厚生年金の額の規定の例により計算した額の100分の125に相当する額である。","a":false,"exp":"×。法57条により、障害手当金の額は障害厚生年金の額の規定の例により計算した額の100分の200に相当する額である。100分の125は障害等級1級の障害厚生年金の率である。","page":177,"detail":"設問は誤りです。本文「支給額:障害手当金」では、障害手当金の額は「障害厚生年金の額の規定の例により計算した額の100分の200に相当する額」とするとされています。設問は「100分の125」としていますが、これは障害等級1級の障害厚生年金の率であり、障害手当金は100分の200が正しいため誤りです。根拠は法57条です。"},{"law":"障害手当金","cat":"最低保障額","q":"障害手当金の額が障害厚生年金の最低保障額に2を乗じて得た額に満たないときは、当該額を障害手当金の額とする。","a":true,"exp":"〇。法57条のとおり。障害厚生年金の最低保障額×2が障害手当金の最低保障額となる。","page":178,"detail":"設問は正しいです。p.178「最低保障額」の規定により、障害手当金の額として計算した額が「障害基礎年金を受けることができない場合の障害厚生年金の最低保障額」に「2」を乗じて得た額に満たないときは、当該額(障害厚生年金の最低保障額×2)を障害手当金の額とします。令和7年度価額では昭和31年4月2日以後生まれの者で1,244,000円(780,900円×改定率×4分の3×2)となります。根拠は法57条、国民年金法による改定率の改定等に関する政令1条です。"},{"law":"遺族厚生年金","cat":"支給要件","q":"遺族厚生年金の長期要件は、保険料納付済期間と保険料免除期間とを合算した期間が25年以上である者が死亡したときである。","a":true,"exp":"〇。法58条のとおり。長期要件は25年以上である。短期要件(被保険者の死亡等)と長期要件のいずれにも該当するときは、別段の申出がなければ短期要件に該当したものとみなす。","page":182,"detail":"設問は正しいです。p.182の支給要件❹(長期要件)により、「保険料納付済期間と保険料免除期間とを合算した期間が25年以上である者が、死亡したとき」は遺族厚生年金が支給されます。なお❶から❸を短期要件、❹を長期要件といい、p.183のとおりこの「25年」には期間短縮特例(生年月日の特例等)が適用されます。根拠は法58条です。"},{"law":"遺族厚生年金","cat":"支給要件","q":"被保険者であった者が、被保険者の資格を喪失した後に、被保険者であった間に初診日がある傷病により当該初診日から起算して5年を経過する日前に死亡したときは、遺族厚生年金の短期要件に該当する。","a":true,"exp":"〇。法58条のとおり。資格喪失後に被保険者であった間の初診日から5年以内に死亡したときは短期要件に該当する。","page":182,"detail":"設問は正しいです。p.182の支給要件❷により、「被保険者であった者が、被保険者の資格を喪失した後に、被保険者であった間に初診日がある傷病により当該初診日から起算して5年を経過する日前に死亡したとき」は遺族厚生年金が支給され、これは短期要件に該当します(❶から❸が短期要件)。根拠は法58条です。"},{"law":"遺族厚生年金","cat":"遺族の範囲","q":"遺族厚生年金を受けることができる夫、父母又は祖父母は、被保険者等の死亡当時60歳以上であることが要件である。","a":false,"exp":"×。法59条1項により、夫、父母、祖父母は55歳以上であることが要件である。60歳以上ではない。なお妻は年齢要件がない。","page":185,"detail":"設問は誤りです。p.185「遺族の範囲の要件」によれば、夫・父母・祖父母は「55歳以上であること」が要件であり、60歳以上ではありません。また妻は「年齢、障害状態などに関係なく遺族となります」とされ年齢要件がありません。根拠は法59条1項・3項です。"},{"law":"遺族厚生年金","cat":"遺族の範囲","q":"遺族厚生年金を受けることができる子又は孫は、現に婚姻していないこと、かつ18歳に達する日以後最初の3月31日までの間にあること又は20歳未満であって障害等級1級若しくは2級に該当する障害状態にあることが要件である。","a":true,"exp":"〇。法59条1項のとおり。子又は孫の年齢・障害要件である。","page":185,"detail":"設問は正しいです。p.185「遺族の範囲の要件」により、子・孫は「現に婚姻していないこと」、かつ「❶18歳に達する日以後最初の3月31日までの間にあること」又は「❷20歳未満であって障害等級の1級又は2級に該当する障害状態にあること」が要件です。根拠は法59条1項・3項です。"},{"law":"遺族厚生年金","cat":"死亡の推定","q":"船舶が沈没した際現にその船舶に乗っていた被保険者の生死が6か月間わからない場合に、その船舶が沈没した日に、その者は死亡したものと推定する。","a":false,"exp":"×。法59条の2により、死亡の推定は生死が3か月間わからない場合等に行われる。6か月間ではない。航空機による事故も同様である。","page":184,"detail":"設問は誤りです。p.184「死亡の推定」の規定では、船舶が沈没等した際現にその船舶に乗っていた被保険者等の生死が「3か月間」わからない場合に、その船舶が沈没等した日にその者は死亡したものと推定します。設問の「6か月間」は誤りです。根拠は法59条の2です。"},{"law":"遺族厚生年金","cat":"年金額","q":"遺族厚生年金の額は、死亡した者の被保険者期間を基礎として老齢厚生年金の額の規定の例により計算した額の3分の2に相当する額である。","a":false,"exp":"×。法60条1項により、遺族厚生年金の額は報酬比例部分の年金額の4分の3に相当する額が原則である。3分の2ではない。短期要件の場合は被保険者期間の月数が300に満たないときは300とする。","page":187,"detail":"設問は誤りです。p.187「年金額:遺族厚生年金」によれば、遺族厚生年金の額は死亡した者の被保険者期間を基礎として「老齢厚生年金の額」の規定の例により計算した額の「4分の3」に相当する額であり、3分の2ではありません。また短期要件に該当する場合は被保険者期間の月数が300に満たないときはこれを300として計算します。根拠は法60条1項です。"},{"law":"遺族厚生年金","cat":"老齢厚生年金との調整","q":"65歳以上の遺族厚生年金の受給権者が老齢厚生年金の受給権を有するときは、遺族厚生年金のうち当該老齢厚生年金の額に相当する部分の支給を停止する。","a":true,"exp":"〇。法64条の2のとおり。65歳以上では老齢厚生年金を優先して支給し、遺族厚生年金の老齢厚生年金相当部分を支給停止する。","page":189,"detail":"設問は正しいです。p.189「支給停止:遺族厚生年金【老齢厚生年金との調整】」により、65歳以上の遺族厚生年金の受給権者が老齢厚生年金の受給権を有するときは、遺族厚生年金のうち当該老齢厚生年金の額(加給年金額を除きます)に相当する部分の支給を停止します。老齢厚生年金を優先して支給する仕組みです。根拠は法61条3項、64条の2です。"},{"law":"遺族厚生年金","cat":"中高齢の寡婦加算","q":"中高齢の寡婦加算は、遺族厚生年金の受給権者である妻であって、その権利を取得した当時40歳以上65歳未満であった者等に加算される。","a":true,"exp":"〇。法62条1項のとおり。40歳以上65歳未満の妻等に加算される。長期要件の場合は被保険者期間が240月以上ないと加算されない。","page":192,"detail":"設問は正しいです。p.192「中高齢の寡婦加算」により、遺族厚生年金の受給権者である妻であって「その権利を取得した当時40歳以上65歳未満であったもの」等には中高齢の寡婦加算額が加算されます。ただし長期要件に該当する場合は、被保険者期間が240月(中高齢の期間短縮措置に該当する場合はその期間)以上ないと加算は行われません。根拠は法62条1項、昭60法附則61条1項です。"},{"law":"遺族厚生年金","cat":"中高齢の寡婦加算額","q":"中高齢の寡婦加算額は、遺族基礎年金の額に2分の1を乗じて得た額である。","a":false,"exp":"×。法62条1項により、中高齢の寡婦加算額は遺族基礎年金の額に4分の3を乗じて得た額である。2分の1ではない。令和7年度価額は623,800円である。","page":193,"detail":"設問は誤りです。p.193「中高齢の寡婦加算額」によれば、中高齢の寡婦加算額は「遺族基礎年金の額に4分の3を乗じて得た額」であり、2分の1ではありません。令和7年度価額では623,800円です。根拠は法62条1項です。"},{"law":"遺族厚生年金","cat":"経過的寡婦加算","q":"経過的寡婦加算は、遺族厚生年金の受給権者であって昭和31年4月1日以前に生まれた妻が65歳に達したとき等に加算される。","a":true,"exp":"〇。昭60法附則73条のとおり。中高齢の寡婦加算が65歳で終了することにより年金額が低下する事態を防止するための加算である。","page":195,"detail":"設問は正しいです。p.195「経過的寡婦加算」により、遺族厚生年金の受給権者であって「昭和31年4月1日以前に生まれたもの」(死亡した被保険者等の妻であった者に限る)がその権利を取得した当時65歳以上であったとき、又は中高齢の寡婦加算が加算された遺族厚生年金の受給権者であって昭和31年4月1日以前に生まれたものが65歳に達したときに、経過的寡婦加算が加算されます。根拠は昭60法附則73条1項・2項です。"},{"law":"遺族厚生年金","cat":"夫等の支給停止","q":"夫、父母又は祖父母に対する遺族厚生年金は、受給権者が65歳に達するまでの期間、その支給を停止する。","a":false,"exp":"×。法65条の2により、夫、父母又は祖父母に対する遺族厚生年金は受給権者が60歳に達するまでの期間支給停止される。65歳ではない。ただし夫が同一事由の遺族基礎年金の受給権を有するときは支給停止されない。","page":196,"detail":"設問は誤りです。p.196「支給停止:遺族厚生年金【夫等の支給停止】」によれば、夫、父母又は祖父母に対する遺族厚生年金は、受給権者が「60歳に達するまで」の期間その支給を停止するものであり、65歳ではありません。ただし夫に対する遺族厚生年金は、夫が同一事由に基づく遺族基礎年金の受給権を有するときはこの支給停止は行われません。根拠は法65条の2です。"},{"law":"遺族厚生年金","cat":"子の支給停止","q":"配偶者と子が遺族厚生年金の受給権者となったときは、配偶者が遺族厚生年金の受給権を有する期間、配偶者に遺族厚生年金を支給し、子に対する遺族厚生年金は支給を停止する。","a":true,"exp":"〇。法66条1項のとおり。配偶者と子では配偶者が優先される。","page":197,"detail":"設問は正しいです。p.197「支給停止:遺族厚生年金【子の支給停止】」により、配偶者と子が遺族厚生年金の受給権者となったときは、配偶者が遺族厚生年金の受給権を有する期間、配偶者に遺族厚生年金を支給し、子に対する遺族厚生年金は支給を停止します。根拠は法66条1項です。"},{"law":"遺族厚生年金","cat":"失権","q":"遺族厚生年金の受給権者である妻が婚姻したときは、その受給権は消滅する。","a":true,"exp":"〇。法63条1項のとおり。婚姻(内縁関係を含む)したときは失権する。直系血族及び直系姻族以外の者の養子となったとき等も失権事由である。","page":199,"detail":"設問は正しいです。p.199「失権:遺族厚生年金 すべての受給権者に共通の失権事由」により、受給権者が「婚姻(内縁関係を含みます)したとき」はその受給権が消滅します。同様に「直系血族及び直系姻族以外の者の養子となったとき」や「離縁による親族関係の終了」も失権事由です。根拠は法63条1項です。"},{"law":"遺族厚生年金","cat":"30歳未満の妻の失権","q":"遺族厚生年金の受給権を取得した当時30歳未満である妻が、当該遺族厚生年金と同一の支給事由に基づく遺族基礎年金の受給権を取得しないときは、受給権を取得した日から起算して5年を経過したときに受給権が消滅する。","a":true,"exp":"〇。法63条1項のとおり。子のない30歳未満の妻の遺族厚生年金は5年で失権する。","page":200,"detail":"設問は正しいです。p.200「失権:遺族厚生年金 30歳未満の妻に係る失権事由」により、遺族厚生年金の受給権を取得した当時30歳未満である妻が当該遺族厚生年金と同一の支給事由に基づく遺族基礎年金の受給権を取得しないときは、当該遺族厚生年金の受給権を取得した日から起算して5年を経過したときに受給権が消滅します。根拠は法63条1項です。"},{"law":"遺族厚生年金","cat":"特例遺族年金","q":"特例遺族年金の額は、特別支給の老齢厚生年金の額の100分の50相当額である。","a":true,"exp":"〇。法附則28条の4のとおり。第1号厚生年金被保険者期間と旧共済組合員期間を合算して20年以上ある者が死亡した場合等に支給される。","page":201,"detail":"設問は正しいです。p.201「年金額:特例遺族年金」によれば、特例遺族年金の額は「特別支給の老齢厚生年金の額(定額部分と報酬比例部分と合わせた額)の100分の50相当額」です。根拠は法附則28条の4第2項です。"},{"law":"その他","cat":"脱退一時金","q":"脱退一時金は、被保険者期間が6月以上である日本国籍を有しない者であって、保険料納付済期間と保険料免除期間とを合算した期間が10年に満たないもの等が請求できる。","a":true,"exp":"〇。法附則29条のとおり。日本国籍を有しない者で受給資格期間を満たさない者への給付である。日本国内に住所を有するときは請求できない。","page":204,"detail":"設問は正しいです。p.204「支給要件:脱退一時金」により、当分の間、被保険者期間が6月以上である日本国籍を有しない者(国民年金の被保険者でない者に限る)であって、保険料納付済期間と保険料免除期間とを合算した期間が10年に満たないもの等は脱退一時金を請求できます。ただし「日本国内に住所を有するとき」は請求することができません。根拠は法附則29条1項、令12条です。"},{"law":"その他","cat":"脱退一時金","q":"脱退一時金の支給額の算定に際しては、平均標準報酬額に再評価率を用いる。","a":false,"exp":"×。法附則29条により、脱退一時金の平均標準報酬額の算定に際しては再評価率を用いない。","page":205,"detail":"設問は誤りです。p.205「支給額:脱退一時金」の注意書きのとおり、脱退一時金の額は被保険者であった期間の平均標準報酬額に支給率を乗じて得た額ですが、その平均標準報酬額の算定に際しては「再評価率を用いません」。設問は再評価率を用いるとしており誤りです。根拠は法附則29条3項です。"},{"law":"その他","cat":"脱退一時金","q":"脱退一時金は、最後に国民年金の被保険者の資格を喪失した日等から起算して3年を経過しているときは、請求することができない。","a":false,"exp":"×。法附則29条1項により、脱退一時金は最後に国民年金の被保険者の資格を喪失した日等から起算して2年を経過しているときは請求できない。3年ではない。","page":204,"detail":"設問は誤りです。本文では脱退一時金の支給を請求することができない場合として「最後に国民年金の被保険者の資格を喪失した日(同日において日本国内に住所を有していた者にあっては、同日後初めて、日本国内に住所を有しなくなった日)から起算して2年を経過しているとき」と定めており、設問の「3年」が誤りで正しくは「2年」です。このほか「日本国内に住所を有するとき」「障害厚生年金その他政令で定める保険給付(障害手当金等)の受給権を有したことがあるとき」も請求できない場合とされています。根拠は法附則29条1項、令12条です。"},{"law":"その他","cat":"脱退手当金","q":"脱退手当金は、昭和16年4月1日以前生まれであり、被保険者期間が10年以上ある等の要件を満たした者に支給される。","a":false,"exp":"×。昭60法附則75条により、脱退手当金は被保険者期間が5年以上あること等が要件である。10年以上ではない。60歳に達していること等も要件となる。","page":208,"detail":"設問は誤りです。本文の脱退手当金の支給要件では「被保険者期間が5年以上あること」とされており、設問の「10年以上」は誤りです。また要件はこれだけでなく「昭和16年4月1日以前生まれであること」「老齢年金(老齢厚生年金を含みます)を受けるのに必要な期間を満たしていないこと」「60歳に達していること」「被保険者資格を喪失していること」「通算老齢年金又は障害年金(障害厚生年金を含みます)の受給権者でないこと」等のいずれをも満たす必要があります。根拠は昭60法附則75条ほかです。"},{"law":"その他","cat":"給付制限","q":"被保険者又は被保険者であった者が、故意に障害又はその直接の原因となった事故を生じさせたときは、当該障害を支給事由とする障害厚生年金又は障害手当金は支給しない。","a":true,"exp":"〇。法73条のとおり。故意による障害は絶対的給付制限の対象となり、支給されない。","page":210,"detail":"設問は正しいです。本文の障害に係る絶対的給付制限では「被保険者又は被保険者であった者が、故意に障害又はその直接の原因となった事故を生じさせたとき」は「当該障害を支給事由とする障害厚生年金又は障害手当金は、支給しません」と定めています。故意による場合は給付を一切行わない絶対的給付制限であり、設問の内容と一致します。根拠は法73条です。"},{"law":"その他","cat":"給付制限","q":"被保険者であった者が、自己の故意の犯罪行為により障害を生じさせたときは、保険給付の全部を行わない。","a":false,"exp":"×。法73条の2により、故意の犯罪行為、重大な過失等による場合は保険給付の全部又は一部を行わないことができる相対的給付制限である。全部を行わないと断定はできない。","page":210,"detail":"設問は誤りです。本文の相対的給付制限では「自己の故意の犯罪行為」「重大な過失」「正当な理由がなくて療養に関する指示に従わないこと」により障害もしくは死亡又はこれらの原因となった事故を生じさせたとき等は「保険給付の全部又は一部を行わないことができます」と定めています。「全部を行わない」のではなく「全部又は一部を行わないことができる」相対的給付制限であり、設問は誤りです。根拠は法73条の2です。"},{"law":"離婚分割","cat":"合意分割","q":"合意分割は、平成19年4月1日以後に離婚等をした場合において、当事者間の合意や裁判手続により按分割合を定めたときに、当事者の一方からの請求によって保険料納付記録を分割できる制度である。","a":true,"exp":"〇。法78条の2のとおり。平成19年4月1日以後の離婚であれば、平成19年4月1日前の婚姻期間も分割の対象となる。","page":216,"detail":"設問は正しいです。本文では「離婚等をした場合における特例」を「平成19年4月1日以後に離婚等をした場合において、離婚等をした当事者間の合意や裁判手続により按分割合を定めたときに、その当事者の一方からの請求によって、婚姻期間等の保険料納付記録を当事者間で分割することができる制度」と説明し、一般に「合意分割」と呼ばれるとしています。なお注意書きで「平成19年4月1日以後に離婚等をしたのであれば、平成19年4月1日前の婚姻期間も分割の対象となります」と明記されています。根拠は法78条の2第1項等です。"},{"law":"離婚分割","cat":"合意分割の請求期限","q":"合意分割の標準報酬改定請求は、離婚が成立した日等の翌日から起算して原則として2年を経過したときは行うことができない。","a":false,"exp":"×。法78条の2により、合意分割の標準報酬改定請求は離婚が成立した日等の翌日から起算して5年を経過したときは行えない。2年は3号分割の請求期限である。","page":217,"detail":"設問は誤りです。本文の合意分割「標準報酬の改定の特例」では「離婚が成立した日又は婚姻が取り消された日などの翌日から起算して5年を経過したときは、標準報酬改定請求をすることができません」と定めており、設問の「2年」は誤りで正しくは「5年」です。設問の「2年」は3号分割標準報酬改定請求の請求期限であり、混同に注意します。根拠は法78条の2第1項、78条の3第1項です。"},{"law":"離婚分割","cat":"第1号改定者・第2号改定者","q":"第1号改定者とは標準報酬が減額して改定される者(分割をされる側)をいい、第2号改定者とは標準報酬が増額して改定される者(分割を受ける側)をいう。","a":true,"exp":"〇。法78条の2第1項のとおり。分割をされる側が第1号改定者、分割を受ける側が第2号改定者である。","page":218,"detail":"設問は正しいです。本文の合意分割の用語の定義では「第1号改定者」を「被保険者又は被保険者であった者であって、標準報酬が減額して改定されるもの(分割をされる側)」、「第2号改定者」を「第1号改定者の配偶者であった者であって、標準報酬が増額して改定され、又は決定されるもの(分割を受ける側)」と定めています。設問の内容はこの定義と一致します。根拠は法78条の2第1項、78条の3第1項です。"},{"law":"離婚分割","cat":"按分割合の範囲","q":"合意分割の請求すべき按分割合は、当事者それぞれの対象期間標準報酬総額の合計額に対する第2号改定者の対象期間標準報酬総額の割合を超え、3分の2以下の範囲内で定められなければならない。","a":false,"exp":"×。法78条の3第1項により、按分割合の上限は2分の1以下である。3分の2以下ではない。下限は第2号改定者の従来割合である。","page":220,"detail":"設問は誤りです。本文では「請求すべき按分割合は、当事者それぞれの対象期間標準報酬総額の合計額に対する第2号改定者の対象期間標準報酬総額の割合を超え2分の1以下の範囲(按分割合の範囲)内で定められなければならない」と定めており、上限は「2分の1以下」であって設問の「3分の2以下」は誤りです。下限は「第2号改定者の従来の対象期間標準報酬総額の割合を超え」る範囲とされます。根拠は法78条の3第1項です。"},{"law":"離婚分割","cat":"3号分割","q":"3号分割の対象となるのは、平成20年4月1日以後の国民年金の第3号被保険者期間に限られる。","a":true,"exp":"〇。法78条の14、平16法附則49条のとおり。3号分割の標準報酬の分割対象は平成20年4月1日以後の期間に限られる。","page":227,"detail":"設問は正しいです。本文の3号分割「特定被保険者及び被扶養配偶者についての標準報酬の特例」では、注意書きで「標準報酬の分割の対象となるのは、平成20年4月1日以後の期間に限られます」と明記されています。また「被扶養配偶者である期間についての特例」の学習ポイントでも「平成20年4月1日以降の国民年金の第3号被保険者期間について」分割できる制度であると説明されています。根拠は法78条の14第1項、平16法附則49条です。"},{"law":"離婚分割","cat":"3号分割","q":"3号分割では、特定期間に係る被保険者期間の各月ごとに、特定被保険者の標準報酬月額に2分の1を乗じて得た額に改定・決定する。","a":true,"exp":"〇。法78条の14第2項のとおり。標準報酬月額及び標準賞与額をそれぞれ2分の1に分割する。","page":230,"detail":"設問は正しいです。本文の3号分割の標準報酬の改定及び決定では、実施機関は「特定期間に係る被保険者期間の各月ごとに、当該特定被保険者及び被扶養配偶者の標準報酬月額を当該特定被保険者の標準報酬月額(従前標準報酬月額が当該月の標準報酬月額とみなされた月にあっては、従前標準報酬月額)に2分の1を乗じて得た額にそれぞれ改定し、及び決定することができる」と定めています。標準賞与額についても同様に特定被保険者の標準賞与額に「2分の1」を乗じて得た額に改定・決定します。根拠は法78条の14第2項・3項・5項です。"},{"law":"離婚分割","cat":"離婚時みなし被保険者期間","q":"離婚時みなし被保険者期間は、老齢厚生年金の受給資格期間に算入される。","a":false,"exp":"×。法78条の11により、離婚時みなし被保険者期間は老齢厚生年金の受給資格期間には算入しない。報酬比例部分の額の計算の基礎となる被保険者期間の月数には算入する。","page":223,"detail":"設問は誤りです。本文の離婚時みなし被保険者期間の取扱いでは「含めないもの」として「老齢厚生年金の受給資格期間には算入しません」と明記されており、設問の「受給資格期間に算入される」は誤りです。一方「含めるもの」として「報酬比例部分の額の計算の基礎となる被保険者期間の月数には算入します」とされており、額の計算には反映されます。根拠は法78条の11、附則17条の10、令3条の12の3ほかです。"},{"law":"離婚分割","cat":"離婚時みなし被保険者期間","q":"離婚時みなし被保険者期間は、老齢厚生年金の加給年金額の要件となる被保険者期間の月数(240以上)には含まれない。","a":true,"exp":"〇。法78条の11のとおり。加給年金額の要件(240以上)には含まれないが、加給年金額が支給停止となる要件である被保険者期間の月数(240以上)には算入する。","page":223,"detail":"設問は正しいです。本文の離婚時みなし被保険者期間の取扱いでは「含めないもの」として「老齢厚生年金の加給年金額の要件となる被保険者期間の月数(240以上)には含みません」と明記されており、設問は正しいです。これに対し「含めるもの」として「加給年金額が支給停止となる要件である被保険者期間の月数(240以上)には算入します」とされており、加給年金額の要件(発生)と支給停止要件で取扱いが異なる点に注意します。根拠は法78条の11、附則17条の10ほかです。"},{"law":"離婚分割","cat":"合意分割と3号分割の関係","q":"合意分割が行われる場合に、その対象期間中に3号分割に係る特定期間となるべき期間がある場合は、合意分割を優先する。","a":false,"exp":"×。法78条の20により、合意分割の対象期間中に3号分割に係る特定期間がある場合は、3号分割を優先する。まず3号分割の改定・決定を行い、その後に合意分割を行う。","page":233,"detail":"設問は誤りです。本文の合意分割と3号分割の関係では「合意分割が行われる場合に、その対象期間中に3号分割に係る特定期間となるべき期間がある場合は、3号分割を優先します」と定めており、設問の「合意分割を優先する」は誤りです。参考にも「標準報酬については、まず、3号分割の規定による改定・決定、その後に合意分割の規定による改定・決定を行います」と明記されています。根拠は法78条の20第1項・2項です。"},{"law":"保険料","cat":"保険料の徴収","q":"保険料は、被保険者期間の計算の基礎となる各月につき徴収する。","a":true,"exp":"〇。法81条2項のとおり。各月につき保険料を徴収する。保険料額は標準報酬月額及び標準賞与額にそれぞれ保険料率を乗じて得た額である。","page":242,"detail":"設問は正しいです。本文の保険料の徴収では「保険料は、被保険者期間の計算の基礎となる各月につき、徴収します」と定めており、設問と一致します。また保険料額は「標準報酬月額及び標準賞与額にそれぞれ保険料率を乗じて得た額」とされます。根拠は法81条1項・2項・3項です。"},{"law":"保険料","cat":"保険料率","q":"第1号厚生年金被保険者に係る保険料率は、平成29年9月以降、1000分の178.28となっている。","a":false,"exp":"×。法81条4項、平16法附則33条により、原則の保険料率は平成29年9月以降1000分の183.00で固定されている。1000分の178.28は平成27年9月から平成28年8月までの率である。","page":243,"detail":"設問は誤りです。本文の保険料率の表によれば、原則(第1号厚生年金被保険者に相当)の保険料率は段階的に引き上げられ「平成29年9月~」以降は1000分の183.00で固定されており、設問の「178.28」は誤りです。「178.28」は「平成27年9月~平成28年8月」の率であり、混同に注意します。根拠は法81条4項、平16法附則33条です。"},{"law":"保険料","cat":"保険料の徴収の特例(育児休業)","q":"育児休業等をしている被保険者が使用される事業所の事業主が実施機関に申出をしたときは、所定の月の当該被保険者に係る保険料の徴収は行わない。","a":true,"exp":"〇。法81条の2第1項のとおり。事業主の申出により育児休業等期間中の保険料が免除される。この特例の対象は最長で子が3歳に達するまでの間である。","page":244,"detail":"設問は正しいです。本文の保険料の徴収の特例(育児休業等の期間)では「育児休業等をしている被保険者が使用される事業所の事業主が、実施機関に申出をしたときは、次の区分に応じ、それぞれに定める月の当該被保険者に係る保険料……の徴収は行いません」と定めており、設問と一致します。注意書きで「この特例の対象となるのは、最長で子が3歳に達するまでの間です」とされています。根拠は法81条の2第1項・3項です。"},{"law":"保険料","cat":"保険料の徴収の特例(産前産後)","q":"産前産後休業期間中の保険料の徴収の特例の適用を受けた期間は、保険料の拠出を行わなかった期間とされる。","a":false,"exp":"×。法27条等により、保険料の徴収の特例の適用を受けた期間は、保険料の拠出を行った期間とされる。免除されても年金額計算上は納付した期間として扱われる。","page":245,"detail":"設問は誤りです。本文の特例期間中の保険料の拠出では「『保険料の徴収の特例』の適用を受けた期間は、保険料の拠出を行った期間とされます」と定めており、産前産後休業期間中の保険料の徴収の特例の適用を受けた期間も「保険料の拠出を行った期間」とされます。設問の「拠出を行わなかった期間とされる」は誤りです。根拠は法27条、則19条の5第1項・5項ほかです。"},{"law":"保険料","cat":"保険料の負担","q":"被保険者及び被保険者を使用する事業主は、それぞれ保険料の半額を負担する。","a":true,"exp":"〇。法82条1項のとおり。労使折半が原則であり、任意に負担割合を変えることはできない。","page":246,"detail":"設問は正しいです。本文の保険料の負担では「被保険者及び被保険者を使用する事業主は、それぞれ保険料の半額を負担します」と定めており、いわゆる労使折半で、設問と一致します。なお「任意に負担割合を変えることはできません」とされます。根拠は法82条1項です。"},{"law":"保険料","cat":"保険料の納付義務","q":"事業主は、その使用する被保険者及び自己の負担する保険料を納付する義務を負う。","a":true,"exp":"〇。法82条2項のとおり。事業主は被保険者負担分も含めて納付する義務を負う。","page":246,"detail":"設問は正しいです。本文の保険料の納付義務では「事業主は、その使用する被保険者及び自己の負担する保険料を納付する義務を負います」と定めており、設問と一致します。事業主は被保険者負担分も合わせて納付する義務を負います。根拠は法82条2項です。"},{"law":"保険料","cat":"保険料の納付期限","q":"毎月の保険料は、当月末日までに納付しなければならない。","a":false,"exp":"×。法83条1項により、毎月の保険料は翌月末日までに納付しなければならない。当月末日ではない。なお船員任意継続被保険者は当月10日が納期限である。","page":248,"detail":"設問は誤りです。本文は「毎月の保険料は、翌月末日までに、納付しなければなりません」と定めており、当月末日ではなく翌月末日が納期限です(法83条1項)。被保険者の種類ごとの取扱いの表でも当然被保険者・任意単独被保険者等の納期限はいずれも「翌月末日」とされています。ただし船員任意継続被保険者(第4種被保険者)については例外で、納期限は「当月10日」とされており、保険料の前納も認められています。"},{"law":"保険料","cat":"保険料の繰上徴収","q":"保険料は、納付義務者が強制執行を受けるときや破産手続開始の決定を受けたとき等は、納期前であっても、すべて徴収することができる。","a":true,"exp":"〇。法85条のとおり。所定の事由に該当する場合は保険料を繰上徴収できる。法人たる納付義務者が解散をした場合等も該当する。","page":249,"detail":"設問のとおりで正しいです。本文の保険料の繰上徴収では「保険料は、次のいずれかに該当する場合においては、納期前であっても、すべて徴収することができます」と定められています(法85条)。該当事由には「強制執行を受けるとき」「破産手続開始の決定を受けたとき」のほか、国税等の滞納による滞納処分、企業担保権の実行手続の開始、競売の開始が挙げられます。さらに「法人たる納付義務者が、解散をした場合」や被保険者の使用される事業所の廃止等も繰上徴収の対象となります。"},{"law":"保険料","cat":"督促","q":"督促状により指定する期限は、督促状を発する日から起算して20日以上経過した日でなければならない。","a":false,"exp":"×。法86条により、督促状の指定期限は発する日から起算して10日以上経過した日でなければならない。20日以上ではない。","page":252,"detail":"設問は誤りです。本文の督促の「期限」では「督促状により指定する期限は、督促状を発する日から起算して10日以上経過した日でなければなりません」と定められており、20日ではなく10日以上です(法86条1項から4項)。督促は厚生労働大臣が期限を指定して納付義務者に対し督促状を発して行います。なお納期限経過後に保険料の繰上徴収に該当する事由が発生したときは、10日以内の日を指定することができるという例外があります。"},{"law":"保険料","cat":"延滞金","q":"延滞金は、原則として保険料額に、納期限の翌日から保険料完納等の日の前日までの期間の日数に応じ、年14.6%(納期限の翌日から3か月を経過する日までの期間は年7.3%)の割合を乗じて計算する。","a":true,"exp":"〇。法87条1項のとおり。延滞金の計算は本来の納期限の翌日から算定する。督促状の指定期限からではない。","page":254,"detail":"設問のとおりで正しいです。本文は「督促をしたときは、厚生労働大臣は、保険料額に、納期限の翌日から保険料完納又は財産差押の日の前日までの期間の日数に応じ、年14.6%(当該納期限の翌日から3か月を経過する日までの期間については、年7.3%)の割合を乗じて計算した延滞金を徴収します」と定めています(法87条1項)。注意書きにもあるとおり「延滞金の計算は、本来の納期限の翌日から算定します。督促状の指定期限からではありません」とされています。なお「14.6%」「7.3%」には当分の間の経過措置による特例割合が設けられています。"},{"law":"保険料","cat":"延滞金","q":"延滞金は、滞納に係る保険料額が1,000円未満であるときは徴収しない。","a":true,"exp":"〇。法87条のとおり。保険料額が1,000円未満のとき、延滞金の金額が100円未満のとき等は延滞金を徴収しない。","page":255,"detail":"設問のとおりで正しいです。本文の延滞金を徴収しない場合では「保険料額が1,000円未満であるとき」が挙げられています(法87条1項・4項)。同じく「延滞金の金額が100円未満であるとき」も徴収しない場合に含まれます。このほか、納期を繰り上げて徴収するとき、公示送達の方法によって督促したとき、督促状に指定した期限までに保険料を完納したとき、滞納につきやむを得ない事情があると認められる場合も徴収しないとされています。"},{"law":"保険料","cat":"積立金の運用","q":"特別会計積立金の運用は、厚生労働大臣が、年金積立金管理運用独立行政法人に対し特別会計積立金を寄託することにより行う。","a":true,"exp":"〇。法79条の3のとおり。厚生労働大臣はGPIFに寄託することにより運用を行う。寄託までの間は財政融資資金に預託できる。","page":256,"detail":"設問のとおりで正しいです。本文の積立金の運用では「特別会計積立金の運用は、厚生労働大臣が、『積立金の運用の目的』に沿った運用に基づく納付金の納付を目的として、年金積立金管理運用独立行政法人に対し、特別会計積立金を寄託することにより行うものとします」と定められています(法79条の3)。年金積立金管理運用独立行政法人はGPIFと呼ばれます。なお厚生労働大臣は、この寄託をするまでの間、財政融資資金に特別会計積立金を預託することができます。"},{"law":"その他","cat":"不服申立て","q":"被保険者の資格に関する処分に不服がある者は、社会保険審査官に対して審査請求をし、その決定に不服がある者は社会保険審査会に対して再審査請求をすることができる。","a":true,"exp":"〇。法90条1項のとおり。資格・標準報酬・保険給付に関する処分は二審制(社会保険審査官への審査請求、社会保険審査会への再審査請求)である。","page":260,"detail":"設問のとおりで正しいです。本文の審査請求等では、厚生労働大臣による「被保険者の資格に関する処分」「標準報酬に関する処分」「保険給付に関する処分」のいずれかに不服がある者は「社会保険審査官に対して審査請求をし、その決定に不服がある者は、社会保険審査会に対して再審査請求をすることができます」と定められています(法90条1項・3項、91条1項)。これは社会保険審査官への審査請求と社会保険審査会への再審査請求という二審制です。なお徴収金の賦課・徴収の処分や脱退一時金に関する処分については、社会保険審査会に対して審査請求をすることになります。"},{"law":"その他","cat":"審査請求の期間","q":"審査請求は、処分のあったことを知った日の翌日から起算して2か月を経過したときは、原則としてすることができない。","a":false,"exp":"×。社会保険審査官及び社会保険審査会法4条により、審査請求は処分を知った日の翌日から3か月以内にしなければならない。2か月ではない。","page":261,"detail":"設問は誤りです。本文の審査請求では「処分のあったことを知った日の翌日から起算して3か月を経過したときは、することができません」と定められており、2か月ではなく3か月以内です(社会保険審査官及び社会保険審査会法4条1項等)。ただし、正当な事由によりこの期間内に審査請求をすることができなかったことを疎明したときはこの限りではありません。なお被保険者の資格又は標準報酬に関する処分に対する審査請求は、原処分があった日の翌日から起算して2年を経過したときはすることができません。"},{"law":"その他","cat":"届出義務","q":"適用事業所の事業主は、被保険者の資格の取得及び喪失並びに報酬月額及び賞与額に関する事項を厚生労働大臣に届け出なければならない。","a":true,"exp":"〇。法27条のとおり。事業主は資格の取得・喪失、報酬月額、賞与額を届け出る義務を負う。70歳以上の使用される者も含む。","page":263,"detail":"設問のとおりで正しいです。本文の届出(法27条)では、適用事業所の事業主等は「被保険者の資格の取得及び喪失並びに報酬月額及び賞与額に関する事項を厚生労働大臣に届け出なければなりません」と定められています(法27条)。ここでいう被保険者には「被保険者であった70歳以上の者であって当該適用事業所に使用されるものとして厚生労働省令で定める要件に該当するもの(『70歳以上の使用される者』)」が含まれます。70歳以上の使用される者については、要件に該当するに至った日・該当しなくなった日及び報酬月額・賞与額が届出事項となります。"},{"law":"その他","cat":"資格取得の届出","q":"当然被保険者(船員被保険者を除く)の資格取得の届出は、当該事実があった日から14日以内に日本年金機構に提出して行う。","a":false,"exp":"×。則15条により、当然被保険者の資格取得の届出は当該事実があった日から5日以内(船舶所有者は10日以内)である。14日以内ではない。","page":264,"detail":"設問は誤りです。本文の被保険者の資格取得の届出では「当然被保険者(船員被保険者を除きます)の資格の取得の届出は、当該事実があった日から5日以内に、厚生年金保険被保険者資格取得届・70歳以上被用者該当届……を日本年金機構に提出することによって行います」と定められており、14日以内ではなく5日以内です(則15条1項)。設問の他の部分(日本年金機構への提出)は正しいです。なお船員被保険者の資格の取得の届出は、当該事実があった日から10日以内に行うこととされています。"},{"law":"その他","cat":"時効","q":"保険料その他厚生年金保険法の規定による徴収金を徴収し、又はその還付を受ける権利は、これらを行使することができる時から2年を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法92条1項のとおり。徴収金・還付の権利の時効は2年である。一方、保険給付を受ける権利の時効は5年である。","page":277,"detail":"設問のとおりで正しいです。本文の時効では「保険料その他厚生年金保険法の規定による徴収金を徴収し、又はその還付を受ける権利は、これらを行使することができる時から2年を経過したときは、時効によって、消滅します」と定められています(法92条1項)。これに対し「保険給付を受ける権利は、その支給すべき事由が生じた日から5年を経過したときは、時効によって、消滅します」とされ、徴収金・還付の2年と保険給付の5年は区別されます。なお徴収金の納入の告知又は督促は、時効の更新の効力を有します。"},{"law":"その他","cat":"時効","q":"保険給付を受ける権利は、その支給すべき事由が生じた日から2年を経過したときは、時効によって消滅する。","a":false,"exp":"×。法92条1項により、保険給付を受ける権利の時効は5年である。2年ではない。徴収金・還付の権利が2年である。","page":277,"detail":"設問は誤りです。本文の時効では「保険給付を受ける権利は、その支給すべき事由が生じた日から5年を経過したときは、時効によって、消滅します」と定められており、2年ではなく5年です(法92条2項)。2年とされているのは「保険料その他厚生年金保険法の規定による徴収金を徴収し、又はその還付を受ける権利」であり、設問は徴収金・還付の時効期間と取り違えたものです。なお年金たる保険給付を受ける権利の時効は、その全額につき支給を停止されている間は進行しません。"},{"law":"その他","cat":"事業主の義務","q":"事業主は、厚生年金保険に関する書類を、その完結の日から3年間、保存しなければならない。","a":false,"exp":"×。則28条により、事業主の書類保存義務は完結の日から2年間である。3年間ではない。","page":273,"detail":"設問は誤りです。本文の書類の保存では「事業主は、厚生年金保険に関する書類を、その完結の日から2年間、保存しなければなりません」と定められており、3年間ではなく2年間です(則28条)。年数を誤らせる典型的なひっかけです。なお事業主は、被保険者等からその施行規則に規定する書類について証明を求められたときは、速やかに正確な証明をしなければならないとされています。"},{"law":"その他","cat":"死亡の届出","q":"受給権者が死亡したときは、戸籍法の規定による死亡の届出義務者は、10日以内に、その旨を厚生労働大臣に届け出なければならない。","a":true,"exp":"〇。法98条4項のとおり。死亡の届出は10日以内である。住基ネットにより死亡を確認できる場合等は届出不要となる。","page":273,"detail":"設問のとおりで正しいです。本文の届出(死亡に係るもの)では「受給権者が死亡したときは、戸籍法の規定による死亡の届出義務者は、10日以内に、その旨を厚生労働大臣に届け出なければなりません」と定められています(法98条4項)。ただし例外があり、厚生労働大臣が住民基本台帳ネットワークシステムにより当該受給権者に係る機構保存本人確認情報の提供を受けることができる受給権者の死亡であって、死亡の日から7日以内に戸籍法の規定による死亡の届出をした場合等には、この届出は必要としないとされています。"},{"law":"その他","cat":"罰則","q":"事業主が正当な理由がなくて督促状に指定する期限までに保険料を納付しないときは、6か月以下の拘禁刑又は50万円以下の罰金に処する。","a":true,"exp":"〇。法102条のとおり。届出違反や保険料不納付には6か月以下の拘禁刑又は50万円以下の罰金が科される。","page":282,"detail":"設問のとおりで正しいです。本文の罰則では「事業主が、正当な理由がなくて督促状に指定する期限までに保険料を納付しないとき」は「6か月以下の拘禁刑又は50万円以下の罰金に処します」と定められています(法102条等)。同じく届出(法27条)の規定に違反して届出をしない又は虚偽の届出をしたときも6か月以下の拘禁刑又は50万円以下の罰金とされています。立入検査等で事業主以外の者が答弁せず又は虚偽の陳述をしたときは6か月以下の拘禁刑又は30万円以下の罰金、死亡の届出義務者が届出をしないとき等は10万円以下の過料です。"},{"law":"その他","cat":"厚生年金基金","q":"厚生年金基金は、平成26年4月1日以後、新設できなくなった。","a":true,"exp":"〇。平成25年改正法により、施行日(平成26年4月1日)以後は厚生年金基金の新設ができなくなった。財政状況の悪い基金の解散が促された。","page":283,"detail":"設問のとおりで正しいです。本文の参考資料【厚生年金基金について】では「改正法の施行日(平成26年4月1日)以後、厚生年金基金の新設はできなくなりました」と説明されています。これは平成25年6月26日公布の「公的年金制度の健全性及び信頼性の確保のための厚生年金保険法等の一部を改正する法律」(改正法)によるものです。あわせて平成26年4月1日から平成31年3月31日までの5年間の時限措置により、財政状況の悪い厚生年金基金の解散が促されました。"},{"law":"その他","cat":"現況届","q":"現況届の提出を求められた受給権者の指定日は、受給権者の誕生日の属する月の末日とされている。","a":true,"exp":"〇。令6.3.6厚労告66号のとおり。指定日は受給権者の誕生日の属する月の末日である。住基ネットにより本人確認情報の提供を受けられない場合に現況届の提出を求める。","page":274,"detail":"設問のとおりで正しいです。本文の現況届では、厚生労働大臣は受給権者に係る機構保存本人確認情報の提供を受けることができない場合に、当該受給権者に対し所定の届書を毎年「指定日」までに提出することを求めることができるとされ、求められた受給権者は毎年指定日までに届書を日本年金機構に提出しなければなりません(則35条の2)。そして「指定日」については本文に「指定日は、『受給権者の誕生日の属する月の末日』とされています」と明記されています(令6.3.6厚労告66号)。"},{"law":"その他","cat":"立入検査等","q":"立入検査等の規定は、第2号厚生年金被保険者、第3号厚生年金被保険者又は第4号厚生年金被保険者及びこれらの者に係る適用事業所等の事業主については適用されない。","a":true,"exp":"〇。法100条4項のとおり。立入検査等は第2号から第4号厚生年金被保険者及びその事業主には適用されない。","page":279,"detail":"設問のとおりで正しいです。本文の立入検査等の適用除外では「第2号厚生年金被保険者、第3号厚生年金被保険者又は第4号厚生年金被保険者及びこれらの者に係る適用事業所等の事業主については、立入検査等の規定は適用されません」と定められています(法100条4項)。立入検査等は、厚生労働大臣が被保険者の資格・標準報酬・保険料又は保険給付に関する決定に関し必要があると認めるとき、適用事業所等の事業主に対して物件提出を命じ、又は職員に事業所へ立ち入って質問・検査させることができる規定です(法100条1項)。これは第1号厚生年金被保険者を念頭に置いた規定であるため、第2号から第4号の各被保険者等には適用されません。"}],"roui":[{"law":"労働施策総合推進法","cat":"再就職援助計画","q":"再就職援助計画の作成が必要となる「厚生労働省令で定める事業規模の縮小等」とは、経済的事情による事業規模の縮小等であって、一の事業所において、常時雇用する労働者について1か月の期間内に<b>30人以上</b>の離職者を生ずることとなるものである。","a":true,"exp":"〇。一の事業所において1か月の期間内に30人以上の離職者を生ずる場合が該当する（則7条の2）。再就職援助計画の作成が義務付けられる。","page":17,"detail":"設問は正しく〇である。則7条の2は、再就職援助計画の作成義務が生じる「厚生労働省令で定める事業規模の縮小等」を、経済的事情による事業規模の縮小等であって、一の事業所において常時雇用する労働者について1か月の期間内に30人以上の離職者を生ずることとなるものと定めている。設問の数値・期間・要件はこの規定どおりであり、誤りはない。なお再就職援助計画の作成義務自体は法24条1項に基づくもので、当該離職を余儀なくされる労働者の再就職の援助のための措置に関する計画を作成しなければならないとされる。"},{"law":"労働施策総合推進法","cat":"再就職援助計画","q":"事業主は、再就職援助計画を作成したときは、遅滞なく、これを<b>厚生労働大臣</b>に提出し、その認定を受けなければならない。","a":false,"exp":"×。提出先・認定権者は「公共職業安定所長」である（法24条3項、則7条の4）。厚生労働大臣ではない。","page":18,"detail":"設問は誤りで×である。法24条3項・則7条の4によれば、事業主は再就職援助計画を作成したときは、遅滞なく、これを「公共職業安定所長」に提出し、その認定を受けなければならないとされており、提出先・認定権者は厚生労働大臣ではなく公共職業安定所長である。設問は提出先を厚生労働大臣としている点が本文と異なるため誤りとなる。なお公共職業安定所長は、計画で定める措置の内容が再就職の促進を図るうえで適当でないと認めるときは変更を求めることができ、求めに応じないときは認定を行わないことができる（法24条4項）。"},{"law":"労働施策総合推進法","cat":"中途採用情報の公表","q":"常時雇用する労働者の数が<b>300人を超える</b>事業主は、雇い入れた通常の労働者等の数に占める中途採用により雇い入れられた者の数の割合を定期的に公表しなければならない。","a":true,"exp":"〇。常時雇用労働者数が300人を超える事業主に中途採用比率の定期公表が義務付けられている（法27条の2第1項）。","page":19,"detail":"設問は正しく〇である。法27条の2第1項は、常時雇用する労働者の数が300人を超える事業主は、厚生労働省令で定めるところにより、雇い入れた通常の労働者及びこれに準ずる者の数に占める中途採用により雇い入れられた者の数の割合を定期的に公表しなければならないと定めている。設問の「300人を超える」という人数要件・公表義務の内容はこの規定どおりであり誤りはない。ここでの「中途採用」とは新規学卒等採用者以外の雇入れをいう。"},{"law":"労働施策総合推進法","cat":"治療と就業の両立支援","q":"事業主は、疾病、負傷その他の理由により治療を受ける労働者について、その治療と就業との両立を支援するため、相談に応じ適切に対応するために必要な体制の整備その他の必要な措置を講じなければならない。","a":false,"exp":"×。これは「講ずるよう努めなければならない」とされる努力義務である（法27条の3第1項）。義務ではない。","page":20,"detail":"設問は誤りで×である。法27条の3第1項は、事業主は、疾病、負傷その他の理由により治療を受ける労働者について、治療と就業との両立を支援するため、相談に応じ適切に対応するために必要な体制の整備その他の必要な措置を「講ずるよう努めなければならない」と定めており、これは努力義務である。設問は「講じなければならない」と義務付ける表現になっている点が本文と異なるため誤りとなる。"},{"law":"労働施策総合推進法","cat":"外国人雇用状況の届出","q":"事業主は、新たに外国人を雇い入れた場合又はその雇用する外国人が離職した場合には、その者の氏名、在留資格、在留期間その他の事項について確認し、当該事項を<b>厚生労働大臣</b>に届け出なければならない。","a":true,"exp":"〇。外国人雇用状況の届出は厚生労働大臣に対して行う（法28条1項）。届書の提出先は事業所の所在地を管轄する公共職業安定所の長である（則12条）。","page":20,"detail":"設問は正しく〇である。法28条1項は、事業主は、新たに外国人を雇い入れた場合又はその雇用する外国人が離職した場合には、その者の氏名並びに在留資格及び在留期間その他厚生労働省令で定める事項について確認し、当該事項を「厚生労働大臣」に届け出なければならないと定めている。設問の届出先（厚生労働大臣）は本文どおりであり誤りはない。なお則12条により、届書の実際の提出先は事業所の所在地を管轄する公共職業安定所の長である。"},{"law":"労働施策総合推進法","cat":"パワハラ防止措置","q":"事業主は、職場において行われる優越的な関係を背景とした言動であって業務上必要かつ相当な範囲を超えたものによりその雇用する労働者の就業環境が害されることのないよう、相談に応じ適切に対応するために必要な体制の整備その他の雇用管理上必要な措置を講じなければならない。","a":true,"exp":"〇。パワハラに関する雇用管理上の措置義務である（法30条の2第1項）。事業主に義務付けられている。","page":21,"detail":"設問は正しく〇である。法30条の2第1項は、事業主は、職場において行われる優越的な関係を背景とした言動であって業務上必要かつ相当な範囲を超えたものにより労働者の就業環境が害されることのないよう、相談に応じ適切に対応するために必要な体制の整備その他の雇用管理上必要な措置を「講じなければならない」と定めており、これは事業主の義務である。設問の内容・文言はこの規定どおりであり誤りはない。"},{"law":"労働施策総合推進法","cat":"パワハラ・調停","q":"都道府県労働局長は、パワハラに関する雇用管理上の措置等に定める事項についての労働者と事業主との間の紛争について、当事者の双方又は一方から調停の申請があり解決のために必要があると認めるときは、<b>紛争調整委員会</b>に調停を行わせるものとする。","a":true,"exp":"〇。調停は紛争調整委員会に行わせる（法30条の6第1項）。この紛争調整委員会は個別労働関係紛争解決促進法に規定するものである。","page":21,"detail":"設問は正しく〇である。法30条の6第1項は、都道府県労働局長は、パワハラに関する雇用管理上の措置等に定める事項についての労働者と事業主との間の紛争について、当事者の双方又は一方から調停の申請があった場合において紛争の解決のために必要があると認めるときは、「紛争調整委員会」に調停を行わせるものとすると定めている。設問の内容はこの規定どおりであり誤りはない。この紛争調整委員会は個別労働関係紛争解決促進法に規定する紛争調整委員会をいう。"},{"law":"労働施策総合推進法","cat":"大量雇用変動の届出","q":"大量雇用変動の届出は、大量雇用変動がある日の少なくとも<b>2か月前</b>に、大量離職届を当該事業所の所在地を管轄する公共職業安定所の長に提出して行わなければならない。","a":false,"exp":"×。届出期限は大量雇用変動がある日の少なくとも「1か月前」である（則9条）。2か月前ではない。","page":19,"detail":"設問は誤りで×である。則9条は、大量雇用変動の届出は、大量雇用変動がある日の少なくとも「1か月前」に、大量離職届を当該事業所の所在地を管轄する公共職業安定所の長に提出することによって行わなければならないと定めている。設問は届出期限を「2か月前」としている点が本文と異なるため誤りとなる。なお離職の全部が同一の日に生じない場合は、最後の離職が生じる日の少なくとも1か月前までに届け出る。"},{"law":"職業安定法","cat":"定義（労働者供給）","q":"「労働者供給」とは、供給契約に基づいて労働者を他人の指揮命令を受けて労働に従事させることをいい、労働者派遣法に規定する労働者派遣に該当するものは含まれない。","a":true,"exp":"〇。労働者供給の定義どおりであり、労働者派遣に該当するものは除かれる（法4条8項）。","page":27,"detail":"設問は正しく〇である。法4条8項は、「労働者供給」とは、供給契約に基づいて労働者を他人の指揮命令を受けて労働に従事させることをいい、労働者派遣法に規定する労働者派遣に該当するものは含まないと定めている。設問の定義及び労働者派遣を除く旨はこの規定どおりであり誤りはない。"},{"law":"職業安定法","cat":"事業者の定義","q":"「労働者供給事業者」とは、厚生労働大臣に<b>届出をして</b>労働者供給事業を行う労働組合等をいう。","a":false,"exp":"×。労働者供給事業者は厚生労働大臣の「許可」を受けて労働者供給事業を行う労働組合等をいう（法4条12項）。届出ではない。","page":28,"detail":"設問は誤りで×である。法4条12項は、「労働者供給事業者」とは、厚生労働大臣の「許可」を受けて労働者供給事業を行う労働組合等をいうと定めている。設問は「届出をして」としている点が本文と異なるため誤りとなる。なお届出制によるのは法4条11項の特定募集情報等提供事業者であり、職業紹介事業者（法4条10項）は許可又は届出による点と区別する。"},{"law":"職業安定法","cat":"求人の申込み","q":"公共職業安定所、特定地方公共団体及び職業紹介事業者は、求人の申込みは原則として全て受理しなければならないが、その内容が法令に違反する求人の申込み等の不受理事由に該当する場合は受理しないことができる。","a":true,"exp":"〇。求人の申込みは全て受理が原則だが、内容が法令違反である等の不受理事由に該当するものは受理しないことができる（法5条の6第1項）。","page":31,"detail":"設問は正しく〇である。法5条の6第1項は、公共職業安定所、特定地方公共団体及び職業紹介事業者は、求人の申込みは全て受理しなければならないとしつつ、その内容が法令に違反する求人の申込み等の不受理事由に該当する求人の申込みは受理しないことができると定めている。設問の「全て受理が原則だが不受理事由に該当する場合は受理しないことができる」という内容はこの規定どおりであり誤りはない。"},{"law":"職業安定法","cat":"有料職業紹介事業","q":"有料の職業紹介事業を行おうとする者は、厚生労働大臣に<b>届出</b>をしなければならない。","a":false,"exp":"×。有料の職業紹介事業を行おうとする者は厚生労働大臣の「許可」を受けなければならない（法30条1項）。届出ではない。","page":36,"detail":"設問は誤りで×である。法30条1項は、有料の職業紹介事業を行おうとする者は、厚生労働大臣の「許可」を受けなければならないと定めている。設問は「届出」としている点が本文と異なるため誤りとなる。なお厚生労働大臣は許可をしようとするときは、あらかじめ労働政策審議会の意見を聴かなければならない（法30条5項）。"},{"law":"職業安定法","cat":"有料職業紹介事業","q":"有料職業紹介事業の許可の有効期間は当該許可の日から起算して<b>3年</b>であり、更新を受けた場合の有効期間は<b>5年</b>である。","a":true,"exp":"〇。有料職業紹介事業の許可の有効期間は3年、更新後は5年である（法32条の6第1項・5項）。無料職業紹介事業は当初から5年である点と区別する。","page":37,"detail":"設問は正しく〇である。法32条の6第1項・5項によれば、有料職業紹介事業の許可の有効期間は当該許可の日から起算して「3年」であり、更新を受けた場合における許可の有効期間は当該更新前の許可の有効期間が満了する日の翌日から起算して「5年」である。設問の数値はこの規定どおりであり誤りはない。当初から5年とされる無料職業紹介事業（法33条3項）と区別して押さえておく。"},{"law":"職業安定法","cat":"無料職業紹介事業","q":"職業安定機関及び特定地方公共団体の行うものを除く無料の職業紹介事業を行おうとする者は、学校等及び特別の法人の行うものを除き、厚生労働大臣の許可を受けなければならず、その許可の有効期間は当該許可の日から起算して<b>5年</b>である。","a":true,"exp":"〇。無料職業紹介事業は厚生労働大臣の許可が必要で、有効期間は当初から5年である（法33条1項・3項）。","page":39,"detail":"設問は正しく〇である。法33条1項は、無料の職業紹介事業（職業安定機関及び特定地方公共団体の行うものを除く）を行おうとする者は、学校等の行う無料職業紹介事業及び特別の法人の行う無料職業紹介事業を除き、厚生労働大臣の許可を受けなければならないと定めている。さらに法33条3項により許可の有効期間は当該許可の日から起算して「5年」である。設問の許可制及び有効期間5年はこの規定どおりであり誤りはない。"},{"law":"職業安定法","cat":"労働者の募集（委託募集）","q":"労働者を雇用しようとする者が、その被用者以外の者をして<b>報酬を与えて</b>労働者の募集に従事させようとするときは、その旨を厚生労働大臣に届け出なければならない。","a":false,"exp":"×。報酬を与えて行う委託募集は厚生労働大臣の「許可」が必要である（法36条1項）。報酬を与えることなく行う場合が届出である（同条3項）。","page":41,"detail":"設問は誤りで×である。法36条1項は、労働者を雇用しようとする者が、その被用者以外の者をして「報酬を与えて」労働者の募集に従事させようとするときは、厚生労働大臣の「許可」を受けなければならないと定めている。設問は届出としている点が本文と異なるため誤りとなる。なお報酬を与えることなく募集に従事させようとするときが厚生労働大臣への届出である（法36条3項）。"},{"law":"職業安定法","cat":"特定募集情報等提供事業","q":"特定募集情報等提供事業を行おうとする者は、氏名又は名称及び住所その他の事項を厚生労働大臣に<b>届け出</b>なければならない。","a":true,"exp":"〇。特定募集情報等提供事業は厚生労働大臣への届出制である（法43条の2第1項）。許可ではない点に注意する。","page":42,"detail":"設問は正しく〇である。法43条の2第1項は、特定募集情報等提供事業を行おうとする者は、氏名又は名称及び住所その他の厚生労働省令で定める事項を厚生労働大臣に「届け出」なければならないと定めている。設問の届出制という内容はこの規定どおりであり誤りはない。許可制ではなく届出制である点に注意する。"},{"law":"職業安定法","cat":"労働者供給事業","q":"労働組合等が厚生労働大臣の許可を受けた場合は、無料の労働者供給事業を行うことができ、その許可の有効期間は<b>3年</b>である。","a":true,"exp":"〇。労働者供給事業は労働組合等が厚生労働大臣の許可を受けて行うことができ、有効期間は3年である（法45条、則32条3項）。","page":43,"detail":"設問は正しく〇である。法45条・則32条3項によれば、労働組合等が、厚生労働大臣の「許可」（有効期間は3年）を受けた場合は、無料の労働者供給事業を行うことができる。設問の許可制及び有効期間3年はこの規定どおりであり誤りはない。なお法44条により、労働者供給事業の許可を受けた場合を除き、労働者供給事業は原則として禁止されている。"},{"law":"労働者派遣法","cat":"用語の定義","q":"「派遣元事業主」とは、労働者派遣事業の<b>届出をした</b>者をいう。","a":false,"exp":"×。「派遣元事業主」とは労働者派遣事業の「許可」を受けた者をいう（法2条4号）。届出ではない。","page":45,"detail":"設問は誤りで×である。法2条4号は、「派遣元事業主」とは、労働者派遣事業の「許可」を受けた者をいうと定めている。設問は「届出をした」としている点が本文と異なるため誤りとなる。労働者派遣事業を行おうとする者は厚生労働大臣の許可を受けなければならない（法5条1項）のであり、届出制ではない。"},{"law":"労働者派遣法","cat":"派遣禁止業務","q":"何人も、港湾運送業務、建設業務、警備業務及び一定の医療関係業務については、労働者派遣事業を行ってはならない。","a":true,"exp":"〇。港湾運送業務・建設業務・警備業務及び政令で定める医療関係業務は派遣禁止業務である（法4条1項、令2条）。","page":47,"detail":"設問は正しく〇である。法4条1項・令2条によれば、何人も、港湾運送業務、建設業務、警備業務、及び政令で定める業務（病院・診療所等における医療関係業務）については、労働者派遣事業を行ってはならない。設問が挙げる4業務はこの派遣禁止業務に該当し、本文どおりであるため誤りはない。なお紹介予定派遣の場合等、医療関係業務でも一定の場合には労働者派遣が認められる。"},{"law":"労働者派遣法","cat":"許可の有効期間","q":"労働者派遣事業の許可の有効期間は当該許可の日から起算して<b>3年</b>であり、更新を受けた場合の有効期間は<b>5年</b>である。","a":true,"exp":"〇。労働者派遣事業の許可の有効期間は3年、更新後は5年である（法10条1項・4項）。","page":48,"detail":"設問は正しく〇である。法10条1項・4項によれば、労働者派遣事業の許可の有効期間は当該許可の日から起算して「3年」であり、更新を受けた場合における許可の有効期間は当該更新前の許可の有効期間が満了する日の翌日から起算して「5年」である。設問の数値はこの規定どおりであり誤りはない。"},{"law":"労働者派遣法","cat":"関係派遣先への派遣割合","q":"派遣元事業主は、関係派遣先に労働者派遣をするときは、関係派遣先への派遣割合が<b>100分の80以下</b>となるようにしなければならない。","a":true,"exp":"〇。いわゆるグループ企業（関係派遣先）への派遣割合は100分の80以下とする必要がある（法23条の2）。","page":50,"detail":"設問は正しく〇である。法23条の2は、派遣元事業主は、関係派遣先に労働者派遣をするときは、関係派遣先への派遣割合が「100分の80以下」となるようにしなければならないと定めている。設問の数値はこの規定どおりであり誤りはない。ここでの関係派遣先とは、派遣元事業主の経営を実質的に支配することが可能となる関係にある者等（いわゆるグループ企業）をいう。"},{"law":"労働者派遣法","cat":"事業所単位の派遣可能期間","q":"派遣先は、当該派遣先の事業所その他派遣就業の場所ごとの業務について、派遣元事業主から派遣可能期間を超える期間継続して労働者派遣の役務の提供を受けてはならず、この派遣可能期間は原則として<b>1年</b>とされている。","a":false,"exp":"×。事業所単位の派遣可能期間は原則「3年」である（法40条の2第2項）。過半数労働組合等の意見聴取により3年を限り延長できる。","page":70,"detail":"設問は誤りで×である。法40条の2によれば、事業所単位の派遣可能期間は「3年」とされており（同条2項相当）、設問が原則1年とする点が本文と異なるため誤りとなる。派遣先は、3年を超える期間継続して労働者派遣の役務の提供を受けようとするときは、意見聴取期間に過半数労働組合等の意見を聴くことにより、3年を限り派遣可能期間を延長することができる。"},{"law":"労働者派遣法","cat":"日雇労働者の派遣","q":"労働者派遣法における「日雇労働者」とは、日々又は<b>30日以内</b>の期間を定めて雇用する労働者をいう。","a":true,"exp":"〇。日雇労働者とは日々又は30日以内の期間を定めて雇用する労働者をいう（法35条の4第1項）。原則としてこの日雇労働者の労働者派遣は禁止される。","page":65,"detail":"設問は正しく〇である。法35条の4第1項は、「日雇労働者」とは、日々又は「30日以内」の期間を定めて雇用する労働者をいうと定めている。設問の定義はこの規定どおりであり誤りはない。なお派遣元事業主は、専門的な知識等を必要とする政令で定める業務についてする場合等を除き、その雇用する日雇労働者について労働者派遣を行ってはならない。"},{"law":"労働者派遣法","cat":"派遣元責任者","q":"派遣元事業主は、派遣労働者数が100人以下のときは1人以上、100人を超え200人以下のときは2人以上の派遣元責任者を選任しなければならない。","a":true,"exp":"〇。派遣元責任者は派遣労働者数100人以下で1人以上、100人超200人以下で2人以上選任する（則29条）。","page":66,"detail":"設問は正しく〇である。則29条によれば、派遣元責任者の選任人数は、派遣労働者数が100人以下のときは1人以上、100人を超え200人以下のときは2人以上、200人を超えるときは100人を超える100人ごとに1人を2人に加えた数以上とされている。設問の100人以下で1人以上、100人超200人以下で2人以上という内容はこの規定どおりであり誤りはない。"},{"law":"労働者派遣法","cat":"管理台帳の保存","q":"派遣元事業主は派遣元管理台帳を、派遣先は派遣先管理台帳を、それぞれ<b>3年間</b>保存しなければならない。","a":true,"exp":"〇。派遣元管理台帳・派遣先管理台帳はいずれも3年間の保存義務がある（法37条2項、42条2項）。","page":66,"detail":"設問は正しく〇である。法37条2項は派遣元事業主が派遣元管理台帳を「3年間」保存しなければならないと定め、法42条2項は派遣先が派遣先管理台帳を「3年間」保存しなければならないと定めている。設問のとおり、派遣元管理台帳・派遣先管理台帳はいずれも3年間の保存義務があり、本文どおりで誤りはない。"},{"law":"労働者派遣法","cat":"労働契約申込みみなし","q":"労働契約の申込みをしたものとみなされた労働者派遣の役務の提供を受ける者は、当該申込みに係る行為が終了した日から<b>1年</b>を経過する日までの間は、当該申込みを撤回することができない。","a":true,"exp":"〇。みなされた労働契約の申込みは、行為終了日から1年を経過する日まで撤回できない（法40条の6第2項）。","page":76,"detail":"設問は正しく〇である。法40条の6第2項は、労働契約の申込みをしたものとみなされた労働者派遣の役務の提供を受ける者は、当該申込みに係る行為が終了した日から「1年」を経過する日までの間は、当該申込みを撤回することができないと定めている。設問の内容はこの規定どおりであり誤りはない。なおこの期間内に承諾する旨又は承諾しない旨の意思表示を受けなかったときは、当該申込みは効力を失う（同条3項）。"},{"law":"労働者派遣法","cat":"離職労働者の受入れ禁止","q":"派遣先は、労働者派遣に係る派遣労働者が当該派遣先を離職した者であるときは、当該離職の日から起算して<b>1年</b>を経過する日までの間は、当該派遣労働者に係る労働者派遣の役務の提供を受けてはならない。","a":true,"exp":"〇。離職後1年を経過する日までは、その者を離職した派遣先での派遣として受け入れることはできない（法40条の9第1項）。60歳以上の定年退職者等は適用除外となる。","page":76,"detail":"設問は正しく〇である。法40条の9第1項は、派遣先は、労働者派遣に係る派遣労働者が当該派遣先を離職した者であるときは、当該離職の日から起算して「1年」を経過する日までの間は、当該派遣労働者に係る労働者派遣の役務の提供を受けてはならないと定めている。設問の内容はこの規定どおりであり誤りはない。なお60歳以上の定年退職者等は適用除外となる（則33条の10第1項）。"},{"law":"高年齢者雇用安定法","cat":"定義","q":"高年齢者雇用安定法における「高年齢者」とは、60歳以上の者をいう。","a":false,"exp":"×。正しくは「55歳以上の者」をいう（法2条1項、則1条）。「高年齢者等」のうち中高年齢者は45歳以上の者を指す。","page":85,"detail":"設問は誤りで×である。法2条1項・則1条は、「高年齢者」とは「55歳以上の者」をいうと定めており、60歳以上ではない。設問は60歳以上とする点が本文と異なるため誤りとなる。なお「高年齢者等」には高年齢者のほか、中高年齢者（45歳以上の者）である求職者や中高年齢失業者等（45歳以上65歳未満の失業者等）が含まれる（法2条2項）。"},{"law":"高年齢者雇用安定法","cat":"定年","q":"事業主がその雇用する労働者の定年の定めをする場合には、当該定年は、原則として60歳を下回ることができない。","a":true,"exp":"〇。原則として定年は60歳を下回ることができない（法8条）。例外として坑内作業の業務に従事する労働者については60歳未満の定年を定めることができる。","page":86,"detail":"設問は正しく〇である。法8条は、事業主がその雇用する労働者の定年の定めをする場合には、当該定年は原則として「60歳」を下回ることができないと定めている。設問の内容はこの規定どおりであり誤りはない。なお例外として、厚生労働省令で定める業務（坑内作業の業務）に従事している労働者については、60歳未満の定年を定めることができる（則4条の2）。"},{"law":"高年齢者雇用安定法","cat":"雇用確保措置","q":"定年(65歳未満のものに限る)の定めをしている事業主は、その雇用する高年齢者の65歳までの安定した雇用を確保するため、定年の引上げ、継続雇用制度の導入、定年の定めの廃止のいずれかの措置を講じなければならない。","a":true,"exp":"〇。高年齢者雇用確保措置は3つのいずれかを講じなければならない義務である（法9条1項）。","page":86,"detail":"設問は正しく〇である。法9条1項は、定年（65歳未満のものに限る）の定めをしている事業主は、その雇用する高年齢者の65歳までの安定した雇用を確保するため、当該定年の引上げ、継続雇用制度の導入、当該定年の定めの廃止のいずれかの措置（高年齢者雇用確保措置）を「講じなければならない」と定めており、これは義務である。設問の内容はこの規定どおりであり誤りはない。"},{"law":"高年齢者雇用安定法","cat":"就業確保措置","q":"定年(65歳以上70歳未満のものに限る)の定めをしている事業主は、65歳から70歳までの安定した雇用を確保するため、定年の引上げ等の措置を講じなければならない。","a":false,"exp":"×。65歳から70歳までの高年齢者就業確保措置は努力義務であり、「講ずるよう努めなければならない」とされている（法10条の2第1項）。65歳までの雇用確保措置の義務とは異なる。","page":87,"detail":"設問は誤りで×である。法10条の2第1項によれば、定年（65歳以上70歳未満のものに限る）の定めをしている事業主等は、定年の引上げ・65歳以上継続雇用制度の導入・定年の定めの廃止等の措置により65歳から70歳までの安定した雇用を確保するよう「努めなければならない」とされ、これは努力義務である。設問は「講じなければならない」と義務付ける表現になっている点が誤りで、65歳までの雇用確保措置の義務（法9条1項）とは異なる。"},{"law":"高年齢者雇用安定法","cat":"創業支援等措置","q":"創業支援等措置として高年齢者と委託契約その他の契約(労働契約を除く)を締結する場合、過半数労働組合等の同意を得る必要がある。","a":true,"exp":"〇。創業支援等措置を講ずるには、過半数労働組合(ない場合は過半数代表者)の同意を厚生労働省令で定めるところにより得る必要がある（法10条の2第1項）。","page":89,"detail":"設問は正しく〇である。法10条の2第1項のただし書によれば、事業主が創業支援等措置を講ずるには、労働者の過半数で組織する労働組合がある場合はその労働組合の、ない場合は労働者の過半数を代表する者の同意を、厚生労働省令で定めるところにより得る必要がある。設問のとおり、創業支援等措置として高年齢者と委託契約その他の契約（労働契約を除く）を締結する場合には過半数労働組合等の同意を要し、本文どおりで誤りはない。"},{"law":"高年齢者雇用安定法","cat":"多数離職の届出","q":"事業主は、同一の事業所において、再就職援助対象高年齢者等が所定の理由により1か月以内の期間に10人以上離職する場合には、あらかじめ多数離職届を公共職業安定所長に提出しなければならない。","a":false,"exp":"×。正しくは「5人以上」離職する場合である（法16条、則6条の2）。多数離職届は離職が生ずる日の1か月前までに提出する。","page":91,"detail":"設問は誤りで×である。法16条・則6条の2によれば、事業主は、同一の事業所において、再就職援助対象高年齢者等が所定の理由により1か月以内の期間に「5人以上」離職する場合に、あらかじめ多数離職届を公共職業安定所長に提出しなければならない。設問は「10人以上」としている点が本文と異なるため誤りとなる。なお多数離職届は、当該離職が生ずる日の1か月前までに提出しなければならない（則6条の2第2項）。"},{"law":"高年齢者雇用安定法","cat":"雇用状況等の報告","q":"事業主は、毎年、6月1日現在における定年、継続雇用制度等の状況を、翌月15日までに、高年齢者雇用状況等報告書により報告しなければならない。","a":true,"exp":"〇。毎年6月1日現在の状況を翌月(7月)15日までに、管轄公共職業安定所の長を経由して厚生労働大臣に報告する（法52条1項、則33条1項）。","page":95,"detail":"設問は正しく〇である。法52条1項・則33条1項によれば、事業主は、毎年、6月1日現在における定年、継続雇用制度、65歳以上継続雇用制度及び創業支援等措置の状況その他高年齢者の就業の機会の確保に関する状況を、翌月（7月）15日までに、高年齢者雇用状況等報告書により、管轄公共職業安定所の長を経由して厚生労働大臣に報告しなければならない。設問の基準日・提出期限・報告内容はこの規定どおりであり誤りはない。"},{"law":"高年齢者雇用安定法","cat":"シルバー人材センター","q":"都道府県知事は、所定の基準に適合すると認められる高年齢者就業援助法人を、その申請により、市町村の区域ごとに1個に限り、シルバー人材センターとして指定することができる。","a":true,"exp":"〇。都道府県知事が市町村の区域(必要な場合は2以上の市町村の区域)ごとに1個に限り指定する（法37条1項）。","page":96,"detail":"設問は正しく〇である。法37条1項は、都道府県知事は、所定の基準に適合すると認められる高年齢者就業援助法人を、その申請により、市町村の区域（必要と認められる場合には、都道府県知事が指定する2以上の市町村の区域）ごとに「1個に限り」、シルバー人材センターとして指定することができると定めている。設問の内容はこの規定どおりであり誤りはない。"},{"law":"障害者雇用促進法","cat":"定義","q":"障害者雇用促進法における「精神障害者」には、発達障害がある者は含まれない。","a":false,"exp":"×。精神障害(発達障害を含む)がある者であって厚生労働省令で定めるものをいい、発達障害は精神障害に含まれる（法2条6号）。「障害者」「精神障害者」いずれの定義でも発達障害は精神障害に含まれる。","page":98,"detail":"設問は誤りで×である。法2条6号は、「精神障害者」とは、障害者のうち、精神障害（発達障害を含む）がある者であって厚生労働省令で定めるものをいうと定めており、発達障害は精神障害に含まれる。設問は発達障害がある者は含まれないとしている点が本文と異なるため誤りとなる。なお「障害者」の定義（法2条1号）においても精神障害（発達障害を含む）と規定されている。"},{"law":"障害者雇用促進法","cat":"差別禁止","q":"事業主は、賃金の決定、教育訓練の実施等の待遇について、労働者が障害者であることを理由として、障害者でない者と不当な差別的取扱いをしてはならない。","a":true,"exp":"〇。募集・採用以外の事項についての差別禁止規定である（法35条）。なお積極的差別是正措置として障害者を有利に取り扱うことは差別に該当しない。","page":99,"detail":"設問は正しく〇である。法35条は、事業主は、賃金の決定、教育訓練の実施、福利厚生施設の利用その他の待遇について、労働者が障害者であることを理由として、障害者でない者と不当な差別的取扱いをしてはならないと定めている。設問の内容はこの募集・採用以外の事項についての差別禁止規定どおりであり誤りはない。なお積極的差別是正措置として障害者を有利に取り扱うことは、障害者であることを理由とする差別に該当しない。"},{"law":"障害者雇用促進法","cat":"合理的配慮","q":"合理的配慮の提供は事業主の努力義務であり、過重な負担を及ぼす場合であっても可能な限り措置を講ずるよう努めなければならない。","a":false,"exp":"×。合理的配慮の提供は事業主の義務である。ただし事業主に過重な負担を及ぼすこととなるときは、措置を講ずる必要はない（法36条の3）。","page":100,"detail":"設問は誤りで×である。合理的配慮の提供は事業主の「義務」であり（法36条の2・36条の3、平27.3.25厚労告117号は合理的配慮の提供は事業主の義務であると明示）、努力義務ではない。また法36条の3により、これらの措置を講ずることが事業主に対して過重な負担を及ぼすこととなるときは、措置を講ずる必要はない。設問は努力義務とし、過重な負担の場合でも可能な限り努めるとする点が本文と異なるため誤りとなる。"},{"law":"障害者雇用促進法","cat":"障害者雇用率","q":"令和8年7月からの一般事業主の障害者雇用率は、原則として100分の2.7である。","a":true,"exp":"〇。原則(令和8年7月～)の一般事業主の雇用率は100分の2.7(対象労働者37.5人以上で雇用義務発生)である（法43条2項、令2条）。経過措置(令和8年6月30日まで)は100分の2.5。","page":102,"detail":"設問は正しく〇である。法43条2項・令2条等によれば、令和8年7月からの原則の一般事業主の障害者雇用率は「100分の2.7」であり、対象労働者37.5人以上を雇用する場合に雇用義務が生じる。設問の数値はこの規定どおりであり誤りはない。なお経過措置（令和8年6月30日まで）の一般事業主の雇用率は100分の2.5（40.0人以上）である。"},{"law":"障害者雇用促進法","cat":"法定雇用障害者数の算定","q":"重度身体障害者又は重度知的障害者である労働者(週所定労働時間30時間以上)は、その1人をもって2人を雇用したものとみなす。","a":true,"exp":"〇。重度身体障害者・重度知的障害者である労働者は1人で2人とカウントする（法43条4項等）。同じく重度の短時間労働者は1人で1人とみなす。","page":103,"detail":"設問は正しく〇である。法43条4項等によれば、重度身体障害者又は重度知的障害者である労働者（週所定労働時間30時間以上）は、その1人をもって「2人」を雇用したものとみなす。設問の内容は本文の算定ルール及び法定雇用障害者数の算定表どおりであり誤りはない。なお重度身体障害者又は重度知的障害者である短時間労働者は、その1人をもって1人を雇用したものとみなす。"},{"law":"障害者雇用促進法","cat":"特例子会社","q":"特例子会社制度における親事業主の認定は、厚生労働大臣ではなく都道府県労働局長が行う。","a":false,"exp":"×。子会社についての基準適合の認定は厚生労働大臣が行う（法44条1項）。関係会社・関係子会社・特定事業主の各特例も同様に厚生労働大臣の認定による。","page":104,"detail":"設問は誤りで×である。法44条1項によれば、特例子会社制度において、子会社について所定の基準に適合する旨の認定を行うのは「厚生労働大臣」であり、都道府県労働局長ではない。設問は認定権者を都道府県労働局長としている点が本文と異なるため誤りとなる。なお関係会社（法45条1項）、関係子会社（法45条の2第1項）の各特例においても、認定は厚生労働大臣が行う。"},{"law":"障害者雇用促進法","cat":"調整金","q":"独立行政法人高齢・障害・求職者雇用支援機構は、常時100人を超える一般事業主で法定雇用率を超えて対象障害者を雇用する者に対し、その超える1人当たり月額29,000円の障害者雇用調整金を支給する。","a":true,"exp":"〇。常時100人超の事業主に対し超過1人当たり月額29,000円(単位調整額)の調整金を支給する（法50条1項等）。","page":108,"detail":"〇。本文のとおり、独立行政法人高齢・障害・求職者雇用支援機構は、各年度ごとに、雇用する労働者数が常時100人を超える一般事業主で法定雇用率を超えて対象障害者を雇用している者に対し、その超える1人当たり月額29,000円(単位調整額)の障害者雇用調整金を支給する。納付金関係業務は本来厚生労働大臣が行うが、その全部又は一部を同機構に行わせるものとされている(法49条)。なお超過数が年120を超える場合は、120に単位調整額を乗じた額に、120を超える部分の数に23,000円を乗じた額を加えた金額を支給する(法50条1項、附則4条1項、令14条・15条)。設問は単位調整額29,000円を正しく述べており妥当である。"},{"law":"障害者雇用促進法","cat":"報奨金","q":"障害者雇用報奨金は、雇用する労働者数が常時100人以下の一般事業主に対し、所定数を超える1人当たり月額29,000円を支給する。","a":false,"exp":"×。報奨金の額は超える1人当たり月額21,000円である（法附則4条3項）。月額29,000円は常時100人超の事業主に支給される調整金の単位調整額である。","page":109,"detail":"×。障害者雇用報奨金は、雇用する労働者数が常時100人以下の一般事業主のうち、各月初日における対象障害者数の合計が労働者数の4%の合計又は72人のいずれか多い数を超える者に支給されるが、その額は超える1人当たり月額21,000円であり、29,000円ではない(法附則4条3項、則附則3条)。設問の月額29,000円(単位調整額)は、常時100人を超える事業主に支給される障害者雇用調整金の額である(法50条1項)。両者の額と対象規模を取り違えている点が誤り。"},{"law":"障害者雇用促進法","cat":"納付金","q":"障害者雇用納付金は、雇用率が法定雇用率に満たない一般事業主から、法定雇用率に満たない1人当たり月額50,000円を徴収する。ただし常時100人以下の事業主には当分の間適用されない。","a":true,"exp":"〇。法定雇用率未達の事業主から不足1人当たり月額50,000円を徴収するが、常時100人以下の事業主には当分の間適用されない（法53条、附則4条1項）。","page":109,"detail":"〇。本文のとおり、独立行政法人高齢・障害・求職者雇用支援機構は、各年度につき、雇用する対象障害者に係る雇用率が法定雇用率に満たない一般事業主から、法定雇用率に満たない1人当たり月額50,000円の障害者雇用納付金を徴収する。ただし、雇用する労働者数が常時100人以下である一般事業主には、当分の間、障害者雇用納付金の規定は適用されない(法53条、附則4条1項、令17条)。設問は徴収額50,000円と常時100人以下への不適用をいずれも正確に述べており妥当である。"},{"law":"障害者雇用促進法","cat":"紛争解決","q":"障害者に対する差別の禁止(募集・採用)に係る紛争についても、都道府県労働局長は調停の対象として紛争調整委員会に調停を行わせることができる。","a":false,"exp":"×。調停の対象からは労働者の募集及び採用についての紛争は除かれる（法74条の7第1項）。募集・採用についての紛争は紛争解決の援助の対象にはなる。","page":112,"detail":"×。調停の委任については、対象となる事項に係る紛争のうち労働者の募集及び採用についての紛争は除かれるため、募集・採用に係る紛争を紛争調整委員会の調停の対象とすることはできない(法74条の7第1項)。一方、紛争の解決の援助(都道府県労働局長による助言・指導・勧告)の対象には、募集・採用に係る差別の禁止も含まれる(法74条の5・74条の6第1項)。設問は募集・採用を調停の対象に含めている点が誤りである。"},{"law":"青少年の雇用の促進等に関する法律","cat":"目的","q":"青少年の雇用の促進等に関する法律は、青少年について適職の選択並びに職業能力の開発及び向上に関する措置等を総合的に講ずることにより、雇用の促進等を図ることを目的とする。","a":true,"exp":"〇。適職の選択並びに職業能力の開発・向上等の措置を総合的に講じ、雇用の促進等を図ることを目的とする（法1条）。","page":114,"detail":"〇。本文のとおり、青少年の雇用の促進等に関する法律は、青少年について、適性並びに技能及び知識の程度にふさわしい職業(適職)の選択並びに職業能力の開発及び向上に関する措置等を総合的に講ずることにより雇用の促進等を図ることを通じ、青少年がその有する能力を有効に発揮できるようにし、もって福祉の増進を図り、あわせて経済及び社会の発展に寄与することを目的とする(法1条)。設問は同法の目的を正しく述べており妥当である。"},{"law":"青少年の雇用の促進等に関する法律","cat":"事業主の責務","q":"事業主は、青少年について、その有する能力を正当に評価するための募集及び採用の方法の改善等を講ずることにより、雇用機会の確保及び職場への定着を図るよう努めなければならない。","a":true,"exp":"〇。事業主は募集・採用方法の改善、情報提供、職業能力の開発・向上等により雇用機会の確保及び職場への定着を図るよう努めなければならない（法4条1項）。","page":114,"detail":"〇。本文のとおり、事業主は、青少年について、その有する能力を正当に評価するための募集及び採用の方法の改善、職業の選択に資する情報の提供並びに職業能力の開発及び向上に関する措置等を講ずることにより、雇用機会の確保及び職場への定着を図り、青少年がその有する能力を有効に発揮することができるように努めなければならない(法4条1項)。設問は事業主の責務の内容を正確に述べており妥当である。"},{"law":"青少年の雇用の促進等に関する法律","cat":"ユースエール認定","q":"厚生労働大臣は、常時雇用する労働者の数が500人以下の事業主からの申請に基づき、青少年の雇用管理が優良である旨の認定(ユースエール認定)を行うことができる。","a":false,"exp":"×。認定の対象は常時雇用する労働者の数が300人以下の事業主に限られる（法15条）。認定事業主はユースエール認定マークを付することができる。","page":114,"detail":"×。ユースエール認定の対象となるのは、常時雇用する労働者の数が300人以下の事業主に限られ、500人以下ではない(法15条)。厚生労働大臣は、当該事業主からの申請に基づき、青少年の募集及び採用の方法の改善、職業能力の開発及び向上並びに職場への定着の促進に関する取組の実施状況が優良である旨の認定を行うことができ、認定を受けた事業主は商品等にユースエール認定マークを付することができる(法16条1項)。設問は人数要件を誤っている。"},{"law":"男女雇用機会均等法","cat":"差別禁止","q":"事業主は、労働者の募集及び採用について、その性別にかかわりなく均等な機会を与えなければならない。","a":true,"exp":"〇。募集・採用について性別にかかわりなく均等な機会を与えなければならない（法5条）。なおこの差別禁止規定の違反について罰則はない。","page":119,"detail":"〇。本文のとおり、事業主は、労働者の募集及び採用について、その性別にかかわりなく均等な機会を与えなければならない(法5条)。具体例として、募集・採用に当たり「男性歓迎」等の表示を行うこと、応募の受付や採用の対象を男女いずれかのみとすること等は禁止される(平27.11.30厚労告458号)。なお本文の注意書きのとおり、この差別禁止規定の違反について罰則はない。設問は法5条の内容を正しく述べており妥当である。"},{"law":"男女雇用機会均等法","cat":"間接差別","q":"労働者の募集又は採用に関する措置であって、労働者の身長、体重又は体力に関する事由を要件とするものは、間接差別となるおそれがある措置として厚生労働省令で定められている。","a":true,"exp":"〇。身長・体重・体力要件、転勤要件、転勤経験要件の3つが間接差別となるおそれがある措置として定められている（法7条、則2条）。","page":122,"detail":"〇。本文のとおり、間接差別となるおそれがある措置として厚生労働省令で定められているのは、❶労働者の募集又は採用に関する措置であって身長・体重又は体力に関する事由を要件とするもの(身長・体重・体力要件)、❷募集・採用、昇進又は職種の変更に関する措置であって転居を伴う配置転換に応じられることを要件とするもの(転勤要件)、❸昇進に関する措置であって他の事業場への配置転換経験を要件とするもの(転勤経験要件)の3つである(法7条、則2条)。事業主は合理的な理由がある場合でなければこれらを講じてはならない。設問は❶の身長・体重・体力要件に該当し妥当である。"},{"law":"男女雇用機会均等法","cat":"不利益取扱い禁止","q":"事業主は、その雇用する女性労働者が妊娠したこと、出産したこと等を理由として、当該女性労働者に対して解雇その他不利益な取扱いをしてはならない。","a":true,"exp":"〇。妊娠・出産、産前産後の休業等を理由とする解雇その他不利益取扱いは禁止される（法9条3項）。妊娠中及び出産後1年を経過しない女性に対する解雇は原則無効とされる。","page":124,"detail":"〇。本文のとおり、事業主は、その雇用する女性労働者が妊娠したこと、出産したこと、労働基準法65条の規定による産前の休業を請求し又は産前産後の休業をしたことその他厚生労働省令で定める妊娠又は出産に関する事由を理由として、当該女性労働者に対して解雇その他不利益な取扱いをしてはならない(法9条3項)。さらに、妊娠中の女性労働者及び出産後1年を経過しない女性労働者に対してなされた解雇は無効とされ、ただし事業主が当該解雇が同事由を理由とするものでないことを証明したときは無効とならない(法9条4項、則2条の2)。設問は不利益取扱いの禁止を正しく述べており妥当である。"},{"law":"男女雇用機会均等法","cat":"セクハラ措置","q":"職場におけるセクシュアルハラスメントの雇用管理上の措置について、当該セクシュアルハラスメントには同性に対するものは含まれない。","a":false,"exp":"×。職場におけるセクシュアルハラスメントには同性に対するものも含まれる（令2.1.15厚労告6号）。事業主は相談体制の整備等の雇用管理上必要な措置を講じなければならない。","page":125,"detail":"×。本文のとおり、職場におけるセクシュアルハラスメントには同性に対するものも含まれる(令2.1.15厚労告6号)。事業主は、職場における性的な言動により労働者がその労働条件につき不利益を受け、又は就業環境が害されることのないよう、当該労働者からの相談に応じ適切に対応するために必要な体制の整備その他雇用管理上必要な措置を講じなければならない(法11条1項)。なお対価型・環境型の双方が含まれる。設問は同性に対するものを含まないとしている点が誤りである。"},{"law":"男女雇用機会均等法","cat":"母性健康管理措置","q":"事業主は、妊娠中の女性労働者について、妊娠23週までは4週に1回、24週から35週までは2週に1回、36週から出産までは1週に1回、健康診査等を受けるために必要な時間を確保できるようにしなければならない。","a":true,"exp":"〇。妊娠週数の区分に応じ、~23週は4週、24~35週は2週、36週~出産は1週ごとに1回必要な時間を確保する。ただし医師等が異なる指示をしたときはその指示による（法12条、則2条の4）。","page":129,"detail":"〇。本文の表のとおり、事業主は、妊娠中の女性労働者について、妊娠週数の区分に応じ、〜23週は4週に1回、24週〜35週は2週に1回、36週〜出産までは1週に1回、母子保健法の規定による保健指導又は健康診査を受けるために必要な時間を確保できるようにしなければならない(法12条、則2条の4)。ただし、医師又は助産師がこれと異なる指示をしたときは、その指示するところによる。設問は各妊娠週数の区分と頻度を正確に述べており妥当である。"},{"law":"男女雇用機会均等法","cat":"紛争解決","q":"性別を理由とする差別の禁止(募集・採用)に係る紛争は、苦情の自主的解決の対象にも調停の対象にもならないが、紛争の解決の援助の対象にはなる。","a":true,"exp":"〇。募集・採用に係るものは自主的解決(×)・調停(×)の対象外だが、紛争の解決の援助(○)の対象となる（法15条～18条）。","page":133,"detail":"〇。本文の表のとおり、男女雇用機会均等法に定める紛争の解決方法のうち、性別を理由とする差別の禁止(募集・採用)に係る紛争は、苦情の自主的解決の対象からは除かれ(法15条は募集・採用に係るものを除く)、また調停の対象からも除かれる(法18条1項は募集及び採用についての紛争を除く)。一方、紛争の解決の援助(都道府県労働局長による助言・指導・勧告)の対象にはなる(法17条1項)。設問はこの3区分の対象の有無を正しく述べており妥当である。"},{"law":"男女雇用機会均等法","cat":"調停","q":"調停は、紛争調整委員会の委員のうちから、会長があらかじめ指名した5人の調停委員が行う。","a":false,"exp":"×。調停は会長があらかじめ指名した3人の調停委員が行う（法19条）。調停案の作成は調停委員の全員一致をもって行う。","page":134,"detail":"×。調停は、紛争調整委員会の委員のうちから、会長があらかじめ指名した3人の調停委員が行うものであり、5人ではない(法19条)。なお調停案の作成は調停委員の全員一致をもって行う(則12条1項)。設問は調停委員の人数を誤っている。"},{"law":"育児・介護休業法","cat":"要介護状態","q":"育児・介護休業法における「要介護状態」とは、負傷、疾病又は身体上もしくは精神上の障害により、2週間以上の期間にわたり常時介護を必要とする状態をいう。","a":true,"exp":"〇。要介護状態とは負傷・疾病・身体上もしくは精神上の障害により2週間以上の期間にわたり常時介護を必要とする状態をいう（法2条3号、則2条）。","page":139,"detail":"〇。本文のとおり、育児・介護休業法における「要介護状態」とは、負傷、疾病又は身体上もしくは精神上の障害により、2週間以上の期間にわたり常時介護を必要とする状態をいう(法2条3号、則2条)。介護休業は、労働者がその要介護状態にある対象家族を介護するためにする休業をいう(法2条2号)。設問は要介護状態の定義を正確に述べており妥当である。"},{"law":"育児・介護休業法","cat":"対象家族","q":"介護休業の「対象家族」には、配偶者(事実婚を含む)、父母及び子、配偶者の父母のほか、これらに準ずる者として祖父母、兄弟姉妹及び孫が含まれる。","a":true,"exp":"〇。対象家族は配偶者(事実上婚姻関係と同様の事情にある者を含む)、父母及び子(これらに準ずる祖父母・兄弟姉妹・孫を含む)並びに配偶者の父母をいう（法2条4号、則3条）。","page":139,"detail":"〇。本文のとおり、「対象家族」とは、配偶者(婚姻の届出をしていないが事実上婚姻関係と同様の事情にある者を含む)、父母及び子(これらに準ずる者として祖父母、兄弟姉妹及び孫を含む)並びに配偶者の父母をいう(法2条4号、則3条)。設問は事実婚を含む配偶者、父母及び子、これらに準ずる祖父母・兄弟姉妹・孫、配偶者の父母をいずれも正しく挙げており妥当である。"},{"law":"育児・介護休業法","cat":"介護休業の期間","q":"介護休業期間は、対象家族1人につき、原則として介護休業開始予定日から起算して93日から既にした介護休業日数を差し引いた日数を経過する日までの間とされている。","a":true,"exp":"〇。介護休業期間は介護休業開始予定日から起算して93日から当該対象家族についての介護休業日数を差し引いた日数を経過する日までを限度とする（法15条1項）。","page":157,"detail":"〇。本文のとおり、介護休業期間は、介護休業開始予定日とされた日から介護休業終了予定日とされた日までの間とされ、その終了予定日が介護休業開始予定日から起算して93日から当該対象家族についての介護休業日数を差し引いた日数を経過する日より後の日であるときは、当該経過する日までを限度とする(法15条1項)。すなわち対象家族1人につき原則として通算93日が限度である。設問はこの93日から既にした介護休業日数を差し引いた日数とする内容を正しく述べており妥当である。"},{"law":"育児・介護休業法","cat":"介護休業の再申出","q":"介護休業申出が撤回され、かつ撤回後になされる最初の介護休業申出も撤回された場合には、その後になされる当該対象家族についての介護休業申出を、事業主は拒むことができる。","a":true,"exp":"〇。撤回後の最初の再申出まで撤回された対象家族については、その後の介護休業申出を事業主は拒むことができる（法14条2項）。","page":158,"detail":"〇。本文のとおり、介護休業申出の撤回がなされ、かつ当該撤回に係る対象家族について撤回後になされる最初の介護休業申出が撤回された場合においては、その後になされる当該対象家族についての介護休業申出について、事業主はこれを拒むことができる(法14条2項)。なお労働者は介護休業開始予定日とされた日の前日までは申出を撤回できる(法14条1項)。設問は再申出を拒める場合を正しく述べており妥当である。"},{"law":"育児・介護休業法","cat":"介護休業終了予定日の変更","q":"介護休業申出をした労働者は、介護休業終了予定日とされた日の1か月前の日までに申し出ることにより、介護休業終了予定日を1回に限り後の日に変更することができる。","a":false,"exp":"×。正しくは「2週間前の日まで」である。介護休業終了予定日の2週間前の日までに申し出ることにより1回に限り後ろ倒し変更ができる（法13条、則27条）。","page":159,"detail":"×。介護休業終了予定日の変更は、介護休業終了予定日とされた日の「2週間前の日まで」に事業主に申し出ることにより、1回に限り当該終了予定日後の日に変更することができるものであり、1か月前ではない(法13条、則27条)。設問は申出の期限を誤っている。"},{"law":"育児・介護休業法","cat":"介護休暇","q":"介護休暇は、要介護状態にある対象家族が1人の場合は一の年度において5労働日、2人以上の場合は10労働日を限度として取得することができる。","a":true,"exp":"〇。介護休暇は対象家族1人につき5労働日、2人以上の場合は10労働日を限度として取得できる（法16条の5第1項）。","page":162,"detail":"〇。本文のとおり、介護休暇は、要介護状態にある対象家族の介護その他の世話を行う労働者が、一の年度において5労働日(その養護する要介護状態にある対象家族が2人以上の場合は10労働日)を限度として取得することができる(法16条の5第1項)。介護休暇は1日単位のほか時間単位でも取得することができる。したがって対象家族1人で5労働日、2人以上で10労働日とする設問は正しい。"},{"law":"育児・介護休業法","cat":"子の看護等休暇","q":"子の看護等休暇の対象となるのは、小学校就学の始期に達するまでの子を養育する労働者である。","a":false,"exp":"×。正しくは「9歳に達する日以後の最初の3月31日までの間にある子（小学校第3学年修了前の子）」を養育する労働者が対象である（法16条の2第1項）。","page":160,"detail":"×。子の看護等休暇の対象となるのは、9歳に達する日以後の最初の3月31日までの間にある子(小学校第3学年修了前の子)を養育する労働者であり、小学校就学の始期に達するまでの子ではない(法16条の2第1項)。当該労働者は、一の年度において5労働日(対象となる子が2人以上の場合は10労働日)を限度として子の看護等休暇を取得できる。設問は対象となる子の範囲を誤っている。"},{"law":"育児・介護休業法","cat":"時間外労働の制限","q":"小学校就学の始期に達するまでの子を養育する労働者等が請求した場合、事業主は、原則として1か月について24時間、1年について150時間を超えて労働時間を延長してはならない。","a":true,"exp":"〇。時間外労働の制限の制限時間は1か月について24時間、1年について150時間である（法17条1項、18条1項）。","page":164,"detail":"〇。本文のとおり、時間外労働の制限の対象となった労働者の請求があったときは、事業主は制限時間(1か月について24時間、1年について150時間)を超えて労働時間を延長してはならない。ただし事業の正常な運営を妨げる場合を除く(法17条1項、18条1項)。設問は制限時間の数値を正確に述べており妥当である。"},{"law":"育児・介護休業法","cat":"深夜業の制限","q":"深夜業の制限の請求に係る制限期間は、1か月以上1年以内の期間に限られる。","a":false,"exp":"×。深夜業の制限の制限期間は「1か月以上6か月以内」である。なお所定外労働の制限・時間外労働の制限の制限期間は1か月以上1年以内である（法19条2項、20条1項）。","page":166,"detail":"×。深夜業の制限の請求に係る制限期間は、1か月以上6か月以内の期間に限られ、1か月以上1年以内ではない(法19条2項、20条1項)。なお所定外労働の制限及び時間外労働の制限の制限期間は1か月以上1年以内である(法16条の8第2項、17条2項等)。設問は深夜業の制限の制限期間を所定外労働等のものと取り違えている点が誤りである。"},{"law":"育児・介護休業法","cat":"所定労働時間の短縮措置","q":"育児のための所定労働時間の短縮措置は、3歳に満たない子を養育する労働者(1日の所定労働時間が6時間以下の者を除く)を対象とし、1日の所定労働時間を原則として6時間とする措置を含むものでなければならない。","a":true,"exp":"〇。3歳未満の子を養育する労働者（1日の所定労働時間が6時間以下の者を除く）に対し、1日の所定労働時間を原則6時間とする短縮措置を含めて講じなければならない（法23条1項、則72条・73条）。","page":169,"detail":"〇。本文のとおり、育児のための所定労働時間の短縮措置は、その3歳に満たない子を養育する労働者であって育児休業をしていないもの(1日の所定労働時間が6時間以下の労働者を除く)に関して講じなければならず(法23条1項、則72条)、当該措置は1日の所定労働時間を原則として6時間とする措置を含むものとしなければならない(則73条)。設問は対象者の範囲と原則6時間とする内容をいずれも正しく述べており妥当である。"},{"law":"育児・介護休業法","cat":"育休取得状況の公表","q":"常時雇用する労働者の数が1,000人を超える事業主は、毎年少なくとも1回、その雇用する労働者の育児休業の取得の状況を公表しなければならない。","a":false,"exp":"×。テキストでは、公表義務の対象は「常時雇用する労働者の数が300人を超える事業主」とされている。これらの事業主は毎年少なくとも1回、育児休業の取得の状況を公表しなければならない（法22条の2）。","page":169,"detail":"×。育児休業の取得の状況の公表義務が課されるのは、常時雇用する労働者の数が「300人を超える」事業主であり、1,000人を超える事業主ではない(法22条の2)。これらの事業主は、毎年少なくとも1回、その雇用する労働者の育児休業の取得の状況として厚生労働省令で定めるものを公表しなければならない。設問は公表義務の人数要件を誤っている。"},{"law":"育児・介護休業法","cat":"紛争解決","q":"都道府県労働局長は、苦情の自主的解決の対象となる事項等に係る紛争について、当事者の双方又は一方から調停の申請があり、解決のために必要があると認めるときは、紛争調整委員会に調停を行わせるものとする。","a":true,"exp":"〇。当事者の双方又は一方からの調停申請があり必要と認めるときは、都道府県労働局長は紛争調整委員会に調停を行わせる（法52条の5第1項）。","page":177,"detail":"〇。本文のとおり、都道府県労働局長は、職場における育児休業等に関する言動に起因する問題に関する雇用管理上の措置及び苦情の自主的解決の対象となる事項に係る紛争について、当該紛争の当事者の双方又は一方から調停の申請があった場合において当該紛争の解決のために必要があると認めるときは、紛争調整委員会に調停を行わせるものとする(法52条の5第1項)。設問はこの調停の委任の内容を正しく述べており妥当である。"},{"law":"パートタイム・有期雇用労働法","cat":"定義","q":"「短時間労働者」とは、1週間の所定労働時間が同一の事業主に雇用される通常の労働者の1週間の所定労働時間に比し短い労働者をいい、1週間の所定労働時間が何時間未満という要件は特にない。","a":true,"exp":"〇。短時間労働者は通常の労働者に比し1週間の所定労働時間が短い労働者をいい、何時間未満という具体的な要件はない（法2条）。","page":180,"detail":"〇。本文のとおり、「短時間労働者」とは、1週間の所定労働時間が同一の事業主に雇用される通常の労働者の1週間の所定労働時間に比し短い労働者をいう(法2条)。本文の注意書きのとおり、1週間の所定労働時間に何時間未満という要件は特にない。設問は短時間労働者の定義と、具体的な時間数の要件がない旨をいずれも正しく述べており妥当である。"},{"law":"パートタイム・有期雇用労働法","cat":"文書交付","q":"事業主が短時間・有期雇用労働者の雇入れ時に文書の交付等により明示すべき「特定事項」には、昇給の有無、退職手当の有無、賞与の有無、雇用管理の改善等に関する相談窓口が含まれる。","a":true,"exp":"〇。特定事項は、昇給の有無・退職手当の有無・賞与の有無・雇用管理の改善等に関する相談窓口の4つである（法6条1項、則2条1項）。","page":181,"detail":"〇。本文のとおり、事業主が短時間・有期雇用労働者を雇い入れたときに文書の交付等により明示すべき「特定事項」は、❶昇給の有無、❷退職手当の有無、❸賞与の有無、❹短時間・有期雇用労働者の雇用管理の改善等に関する事項に係る相談窓口の4つである(法6条1項、則2条1項)。設問はこの4つの特定事項を正確に挙げており妥当である。"},{"law":"パートタイム・有期雇用労働法","cat":"差別的取扱いの禁止","q":"「通常の労働者と同視すべき短時間・有期雇用労働者」とは、職務の内容が通常の労働者と同一であり、かつ雇用関係終了までの全期間において職務の内容及び配置の変更の範囲が通常の労働者と同一の範囲で変更されることが見込まれる者をいう。","a":true,"exp":"〇。職務内容同一であることに加え、雇用関係終了までの全期間で職務の内容及び配置の変更範囲が通常の労働者と同一範囲と見込まれること（人材活用の仕組みが同じ）を満たす者をいう（法9条）。","page":182,"detail":"〇。本文のとおり、「通常の労働者と同視すべき短時間・有期雇用労働者」とは、❶職務の内容が通常の労働者と同一である者(職務内容同一短時間・有期雇用労働者)であって、❷当該事業所における慣行その他の事情からみて、当該事業主との雇用関係が終了するまでの全期間において、その職務の内容及び配置が通常の労働者の職務の内容及び配置の変更の範囲と同一の範囲で変更されることが見込まれるもの(人材活用の仕組みが通常の労働者と同じ)の双方を満たす者をいう(法9条)。設問はこの要件を正しく述べており妥当である。"},{"law":"パートタイム・有期雇用労働法","cat":"福利厚生施設","q":"事業主が短時間・有期雇用労働者に対しても利用の機会を与えなければならない福利厚生施設は、給食施設、休憩室及び更衣室である。","a":true,"exp":"〇。利用機会付与義務の対象となる福利厚生施設は、給食施設・休憩室・更衣室である（法12条、則）。","page":183,"detail":"〇。本文のとおり、事業主が短時間・有期雇用労働者に対しても利用の機会を与えなければならない福利厚生施設として厚生労働省令で定めるものは、❶給食施設、❷休憩室、❸更衣室の3つである(法12条)。これらは健康の保持又は業務の円滑な遂行に資するものとされる。なお通常の労働者と同視すべき短時間・有期雇用労働者はこの規定の対象とはならない(法10条)。設問はこの3つの施設を正確に挙げており妥当である。"},{"law":"パートタイム・有期雇用労働法","cat":"短時間・有期雇用管理者","q":"事業主は、常時5人以上の短時間・有期雇用労働者を雇用する事業所ごとに、短時間・有期雇用管理者を選任するよう努めるものとされている。","a":false,"exp":"×。正しくは「常時10人以上」である。常時10人以上の短時間・有期雇用労働者を雇用する事業所ごとに選任するよう努めるものとされる（法17条、則6条）。","page":185,"detail":"×。短時間・有期雇用管理者の選任の努力義務が課されるのは、常時「10人以上」の短時間・有期雇用労働者を雇用する事業所ごとであり、5人以上ではない(法17条、則6条)。事業主は、指針に定める事項その他雇用管理の改善等に関する事項を管理させるため、短時間・有期雇用管理者を選任するよう努めるものとされている。設問は人数要件を誤っている。"},{"law":"パートタイム・有期雇用労働法","cat":"通常の労働者への転換","q":"事業主は、通常の労働者への転換を推進するため、その雇用する短時間・有期雇用労働者について、所定の措置のいずれかを講じなければならない。","a":true,"exp":"〇。通常の労働者の募集の周知、配置希望の申出機会の付与、転換のための試験制度の設置等のいずれかの措置を講じなければならない（法13条）。","page":184,"detail":"〇。本文のとおり、事業主は、通常の労働者への転換を推進するため、その雇用する短時間・有期雇用労働者について、❶通常の労働者の募集を行う場合に当該募集に係る事項を周知すること、❷通常の労働者の配置を新たに行う場合に配置の希望を申し出る機会を与えること、❸通常の労働者への転換のための試験制度を設けること等のいずれかの措置を講じなければならない(法13条)。設問は転換推進措置のいずれかを講ずべき義務を正しく述べており妥当である。"},{"law":"パートタイム・有期雇用労働法","cat":"説明義務","q":"事業主は、その雇用する短時間・有期雇用労働者から求めがあったときであっても、通常の労働者との間の待遇の相違の内容及び理由を説明する義務は負わない。","a":false,"exp":"×。事業主は、短時間・有期雇用労働者から求めがあったときは、通常の労働者との待遇の相違の内容及び理由等を説明しなければならない（法14条2項）。","page":184,"detail":"×。本文のとおり、事業主は、その雇用する短時間・有期雇用労働者から求めがあったときは、その短時間・有期雇用労働者と通常の労働者との間の待遇の相違の内容及び理由並びに所定の規定により措置を講ずべきとされている事項に関する決定をするに当たって考慮した事項について、当該労働者に説明しなければならない(法14条2項)。説明義務を負わないとする設問は誤りである。なお当該求めをしたことを理由とする解雇その他不利益な取扱いも禁止される(法14条3項)。"},{"law":"次世代育成支援対策推進法","cat":"行動計画","q":"一般事業主であって、常時雇用する労働者の数が100人を超えるものは、行動計画策定指針に即して一般事業主行動計画を策定し、厚生労働大臣にその旨を届け出なければならない。","a":true,"exp":"〇。常時雇用する労働者の数が100人を超える一般事業主には行動計画の策定・届出が義務付けられている（100人以下は努力義務）（法12条1項・5項）。","page":190,"detail":"〇。本文のとおり、一般事業主であって常時雇用する労働者の数が100人を超えるものは、行動計画策定指針に即して一般事業主行動計画を策定し、厚生労働大臣にその旨を届け出なければならない(変更したときも同様)(法12条1項)。常時雇用する労働者の数が100人以下の一般事業主については、策定・届出は努力義務とされている(法12条5項)。設問は100人超の事業主に策定・届出義務がある旨を正しく述べており妥当である。"},{"law":"次世代育成支援対策推進法","cat":"効力","q":"次世代育成支援対策推進法は、令和17年3月31日限りで、その効力を失う。","a":true,"exp":"〇。次世代育成支援対策推進法は令和17年3月31日限りで効力を失う（時限立法）。","page":188,"detail":"〇。本文のとおり、次世代育成支援対策推進法は、令和17年3月31日限りで、その効力を失う時限立法である。同法は次代の社会を担う子どもが健やかに生まれ育成される環境の整備を行う次世代育成支援対策を推進するため、国・地方公共団体の取組だけでなく事業主にも責務を課している。設問は失効期日を正しく述べており妥当である。"},{"law":"次世代育成支援対策推進法","cat":"認定","q":"厚生労働大臣の定める認定マークである「くるみんマーク」「トライくるみんマーク」は、特例認定一般事業主に付されるものである。","a":false,"exp":"×。「くるみん」「トライくるみん」は通常の認定一般事業主の表示であり、特例認定一般事業主の表示は「プラチナくるみんマーク」である。","page":192,"detail":"×。本文のとおり、厚生労働大臣の定める表示(認定マーク)のうち、認定一般事業主に付されるものは「くるみんマーク」又は「トライくるみんマーク」であり、特例認定一般事業主に付されるものは「プラチナくるみんマーク」である(法14条1項、15条の4第1項)。設問は「くるみん」「トライくるみん」を特例認定一般事業主のものとしている点が誤りである。"},{"law":"次世代育成支援対策推進法","cat":"特例認定","q":"特例認定一般事業主については、一般事業主行動計画の策定等の規定は適用されないが、毎年少なくとも1回、次世代育成支援対策の実施の状況を公表しなければならない。","a":true,"exp":"〇。特例認定一般事業主には行動計画策定等の規定は適用されないが、毎年少なくとも1回、次世代育成支援対策の実施状況の公表義務がある（法15条の3）。","page":193,"detail":"〇。本文のとおり、特例認定一般事業主については、「一般事業主行動計画の策定等」の規定は適用されない。その代わりに、特例認定一般事業主は、毎年少なくとも1回、次世代育成支援対策の実施の状況を公表しなければならない(法15条の3第1項・2項)。設問は行動計画策定等の規定の適用除外と、年1回以上の実施状況の公表義務をいずれも正しく述べており妥当である。"},{"law":"女性活躍推進法","cat":"行動計画","q":"一般事業主であって、常時雇用する労働者の数が100人を超えるものは、事業主行動計画策定指針に即して一般事業主行動計画を定め、厚生労働大臣に届け出なければならない。","a":true,"exp":"〇。テキストでは、常時雇用する労働者の数が100人を超える一般事業主に行動計画の策定・届出が義務付けられている（100人以下は努力義務）（法8条1項・7項）。","page":195,"detail":"〇。本文のとおり、一般事業主であって常時雇用する労働者の数が100人を超えるものは、事業主行動計画策定指針に即して一般事業主行動計画を定め、厚生労働大臣に届け出なければならない(変更したときも同様)(法8条1項)。常時雇用する労働者の数が100人以下の一般事業主については、策定・届出は努力義務とされている(法8条7項)。設問は100人超の事業主に策定・届出義務がある旨を正しく述べており妥当である。"},{"law":"女性活躍推進法","cat":"情報公表","q":"常時雇用する労働者の数が300人を超える一般事業主は、女性の職業選択に資するよう、男女の賃金の額の差異や管理的地位にある労働者に占める女性割合等の所定の情報を定期的に公表しなければならない。","a":true,"exp":"〇。常時雇用する労働者数300人超の一般事業主は、男女の賃金差異・管理職女性割合等の所定情報を定期的に公表しなければならない（法20条1項）。","page":197,"detail":"〇。本文のとおり、常時雇用する労働者の数が300人を超える一般事業主は、女性の職業選択に資するよう、❶男女の賃金の額の差異、❷管理的地位にある労働者に占める女性労働者の割合、❸女性労働者に対する職業生活に関する機会の提供に関する実績、❹職業生活と家庭生活との両立に資する雇用環境の整備に関する実績等の情報を定期的に公表しなければならない(法20条1項、則19条1項)。設問は300人超の事業主の情報公表義務を正しく述べており妥当である。"},{"law":"女性活躍推進法","cat":"認定","q":"女性活躍推進法に基づく認定一般事業主に付される認定マークを「プラチナえるぼしマーク」といい、特例認定一般事業主に付されるものを「えるぼしマーク」という。","a":false,"exp":"×。逆である。認定一般事業主の表示が「えるぼしマーク」、特例認定一般事業主の表示が「プラチナえるぼしマーク」である。","page":196,"detail":"×。本文のとおり、認定一般事業主に付される認定マークは「えるぼしマーク」であり、特例認定に係るものが「プラチナえるぼしマーク」である(法10条1項、14条1項)。設問は両者を逆に述べている点が誤りである。"},{"law":"最低賃金法","cat":"目的","q":"最低賃金法は、賃金の低廉な労働者について、賃金の最低額を保障することにより、労働条件の改善を図り、もって、労働者の生活の安定、労働力の質的向上及び事業の公正な競争の確保に資するとともに、国民経済の健全な発展に寄与することを目的とする。","a":true,"exp":"〇。設問のとおり、最低賃金法の目的として正しい（法1条）。","page":200,"detail":"〇。本文のとおり、最低賃金法は、賃金の低廉な労働者について、賃金の最低額を保障することにより、労働条件の改善を図り、もって、労働者の生活の安定、労働力の質的向上及び事業の公正な競争の確保に資するとともに、国民経済の健全な発展に寄与することを目的とする(法1条)。設問は同法の目的を条文どおり正確に述べており妥当である。"},{"law":"最低賃金法","cat":"最低賃金の効力","q":"最低賃金の適用を受ける労働者と使用者との間の労働契約で最低賃金額に達しない賃金を定めるものは、その労働契約の全部について無効となる。","a":false,"exp":"×。無効となるのは最低賃金額に達しない「その部分」についてであり、契約全部ではない。無効となった部分は最低賃金と同様の定めをしたものとみなされる（法4条）。","page":202,"detail":"×。本文によれば、最低賃金の適用を受ける労働者と使用者との間の労働契約で最低賃金額に達しない賃金を定めるものは、契約の全部ではなく「その部分について」無効とされます。すなわち無効となるのは最低賃金額に達しない部分に限られ、契約全部が無効となるわけではないので設問は誤りです。さらに、無効となった部分は最低賃金と同様の定めをしたものとみなされます。根拠は最低賃金法4条2項です。"},{"law":"最低賃金法","cat":"最低賃金の競合","q":"労働者が2以上の最低賃金の適用を受ける場合は、これらにおいて定める最低賃金額のうち最高のものにより最低賃金の効力の規定を適用する。","a":true,"exp":"〇。競合する場合は最高額が適用される（法6条1項）。","page":203,"detail":"〇。本文に、労働者が2以上の最低賃金の適用を受ける場合は、これらにおいて定める最低賃金額のうち最高のものにより「最低賃金の効力」の規定を適用すると明記されており、設問は正しいです。最も高い最低賃金額が適用される点が要点です。根拠は最低賃金法6条1項です。"},{"law":"最低賃金法","cat":"最低賃金の種類","q":"最低賃金法に定める最低賃金には、都道府県ごとに定められる地域別最低賃金と、特定の産業について定められる特定最低賃金がある。","a":true,"exp":"〇。最低賃金には地域別最低賃金と特定最低賃金がある（法9条、15条）。","page":203,"detail":"〇。本文に、最低賃金法に定める最低賃金には、都道府県ごとに定められる地域別最低賃金と、特定の産業について定められる特定最低賃金があると明記されており、設問は正しいです。地域別最低賃金は法9条、特定最低賃金は法15条に基づきます。根拠は最低賃金法9条、15条です。"},{"law":"最低賃金法","cat":"減額の特例","q":"高年齢により著しく労働能力が低い者であることのみを理由として、使用者は都道府県労働局長の許可を受けて最低賃金の減額の特例の適用を受けることができる。","a":false,"exp":"×。高年齢により著しく労働能力が低い者というだけでは、最低賃金の減額の特例の対象とはならない。対象は精神身体の障害により著しく労働能力の低い者、試の使用期間中の者等である（法7条）。","page":203,"detail":"×。本文の減額の特例の対象は、精神又は身体の障害により著しく労働能力の低い者、試みの使用期間中の者、認定職業訓練を受ける所定の者、軽易な業務に従事する者及び断続的労働に従事する者であり、これらに該当する場合に都道府県労働局長の許可を受けて減額が認められます。本文は、高年齢により著しく労働能力が低い者というだけでは減額の特例の対象とはならないと明記しているため、設問は誤りです。根拠は最低賃金法7条、則3条2項です。"},{"law":"最低賃金法","cat":"派遣中の労働者","q":"労働者派遣法に規定する派遣中の労働者については、その派遣元の事業の事業場の所在地を含む地域について決定された地域別最低賃金により最低賃金の効力の規定を適用する。","a":false,"exp":"×。派遣中の労働者については、派遣元ではなく「派遣先」の事業の事業場の所在地を含む地域について決定された地域別最低賃金が適用される（法13条）。","page":205,"detail":"×。本文に、労働者派遣法に規定する派遣中の労働者については、その「派遣先」の事業の事業場の所在地を含む地域について決定された地域別最低賃金において定める最低賃金額により「最低賃金の効力」の規定を適用すると明記されています。設問は派遣元としている点が誤りで、正しくは派遣先です。根拠は最低賃金法13条です。"},{"law":"最低賃金法","cat":"特定最低賃金","q":"特定最低賃金において定める最低賃金額は、当該特定最低賃金の適用を受ける使用者の事業場の所在地を含む地域について決定された地域別最低賃金において定める最低賃金額を上回るものでなければならない。","a":true,"exp":"〇。特定最低賃金額は当該地域の地域別最低賃金額を上回らなければならない（法16条）。","page":206,"detail":"〇。本文に、特定最低賃金において定める最低賃金額は、当該特定最低賃金の適用を受ける使用者の事業場の所在地を含む地域について決定された地域別最低賃金において定める最低賃金額を上回るものでなければならないと明記されており、設問は正しいです。特定最低賃金は地域別最低賃金を上回ることが要件である点が要点です。根拠は最低賃金法16条です。"},{"law":"賃金の支払の確保等に関する法律","cat":"貯蓄金の保全措置","q":"事業主（国及び地方公共団体を除く）は、労働者の貯蓄金をその委託を受けて管理する場合において、貯蓄金の管理が労働者の預金の受入れであるときは、毎年3月31日における受入預金額について、同日後1年間を通ずる貯蓄金の保全措置を講じなければならない。","a":true,"exp":"〇。毎年3月31日の受入預金額について、同日後1年間を通ずる保全措置を講じなければならない（法3条）。","page":209,"detail":"〇。本文に、事業主（国及び地方公共団体を除く）は、労働者の貯蓄金をその委託を受けて管理する場合において、貯蓄金の管理が労働者の預金の受入れであるときは、毎年3月31日における受入預金額について、同日後1年間を通ずる貯蓄金の保全措置を講じなければならないと明記されており、設問は正しいです。基準日が3月31日、対象期間が同日後1年間である点が要点です。根拠は賃金の支払の確保等に関する法律3条です。"},{"law":"賃金の支払の確保等に関する法律","cat":"退職手当の保全措置","q":"事業主は、就業規則等で労働者に退職手当を支払うことを明らかにしたときは、その退職手当の支払に充てるべき額として厚生労働省令で定める額について、貯蓄金の保全措置に準ずる措置を講じなければならない。","a":false,"exp":"×。退職手当の保全措置は「講ずるように努めなければならない」とされる努力義務である（法5条）。","page":209,"detail":"×。本文によれば、退職手当の保全措置については、事業主は退職手当の支払に充てるべき額として厚生労働省令で定める額について、貯蓄金の保全措置に準ずる措置を「講ずるように努めなければならない」とされており、これは努力義務です。設問は「講じなければならない」と義務的に述べている点が誤りです。なお中小企業退職金共済制度や確定給付企業年金制度を採用している事業主等は保全措置を要しません。根拠は賃金の支払の確保等に関する法律5条です。"},{"law":"賃金の支払の確保等に関する法律","cat":"遅延利息","q":"事業主は、退職した労働者の賃金（退職手当を除く）の全部又は一部を退職の日（退職日後に支払期日が到来する賃金にあっては当該支払期日）までに支払わなかった場合には、その翌日から支払日までの期間につき、まだ支払われていない賃金の額に<b>年14.6%</b>を乗じて得た金額を遅延利息として支払わなければならない。","a":true,"exp":"〇。退職労働者の賃金に係る遅延利息は年14.6%である（法6条、令1条）。","page":209,"detail":"〇。本文に、事業主は、退職した労働者の賃金（退職手当を除く）の全部又は一部を退職の日（退職日後に支払期日が到来する賃金にあっては当該支払期日）までに支払わなかった場合には、その翌日から支払日までの期間につき、その日数に応じ、まだ支払われていない賃金の額に年14.6%を乗じて得た金額を遅延利息として支払わなければならないと明記されており、設問は正しいです。遅延利息の率が年14.6%である点が要点です。根拠は賃金の支払の確保等に関する法律6条、令1条です。"},{"law":"賃金の支払の確保等に関する法律","cat":"立替払","q":"未払賃金の立替払により立替払される賃金は、原則として、未払賃金の総額の100分の60相当額である。","a":false,"exp":"×。立替払される賃金は、原則として未払賃金の総額の100分の80相当額である（令4条）。","page":210,"detail":"×。本文に、立替払される賃金は、原則として未払賃金の総額の100分の80相当額であると明記されています。設問は100分の60相当額としている点が誤りで、正しくは100分の80相当額です。なお未払賃金の総額には上限が設けられており、上限額を超えるときは上限額の100分の80相当額となります。根拠は賃金の支払の確保等に関する法律施行令4条です。"},{"law":"賃金の支払の確保等に関する法律","cat":"立替払","q":"未払賃金の立替払の対象となるのは、1年以上の期間にわたって労働者災害補償保険の適用事業に該当する事業の事業主が破産手続開始の決定を受ける等した場合である。","a":true,"exp":"〇。1年以上労災保険の適用事業に該当する事業の事業主が破産手続開始の決定を受ける等したことが要件である（法7条）。","page":210,"detail":"〇。本文に、未払賃金の立替払の要件として、1年以上の期間にわたって労働者災害補償保険の適用事業に該当する事業の事業主が破産手続開始の決定を受け、その他政令で定める事由に該当することとなったことが掲げられており、設問は正しいです。1年以上労災保険の適用事業に該当する事業の事業主であることが要件である点が要点です。なお退職した労働者は所定の期間内の退職が要件となります。根拠は賃金の支払の確保等に関する法律7条です。"},{"law":"中小企業退職金共済法","cat":"目的","q":"中小企業退職金共済法は、中小企業の従業員について、中小企業者の相互扶助の精神に基づき、その拠出による退職金共済制度を確立し、もってこれらの従業員の福祉の増進と中小企業の振興に寄与することを目的とする。","a":true,"exp":"〇。設問のとおり目的として正しい（法1条）。","page":212,"detail":"〇。本文に、中小企業退職金共済法は、中小企業の従業員について、中小企業者の相互扶助の精神に基づき、その拠出による退職金共済制度を確立し、もってこれらの従業員の福祉の増進と中小企業の振興に寄与することを目的とすると明記されており、設問は目的の規定として正しいです。根拠は中小企業退職金共済法1条です。"},{"law":"中小企業退職金共済法","cat":"掛金月額","q":"被共済者1人につき、掛金月額は5,000円（短時間労働被共済者は2,000円）以上30,000円以下とされている。","a":true,"exp":"〇。掛金月額は5,000円（短時間労働被共済者は2,000円）以上30,000円以下である（法4条2項）。","page":214,"detail":"〇。本文に、被共済者1人につき、掛金月額は5,000円（短時間労働被共済者は2,000円）以上30,000円以下とされていると明記されており、設問は正しいです。下限が原則5,000円、短時間労働被共済者は2,000円、上限が30,000円である点が要点です。根拠は中小企業退職金共済法4条2項です。"},{"law":"中小企業退職金共済法","cat":"退職金の支給","q":"機構は、被共済者が退職したときはその者に退職金を支給するが、掛金の納付月数が6か月未満の場合には退職金を支給しない。","a":false,"exp":"×。退職金を支給しないのは掛金の納付月数が「12か月」未満の場合である（法10条1項）。","page":214,"detail":"×。本文に、機構は被共済者が退職したときはその者（退職が死亡によるものであるときはその遺族）に退職金を支給するが、掛金の納付月数が12か月未満の場合には退職金を支給しないと明記されています。設問は6か月未満としている点が誤りで、正しくは12か月未満です。根拠は中小企業退職金共済法10条1項です。"},{"law":"労働組合法","cat":"目的・免責","q":"労働組合の団体交渉その他の行為であって労働組合法の目的を達成するためにした正当なものであっても、暴力の行使は、いかなる場合においても労働組合の正当な行為とは解釈されない。","a":true,"exp":"〇。正当な行為には刑法35条が適用され犯罪は成立しないが、暴力の行使はいかなる場合も正当な行為とは解釈されない（法1条2項）。","page":218,"detail":"〇。本文に、労働組合の団体交渉その他の行為であって「労働組合法の目的」を達成するためにした正当なものについては刑法35条が適用され犯罪は成立しないが、ただし、いかなる場合においても、暴力の行使は労働組合の正当な行為と解釈されないと明記されており、設問は正しいです。暴力の行使はいかなる場合も正当な行為とされない点が要点です。根拠は労働組合法1条2項です。"},{"law":"労働組合法","cat":"労働者","q":"労働組合法上の「労働者」とは、職業の種類を問わず、賃金、給料その他これに準ずる収入によって生活する者をいい、失業者は含まれない。","a":false,"exp":"×。労働組合法上の労働者には失業者も含まれる（法3条）。","page":221,"detail":"×。本文に、労働組合法上の「労働者」とは、職業の種類を問わず、賃金、給料その他これに準ずる収入によって生活する者をいうとされ、さらに失業者も労働者に含むと明記されています。設問は失業者を含まないとしている点が誤りで、正しくは失業者も含まれます。根拠は労働組合法3条です。"},{"law":"労働組合法","cat":"不当労働行為","q":"労働者が労働組合に加入しないこと、又は労働組合から脱退することを雇用条件とすること（黄犬契約）は、不当労働行為に該当する。","a":true,"exp":"〇。黄犬契約は不当労働行為に該当する（法7条2号）。","page":223,"detail":"〇。本文の不当労働行為の規定によれば、労働者が労働組合に加入しないこと、又は労働組合から脱退することを雇用条件とすること（黄犬契約）は不当労働行為に該当するとされており、設問は正しいです。黄犬契約は不当労働行為に当たる点が要点です。なお過半数を代表する労働組合の組合員であることを雇用条件とするショップ協定の締結は認められています。根拠は労働組合法7条2号です。"},{"law":"労働組合法","cat":"不当労働行為","q":"使用者が雇用する労働者の代表者と団体交渉をすることを正当な理由がなくて拒むことは、不当労働行為に該当する。","a":true,"exp":"〇。正当な理由のない団体交渉拒否は不当労働行為に該当する（法7条2号）。","page":223,"detail":"〇。本文の不当労働行為の規定によれば、使用者が雇用する労働者の代表者と団体交渉をすることを正当な理由がなくて拒むことは不当労働行為に該当するとされており、設問は正しいです。本文の例によれば、合同労組の代表者から団体交渉の要求を受けた場合でも、正当な理由なく拒めば不当労働行為となります。根拠は労働組合法7条2号です。"},{"law":"労働組合法","cat":"労働協約","q":"労働組合と使用者又はその団体との間の労働条件その他に関する労働協約は、書面に作成し、両当事者が署名し、又は記名押印することによってその効力を生ずる。","a":true,"exp":"〇。労働協約は書面に作成し両当事者が署名又は記名押印することで効力を生ずる（法14条）。","page":226,"detail":"〇。本文に、労働組合と使用者又はその団体との間の労働条件その他に関する労働協約は、書面に作成し、両当事者が署名し、又は記名押印することによってその効力を生じると明記されており、設問は正しいです。書面の作成と両当事者の署名又は記名押印が効力発生の要件である点が要点です。根拠は労働組合法14条です。"},{"law":"労働組合法","cat":"労働協約の期間","q":"労働協約には、5年を超える有効期間の定めをすることができず、5年を超える有効期間を定めた場合は5年の有効期間の定めをしたものとみなされる。","a":false,"exp":"×。労働協約には「3年」を超える有効期間の定めをすることができず、3年を超える定めをした場合は3年の有効期間としたものとみなされる（法15条）。","page":226,"detail":"×。本文に、労働協約には3年を超える有効期間の定めをすることはできず、3年を超える有効期間を定めた場合は3年の有効期間の定めをしたものとみなされると明記されています。設問は5年としている点が誤りで、正しくは3年です。根拠は労働組合法15条です。"},{"law":"労働組合法","cat":"一般的拘束力","q":"一の工場事業場に常時使用される同種の労働者の4分の3以上の数の労働者が一の労働協約の適用を受けるに至ったときは、当該工場事業場に使用される他の同種の労働者に関しても、当該労働協約が適用される。","a":true,"exp":"〇。4分の3以上の労働者が適用を受けるに至ったときは他の同種の労働者にも適用される（法17条）。","page":227,"detail":"〇。本文の一般的拘束力の規定によれば、一の工場事業場に常時使用される同種の労働者の4分の3以上の数の労働者が一の労働協約の適用を受けるに至ったときは、当該工場事業場に使用される他の同種の労働者に関しても当該労働協約が適用されるとされており、設問は正しいです。基準が4分の3以上であり、判定は一の工場事業場ごとに行われる点が要点です。根拠は労働組合法17条です。"},{"law":"労働組合法","cat":"審査","q":"労働委員会は、不当労働行為の申立てが行為の日（継続する行為にあってはその終了日）から2年を経過した事件に係るものであるときは、その申立てを受けることができない。","a":false,"exp":"×。正しくは「1年」を経過した事件に係るものであるときは申立てを受けることができない（法27条2項）。","page":229,"detail":"×。本文の不当労働行為事件の審査の規定によれば、労働委員会は、申立てが行為の日（継続する行為にあってはその終了日）から1年を経過した事件に係るものであるときは、その申立てを受けることができないとされています。設問は2年としている点が誤りで、正しくは1年です。根拠は労働組合法27条2項です。"},{"law":"労働組合法","cat":"罰則","q":"使用者が不当労働行為を行った場合、直ちに労働組合法上の罰則が適用される。","a":false,"exp":"×。直ちに罰則が適用されるわけではなく、救済命令等が確定判決によって支持された場合になお違反があったときに初めて罰則が適用される（法28条）。","page":230,"detail":"×。本文の注意書きによれば、使用者が不当労働行為を行った場合、直ちに労働組合法上の罰則が適用されるわけではなく、労働委員会の救済命令等の全部又は一部が確定判決によって支持された場合において、なお違反があったときに初めて罰則が適用されます。設問は直ちに罰則が適用されるとしている点が誤りです。この場合、その行為をした者は1年以下の拘禁刑もしくは100万円以下の罰金に処し、又は併科されます。根拠は労働組合法28条です。"},{"law":"労働関係調整法","cat":"目的","q":"労働関係調整法は、労働組合法と相まって、労働関係の公正な調整を図り、労働争議を予防し、又は解決して、産業の平和を維持し、もって経済の興隆に寄与することを目的とする。","a":true,"exp":"〇。設問のとおり目的として正しい（法1条）。","page":232,"detail":"〇。本文に、労働関係調整法は、労働組合法と相まって、労働関係の公正な調整を図り、労働争議を予防し、又は解決して、産業の平和を維持し、もって経済の興隆に寄与することを目的とすると明記されており、設問は目的の規定として正しいです。根拠は労働関係調整法1条です。"},{"law":"労働関係調整法","cat":"調整方法","q":"労働委員会が行う労働争議の調整方法には、斡旋、調停及び仲裁があり、このうち仲裁による仲裁裁定は労働協約と同一の効力を有する。","a":true,"exp":"〇。調整方法は斡旋・調停・仲裁の3つで、仲裁裁定は労働協約と同一の効力（法的拘束力）を有する。","page":234,"detail":"〇。本文に、労働委員会が行う労働争議の調整方法には、斡旋、調停及び仲裁があると明記されており、また本文の表によれば仲裁委員会による仲裁の仲裁裁定は労働協約と同一の効力（法的拘束力）を有するとされているため、設問は正しいです。斡旋と調停は受入の諾否が当事者の自由であるのに対し、仲裁裁定は当事者を拘束する点が要点です。根拠は労働関係調整法34条等です。"},{"law":"労働関係調整法","cat":"調停","q":"調停は、使用者を代表する調停委員、労働者を代表する調停委員及び公益を代表する調停委員から成る調停委員会を設けて行い、調停委員会は調停案を作成して関係当事者に示し、その受諾を勧告する。","a":true,"exp":"〇。調停は三者構成の調停委員会で行い、調停案を作成して受諾を勧告する。受諾の諾否は当事者の自由である。","page":234,"detail":"〇。本文に、調停は、使用者を代表する調停委員、労働者を代表する調停委員及び公益を代表する調停委員から成る調停委員会を設けて行い、調停委員会は調停案を作成してこれを関係当事者に示し、その受諾を勧告すると明記されており、設問は正しいです。三者構成の調停委員会で行い、調停案の受入の諾否は当事者の自由である点が要点です。根拠は労働関係調整法18条、19条、26条です。"},{"law":"労働関係調整法","cat":"公益事業の予告","q":"公益事業に関する事件につき関係当事者が争議行為をするには、その争議行為をしようとする日の少なくとも30日前までに、労働委員会及び厚生労働大臣又は都道府県知事にその旨を通知しなければならない。","a":false,"exp":"×。公益事業の争議行為の予告期間は、少なくとも「10日」前までである（法37条1項）。","page":233,"detail":"×。本文の公益事業の争議行為の予告によれば、公益事業に関する事件につき関係当事者が争議行為をするには、その争議行為をしようとする日の少なくとも10日前までに、労働委員会及び厚生労働大臣又は都道府県知事にその旨を通知しなければなりません。設問は30日前としている点が誤りで、正しくは10日前です。根拠は労働関係調整法37条1項です。"},{"law":"個別労働関係紛争解決促進法","cat":"目的・定義","q":"個別労働関係紛争解決促進法における「個別労働関係紛争」には、労働者の募集及び採用に関する事項についての個々の求職者と事業主との間の紛争も含まれる。","a":true,"exp":"〇。個別労働関係紛争には募集及び採用に関する求職者と事業主との間の紛争も含まれる（法1条）。","page":236,"detail":"〇。本文に、個別労働関係紛争解決促進法の目的として、労働条件その他労働関係に関する事項についての個々の労働者と事業主との間の紛争には、労働者の募集及び採用に関する事項についての個々の求職者と事業主との間の紛争を含むと明記されており、設問は正しいです。募集採用に関する求職者と事業主との間の紛争も個別労働関係紛争に含まれる点が要点です。根拠は個別労働関係紛争解決促進法1条です。"},{"law":"個別労働関係紛争解決促進法","cat":"助言指導","q":"都道府県労働局長は、個別労働関係紛争に関し、当事者の双方又は一方からその解決につき援助を求められた場合には、当該紛争の当事者に対し、必要な助言又は指導をすることができる。","a":true,"exp":"〇。都道府県労働局長は当事者に対し必要な助言又は指導をすることができる（法4条1項）。","page":237,"detail":"〇。本文に、都道府県労働局長は、個別労働関係紛争に関し、当事者の双方又は一方からその解決につき援助を求められた場合には、当該個別労働関係紛争の当事者に対し、必要な助言又は指導をすることができると明記されており、設問は正しいです。なお事業主は労働者が援助を求めたことを理由として解雇その他不利益な取扱いをしてはなりません。根拠は個別労働関係紛争解決促進法4条1項です。"},{"law":"個別労働関係紛争解決促進法","cat":"あっせん","q":"都道府県労働局長は、労働者の募集及び採用に関する事項についての紛争を含むすべての個別労働関係紛争について、当事者からあっせんの申請があった場合は紛争調整委員会にあっせんを行わせる。","a":false,"exp":"×。あっせんは「労働者の募集及び採用に関する事項についての紛争を除く」個別労働関係紛争について行われる。助言指導と異なり募集採用は対象外である（法5条1項）。","page":237,"detail":"×。本文のあっせんの委任によれば、都道府県労働局長は、個別労働関係紛争（労働者の募集及び採用に関する事項についての紛争を除く）について、当事者の双方又は一方からあっせんの申請があり、解決のために必要があると認めるときに紛争調整委員会にあっせんを行わせます。設問は募集及び採用に関する紛争を含むすべての紛争を対象とする点が誤りで、助言指導と異なりあっせんでは募集採用に関する紛争は対象外です。根拠は個別労働関係紛争解決促進法5条1項です。"},{"law":"個別労働関係紛争解決促進法","cat":"適用除外","q":"労働施策総合推進法、労働者派遣法、男女雇用機会均等法等に規定する紛争については、各法により、個別労働関係紛争解決促進法の助言及び指導、あっせん等の規定の適用が除外されている。","a":true,"exp":"〇。これらの個別法に規定する紛争は各法により本法の助言指導・あっせん等の適用が除外されている（法4条1項ほか）。","page":237,"detail":"〇。本文に、労働施策総合推進法、労働者派遣法、障害者雇用促進法、男女雇用機会均等法、育児介護休業法及びパートタイム・有期雇用労働法に規定する紛争は、各法により、個別労働関係紛争解決促進法の「助言及び指導」、「あっせん」等の規定の適用が除外されていると明記されており、設問は正しいです。これらの個別法に規定する紛争は各法の手続によることとなる点が要点です。根拠は個別労働関係紛争解決促進法4条1項ほかです。"},{"law":"労働契約法","cat":"目的","q":"労働契約法は、労働者及び使用者の自主的な交渉の下で、労働契約が合意により成立し、又は変更されるという合意の原則その他労働契約に関する基本的事項を定めることにより、労働者の保護を図りつつ、個別の労働関係の安定に資することを目的とする。","a":true,"exp":"〇。設問のとおり目的として正しい（法1条）。","page":239,"detail":"〇。本文に、労働契約法は、労働者及び使用者の自主的な交渉の下で、労働契約が合意により成立し、又は変更されるという合意の原則その他労働契約に関する基本的事項を定めることにより、合理的な労働条件の決定又は変更が円滑に行われるようにすることを通じて、労働者の保護を図りつつ、個別の労働関係の安定に資することを目的とすると明記されており、設問は目的の規定として正しいです。根拠は労働契約法1条です。"},{"law":"労働契約法","cat":"安全配慮","q":"使用者は、労働契約に伴い、労働者がその生命、身体等の安全を確保しつつ労働することができるよう、必要な配慮をするものとする。","a":true,"exp":"〇。使用者の安全配慮義務として正しい（法5条）。","page":241,"detail":"〇。本文に、使用者は、労働契約に伴い、労働者がその生命、身体等の安全を確保しつつ労働することができるよう、必要な配慮をするものとすると明記されており、設問は使用者の安全配慮義務の規定として正しいです。本文によれば「必要な配慮」は一律に定まるものではなく、労働者の職種、労務内容、労務提供場所等の具体的状況に応じて求められるものです。根拠は労働契約法5条です。"},{"law":"労働契約法","cat":"就業規則の不利益変更","q":"使用者は、労働者と合意することなく、就業規則を変更することにより、労働者の不利益に労働契約の内容である労働条件を変更することはできないが、変更後の就業規則を労働者に周知させ、かつ変更が合理的なものであるとき等は、この限りでない。","a":true,"exp":"〇。原則として合意なき不利益変更はできないが、周知と変更の合理性等の要件を満たす場合は変更が認められる（法9条、10条）。","page":242,"detail":"〇。本文に、使用者は、労働者と合意することなく就業規則を変更することにより労働者の不利益に労働契約の内容である労働条件を変更することはできないとされる一方、変更後の就業規則を労働者に周知させ、かつ、就業規則の変更が労働者の受ける不利益の程度、労働条件の変更の必要性、変更後の就業規則の内容の相当性、労働組合等との交渉の状況その他の事情に照らして合理的なものであるときは、変更後の就業規則によるとされており、設問は正しいです。原則は合意なき不利益変更は不可だが、周知と合理性等の要件を満たせば変更が認められる点が要点です。根拠は労働契約法9条、10条です。"},{"law":"労働契約法","cat":"無期転換","q":"同一の使用者との間で締結された2以上の有期労働契約の通算契約期間が3年を超える労働者が無期労働契約の締結の申込みをしたときは、使用者は当該申込みを承諾したものとみなされる。","a":false,"exp":"×。無期転換の要件は通算契約期間が「5年」を超える場合である（法18条1項）。","page":247,"detail":"×。本文に、同一の使用者との間で締結された2以上の有期労働契約の通算契約期間が5年を超える労働者が、現に締結している有期労働契約の契約期間が満了する日までの間に無期労働契約の締結の申込みをしたときは、使用者は当該申込みを承諾したものとみなすと明記されています。設問は3年を超えるとしている点が誤りで、正しくは5年を超える場合です。根拠は労働契約法18条1項です。"},{"law":"労働契約法","cat":"通算契約期間","q":"有期労働契約の契約期間が満了した日と次の有期労働契約の初日との間に6か月以上の空白期間があるときは、当該空白期間前に満了した有期労働契約の契約期間は、原則として通算契約期間に算入しない。","a":true,"exp":"〇。原則として空白期間が6か月以上であるときは、その前の契約期間は通算契約期間に算入しない（法18条2項）。","page":249,"detail":"〇。本文の通算契約期間の計算によれば、使用者との間で締結された一の有期労働契約の契約期間が満了した日と次の有期労働契約の契約期間の初日との間に空白期間があり、当該空白期間が6か月以上であるときは、当該空白期間前に満了した有期労働契約の契約期間は通算契約期間に算入しないとされており、設問は正しいです。原則として空白期間が6か月以上であればクーリングされ通算されない点が要点です。根拠は労働契約法18条2項です。"},{"law":"労働契約法","cat":"雇止め法理","q":"有期労働契約の更新の申込み等に対し、使用者が当該申込みを拒絶することが客観的に合理的な理由を欠き、社会通念上相当であると認められないときは、使用者は従前の有期労働契約と同一の労働条件で当該申込みを承諾したものとみなされる。","a":true,"exp":"〇。雇止め法理の規定として正しい（法19条）。","page":250,"detail":"〇。本文に、有期労働契約であって所定のいずれかに該当するものの契約期間が満了する日までの間に労働者が更新の申込みをした場合等であって、使用者が当該申込みを拒絶することが客観的に合理的な理由を欠き、社会通念上相当であると認められないときは、使用者は従前の有期労働契約の内容である労働条件と同一の労働条件で当該申込みを承諾したものとみなすと明記されており、設問は雇止め法理の規定として正しいです。根拠は労働契約法19条です。"},{"law":"労働契約法","cat":"適用除外","q":"労働契約法は、国家公務員及び地方公務員のほか、家事使用人についても適用が除外されている。","a":false,"exp":"×。労働契約法の適用除外は、国家公務員及び地方公務員、使用者が同居の親族のみを使用する場合の労働契約であり、「家事使用人」は適用除外されていない（法21条）。","page":251,"detail":"×。本文の労働契約法の適用除外によれば、適用しないのは、国家公務員及び地方公務員と、使用者が同居の親族のみを使用する場合の労働契約です。さらに本文の注意書きで「家事使用人」については労働契約法の適用が除外されていないと明記されているため、家事使用人も適用除外とする設問は誤りです。根拠は労働契約法21条です。"},{"law":"職業能力開発促進法","cat":"目的・基本計画","q":"厚生労働大臣は、職業能力の開発に関する基本となるべき計画（職業能力開発基本計画）を策定するものとされている。","a":true,"exp":"〇。厚生労働大臣は職業能力開発基本計画を策定する（法5条1項）。","page":254,"detail":"〇。本文に、厚生労働大臣は、職業能力の開発に関する基本となるべき計画（「職業能力開発基本計画」といいます）を策定するものとされていると明記されており、設問は正しいです。計画策定の主体が厚生労働大臣である点が要点です。根拠は職業能力開発促進法5条1項です。"},{"law":"職業能力開発促進法","cat":"認定職業訓練","q":"事業主等は、厚生労働大臣の認定を受けて、職業訓練（認定職業訓練）を実施することができる。","a":false,"exp":"×。認定職業訓練は「都道府県知事」の認定を受けて実施することができる（法13条、24条）。","page":257,"detail":"×。本文の認定職業訓練の実施によれば、事業主等は、都道府県知事の認定を受けて、職業訓練（「認定職業訓練」といいます）を実施することができるとされています。設問は厚生労働大臣の認定としている点が誤りで、正しくは都道府県知事の認定です。なお実習併用職業訓練については厚生労働大臣の認定を受けて実施します。根拠は職業能力開発促進法13条、24条です。"},{"law":"職業能力開発促進法","cat":"技能検定","q":"技能検定は実技試験及び学科試験によって行われ、技能検定に合格した者は、技能士と称することができる。","a":true,"exp":"〇。技能検定は実技試験及び学科試験により行い、合格者は技能士と称することができる（法44条、50条1項）。","page":258,"detail":"〇。本文の技能検定によれば、技能検定は実技試験及び学科試験によって行われ、技能検定に合格した者は技能士と称することができるとされており、設問は正しいです。技能検定が実技試験と学科試験で行われ、合格者が技能士を称することができる点が要点です。根拠は職業能力開発促進法44条、50条1項です。"},{"law":"求職者支援法","cat":"特定求職者","q":"求職者支援法における「特定求職者」とは、公共職業安定所に求職の申込みをしている者（雇用保険法に規定する被保険者である者及び受給資格者である者を除く）のうち、労働の意思及び能力を有し、職業訓練その他の支援措置を行う必要があると公共職業安定所長が認めた者をいう。","a":true,"exp":"〇。特定求職者の定義として正しい（法2条）。","page":259,"detail":"〇。本問は求職者支援法における「特定求職者」の定義として正しい。同法は、特定求職者に対し職業訓練の実施や給付金の支給その他の就職支援措置を講ずることで、その就職を促進し、職業及び生活の安定に資することを目的とする(法1条)。特定求職者とは、公共職業安定所に求職の申込みをしている者(雇用保険法に規定する被保険者である者及び受給資格者である者を除く)のうち、労働の意思及び能力を有しているものであって、職業訓練その他の支援措置を行う必要があるものと公共職業安定所長が認めたものをいう(法2条)。したがって本問の記述は条文どおりである。"},{"law":"求職者支援法","cat":"給付金","q":"職業訓練受講給付金として支給を受けた金銭は、課税の対象となる。","a":false,"exp":"×。職業訓練受講給付金として支給を受けた金銭は非課税である。また、支給を受ける権利は譲渡・担保供与・差押えができない（法10条ほか）。","page":260,"detail":"×。本問は「課税の対象となる」としている点が誤りである。職業訓練受講給付金として支給を受けた金銭は、非課税とされている(法10条)。また、職業訓練受講給付金の支給を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができない(法9条)。偽りその他不正の行為により給付金の支給を受けた者には、返還命令のほか、その額の2倍に相当する額以下の金額の納付命令を行うことができる(法8条1項)。"},{"law":"労働時間等設定改善法","cat":"事業主の責務","q":"事業主は、その雇用する労働者の労働時間等の設定の改善を図るため、健康及び福祉を確保するために必要な終業から始業までの時間の設定（勤務間インターバル）等の必要な措置を講ずるように努めなければならない。","a":true,"exp":"〇。勤務間インターバルの設定等は努力義務として規定されている（法2条1項）。","page":262,"detail":"〇。本問は労働時間等設定改善法における事業主の責務として正しい。事業主は、その雇用する労働者の労働時間等の設定の改善を図るため、業務の繁閑に応じた始業及び終業の時刻の設定、健康及び福祉を確保するために必要な終業から始業までの時間の設定(勤務間インターバル)、年次有給休暇を取得しやすい環境の整備その他の必要な措置を講ずるように努めなければならない(法2条1項)。これは努力義務として規定されており、本問の記述は条文どおりである。"},{"law":"労働時間等設定改善法","cat":"設定改善委員会","q":"労働時間等設定改善委員会において、その委員の3分の2以上の多数による議決により所定の事項について決議が行われたときは、当該事項に係る労働基準法に規定する労使協定に代替することができる。","a":false,"exp":"×。労使協定に代替できる決議は、委員の「5分の4」以上の多数による議決による（法7条）。","page":263,"detail":"×。本問は「3分の2以上」としている点が誤りである。労働時間等設定改善委員会でその委員の5分の4以上の多数による議決により所定の事項について決議が行われたときは、当該事項に係る労働基準法に規定する労使協定に代替(当該事項に関する労使協定と同様の効果を有するものと)することができる(法7条)。決議により労使協定に代替できる事項には、1か月単位の変形労働時間制、フレックスタイム制、時間外労働・休日労働などがある。したがって正しくは5分の4以上であり、本問は誤りである。"},{"law":"労働時間等設定改善法","cat":"設定改善委員会","q":"労働時間等設定改善委員会の決議のうち、時間外労働・休日労働に係る決議については届出が必要であるが、その他の決議は届出を要しない。","a":true,"exp":"〇。時間外労働・休日労働に係る決議は届出が必要で、その他の決議は届出を要しない（法7条）。","page":263,"detail":"〇。本問は労働時間等設定改善委員会の決議に係る届出の要否として正しい。同委員会の委員の5分の4以上の多数による議決による決議は、労働基準法に規定する労使協定に代替する効果を有するが、このうち「時間外労働・休日労働」に係る決議は届出が必要であり、その他の決議は届出を要しない(法7条)。したがって本問の記述はテキストどおりである。"},{"law":"労務管理","cat":"評価誤差","q":"人事考課における評定誤差のうち、ある特定の考課要素の印象から、被考課者の全体の印象を判断してしまう傾向を<b>ハロー効果</b>という。","a":true,"exp":"〇。ハロー効果は、特定の考課要素の印象で被考課者全体の印象を判断してしまう傾向であり、テキストの定義のとおりである。","page":271,"detail":"〇。本問はハロー効果の定義として正しい。評定誤差とは、人が人を評価する評定過程で考課者が無意識のうちに陥る誤りをいう。このうちハロー効果とは、ある特定の考課要素の印象から、被考課者の全体の印象を判断してしまう傾向をいう。本問の記述はテキストの定義どおりである。なお、考課者が多数の者を「標準」と中央に評価することを中央化傾向という。"},{"law":"労務管理","cat":"評価誤差","q":"被考課者を全体として実際の成績よりも甘く評価してしまう傾向を<b>中央化傾向</b>という。","a":false,"exp":"×。これは寛大化傾向の説明である。中央化傾向とは、考課者が被考課者の集団に対して多数の者を「標準」と(中央に)評価することをいう。","page":271,"detail":"×。本問の説明は中央化傾向ではなく寛大化傾向の説明である。被考課者を全体として実際の成績よりも甘く評価してしまうことを寛大化傾向という。一方、中央化傾向とは、考課者が被考課者の集団に対して多数の者を「標準」と(中央に)評価することをいう。したがって本問は用語の対応が誤っている。"},{"law":"労務管理","cat":"評価誤差","q":"評価項目間に論理的に類似した項目がある場合に、特定の要素が優れていると他の関連する要素も優れていると評価してしまう傾向を<b>論理誤差</b>という。","a":true,"exp":"〇。論理誤差は、論理的に類似した項目間で特定要素が優れていると関連要素も優れていると評価してしまう傾向であり、テキストどおりである。","page":271,"detail":"〇。本問は論理誤差の定義として正しい。論理誤差とは、評価項目間に論理的に類似した項目がある場合に、特定の要素が優れていると、他の関連する要素も優れていると評価してしまう傾向をいう。本問の記述はテキストの定義どおりである。なお、考課者が自分と反対の特性を持つ被考課者を過大又は過小に評価する傾向は対比誤差という。"},{"law":"労務管理","cat":"評価誤差","q":"考課者が自分と反対の特性を持つ被考課者を過大又は過小に評価する傾向を<b>論理誤差</b>という。","a":false,"exp":"×。これは対比誤差の説明である。論理誤差は、論理的に類似した項目で特定要素が優れていると関連要素も優れていると評価してしまう傾向をいう。","page":271,"detail":"×。本問の説明は論理誤差ではなく対比誤差の説明である。考課者が自分と反対の特性を持つ被考課者を過大又は過小に評価する傾向を対比誤差という。一方、論理誤差とは、評価項目間に論理的に類似した項目がある場合に、特定の要素が優れていると他の関連する要素も優れていると評価してしまう傾向をいう。したがって本問は用語の対応が誤っている。"},{"law":"労務管理","cat":"科学的管理法","q":"アメリカのF.W.テーラーは、時間研究・動作研究によって標準作業時間と標準作業量を定め、これを基準とする<b>差別的出来高給制</b>を提唱した。","a":true,"exp":"〇。テーラーの科学的管理法(テーラーシステム)では、時間研究・動作研究により標準を定め、達成者には高い賃率、未達成者には低い賃率を適用する差別的出来高給制を提唱した。","page":286,"detail":"〇。本問はテーラーの科学的管理法(テーラーシステム)の説明として正しい。アメリカのF.W.テーラーは、最小の労力で最大の効果を上げるために、時間研究・動作研究によって標準作業時間と標準作業量を定め、これを基準とする差別的出来高給制を提唱した。差別的出来高給制とは、作業標準を設定し、達成した労働者には高い賃率を適用し、達成しない労働者には低い賃率を適用して賃金を算定する方法である。本問の記述はテキストどおりである。"},{"law":"労務管理","cat":"人間関係論","q":"アメリカのウェスタン・エレクトリック社のホーソン工場で行われた一連の実験(ホーソン実験)は、<b>テーラー</b>らが中心となって行ったもので、人間関係論発展の契機となった。","a":false,"exp":"×。ホーソン実験は、メイヨー、レスリスバーガーらが行った実験である。テーラーは科学的管理法を提唱した人物であり、ホーソン実験とは別である。","page":286,"detail":"×。本問はホーソン実験を「テーラーら」が行ったとする点が誤りである。ホーソン実験は、1920年代から1930年代にかけて、メイヨー、レスリスバーガーらが、アメリカのウェスタン・エレクトリック社のホーソン工場で行った一連の実験で、人間関係論発展の契機になった実験である。一方、テーラーは時間研究・動作研究に基づく科学的管理法(差別的出来高給制)を提唱した人物であり、ホーソン実験とは別である。"},{"law":"労務管理","cat":"人間関係論","q":"ホーソン実験では、人間の作業能率を左右するのは照明などの物理的環境や賃金などの条件ではなく、同僚や上司との間に作られる<b>インフォーマルな人間関係</b>であることが明らかにされた。","a":true,"exp":"〇。ホーソン実験では、作業能率を左右するのは物理的環境や賃金ではなくインフォーマルな人間関係であること等が明らかにされた。","page":286,"detail":"〇。本問はホーソン実験で明らかにされた内容として正しい。ホーソン実験では照明実験などが行われ、人間の作業能率を左右するのは、照明などの物理的環境や賃金などの非人間的な条件ではなく、同僚や上司との間に作られるインフォーマルな人間関係であること等が明らかにされた。また、人間の行動は論理的なものが中心ではなく、属する集団の社会的慣行や周囲の状況などに影響を受ける感情に基づくこともあわせて示された。本問の記述はテキストどおりである。"},{"law":"労務管理","cat":"動機づけ理論","q":"<b>マズロー</b>は、欲求を低次から、生理的欲求・安全の欲求・社会的欲求・承認の欲求・自己実現の欲求の5段階に分け、最高次の自己実現の欲求は完全に満たされることのない最も強いモチベーションになるとした。","a":true,"exp":"〇。マズローの欲求5段階説のとおりである。欲求は低次から順を追って現れ、自己実現の欲求が最も強いモチベーションになるとした。","page":288,"detail":"〇。本問はマズローの欲求5段階説の説明として正しい。マズローは、欲求を低次から生理的欲求・安全の欲求・社会的欲求・承認の欲求・自己実現の欲求の5段階に分けた。これらの欲求は低次から順を追ってかつ重なり合いながら現れ、1つの欲求が完全に満たされるとその欲求は弱まり次の段階の欲求が強くなっていくとし、最高次の自己実現の欲求は、完全に満たされることはない欲求であり、最も強いモチベーションになるとした。本問の記述はテキストどおりである。"},{"law":"労務管理","cat":"動機づけ理論","q":"人間の欲求を、満足要因(動機づけ要因)と不満足要因(衛生要因)の2つに大別したのは、<b>マグレガー</b>である。","a":false,"exp":"×。満足要因と衛生要因の2つに大別したのはハーズバーグ(動機づけ衛生理論)である。マグレガーはX理論・Y理論を唱えた人物である。","page":289,"detail":"×。本問は「マグレガー」とする点が誤りである。人間の欲求を満足要因(動機づけ要因)と不満足要因(衛生要因)の2つに大別したのは、ハーズバーグ(動機づけ衛生理論)である。ハーズバーグは技術者と会計士の面接結果を基にマズローの欲求5段階説を部分的に批判してこの2分類を示した。一方、マグレガーは人間をX理論(性悪説)とY理論(性善説)に分けるX理論・Y理論を唱えた人物であり、別の理論である。"},{"law":"労務管理","c
