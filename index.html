発的理由が増加したことなどから、前年差3万人増の76万人であった。","page":4,"detail":"男性の完全失業者数は非自発的理由が35~44歳等で減少したことなどから前年差4万人減の101万人であった。"},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"有効求人倍率","q":"2024年の有効求人倍率は前年差0.06ポイント低下の1.25倍となり、3年ぶりに低下した。","a":true,"exp":"〇。2024年の有効求人倍率は前年差0.06ポイント低下の1.25倍となり、3年ぶりに低下した。","page":5,"detail":"有効求人倍率は11年連続で1倍を超えたが、2019年の1.60倍までは戻っていない。新規求人倍率は前年差0.04ポイント低下の2.25倍となった。"},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"有効求人倍率","q":"有効求人倍率は11年連続で1倍を超え、2024年は2019年の1.60倍を上回る水準まで回復した。","a":false,"exp":"×。有効求人倍率は11年連続で1倍を超えたが、2021年よりは高い水準であるものの、2019年の1.60倍までは戻っていない。","page":5,"detail":"2024年の有効求人倍率は前年差0.06ポイント低下の1.25倍であった。新規求人倍率は2.25倍で2019年の2.42倍までは戻っていない。"},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"正社員有効求人倍率","q":"2024年の正社員の有効求人倍率は前年差0.01ポイント低下の1.01倍となったが、2019年の1.14倍を上回る水準であった。","a":false,"exp":"×。正社員の有効求人倍率は1.01倍となり、2019年の1.14倍を下回っているが2年連続で1倍を超えた。","page":5,"detail":"正社員の新規求人倍率は前年差0.03ポイント上昇の1.75倍となり、2021年以降4年連続で上昇した。"},{"law":"一般経済の動向","cat":"倒産件数","q":"2024年の企業の倒産件数は前年差1,316件増の10,006件となり、11年ぶりに10,000件を超えた。","a":true,"exp":"〇。2024年は倒産件数が前年差1,316件増の10,006件となり、11年ぶりに10,000件を超えた。","page":3,"detail":"2019年までは8,000件台で推移し、ゼロ・ゼロ融資の効果で2021年は6,030件まで減少した後、増加に転じた。倒産件数は3年連続で増加している。"},{"law":"一般経済の動向","cat":"倒産件数","q":"ゼロ・ゼロ融資の効果により、2021年の倒産件数は8,030件まで減少した。","a":false,"exp":"×。実質無利子・無担保融資(ゼロ・ゼロ融資)の効果により、2021年の倒産件数は6,030件まで減少した。","page":3,"detail":"その後ゼロ・ゼロ融資の民間返済が2023年7月から本格化する中で倒産件数は増加に転じ、2024年は10,006件となった。"},{"law":"一般経済の動向","cat":"総雇用者所得","q":"2024年の名目総雇用者所得は2年連続増加した。","a":false,"exp":"×。2024年の名目総雇用者所得は4年連続増加した。","page":4,"detail":"春季労使交渉の賃上げの影響やボーナスの増加、雇用者数の緩やかな増加が要因である。実質総雇用者所得もプラス傾向で推移している。"},{"law":"労働力人口・労働参加","cat":"労働力人口","q":"2024年の労働力人口は前年差32万人増の6,957万人で過去最高となり、4年連続で増加した。","a":false,"exp":"×。労働力人口は前年差32万人増の6,957万人で過去最高となり、2年連続で増加した。","page":6,"detail":"2024年は女性や高齢者を中心とした労働参加が前年に引き続き進展した。非労働力人口は前年差53万人減の4,031万人となり4年連続で減少した。"},{"law":"労働力人口・労働参加","cat":"非労働力人口","q":"2024年の非労働力人口は前年差53万人減の4,031万人となり、2年連続で減少した。","a":false,"exp":"×。非労働力人口は前年差53万人減の4,031万人となり、4年連続で減少した。","page":6,"detail":"男性の非労働力人口は1 ている。","page":10,"detail":"2024年の法定雇用率達成企業割合は6月1日時点で前年差4.1%ポイント低下の46.0%であったが、長期的には上昇傾向である。"},{"law":"就業者・雇用者","cat":"法定雇用率達成割合","q":"2024年の企業の障害者の法定雇用率の達成割合は6月1日時点で前年差4.1%ポイント低下の46.0%であった。","a":true,"exp":"〇。2024年の法定雇用率達成割合は6月1日時点で前年差4.1%ポイント低下の46.0%であったが、長期的には上昇傾向である。","page":10,"detail":"低下は2024年4月の法定雇用率引上げの影響によるものと考えられる。全ての企業規模で達成企業割合が低下した。"},{"law":"就業者・雇用者","cat":"外国人労働者","q":"2024年10月末時点の外国人労働者数は約230万人となり、直近12年連続で過去最少となった。","a":false,"exp":"×。外国人労働者数は約230万人となり、2007年の届出義務化以降、直近12年連続で過去最多となった。","page":11,"detail":"2023年と2024年は2年連続で前年比12.4%増となった。在留資格別では専門的・技術的分野の在留資格が全体の3割を占め最も多い割合となった。"},{"law":"就業者・雇用者","cat":"外国人労働者","q":"2024年の外国人労働者数は2014年と比較して2.9倍と、約150万人の増加がみられた。","a":true,"exp":"〇。外国人労働者数は2024年は2014年と比較して2.9倍と、約150万人の増加がみられた。","page":11,"detail":"国籍別ではベトナムが5年連続で最多であった。育成就労制度を創設する改正法は2024年6月に成立し、一部を除き2027年4月1日に施行予定である。"},{"law":"就業者・雇用者","cat":"新規学卒者就職率","q":"2025年3月卒の大学新卒者の就職率は前年差0.1%ポイント低下の98.0%で、調査開始の1996年度以降で最高の就職率となった。","a":false,"exp":"×。大学新卒者の就職率は前年差0.1%ポイント低下の98.0%で、1996年度以降で2番目に高い就職率となった。","page":12,"detail":"専修学校(専門課程)新卒者は前年差1.7%ポイント上昇の99.2%で、1996年度以降で最高の就職率となった。いずれの学校区分でも97%以上の高水準を維持した。"},{"law":"労働時間・休暇","cat":"総実労働時間","q":"従業員5人以上規模の事業所における2024年の月間総実労働時間は前年差1.4時間減の137.0時間であった。","a":true,"exp":"〇。2024年の月間総実労働時間は前年差1.4時間減の137.0時間であった。","page":12,"detail":"一般労働者は前年差1.1時間減の162.3時間、パートタイム労働者は前年差0.7時間減の80.2時間であった。働き方改革やパート増加が背景にある。"},{"law":"労働時間・休暇","cat":"総実労働時間","q":"2024年のパートタイム労働者の月間総実労働時間は前年差0.7時間減の162.3時間であった。","a":false,"exp":"×。パートタイム労働者の月間総実労働時間は前年差0.7時間減の80.2時間であった。162.3時間は一般労働者の数値である。","page":12,"detail":"一般労働者は前年差1.1時間減の162.3時間であった。男性は2.0時間減の152.1時間、女性は0.4時間減の120.5時間であった。"},{"law":"労働時間・休暇","cat":"週60時間以上","q":"週60時間以上就労雇用者の割合は2024年は4.6%と、前年より0.4%ポイント低下した。","a":true,"exp":"〇。週60時間以上就労雇用者の割合は2024年は4.6%と前年より0.4%ポイント低下し、2020年以降で低下幅が最も大きくなった。","page":13,"detail":"2024年4月から建設業や運輸業・郵便業等に時間外労働の上限規制が適用となったことが背景にある。最も割合が高い年齢階級は45~54歳の5.7%であった。"},{"law":"労働時間・休暇","cat":"年次有給休暇","q":"年次有給休暇の取得率は男女計・男性・女性いずれも、比較可能な1999年以降で過去最高となった。","a":false,"exp": 計で99.1%に達した。","a":false,"exp":"×。2024年の賃上げ実施企業割合は企業規模計で91.2%に達している。99.1%は5,000人以上規模の企業の割合である。","page":16,"detail":"企業規模が小さいほど実施割合が低い。一般職のベースアップ実施企業割合は5割以上で2004年以降過去最高となった。"},{"law":"賃金","cat":"一時金","q":"2024年の夏季一時金の妥結額は89.9万円で前年比6.29%増、年末一時金は89.1万円で前年比4.93%増と、ともに3年連続で増加した。","a":true,"exp":"〇。夏季一時金は89.9万円で前年比6.29%増、年末一時金は89.1万円で前年比4.93%増と、ともに3年連続で増加した。","page":16,"detail":"夏季・年末一時金妥結状況の推移として示されている。"},{"law":"賃金","cat":"労働組合員数","q":"2024年の労働組合員数は991万人と3年連続で1,000万人を割り、推定組織率は16.1%となり、ともに2年連続で低下した。","a":false,"exp":"×。労働組合員数991万人・推定組織率16.1%は、ともに4年連続で低下した。","page":16,"detail":"労働組合員数は3年連続で1,000万人を割った。パートタイム労働者の労働組合員数は過去最高の146万人、推定組織率は8.8%となった。"},{"law":"賃金","cat":"労働組合員数","q":"2024年のパートタイム労働者の労働組合員数は過去最低の146万人となった。","a":false,"exp":"×。パートタイム労働者の労働組合員数は過去最高の146万人、推定組織率は8.8%となった。","page":16,"detail":"全体の労働組合員数は991万人で3年連続1,000万人を割り、推定組織率16.1%でともに4年連続低下した。"},{"law":"テーマ分析(労働力供給制約)","cat":"GDPシェア","q":"我が国の名目GDPが世界全体に占める割合(GDPシェア)は1991年には15%を超えたが、2024年には3.6%まで低下した。","a":true,"exp":"〇。GDPシェアは1980年は約10%、1991年には15%を超えたが、2010年には8.6%、2024年には3.6%まで低下した。","page":17,"detail":"1980年以降の過去約40年間の実質GDP成長率は、我が国は米国及び英国より低いが、フランス及びドイツとほぼ同水準である。"},{"law":"テーマ分析(労働力供給制約)","cat":"将来推計","q":"成長も労働参加も進まないシナリオでは、2040年の就業者は5,768万人と、2022年と比較して約1,000万人減少すると推計されている。","a":true,"exp":"〇。JILPTの将来推計によると、実質成長ゼロ・労働参加も進まないシナリオで2040年の就業者は5,768万人と、2022年の6,724万人比で約1,000万人減少する。","page":19,"detail":"経済成長と労働参加が同時に実現するシナリオでは2040年の就業者は6,734万人とほぼ現状水準を維持する推計となっている。"},{"law":"テーマ分析(労働力供給制約)","cat":"労働生産性","q":"1980年代の我が国の実質労働生産性の上昇率は約3.6%と、主要国のなかで最も低い上昇率であった。","a":false,"exp":"×。1980年代の我が国の実質労働生産性の上昇率は約3.6%と、主要国のなかで最も高い上昇率であった。","page":18,"detail":"1990年代以降は徐々に低下し、2000年代以降は1%前後にとどまっている。2010年代以降は米国を除く主要国とほぼ同じ水準である。"},{"law":"テーマ分析(労働力供給制約)","cat":"生成AI活用","q":"生成AIを全社的に活用していると回答した割合は、従業員数300人未満の企業では1.3%、5,000人以上の大企業では19.0%であった。","a":true,"exp":"〇。生成AIを全社的に活用しているのは300人未満の企業で1.3%、5,000人以上の大企業で19.0%であった。","page":20,"detail":"一部の組織で活用しているは300人未満で18.4%、大企業で36.5%であった。非製造業のソフトウェア投資の遅れは中小企業の投資の遅れが背景にある。"},{"law":"人手不足","cat":"社会インフラ関連職","q":"社会インフラ関連職の就業者が就業者全体に占める割合は、全体の約35%である。","a":true,"exp":"〇。医療・保健・福祉グループ約11%、保安・運輸・建設グループ約12%、接客・販売・調理グループ約12%を合わせ、社会インフラ関連職は全体の約35%となる。","page":22,"detail":"社会インフラ関連職は命に関わる仕事、物流・インフラに関わる仕事、日々の生活に関わる仕事の三つを想定し三つのグループに分類している。"},{"law":"人手不足","cat":"有効求人倍率(職業別)","q":"2024年平均の有効求人倍率は、全職業が1.14倍である一方、建設・採掘従事者は2.18倍であった。","a":false,"exp":"×。建設・採掘従事者は5.12倍であった。2.18倍は輸送・機械運転従事者の数値である。","page":22,"detail":"2024年平均の有効求人倍率は全職業1.14倍、サービス職業従事者2.98倍、建設・採掘従事者5.12倍であった。社会インフラに関わる分野は全職種平均を大きく上回っている。"},{"law":"人手不足","cat":"欠員率","q":"社会インフラ関連職の欠員率はおおむね5%前後で高止まりしており、医療・保健・福祉グループの欠員率は約6%と最も高い。","a":true,"exp":"〇。社会インフラ関連職の欠員率はおおむね5%前後で高止まりし、医療・保健・福祉グループは約6%と最も高い。","page":23,"detail":"非社会インフラ関連職の欠員率は2024年には1.7%まで改善している。"},{"law":"人手不足","cat":"社会インフラ賃金","q":"社会インフラ関連職の月額賃金は約36万円であり、非社会インフラ関連職の約32万円と比べて約5万円高い。","a":false,"exp":"×。社会インフラ関連職の月額賃金は約32万円であり、非社会インフラ関連職の約36万円と比べて約5万円低い。","page":26,"detail":"接客・販売・調理グループは約27万円と最も低い。年間所得は社会インフラ関連職が約436万円で非社会インフラ関連職と約104万円の開きがある。"},{"law":"人手不足","cat":"社会インフラ労働時間","q":"社会インフラ関連職の月間総労働時間は約211時間で、非社会インフラ関連職の約209時間より約2時間長い。","a":true,"exp":"〇。月間総労働時間は社会インフラ関連職が約211時間、非社会インフラ関連職が約209時間で約2時間長い。","page":28,"detail":"保安・運輸・建設グループは約218時間と他のグループと比べて長い。超過労働時間はいずれも約44時間でおおむね同水準である。"},{"law":"人手不足","cat":"テレワーク活用","q":"テレワークが自分自身に適用されていたと回答した者の割合は、非社会インフラ関連職の約20%に対し、社会インフラ関連職は5%に満たない水準であった。","a":true,"exp":"〇。テレワークが適用されていたと回答した割合は非社会インフラ関連職の約20%に対し、社会インフラ関連職は5%に満たない水準であった。","page":29,"detail":"三つのグループ別では医療・保健・福祉グループ約3%、保安・運輸・建設グループ約8%、接客・販売・調理グループ約2%であった。"},{"law":"企業と労働者の関係性","cat":"生え抜き社員","q":"生え抜き社員割合は2008年に約40%であったが低下傾向で推移し、2023年には約37%となった。","a":true,"exp":"〇。生え抜き社員割合は2008年に約40%であったが低下傾向で推移し、2023年には約37%となった。","page":36,"detail":"賃金プロファイルは長期的にフラット化していることが確認できる。25~34歳では上昇がみられるが、35~44歳及び45~54歳では低下傾向がみられている。"},{"law":"企業と労働者の関係性","cat":"転職経験率","q":"Indeed Japanの5か国比較調査では、日本の転職経験率は約90%で、米国の約60%及び英国の約93%と比べて高い水準にある。","a":false,"exp":"×。日本の転職経験率は約60%で、米国の約90%及び英国の約93%と比べて低い水準にある。","page":35,"detail":"正規雇用労働者の転職希望者数は2013~2024年にかけて254万人増加しており、転職希望者数は転職者数を大きく上回る推移となっている。"},{"law":"企業と労働者の関係性","cat":"フレックスタイム制","q":"フレックスタイム制適用労働者の割合は2018年では約8%であったが、2024年では約12%となっている。","a":true,"exp":"〇。フレックスタイム制適用労働者の割合は2018年では約8%で、2024年では約12%となっている。","page":36,"detail":"企業規模別では30~99人で約3%、100~999人で約9%、1,000人以上で約20%と差がみられる。"},{"law":"企業と労働者の関係性","cat":"テレワーク導入","q":"テレワークを導入している企業の割合は2019年には約20%であったが、2021年には5割を超えた後、その後は低下傾向となっている。","a":true,"exp":"〇。テレワーク導入企業の割合は2019年に約20%、2021年に5割を超えた後、低下傾向となっている。","page":36,"detail":"テレワークを実施している人の割合は2020年5月調査の約32%から、2024年7月調査では約16%にまで落ち込んでいる。"},{"law":"労働者の意識変化","cat":"働く目的","q":"内閣府の世論調査では、2024年にはお金を得るために働くが約13%に低下し、生きがいをみつけるために働くは約63%に達した。","a":false,"exp":"×。2024年にはお金を得るために働くが約63%に達し、生きがいをみつけるために働くは約13%まで低下した。","page":37,"detail":"2001年にはお金を得るために働くが約50%、生きがいをみつけるために働くが約24%であった。生計を立てる手段としての側面が強まっている。"},{"law":"労働者の意識変化","cat":"仕事と余暇","q":"NHK放送文化研究所の調査で仕事優先型の回答は1973年に約44%だったが、2018年には約23%にまで低下した。","a":true,"exp":"〇。仕事優先型の回答は1973年に約44%だったが減少し、2018年には約23%にまで低下した。","page":38,"detail":"2018年には余暇・仕事両立型が約38%、余暇優先型が約36%となった。余暇優先型等は1980年代後半に仕事優先型を上回った。"},{"law":"継続就業を促す雇用管理","cat":"人手不足の現状","q":"企業の約73%が事業継続のための人手に、約71%が新規事業のための人手に不足感を感じている。","a":false,"exp":"×。約71%が事業継続のための人手に、約73%が新規事業のための人手に不足感を感じている。","page":39,"detail":"人手不足の職種は現場の技能職、営業職・販売職・サービス職での人手不足が特に深刻である。"},{"law":"継続就業を促す雇用管理","cat":"職場環境と継続就業","q":"継続就業希望者の割合は、働きやすいと感じるグループで約88%、働きにくいと感じるグループで約39%であった。","a":true,"exp":"〇。継続就業希望者の割合は、働きやすいグループで約88%、まあ働きやすいグループで約72%、働きにくいグループで約39%であった。","page":40,"detail":"働きにくいと感じる労働者の約68%が慢性的な人手不足を要因にあげている。労働者の約28%が働きやすい、約56%がまあ働きやすいと感じている。"},{"law":"継続就業を促す雇用管理","cat":"継続就業施策","q":"継続就業を支えるため、若手の賃金の引上げ(ベースアップ)に約62%、若手以外の賃金の引上げに約71%の企業が力を入れている。","a":false,"exp":"×。若手の賃金の引上げ(ベースアップ)に約71%、若手以外の賃金の引上げに約62%の企業が力を入れている。","page":40,"detail":"年次有給休暇の取得促進については約75%、長時間労働の防止策については約54%の企業が対応を進めている。"}],"hkou":[{"law":"社会保障の役割","cat":"社会保障制度の始まり","q":"現在の社会保障制度の根拠となっているのは、第2次世界大戦後の1947(昭和22)年に施行された日本国憲法である。","a":true,"exp":"〇。日本の社会保障制度は明治時代以降段階的に発展してきたが、現在の根拠は1947(昭和22)年施行の日本国憲法である。","page":5,"detail":"日本国憲法第25条で、すべて国民は健康で文化的な最低限度の生活を営む権利を有するとされ、国は社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならないとされ、いわゆる生存権が規定されている。"},{"law":"社会保障の役割","cat":"憲法第25条","q":"日本国憲法第25条にいう生存権を具体化する給付水準は、同条第1項で社会保険、社会福祉、公的扶助、保健医療の4分野を例示している。","a":false,"exp":"×。第25条第1項は健康で文化的な最低限度の生活を営む権利を定め、第2項で国は社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならないとしている。","page":5,"detail":"第1項は生存権、第2項は国の責務を定める。4分野(社会保険・社会福祉・公的扶助・保健医療公衆衛生)の区分は憲法の文言ではなく社会保障制度の概要として整理されたものである。"},{"law":"社会保障の役割","cat":"社会保障制度審議会勧告","q":"1950(昭和25)年の「社会保障制度に関する勧告」を出したのは、1949(昭和24)年に設置された社会保障制度審議会である。","a":true,"exp":"〇。1949(昭和24)年設置の社会保障制度審議会が、1950(昭和25)年に社会保障制度に関する勧告を出した。","page":5,"detail":"同勧告は、疾病、負傷、分娩、障害、死亡、老齢、失業、多子その他困窮の原因に対し、保険的方法又は直接公の負担において経済保障の途を講じるものと社会保障制度を定義した。"},{"law":"社会保障制度の概要","cat":"社会保障の4分野","q":"社会保障制度は、社会保険、社会福祉、公的扶助、保健医療・公衆衛生の4つから成り立っている。","a":true,"exp":"〇。社会保障制度は、①社会保険、②社会福祉、③公的扶助、④保健医療・公衆衛生からなり、人々の生活を生涯にわたって支えている。","page":6,"detail":"国民の安心や生活の安定を支えるセーフティネットとして、これら4分野が位置づけられている。"},{"law":"社会保障制度の概要","cat":"社会保険の種類","q":"社会保険(年金・医療・介護・雇用・労災)は、加入が個人の自由に委ねられた任意加入の保険制度である。","a":false,"exp":"×。社会保険は、保険事故に遭遇した場合に一定の給付を行い生活の安定を図ることを目的とした強制加入の保険制度である。","page":6,"detail":"年金・医療・介護・雇用・労災の5つからなり、病気、けが、出産、死亡、老齢、障害、失業など生活の困難をもたらす保険事故に対応する。"},{"law":"社会保障制度の概要","cat":"公的扶助","q":"生活に困窮する国民に対して最低限度の生活を保障し自立を助けようとする公的扶助の代表が、生活保護制度である。","a":true,"exp":"〇。公的扶助は健康で文化的な最低限度の生活を保障しその自立を助ける制度で、生活保護制度がこれにあたる。","page":6,"detail":"公的扶助は社会保障の4分野の一つで、生活に困窮する国民に対し最低限度の生活を保障し自立を助ける。"},{"law":"社会保障制度の概要","cat":"保健医療・公衆衛生","q":"妊婦健診や乳幼児健診などの母子保健は、社会福祉の分野に位置づけられている。","a":false,"exp":"×。妊婦健診や乳幼児健診などの母子保健は、保健医療・公衆衛生の分野に位置づけられている。","page":7,"detail":"保健医療・公衆衛生は、医療サービス、疾病予防・健康づくりの保健事業、母子保健、感染症対策や食品・医薬品の安全性を確保する公衆衛生などからなる。"},{"law":"社会保障制度の概要","cat":"社会福祉","q":"保育所の設置など子育てを支援する児童福祉は、社会福祉の分野に含まれる。","a":true,"exp":"〇。社会福祉には、在宅・施設サービスを提供する社会福祉、子育てを支援する児童福祉などが含まれる。","page":6,"detail":"社会福祉は、障害者や子育て世帯などが直面する社会的障壁を取り除き安心して社会生活を営めるよう公的な支援を行う制度である。"},{"law":"社会保障制度の概要","cat":"自助・共助・公助","q":"日本の福祉社会における「共助」とは、すでに困っている人々の生活を公的に支援することをいう。","a":false,"exp":"×。すでに困っている人々の生活を公的に支援するのは「公助」である。「共助」は生活上の様々な困難に対して社会連帯の考え方で支え合うことをいう。","page":7,"detail":"自助は自ら働き自分の健康や生活は自分で守ること、共助は社会連帯の考え方で支え合うこと、公助はすでに困っている人々を公的に支援することである。"},{"law":"社会保障制度の概要","cat":"自助・共助・公助","q":"「自助」とは、自ら働き、自分の健康や生活は自分で守ることをいう。","a":true,"exp":"〇。自助は自ら働き自分の健康や生活は自分で守ることであり、日本の福祉社会は自助・共助・公助の適切な組み合わせで形作られている。","page":7,"detail":"共助は社会連帯の考え方で支え合うこと、公助はすでに困っている人々の生活を公的に支援することである。"},{"law":"なぜ社会保障が必要か","cat":"社会保障の目的","q":"家族・地域内での支え合いの機能を、保険料や税金で運営される社会全体で支え合う制度へと拡張したものが社会保障である。","a":true,"exp":"〇。血縁・地縁による支え合い機能の希薄化に伴い、家族・地域の支え合いを社会全体で支え合う制度へ拡張したものが社会保障である。","page":7,"detail":"収入に応じて負担する保険料や税金で運営される社会保険などの仕組みへと拡張された。"},{"law":"なぜ社会保障が必要か","cat":"社会保障の機能","q":"社会保障の主な機能として、①生活の安定・向上、②所得の再分配、③雇用の創出の3つがあげられる。","a":false,"exp":"×。社会保障の3つの機能は、①生活の安定・向上、②所得の再分配、③経済の安定である。","page":7,"detail":"雇用の創出は経済の安定の機能の一部として説明されている。生活の安定を損なうリスクに備え、所得格差の縮小を図り、社会や経済を安定させる機能である。"},{"law":"なぜ社会保障が必要か","cat":"社会保障の機能","q":"社会保障の機能のうち「所得の再分配」には、高所得者から低所得者への再分配のみがあり、現役世代から高齢世代への再分配は含まれない。","a":false,"exp":"×。所得の再分配には、高所得者から低所得者だけでなく、現役世代から高齢世代などへの再分配もある。","page":7,"detail":"所得の再分配は所得を個人や世帯の間で移転させ所得格差の縮小や低所得者の生活の安定を図る機能で、時間的な再分配の意味合いもある。"},{"law":"なぜ社会保障が必要か","cat":"所得の再分配","q":"所得再分配には現金給付だけでなくサービスの現物給付もあり、現物給付は所得にかかわらず国民生活に必要な基本的なサービスが利用できるようにしている。","a":true,"exp":"〇。現物給付による所得再分配は所得水準に応じた負担を求める一方、必要に応じた給付を行う。","page":8,"detail":"所得にかかわらず国民生活に必要な基本的なサービスが利用できるようになっている。"},{"law":"なぜ社会保障が必要か","cat":"経済の安定","q":"社会保障給付を通じて景気変動を緩和し経済成長を支える機能は、「経済の安定」の機能に含まれる。","a":true,"exp":"〇。経済の安定は、社会保障給付を通じて景気変動を緩和し経済成長を支え、雇用を創出して経済を支える機能を含む。","page":8,"detail":"社会保障は生活に安心感を与え所得格差を解消することから社会や政治・経済を安定させる。"},{"law":"労働施策の役割","cat":"労働施策の始まり","q":"明治時代の労働問題への対応として、工場法(1911(明治44)年)や職業紹介法(1921(大正10)年)などの労働者を保護する法令が整備された。","a":true,"exp":"〇。産業化に伴う労働問題へ対応するため、工場法や職業紹介法などの労働者を保護する法令が整備された。","page":8,"detail":"明治時代に産業資本主義が始まり、特に農村出身の女工に深刻な労働問題が発生したことを背景とする。"},{"law":"労働施策の役割","cat":"労働基本権","q":"労働基本権(労働三権)とは、団結権、団体交渉権、勤労の権利の3つをいう。","a":false,"exp":"×。労働三権は、団結権、団体交渉権、団体行動権(争議権)である。勤労の権利は労働三権には含まれない。","page":8,"detail":"団結権は労働組合を結成する権利、団体交渉権は使用者と団体交渉する権利、団体行動権(争議権)は団体で行動する権利をいう。"},{"law":"労働施策の役割","cat":"戦後の労働立法","q":"第二次世界大戦後、労働基準法、労働組合法、労働関係調整法、職業安定法、失業保険法などが制定された。","a":true,"exp":"〇。戦後、日本国憲法を受け、労働基準法・労働組合法・労働関係調整法・職業安定法・失業保険法などが制定され、労働施策が進められた。","page":8,"detail":"労働基準法は昭和22年法律第49号、労働組合法は昭和24年法律第174号、労働関係調整法は昭和21年法律第25号として制定された。"},{"law":"労働施策の役割","cat":"雇用保険法の制定","q":"1973(昭和48)年の第1次石油危機後、失業保険法を改正した雇用保険法が1959(昭和34)年に制定された。","a":false,"exp":"×。雇用保険法は1974(昭和49)年に失業保険法を改正して制定された。1959(昭和34)年は最低賃金法が制定された年である。","page":9,"detail":"物価高や戦後初めてのマイナス成長が起こった際、経済変動期における企業の雇用維持努力を支援する制度として作られた。"},{"law":"労働施策の役割","cat":"働き方改革","q":"近年の大きな労働施策として、2018(平成30)年に「働き方改革関連法」が成立した。","a":true,"exp":"〇。2018(平成30)年に働き方改革関連法が成立し、多様で柔軟な働き方やワーク・ライフ・バランスの実現に向けた取組みが進められている。","page":9,"detail":"働き過ぎを防ぐことで働く人の健康を守り、ワーク・ライフ・バランスを実現することなどが目的である。"},{"law":"労働施策の役割","cat":"主な労働施策の概要","q":"主な労働施策として整備される労働保険には、雇用保険と労災保険が含まれる。","a":true,"exp":"〇。主な労働施策の労働保険として、失業時の生活を支える雇用保険と、仕事中の病気やけがで労働者を保護する労災保険があげられている。","page":10,"detail":"このほか、働く環境の整備、公正な待遇の確保、多様な人材の活躍促進、仕事と育児・介護や治療の両立支援などが主な労働施策とされている。"},{"law":"少子化・人口減少","cat":"人口のピーク","q":"日本の人口は、2008(平成20)年をピークに減少に転じている。","a":true,"exp":"〇。日本の人口は近年減少局面を迎えており、2008(平成20)年をピークに減少に転じている。","page":11,"detail":"高齢化率は1990(平成2)年の12.1%から2020(令和2)年には28.6%に達するなど急激な高齢化が進行している。"},{"law":"少子化・人口減少","cat":"高齢化率","q":"高齢化率は、1990(平成2)年には28.6%であったが、2020(令和2)年には12.1%に低下した。","a":false,"exp":"×。高齢化率は1990(平成2)年に12.1%、2020(令和2)年に28.6%であり、急激に上昇している。","page":11,"detail":"2050(令和32)年には総人口は10,469万人に減少すると推計されている。"},{"law":"少子化・人口減少","cat":"全世代型社会保障","q":"全世代型社会保障構築会議は、2022(令和4)年12月の報告書で、目指すべき方向性として、少子化・人口減少の流れを変える、超高齢社会に備える、地域の支え合いを強めるの3つを示した。","a":true,"exp":"〇。同報告書は、①少子化・人口減少の流れを変える、②超高齢社会に備える、③地域の支え合いを強める、を示している。","page":11,"detail":"政府は社会保障の在り方を議論する全世代型社会保障構築会議を開催し、2022(令和4)年12月に報告書がまとめられた。"},{"law":"少子化・人口減少","cat":"出生数","q":"2024(令和6)年の出生数は72万7,288人であり、前年より約4万人増加した。","a":false,"exp":"×。2024(令和6)年の出生数は68万6,061人で、前年の72万7,288人より4万1,227人減少した。72万7,288人は前年(2023年)の出生数である。","page":11,"detail":"出生数は第2次ベビーブーム(1971~74年)以降、減少傾向が続いている。"},{"law":"少子化・人口減少","cat":"合計特殊出生率","q":"合計特殊出生率は、2024(令和6)年において1.15であり、前年の1.20より0.05ポイント低下した。","a":true,"exp":"〇。2024(令和6)年の合計特殊出生率は1.15で、前年の1.20より0.05ポイント低下した。","page":11,"detail":"1989(平成元)年に1.57となり1.57ショックと言われ、2005(平成17)年の1.26以降は緩やかな上昇傾向にあったが近年は再び低下傾向にある。"},{"law":"少子化・人口減少","cat":"1.57ショック","q":"合計特殊出生率は、2005(平成17)年に1.57となり、いわゆる「1.57ショック」と言われた。","a":false,"exp":"×。1.57ショックは1989(平成元)年に合計特殊出生率が1.57となったことをいう。2005(平成17)年の数値は1.26である。","page":11,"detail":"1989年の1.57は1966(昭和41)年のひのえうまを下回る水準であった。2005年の1.26以降は緩やかな上昇傾向にあった。"},{"law":"超高齢社会","cat":"高齢者数のピーク","q":"65歳以上人口(高齢者数)のピークは、2050年の3,953万人と推計されている。","a":false,"exp":"×。65歳以上人口(高齢者数)のピークは2043年の3,953万人と推計されている。","page":12,"detail":"2025(令和7)年までに団塊の世代が全て75歳以上となる。2050(令和32)年には高齢化率は37.1%に上昇、15~64歳の生産年齢人口は52.9%まで減少すると推計されている。"},{"law":"超高齢社会","cat":"生産年齢人口","q":"2050(令和32)年には、高齢化率は37.1%に上昇し、15~64歳の生産年齢人口は52.9%まで減少すると推計されている。","a":true,"exp":"〇。2050(令和32)年には高齢化率37.1%、生産年齢人口52.9%と推計されている。","page":12,"detail":"団塊の世代が全て75歳以上となった後も若い世代の人口減少が進む。"},{"law":"超高齢社会","cat":"平均寿命","q":"平均寿命は2023(令和5)年に男性85.89年、女性91.94年であり、平均寿命・健康寿命とも先進7か国の中で最も長い。","a":false,"exp":"×。2023(令和5)年の平均寿命は男性81.09年、女性87.14年である。男性85.89年、女性91.94年は2070(令和52)年の推計値である。","page":12,"detail":"1990(平成2)年は男性75.92年、女性81.90年で、約30年間で5年以上伸びている。平均寿命・健康寿命は延伸傾向にあり先進7か国の中で最も長い。"},{"law":"超高齢社会","cat":"健康寿命","q":"健康寿命とは、日常生活に制限がない期間の平均をいい、2022(令和4)年に男性72.57年、女性75.45年であった。","a":true,"exp":"〇。健康寿命(日常生活に制限がない期間の平均)は2022(令和4)年に男性72.57年、女性75.45年であった。","page":12,"detail":"健康寿命は過去20年延伸傾向にあると考えられる。"},{"law":"超高齢社会","cat":"高年齢者の就業意向","q":"高年齢者の就業意向について、約8割が65歳を超えて就業すること(働けるうちはいつまでもを含む)を希望している。","a":false,"exp":"×。約6割が65歳を超えて就業することを希望しており、就業意欲の高さがうかがわれる。","page":12,"detail":"2024(令和6)年の高年齢者の就業率は、60~64歳男性で84.0%、65~69歳男性で62.8%などとなっている。"},{"law":"超高齢社会","cat":"女性の就業状況","q":"女性の就業率はM字カーブの状況にあるが近年そのM字カーブの底は浅くなっており、一方で女性の正規雇用比率には20代後半をピークに減少するL字カーブが見られる。","a":true,"exp":"〇。M字カーブの底は近年浅くなっており、正規雇用比率には20代後半をピークに減少するL字カーブが見られる。","page":13,"detail":"女性の就業率は30代後半を底として再び上昇していくM字カーブの状況にある。"},{"law":"超高齢社会","cat":"育児休業取得期間(白書第I部)","q":"育児休業の取得期間について、女性は9割以上が6か月以上である一方、男性は約4割が2週間未満であり短期間の取得が多い。","a":true,"exp":"〇。育児休業の取得期間は、女性は9割以上が6か月以上、男性は約4割が2週間未満であり、女性に比べ短期間の取得が多い。","page":13,"detail":"育児休業取得率は女性が8割台で推移する一方、男性は上昇傾向にあるものの女性に比べ低い水準にある。"},{"law":"超高齢社会","cat":"パートの就業調整","q":"配偶者がいる女性のパートタイム労働者のうち就業調整をしている人は21.8%で、その理由として一定額(130万円)を超えると配偶者の被扶養者からはずれるからと回答した割合が最も高い。","a":true,"exp":"〇。配偶者がいる女性のパート労働者の21.8%が就業調整をしており、130万円超で被扶養者からはずれるためとの回答が57.3%で最も高い。","page":13,"detail":"一定の労働時間を超えると雇用保険、健康保険、厚生年金保険の保険料を払わなければならないからとの回答は21.4%であった。"},{"law":"超高齢社会","cat":"非正規雇用比率(白書第I部)","q":"非正規雇用労働者が雇用者に占める割合は、2024(令和6)年には46.2%となっている。","a":false,"exp":"×。2024(令和6)年の非正規雇用労働者が雇用者に占める割合は36.8%である。","page":14,"detail":"非正規雇用労働者は2010年以降増加が続き、2020年以降は減少したが2022年以降は再び増加している。"},{"law":"超高齢社会","cat":"年次有給休暇取得率","q":"2023(令和5)年の年次有給休暇の取得率は56.5%で、前年より3.2ポイント低下した。","a":false,"exp":"×。2023(令和5)年の年次有給休暇取得率は65.3%で、前年より3.2ポイント上昇し、1984(昭和59)年以降過去最高となった。","page":14,"detail":"年間総実労働時間は減少傾向にあり、一般労働者は2019年以降2,000時間を下回っている。"},{"law":"超高齢社会","cat":"フリーランス","q":"2022(令和4)年において、本業がフリーランスの数は257万人で、有業者に占める割合は3.8%となっている。","a":false,"exp":"×。本業がフリーランスの数は209万人、有業者に占める割合は3.1%である。257万人・3.8%は副業のみフリーランスの者も合わせた数値である。","page":15,"detail":"フリーランスは実店舗がなく雇人もいない自営業主や一人社長で自身の経験や知識・スキルを活用して収入を得る者とされる。"},{"law":"地域の支え合い","cat":"単身世帯","q":"2050(令和32)年には、一般世帯に占める単身世帯は44.3%に達し、5世帯に2世帯になると推計されている。","a":true,"exp":"〇。2050(令和32)年に一般世帯に占める単身世帯は44.3%(5世帯に2世帯)に達すると見込まれている。","page":15,"detail":"高齢者単身世帯は20.6%に達し、5世帯に1世帯になると推計されている。"},{"law":"地域の支え合い","cat":"高齢者単身世帯","q":"2050(令和32)年には、高齢者単身世帯は44.3%に達し、5世帯に2世帯になると推計されている。","a":false,"exp":"×。2050年に高齢者単身世帯は20.6%(5世帯に1世帯)に達すると推計されている。44.3%(5世帯に2世帯)は一般世帯に占める単身世帯の割合である。","page":15,"detail":"単身世帯、高齢者単身世帯ともに今後も増加が予想されている。"},{"law":"地域の支え合い","cat":"SNS利用","q":"SNSの利用状況について、2023(令和5)年には利用者は全体で8割を超え、特に13~19歳、20代の若者では利用率が9割を超えている。","a":true,"exp":"〇。2023(令和5)年のSNS利用者は全体で8割を超え、13~19歳・20代では利用率が9割を超えている。","page":15,"detail":"利用目的としては従来からの知人とのコミュニケーションのためが最も多い。"},{"law":"若者と社会保障","cat":"関心の状況","q":"社会保障制度や労働施策について関心がある割合は、医療が43.3%、年金が47.5%、賃金のきまりが58.3%などであった。","a":false,"exp":"×。関心がある割合は医療63.6%、年金58.3%、賃金のきまり80.0%である。介護は43.3%、公衆衛生は47.5%であった。","page":16,"detail":"令和6年度少子高齢社会等調査検討事業の調査結果による。介護は4割強、福祉・公衆衛生は5割弱、医療・年金は6割前後、労働分野は8割前後であった。"},{"law":"若者と社会保障","cat":"教育の経験","q":"社会保障教育の経験があるのは54.2%、労働法教育の経験があるのは70.0%であり、ともに5割を超えていた。","a":false,"exp":"×。社会保障教育の経験は65.3%、労働法教育の経験は62.7%でともに6割超である。54.2%・70.0%はそれぞれの経験者のうち授業の内容を覚えている割合である。","page":17,"detail":"社会保障教育・労働法教育の経験はともに6割を超えていた。"},{"law":"若者と社会保障","cat":"教育の効果","q":"社会保障制度は社会全体の支え合いの仕組みであることを知っている割合は、社会保障教育の経験がある場合は63.4%で、経験がない場合の43.0%と比べて高い。","a":true,"exp":"〇。社会保障教育の経験がある場合は63.4%で、経験がない場合の43.0%より高く、教育が理念への理解を促進する可能性が示唆される。","page":17,"detail":"全体では53.3%がよく知っている・何となく知っていると回答している。"},{"law":"若者と社会保障","cat":"情報を得る手段","q":"知識を得るために今後利用したい手段としてはインターネット(HPなど)が68.4%で最も多いが、SNSなどの情報が正しいかどうかわからないと考える人が54.9%と最も多い。","a":true,"exp":"〇。今後利用したい手段はインターネット68.4%が最多、心配ごとはSNSなどの情報が正しいかわからない54.9%が最多であった。","page":17,"detail":"SNSは56.5%、学校は48.5%が今後利用したい手段としてあげられた。"},{"law":"社会保障教育・労働法教育","cat":"社会保障教育の議論の開始","q":"厚生労働省において社会保障教育が大きく議論され始めたのは、社会保障と税の一体改革を背景とする2011(平成23)年のことである。","a":true,"exp":"〇。社会保障教育が大きく議論され始めたのは2011(平成23)年で、社会保障と税の一体改革が進められていたことが背景にある。","page":18,"detail":"次世代の主役となる若者に社会保障について給付と負担の構造を含め当事者意識を持って考えてもらうことが重要であった。"},{"law":"社会保障教育・労働法教育","cat":"公共の導入","q":"社会保障教育は、2022(令和4)年度から高等学校において導入された「公共」や「家庭基礎」などの授業で行われている。","a":true,"exp":"〇。社会保障教育は2022(令和4)年度から高等学校に導入された公共や家庭基礎などの授業で行われている。","page":19,"detail":"公共では財政及び租税の役割、少子高齢社会における社会保障の充実・安定化を関連させて取り扱うこととされている。"},{"law":"最低賃金","cat":"地域別最低賃金","q":"2024(令和6)年度の地域別最低賃金は、全国加重平均で対前年度51円引上げの1,063円となった。","a":false,"exp":"×。2024(令和6)年度の地域別最低賃金は全国加重平均1,055円である。1,063円は特定最低賃金の全国加重平均額(2025年4月1日現在)である。","page":22,"detail":"地域別最低賃金は対前年度51円の引上げとなった。"},{"law":"最低賃金","cat":"最低賃金の決定","q":"地域別最低賃金の改定額の目安の答申を受けて改正決定を行うのは、厚生労働大臣である。","a":false,"exp":"×。地域別最低賃金は、地方最低賃金審議会の答申を受け、都道府県労働局長が改正決定を行う。中央最低賃金審議会が厚生労働大臣の諮問を受け目安を答申する。","page":22,"detail":"中央最低賃金審議会は公労使三者から構成される。この目安を参考に地方最低賃金審議会で審議が行われる。"},{"law":"非正規雇用","cat":"無期転換ルール","q":"改正労働契約法による無期転換ルールでは、有期労働契約が繰り返し更新されて通算3年を超えたとき、労働者の申込みにより無期労働契約に転換できる。","a":false,"exp":"×。無期転換ルールは、有期労働契約が繰り返し更新されて通算5年を超えたときに、労働者の申込みにより無期労働契約に転換できる制度である。","page":24,"detail":"2013(平成25)年4月全面施行の改正労働契約法で導入された。このほか雇止め法理の法定化、不合理な労働条件の相違の禁止規定が設けられた。"},{"law":"労災保険等制度","cat":"特別加入","q":"フリーランス・事業者間取引適正化等法を踏まえ、2024(令和6)年11月1日から特定受託事業者が行う事業が新たに特別加入制度の対象となった。","a":true,"exp":"〇。2024(令和6)年11月1日から、特定受託事業者が行う事業が新たに労災保険の特別加入制度の対象となった。","page":40,"detail":"特別加入制度は、労働者に準じて労災保険により保護することがふさわしい者の加入を認める制度である。"},{"law":"年金制度","cat":"賦課方式","q":"公的年金制度は、現役世代の保険料負担でその時々の高齢世代の年金給付をまかなう世代間扶養である賦課方式を基本とした仕組みで運営されている。","a":true,"exp":"〇。公的年金制度は世代間扶養である賦課方式を基本とした仕組みで運営されている。","page":58,"detail":"賃金や物価の変化を年金額に反映させながら生涯にわたって年金が支給される制度として設計されている。"},{"law":"年金制度","cat":"被保険者数","q":"公的年金の被保険者数は全体で6,745万人(2023年度末)であり、第1号被保険者が4,672万人と全体の約69%を占めている。","a":false,"exp":"×。全体6,745万人のうち約69%(4,672万人)を占めるのは第2号被保険者等である。第1号被保険者は1,387万人である。","page":58,"detail":"第3号被保険者は686万人となっている。"},{"law":"年金制度","cat":"マクロ経済スライド","q":"マクロ経済スライドは、2016(平成28)年の年金制度改革で初めて導入された。","a":false,"exp":"×。マクロ経済スライドは2004(平成16)年の年金制度改革で導入された。2016(平成28)年の制度改正では未調整分を翌年度以降に繰り越して調整する見直しが行われた。","page":58,"detail":"前年度よりも年金の名目額を下げずに賃金・物価上昇の範囲内で自動的に調整する仕組みである。"},{"law":"年金制度","cat":"令和6年財政検証","q":"財政検証は、少なくとも10年に1度、将来の人口や経済の前提を設定した上で年金財政の健全性を検証するものである。","a":false,"exp":"×。財政検証は少なくとも5年に1度行われる。令和6年財政検証では、1人当たり成長率ゼロのケース以外で所得代替率50%の給付水準が確保できることが確認された。","page":59,"detail":"女性や高齢者の労働参加の進展や積立金の運用好調により前回より将来の給付水準が上昇した。"},{"law":"医療・介護","cat":"介護保険制度の創設","q":"介護保険制度は、2009(平成21)年4月に社会全体で高齢者介護を支える仕組みとして創設された。","a":false,"exp":"×。介護保険制度は2000(平成12)年4月に創設され、2025(令和7)年で26年目を迎えた。","page":69,"detail":"介護サービスの利用者は2000年4月の149万人から2024年4月には528万人と約3.5倍になっている。"},{"law":"医療・介護","cat":"出産育児一時金","q":"出産育児一時金は、出産費用の上昇を踏まえ、2023(令和5)年4月より42万円から42万円のまま据え置かれた。","a":false,"exp":"×。出産育児一時金は2023(令和5)年4月より42万円から50万円に増額された。","page":66,"detail":"2024(令和6)年度から後期高齢者医療制度が出産育児一時金に要する費用の一部を支援する仕組みを導入した。"},{"law":"医療・介護","cat":"介護費用","q":"介護費用は2000年度の約3.6兆円から2023(令和5)年度には約11.7兆円となり、2040(令和22)年には約25.8兆円になると推計されている。","a":true,"exp":"〇。介護費用は2000年度約3.6兆円から2023年度約11.7兆円、2040年には約25.8兆円になると推計されている。","page":69,"detail":"介護保険料は制度創設時の全国平均3,000円程度から第9期計画期間では全国平均6,225円になっている。"}],"ikuji":[{"law":"育児・介護休業法","cat":"育児休業","q":"育児休業は、原則として子が1歳に達する日（1歳の誕生日の前日）まで取得できる。","a":true,"exp":"○。育児休業の原則は子が1歳に達するまで（1歳の誕生日の前日まで）である。","detail":"育児休業は子の養育のための休業で、原則1歳まで。一定の要件を満たせば1歳6か月、さらに2歳まで延長できる。「1歳に達する日」は民法の計算により誕生日の前日を指す点に注意。","page":140},{"law":"育児・介護休業法","cat":"育児休業","q":"育児休業は、子1人につき分割して3回まで取得することができる。","a":false,"exp":"×。令和4年10月改正により分割は2回までである（3回ではない）。","detail":"R4.10改正で育児休業は原則2回まで分割取得が可能となった。これとは別に、産後パパ育休（出生時育児休業）も別枠で2回分割でき、夫婦で柔軟に取得できるよう制度が整備された。","page":140},{"law":"育児・介護休業法","cat":"育児休業","q":"保育所に入所できない等の事情がある場合、育児休業は1歳6か月まで延長でき、さらに3歳まで再延長できる。","a":false,"exp":"×。再延長の上限は2歳までである（3歳ではない）。","detail":"保育所等に入れない等の事情がある場合の特例。1歳→1歳6か月→2歳と段階的に延長される。3歳まで延長できるのは延長制度ではなく、3歳未満を対象とする所定労働時間短縮措置等の話であり混同に注意。","page":143},{"law":"育児・介護休業法","cat":"育児休業","q":"パパ・ママ育休プラスを利用すると、子が1歳6か月に達するまで育児休業を取得できる。","a":false,"exp":"×。パパ・ママ育休プラスの上限は子が1歳2か月までである（1歳6か月ではない）。","detail":"両親がともに育児休業を取得する場合の特例で、休業可能期間が1歳2か月までに延長される。ただし各人が取得できる休業期間の上限は1年（女性は産後休業期間を含む）である点に注意。","page":154},{"law":"育児・介護休業法","cat":"育児休業","q":"パパ・ママ育休プラスにおいて、父母それぞれが取得できる育児休業の上限は1年である。","a":true,"exp":"○。各人の上限は1年であり、子が1歳2か月まで取得可能となる。","detail":"パパ・ママ育休プラスは休業可能期間を1歳2か月まで延ばすが、1人あたりの取得上限は1年。母は産後休業を含めて1年となる。","page":154},{"law":"育児・介護休業法","cat":"育児休業","q":"育児休業の申出は、原則として休業開始予定日の2週間前までに行わなければならない。","a":false,"exp":"×。育児休業の申出は原則1か月前までである。2週間前は出生時育児休業や介護休業の原則である。","detail":"通常の育児休業は原則1か月前までの申出。これに対し産後パパ育休と介護休業は原則2週間前まで。申出期限の取り違えは頻出の引っかけ。","page":140},{"law":"育児・介護休業法","cat":"育児休業","q":"有期雇用労働者は、子が1歳6か月に達する日までに労働契約が満了することが明らかでない場合に、育児休業を申し出ることができる。","a":true,"exp":"○。子が1歳6か月までに契約満了が明らかでないことが要件である。","detail":"有期雇用労働者の育児休業の要件。かつては「引き続き雇用された期間1年以上」も要件だったが現在は撤廃され、労使協定で除外できるにとどまる。","page":140},{"law":"育児・介護休業法","cat":"育児休業","q":"労使協定を締結すれば、雇用された期間が1年未満の労働者を育児休業の対象から除外できる。","a":true,"exp":"○。雇用1年未満は労使協定により除外できる対象である。","detail":"労使協定による除外対象は、雇用1年未満、1年（1歳以降の休業は6か月）以内に雇用が終了する者、週所定労働日数2日以下の者。法律上当然に対象外となるわけではなく、協定締結が前提。","page":140},{"law":"育児・介護休業法","cat":"育児休業","q":"週の所定労働日数が3日以下の労働者は、労使協定により育児休業の対象から除外することができる。","a":false,"exp":"×。労使協定で除外できるのは週所定労働日数2日以下の者である（3日以下ではない）。","detail":"週所定2日以下が除外対象。日数の取り違えに注意。子の看護等休暇・介護休暇でも週2日以下が除外対象となる。","page":140},{"law":"育児・介護休業法","cat":"出生時育休","q":"出生時育児休業（産後パパ育休）は、子の出生後8週間以内に6週間まで取得できる。","a":false,"exp":"×。出生時育児休業は出生後8週間以内に4週間（28日）までである（6週間ではない）。","detail":"R4.10新設の産後パパ育休。通常の育児休業とは別枠で取得でき、男性の育児参加を促す制度。期間は28日が上限。日数の取り違えを狙う引っかけ。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","q":"出生時育児休業は、分割して2回まで取得することができる。","a":true,"exp":"○。出生時育児休業は2回まで分割取得できる。","detail":"産後パパ育休は2回に分割可能。なお2回に分割する場合は原則として初回にまとめて申し出る必要がある。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","q":"出生時育児休業の申出は、原則として休業開始予定日の1か月前までに行わなければならない。","a":false,"exp":"×。出生時育児休業の申出は原則2週間前までである（1か月前は通常の育児休業）。","detail":"産後パパ育休は原則2週間前まで。通常の育児休業の1か月前と混同させる引っかけ。職場環境整備等の措置を講じた事業主は1か月前までとすることもできる。","page":148},{"law":"育児・介護休業法","cat":"出生時育休","q":"出生時育児休業期間中は、労働者がいかなる場合も就業することは認められない。","a":false,"exp":"×。労使協定を締結している場合、労働者が同意した範囲で上限内の就業が認められる。","detail":"産後パパ育休の特徴として、労使協定があれば休業中の就業が可能。就業日数・時間には上限が設けられている。通常の育児休業との大きな違い。","page":148},{"law":"育児・介護休業法","cat":"子の看護等休暇","q":"令和7年4月改正により、「子の看護休暇」の名称は「子の看護等休暇」に変更された。","a":true,"exp":"○。R7.4改正で「子の看護等休暇」に名称変更された。","detail":"看護に限らず学級閉鎖や入園・卒園式等への対応も含むよう対象事由が拡大されたことに伴う名称変更。改正点として狙われやすい。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","q":"子の看護等休暇の対象となる子の範囲は、小学校就学の始期に達するまでの子である。","a":false,"exp":"×。R7.4改正により対象は小学校第3学年修了まで拡大された（改正前は就学前）。","detail":"改正前は小学校就学前だったが、R7.4から小学校3年生修了まで対象が広がった。改正前後の混同を狙う典型問題。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","q":"令和7年4月改正により、学級閉鎖等や入園式・卒園式等への参加も子の看護等休暇の対象事由に追加された。","a":true,"exp":"○。R7.4改正で学級閉鎖等・入園卒園式等が対象事由に追加された。","detail":"従来の病気・けが・予防接種等に加え、感染症に伴う学級閉鎖等や行事参加が加わった。名称が「看護等」となった理由の一つ。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","q":"子の看護等休暇は、1年度において5日（小学校3年生修了までの子が2人以上の場合は10日）を限度に取得できる。","a":true,"exp":"○。年5日、対象の子2人以上で10日が限度である。","detail":"日数は子の人数に応じる。時間単位での取得も可能。介護休暇も同様に年5日・2人以上10日という構造。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","q":"令和7年4月改正により、勤続6か月未満の労働者を子の看護等休暇の対象から労使協定で除外する規定は廃止された。","a":true,"exp":"○。R7.4改正で勤続6か月未満を除外する労使協定規定は廃止された。","detail":"改正前は勤続6か月未満を労使協定で除外できたが廃止。現在の労使協定除外は週所定2日以下の者のみ。介護休暇も同様に6か月未満除外が廃止された。","page":160},{"law":"育児・介護休業法","cat":"子の看護等休暇","q":"子の看護等休暇は、半日単位でのみ取得でき、時間単位での取得はできない。","a":false,"exp":"×。子の看護等休暇は時間単位で取得できる。","detail":"時間単位取得が可能。中抜けの取扱い等は指針による。介護休暇も時間単位取得が可能。","page":160},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","q":"令和7年4月改正により、所定外労働の制限（残業免除）の対象となる子の範囲は、3歳未満から小学校就学前まで拡大された。","a":true,"exp":"○。R7.4改正で対象が3歳未満から小学校就学前に拡大された。","detail":"残業免除（所定外労働の制限）の対象が広がった改正点。請求があれば所定労働時間を超える労働をさせてはならない。","page":163},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","q":"所定外労働の制限を請求した労働者については、1か月24時間・1年150時間を超えて所定外労働をさせてはならない。","a":false,"exp":"×。所定外労働の制限は所定労働時間を超える労働をさせてはならない（残業ゼロ）。24時間・150時間は時間外労働の制限の上限である。","detail":"所定外労働の制限（残業免除）はゼロ。一方、時間外労働の制限は1か月24時間・1年150時間という上限つき。両者の取り違えが頻出。","page":163},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","q":"所定外労働の制限の1回の請求は、1か月以上1年以内の期間について行う。","a":true,"exp":"○。1回の請求は1か月以上1年以内の期間である。","detail":"残業免除の請求単位。回数に制限はないが1回ごとに1か月以上1年以内で請求する。","page":163},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","q":"令和7年4月改正により、介護を行う労働者についても所定外労働の制限（残業免除）の制度が新設された。","a":true,"exp":"○。R7.4改正で介護にも所定外労働の制限が新設された。","detail":"従来は育児のみだった所定外労働の制限が介護にも拡大。要介護状態の対象家族を介護する労働者が請求できる。改正点として重要。","page":163},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","q":"時間外労働の制限を請求した小学校就学前の子を養育する労働者については、1か月24時間・1年150時間を超える時間外労働をさせてはならない。","a":true,"exp":"○。時間外労働の制限の上限は1か月24時間・1年150時間である。","detail":"時間外労働の制限は上限つきで残業ゼロではない。対象は就学前の子を養育する者または要介護家族を介護する者。","page":164},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","q":"深夜業の制限を請求した労働者については、午後9時から午前6時までの間に労働させてはならない。","a":false,"exp":"×。深夜業の制限の時間帯は午後10時から午前5時までである。","detail":"深夜業の時間帯は午後10時〜午前5時。労基法の深夜割増と同じ時間帯。時刻の取り違えを狙う引っかけ。対象は就学前の子の養育または要介護家族の介護。","page":166},{"law":"育児・介護休業法","cat":"所定外・時間外・深夜","q":"時間外労働の制限および深夜業の制限の対象には、要介護状態にある対象家族を介護する労働者も含まれる。","a":true,"exp":"○。育児だけでなく介護を行う労働者も対象である。","detail":"時間外労働の制限・深夜業の制限はいずれも育児（就学前の子）と介護（要介護家族）の双方が対象。","page":164},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"育児のための所定労働時間の短縮措置（短時間勤務）は、3歳未満の子を養育する労働者を対象とする事業主の義務である。","a":true,"exp":"○。育児短時間勤務は3歳未満の子の養育について事業主の義務である。","detail":"原則1日6時間とする措置を講じる義務。3歳未満が対象。3歳以降は柔軟な働き方を実現するための措置（選択的措置義務）に移行する。","page":169},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"育児短時間勤務制度における短縮後の所定労働時間は、原則として1日5時間とされている。","a":false,"exp":"×。原則として1日6時間である（5時間ではない）。","detail":"短時間勤務は原則1日6時間。数値の取り違えを狙う問題。","page":169},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"令和7年4月改正により、3歳未満の子を養育する労働者についてテレワークを選択できる措置を講じることが、事業主の義務とされた。","a":false,"exp":"×。3歳未満の子に関する育児テレワーク導入は努力義務である（義務ではない）。","detail":"R7.4改正で3歳未満の子の養育についてテレワーク措置は努力義務として導入。義務と努力義務の取り違えを狙う引っかけ。","page":170},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"介護のための所定労働時間の短縮等の措置は、利用開始から連続する93日以上の期間に1回以上利用できるものでなければならない。","a":false,"exp":"×。介護の短縮措置等は利用開始から連続3年以上の期間に2回以上利用できる措置でなければならない（93日・1回ではない）。","detail":"介護は選択的措置義務。短時間勤務、フレックス、始業終業時刻の繰上げ繰下げ、費用助成等から選択して講じる。要件は連続3年以上・2回以上。介護休業の93日と混同させる引っかけ。","page":170},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"令和7年10月新設の「柔軟な働き方を実現するための措置」の対象は、3歳から小学校就学前までの子を養育する労働者である。","a":true,"exp":"○。対象は3歳から小学校就学前までの子を養育する労働者である。","detail":"R7.10新設。3歳未満の短時間勤務義務の後を埋める制度で、対象は3歳〜就学前。事業主が選択肢から2つ以上措置し、労働者が1つ選択利用する選択的措置義務。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"柔軟な働き方を実現するための措置では、事業主は5つの措置の中からすべてを講じなければならない。","a":false,"exp":"×。5つの措置のうち2つ以上を選択して講じる（すべてではない）。","detail":"事業主は①始業時刻等の変更②テレワーク等（月10日以上）③保育施設の設置運営等④養育両立支援休暇（年10日以上）⑤短時間勤務の5つから2つ以上を選択。労働者はそのうち1つを選択利用する。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"柔軟な働き方を実現するための措置のうちテレワーク等の措置は、1か月について10日以上利用できるものでなければならない。","a":true,"exp":"○。テレワーク等は月10日以上利用できる措置とされる。","detail":"5つの選択肢のうちテレワーク等は月10日以上、養育両立支援休暇は年10日以上が要件。数値が問われやすい。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"柔軟な働き方を実現するための措置における養育両立支援休暇は、1年について5日以上利用できるものとされている。","a":false,"exp":"×。養育両立支援休暇は年10日以上である（5日ではない）。","detail":"養育両立支援休暇は年10日以上。テレワーク等の月10日以上と合わせて数値を整理して覚える。","page":171},{"law":"育児・介護休業法","cat":"短時間・柔軟措置","q":"令和7年10月改正により、3歳になるまでの適切な時期に、仕事と育児の両立に関する個別の意向聴取・配慮が事業主に義務付けられた。","a":true,"exp":"○。R7.10改正で仕事と育児の両立に関する個別の意向聴取・配慮が義務化された。","detail":"柔軟な働き方を実現するための措置とあわせて新設。労働者の意向を聴取し配慮することが義務。改正点として重要。","page":168},{"law":"育児・介護休業法","cat":"介護休業","q":"介護休業の対象となる「要介護状態」とは、2週間以上にわたり常時介護を必要とする状態をいう。","a":true,"exp":"○。要介護状態は2週間以上にわたり常時介護を必要とする状態である。","detail":"要介護認定の有無とは別の独自基準。2週間という期間が問われやすい。","page":156},{"law":"育児・介護休業法","cat":"介護休業","q":"介護休業は、対象家族1人につき通算93日まで、3回を上限として分割取得できる。","a":true,"exp":"○。対象家族1人につき通算93日、3回まで分割できる。","detail":"介護休業は93日・3回が基本数値。育児休業の分割2回と混同しないよう注意。","page":156},{"law":"育児・介護休業法","cat":"介護休業","q":"介護休業は、対象家族1人につき通算90日まで取得できる。","a":false,"exp":"×。介護休業は対象家族1人につき通算93日までである（90日ではない）。","detail":"93日が正しい。90日との取り違えを狙う引っかけ。3回まで分割可能。","page":156},{"law":"育児・介護休業法","cat":"介護休業","q":"介護休業の申出は、原則として休業開始予定日の1か月前までに行う。","a":false,"exp":"×。介護休業の申出は原則2週間前までである（1か月前ではない）。","detail":"介護休業と産後パパ育休が2週間前、通常の育児休業が1か月前。申出期限の取り違えを狙う引っかけ。","page":156},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","q":"介護休業の対象家族には、配偶者、父母、子、配偶者の父母、祖父母、兄弟姉妹および孫が含まれる。","a":true,"exp":"○。これらすべてが対象家族に含まれる。","detail":"配偶者（事実婚含む）・父母・子・配偶者の父母・祖父母・兄弟姉妹・孫。かつて同居・扶養要件があった祖父母等も要件が撤廃されている。","page":156},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","q":"介護休業の対象家族には、事実婚の配偶者は含まれない。","a":false,"exp":"×。事実婚を含む配偶者が対象家族に含まれる。","detail":"配偶者には婚姻の届出をしていないが事実上婚姻関係と同様の事情にある者も含む。対象家族の範囲を狭める引っかけ。","page":156},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","q":"介護休暇は、1年度において5日（対象家族が2人以上の場合は10日）を限度に取得できる。","a":true,"exp":"○。年5日、対象家族2人以上で10日が限度である。","detail":"子の看護等休暇と同じ日数構造。時間単位での取得も可能。","page":162},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","q":"令和7年4月改正により、勤続6か月未満の労働者を介護休暇の対象から労使協定で除外する規定は廃止された。","a":true,"exp":"○。R7.4改正で介護休暇の勤続6か月未満除外規定は廃止された。","detail":"子の看護等休暇と同様、勤続6か月未満除外が廃止。労使協定で除外できるのは週所定2日以下の者のみとなった。","page":162},{"law":"育児・介護休業法","cat":"介護休暇・対象家族","q":"介護休暇は半日単位での取得しか認められておらず、時間単位での取得はできない。","a":false,"exp":"×。介護休暇は時間単位で取得できる。","detail":"子の看護等休暇と同様に時間単位取得が可能。取得単位を狭める引っかけ。","page":162},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","q":"事業主は、労働者が育児休業の申出をしたことを理由として、解雇その他不利益な取扱いをしてはならない。","a":true,"exp":"○。育休等の申出・取得を理由とする不利益取扱いは禁止されている。","detail":"不利益取扱いの禁止は法の根幹。解雇、降格、減給、雇止め等が含まれる。","page":167},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","q":"事業主は、育児休業等に関するハラスメントを防止するため必要な措置を講じる努力義務を負う。","a":false,"exp":"×。ハラスメント防止措置は努力義務ではなく事業主の義務である。","detail":"育児休業等に関するハラスメント防止措置は法律上の義務。努力義務との取り違えを狙う引っかけ。","page":167},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","q":"育児休業の取得状況の公表が義務付けられる事業主の範囲は、令和7年4月改正により常時雇用する労働者が1,000人を超える事業主から300人を超える事業主に拡大された。","a":true,"exp":"○。R7.4改正で公表義務の対象が1,000人超から300人超に拡大された。","detail":"育休取得状況の公表義務の対象拡大は重要改正点。常時雇用1,000人超→300人超。数値が問われやすい。","page":169},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","q":"育児休業取得状況の公表が義務付けられるのは、常時雇用する労働者が500人を超える事業主である。","a":false,"exp":"×。R7.4改正後の公表義務の対象は常時雇用する労働者が300人を超える事業主である（500人ではない）。","detail":"改正前1,000人超、改正後300人超。500人という数値は誤り。改正前後・数値の取り違えを狙う問題。","page":169},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","q":"事業主は、労働者本人または配偶者の妊娠・出産等の申出があった場合、育児休業制度等を個別に周知し意向を確認する義務を負う。","a":true,"exp":"○。育児休業の個別周知・意向確認は事業主の義務である（R4.4施行）。","detail":"R4.4から雇用環境整備と個別周知・意向確認が義務化。妊娠・出産の申出をした労働者への措置。","page":167},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","q":"令和7年4月改正により、介護に直面した労働者に対する介護休業制度等の個別の周知・意向確認が事業主に義務付けられた。","a":true,"exp":"○。R7.4改正で介護に関する個別周知・意向確認が義務化された。","detail":"介護離職防止のため、環境整備・情報提供・個別周知意向確認が新設。育児に続き介護でも同様の措置が求められる。","page":167},{"law":"育児・介護休業法","cat":"不利益・ハラ・環境整備","q":"令和7年4月改正により、介護離職防止のための雇用環境整備や情報提供が事業主に求められることとなった。","a":true,"exp":"○。R7.4改正で介護離職防止の環境整備・情報提供が新設された。","detail":"研修や相談窓口設置等の環境整備、介護保険制度等の情報提供を行う。介護に直面する前の早期の情報提供も含む。","page":168},{"law":"育児・介護休業法","cat":"給付・その他","q":"令和7年4月新設の出生後休業支援給付金は、両親がともに育児休業等を取得する場合に、28日を上限として手取りで10割相当が支給される仕組みである。","a":true,"exp":"○。出生後休業支援給付金は両親の育休取得で28日上限・手取り10割相当である。","detail":"雇用保険のR7.4新設給付。育児休業給付と合わせて実質手取り10割相当となるよう上乗せ給付する。男性の育休取得促進が狙い。","page":236,"src":"④基礎講座_雇用保険法"},{"law":"育児・介護休業法","cat":"給付・その他","q":"令和7年4月新設の育児時短就業給付金は、3歳未満の子を養育しながら時短勤務する者に賃金の20%相当を支給する。","a":false,"exp":"×。育児時短就業給付金は2歳未満の子を養育する者に賃金の10%相当を支給する（3歳未満・20%ではない）。","detail":"R7.4新設の雇用保険給付。対象は2歳未満の子を養育する時短勤務者、給付率は賃金の10%相当。年齢と率の取り違えを狙う引っかけ。","page":240,"src":"④基礎講座_雇用保険法"},{"law":"育児・介護休業法","cat":"給付・その他","q":"出生後休業支援給付金は、両親がともに育児休業等を取得する場合に、56日を上限として支給される。","a":false,"exp":"×。出生後休業支援給付金の上限は28日である（56日ではない）。","detail":"R7.4新設の雇用保険給付。両親がともに育休等を取得する場合に28日を上限として手取り10割相当となるよう上乗せ給付する。日数の取り違えを狙う引っかけ。","page":236,"src":"④基礎講座_雇用保険法"},{"law":"育児・介護休業法","cat":"給付・その他","q":"事業主は、小学校就学前の子を養育する労働者について、育児休業に関する制度に準じて必要な措置を講ずる努力義務を負う（法24条1項）。","a":true,"exp":"○。法24条1項は就学前の子を養育する労働者への準ずる措置の努力義務を定める。","detail":"24条は努力義務規定。1項が育児（就学前の子）、3項が家族介護を行う労働者への介護休業等に準ずる措置の努力義務。","page":173},{"law":"育児・介護休業法","cat":"給付・その他","q":"法第24条第3項は、家族を介護する労働者について、介護休業等に準ずる措置を講ずる事業主の義務を定めている。","a":false,"exp":"×。法24条3項は義務ではなく努力義務である。","detail":"24条は全体が努力義務規定。3項は家族介護を行う労働者への介護休業等に準ずる措置の努力義務。義務との取り違えを狙う引っかけ。","page":173}]};
const SENTAKU={"rkijun":[{"law":"総則","cat":"労働者の定義","text":"労働者とは、職業の種類を問わず、事業又は事務所に【使用される者|雇用される者|労務に従事する者|事業に従事する者】で、【賃金|報酬|給料|対価】を支払われる者をいう。","exp":"法9条。使用従属関係にあることを要する。","page":16},{"law":"総則","cat":"使用者の定義","text":"使用者とは、事業主又は事業の【経営担当者|業務執行者|代表者|管理監督者】その他その事業の労働者に関する事項について、【事業主のために行為をするすべての者|事業主に代わって指揮命令する者|労働者を直接指揮する者|事業の管理を行う者】をいう。","exp":"法10条。形式にとらわれず実質的権限の有無で判断する。","page":19},{"law":"総則","cat":"賃金の定義","text":"賃金とは、賃金、給料、手当、賞与その他名称のいかんを問わず、【労働の対償|労務提供の対価|労働の代償|勤労の報酬】として使用者が労働者に支払うすべてのものをいう。","exp":"法11条。任意的恩恵的給付や福利厚生施設は原則として賃金でない。","page":70},{"law":"総則","cat":"労働条件の原則","text":"労働条件は、労働者が【人たるに値する生活|健康で文化的な最低限度の生活|標準的な生活|文化的な生活】を営むための必要を充たすべきものでなければならない。","exp":"法1条1項。労働憲章的規定で、違反しても罰則は科されない。","page":22},{"law":"総則","cat":"労働条件の原則","text":"労働基準法で定める労働条件の基準は【最低のもの|標準的なもの|平均的なもの|最高のもの】であるから、労働関係の当事者は、この基準を理由として労働条件を【低下させてはならない|引き上げなければならない|変更してはならない|維持しなければならない】ことはもとより、その向上を図るように努めなければならない。","exp":"法1条2項。","page":23},{"law":"総則","cat":"労働条件の決定","text":"労働条件は、労働者と使用者が、【対等の立場|平等の立場|自由な立場|誠実の原則】において決定すべきものである。労働者及び使用者は、労働協約、就業規則及び労働契約を遵守し、誠実に各々その義務を履行しなければならない。","exp":"法2条。訓示的規定で直接の罰則はない。","page":24},{"law":"総則","cat":"均等待遇","text":"使用者は、労働者の【国籍|性別|人種|門地】、信条又は社会的身分を理由として、賃金、労働時間その他の労働条件について、差別的取扱いをしてはならない。","exp":"法3条。性別は含まれない。","page":25},{"law":"総則","cat":"男女同一賃金の原則","text":"使用者は、労働者が女性であることを理由として、【賃金|労働条件|労働時間|待遇】について、男性と差別的取扱いをしてはならない。","exp":"法4条。労基法で性差別を禁止するのは賃金のみ。","page":26},{"law":"総則","cat":"強制労働の禁止","text":"使用者は、暴行、脅迫、監禁その他精神又は身体の自由を不当に拘束する手段によって、労働者の【意思に反して|自由を拘束して|意に反して|強制的に】労働を強制してはならない。","exp":"法5条。違反には最も重い罰則(1年以上10年以下の拘禁刑等)が科される。","page":27},{"law":"総則","cat":"中間搾取の排除","text":"何人も、法律に基いて許される場合の外、【業として|営利の目的で|反復継続して|事業として】他人の就業に介入して利益を得てはならない。","exp":"法6条。違反行為の主体は他人の就業に介入して利益を得る第三者。","page":28},{"law":"総則","cat":"公民権行使の保障","text":"使用者は、労働者が労働時間中に、選挙権その他公民としての権利を行使し、又は公の職務を執行するために必要な時間を請求した場合においては、【拒んではならない|拒否できる|与えることができる|認めることができる】。ただし、権利の行使又は公の職務の執行に妨げがない限り、請求された【時刻を変更|期日を変更|時季を変更|日数を変更】することができる。","exp":"法7条。","page":30},{"law":"労働契約","cat":"労基法違反の契約","text":"この法律で定める基準に達しない労働条件を定める労働契約は、その部分については【無効|取消し|解除|変更】とする。この場合において、無効となった部分は、この法律で定める基準による。","exp":"法13条。","page":34},{"law":"労働契約","cat":"契約期間","text":"労働契約は、期間の定めのないものを除き、一定の事業の完了に必要な期間を定めるもののほかは、【3年|1年|2年|5年】(専門的知識等を有する者や満60歳以上の者との契約は【5年|3年|10年|無期】)を超える期間について締結してはならない。","exp":"法14条1項。","page":37},{"law":"労働契約","cat":"労働条件の明示","text":"使用者は、労働契約の締結に際し、労働者に対して賃金、労働時間その他の労働条件を【明示|通知|交付|提示】しなければならない。","exp":"法15条1項。賃金及び労働時間等は書面の交付等による。","page":43},{"law":"労働契約","cat":"労働契約の即時解除","text":"明示された労働条件が事実と相違する場合においては、労働者は、即時に労働契約を解除することができる。就業のために住居を変更した労働者が、契約解除の日から【14日|7日|30日|1箇月】以内に帰郷する場合においては、使用者は、必要な旅費を負担しなければならない。","exp":"法15条2項・3項。","page":47},{"law":"労働契約","cat":"賠償予定の禁止","text":"使用者は、労働契約の不履行について違約金を定め、又は【損害賠償額を予定|損害賠償を請求|賠償金を徴収|違約金を請求】する契約をしてはならない。","exp":"法16条。現実に生じた損害の賠償請求は可能。","page":48},{"law":"労働契約","cat":"前借金相殺の禁止","text":"使用者は、前借金その他労働することを条件とする【前貸の債権|貸付金|債務|立替金】と賃金を相殺してはならない。","exp":"法17条。","page":49},{"law":"労働契約","cat":"強制貯金","text":"使用者は、【労働契約に附随して|労働契約と同時に|労働契約に基づいて|雇用に際して】貯蓄の契約をさせ、又は貯蓄金を管理する契約をしてはならない。","exp":"法18条1項。任意貯蓄は労使協定の届出等の要件下で認められる。","page":50},{"law":"労働契約","cat":"解雇制限","text":"使用者は、労働者が業務上負傷し、又は疾病にかかり療養のために休業する期間及びその後【30日間|14日間|60日間|90日間】並びに産前産後の女性が休業する期間及びその後30日間は、解雇してはならない。","exp":"法19条1項。打切補償の支払や天災事変等(行政官庁の認定)の例外がある。","page":56},{"law":"労働契約","cat":"解雇制限の例外","text":"使用者が平均賃金の【1200日分|1000日分|600日分|730日分】の【打切補償|休業補償|障害補償|解雇補償】を支払う場合又は天災事変その他やむを得ない事由のために事業の継続が不可能となった場合においては、解雇制限期間中であっても解雇することができる。","exp":"法19条1項。後者は所轄労働基準監督署長の認定を要する。","page":58},{"law":"労働契約","cat":"解雇予告","text":"使用者は、労働者を解雇しようとする場合においては、少なくとも【30日前|14日前|2週間前|60日前】にその予告をしなければならない。30日前に予告をしない使用者は、【30日分以上|14日分以上|60日分以上|20日分以上】の【平均賃金|通常の賃金|標準報酬|賃金総額】(解雇予告手当)を支払わなければならない。","exp":"法20条1項。予告日数は支払った平均賃金の日数だけ短縮できる。","page":60},{"law":"労働契約","cat":"解雇予告の適用除外","text":"日日雇い入れられる者、【2箇月|1箇月|3箇月|6箇月】以内の期間を定めて使用される者、季節的業務に【4箇月|2箇月|6箇月|3箇月】以内の期間を定めて使用される者及び試みの使用期間中の者(【14日|1箇月|30日|2箇月】を超えて引き続き使用されるに至った者を除く)については、解雇予告の規定は適用しない。","exp":"法21条。","page":63},{"law":"労働契約","cat":"退職時等の証明","text":"労働者が、退職の場合において、使用期間、業務の種類、その事業における地位、賃金又は退職の事由について証明書を請求した場合においては、使用者は、【遅滞なく|7日以内に|14日以内に|30日以内に】これを交付しなければならない。","exp":"法22条1項。労働者の請求しない事項を記入してはならない。","page":64},{"law":"労働契約","cat":"金品の返還","text":"使用者は、労働者の死亡又は退職の場合において、権利者の請求があった場合においては、【7日以内|14日以内|30日以内|遅滞なく】に賃金を支払い、積立金、保証金、貯蓄金その他名称のいかんを問わず、労働者の権利に属する金品を返還しなければならない。","exp":"法23条。","page":67},{"law":"賃金","cat":"平均賃金","text":"平均賃金とは、これを算定すべき【事由の発生した日以前3箇月間|事由の発生した日以前6箇月間|事由の発生した日以前1箇月間|事由の発生した日以前12箇月間】にその労働者に対し支払われた賃金の総額を、その期間の【総日数|総暦日数|労働した日数|所定労働日数】で除した金額をいう。","exp":"法12条1項。賃金締切日がある場合は直前の締切日から起算する。","page":72},{"law":"賃金","cat":"平均賃金の最低保障","text":"賃金が、労働した日もしくは時間によって算定され、又は出来高払制その他の請負制によって定められた場合においては、賃金の総額をその期間中に【労働した日数|総日数|総暦日数|所定労働日数】で除した金額の【100分の60|100分の70|100分の80|100分の100】を最低保障額とする。","exp":"法12条1項。原則の算定額と比較して高い方とする。","page":76},{"law":"賃金","cat":"通貨払の原則","text":"賃金は、通貨で、【直接|間接的に|代理人を通じて|確実に】労働者に、その【全額|一部|所定額|総額】を支払わなければならない。","exp":"法24条1項。賃金支払の5原則のうち通貨払・直接払・全額払。","page":78},{"law":"賃金","cat":"全額払の例外","text":"法令に別段の定めがある場合又は当該事業場の労働者の過半数で組織する労働組合等との書面による協定(労使協定)がある場合においては、賃金の【一部を控除|全部を控除|全額を相殺|一部を相殺】して支払うことができる。","exp":"法24条1項ただし書。労使協定は届出不要。","page":81},{"law":"賃金","cat":"毎月1回以上・一定期日払","text":"賃金は、【毎月1回以上|毎月2回以上|毎週1回以上|月1回】、一定の期日を定めて支払わなければならない。ただし、臨時に支払われる賃金、賞与その他これに準ずるもので厚生労働省令で定める賃金については、この限りでない。","exp":"法24条2項。","page":84},{"law":"賃金","cat":"非常時払","text":"使用者は、労働者が出産、疾病、災害その他厚生労働省令で定める非常の場合の費用に充てるために請求する場合においては、【支払期日前|支払期日後|賃金支払日|7日以内】であっても、【既往の労働|将来の労働|当月の労働|所定の労働】に対する賃金を支払わなければならない。","exp":"法25条。","page":85},{"law":"賃金","cat":"休業手当","text":"【使用者の責めに帰すべき事由|不可抗力|天災事変|労働者の責めに帰すべき事由】による休業の場合においては、使用者は、休業期間中当該労働者に、その平均賃金の【100分の60|100分の70|100分の80|100分の100】以上の手当を支払わなければならない。","exp":"法26条。ノーワーク・ノーペイの原則の例外。","page":86},{"law":"賃金","cat":"出来高払制の保障給","text":"出来高払制その他の請負制で使用する労働者については、使用者は、【労働時間|労働日数|出来高|実績】に応じ一定額の賃金の保障をしなければならない。","exp":"法27条。","page":88},{"law":"労働時間・休憩・休日","cat":"週の法定労働時間","text":"使用者は、労働者に、休憩時間を除き【1週間|1箇月|1日|2週間】について【40時間|44時間|48時間|45時間】を超えて、労働させてはならない。","exp":"法32条1項。特例措置対象事業場は44時間。","page":96},{"law":"労働時間・休憩・休日","cat":"日の法定労働時間","text":"使用者は、1週間の各日については、労働者に、休憩時間を除き1日について【8時間|7時間|9時間|10時間】を超えて、労働させてはならない。","exp":"法32条2項。","page":97},{"law":"労働時間・休憩・休日","cat":"労働時間の通算","text":"労働時間は、【事業場を異にする|使用者を異にする|事業を異にする|労働日を異にする】場合においても、労働時間に関する規定の適用については通算する。","exp":"法38条1項。事業主を異にする場合も含む。","page":98},{"law":"労働時間・休憩・休日","cat":"休憩時間の長さ","text":"使用者は、労働時間が【6時間|8時間|4時間|5時間】を超える場合においては少くとも【45分|30分|1時間|15分】、8時間を超える場合においては少くとも【1時間|45分|1時間30分|2時間】の休憩時間を労働時間の途中に与えなければならない。","exp":"法34条1項。","page":128},{"law":"労働時間・休憩・休日","cat":"休憩の一斉付与・自由利用","text":"休憩時間は、【一斉に|交替で|個別に|分割して】与えなければならない。ただし、労使協定があるときは、この限りでない。使用者は、休憩時間を【自由に利用|一定の場所で利用|許可を得て利用|事業場内で利用】させなければならない。","exp":"法34条2項・3項。","page":130},{"law":"労働時間・休憩・休日","cat":"休日","text":"使用者は、労働者に対して、【毎週少くとも1回|毎週2回|4週4回|毎月1回】の休日を与えなければならない。ただし、【4週間|8週間|2週間|1箇月】を通じ【4日以上|4日|3日以上|5日以上】の休日を与える使用者については、この限りでない。","exp":"法35条。後段は変形休日制。","page":132},{"law":"労働時間・休憩・休日","cat":"災害等による時間外労働","text":"災害その他避けることのできない事由によって、臨時の必要がある場合においては、使用者は、行政官庁の【許可|届出|認可|承認】を受けて、その必要の限度において労働時間を延長し、又は休日に労働させることができる。","exp":"法33条1項。事態急迫で許可を受ける暇がない場合は事後に遅滞なく届け出る。","page":136},{"law":"労働時間・休憩・休日","cat":"36協定","text":"使用者は、当該事業場に労働者の過半数で組織する労働組合等との書面による協定をし、これを行政官庁に【届け出た|許可を受けた|認可を受けた|承認を得た】場合においては、その協定で定めるところによって労働時間を延長し、又は休日に労働させることができる。","exp":"法36条1項。届出によって効力が生じる。","page":138},{"law":"労働時間・休憩・休日","cat":"時間外労働の限度時間","text":"労働時間を延長して労働させることができる時間は、限度時間を超えない時間に限る。限度時間は、【1箇月|1週間|2箇月|3箇月】について【45時間|42時間|44時間|36時間】及び1年について【360時間|320時間|420時間|300時間】とする。","exp":"法36条3項・4項。1年単位の変形労働時間制で対象期間3か月超は42時間・320時間。","page":140},{"law":"割増賃金","cat":"時間外・休日の割増賃金","text":"使用者が労働時間を延長し、又は休日に労働させた場合においては、その時間又はその日の労働については、通常の労働時間又は労働日の賃金の計算額の【2割5分以上5割以下|2割5分以上|3割5分以上|5割以上】の範囲内でそれぞれ政令で定める率以上の率で計算した割増賃金を支払わなければならない。","exp":"法37条1項。時間外2割5分以上、休日3割5分以上。","page":148},{"law":"割増賃金","cat":"月60時間超の割増賃金","text":"延長して労働させた時間が1箇月について【60時間|45時間|80時間|100時間】を超えた場合においては、その超えた時間の労働については、通常の労働時間の賃金の計算額の【5割以上|2割5分以上|3割5分以上|7割5分以上】の率で計算した割増賃金を支払わなければならない。","exp":"法37条1項ただし書。60時間の算定に休日労働時間は含まない。","page":148},{"law":"割増賃金","cat":"深夜業の割増賃金","text":"使用者が、【午後10時から午前5時まで|午後11時から午前6時まで|午後10時から午前6時まで|午後9時から午前5時まで】の間において労働させた場合においては、その時間の労働については、通常の労働時間の賃金の計算額の【2割5分以上|3割5分以上|5割以上|2割以上】の率で計算した割増賃金を支払わなければならない。","exp":"法37条4項。管理監督者にも深夜業の規定は適用される。","page":146},{"law":"割増賃金","cat":"割増賃金の基礎から除外する賃金","text":"【家族手当|役職手当|職務手当|精勤手当】、通勤手当その他厚生労働省令で定める賃金は、割増賃金の算定の基礎となる賃金には算入しない。省令で定める賃金は別居手当、子女教育手当、【住宅手当|役付手当|資格手当|皆勤手当】、臨時に支払われた賃金及び1箇月を超える期間ごとに支払われる賃金である。","exp":"法37条5項、則21条。労働者の個人的事情による賃金等を除外。","page":152},{"law":"割増賃金","cat":"代替休暇","text":"使用者が、労使協定により、1箇月60時間を超える時間外労働について【5割以上|2割5分以上|3割5分以上|7割5分以上】の率で計算した割増賃金の支払に代えて、通常の労働時間の賃金が支払われる休暇(代替休暇)を与えることを定めた場合に、当該労働者が当該休暇を取得したときは、超えた時間のうち取得した休暇に対応する時間については当該割増賃金を支払うことを要しない。","exp":"法37条3項。代替休暇は年休を除く。","page":154},{"law":"年次有給休暇","cat":"年休の付与要件","text":"使用者は、その雇入れの日から起算して【6箇月間|1年間|3箇月間|1年6箇月間】継続勤務し全労働日の【8割以上|7割以上|9割以上|6割以上】出勤した労働者に対して、継続し、又は分割した【10労働日|8労働日|11労働日|12労働日】の有給休暇を与えなければならない。","exp":"法39条1項。","page":166},{"law":"年次有給休暇","cat":"年休の付与日数","text":"使用者は、6箇月経過日から起算した継続勤務年数1年ごとに、10労働日に所定の労働日を加算した有給休暇を与えなければならず、継続勤務【6年6箇月|6年|5年6箇月|7年6箇月】以上で付与日数は【20労働日|18労働日|22労働日|25労働日】に達する。","exp":"法39条2項。継続勤務3年6か月で14日。","page":170},{"law":"年次有給休暇","cat":"時季指定権・時季変更権","text":"使用者は、有給休暇を労働者の請求する時季に与えなければならない。ただし、請求された時季に有給休暇を与えることが【事業の正常な運営を妨げる|業務に支障を生ずる|事業の継続が困難となる|正常な業務の運営を阻害する】場合においては、他の時季にこれを与えることができる。","exp":"法39条5項。後段は使用者の時季変更権。","page":176},{"law":"年次有給休暇","cat":"計画的付与","text":"使用者は、当該事業場の労使協定により、有給休暇を与える時季に関する定めをしたときは、有給休暇の日数のうち【5日|3日|10日|2日】を超える部分については、その定めにより有給休暇を与えることができる。","exp":"法39条6項。","page":178},{"law":"年次有給休暇","cat":"使用者による時季指定","text":"使用者は、有給休暇の日数が【10労働日|5労働日|11労働日|8労働日】以上である労働者に係る有給休暇の日数のうち【5日|3日|10日|7日】については、基準日から1年以内の期間に、労働者ごとにその時季を定めることにより与えなければならない。","exp":"法39条7項。労働者の時季指定や計画的付与で与えた分は控除される。","page":179},{"law":"年次有給休暇","cat":"年休中の賃金","text":"使用者は、有給休暇の期間又は時間については、平均賃金、所定労働時間労働した場合に支払われる通常の賃金又は健康保険法に定める【標準報酬月額|標準報酬日額|標準賞与額|報酬月額】の30分の1に相当する金額のいずれかを支払わなければならない。","exp":"法39条9項。標準報酬月額による場合は労使協定を要する。","page":182},{"law":"年次有給休暇","cat":"年休の不利益取扱いの禁止","text":"使用者は、有給休暇を取得した労働者に対して、【賃金の減額|精皆勤手当の減額|賞与の減額|昇給の停止】その他不利益な取扱いをしないようにしなければならない。","exp":"法附則136条。違反しても罰則は科されない。","page":183},{"law":"年少者・妊産婦","cat":"最低年齢","text":"使用者は、児童が【満15歳|満16歳|満13歳|満18歳】に達した日以後の最初の【3月31日|4月1日|12月31日|誕生日】が終了するまで、これを使用してはならない。","exp":"法56条1項。非工業的事業の軽易業務は所轄労働基準監督署長の許可を受けて満13歳以上を修学時間外に使用できる。","page":187},{"law":"年少者・妊産婦","cat":"年少者の証明書","text":"使用者は、満18歳に満たない者について、その【年齢を証明する戸籍証明書|住民票記載事項証明書|年齢を証明する住民票|戸籍謄本】を事業場に備え付けなければならない。","exp":"法57条1項。","page":188},{"law":"年少者・妊産婦","cat":"未成年者の労働契約","text":"親権者又は後見人は、未成年者に代って労働契約を締結してはならない。親権者もしくは後見人又は行政官庁は、労働契約が未成年者に不利であると認める場合においては、【将来に向って|遡って|直ちに|即時に】これを解除することができる。","exp":"法58条。","page":189},{"law":"年少者・妊産婦","cat":"未成年者の賃金","text":"未成年者は、【独立して|単独で|自ら|直接】賃金を請求することができる。親権者又は後見人は、未成年者の賃金を【代って受け取ってはならない|代理で受領できる|請求できる|管理できる】。","exp":"法59条。","page":189},{"law":"年少者・妊産婦","cat":"年少者の深夜業の禁止","text":"使用者は、満18歳に満たない者を【午後10時から午前5時まで|午後11時から午前6時まで|午後10時から午前6時まで|午後9時から午前5時まで】の間において使用してはならない。ただし、交替制によって使用する満16歳以上の【男性|女性|児童|者】については、この限りでない。","exp":"法61条1項。児童は午後8時から午前5時まで。","page":192},{"law":"年少者・妊産婦","cat":"年少者の坑内労働の禁止","text":"使用者は、【満18歳|満16歳|満20歳|満15歳】に満たない者を坑内で労働させてはならない。","exp":"法63条。","page":194},{"law":"年少者・妊産婦","cat":"年少者の帰郷旅費","text":"満18歳に満たない者が解雇の日から【14日|7日|30日|1箇月】以内に帰郷する場合においては、使用者は、必要な旅費を負担しなければならない。","exp":"法64条。請求の有無にかかわらず負担する。責めに帰すべき事由による解雇で認定を受けた場合を除く。","page":195},{"law":"年少者・妊産婦","cat":"産前産後の休業","text":"使用者は、【6週間|8週間|10週間|4週間】(多胎妊娠の場合にあっては【14週間|10週間|6週間|16週間】)以内に出産する予定の女性が休業を請求した場合においては、その者を就業させてはならない。使用者は、産後【8週間|6週間|10週間|12週間】を経過しない女性を就業させてはならない。","exp":"法65条1項・2項。産後6週間経過後は本人請求かつ医師が支障なしと認めた業務に就かせ得る。","page":198},{"law":"年少者・妊産婦","cat":"軽易業務への転換","text":"使用者は、【妊娠中|産前|妊産婦|出産後】の女性が請求した場合においては、他の軽易な業務に転換させなければならない。","exp":"法65条3項。産婦は含まれない。","page":199},{"law":"年少者・妊産婦","cat":"妊産婦の時間外労働等の制限","text":"使用者は、【妊産婦|妊娠中の女性|産後の女性|女性】が請求した場合においては、時間外労働をさせてはならず、又は休日に労働させてはならない。また、深夜業をさせてはならない。","exp":"法66条2項・3項。法41条適用除外者には時間外・休日の制限は及ばないが深夜業の制限は及ぶ。","page":200},{"law":"年少者・妊産婦","cat":"育児時間","text":"生後【満1年|満3年|満2年|満6箇月】に達しない生児を育てる女性は、休憩時間のほか、【1日2回|1日1回|1日3回|1週2回】各々少なくとも【30分|45分|1時間|15分】、その生児を育てるための時間を請求することができる。","exp":"法67条。","page":201},{"law":"年少者・妊産婦","cat":"生理日の措置","text":"使用者は、【生理日の就業が著しく困難|生理日に就業が困難|妊娠中で就業が困難|体調が著しく不良】な女性が休暇を請求したときは、その者を生理日に就業させてはならない。","exp":"法68条。有給であることまでは保障していない。","page":202},{"law":"就業規則","cat":"作成及び届出の義務","text":"【常時10人以上|常時5人以上|常時30人以上|10人以上】の労働者を使用する使用者は、所定の事項について就業規則を作成し、行政官庁に届け出なければならない。これを変更した場合においても、同様とする。","exp":"法89条。常時10人以上は事業場単位で判断する。","page":216},{"law":"就業規則","cat":"絶対的必要記載事項","text":"就業規則には、始業及び終業の時刻、休憩時間、休日、休暇に関する事項、賃金の決定・計算・支払の方法等に関する事項、【退職|表彰|制裁|福利厚生】に関する事項(解雇の事由を含む)を必ず記載しなければならない。","exp":"法89条1号〜3号。絶対的必要記載事項。","page":219},{"law":"就業規則","cat":"作成手続(意見聴取)","text":"使用者は、就業規則の作成又は変更について、当該事業場に労働者の過半数で組織する労働組合がある場合においてはその労働組合、ない場合においては労働者の過半数を代表する者の【意見を聴か|同意を得|協議し|承認を受け】なければならない。","exp":"法90条1項。同意までは要しない。届出には意見を記した書面を添付する。","page":222},{"law":"就業規則","cat":"制裁規定の制限","text":"就業規則で、労働者に対して減給の制裁を定める場合においては、その減給は、1回の額が【平均賃金の1日分の半額|平均賃金の1日分|平均賃金の半額|平均賃金の2日分】を超え、総額が【一賃金支払期における賃金の総額の10分の1|一賃金支払期における賃金の総額の5分の1|一賃金支払期における賃金の総額の20分の1|月額賃金の10分の1】を超えてはならない。","exp":"法91条。","page":224},{"law":"就業規則","cat":"法令・労働協約との関係","text":"就業規則は、法令又は当該事業場について適用される【労働協約|労使協定|就業規則|労働契約】に反してはならない。行政官庁は、法令又は労働協約に抵触する就業規則の変更を命ずることができる。","exp":"法92条。効力の優先順位は法令>労働協約>就業規則>労働契約。","page":226},{"law":"その他","cat":"事業の種類の区分(別表第1)","text":"労働基準法は事業の種類に関係なく適用されるが、別表第1において、製造業、鉱業、【建設業|清掃業|金融業|警備業】、運輸交通業等の工業的業種と、農林業、商業、保健衛生業、【接客娯楽業|製造業|建設業|鉱業】等の非工業的業種の区分を列挙している。","exp":"法別表1。特例の箇所で引用される。","page":12},{"law":"その他","cat":"適用除外","text":"労働基準法は、同居の親族のみを使用する事業及び【家事使用人|同居人|パートタイマー|臨時雇用者】については、適用しない。","exp":"法116条2項。","page":14}],"ranzen":[{"law":"総則・目的/定義","cat":"目的","text":"労働安全衛生法は、労働基準法と相まって、労働災害の防止のための危害防止基準の確立、責任体制の明確化、【自主的活動|安全衛生活動|自主的点検|労使協議】の促進の措置を講ずる等その防止に関する総合的計画的な対策を推進することにより、職場における労働者の安全と健康を確保するとともに、【快適な職場環境|良好な作業環境|安全な職場環境|健康的な職場環境】の形成を促進することを目的とする。","exp":"法1条","page":13},{"law":"総則・目的/定義","cat":"労働災害の定義","text":"「労働災害」とは、労働者の就業に係る建設物、設備、原材料、ガス、蒸気、粉じん等により、又は【作業行動|作業方法|労働環境|作業手順】その他業務に起因して、労働者が負傷し、疾病にかかり、又は死亡することをいう。","exp":"法2条1号","page":13},{"law":"総則・目的/定義","cat":"事業者の定義","text":"「事業者」とは、【事業を行う者|事業を経営する者|事業の経営担当者|事業の管理者】で、労働者を使用するものをいい、労基法の使用者と異なり事業経営の利益の【帰属主体|名義人|当事者|管理主体】そのものを義務主体とする。","exp":"法2条3号","page":14},{"law":"総則・目的/定義","cat":"作業環境測定の定義","text":"「作業環境測定」とは、作業環境の実態を把握するため空気環境その他の作業環境について行うデザイン、サンプリング及び【分析|評価|判定|管理】(解析を含む)をいう。","exp":"法2条4号","page":15},{"law":"総則・目的/定義","cat":"共同企業体の届出","text":"2以上の建設業に属する事業の事業者が、一の場所の仕事を共同連帯して請け負った場合は、そのうちの【1人|2人|代表企業1社|過半数】を代表者として定め、仕事の開始の日の【14日前|30日前|10日前|7日前】までに、届書を【都道府県労働局長|労働基準監督署長|厚生労働大臣|厚生労働省】に提出しなければならない。","exp":"法5条1項、則1条2項","page":18},{"law":"安全衛生管理体制","cat":"総括安全衛生管理者の選任規模","text":"事業者は、政令で定める規模の事業場ごとに総括安全衛生管理者を選任しなければならず、林業、鉱業、建設業、運送業、清掃業では常時【100人以上|50人以上|200人以上|300人以上】、製造業等では常時【300人以上|100人以上|500人以上|1,000人以上】、その他の業種では常時【1,000人以上|300人以上|500人以上|2,000人以上】の事業場が対象となる。","exp":"法10条1項、令2条","page":27},{"law":"安全衛生管理体制","cat":"安全管理者の選任規模","text":"事業者は、林業、鉱業、建設業、運送業、清掃業及び製造業等の政令で定める業種の事業場で常時【50人以上|100人以上|10人以上|30人以上】の労働者を使用するものごとに、厚生労働省令で定める資格を有する者のうちから、安全管理者を選任しなければならない。","exp":"法11条1項、令3条","page":30},{"law":"安全衛生管理体制","cat":"安全管理者の専属","text":"安全管理者は、その事業場に【専属|専任|常勤|専従】の者を選任しなければならないが、2人以上選任する場合において、当該安全管理者の中に【労働安全コンサルタント|労働衛生コンサルタント|安全管理者|産業医】がいるときは、当該者のうち1人については専属である必要はない。","exp":"則4条1項2号","page":31},{"law":"安全衛生管理体制","cat":"衛生管理者の選任規模","text":"事業者は、政令で定める規模の事業場ごとに、【都道府県労働局長|厚生労働大臣|労働基準監督署長|事業者】の免許を受けた者その他厚生労働省令で定める資格を有する者のうちから衛生管理者を選任しなければならず、政令で定める規模は業種を問わず常時【50人以上|100人以上|10人以上|30人以上】の労働者を使用する事業場である。","exp":"法12条1項、令4条","page":34},{"law":"安全衛生管理体制","cat":"衛生管理者の選任人数","text":"衛生管理者の選任人数は事業場の規模により定められており、常時50人以上200人以下は【1人以上|2人以上|3人以上|専任1人】、200人を超え500人以下は【2人以上|1人以上|3人以上|4人以上】、500人を超え1,000人以下は【3人以上|2人以上|4人以上|1人以上】、1,000人を超え2,000人以下は【4人以上|3人以上|5人以上|2人以上】である。","exp":"則7条1項4号","page":34},{"law":"安全衛生管理体制","cat":"衛生管理者の専任","text":"常時【1,000人を超える|500人を超える|2,000人を超える|3,000人を超える】労働者を使用する事業場、又は常時500人を超える労働者を使用する事業場で坑内労働等の健康上特に有害な業務に常時【30人以上|50人以上|100人以上|20人以上】の労働者を従事させるものでは、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。","exp":"則7条1項5号","page":35},{"law":"安全衛生管理体制","cat":"衛生管理者の巡視","text":"衛生管理者は、少なくとも【毎週1回|毎月1回|2週間に1回|毎作業日1回】作業場等を巡視し、設備、作業方法又は衛生状態に有害のおそれのあるときは、直ちに、労働者の健康障害を防止するため必要な措置を講じなければならない。","exp":"則11条","page":36},{"law":"安全衛生管理体制","cat":"産業医の選任規模","text":"事業者は、政令で定める規模の事業場ごとに、医師のうちから産業医を選任しなければならず、政令で定める規模は、業種を問わず、常時【50人以上|100人以上|1,000人以上|300人以上】の労働者を使用する事業場であり、常時【3,000人を超える|1,000人を超える|2,000人を超える|5,000人を超える】事業場では2人以上選任する。","exp":"法13条1項、令5条、則13条1項4号","page":40},{"law":"安全衛生管理体制","cat":"産業医の巡視","text":"産業医は、少なくとも【毎月1回|毎週1回|2か月に1回|3か月に1回】(事業者の同意を得ているときは少なくとも【2か月に1回|3か月に1回|毎月1回|毎週1回】)作業場等を巡視し、作業方法又は衛生状態に有害のおそれがあるときは、直ちに、労働者の健康障害を防止するため必要な措置を講じなければならない。","exp":"則15条","page":41},{"law":"安全衛生管理体制","cat":"産業医の勧告","text":"産業医は、労働者の健康を確保するため必要があると認めるときは、事業者に対し、労働者の健康管理等について必要な勧告をすることができ、事業者は、当該勧告を【尊重|遵守|考慮|実施】しなければならない。","exp":"法13条5項","page":45},{"law":"安全衛生管理体制","cat":"作業主任者の選任・資格","text":"事業者は、【高圧室内作業|高所作業|電気工事作業|騒音作業】その他の労働災害を防止するための管理を必要とする作業で政令で定めるものについては、都道府県労働局長の免許を受けた者又は【技能講習|特別教育|職長教育|安全衛生教育】を修了した者のうちから作業主任者を選任しなければならない。","exp":"法14条、令6条","page":47},{"law":"安全衛生管理体制","cat":"化学物質管理者の選任","text":"事業者は、リスクアセスメント対象物を製造し、又は取り扱う事業場ごとに、化学物質管理者を選任し、その者に化学物質の管理に係る技術的事項を管理させなければならず、選任すべき事由発生日から【14日以内|30日以内|7日以内|遅滞なく】に選任する。","exp":"則12条の5","page":49},{"law":"安全衛生管理体制","cat":"安全委員会の設置","text":"事業者は、政令で定める業種及び規模の事業場ごとに安全委員会を設けなければならず、林業、鉱業、建設業等では常時【50人以上|100人以上|30人以上|10人以上】、その他の一定の業種では常時【100人以上|50人以上|200人以上|300人以上】の労働者を使用する事業場が対象となる。","exp":"法17条1項、令8条","page":51},{"law":"安全衛生管理体制","cat":"衛生委員会の設置","text":"事業者は、政令で定める規模の事業場ごとに、衛生委員会を設けなければならず、政令で定める規模は、業種を問わず、常時【50人以上|100人以上|10人以上|30人以上】の労働者を使用する事業場であり、設置について所轄労働基準監督署長に報告する義務は【ない|ある|新設時のみある|年1回ある】。","exp":"法18条1項、令9条","page":53},{"law":"安全衛生管理体制","cat":"衛生委員会の構成員","text":"衛生委員会の委員には、総括安全衛生管理者等のうちから事業者が指名した者、衛生管理者のうちから事業者が指名した者、【産業医|主治医|保健師|労働衛生コンサルタント】のうちから事業者が指名した者、当該事業場の労働者で衛生に関し経験を有するもののうちから事業者が指名した者が含まれる。","exp":"法18条2項","page":55},{"law":"安全衛生管理体制","cat":"統括安全衛生責任者の選任","text":"特定元方事業者は、その労働者及び関係請負人に係る作業従事者の数の合計が常時【50人以上|100人以上|30人以上|20人以上】(ずい道等の建設、一定の橋梁の建設、圧気工法による作業の仕事にあっては【30人以上|50人以上|20人以上|100人以上】)であるときは、統括安全衛生責任者を選任しなければならない。","exp":"法15条1項、令7条","page":60},{"law":"安全衛生管理体制","cat":"元方安全衛生管理者の選任","text":"統括安全衛生責任者を選任した事業者であって、【建設業|造船業|製造業|土石採取業】に属する事業を行うものは、元方安全衛生管理者を選任しなければならず、その事業場に【専属|専任|常勤|専従】の者を選任しなければならない。","exp":"法15条の2第1項、則18条の3","page":62},{"law":"安全衛生管理体制","cat":"店社安全衛生管理者の選任","text":"建設業の元方事業者は、ずい道等の建設等の仕事であって作業従事者の数の合計が常時【20人以上30人未満|30人以上50人未満|10人以上30人未満|20人以上50人未満】であるもの、又は鉄骨造等の建築物の建設の仕事で常時【20人以上50人未満|20人以上30人未満|30人以上50人未満|50人以上100人未満】であるものを行う場合には、店社安全衛生管理者を選任しなければならない。","exp":"法15条の3第1項、則18条の6第1項","page":64},{"law":"労働者の危険・健康障害の防止","cat":"墜落防止措置","text":"事業者は、高さが【2メートル以上|3メートル以上|1.5メートル以上|5メートル以上】の箇所(作業床の端、開口部等を除く)で作業を行う場合において墜落により労働者に危険を及ぼすおそれのあるときは、足場を組み立てる等の方法により作業床を設けなければならない。","exp":"則518条1項","page":71},{"law":"労働者の危険・健康障害の防止","cat":"健康障害防止措置","text":"事業者は、原材料、ガス、蒸気、粉じん、酸素欠乏空気、病原体等による健康障害、放射線、高温、低温、超音波、【騒音|湿度|気流|薬傷】、振動、異常気圧等による健康障害を防止するため必要な措置を講じなければならない。","exp":"法22条","page":71},{"law":"労働者の危険・健康障害の防止","cat":"危険時の作業中止","text":"事業者は、労働災害発生の【急迫した危険|重大な危険|切迫した危険|明白な危険】があるときは、直ちに作業を中止し、労働者を作業場から退避させる等必要な措置を講じなければならない。","exp":"法25条","page":73},{"law":"労働者の危険・健康障害の防止","cat":"事業者の行うべき調査等","text":"事業者は、建設物、設備、原材料、ガス、蒸気、粉じん等による、又は作業行動その他業務に起因する危険性又は有害性等を調査し、その結果に基づいて必要な措置を講ずるように【努めなければならない|措置を講じなければならない|調査を義務づけられる|許可を受けなければならない】。","exp":"法28条の2第1項。リスクアセスメント。努力義務","page":74},{"law":"労働者の危険・健康障害の防止","cat":"特定元方事業者の講ずべき措置","text":"特定元方事業者は、労働災害を防止するため、協議組織の設置及び運営を行うこと、作業間の連絡及び調整を行うこと、作業場所を巡視(【毎作業日|毎週1回|毎月1回|随時】に少なくとも1回)すること等の必要な措置を講じなければならない。","exp":"法30条1項、則637条1項","page":76},{"law":"機械等・危険物・有害物の規制","cat":"特定機械等の種類","text":"特定機械等には、ボイラー、第1種圧力容器、つり上げ荷重が【3トン以上|2トン以上|1トン以上|5トン以上】のクレーン、つり上げ荷重が3トン以上の移動式クレーン、つり上げ荷重が【2トン以上|3トン以上|1トン以上|5トン以上】のデリック、積載荷重が【1トン以上|2トン以上|0.25トン以上|3トン以上】のエレベーター、ガイドレールの高さが18メートル以上の建設用リフト、ゴンドラがある。","exp":"法37条1項、令12条","page":84},{"law":"機械等・危険物・有害物の規制","cat":"製造許可","text":"特定機械等を製造しようとする者は、あらかじめ【都道府県労働局長|厚生労働大臣|労働基準監督署長|登録製造時等検査機関】の許可を受けなければならず、都道府県労働局長は申請に係る特定機械等の構造等が【厚生労働大臣|都道府県労働局長|内閣総理大臣|日本産業規格】の定める基準に適合していると認めるときでなければ許可をしてはならない。","exp":"法37条1項・2項","page":84},{"law":"機械等・危険物・有害物の規制","cat":"譲渡等の制限","text":"特定機械等以外の機械等で、別表第2に掲げるもの等のうち政令で定めるものは、厚生労働大臣が定める【規格|基準|仕様|構造規格】又は安全装置を具備しなければ、譲渡し、貸与し、又は設置してはならない。","exp":"法42条","page":90},{"law":"機械等・危険物・有害物の規制","cat":"定期自主検査","text":"事業者は、ボイラーその他の機械等で政令で定めるものについて、定期に自主検査を行い、及びその結果を記録しておかなければならず、当該記録は【3年間|1年間|5年間|7年間】保存しなければならない。","exp":"法45条1項、則135条の2","page":94},{"law":"機械等・危険物・有害物の規制","cat":"製造等の禁止","text":"労働者に【重度の健康障害|重度の障害|重篤な健康障害|急性の健康障害】を生ずる物で政令で定めるものは、製造し、輸入し、譲渡し、提供し、又は使用してはならず、その対象には黄りんマッチ、ベンジジン、【石綿|鉛|有機溶剤|一酸化炭素】等がある。","exp":"法55条、令16条1項","page":96},{"law":"機械等・危険物・有害物の規制","cat":"表示事項","text":"爆発性の物等の政令で定めるものを容器に入れ、又は包装して譲渡し、又は提供する者は、その容器又は包装に、名称、【人体に及ぼす作用|成分及び含有量|物理的化学的性質|応急措置】、貯蔵又は取扱い上の注意、標章で厚生労働大臣が定めるもの等を表示しなければならない。","exp":"法57条1項","page":98},{"law":"機械等・危険物・有害物の規制","cat":"文書の交付等","text":"通知対象物を譲渡し、又は提供する者は、文書の交付その他の方法により、名称、【成分及びその含有量|純度|製造方法|使用方法】、物理的及び化学的性質、人体に及ぼす作用等の所定の事項を、譲渡し、又は提供する相手方に通知しなければならない。","exp":"法57条の2第1項","page":100},{"law":"機械等・危険物・有害物の規制","cat":"新規化学物質の有害性調査","text":"新規化学物質を製造し、又は輸入しようとする事業者は、あらかじめ、厚生労働大臣の定める基準に従って有害性の調査を行い、その名称、有害性の調査の結果等を【厚生労働大臣|都道府県労働局長|労働基準監督署長|事業者団体】に届け出なければならない。","exp":"法57条の4","page":106},{"law":"就業制限・安全衛生教育","cat":"雇入時等の教育","text":"事業者は、労働者を雇い入れたときは、当該労働者に対し、遅滞なく、その従事する業務に関する安全又は衛生のため必要な事項について教育を行わなければならず、労働者の【作業内容を変更|作業場所を変更|職務を変更|勤務地を変更】したときも、同様に教育を行わなければならない。","exp":"法59条1項・2項","page":110},{"law":"就業制限・安全衛生教育","cat":"特別教育","text":"事業者は、危険又は有害な業務で、厚生労働省令で定めるものに労働者をつかせるときは、当該業務に関する安全又は衛生のための特別の教育を行わなければならず、その記録を作成して【3年間|1年間|5年間|永久に】保存しなければならない。","exp":"法59条3項、則38条","page":112},{"law":"就業制限・安全衛生教育","cat":"職長等の教育","text":"事業者は、政令で定める業種(建設業、製造業、電気業、ガス業、自動車整備業、機械修理業)に属する事業場においては、新たに職務につくこととなった【職長|作業主任者|安全管理者|班長】その他の作業中の労働者を直接指導又は監督する者に対し、安全又は衛生のための教育を行わなければならない。","exp":"法60条、令19条","page":114},{"law":"就業制限・安全衛生教育","cat":"就業制限","text":"事業者は、クレーンの運転その他の業務で政令で定めるものについては、都道府県労働局長の当該業務に係る【免許|技能講習|特別教育|登録】を受けた者、都道府県労働局長の登録を受けた者が行う当該業務に係る技能講習を修了した者等でなければ、当該業務に就かせてはならない。","exp":"法61条1項","page":116},{"law":"就業制限・安全衛生教育","cat":"免許証等の携帯","text":"就業制限業務に就くことができる者は、当該業務に従事するときは、これに係る免許証その他その資格を証する書面を【携帯|保管|備付け|事業場に保管】していなければならない。","exp":"法61条3項","page":116},{"law":"就業制限・安全衛生教育","cat":"中高年齢者等への配慮","text":"事業者は、中高年齢者その他労働災害の防止上その就業に当たって特に配慮を必要とする者については、これらの者の【心身の条件|身体の状況|健康状態|体力】に応じて適正な配置を行うように努めなければならない。","exp":"法62条。努力義務","page":118},{"law":"健康診断・健康管理","cat":"作業環境測定","text":"事業者は、有害な業務を行う屋内作業場その他の作業場で、政令で定めるものについて、必要な作業環境測定を行い、その結果を記録しておかなければならず、測定は厚生労働大臣の定める【作業環境測定基準|作業環境評価基準|測定指針|管理濃度基準】に従って行う。","exp":"法65条1項","page":124},{"law":"健康診断・健康管理","cat":"一般健康診断の実施","text":"事業者は、労働者に対し、厚生労働省令で定めるところにより、医師による健康診断(心理的な負担の程度を把握するための検査を除く)を行わなければならず、事業場の【業種、規模|規模|業種|労働者数】を問わず実施義務がある。","exp":"法66条1項","page":128},{"law":"健康診断・健康管理","cat":"雇入時の健康診断","text":"事業者は、常時使用する労働者を雇い入れるときは、当該労働者に対し、医師による健康診断を行わなければならないが、医師による健康診断を受けた後【3箇月|6箇月|1箇月|1年】を経過しない者が結果を証明する書面を提出したときは、相当する項目を省略できる。","exp":"法66条1項、則43条","page":128},{"law":"健康診断・健康管理","cat":"定期健康診断","text":"事業者は、常時使用する労働者(特定業務従事者を除く)に対し、【1年以内ごとに1回|6箇月以内ごとに1回|2年以内ごとに1回|1年ごとに1回】、定期に、医師による健康診断を行わなければならない。","exp":"法66条1項、則44条1項","page":129},{"law":"健康診断・健康管理","cat":"特定業務従事者の健康診断","text":"事業者は、特定業務に常時従事する労働者に対しては、当該業務への配置替えの際及び【6箇月以内ごとに1回|1年以内ごとに1回|3箇月以内ごとに1回|6箇月ごとに1回】、定期に、医師による健康診断を行わなければならない。","exp":"法66条1項、則45条1項","page":129},{"law":"健康診断・健康管理","cat":"特殊健康診断","text":"事業者は、有害な業務で政令で定めるものに従事する労働者に対し、雇入れの際、当該業務への配置替えの際及びその後原則【6箇月以内|1年以内|3箇月以内|6箇月】ごとに1回、定期に、医師による特別の項目についての健康診断を行わなければならない。","exp":"法66条2項","page":132},{"law":"健康診断・健康管理","cat":"自発的健康診断","text":"深夜業に従事する労働者であって、受診日前【6箇月|3箇月|1年|12週】間を平均して1か月当たり【4回以上|3回以上|2回以上|1回以上】深夜業に従事した者は、自ら受けた健康診断の結果を証明する書面を事業者に提出することができる。","exp":"法66条の2、則50条の2","page":134},{"law":"健康診断・健康管理","cat":"健康診断後の意見聴取","text":"事業者は、健康診断の結果(異常の所見があると診断された労働者に係るものに限る)に基づき、当該労働者の健康を保持するために必要な措置について、【医師又は歯科医師|医師|産業医|保健師】の意見を聴かなければならない。","exp":"法66条の4","page":135},{"law":"健康診断・健康管理","cat":"健康診断個人票の保存","text":"事業者は、健康診断の結果を記録しておかなければならず、健康診断の結果に基づき、健康診断個人票を作成して、これを【5年間|3年間|7年間|10年間】保存しなければならないが、石綿健康診断個人票は常時従事しないこととなった日から【40年間|30年間|20年間|10年間】保存しなければならない。","exp":"法66条の3、則51条ほか","page":136},{"law":"健康診断・健康管理","cat":"長時間労働者に対する面接指導","text":"面接指導の対象となる労働者は、休憩時間を除き1週間当たり40時間を超えて労働させた場合におけるその超えた時間が1か月当たり【80時間|100時間|45時間|60時間】を超え、かつ、疲労の蓄積が認められる者であり、面接指導は要件に該当する労働者の【申出|同意|請求|希望】により行う。","exp":"法66条の8、則52条の2・52条の3","page":139},{"law":"健康診断・健康管理","cat":"研究開発業務従事者の面接指導","text":"研究開発業務従事者に対する面接指導は、休憩時間を除き1週間当たり40時間を超えて労働させた場合のその超えた時間が1か月当たり【100時間|80時間|45時間|60時間】を超える労働者に対し、労働者の【申出なしに|申出により|同意を得て|請求により】行わなければならない。","exp":"法66条の8の2、則52条の7の2","page":142},{"law":"健康診断・健康管理","cat":"高プロ対象労働者の面接指導","text":"事業者は、高度プロフェッショナル制度により労働する労働者であって、その【健康管理時間|労働時間|在社時間|拘束時間】が1週間当たり40時間を超えた場合のその超えた時間について1か月当たり【100時間|80時間|40時間|60時間】を超えるものに対し、医師による面接指導を行わなければならない。","exp":"法66条の8の4、則52条の7の4","page":144},{"law":"健康診断・健康管理","cat":"ストレスチェックの実施","text":"事業者は、労働者に対し、厚生労働省令で定めるところにより、医師、【保健師|看護師|歯科医師|衛生管理者】その他の厚生労働省令で定める者による心理的な負担の程度を把握するための検査を行わなければならない。","exp":"法66条の10第1項","page":147},{"law":"健康診断・健康管理","cat":"ストレスチェックの実施頻度","text":"事業者は、常時使用する労働者に対し、【1年以内ごとに1回|6箇月以内ごとに1回|2年以内ごとに1回|1年ごとに1回】、定期に、職場における当該労働者の心理的な負担の原因に関する項目、心理的な負担による心身の自覚症状に関する項目、他の労働者による支援に関する項目について検査を行わなければならない。","exp":"則52条の9","page":148},{"law":"健康診断・健康管理","cat":"ストレスチェックの努力義務","text":"産業医の選任が義務づけられている事業場以外の事業場(【50人未満|100人未満|30人未満|10人未満】の労働者を使用する事業場)においては、心理的な負担の程度を把握するための検査等の規定の適用について、当分の間、行うように努めなければならないとされ、労働者には検査を受ける義務は【ない|ある|申出によりある|医師の指示によりある】。","exp":"法附則4条、則52条の10","page":148},{"law":"健康診断・健康管理","cat":"ストレスチェック結果の通知","text":"事業者は、検査を受けた労働者に対し、検査を行った医師等から当該検査の結果が通知されるようにしなければならず、医師等は、あらかじめ当該労働者の【同意|承諾|了解|申出】を得ないで、当該労働者の検査の結果を事業者に提供してはならない。","exp":"法66条の10第2項、則52条の13第1項","page":148},{"law":"健康診断・健康管理","cat":"ストレスチェックに係る面接指導","text":"事業者は、検査結果の通知を受けた労働者であって心理的な負担の程度が要件に該当するものが医師による面接指導を受けることを【希望する旨を申し出た|同意した|請求した|医師に求めた】ときは、当該労働者に対し、医師による面接指導を行わなければならず、申出を理由とする不利益な取扱いをしてはならない。","exp":"法66条の10第3項","page":150},{"law":"健康診断・健康管理","cat":"ストレスチェック結果の報告","text":"常時【50人以上|100人以上|10人以上|30人以上】の労働者を使用する事業者は、1年以内ごとに1回、定期に、電子情報処理組織を使用して、検査及び面接指導の結果等について、所定の事項を所轄【労働基準監督署長|都道府県労働局長|厚生労働大臣|産業保健総合支援センター】に報告しなければならない。","exp":"則52条の21","page":152},{"law":"健康診断・健康管理","cat":"秘密の保持","text":"健康診断、面接指導及び心理的な負担の程度を把握するための検査の実施の事務に従事した者は、その実施に関して知り得た労働者の【秘密|個人情報|健康情報|私的情報】を漏らしてはならない。","exp":"法105条","page":153},{"law":"健康診断・健康管理","cat":"健康管理手帳の交付","text":"【都道府県労働局長|労働基準監督署長|厚生労働大臣|事業者】は、がんその他の重度の健康障害を生ずるおそれのある業務で政令で定めるものに従事していた者のうち、厚生労働省令で定める要件に該当する者に対し、【離職|退職|在職中|定年】の際に又は離職の後に、当該業務に係る健康管理手帳を交付する。","exp":"法67条1項","page":154},{"law":"健康診断・健康管理","cat":"病者の就業禁止","text":"事業者は、伝染性の疾病その他の疾病で、厚生労働省令で定めるものにかかった労働者については、その就業を禁止しなければならず、就業を禁止しようとするときは、あらかじめ、【産業医|主治医|労働基準監督署長|都道府県労働局長】その他専門の医師の意見をきかなければならない。","exp":"法68条、則61条","page":155},{"law":"その他","cat":"危険・有害作業に係る届出","text":"事業者は、機械等で厚生労働省令で定めるものを設置し、移転し、又はその主要構造部分を変更しようとするときは、その計画を当該工事開始日の【30日前|14日前|10日前|7日前】までに、【労働基準監督署長|都道府県労働局長|厚生労働大臣|厚生労働省】に届け出なければならない。","exp":"法88条1項、則85条","page":166},{"law":"その他","cat":"建設業等の仕事の届出","text":"事業者は、建設業又は土石採取業に属する事業の仕事で厚生労働省令で定めるものを開始しようとするときは、その計画を当該仕事開始日の【14日前|30日前|10日前|7日前】までに、労働基準監督署長に届け出なければならない。","exp":"法88条3項、則90条","page":168},{"law":"その他","cat":"労働者の申告","text":"作業従事者は、事業場に労働安全衛生法等の規定に違反する事実があるときは、その事実を都道府県労働局長、労働基準監督署長又は労働基準監督官に申告することができ、事業者は、申告をしたことを理由として、労働者に対し、【解雇|不利益な取扱い|配置転換|減給】その他不利益な取扱いをしてはならない。","exp":"法97条","page":170}],"rousai":[{"law":"総則","cat":"目的","text":"労災保険は、業務上の事由、複数事業労働者の2以上の事業の業務を要因とする事由又は通勤による労働者の負傷、疾病、障害、死亡等に対し、【迅速かつ公正な保護|迅速な救済|公正な補償|適正な保護】をするため、必要な保険給付を行い、あわせて、社会復帰の促進、当該労働者及びその遺族の援護、労働者の安全及び衛生の確保等を図り、もって労働者の【福祉の増進|生活の安定|福祉の向上|権利の保護】に寄与することを目的とする。","exp":"法1条。目的規定。迅速かつ公正な保護・福祉の増進は選択式頻出。","page":13},{"law":"総則","cat":"管掌","text":"労災保険は、【政府|都道府県|日本年金機構|労働基準監督署】が管掌する。労災保険には、雇用保険のような【被保険者|適用事業所|保険者|受給資格者】という概念はない。","exp":"法2条。政府管掌。","page":15},{"law":"総則","cat":"保険給付の種類","text":"労災保険法による保険給付は、業務災害に関する保険給付、複数業務要因災害に関する保険給付、通勤災害に関する保険給付及び【二次健康診断等給付|特別支給金|社会復帰促進等事業|特別加入給付】とされている。","exp":"法7条1項。保険給付は4種類。","page":14},{"law":"総則","cat":"複数事業労働者","text":"複数事業労働者とは、事業主が【同一人でない2以上の事業|2以上の事業|同一事業主の2以上の事業所|複数の事業場】に使用される労働者をいい、その2以上の事業の業務を要因とする負傷、疾病、障害又は死亡を複数業務要因災害という。","exp":"法7条1項。","page":14},{"law":"総則","cat":"社会復帰促進等事業","text":"社会復帰促進等事業には、社会復帰促進事業、被災労働者等援護事業及び【安全衛生確保等事業|労働福祉事業|保健福祉事業|労働条件確保事業】がある。","exp":"法29条1項。","page":14},{"law":"総則","cat":"国庫補助","text":"国庫は、【予算の範囲内|必要な範囲内|相当の範囲内|全額】において、労働者災害補償保険事業に要する費用の一部を【補助|負担|交付|支弁】することができる。","exp":"法32条。補助することができる(任意)。","page":16},{"law":"総則","cat":"費用負担","text":"労災保険の保険料は、【事業主|政府|事業主と労働者|国】が【全額|2分の1|3分の2|大部分】負担し、労働者の負担はない。","exp":"徴収法。労災保険料は全額事業主負担。","page":16},{"law":"総則","cat":"適用","text":"労災保険においては、労働者が雇用される事業を適用事業とし、原則として労働者を【1人でも|5人以上|常時10人以上|2人以上】使用する事業は強制適用事業となる。","exp":"法3条1項。","page":17},{"law":"業務災害・通勤災害","cat":"業務災害の定義","text":"業務災害とは、労働者の業務上の負傷、疾病、障害又は死亡のことをいい、業務上とは、業務と傷病等との間に一定の【因果関係|相当因果関係|関連性|条件関係】があることをいう。","exp":"法7条1項。業務上=業務起因性+業務遂行性。","page":24},{"law":"業務災害・通勤災害","cat":"業務上の判断基準","text":"業務上の事由によると認定されるためには、【業務遂行性|業務起因性|業務関連性|業務従事性】があること及び【業務起因性|業務遂行性|業務関連性|業務必要性】があることの2つの条件を満たす必要がある。","exp":"業務上認定の2要件。","page":24},{"law":"業務災害・通勤災害","cat":"業務遂行性","text":"業務遂行性とは、労働者が労働契約に基づいて事業主の【支配下|管理下|指揮命令下|監督下】にある状態をいう。","exp":"業務遂行性の定義。","page":25},{"law":"業務災害・通勤災害","cat":"業務起因性","text":"業務起因性とは、労働者が労働契約に基づき事業主の支配下にあることに伴う【危険が現実化|危険が具体化|危険が顕在化|事故が発生】したものと経験則上認められることをいう。","exp":"業務起因性=相当因果関係。業務起因性の前提として業務遂行性が必要。","page":25},{"law":"業務災害・通勤災害","cat":"複数業務要因災害","text":"複数業務要因災害とは、複数事業労働者の2以上の事業の業務を要因とする負傷、疾病、障害又は死亡であって、それぞれの事業における業務上の負荷のみでは因果関係が認められないが、【全事業の業務上の負荷|主たる事業の業務上の負荷|2以上の事業の通勤負荷|複数事業の労働時間】を総合的に評価することにより保険給付を行うものである。","exp":"令和2年9月1日施行。","page":39},{"law":"業務災害・通勤災害","cat":"通勤災害の定義","text":"通勤災害とは、労働者の通勤による負傷、疾病、障害又は死亡のことをいい、通勤によるとは、通勤と【相当因果関係|因果関係|条件関係|直接的関連】のあること、つまり通勤に通常伴う危険が具体化したことをいう。","exp":"法7条1項。","page":41},{"law":"業務災害・通勤災害","cat":"通勤の定義","text":"通勤とは、労働者が、就業に関し、住居と就業の場所との間の往復等の移動を、【合理的な経路及び方法|通常の経路及び方法|最短の経路及び方法|指定された経路】により行うことをいい、【業務の性質|業務命令|事業主の指示|緊急の必要】を有するものを除くものとする。","exp":"法7条2項。通勤の定義は選択式頻出。","page":42},{"law":"業務災害・通勤災害","cat":"通勤の範囲","text":"通勤として認められる移動は、住居と就業の場所との間の往復、厚生労働省令で定める就業の場所から他の就業の場所への移動、及び往復に先行し又は後続する【住居間|事業場間|親族宅への|帰省先への】の移動である。","exp":"法7条2項。複数就業者の事業場間移動・単身赴任者の住居間移動。","page":42},{"law":"業務災害・通勤災害","cat":"就業に関し","text":"就業に関しとは、移動行為が業務に就くため又は業務を終えたことにより行われるものであることを必要とする趣旨であり、通勤は1日1回に【限定されない|限定される|2回までである|制限される】。","exp":"通達。遅刻・早退でも就業との関連性は失われない。","page":42},{"law":"業務災害・通勤災害","cat":"逸脱・中断","text":"労働者が、通勤としての移動の経路を逸脱し、又は移動を中断した場合においては、その逸脱又は中断の間【及びその後の移動|及びその間のみ|に限り|の往路のみ】は、通勤としない。","exp":"法7条3項。原則。","page":48},{"law":"業務災害・通勤災害","cat":"逸脱・中断の例外","text":"逸脱又は中断が、日常生活上必要な行為であって厚生労働省令で定めるものを【やむを得ない事由|日常的な理由|合理的な理由|正当な理由】により行うための【最小限度|必要最小限|相当な範囲|合理的な範囲】のものである場合は、当該逸脱又は中断の間を除き、通勤と認められる。","exp":"法7条3項。合理的経路に復した後は通勤。","page":48},{"law":"業務災害・通勤災害","cat":"日常生活上必要な行為","text":"逸脱・中断の例外となる日常生活上必要な行為には、【日用品の購入|嗜好品の購入|贈答品の購入|衣料品の調達】その他これに準ずる行為、職業訓練・教育訓練を受ける行為、選挙権の行使その他これに準ずる行為、病院又は診療所において診察又は治療を受けること等がある。","exp":"則8条。要介護状態の親族の介護も含む。","page":48},{"law":"給付基礎日額","cat":"原則","text":"給付基礎日額は、労働基準法12条の平均賃金に相当する額であり、原則として算定事由発生の日以前【3箇月間|6箇月間|1箇月間|12箇月間】に支払われた賃金の総額を当該3箇月間の【総日数|総暦日数|労働した日数|所定労働日数】で除して得た額である。","exp":"法8条1項。","page":52},{"law":"給付基礎日額","cat":"算定事由発生日","text":"算定事由発生日とは、業務上の事由等による負傷又は死亡の原因である【事故が発生した日|休業を開始した日|療養を開始した日|請求をした日】、又は診断によって疾病の発生が確定した日をいう。","exp":"法8条1項。","page":52},{"law":"給付基礎日額","cat":"端数処理","text":"給付基礎日額に1円未満の端数があるときは、これを【1円に切り上げる|1円に切り捨てる|四捨五入する|10円に切り上げる】。","exp":"法8条の5。","page":53},{"law":"給付基礎日額","cat":"休業給付基礎日額のスライド","text":"四半期ごとの平均給与額が、算定事由発生日の属する四半期の平均給与額の【100分の110|100分の120|100分の105|100分の100】を超え、又は【100分の90|100分の80|100分の95|100分の85】を下るに至った場合に、休業給付基礎日額にスライド制が適用される。","exp":"法8条の2第1項。","page":59},{"law":"給付基礎日額","cat":"年齢階層別限度額","text":"休業補償給付等を支給すべき事由が生じた日が当該療養を開始した日から起算して【1年6箇月|1年|2年|3年】を経過した日以後である場合に、休業給付基礎日額に年齢階層別の最低限度額・最高限度額が適用される。","exp":"法8条の2第2項。","page":61},{"law":"給付基礎日額","cat":"特別加入者の給付基礎日額","text":"特別加入者に係る給付基礎日額には、【スライド制|年齢階層別限度額|端数処理|最低保障】は適用されるが、年齢階層別の最低限度額・最高限度額は適用されない。","exp":"特別加入者の取扱い。","page":61},{"law":"療養(補償)給付","cat":"支給","text":"療養補償給付は、労働者が業務上負傷し、又は疾病にかかった場合において、【療養を必要とするとき|入院を必要とするとき|労働不能のとき|医師の指示があるとき】、支給される。","exp":"法12条の8第2項。","page":72},{"law":"療養(補償)給付","cat":"種類","text":"療養補償給付は、療養の給付(現物給付)及び療養の費用の支給(現金給付)とされ、原則として【現物給付|現金給付|療養の費用の支給|金銭給付】として行われる。","exp":"法13条。療養の費用の支給は補完的役割。","page":72},{"law":"療養(補償)給付","cat":"療養の給付の範囲","text":"療養の給付の範囲は、診察、薬剤又は治療材料の支給、処置・手術その他の治療、居宅における療養上の管理及びその療養に伴う世話その他の看護、病院又は診療所への入院、移送のうち、【政府が必要と認めたもの|医師が必要と認めたもの|療養上相当と認められるもの|労働基準監督署長が認めたもの】に限られる。","exp":"法13条2項。","page":73},{"law":"療養(補償)給付","cat":"支給期間","text":"療養補償給付は、傷病が治ゆするか又は死亡してその傷病について療養の必要がなくなるまでの間、支給される。治ゆとは、【症状が安定|完全に回復|症状が消失|治療を終了】し、疾病が固定した状態になって治療の必要がなくなった場合をいう。","exp":"法。治ゆ=症状固定。","page":74},{"law":"休業(補償)給付","cat":"支給要件","text":"休業補償給付は、労働者が業務上の負傷又は疾病による療養のため労働することができないために賃金を受けない日の【第4日目|第1日目|第3日目|第8日目】から支給される。","exp":"法14条。第4日目から支給(待期3日)。","page":79},{"law":"休業(補償)給付","cat":"待期期間","text":"休業の最初の【3日間|7日間|4日間|14日間】は、休業補償給付は支給されない。この期間を待期期間といい、当該期間については事業主に労働基準法の規定による【休業補償|休業手当|療養補償|打切補償】の責任がある。","exp":"法14条1項。待期3日は通算。","page":79},{"law":"休業(補償)給付","cat":"支給額","text":"休業補償給付の額は、休業1日につき給付基礎日額の【100分の60|100分の80|100分の100|100分の50】に相当する額である。","exp":"法14条1項。これに休業特別支給金20%が加わる。","page":80},{"law":"休業(補償)給付","cat":"部分算定日","text":"部分算定日に係る休業補償給付の額は、給付基礎日額から部分算定日に対して支払われる賃金の額を控除して得た額の【100分の60|100分の80|100分の100|100分の50】に相当する額である。","exp":"法14条1項。","page":80},{"law":"傷病(補償)年金","cat":"支給要件","text":"傷病補償年金は、業務上負傷し、又は疾病にかかった労働者が、当該療養の開始後【1年6箇月|1年|2年|3年】を経過した日において、負傷又は疾病が治っていないこと及びその障害の程度が厚生労働省令で定める【傷病等級|障害等級|要介護等級|労働能力喪失等級】に該当することのいずれにも該当するとき、その状態が継続している間支給される。","exp":"法12条の8第3項。傷病等級は第1級から第3級。","page":83},{"law":"傷病(補償)年金","cat":"支給決定","text":"傷病補償年金は、労働者の請求に基づき支給するものではなく、【所轄労働基準監督署長|所轄都道府県労働局長|厚生労働大臣|政府】の【職権|裁量|決定|認定】により支給が決定される。","exp":"則18条の2。","page":83},{"law":"傷病(補償)年金","cat":"支給額","text":"傷病補償年金の支給額は、傷病等級第1級が給付基礎日額の【313日分|277日分|245日分|300日分】、第2級が【277日分|245日分|313日分|264日分】、第3級が【245日分|277日分|213日分|313日分】である。","exp":"法別表1。","page":86},{"law":"傷病(補償)年金","cat":"労働基準法との関係","text":"療養の開始後【3年|1年6箇月|5年|2年】を経過した日において傷病補償年金を受けている場合等には、使用者は労働基準法の規定により打切補償(平均賃金の1,200日分)を支払ったものとみなされ、解雇制限が解除される。","exp":"法19条。","page":87},{"law":"障害(補償)給付","cat":"支給要件","text":"障害補償給付は、業務上の負傷又は疾病が療養により治ゆしたときに、身体に所定の障害が残った場合に、その障害の程度(障害等級)により喪失した【労働能力|稼得能力|身体機能|就労能力】に応じて支給される。","exp":"法15条。","page":88},{"law":"障害(補償)給付","cat":"種類","text":"障害補償給付は、厚生労働省令で定める障害等級に応じ、【第1級から第7級|第1級から第3級|第1級から第8級|第1級から第10級】までは障害補償年金、【第8級から第14級|第7級から第14級|第8級から第12級|第4級から第14級】までは障害補償一時金とされている。","exp":"法15条。","page":89},{"law":"障害(補償)給付","cat":"支給額","text":"障害補償年金の額は、障害等級第1級が給付基礎日額の【313日分|277日分|245日分|503日分】、障害補償一時金の額は障害等級第8級が【503日分|461日分|348日分|634日分】、第14級が【56日分|101日分|159日分|83日分】である。","exp":"法15条2項、別表。","page":89},{"law":"障害(補償)給付","cat":"併合繰上げ","text":"同一の業務災害による2以上の身体障害のそれぞれが【第13級以上|第14級以上|第12級以上|第8級以上】に該当するときは、第13級以上が2以上で1級繰上げ、第8級以上が2以上で【2級繰上げ|1級繰上げ|3級繰上げ|繰上げなし】、第5級以上が2以上で【3級繰上げ|2級繰上げ|1級繰上げ|4級繰上げ】となる。","exp":"則14条3項。","page":91},{"law":"介護(補償)給付","cat":"支給要件","text":"介護補償給付は、障害補償年金又は傷病補償年金の支給事由となる障害により常時又は随時介護を要する状態にあり、かつ現に常時又は随時介護を受けている労働者に対し、当該介護を受けている間、その【請求|申請|職権|届出】に基づいて支給される。","exp":"法12条の8。","page":102},{"law":"介護(補償)給付","cat":"支給額・単位","text":"介護補償給付は、【月|日|週|年】を単位として支給され、その月額は、常時又は随時介護を受ける場合に通常要する費用を考慮して【厚生労働大臣|都道府県労働局長|労働基準監督署長|政府】が定める額とされている。","exp":"法19条の2。","page":103},{"law":"介護(補償)給付","cat":"支給対象","text":"介護補償給付は、介護を必要とする【被災労働者|介護を行う親族|要介護者の家族|介護事業者】に対して支給するものであり、介護を行う親族等に支給するものではない。","exp":"注意点。","page":103},{"law":"遺族(補償)給付","cat":"支給要件","text":"遺族補償給付は、労働者が業務上の事由により死亡した場合に、その遺族に対して、その【請求|申請|職権|届出】に基づき支給され、遺族補償年金又は遺族補償一時金とされている。","exp":"法12条の8第2項、法16条。","page":102},{"law":"遺族(補償)給付","cat":"受給資格者の範囲","text":"遺族補償年金を受けることができる遺族は、労働者の死亡の当時、その収入によって生計を維持していた配偶者、子、父母、孫、祖父母及び【兄弟姉妹|伯叔父母|甥姪|内縁の親族】とされ、妻以外の者については所定の年齢要件又は障害要件に該当することを要する。","exp":"法16条の2。配偶者には事実婚を含む。","page":106},{"law":"遺族(補償)給付","cat":"年齢要件","text":"遺族補償年金の年齢要件は、妻は問われず、夫・父母・祖父母は【60歳以上|55歳以上|65歳以上|50歳以上】(暫定措置により【55歳以上|60歳以上|50歳以上|65歳以上】)、子・孫・兄弟姉妹は【18歳に達する日以後の最初の3月31日|18歳未満|16歳に達する日以後の最初の3月31日|20歳未満】までの間にあること等とされる。","exp":"法16条の2。","page":106},{"law":"遺族(補償)給付","cat":"受給権者","text":"遺族補償年金は、受給資格者全員が同時に支給を受けるのではなく、受給資格者の中で定められた順位の【最先順位者|最年長者|生計維持の中心者|全受給資格者】だけが支給を受けることができ、その者を受給権者という。","exp":"法16条の3。","page":107},{"law":"遺族(補償)給付","cat":"胎児","text":"労働者の死亡の当時胎児であった子が出生したときは、【将来に向かって|出生の時にさかのぼって|死亡の当時にさかのぼって|出生から1年間】、その子は、労働者の死亡の当時その収入によって生計を維持していた子とみなされる。","exp":"法16条の2第2項。","page":107},{"law":"遺族(補償)給付","cat":"欠格","text":"労働者を【故意|過失|重大な過失|故意又は過失】に死亡させた者は、遺族補償給付を受けることができる遺族としない。","exp":"法16条の9。","page":118},{"law":"特別支給金","cat":"位置づけ","text":"特別支給金は、保険給付の上乗せとして【社会復帰促進等事業|保険給付|労働福祉事業|特別加入制度】の一環として支給されるものであり、療養補償給付・介護補償給付・二次健康診断等給付には設けられていない。","exp":"特別支給金規則。","page":175},{"law":"特別支給金","cat":"休業特別支給金","text":"休業特別支給金は、労働者が業務上の事由等による負傷又は疾病に係る療養のため労働することができないために賃金を受けない日の【第4日目|第1日目|第3日目|第8日目】から、その申請に基づいて支給され、その額は1日につき休業給付基礎日額の【100分の20|100分の60|100分の40|100分の80】に相当する額である。","exp":"特別支給金規則3条。休業補償給付60%と合わせて80%。","page":176},{"law":"特別支給金","cat":"障害特別支給金","text":"障害特別支給金は、業務上の事由等による負傷又は疾病が治ったとき身体に障害がある労働者に対し、その申請に基づいて支給され、その額は障害等級第1級が【342万円|300万円|313万円|400万円】、第14級が8万円である。","exp":"特別支給金規則4条1項。","page":179},{"law":"特別支給金","cat":"遺族特別支給金","text":"遺族特別支給金は、業務上の事由等により労働者が死亡した場合に、その遺族に対し、その申請に基づいて支給され、その額は【300万円|342万円|200万円|400万円】であり、遺族が2人以上の場合は300万円をその【人数で除して|人数を乗じて|各人に満額|按分せず】得た額である。","exp":"特別支給金規則5条。","page":180},{"law":"特別支給金","cat":"算定基礎年額","text":"算定基礎年額は、原則として負傷又は発病の日以前【1年間|6箇月間|3箇月間|2年間】に当該労働者に支払われた特別給与の総額であり、特別給与とは【3箇月を超える期間|1箇月を超える期間|6箇月を超える期間|毎月】ごとに支払われる賃金をいう。","exp":"特別支給金規則6条。上限は給付基礎年額の20%又は150万円のいずれか低い額。","page":181},{"law":"特別支給金","cat":"算定基礎日額","text":"算定基礎日額とは、算定基礎年額を【365|360|366|240】で除して得た額であり、これを基礎にボーナス特別支給金が算定される。","exp":"特別支給金規則6条6項。","page":181},{"law":"特別加入","cat":"制度趣旨","text":"特別加入は、本来労災保険の保護の対象とならない【中小事業主|大企業の事業主|全ての事業主|個人事業主全般】、一人親方等、海外派遣者について、その作業の実態から一般労働者と同様に保護するにふさわしい者を労災保険の保護を受けられるようにする制度である。","exp":"特別加入制度の趣旨。","page":187},{"law":"特別加入","cat":"種類","text":"特別加入には、中小事業主等の特別加入、一人親方等の特別加入及び【海外派遣者|海外出張者|外国人労働者|派遣労働者】の特別加入の3種類がある。","exp":"法33条。","page":188},{"law":"特別加入","cat":"中小事業主等","text":"中小事業主等の特別加入の対象は、厚生労働省令で定める数以下の労働者を使用する事業の事業主であって、【労働保険事務組合|労働基準監督署|社会保険労務士|都道府県労働局】に労働保険事務の処理を委託するものである者、及び中小事業主が行う事業に従事する家族従事者等である。","exp":"法33条1号・2号。","page":189},{"law":"特別加入","cat":"給付基礎日額","text":"特別加入者の給付基礎日額は、特別加入者の希望を考慮して【厚生労働大臣|都道府県労働局長|労働基準監督署長|政府】が定める額の範囲内において【所轄都道府県労働局長|所轄労働基準監督署長|厚生労働大臣|政府】が決定する。","exp":"則。","page":200},{"law":"通則・その他","cat":"時効","text":"療養補償給付、休業補償給付、葬祭料、介護補償給付等を受ける権利は、これらを行使することができる時から【2年|3年|5年|1年】を経過したとき、障害補償給付、遺族補償給付等を受ける権利は、これらを行使することができる時から【5年|2年|3年|10年】を経過したときは、時効によって消滅する。","exp":"法42条。2年・5年は選択式頻出。","page":162},{"law":"通則・その他","cat":"支給制限・故意","text":"労働者が故意に負傷、疾病、障害もしくは死亡又はその直接の原因となった事故を生じさせたときは、政府は、保険給付を【行わない|全部又は一部を行わない|一部を行わない|減額する】。","exp":"法12条の2の2第1項。","page":154},{"law":"通則・その他","cat":"支給制限・重大な過失","text":"労働者が故意の犯罪行為もしくは重大な過失により、又は正当な理由がなくて療養に関する指示に従わないことにより負傷等を生じさせ、又は回復を妨げたときは、政府は、保険給付の【全部又は一部|一部|全部|3割】を行わないことができる。","exp":"法12条の2の2第2項。","page":154},{"law":"通則・その他","cat":"第三者行為・求償","text":"政府は、保険給付の原因である事故が第三者の行為によって生じた場合において保険給付をしたときは、その【給付の価額の限度|損害額の限度|全額|2分の1の限度】で、保険給付を受けた者が第三者に対して有する損害賠償の請求権を取得する。","exp":"法12条の4第1項。これを求償という。","page":160},{"law":"通則・その他","cat":"第三者行為・控除","text":"保険給付を受けるべき者が、当該第三者から同一の事由について損害賠償を受けたときは、政府は、その価額の限度で保険給付を【しないことができる|しない|減額する|返還を求める】。","exp":"法12条の4第2項。これを控除という。","page":160},{"law":"通則・その他","cat":"未支給の保険給付","text":"未支給の保険給付を受けるべき同順位者が2人以上あるときは、その1人がした請求は、全員のためその全額につきしたものと【みなされる|推定される|認められない|無効となる】。","exp":"法11条。","page":156},{"law":"通則・その他","cat":"年金の支給期間","text":"年金たる保険給付の支給は、支給すべき事由が生じた月の【翌月|当月|翌々月|属する月】から始め、支給を受ける権利が消滅した月で終わるものとし、毎年【偶数月|奇数月|年4回|毎月】の所定の月に支払われる。","exp":"法9条。支給停止も翌月から消滅月まで。","page":155},{"law":"通則・その他","cat":"書類の保存","text":"労災保険に係る保険関係が成立し、もしくは成立していた事業の事業主等は、労災保険に関する書類を、その【完結の日|作成の日|保険関係消滅の日|事業終了の日】から【3年間|2年間|5年間|7年間】保存しなければならない。","exp":"則51条。","page":201}],"koyou":[{"law":"総則","cat":"目的","text":"雇用保険は、労働者が失業した場合及び労働者について雇用の継続が困難となる事由が生じた場合に必要な給付を行うほか、労働者が自ら職業に関する教育訓練を受けた場合並びに労働者が子を養育するための休業及び所定労働時間を短縮することによる就業をした場合に必要な給付を行うことにより、労働者の【生活及び雇用の安定|生活の安定|雇用の安定|生活及び就業の安定】を図るとともに、求職活動を容易にする等その就職を促進し、あわせて、労働者の職業の安定に資するため、失業の予防、雇用状態の是正及び雇用機会の増大、労働者の能力の開発及び向上その他労働者の福祉の増進を図ることを目的とする。","exp":"法1条。目的条文の核心。","page":12},{"law":"総則","cat":"雇用保険事業","text":"雇用保険は、目的を達成するため、失業等給付及び育児休業等給付を行うほか、雇用安定事業及び【能力開発事業|職業能力開発事業|雇用福祉事業|教育訓練事業】(雇用保険二事業という)を行うことができる。","exp":"法3条。二事業=雇用安定事業+能力開発事業。","page":13},{"law":"総則","cat":"管掌","text":"雇用保険は、政府が管掌する。雇用保険の事務の一部は、【都道府県知事|公共職業安定所長|市町村長|都道府県労働局長】が行うこととすることができる。","exp":"法2条。","page":14},{"law":"総則","cat":"用語の定義(離職)","text":"離職とは、被保険者について、事業主との【雇用関係が終了|労働契約が終了|雇用関係が消滅|就業関係が終了】することをいう。","exp":"法4条2項。","page":16},{"law":"総則","cat":"用語の定義(失業)","text":"失業とは、被保険者が離職し、【労働の意思及び能力|就労の意思及び能力|労働の意欲及び能力|求職の意思及び能力】を有するにもかかわらず、職業に就くことができない状態にあることをいう。","exp":"法4条3項。","page":16},{"law":"総則","cat":"諮問","text":"厚生労働大臣は、雇用保険法の施行に関する重要事項について決定しようとするときは、あらかじめ、【労働政策審議会|社会保障審議会|中央労働委員会|雇用保険審査会】の意見を聴かなければならない。","exp":"法72条。","page":15},{"law":"適用・被保険者","cat":"適用事業","text":"雇用保険においては、労働者が雇用される【事業|事業所|事業場|企業】を適用事業とする。","exp":"法5条1項。","page":20},{"law":"適用・被保険者","cat":"被保険者資格の取得","text":"適用事業に雇用された者は、原則として、その適用事業に【雇用されるに至った日|雇用された日の翌日|事業に使用された日|採用日の翌日】から、被保険者資格を取得する。暫定任意適用事業の事業主がその事業について任意加入の認可を受けたときは、その事業に雇用される者は、認可があった日に被保険者資格を取得する。","exp":"行政手引20551等。","page":24},{"law":"適用・被保険者","cat":"被保険者の種類","text":"被保険者は、就労の実態に応じて4種類に分けられ、一般被保険者、高年齢被保険者、【短期雇用特例被保険者|季節労働被保険者|短時間被保険者|有期雇用被保険者】、日雇労働被保険者とされる。","exp":"行政手引20302。","page":25},{"law":"適用・被保険者","cat":"適用除外","text":"1週間の所定労働時間が【20時間未満|30時間未満|15時間未満|40時間未満】である者、及び同一の事業主の適用事業に継続して【31日以上|30日以上|1箇月以上|6箇月以上】雇用されることが見込まれない者は、原則として適用除外とされる。","exp":"法6条。","page":25},{"law":"適用・被保険者","cat":"高年齢被保険者","text":"高年齢被保険者とは、【65歳以上|60歳以上|70歳以上|55歳以上】の被保険者(短期雇用特例被保険者及び日雇労働被保険者に該当する者を除く)をいう。","exp":"法37条の2第1項。","page":33},{"law":"適用・被保険者","cat":"短期雇用特例被保険者","text":"短期雇用特例被保険者とは、被保険者であって、【季節的に雇用される|臨時に雇用される|短期間雇用される|日々雇用される】もののうち、4箇月以内の期間を定めて雇用される者及び1週間の所定労働時間が【30時間未満|20時間未満|40時間未満|25時間未満】である者のいずれにも該当しない者(日雇労働被保険者に該当する者を除く)をいう。","exp":"法38条1項。","page":35},{"law":"適用・被保険者","cat":"日雇労働被保険者","text":"日雇労働者とは、日々雇用される者又は【30日以内|
