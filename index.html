査請求による。","page":208,"detail":"〇。本問は正しい。法38条1項及びテキストp.208によれば、保険給付に関する決定に不服のある者は、労働者災害補償保険審査官に対して審査請求をし、その決定に不服のある者は、労働保険審査会に対して再審査請求をすることができる。本問は適切である。"},{"law":"不服申立て・その他","cat":"審査請求みなし棄却","q":"審査請求をしている者は、審査請求をした日から3か月を経過しても決定がないときは、審査請求が棄却されたものとみなすことができる。","a":true,"exp":"〇。法38条2項。審査請求をした日から3か月を経過しても決定がないときは、審査官が審査請求を棄却したものとみなすことができる。","page":208,"detail":"〇。本問は正しい。法38条2項及びテキストp.208によれば、審査請求をしている者は、審査請求をした日から3か月を経過しても審査請求についての決定がないときは、労働者災害補償保険審査官が審査請求を棄却したものとみなすことができる。本問は適切である。"},{"law":"不服申立て・その他","cat":"審査請求期間","q":"審査請求は、原処分があったことを知った日の翌日から起算して3か月を経過したときは、することができない。","a":true,"exp":"〇。労働保険審査官及び労働保険審査会法8条。審査請求は、原処分があったことを知った日の翌日から起算して3か月を経過したときはできない。","page":209,"detail":"〇。本問は正しい。労働保険審査官及び労働保険審査会法8条及びテキストp.209によれば、審査請求は、審査請求人が原処分(保険給付に関する決定)があったことを知った日の翌日から起算して3か月を経過したときは、することができない。本問は適切である。"},{"law":"不服申立て・その他","cat":"再審査請求期間","q":"再審査請求は、審査官の決定書の謄本が送付された日の翌日から起算して3か月を経過したときは、することができない。","a":false,"exp":"×。法38条等。再審査請求は、審査官の決定書の謄本が送付された日の翌日から起算して「2か月」を経過したときはできない。3か月ではない。","page":209,"detail":"×。本問は誤り。法38条等及びテキストp.209によれば、再審査請求は、審査請求についての労働者災害補償保険審査官の決定書の謄本が送付された日の翌日から起算して「2か月」を経過したときは、することができない。3か月とする本問は期間を誤っている点で適切でない。"},{"law":"不服申立て・その他","cat":"審査請求前置","q":"保険給付に関する決定の処分の取消しの訴えは、当該処分についての審査請求に対する労働者災害補償保険審査官の決定を経た後でなければ、提起することができない。","a":true,"exp":"〇。法40条。保険給付に関する決定の取消しの訴えは、審査官の決定を経た後でなければ提起できない(審査請求前置)。","page":210,"detail":"〇。本問は正しい。法40条及びテキストp.210によれば、保険給付に関する決定の処分の取消しの訴えは、当該処分についての審査請求に対する労働者災害補償保険審査官の決定を経た後でなければ、提起することができない(審査請求前置)。本問は適切である。"},{"law":"不服申立て・その他","cat":"時効","q":"療養補償給付、休業補償給付、葬祭料、介護補償給付を受ける権利は、これらを行使することができる時から2年を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法42条1項。療養・休業・葬祭・介護等の給付を受ける権利は2年、障害・遺族の給付を受ける権利は5年で時効により消滅する。","page":211,"detail":"〇。本問は正しい。法42条1項及びテキストp.211によれば、療養補償給付、休業補償給付、葬祭料、介護補償給付及び二次健康診断等給付を受ける権利は、行使することができる時から2年を経過したときに、障害補償給付及び遺族補償給付を受ける権利は5年を経過したときに、時効によって消滅する。本問は2年の対象を正しく述べている。"},{"law":"不服申立て・その他","cat":"時効","q":"障害補償給付及び遺族補償給付を受ける権利は、これらを行使することができる時から2年を経過したときは、時効によって消滅する。","a":false,"exp":"×。法42条1項。障害補償給付・遺族補償給付を受ける権利は、行使できる時から「5年」を経過したときに時効により消滅する。2年ではない。","page":211,"detail":"×。本問は誤り。法42条1項及びテキストp.211によれば、障害補償給付・遺族補償給付を受ける権利は、行使することができる時から「5年」を経過したときに時効により消滅する。2年で消滅するのは療養補償給付・休業補償給付・葬祭料・介護補償給付・二次健康診断等給付である。2年とする本問は適切でない。"},{"law":"不服申立て・その他","cat":"時効","q":"傷病補償年金は職権により支給が決定されるので、基本権については時効の問題は生じない。","a":true,"exp":"〇。昭41.1.31基発73号等。傷病補償年金は職権により支給が決定されるため、基本権について時効の問題は生じない。支分権は会計法による5年の時効を受ける。","page":212,"detail":"〇。本問は正しい。昭41.1.31基発73号等及びテキストp.212によれば、傷病補償年金は職権により支給が決定されるので、基本権(支給決定を請求する権利)については時効の問題は生じない。ただし支給決定後の支分権については会計法による5年の時効の適用を受ける。本問は適切である。"},{"law":"不服申立て・その他","cat":"印紙税","q":"労災保険に関する書類には、印紙税は課されない。","a":true,"exp":"〇。法44条。労災保険に関する書類には、印紙税は課されない。","page":213,"detail":"〇。本問は正しい。法44条及びテキストp.213によれば、労災保険に関する書類には、印紙税は課されない。本問は適切である。"},{"law":"不服申立て・その他","cat":"一時差止め","q":"政府は、保険給付を受ける権利を有する者が正当な理由がなくて所定の届出をしない等のときは、保険給付の支払を一時差し止めることができる。","a":true,"exp":"〇。法47条の3。受給権者が正当な理由なく届出をしない、報告・出頭命令や受診命令に従わない等のときは、保険給付の支払を一時差し止めることができる。","page":214,"detail":"〇。本問は正しい。法47条の3及びテキストp.214によれば、政府は、保険給付を受ける権利を有する者が、正当な理由がなくて所定の届出をせず、もしくは書類その他の物件を提出しないとき、又は報告・出頭等の命令や受診命令に従わないときは、保険給付の支払を一時差し止めることができる。本問は適切である。"},{"law":"不服申立て・その他","cat":"書類保存","q":"労災保険に係る保険関係が成立していた事業の事業主は、労災保険に関する書類を、その完結の日から5年間保存しなければならない。","a":false,"exp":"×。則51条。事業主等は、労災保険に関する書類(徴収法等による書類を除く)を、その完結の日から「3年間」保存しなければならない。5年間ではない。","page":217,"detail":"×。本問は誤り。則51条及びテキストp.217によれば、労災保険に係る保険関係が成立し又は成立していた事業の事業主等は、労災保険に関する書類(徴収法等による書類を除く)を、その完結の日から「3年間」保存しなければならない。5年間とする本問は保存期間を誤っている点で適切でない。"},{"law":"不服申立て・その他","cat":"罰則","q":"事業主が報告、出頭等の命令に違反して虚偽の報告をした場合等は、6か月以下の拘禁刑又は30万円以下の罰金に処せられる。","a":true,"exp":"〇。法51条。事業主等が報告・出頭命令に違反して虚偽の報告をした等のときは、6か月以下の拘禁刑又は30万円以下の罰金に処せられる。","page":218,"detail":"〇。本問は正しい。法51条及びテキストp.218によれば、事業主等が報告・出頭等の命令に違反して報告をせず、もしくは虚偽の報告をし、又は文書の提出をせず、もしくは虚偽の記載をした文書を提出した場合等は、6か月以下の拘禁刑又は30万円以下の罰金に処せられる。本問は適切である。"}],"koyou":[{"law":"総則","cat":"目的","q":"雇用保険は、政府が管掌する。","a":true,"exp":"〇。法2条。雇用保険は政府が管掌し、その事務の一部は都道府県知事が行うこととすることができる。","page":14,"detail":"〇。法2条。本文では雇用保険は政府が管掌すると明記され、その事務の一部は都道府県知事が行うこととすることができるとされています。能力開発事業のうち職業能力開発促進法の計画に基づく職業訓練を行う事業主等への助成事業の実施に関する事務は都道府県知事が行うものとされ(令1条1項)、政府管掌が原則であることに変わりはありません。"},{"law":"総則","cat":"目的","q":"雇用保険は、目的を達成するため、失業等給付及び育児休業等給付を行うほか、<b>雇用安定事業及び能力開発事業</b>(雇用保険二事業)を行うことができる。","a":true,"exp":"〇。法3条。雇用保険二事業とは雇用安定事業及び能力開発事業をいう。","page":13,"detail":"〇。法3条。本文では雇用保険は目的を達成するため、失業等給付及び育児休業等給付を行うほか、雇用安定事業及び能力開発事業を行うことができるとされ、この雇用安定事業及び能力開発事業を併せて「雇用保険二事業」といいます。よって本問は正しい記述です。"},{"law":"総則","cat":"権限の委任","q":"雇用保険法に定める厚生労働大臣の権限は、その全部を都道府県労働局長に委任しなければならない。","a":false,"exp":"×。法81条。委任できるのはその「一部」であり、また「委任することができる」のであって、全部を委任しなければならないわけではない。","page":14,"detail":"×。法81条。本文では厚生労働大臣の権限は、その「一部」を都道府県労働局長に委任することが「できる」とされ、さらに都道府県労働局長に委任された権限は公共職業安定所長に委任することができるとされています。全部を委任しなければならないわけではないので誤りです。"},{"law":"総則","cat":"諮問","q":"厚生労働大臣は、雇用保険法の施行に関する重要事項について決定しようとするときは、あらかじめ、<b>労働政策審議会</b>の意見を聴かなければならない。","a":true,"exp":"〇。法72条。重要事項決定の際は、あらかじめ労働政策審議会の意見を聴かなければならない。","page":15,"detail":"〇。法72条。本文では厚生労働大臣は雇用保険法の施行に関する重要事項について決定しようとするときは、あらかじめ労働政策審議会の意見を聴かなければならないとされています。重要事項には広域延長給付の認定基準や離職理由による給付制限の認定基準等が含まれます。"},{"law":"総則","cat":"用語の定義","q":"「失業」とは、被保険者が離職し、労働の意思及び能力を有するにもかかわらず、職業に就くことができない状態にあることをいう。","a":true,"exp":"〇。法4条3項。失業とは離職し労働の意思及び能力を有するにもかかわらず職業に就くことができない状態をいう。","page":16,"detail":"〇。法4条3項。本文では「失業」とは、被保険者が離職し、労働の意思及び能力を有するにもかかわらず、職業に就くことができない状態にあることをいうとされています。労働の意思とは積極的に求職活動を行っている場合をいうとの通達もあり、本問は正しい記述です。"},{"law":"総則","cat":"用語の定義","q":"「離職」とは、被保険者について、事業主との雇用関係が終了することをいう。","a":true,"exp":"〇。法4条2項。離職とは被保険者について事業主との雇用関係が終了することをいう。","page":16,"detail":"〇。法4条2項。本文では「離職」とは、被保険者について、事業主との雇用関係が終了することをいうとされています。失業の前提となる概念として定義されており、本問は正しい記述です。"},{"law":"総則","cat":"賃金","q":"雇用保険法における賃金は、健康保険法等と同様に標準報酬制をとっている。","a":false,"exp":"×。行政手引50401。雇用保険法は標準報酬制と異なり、賃金変動の実際に即した総賃金制(実賃金制)をとっている。","page":17,"detail":"×。行政手引50401。本文では雇用保険法は健康保険法・厚生年金保険法における標準報酬制と「異なり」、賃金変動の実際に即し正確に労働状態を反映させるため、総賃金制(あるいは実賃金制)をとっているとされています。標準報酬制をとるという記述は誤りです。"},{"law":"適用・被保険者","cat":"適用事業","q":"雇用保険においては、労働者が雇用される事業を<b>適用事業</b>とする。","a":true,"exp":"〇。法5条1項。労働者が雇用される事業を適用事業とする。","page":20,"detail":"〇。法5条1項。本文では雇用保険においては労働者が雇用される事業を適用事業とするとされています。当然に適用される強制適用事業と、厚生労働大臣の認可により適用を受ける暫定任意適用事業があり、本問の記述は正しいものです。"},{"law":"適用・被保険者","cat":"暫定任意適用事業","q":"個人経営であって常時5人未満の労働者を雇用する農林・畜産・養蚕・水産の事業は、当分の間、暫定任意適用事業とされる。","a":true,"exp":"〇。法附則2条1項。個人経営、農林等の事業、常時5人以上以外の事業のすべてを満たすものが暫定任意適用事業となる。","page":21,"detail":"〇。法附則2条1項。本文では(1)個人経営の事業、(2)農林・畜産・養蚕・水産の事業(一定の船員雇用事業を除く)、(3)常時5人以上の労働者を雇用する事業以外の事業、のすべてを満たす事業が当分の間、暫定任意適用事業とされるとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"暫定任意適用事業","q":"暫定任意適用事業の事業主が任意加入の申請をする場合、その事業に使用される労働者の<b>3分の1以上</b>の同意を得る必要がある。","a":false,"exp":"×。法附則2条。同意が必要なのは労働者の「2分の1以上」である。","page":21,"detail":"×。法附則2条1項参照(本文p.21の参考)。本文では暫定任意適用事業は、その事業主がその事業に使用される労働者の「2分の1以上」の同意を得て任意加入の申請をし、厚生労働大臣の認可があった場合に適用を受けるとされています。3分の1以上は誤りです。"},{"law":"適用・被保険者","cat":"適用事業所届出","q":"事業主は、事業所を設置したときは、その設置の日の翌日から起算して<b>10日以内</b>に、事業所の所在地を管轄する公共職業安定所の長に届け出なければならない。","a":true,"exp":"〇。則141条1項。設置・廃止の日の翌日から起算して10日以内に届け出る。","page":22,"detail":"〇。則141条1項。本文では事業主は事業所を設置したとき又は廃止したときは、所定の届書に書類を添えてその設置又は廃止の日の翌日から起算して10日以内に、事業所の所在地を管轄する公共職業安定所の長に提出しなければならないとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"書類の保管","q":"事業主は、雇用保険に関する書類を原則としてその完結の日から2年間、被保険者に関する書類は4年間保管しなければならない。","a":true,"exp":"〇。則143条。原則2年間、被保険者に関する書類は例外として4年間保管する。","page":23,"detail":"〇。則143条。本文の保管期間の表では、原則として雇用保険に関する書類(二事業・徴収法等の書類を除く)はその完結の日から2年間、例外として被保険者に関する書類は4年間保管しなければならないとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"被保険者","q":"「被保険者」とは、適用事業に雇用される労働者であって、適用除外事由に該当する者以外のものをいう。","a":true,"exp":"〇。法4条1項。適用事業に雇用される労働者で適用除外事由に該当しないものが被保険者である。","page":24,"detail":"〇。法4条1項。本文では「被保険者」とは、適用事業に雇用される労働者であって、適用除外事由に該当する者以外のものをいうとされています。要件に該当する者は意思のいかんにかかわらず法律上当然に被保険者となります。よって正しい記述です。"},{"law":"適用・被保険者","cat":"被保険者の種類","q":"被保険者は、就労の実態に応じて、一般被保険者・高年齢被保険者・短期雇用特例被保険者・日雇労働被保険者の<b>4種類</b>に分けられる。","a":true,"exp":"〇。行政手引20302。被保険者は4種類に分けられている。","page":25,"detail":"〇。行政手引20302。本文では被保険者は就労の実態に応じて4種類に分けられているとされ、一般被保険者・高年齢被保険者・短期雇用特例被保険者・日雇労働被保険者が掲げられています。よって本問は正しい記述です。"},{"law":"適用・被保険者","cat":"適用除外","q":"1週間の所定労働時間が<b>30時間未満</b>である者は、原則として被保険者とされない。","a":false,"exp":"×。法6条。適用除外となるのは1週間の所定労働時間が「20時間未満」である者である。","page":25,"detail":"×。法6条。本文では適用除外事由として「1週間の所定労働時間が20時間未満である者」が掲げられています。よって適用除外となる基準は20時間未満であり、30時間未満とする本問は誤りです。なお高年齢被保険者の特例による申出者等は被保険者となります。"},{"law":"適用・被保険者","cat":"適用除外","q":"同一の事業主の適用事業に継続して<b>31日以上</b>雇用されることが見込まれない者は、原則として被保険者とされない。","a":true,"exp":"〇。法6条。継続して31日以上雇用される見込みがない者は適用除外となる。ただし前2月各月18日以上雇用された者等は被保険者となる。","page":26,"detail":"〇。法6条。本文では適用除外事由として「同一の事業主の適用事業に継続して31日以上雇用されることが見込まれない者」が掲げられています。ただし前2月の各月において18日以上同一事業主に雇用された者や日雇労働被保険者に該当する者は被保険者となります。よって正しい記述です。"},{"law":"適用・被保険者","cat":"具体例","q":"株式会社の代表取締役は、原則として被保険者となる。","a":false,"exp":"×。行政手引。代表取締役は被保険者とならない。取締役であっても部長等従業員身分を有し労働者性が強い者に限り被保険者となり得る。","page":29,"detail":"×。行政手引(本文p.29)。本文では株式会社の取締役は原則として被保険者とならず、代表取締役は被保険者とならないとされています。取締役であっても同時に部長・支店長等の従業員身分を有し労働者的性格が強く雇用関係が認められる者に限り被保険者となります。よって原則被保険者となるとする本問は誤りです。"},{"law":"適用・被保険者","cat":"具体例","q":"家事使用人は、原則として被保険者とならない。","a":true,"exp":"〇。行政手引。家事使用人は被保険者とならない。ただし主として家事以外の労働に従事することを本務とする者は被保険者となる。","page":29,"detail":"〇。行政手引(本文p.29)。本文では家事使用人は被保険者とならないとされています。ただし適用事業に雇用され、主として家事以外の労働に従事することを本務とする者は、家事に使用されることがあっても被保険者となるとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"具体例","q":"ワーキング・ホリデー制度による入国者は、被保険者とならない。","a":true,"exp":"〇。行政手引。主として休暇を過ごす目的の入国で、付随的活動として就労が認められるものであることから被保険者とならない。","page":31,"detail":"〇。行政手引(本文p.31)。本文ではワーキング・ホリデー制度による入国者は、主として休暇を過ごすことを目的として入国し、その休暇の付随的な活動として旅行資金を補うための就労が認められるものであることから、被保険者とならないとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"高年齢被保険者","q":"高年齢被保険者とは、<b>60歳以上</b>の被保険者(短期雇用特例被保険者及び日雇労働被保険者に該当する者を除く)をいう。","a":false,"exp":"×。法37条の2第1項。高年齢被保険者とは「65歳以上」の被保険者(短期雇用特例・日雇に該当する者を除く)をいう。","page":32,"detail":"×。法37条の2第1項。本文では高年齢被保険者とは「65歳以上」の被保険者(短期雇用特例被保険者及び日雇労働被保険者に該当する者を除く)をいうとされています。60歳以上とする本問は誤りです。"},{"law":"適用・被保険者","cat":"高年齢被保険者の特例","q":"特例高年齢被保険者の申出ができるのは、2以上の事業主の適用事業に雇用される<b>65歳以上</b>の者であって、一の事業主の適用事業における1週間の所定労働時間が20時間未満であること等の要件に該当する者である。","a":true,"exp":"〇。法37条の5第1項。2以上の事業主に雇用される65歳以上の者で所定の要件を満たす者が申出により高年齢被保険者となることができる。","page":33,"detail":"〇。法37条の5第1項。本文では(1)2以上の事業主の適用事業に雇用される65歳以上の者であること、(2)一の事業主の適用事業における1週間の所定労働時間が20時間未満であること、(3)2の事業主の適用事業における1週間の所定労働時間の合計が20時間以上であること、のいずれにも該当する者は申し出て高年齢被保険者(特例高年齢被保険者)となることができるとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"短期雇用特例被保険者","q":"短期雇用特例被保険者とは、季節的に雇用される者のうち、4か月以内の期間を定めて雇用される者及び1週間の所定労働時間が20時間以上30時間未満である者の<b>いずれにも該当しない者</b>をいう。","a":true,"exp":"〇。法38条1項。季節的雇用者のうち、4か月以内期間雇用者及び20時間以上30時間未満の者のいずれにも該当しない者をいう。","page":35,"detail":"〇。法38条1項。本文では短期雇用特例被保険者とは、被保険者であって季節的に雇用されるもののうち、(1)4か月以内の期間を定めて雇用される者、(2)1週間の所定労働時間が20時間以上であって厚生労働大臣の定める時間数(30時間)未満である者、のいずれにも該当しない者(日雇労働被保険者を除く)をいうとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"短期雇用特例被保険者","q":"短期雇用特例被保険者が同一事業主に引き続き<b>1年以上</b>雇用される場合には、一般被保険者等への被保険者資格の切替えが行われる。","a":true,"exp":"〇。行政手引20451。1年以上雇用されるに至った日が切替日となる。","page":35,"detail":"〇。行政手引20451。本文では短期雇用特例被保険者が同一事業主に引き続き1年以上雇用される場合には被保険者資格の切替えが行われ、切替日は1年以上雇用されるに至った日であるとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"日雇労働者","q":"日雇労働者とは、日々雇用される者又は<b>30日以内</b>の期間を定めて雇用される者をいう。","a":true,"exp":"〇。法42条。日々雇用される者又は30日以内の期間を定めて雇用される者をいう。","page":36,"detail":"〇。法42条。本文では日雇労働者とは、(1)日々雇用される者、(2)30日以内の期間を定めて雇用される者、のいずれかに該当する労働者をいうとされています。ただし前2月の各月において18日以上同一事業主に雇用された者等は除かれます。よって正しい記述です。"},{"law":"適用・被保険者","cat":"日雇労働被保険者","q":"日雇労働被保険者が前2月の各月において18日以上同一の事業主の適用事業に雇用された場合等において、公共職業安定所長の<b>資格継続の認可</b>を受けたときは、引き続き日雇労働被保険者となることができる。","a":true,"exp":"〇。法43条2項。資格継続の認可を受けたときは引き続き日雇労働被保険者となることができる。","page":36,"detail":"〇。法43条2項。本文では日雇労働被保険者が前2月の各月において18日以上同一の事業主の適用事業に雇用された場合又は継続して31日以上雇用された場合において、所定の公共職業安定所長の認可(資格継続の認可)を受けたときは、引き続き日雇労働被保険者となることができるとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"届出","q":"事業主は、その雇用する労働者が被保険者となったときは、資格取得届を、事実のあった日の翌日から起算して<b>10日以内</b>に提出しなければならない。","a":false,"exp":"×。則6条1項。資格取得届の提出期限は事実のあった日の属する月の「翌月10日まで」である。翌日から10日以内は資格喪失届である。","page":39,"detail":"×。則6条1項。本文では資格取得届の提出期限は「事実のあった日の属する月の翌月10日まで」とされています。「事実のあった日の翌日から起算して10日以内」は資格喪失届の期限(則7条1項)であり、本問は両者を混同した誤りです。"},{"law":"適用・被保険者","cat":"届出","q":"事業主は、その雇用する労働者が被保険者でなくなったときは、資格喪失届を、事実のあった日の翌日から起算して<b>10日以内</b>に提出しなければならない。","a":true,"exp":"〇。則7条1項。資格喪失届の提出期限は事実のあった日の翌日から起算して10日以内である。","page":43,"detail":"〇。則7条1項。本文では資格喪失届の提出期限は「事実のあった日の翌日から起算して10日以内」とされています。具体例でも離職日の翌々日から10日以内に提出することになるとされており、本問は正しい記述です。"},{"law":"適用・被保険者","cat":"確認","q":"被保険者又は被保険者であった者は、いつでも、被保険者となったこと又はでなくなったことの確認を請求することができる。","a":true,"exp":"〇。法8条。被保険者又は被保険者であった者はいつでも確認を請求することができる。","page":41,"detail":"〇。法8条。本文では被保険者又は被保険者であった者は、いつでも、確認を請求することができるとされています。確認の請求は文書又は口頭で事業主の事業所の所在地を管轄する公共職業安定所の長に対して行います。よって正しい記述です。"},{"law":"適用・被保険者","cat":"離職証明書","q":"離職の日において<b>59歳以上</b>である被保険者については、被保険者が離職票の交付を希望しない場合であっても、離職証明書を添えなければならない。","a":true,"exp":"〇。則7条3項。離職日において59歳以上の被保険者については交付希望がなくても離職証明書を添えなければならない。","page":44,"detail":"〇。則7条3項。本文では原則として離職票の交付を希望しないときは離職証明書を添えないことができるが、その例外の例外として、離職の日において59歳以上である被保険者については、被保険者が離職票の交付を希望しない場合であっても離職証明書を添えなければならないとされています。よって正しい記述です。"},{"law":"適用・被保険者","cat":"資格喪失日","q":"被保険者は、離職した日において、被保険者資格を喪失する。","a":false,"exp":"×。行政手引20601。離職による資格喪失日は「離職した日の翌日」である。","page":45,"detail":"×。行政手引20601。本文では被保険者が資格を喪失する日として「離職した日の翌日」が掲げられています。具体例でも5/20退職なら5/21が資格喪失日とされており、離職した日に喪失するとする本問は誤りです。"},{"law":"適用・被保険者","cat":"転勤届","q":"転勤前の事業所と転勤後の事業所が同じ公共職業安定所の管轄内にあるときは、転勤届の提出は必要ない。","a":false,"exp":"×。則13条。同じ公共職業安定所の管轄内にあるときであっても転勤届の提出は必要である。","page":48,"detail":"×。則13条1項。本文(p.48の注意)では、転勤前の事業所と転勤後の事業所が同じ公共職業安定所の管轄内にあるときであっても、転勤届の提出が必要であるとされています。よって提出は必要ないとする本問は誤りです。"},{"law":"通則","cat":"失業等給付","q":"失業等給付は、求職者給付、就職促進給付、教育訓練給付及び<b>雇用継続給付</b>とする。","a":true,"exp":"〇。法10条1項。失業等給付は4種類で、求職者給付・就職促進給付・教育訓練給付・雇用継続給付である。","page":56,"detail":"〇。法10条1項。本文では失業等給付は、求職者給付、就職促進給付、教育訓練給付及び雇用継続給付とするとされています。4種類で構成され、本問はこれに合致します。なお育児休業等給付は失業等給付とは別建てとされています。"},{"law":"通則","cat":"求職者給付","q":"高年齢被保険者に係る求職者給付は、<b>特例一時金</b>とされる。","a":false,"exp":"×。法10条3項。高年齢被保険者に係る求職者給付は「高年齢求職者給付金」である。特例一時金は短期雇用特例被保険者に係るものである。","page":56,"detail":"×。法10条3項。本文では高年齢被保険者に係る求職者給付は高年齢求職者給付金とし、短期雇用特例被保険者に係る求職者給付は特例一時金とするとされています。よって高年齢被保険者に係る給付を特例一時金とする本問は誤りです。特例一時金は短期雇用特例被保険者に係る給付です。"},{"law":"通則","cat":"雇用継続給付","q":"雇用継続給付は、高年齢雇用継続給付、介護休業給付金及び育児休業給付金とする。","a":false,"exp":"×。法10条6項。雇用継続給付は高年齢雇用継続給付及び介護休業給付金である。育児休業給付は雇用継続給付ではなく育児休業等給付に含まれる。","page":57,"detail":"×。法10条6項。本文では雇用継続給付は、高年齢雇用継続基本給付金及び高年齢再就職給付金(高年齢雇用継続給付)並びに介護休業給付金とするとされています。育児休業給付金は雇用継続給付ではなく育児休業等給付に含まれるため、本問は誤りです。"},{"law":"通則","cat":"未支給の失業等給付","q":"未支給の失業等給付を請求できる遺族の範囲は、死亡した者の配偶者、子、父母、孫、祖父母又は兄弟姉妹であって、死亡当時その者と<b>生計を同じくしていたもの</b>である。","a":true,"exp":"〇。法10条の3第1項。所定の遺族で死亡当時生計を同じくしていたものが請求できる。","page":59,"detail":"〇。法10条の3第1項。本文では未支給の失業等給付を請求できる遺族は、死亡した者の配偶者(事実婚を含む)、子、父母、孫、祖父母又は兄弟姉妹であって、死亡当時その者と生計を同じくしていたものとされています。よって正しい記述です。"},{"law":"通則","cat":"未支給の失業等給付","q":"未支給の失業等給付を請求しようとする者は、受給資格者等が死亡した日の翌日から起算して<b>6か月以内</b>に請求書を提出しなければならない。","a":true,"exp":"〇。則17条の2第1項。死亡日の翌日から起算して6か月以内に提出する。","page":60,"detail":"〇。則17条の2第1項。本文では未支給の失業等給付を請求しようとする者は、受給資格者等が死亡した日の翌日から起算して6か月以内に、未支給失業等給付請求書を死亡者に係る公共職業安定所の長に提出しなければならないとされています。よって正しい記述です。"},{"law":"通則","cat":"返還命令等","q":"偽りその他不正の行為により失業等給付の支給を受けた者に対し、政府はその額の<b>2倍</b>に相当する額以下の金額の納付を命ずることができる。","a":true,"exp":"〇。法10条の4第1項。不正受給した失業等給付の額の2倍に相当する額以下の金額の納付を命ずることができる。","page":61,"detail":"〇。法10条の4第1項。本文では偽りその他不正の行為により失業等給付の支給を受けた者に対し、政府は支給した失業等給付の全部又は一部の返還を命ずることができるほか、厚生労働大臣の定める基準により当該不正受給額の2倍に相当する額以下の金額の納付を命ずることができるとされています。よって正しい記述です。"},{"law":"通則","cat":"受給権の保護","q":"失業等給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができない。","a":true,"exp":"〇。法11条。失業等給付の受給権は譲渡・担保供与・差押えができない。","page":63,"detail":"〇。法11条。本文では失業等給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができないとされています。なお雇用保険二事業に係る給付金にはこの受給権の保護の規定は適用されません。よって本問は正しい記述です。"},{"law":"通則","cat":"公課の禁止","q":"租税その他の公課は、失業等給付として支給を受けた金銭を標準として課することができない。","a":true,"exp":"〇。法12条。失業等給付として支給を受けた金銭を標準として公課を課すことはできない。","page":63,"detail":"〇。法12条。本文では租税その他の公課は、失業等給付として支給を受けた金銭を標準として課することができないとされています。なお雇用保険二事業に係る給付金にはこの公課の禁止の規定は適用されません。よって本問は正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"受給資格","q":"基本手当は、原則として離職日以前2年間に被保険者期間が通算して<b>12か月以上</b>あるときに支給される。","a":true,"exp":"〇。法13条1項。原則として算定対象期間2年間に被保険者期間が通算12か月以上必要である。","page":67,"detail":"〇。法13条1項。本文では基本手当は被保険者が失業した場合において、離職日以前2年間(算定対象期間)に被保険者期間が通算して12か月以上あることに該当するとき支給されるとされています。被保険者期間は引き続いた期間である必要はなく通算でよいとされ、本問は正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"受給資格","q":"特定理由離職者又は特定受給資格者は、離職日以前1年間に被保険者期間が通算して<b>6か月以上</b>あれば受給資格を得ることができる。","a":true,"exp":"〇。法13条2項。特定理由離職者・特定受給資格者は1年間に被保険者期間6か月以上で受給資格を得る。","page":67,"detail":"〇。法13条2項。本文では特定理由離職者又は特定受給資格者に該当し原則の要件を満たさない者は、離職日以前1年間に被保険者期間が通算して6か月以上あれば受給資格を得ることができるとされています。算定対象期間と被保険者期間の表でも1年間・6か月以上とされており、本問は正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"特定受給資格者","q":"<b>定年</b>により離職した者は、特定受給資格者となる。","a":false,"exp":"×。法23条。定年により離職した者は特定受給資格者とならない。","page":68,"detail":"×。法23条(本文p.68の注意)。本文では特定受給資格者の範囲が定められる一方、注意書きで「定年により離職した者は、特定受給資格者とはなりません」と明記されています。よって定年退職者を特定受給資格者とする本問は誤りです。"},{"law":"求職者給付(基本手当)","cat":"受給要件の緩和","q":"疾病等により引き続き<b>30日以上</b>賃金の支払を受けることができなかった被保険者については、その日数を算定対象期間に加えることができるが、加算後の期間が4年を超えるときは4年間が限度となる。","a":true,"exp":"〇。法13条1項。引き続き30日以上賃金を受けられなかった日数を加算するが、加算した期間が4年を超えるときは4年間が限度となる。","page":72,"detail":"〇。法13条1項。本文では離職日以前2年間(特定理由離職者等は2年間又は1年間)に、疾病・負傷その他厚生労働省令で定める理由により引き続き30日以上賃金の支払を受けることができなかった被保険者については、その日数を算定対象期間に加えるとされ、ただし加算した期間が4年を超えるときは4年間が限度とされています。よって正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"被保険者期間","q":"被保険者期間は、被保険者であった期間のうち、賃金の支払の基礎となった日数が<b>11日以上</b>あるものを1か月として計算する。","a":true,"exp":"〇。法14条1項。喪失応当日からさかのぼった各期間のうち賃金支払基礎日数が11日以上あるものを1か月として計算する。","page":74,"detail":"〇。法14条1項。本文では被保険者期間は、被保険者であった期間のうち、喪失応当日からさかのぼった各期間で賃金の支払の基礎となった日数が11日以上あるものに限り、これを1か月として計算するとされています。よって本問は正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"被保険者期間","q":"被保険者期間が12か月又は6か月に満たない場合、区切られた期間のうち賃金支払基礎日数が11日以上又は賃金の支払の基礎となった時間数が<b>80時間以上</b>のものは1か月又は2分の1か月として計算する。","a":true,"exp":"〇。法14条3項。11日以上又は80時間以上のいずれかに該当するものを1か月又は2分の1か月として計算する。","page":74,"detail":"〇。法14条3項。本文では計算された被保険者期間が12か月又は6か月に満たない場合は、区切られた期間のうち「賃金支払基礎日数が11日以上である」又は「賃金の支払の基礎となった時間数が80時間以上である」のいずれかに該当するものを、それぞれ1か月又は2分の1か月として計算するとされています。よって正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"待期","q":"基本手当は、離職後最初に公共職業安定所に出頭し求職の申込みをした日以後において、失業している日が通算して<b>7日</b>に満たない間は支給されない。","a":true,"exp":"〇。法21条。求職の申込みをした日以後、失業している日が通算して7日に満たない間は支給されない(待期)。","page":88,"detail":"〇。法21条。本文では基本手当は、受給資格に係る離職後最初に公共職業安定所に出頭し求職の申込みをした日以後において、失業している日が通算して7日に満たない間は支給されないとされ、これを待期といいます。待期には疾病・負傷により職業に就くことができない日も含まれます。よって正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"待期","q":"待期は、一の受給期間内に2回をもって足りる。","a":false,"exp":"×。待期は一の受給期間内に「1回」をもって足りる。すでに待期を満了している者は再び要求されない。","page":88,"detail":"×。本文p.88。本文では待期は「一の受給期間内に1回」をもって足り、すでに待期を満了している者については再離職時に再び要求されないとされています。よって2回をもって足りるとする本問は誤りです。"},{"law":"求職者給付(基本手当)","cat":"失業の認定","q":"失業の認定は、求職の申込みを受けた公共職業安定所において、離職後最初に出頭した日から起算して<b>4週間に1回</b>ずつ直前の28日の各日について行う。","a":true,"exp":"〇。則22条等。原則として4週間に1回ずつ、直前の28日の各日について失業の認定を行う。","page":85,"detail":"〇。則22条等(本文p.85)。本文では失業の認定は、求職の申込みを受けた公共職業安定所において、受給資格者が離職後最初に出頭した日から起算して4週間に1回ずつ直前の28日の各日について行うとされています。よって正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"失業の認定","q":"公共職業安定所長の指示した公共職業訓練等を受ける受給資格者に係る失業の認定は、<b>1か月に1回</b>行う。","a":true,"exp":"〇。法15条3項。公共職業訓練等を受ける受給資格者については1か月に1回、直前の月の各日について行う。","page":85,"detail":"〇。法15条3項。本文では公共職業安定所長の指示した公共職業訓練等を受ける受給資格者に係る失業の認定は、1か月に1回、直前の月に属する各日について行うとされています。よって正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"失業の認定","q":"疾病又は負傷のために公共職業安定所に出頭できなかった場合、その期間が継続して<b>15日未満</b>であるときは、証明書を提出することによって失業の認定を受けることができる。","a":true,"exp":"〇。法15条4項。疾病・負傷で出頭できず継続15日未満のときは証明書による認定を受けられる。","page":86,"detail":"〇。法15条4項。本文では受給資格者が疾病又は負傷のために公共職業安定所に出頭することができなかった場合において、その期間が継続して15日未満であるときは、証明書を提出することによって失業の認定を受けることができるとされています。よって正しい記述です。"},{"law":"求職者給付(基本手当)","cat":"失業の認定","q":"代理人による失業の認定は、原則として認められる。","a":false,"exp":"×。行政手引51252。代理人による失業の認定は原則として認められない。公共職業訓練等の訓練施設入所中の者等は例外として認められる。","page":85,"detail":"×。行政手引51252(本文p.85の注意)。本文では「代理人による失業の認定は認められません」と明記されています。ただし公共職業安定所長の指示により公共職業訓練等を行う訓練施設に入所中の受給資格者については例外として代理人による認定が認められます。よって原則認められるとする本問は誤りです。"},{"law":"求職者給付(基本手当)","cat":"支給方法","q":"基本手当は、原則として受給資格者の<b>預金又は貯金への振込み</b>の方法により支給する。","a":true,"exp":"〇。則44条。基本手当は原則として預金又は貯金への振込みの方法により支給する。","page":89,"detail":"〇。則44条。本文では基本手当は原則として受給資格者の預金又は貯金への振込みの方法により支給するとされ、この方法による者を口座振込受給資格者といいます。例外として、やむを得ない理由があると認めるときは管轄公共職業安定所において支給することができます。よって正しい記述です。"},{"law":"求職者給付(賃金日額等)","cat":"賃金日額","q":"賃金日額は、被保険者期間として計算された最後の<b>6か月間</b>に支払われた賃金の総額を<b>180</b>で除して得た額とする。","a":true,"exp":"〇。法17条1項。最後の6か月間に支払われた賃金の総額を180で除して得た額が原則の賃金日額である。","page":90,"detail":"〇。法17条1項。本文では賃金日額は、算定対象期間において被保険者期間として計算された最後の6か月間に支払われた賃金の総額を180で除して得た額とするとされています。離職の日以前6か月間の賃金で算定するのではない点に注意が必要ですが、本問の記述は正しいものです。"},{"law":"求職者給付(賃金日額等)","cat":"賃金日額","q":"賃金日額の算定では、臨時に支払われる賃金及び<b>3か月を超える期間ごと</b>に支払われる賃金は除かれる。","a":true,"exp":"〇。法17条1項。臨時に支払われる賃金及び3か月を超える期間ごとに支払われる賃金は賃金日額の算定から除かれる。","page":90,"detail":"〇。法17条1項。本文では賃金日額の算定の基礎となる賃金から、臨時に支払われる賃金及び3か月を超える期間ごとに支払われる賃金は除かれるとされています。よって正しい記述です。"},{"law":"求職者給付(賃金日額等)","cat":"賃金日額","q":"賃金日額の下限額は、年齢区分に応じて異なる額が定められている。","a":false,"exp":"×。法17条4項。賃金日額の下限額は年齢にかかわらず一律の額(3,014円)である。上限額が年齢区分に応じて異なる。","page":94,"detail":"×。法17条4項(本文p.94)。本文では賃金日額の下限額は3,014円とされ、注意書きで「下限額は、年齢にかかわらず一律の額です」と明記されています。年齢区分に応じて異なる額が定められているのは上限額であり、本問は誤りです。"},{"law":"求職者給付(賃金日額等)","cat":"基本手当の日額","q":"基本手当の日額は、賃金日額に給付率を乗じて算定し、給付率は離職日に60歳未満の者については100分の80から100分の50までの範囲で決定される。","a":true,"exp":"〇。法16条。60歳未満は100分の80から50まで、60歳以上65歳未満は100分の80から45までの範囲で決定される。","page":95,"detail":"〇。法16条(本文p.95)。本文では基本手当の日額は賃金日額に給付率を乗じて算定し、給付率は離職日に60歳未満である受給資格者については100分の80から100分の50まで、60歳以上65歳未満である受給資格者については100分の80から100分の45までの範囲で賃金日額に応じて決定されるとされています。よって正しい記述です。"},{"law":"求職者給付(賃金日額等)","cat":"基本手当の日額","q":"基本手当の給付率は、離職日に60歳以上65歳未満である受給資格者については、100分の80から<b>100分の45</b>までの範囲で決定される。","a":true,"exp":"〇。法16条。60歳以上65歳未満の給付率の下限は100分の45である。","page":95,"detail":"〇。法16条(本文p.95)。本文では給付率について、離職日に60歳以上65歳未満である受給資格者は100分の80から100分の45までの範囲で決定されるとされています。よって下限を100分の45とする本問は正しい記述です。"},{"law":"求職者給付(賃金日額等)","cat":"基本手当の減額","q":"失業の認定に係る期間中に自己の労働によって収入を得た場合、収入の1日分から控除額を控除した額と基本手当の日額の合計額が賃金日額の<b>100分の80</b>に相当する額を超えないときは、基本手当は全額支給される。","a":true,"exp":"〇。法19条1項。合計額が賃金日額の100分の80に相当する額を超えないときは調整は行われず全額支給される。","page":97,"detail":"〇。法19条1項(本文p.97)。本文では収入の1日分から控除額(1,391円)を控除した額と基本手当の日額との合計額が、賃金日額の100分の80に相当する額を超えないときは、基本手当の調整は行われずその全額が支給されるとされています。よって正しい記述です。"},{"law":"求職者給付(所定給付日数)","cat":"所定給付日数","q":"所定給付日数とは、一の受給資格に基づき基本手当を支給する日数の上限である。","a":true,"exp":"〇。法22条等。所定給付日数とは一の受給資格に基づき基本手当を支給する日数の上限である。","page":100,"detail":"〇。法22条等(本文p.100)。本文では所定給付日数とは、一の受給資格に基づき基本手当を支給する日数の上限であるとされています。年齢・算定基礎期間・離職理由・就職困難者か否かによって定められます。よって正しい記述です。"},{"law":"求職者給付(所定給付日数)","cat":"所定給付日数","q":"一般の受給資格者の所定給付日数は、算定基礎期間が10年未満の場合、年齢にかかわらず一律<b>90日</b>である。","a":true,"exp":"〇。法22条。一般の受給資格者は算定基礎期間10年未満で90日、10年以上20年未満で120日、20年以上で150日である。","page":100,"detail":"〇。法22条1項(本文p.100の表)。本文では一般の受給資格者の所定給付日数は、算定基礎期間10年未満で90日、10年以上20年未満で120日、20年以上で150日とされ、10年未満については年齢にかかわらず一律90日です。よって正しい記述です。"},{"law":"求職者給付(所定給付日数)","cat":"所定給付日数","q":"就職が困難な者である受給資格者で算定基礎期間が1年以上であって離職日における年齢が45歳以上65歳未満の者の所定給付日数は、<b>360日</b>である。","a":true,"exp":"〇。法22条2項。就職困難者で1年以上、45歳以上65歳未満の者は360日、45歳未満の者は300日である。","page":100,"detail":"〇。法22条2項(本文p.100の表)。本文では就職が困難な者である受給資格者は、算定基礎期間1年以上で離職日における年齢が45歳以上65歳未満の者は360日、45歳未満の者は300日とされています。よって正しい記述です。"},{"law":"求職者給付(所定給付日数)","cat":"就職が困難な者","q":"「就職が困難な者」であるか否かは、受給資格決定後にその状態が生じた者も含めて判断される。","a":false,"exp":"×。法22条。就職が困難な者は受給資格決定時においていずれかに該当する状態にある者をいい、決定後に生じた者は含めない。","page":101,"detail":"×。法22条(本文p.101)。本文では「就職が困難な者」とは、受給資格決定時において身体障害者等のいずれかに該当する状態にある者をいい、受給資格決定後にその状態が生じた者は含めないと明記されています。よって決定後に生じた者を含むとする本問は誤りです。"},{"law":"求職者給付(所定給付日数)","cat":"算定基礎期間","q":"算定基礎期間は、原則として、受給資格者が基準日まで引き続いて同一の事業主の適用事業に被保険者として雇用された期間とする。","a":true,"exp":"〇。法22条3項。算定基礎期間は原則として基準日まで引き続いて同一事業主の適用事業に雇用された期間である。","page":102,"detail":"〇。法22条3項。本文では算定基礎期間は、受給資格者が基準日まで引き続いて同一の事業主の適用事業に被保険者として雇用された期間とするとされています。被保険者となった日前に被保険者であったことがある者はその期間を通算します。よって正しい記述です。"},{"law":"求職者給付(受給期間)","cat":"受給期間","q":"基本手当は、原則として、一般の受給資格者については基準日の翌日から起算して<b>1年</b>の受給期間内の失業している日について支給される。","a":true,"exp":"〇。法20条1項。一般の受給資格者の受給期間は基準日の翌日から起算して1年である。","page":104,"detail":"〇。法20条1項。本文では基本手当は、原則として一般の受給資格者については基準日の翌日から起算して1年の受給期間内の失業している日について支給するとされています。よって正しい記述です。"},{"law":"求職者給付(受給期間)","cat":"受給期間","q":"基準日において45歳以上65歳未満であって算定基礎期間が1年以上の就職が困難な者(所定給付日数360日)である受給資格者の受給期間は、基準日の翌日から起算して<b>1年に60日を加えた期間</b>である。","a":true,"exp":"〇。法20条1項。所定給付日数360日の者は1年に60日を加えた期間が受給期間となる。","page":104,"detail":"〇。法20条1項。本文では基準日において45歳以上65歳未満であって算定基礎期間が1年以上の就職が困難な者(所定給付日数360日)である受給資格者の受給期間は、基準日の翌日から起算して1年に60日を加えた期間とされています。よって正しい記述です。"},{"law":"求職者給付(受給期間)","cat":"受給期間の延長","q":"妊娠、出産、育児その他の理由により引き続き<b>30日以上</b>職業に就くことができない者は、申出によって受給期間を最高4年まで延長することができる。","a":true,"exp":"〇。法20条1項。引き続き30日以上職業に就けない者はその日数を加算し最高4年まで延長できる。","page":105,"detail":"〇。法20条1項(本文p.105)。本文では受給期間内に妊娠・出産・育児その他の理由により引き続き30日以上職業に就くことができない者は、その申出によって職業に就くことができない日数が加算され、最高4年まで受給期間を延長することができるとされています。よって正しい記述です。"},{"law":"求職者給付(受給期間)","cat":"受給期間の延長","q":"60歳以上の定年退職等による受給期間の延長の申出は、離職の日の翌日から起算して<b>2か月以内</b>にしなければならない。","a":true,"exp":"〇。則31条の3。定年退職等による延長の申出は離職日の翌日から起算して2か月以内に行う。","page":106,"detail":"〇。則31条の3(本文p.106)。本文では60歳以上の定年退職等による受給期間の延長の申出は、離職の日の翌日から起算して2か月以内にしなければならないとされています。定年退職者等は希望する一定期間(1年を限度)について延長できます。よって正しい記述です。"},{"law":"求職者給付(延長給付)","cat":"訓練延長給付","q":"公共職業訓練等を受けるために待期している期間については、公共職業訓練等を受け始める日の前日までの引き続く<b>90日間</b>を限度に延長することができる。","a":true,"exp":"〇。法24条等。待期している期間は引き続く90日間を限度に訓練延長給付が行われる。","page":110,"detail":"〇。法24条等(本文p.110)。本文では訓練延長給付について、公共職業訓練等を受けるために待期している期間は、公共職業訓練等を受け始める日の前日までの引き続く90日間を限度に延長することができるとされています。よって正しい記述です。"},{"law":"求職者給付(延長給付)","cat":"広域延長給付","q":"広域延長給付の延長日数は、<b>90日</b>が限度となる。","a":true,"exp":"〇。法25条。広域延長給付の延長日数は90日が限度である。","page":113,"detail":"〇。法25条(本文p.113)。本文では広域延長給付の延長日数は90日が限度となるとされています。広域職業紹介活動により職業のあっせんを受けることが適当と認定される受給資格者について延長措置が決定されます。よって正しい記述です。"},{"law":"求職者給付(延長給付)","cat":"全国延長給付","q":"全国延長給付は、特定受給資格者のみを対象として実施される。","a":false,"exp":"×。法27条。全国延長給付はすべての受給資格者を対象として実施される。延長日数は90日が限度である。","page":114,"detail":"×。法27条(本文p.114の注意)。本文では全国延長給付は「すべての受給資格者を対象として実施されます」と明記されています。よって特定受給資格者のみを対象とする本問は誤りです。なお延長日数は90日が限度です。"},{"law":"求職者給付(延長給付)","cat":"延長給付の調整","q":"複数の延長給付の要件を満たした場合、個別延長給付、広域延長給付、全国延長給付、<b>訓練延長給付</b>の順序で行われる。","a":true,"exp":"〇。法28条。個別→広域→全国→訓練延長給付の順序で行われる。","page":115,"detail":"〇。法28条(本文p.115)。本文では1人の受給資格者が重複して複数の延長給付の要件を満たした場合には、個別延長給付、広域延長給付、全国延長給付、訓練延長給付の順序で行われるとされています。よって正しい記述です。"},{"law":"求職者給付(延長給付)","cat":"地域延長給付","q":"地域延長給付は、個別延長給付と同じ順位とされ、広域延長給付や全国延長給付、訓練延長給付に優先する。","a":true,"exp":"〇。法附則5条4項。地域延長給付は個別延長給付と同じ順位とされ、他の延長給付に優先する。","page":115,"detail":"〇。法附則5条4項(本文p.115の注意)。本文では地域延長給付は個別延長給付と同じ順位とされていて、広域延長給付や全国延長給付、訓練延長給付に優先すると明記されています。よって正しい記述です。"},{"law":"求職者給付(給付制限)","cat":"職業紹介の拒否","q":"受給資格者が公共職業安定所の紹介する職業に就くことを拒んだときは、その拒んだ日から起算して<b>1か月間</b>は基本手当が支給されない。","a":true,"exp":"〇。法32条1項。職業紹介・訓練受講の拒否による給付制限期間は1か月間である。","page":117,"detail":"〇。法32条1項(本文p.117)。本文では受給資格者が公共職業安定所の紹介する職業に就くこと、又は公共職業安定所長の指示した公共職業訓練等を受けることを拒んだときは、その拒んだ日から起算して1か月間は基本手当が支給されないとされています。よって正しい記述です。"},{"law":"求職者給付(給付制限)","cat":"離職理由による給付制限","q":"被保険者が自己の責めに帰すべき重大な理由によって解雇され、又は正当な理由がなく自己の都合によって退職したときは、待期期間の満了後<b>1か月以上3か月以内</b>の間で公共職業安定所長の定める期間、基本手当が支給されない。","a":true,"exp":"〇。法33条1項。離職理由による給付制限期間は待期満了後1か月以上3か月以内である。","page":118,"detail":"〇。法33条1項(本文p.118)。本文では被保険者が自己の責めに帰すべき重大な理由によって解雇され、又は正当な理由がなく自己の都合によって退職したときは、待期期間の満了後1か月以上3か月以内の間で公共職業安定所長の定める期間、基本手当が支給されないとされています。よって正しい記述です。"},{"law":"求職者給付(給付制限)","cat":"離職理由による給付制限","q":"正当な理由がない自己都合により退職した場合、原則として給付制限期間は<b>1か月</b>となる。","a":true,"exp":"〇。行政手引52205。正当な理由がない自己都合退職の給付制限期間は原則1か月となる。5年間に2回以上の場合は3か月となる。","page":119,"detail":"〇。行政手引52205(本文p.119)。本文では正当な理由がない自己都合により退職した場合の給付制限期間は原則1か月となるとされています。ただし退職日から遡って5年間のうちに2回以上正当な理由なく自己都合退職した者は3か月、自己の責めに帰すべき重大な理由で解雇された場合は3か月となります。よって正しい記述です。"},{"law":"求職者給付(給付制限)","cat":"不正受給による給付制限","q":"偽りその他不正の行為により求職者給付又は就職促進給付の支給を受け、又は受けようとした者には、その日以後、原則として基本手当は支給されない。","a":true,"exp":"〇。法34条。不正受給による給付制限により、原則としてその日以後基本手当は支給されない。","page":121,"detail":"〇。法34条(本文p.121)。本文では偽りその他不正の行為により求職者給付又は就職促進給付の支給を受け、又は受けようとした者には、これらの給付を受け又は受けようとした日以後、基本手当は支給されないとされています。ただしやむを得ない理由がある場合は全部又は一部が支給されることがあります。よって正しい記述です。"},{"law":"求職者給付(その他)","cat":"傷病手当","q":"傷病手当は、受給資格者が求職の申込みをした後において、疾病又は負傷のために継続して<b>15日以上</b>職業に就くことができない場合に支給される。","a":true,"exp":"〇。法37条1項。求職の申込み後、疾病・負傷で継続15日以上職業に就けない場合に傷病手当が支給される。","page":122,"detail":"〇。法37条1項(本文p.122)。本文では傷病手当は、受給資格者が離職後公共職業安定所に出頭し求職の申込みをした後において、疾病又は負傷のために継続して15日以上職業に就くことができない場合に、基本手当の支給を受けることができない日について支給されるとされています。よって正しい記述です。"},{"law":"求職者給付(その他)","cat":"傷病手当","q":"傷病手当の日額は、基本手当の日額の<b>100分の80</b>に相当する額である。","a":false,"exp":"×。法37条3項。傷病手当の日額は基本手当の日額に相当する額である。","page":123,"detail":"×。法37条3項(本文p.123)。本文では傷病手当の日額は、基本手当の日額に相当する額であるとされています。よって100分の80に相当する額とする本問は誤りです。"},{"law":"求職者給付(その他)","cat":"受講手当","q":"受講手当は、公共職業訓練等を受けた日について、<b>30日分</b>を限度として支給され、支給額は日額500円である。","a":false,"exp":"×。則57条。受講手当は「40日分」を限度として支給される。支給額は日額500円である。","page":126,"detail":"×。則57条(本文p.126)。本文では受講手当は、公共職業安定所長の指示した公共職業訓練等を受けた日であって基本手当の支給の対象となる日について、「40日分」を限度として支給し、支給額は日額500円であるとされています。30日分とする本問は誤りです。"},{"law":"求職者給付(その他)","cat":"通所手当","q":"通所手当は、月額<b>42,500円</b>を限度に、通所方法に応じて算定した額が支給される。","a":true,"exp":"〇。則59条。通所手当は月額42,500円を限度に通所方法に応じて算定した額が支給される。","page":126,"detail":"〇。則59条(本文p.126)。本文では通所手当は、公共職業訓練等を行う施設への通所のための交通費として支給され、支給額は月額42,500円を限度に通所方法に応じて算定した額であるとされています。よって正しい記述です。"},{"law":"求職者給付(その他)","cat":"寄宿手当","q":"寄宿手当の支給額は、月額<b>10,400円</b>である。","a":false,"exp":"×。則60条2項。寄宿手当の支給額は月額「10,700円」である。年齢や被保険者期間により異なることはない。","page":128,"detail":"×。則60条2項(本文p.128)。本文では寄宿手当の支給額は月額「10,700円」であるとされています。よって10,400円とする本問は誤りです。なお技能習得手当及び寄宿手当の額は受給資格者の年齢や被保険者であった期間の長短により異なることはありません。"},{"law":"高年齢・短期・日雇","cat":"高年齢求職者給付金","q":"高年齢求職者給付金は、原則として離職の日以前<b>1年間</b>に被保険者期間が通算して6か月以上あるときに支給される。","a":true,"exp":"〇。法37条の3第1項。高年齢求職者給付金は原則として離職日以前1年間に被保険者期間6か月以上で支給される。","page":132,"detail":"〇。法37条の3第1項(本文p.132)。本文では高年齢求職者給付金の支給要件として、高年齢被保険者が失業したこと、及び原則として離職の日以前1年間に被保険者期間が通算して6か月以上あることが掲げられています。よって正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"高年齢求職者給付金","q":"高年齢求職者給付金の支給額は、算定基礎期間が1年未満の場合は基本手当の日額の30日分、1年以上の場合は<b>40日分</b>である。","a":false,"exp":"×。法37条の4。算定基礎期間1年未満で30日分、1年以上で「50日分」である。","page":134,"detail":"×。法37条の4(本文p.134の表)。本文では高年齢求職者給付金の支給日数は、算定基礎期間が1年未満の場合は30日、1年以上の場合は「50日」とされ、給付金額は基本手当の日額にこの支給日数を乗じた額です。よって1年以上を40日分とする本問は誤りです。"},{"law":"高年齢・短期・日雇","cat":"高年齢求職者給付金","q":"高年齢求職者給付金の基本手当の日額は、<b>30歳未満</b>である受給資格者に係る給付率を用いて算定する。","a":true,"exp":"〇。法37条の4等。基本手当の日額は30歳未満の受給資格者に係る給付率(100分の50から80)を用いて算定する。","page":134,"detail":"〇。法37条の4等(本文p.134)。本文では高年齢求職者給付金の基本手当の日額は、30歳未満である受給資格者に係る給付率(100分の50から100分の80)を用いて算定し、賃金日額の上限額も30歳未満の受給資格者の上限額によるとされています。よって正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"高年齢求職者給付金","q":"高年齢求職者給付金は、傷病等により引き続き30日以上職業に就くことができない場合には、受給期限の延長が認められる。","a":false,"exp":"×。行政手引54131。高年齢求職者給付金及び特例一時金は、傷病等による受給期限の延長は認められない。","page":134,"detail":"×。行政手引54131(本文p.134)。本文では高年齢求職者給付金及び特例一時金は、傷病等により引き続き30日以上職業に就くことができない場合であっても、受給期限の延長は認められないとされています。よって受給期限の延長が認められるとする本問は誤りです。"},{"law":"高年齢・短期・日雇","cat":"特例一時金","q":"特例一時金の額は、原則として基本手当の日額の30日分とされているが、当分の間、<b>40日分</b>とされている。","a":true,"exp":"〇。法40条1項、附則8条。原則30日分だが暫定措置により当分の間40日分とされている。","page":141,"detail":"〇。法40条1項、附則8条(本文p.141)。本文では特例一時金の額は、原則として基本手当の日額の30日分とされているが、当分の間、40日分とすることとされているとされています。計算式も基本手当の日額×40日とされており、本問は正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"特例一時金","q":"特例一時金の受給期限は、離職の日の翌日から起算して<b>6か月</b>を経過する日までである。","a":true,"exp":"〇。法39条2項。特例一時金の受給期限は離職日の翌日から起算して6か月を経過する日までである。","page":141,"detail":"〇。法39条2項(本文p.141)。本文では特例一時金の支給を受けることができる期限(受給期限)は、離職の日の翌日から起算して6か月を経過する日までであるとされています。よって正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"特例一時金","q":"特例受給資格者が自己の労働により収入を得た場合、特例一時金は減額される。","a":false,"exp":"×。行政手引55357。特例受給資格者が自己の労働により収入を得た場合でも、特例一時金は減額されない。","page":141,"detail":"×。行政手引55357(本文p.141)。本文では特例受給資格者が自己の労働により収入を得た場合でも、特例一時金は減額されないとされています。よって減額されるとする本問は誤りです。"},{"law":"高年齢・短期・日雇","cat":"日雇労働求職者給付金","q":"日雇労働求職者給付金(普通給付)は、その失業の日の属する月の前2月間に印紙保険料が通算して<b>26日分以上</b>納付されているときに支給される。","a":true,"exp":"〇。法45条。普通給付は前2月間に印紙保険料が通算26日分以上納付されているときに支給される。","page":146,"detail":"〇。法45条(本文p.146)。本文では日雇労働求職者給付金(普通給付)は、日雇労働被保険者が失業した場合において、その失業の日の属する月の前2月間に、印紙保険料が通算して26日分以上納付されているときに支給されるとされています。よって正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"日雇労働求職者給付金","q":"日雇労働求職者給付金の特例給付は、継続する6月間に印紙保険料が各月11日分以上、かつ通算して<b>78日分以上</b>納付されていること等の要件に該当するときに支給される。","a":true,"exp":"〇。法53条。特例給付は継続6月間に各月11日分以上かつ通算78日分以上の納付等の要件に該当するときに支給される。","page":147,"detail":"〇。法53条(本文p.147)。本文では日雇労働求職者給付金の特例給付は、継続する6月間に印紙保険料が各月11日分以上、かつ通算して78日分以上納付されていること等の要件のいずれにも該当するときに、公共職業安定所長に申し出て支給を受けることができるとされています。よって正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"日雇労働求職者給付金","q":"日雇労働求職者給付金は、各週につき日雇労働被保険者が職業に就かなかった最初の日については支給されない。","a":true,"exp":"〇。法50条2項。各週につき職業に就かなかった最初の1日(不就労日)については支給されない。","page":149,"detail":"〇。法50条2項(本文p.149)。本文では日雇労働求職者給付金は、各週(日曜日から土曜日までの7日間)につき日雇労働被保険者が職業に就かなかった最初の日(不就労日)については支給されないとされています。よって正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"日雇労働求職者給付金","q":"日雇労働求職者給付金の特例給付は、基礎期間の最後の月の翌月以後4月の期間内の失業している日について、通算して<b>60日分</b>を限度として支給される。","a":true,"exp":"〇。法54条。特例給付は4月の期間内の失業している日について通算60日分を限度として支給される。","page":150,"detail":"〇。法54条(本文p.150)。本文では特例給付は、基礎期間の最後の月の翌月以後4月の期間内の失業している日について、通算して60日分を限度として支給されるとされています。よって正しい記述です。"},{"law":"高年齢・短期・日雇","cat":"日雇労働求職者給付金の日額","q":"日雇労働求職者給付金の日額の第1級給付金は、<b>6,200円</b>である。","a":false,"exp":"×。法48条。第1級給付金は「7,500円」である。6,200円は第2級給付金、4,100円は第3級給付金である。","page":151,"detail":"×。法48条(本文p.151)。本文では日雇労働求職者給付金の日額について、第1級給付金は7,500円、第2級給付金は6,200円、第3級給付金は4,100円とされています。よって第1級を6,200円とする本問は誤りで、6,200円は第2級給付金の額です。"},{"law":"就職促進給付","cat":"就業促進手当","q":"就業促進手当は、再就職手当、就業促進定着手当及び<b>常用就職支度手当</b>とする。","a":true,"exp":"〇。法56条の3等。就業促進手当は再就職手当、就業促進定着手当、常用就職支度手当の3種類である。","page":156,"detail":"〇。法56条の3等(本文p.156)。本文では就業促進手当は、再就職手当、就業促進定着手当、常用就職支度手当の3種類とするとされています。よって正しい記述です。"},{"law":"就職促進給付","cat":"再就職手当","q":"再就職手当は、安定した職業に就いた日の前日における基本手当の支給残日数が当該受給資格に基づく所定給付日数の<b>3分の1以上</b>ある受給資格者が所定の要件に該当するときに支給される。","a":true,"exp":"〇。法56条の3第1項。支給残日数が所定給付日数の3分の1以上ある者が要件に該当するときに支給される。","page":157,"detail":"〇。法56条の3第1項(本文p.157)。本文では再就職手当は、安定した職業に就いた日の前日における基本手当の支給残日数が当該受給資格に基づく所定給付日数の3分の1以上ある受給資格者が、所定の要件のすべてに該当するときに支給されるとされています。よって正しい記述です。"},{"law":"就職促進給付","cat":"再就職手当","q":"再就職手当の額は、支給残日数が所定給付日数の3分の2以上のときは、基本手当日額に支給残日数を乗じた額の<b>10分の6</b>に相当する額である。","a":false,"exp":"×。法56条の3第3項。支給残日数3分の2以上のときは「10分の7」を乗じる。3分の1以上3分の2未満が10分の6である。","page":158,"detail":"×。法56条の3第3項(本文p.158の表)。本文では再就職手当の額は、支給残日数が所定給付日数の3分の2以上のときは基本手当日額に支給残日数を乗じた額の「10分の7」、3分の1以上3分の2未満のときは10分の6に相当する額とされています。よって3分の2以上を10分の6とする本問は誤りです。"},{"law":"就職促進給付","cat":"給付の調整","q":"受給資格者が安定した職業に就いた日前<b>3年以内</b>の就職について再就職手当又は常用就職支度手当の支給を受けたことがある場合には、再就職手当は支給されない。","a":true,"exp":"〇。法56条の3第2項。3年以内に再就職手当等を受けたことがある場合は支給されない。","page":157,"detail":"〇。法56条の3第2項(本文p.157)。本文では受給資格者が安定した職業に就いた日前3年以内の就職について再就職手当又は常用就職支度手当の支給を受けたことがある場合には支給されないとされています。よって正しい記述です。"},{"law":"就職促進給付","cat":"就業促進定着手当","q":"就業促進定着手当は、再就職手当の支給を受けた者が、同一事業主の適用事業にその職業に就いた日から引き続いて<b>6か月以上</b>雇用され、みなし賃金日額が算定基礎賃金日額を下回るときに支給される。","a":true,"exp":"〇。法56条の3第3項。再就職後6か月以上雇用され賃金が低下した場合に追加的に支給される。","page":161,"detail":"〇。法56条の3第3項(本文p.161)。本文では就業促進定着手当は、再就職手当の支給を受けた者が、同一の事業主の適用事業にその職業に就いた日から引き続いて6か月以上雇用される者であり、かつみなし賃金日額が算定基礎賃金日額を下回るときに支給されるとされています。よって正しい記述です。"},{"law":"就職促進給付","cat":"常用就職支度手当","q":"常用就職支度手当の支給対象となる「就職が困難な者」の範囲は、基本手当の所定給付日数について規定する「就職が困難な者」より<b>広い</b>。","a":true,"exp":"〇。則82条の3。常用就職支度手当の就職困難者の範囲は所定給付日数の就職困難者より広い。","page":164,"detail":"〇。則82条の3第2項(本文p.164)。本文のポイント解説では、常用就職支度手当の支給対象となる「就職が困難な者」の範囲は、基本手当の所定給付日数について規定する「就職が困難な者」より広くなっていると明記されています。よって正しい記述です。"},{"law":"就職促進給付","cat":"移転費","q":"移転費は、鉄道賃、船賃、航空賃、車賃及び移転料の<b>5種類</b>とされている。","a":false,"exp":"×。則87条。移転費は鉄道賃・船賃・航空賃・車賃・移転料・着後手当の「6種類」である。","page":166,"detail":"×。則87条(本文p.166)。本文では移転費は、鉄道賃、船賃、航空賃、車賃、移転料及び着後手当の「6種類」とされています。よって着後手当を除いて5種類とする本問は誤りです。"},{"law":"就職促進給付","cat":"移転費","q":"移転費の支給を受けた受給資格者等が、紹介された職業に就かなかったとき等は、その事実が確定した日の翌日から起算して<b>10日以内</b>に届け出るとともに、移転費に相当する額を返還しなければならない。","a":true,"exp":"〇。則95条1項。紹介された職業に就かなかったとき等は10日以内に届け出て返還しなければならない。","page":167,"detail":"〇。則95条1項(本文p.167)。本文では移転費の支給を受けた受給資格者等が、紹介した職業に就かなかったとき又は指示した公共職業訓練等を受けなかったときは、その事実が確定した日の翌日から起算して10日以内に公共職業安定所長に届け出るとともに、その支給を受けた移転費に相当する額を返還しなければならないとされています。よって正しい記述です。"},{"law":"就職促進給付","cat":"短期訓練受講費","q":"短期訓練受講費の額は、教育訓練の受講のために支払った費用の額に<b>100分の20</b>を乗じて得た額(その額が10万円を超えるときは10万円)とされている。","a":true,"exp":"〇。則100条の3。支払った費用の額に100分の20を乗じた額(上限10万円)が支給される。","page":170,"detail":"〇。則100条の3(本文p.170)。本文では短期訓練受講費の額は、受給資格者等が教育訓練の受講のために支払った費用の額に100分の20を乗じて得た額(その額が10万円を超えるときは10万円)とされています。よって正しい記述です。"},{"law":"教育訓練給付","cat":"教育訓練給付金","q":"教育訓練給付金は、原則として支給要件期間が<b>3年以上</b>であるときに支給される。","a":true,"exp":"〇。法60条の2第1項。原則として支給要件期間が3年以上であるときに支給される。","page":176,"detail":"〇。法60条の2第1項(本文p.176)。本文では教育訓練給付金は、教育訓練給付金支給対象者が厚生労働大臣の指定する教育訓練を受け修了した場合等において、支給要件期間が3年以上であるときに支給するとされています。よって原則3年以上とする本問は正しい記述です。"},{"law":"教育訓練給付","cat":"教育訓練給付金","q":"基準日前に教育訓練給付金の支給を受けたことのない者の場合、専門実践教育訓練に係る支給要件期間は<b>2年以上</b>でよい。","a":true,"exp":"〇。法60条の2第1項等。給付金を受けたことのない者は、一般・特定一般は1年以上、専門実践は2年以上でよい。","page":179,"detail":"〇。法60条の2第1項等(本文p.179の表)。本文の支給要件期間の表では、基準日前に教育訓練給付金の支給を受けたことのない者は、一般教育訓練・特定一般教育訓練は1年以上、専門実践教育訓練は2年以上でよいとされています。よって専門実践を2年以上とする本問は正しい記述です。"},{"law":"教育訓練給付","cat":"教育訓練給付金","q":"短期雇用特例被保険者及び日雇労働被保険者は、教育訓練給付金の支給対象とならない。","a":true,"exp":"〇。法60条の2。短期雇用特例被保険者及び日雇労働被保険者は支給対象とならない。ただし離職後一定期間内の者は要件を満たせば支給を受けられる。","page":177,"detail":"〇。法60条の2(本文p.177の注意)。本文では短期雇用特例被保険者及び日雇労働被保険者は教育訓練給付金の支給対象とはならないとされています。ただし基準日が直前の一般被保険者等でなくなった日から一定期間内にある者は、その他の要件を満たすことで支給を受けられます。よって正しい記述です。"},{"law":"教育訓練給付","cat":"支給率","q":"一般教育訓練を受け、修了した者に係る教育訓練給付金の支給率は、<b>100分の40</b>である。","a":false,"exp":"×。則。一般教育訓練を修了した者の支給率は「100分の20」である。100分の40は特定一般教育訓練を修了した者の支給率である。","page":182,"detail":"×。則(本文p.182の表)。本文の支給率の表では、一般教育訓練を受け修了した者の支給率は「100分の20」とされています。100分の40は特定一般教育訓練を受け修了した者(資格取得・雇用に至らない者)の支給率です。よって一般教育訓練を100分の40とする本問は誤りです。"},{"law":"教育訓練給付","cat":"支給率","q":"専門実践教育訓練を受け、修了した者(資格取得等・雇用なし)に係る支給率は、<b>100分の70</b>である。","a":false,"exp":"×。則。専門実践教育訓練を受け修了した者(資格取得等・雇用に至らない者)の支給率は100分の50である。資格取得等し雇用された者は100分の70となる。","page":182,"detail":"×。則(本文p.182の表)。本文の支給率の表では、専門実践教育訓練を受け修了した者(資格の取得等・雇用に至らない者)の支給率は100分の50とされ、資格を取得等し一般被保険者等として雇用された者は100分の70とされています。よって資格取得等・雇用なしの者を100分の70とする本問は誤りです。"},{"law":"教育訓練給付","cat":"上限額","q":"一般教育訓練を受け修了した者に係る教育訓練給付金の支給総額の上限額は、<b>10万円</b>である。","a":true,"exp":"〇。則。一般教育訓練(支給率100分の20)に係る支給総額の上限額は10万円である。","page":184,"detail":"〇。則(本文p.184の表)。本文の上限額の表では、一般教育訓練を受け修了した者(支給率100分の20の区分)に係る支給総額の上限額は10万円とされています。よって正しい記述です。"},{"law":"教育訓練給付","cat":"不支給","q":"教育訓練給付金の額として算定された額が<b>4,000円</b>を超えないときは、教育訓練給付金は支給されない。","a":true,"exp":"〇。法60条の2第5項。算定額が4,000円を超えないときは支給されない。","page":188,"detail":"〇。法60条の2第5項(本文p.188)。本文では教育訓練給付金の額として算定された額が4,000円を超えないときは、教育訓練給付金は支給されないとされています。よって正しい記述です。"},{"law":"教育訓練給付","cat":"不支給","q":"教育訓練給付金支給対象者が基準日前<b>3年</b>の期間内に教育訓練給付金の支給を受けたことがあるときは、支給されない。","a":true,"exp":"〇。法60条の2第5項。基準日前3年の期間内に教育訓練給付金を受けたことがあるときは支給されない。","page":188,"detail":"〇。法60条の2第5項(本文p.188)。本文では教育訓練給付金支給対象者が基準日前3年の期間内に教育訓練給付金の支給を受けたことがあるときは、教育訓練給付金は支給されないとされています。よって正しい記述です。"},{"law":"教育訓練給付","cat":"申請","q":"一般教育訓練に係る教育訓練給付金の支給申請は、一般教育訓練を修了した日の翌日から起算して<b>1か月以内</b>に行わなければならない。","a":true,"exp":"〇。則101条の2の11。一般教育訓練修了日の翌日から起算して1か月以内に支給申請する。","page":188,"detail":"〇。則101条の2の11(本文p.188)。本文では教育訓練給付金支給対象者は、一般教育訓練に係る教育訓練給付金の支給を受けようとするときは、一般教育訓練を修了した日の翌日から起算して1か月以内に、教育訓練給付金支給申請書に所定の書類を添えて管轄公共職業安定所の長に提出しなければならないとされています。よって正しい記述です。"},{"law":"教育訓練給付","cat":"教育訓練休暇給付金","q":"教育訓練休暇給付金は、一般被保険者が職業に関する教育訓練を受けるための休暇を取得した場合に支給され、その教育訓練休暇は当該休暇の期間が<b>30日以上</b>であることが必要である。","a":true,"exp":"〇。法60条の3、則。教育訓練休暇は当該休暇の期間が30日以上であり所定の訓練を受けるものであること等が要件である。","page":192,"detail":"〇。法60条の3第1項、則(本文p.193)。本文では教育訓練休暇給付金の対象となる教育訓練休暇は、当該休暇の期間が30日以上であり、かつ大学・専修学校等が行う教育訓練等を受けるものとして事業主の承認を受けたものとするとされています。よって30日以上を要件とする本問は正しい記述です。"},{"law":"教育訓練給付","cat":"教育訓練休暇給付金","q":"教育訓練休暇給付金の日額は、基本手当の日額に相当する額の<b>100分の60</b>に相当する額である。","a":false,"exp":"×。法60条の3第5項。教育訓練休暇給付金の日額は基本手当の日額に相当する額である。100分の60を乗じるのは教育訓練支援給付金である。","page":194,"detail":"×。法60条の3第5項(本文p.194)。本文では教育訓練休暇給付金の日額は、休暇開始日の前日を離職の日とみなした場合の基本手当の日額に相当する額とされています。100分の60を乗じるのは教育訓練支援給付金の支給日額(法附則11条の2第3項)であり、本問は誤りです。"},{"law":"教育訓練給付","cat":"教育訓練支援給付金","q":"教育訓練支援給付金は、専門実践教育訓練を開始した日における年齢が<b>45歳未満</b>であること等の要件に該当する場合に支給される。","a":true,"exp":"〇。法附則11条の2。教育訓練を開始した日における年齢が45歳未満であること等が要件である。","page":196,"detail":"〇。法附則11条の2(本文p.196)。本文では教育訓練支援給付金は、教育訓練給付金支給対象者であって令和9年3月31日以前に専門実践教育訓練を開始したものであること、及び当該教育訓練を開始した日における年齢が45歳未満であること等の要件に該当する場合に支給されるとされています。よって正しい記述です。"},{"law":"教育訓練給付","cat":"教育訓練支援給付金","q":"教育訓練支援給付金の支給日額は、基本手当の日額に相当する額に<b>100分の60</b>を乗じて得た額である。","a":true,"exp":"〇。法附則11条の2第3項。支給日額は基本手当の日額に相当する額に100分の60を乗じて得た額である。","page":197,"detail":"〇。法附則11条の2第3項(本文p.197)。本文では教育訓練支援給付金の支給日額は、基本手当の日額と同様に計算した額(基本手当の日額に相当する額)に100分の60を乗じて得た額とされています。よって正しい記述です。"},{"law":"雇用継続給付(高年齢)","cat":"高年齢雇用継続基本給付金","q":"高年齢雇用継続基本給付金は、支給対象月に支払われた賃金の額が、みなし賃金日額に30を乗じて得た額の<b>100分の75</b>に相当する額を下るに至った場合に支給される。","a":true,"exp":"〇。法61条1項。賃金が60歳到達時等の100分の75に相当する額を下る場合に支給される。","page":203,"detail":"〇。法61条1項(本文p.203)。本文では高年齢雇用継続基本給付金は、被保険者に対して支給対象月に支払われた賃金の額が、みなし賃金日額に30を乗じて得た額の100分の75に相当する額を下るに至った場合に、当該支給対象月について支給されるとされています。よって正しい記述です。"},{"law":"雇用継続給付(高年齢)","cat":"高年齢雇用継続基本給付金","q":"高年齢雇用継続基本給付金は、被保険者が60歳に達した日後において、算定基礎期間に相当する期間が<b>5年</b>に満たないときは支給されない。","a":true,"exp":"〇。法61条1項。算定基礎期間に相当する期間が5年に満たないときは支給されない。","page":203,"detail":"〇。法61条1項(本文p.203)。本文では高年齢雇用継続基本給付金が支給されない場合として、被保険者が60歳に達した日又は60歳に達した日後において、算定基礎期間に相当する期間が5年に満たないときが掲げられています。よって5年に満たないときは支給されないとする本問は正しい記述です。"},{"law":"雇用継続給付(高年齢)","cat":"高年齢雇用継続基本給付金","q":"高年齢雇用継続基本給付金の額は、支給対象月の賃金額が「みなし賃金日額×30」の額の100分の64未満である場合、支給対象月の賃金額の<b>100分の10</b>に相当する額である。","a":false,"exp":"×。法61条5項。100分の64未満の場合の支給率は100分の15である。","page":205,"detail":"×。法61条5項(本文p.205)。本文では支給対象月の賃金額が「みなし賃金日額×30」の額の100分の64未満である場合、支給額は支給対象月の賃金額に100分の15を乗じた額とされています。よって100分の10とする本問は誤りです(100分の10は育児時短就業給付金等の率)。"},{"law":"雇用継続給付(高年齢)","cat":"高年齢再就職給付金","q":"高年齢再就職給付金は、受給資格に係る離職日における算定基礎期間が5年以上あり、かつ当該受給資格に基づく基本手当の支給を受けたことがあること等の要件に該当するときに支給される。","a":true,"exp":"〇。法61条の2第1項。算定基礎期間5年以上、基本手当の支給を受けたこと等が要件である。","page":208,"detail":"〇。法61条の2第1項(本文p.208)。本文では高年齢再就職給付金の支給要件として、受給資格に係る離職日における算定基礎期間が5年以上あり、かつ当該受給資格に基づく基本手当の支給を受けたことがあること等が掲げられています。よって正しい記述です。"},{"law":"雇用継続給付(高年齢)","cat":"高年齢再就職給付金","q":"高年齢再就職給付金は、就職日の前日における当該基本手当の支給残日数が、<b>50日未満</b>であるときは支給されない。","a":false,"exp":"×。法61条の2。高年齢再就職給付金は支給残日数が「100日未満」であるときは支給されない。","page":208,"detail":"×。法61条の2(本文p.208)。本文では高年齢再就職給付金が支給されない場合として、就職日の前日における当該基本手当の支給残日数が「100日未満」であるときが掲げられています。よって50日未満とする本問は誤りです。"},{"law":"雇用継続給付(高年齢)","cat":"高年齢再就職給付金","q":"再就職後の支給対象月は、就職日の前日における基本手当の支給残日数が200日以上の場合、就職日の属する月から就職日の翌日から起算して<b>2年</b>を経過する日の属する月までの期間内にある月である。","a":true,"exp":"〇。法61条の2第2項。支給残日数200日以上は2年、200日未満は1年を経過する日の属する月までである。","page":209,"detail":"〇。法61条の2第2項(本文p.209の表)。本文では再就職後の支給対象月について、就職日の前日における基本手当の支給残日数が200日以上の場合は、就職日の属する月から就職日の翌日から起算して2年を経過する日の属する月までの期間内にある月とされています(200日未満は1年)。よって正しい記述です。"},{"law":"雇用継続給付(高年齢)","cat":"支給調整","q":"高年齢再就職給付金の支給を受けることができる者が、同一の就職につき再就職手当の支給を受けたときは、高年齢再就職給付金は支給されない。","a":true,"exp":"〇。法61条の2第4項。再就職手当を受けたときは高年齢再就職給付金を支給せず、いずれを受けるかは本人が選択する。","page":210,"detail":"〇。法61条の2第4項(本文p.210)。本文では高年齢再就職給付金の支給を受けることができる者が同一の就職につき再就職手当の支給を受けたときは高年齢再就職給付金を支給しないとされ、いずれを受けるかは本人が選択するとされています。よって正しい記述です。"},{"law":"雇用継続給付(介護)","cat":"介護休業給付金","q":"介護休業給付金は、原則として介護休業を開始した日前<b>2年間</b>に、みなし被保険者期間が通算して12か月以上あること等が要件である。","a":true,"exp":"〇。法61条の4第1項。介護休業開始日前2年間にみなし被保険者期間が通算12か月以上必要である。","page":212,"detail":"〇。法61条の4第1項(本文p.212)。本文では介護休業給付金は、被保険者が対象家族を介護するための介護休業をしたこと、及び原則として当該介護休業(2回以上の場合は初回)を開始した日前2年間にみなし被保険者期間が通算して12か月以上あること等を要件として支給されるとされています。よって正しい記述です。"},{"law":"雇用継続給付(介護)","cat":"対象家族","q":"介護休業給付金の対象家族には、被保険者の配偶者、父母、子、祖父母、兄弟姉妹、孫及び<b>配偶者の父母</b>が含まれる。","a":true,"exp":"〇。法61条の4第1項、則101条の17。配偶者の父母も対象家族に含まれる。","page":213,"detail":"〇。法61条の4第1項、則101条の17(本文p.213)。本文では対象家族とは、被保険者の配偶者(事実婚を含む)、父母、子、祖父母、兄弟姉妹及び孫、並びに配偶者の父母のいずれかに該当するものとされています。よって配偶者の父母を含むとする本問は正しい記述です。"},{"law":"雇用継続給付(介護)","cat":"介護休業給付金","q":"介護休業給付金の額は、当分の間、休業開始時賃金日額に支給日数を乗じて得た額の<b>100分の67</b>に相当する額とされている。","a":true,"exp":"〇。法61条の4第4項、附則12条。原則100分の40だが当分の間100分の67とされている。","page":215,"detail":"〇。法61条の4第4項、附則12条(本文p.215)。本文では介護休業給付金の額は、休業開始時賃金日額に支給日数を乗じて得た額の100分の67に相当する額とされ、暫定措置として原則の100分の40に代えて当分の間100分の67とされています。よって正しい記述です。"},{"law":"雇用継続給付(介護)","cat":"介護休業の分割取得","q":"同一の対象家族について、被保険者がした介護休業の日数を合算して得た日数が<b>93日</b>に達した日後の介護休業については、介護休業給付金は支給されない。","a":true,"exp":"〇。法61条の4第6項。合算日数が93日に達した日後の介護休業及び4回目以後の介護休業は支給されない。","page":214,"detail":"〇。法61条の4第6項(本文p.214)。本文では同一の対象家族について被保険者がした介護休業ごとに、開始日から終了日までの日数を合算して得た日数が93日に達した日後の介護休業については、介護休業給付金は支給しないとされています。よって正しい記述です。"},{"law":"雇用継続給付(介護)","cat":"介護休業の分割取得","q":"同一の対象家族について被保険者が<b>4回以上</b>の介護休業をした場合における4回目以後の介護休業については、介護休業給付金は支給されない。","a":true,"exp":"〇。法61条の4第6項。4回目以後の介護休業については支給されない。","page":214,"detail":"〇。法61条の4第6項(本文p.214)。本文では同一の対象家族について被保険者が4回以上の介護休業をした場合における4回目以後の介護休業については、介護休業給付金は支給しないとされています。よって正しい記述です。"},{"law":"雇用継続給付(介護)","cat":"支給申請","q":"介護休業給付金の支給申請は、介護休業を<b>開始した日</b>の翌日から起算して2か月を経過する日の属する月の末日までに行わなければならない。","a":false,"exp":"×。則101条の19。介護休業給付金の支給申請は介護休業を「終了した日」の翌日から起算して2か月を経過する日の属する月の末日までに行う。","page":217,"detail":"×。則101条の19第1項(本文p.217)。本文では介護休業給付金の支給申請は、介護休業を「終了した日」の翌日から起算して2か月を経過する日の属する月の末日までに行わなければならないとされています。よって開始した日の翌日からとする本問は誤りです。"},{"law":"育児休業給付","cat":"育児休業給付金","q":"育児休業給付金は、原則として育児休業を開始した日前2年間に、みなし被保険者期間が通算して<b>12か月以上</b>あること等が要件である。","a":true,"exp":"〇。法61条の7第1項。育児休業開始日前2年間にみなし被保険者期間が通算12か月以上必要である。","page":221,"detail":"〇。法61条の7第1項(本文p.221)。本文では育児休業給付金は、被保険者が原則として1歳に満たない子を養育するための育児休業をしたこと、及び当該育児休業(2回以上の場合は初回)を開始した日前2年間にみなし被保険者期間が通算して12か月以上あること等を要件として支給されるとされています。よって正しい記述です。"},{"law":"育児休業給付","cat":"育児休業給付金","q":"育児休業給付金の額は、休業開始時賃金日額に支給日数を乗じて得た額の100分の50に相当する額であるが、休業日数が通算して<b>180日</b>に達するまでの間に限り100分の67に相当する額である。","a":true,"exp":"〇。法61条の7第6項。休業日数180日まで100分の67、181日以降100分の50である。","page":228,"detail":"〇。法61条の7第6項(本文p.228)。本文では育児休業給付金の額は、休業開始時賃金日額に支給日数を乗じて得た額の100分の50に相当する額であるが、当該育児休業を開始した日から起算し支給に係る休業日数が通算して180日に達するまでの間に限り100分の67に相当する額とするとされています。よって181日目以降は100分の50となり、本問は正しい記述です。"},{"law":"育児休業給付","cat":"育児休業給付金","q":"育児休業の分割取得において、被保険者が同一の子について<b>3回以上</b>の育児休業をした場合における3回目以後の育児休業については、育児休業給付金は支給されない。","a":true,"exp":"〇。法61条の7第2項。同一の子について3回以上の育児休業をした場合の3回目以後の育児休業は支給されない(所定の場合を除く)。","page":227,"detail":"〇。法61条の7第2項(本文p.227)。本文では被保険者が同一の子について3回以上の育児休業(厚生労働省令で定める場合に該当するものを除く)をした場合における3回目以後の育児休業については、育児休業給付金は支給しないとされています。よって正しい記述です。"},{"law":"育児休業給付","cat":"育児休業給付金","q":"パパ・ママ育休プラスを取得する場合であっても、夫婦ともに被保険者であるときは、育児休業給付金の支給期間が通算される。","a":false,"exp":"×。法61条の7。夫婦ともに被保険者である場合であっても、育児休業給付金の支給期間は通算されない。","page":226,"detail":"×。法61条の7(本文p.226の注意)。本文では夫婦ともに被保険者である場合であっても、育児休業給付金の支給期間は通算されないと明記されています。よってパパ・ママ育休プラスを取得する場合に支給期間が通算されるとする本問は誤りです。"},{"law":"育児休業給付","cat":"育児休業給付金","q":"育児休業給付金の支給対象となるには、支給単位期間において公共職業安定所長が就業していると認める日数が<b>10日以下</b>(10日を超える場合は就業していると認める時間が80時間以下)であることが必要である。","a":true,"exp":"〇。則101条の22。就業日数10日以下(10日超の場合は80時間以下)であることが要件である。","page":222,"detail":"〇。則101条の22(本文p.222)。本文では支給対象となる育児休業の要件として、支給単位期間において公共職業安定所長が就業していると認める日数が10日以下(10日を超える場合は就業していると認める時間が80時間以下)であることが掲げられています。よって正しい記述です。"},{"law":"育児休業給付","cat":"出生時育児休業給付金","q":"出生時育児休業給付金は、その子の出生の日から起算して8週間を経過する日の翌日までの期間内に<b>4週間以内</b>の期間を定めて当該子を養育するための休業をした場合に支給される。","a":true,"exp":"〇。法61条の8第1項。出生後8週間を経過する日の翌日までの期間内に4週間以内の休業をした場合に支給される。","page":232,"detail":"〇。法61条の8第1項(本文p.232)。本文では出生時育児休業給付金は、被保険者がその子の出生の日から起算して8週間を経過する日の翌日までの期間内に4週間以内の期間を定めて当該子を養育するための休業(出生時育児休業)をした場合等に支給されるとされています。よって正しい記述です。"},{"law":"育児休業給付","cat":"出生時育児休業給付金","q":"出生時育児休業給付金の額は、休業開始時賃金日額に支給日数(28日を限度)を乗じて得た額の<b>100分の67</b>に相当する額である。","a":true,"exp":"〇。法61条の8第4項。休業開始時賃金日額に支給日数(28日限度)を乗じた額の100分の67に相当する額である。","page":234,"detail":"〇。法61条の8第4項(本文p.234)。本文では出生時育児休業給付金の額は、休業開始時賃金日額に支給日数(その日数が28日を超えるときは28日)を乗じて得た額の100分の67に相当する額とされています。よって正しい記述です。"},{"law":"育児休業給付","cat":"出生時育児休業給付金","q":"同一の子について被保険者がした出生時育児休業の日数を合算して得た日数が<b>28日</b>に達した日後の出生時育児休業については、出生時育児休業給付金は支給されない。","a":true,"exp":"〇。法61条の8第2項。合算日数が28日に達した日後及び3回目以後の出生時育児休業は支給されない。","page":234,"detail":"〇。法61条の8第2項(本文p.234)。本文では同一の子について被保険者がした出生時育児休業ごとに、開始日から終了日までの日数を合算して得た日数が28日に達した日後の出生時育児休業については支給しないとされ、また3回目以後の出生時育児休業も支給しないとされています。よって正しい記述です。"},{"law":"育児休業給付","cat":"出生後休業支援給付金","q":"出生後休業支援給付金は、対象期間内にした出生後休業の日数が通算して<b>14日以上</b>であること等の要件に該当するときに支給される。","a":true,"exp":"〇。法61条の10第1項。対象期間内の出生後休業の日数が通算14日以上であること等が要件である。","page":236,"detail":"〇。法61条の10第1項(本文p.236)。本文では出生後休業支援給付金は、対象期間内にした出生後休業の日数が通算して14日以上であるとき等の要件のいずれにも該当するときに支給されるとされています。配偶者の出生後休業についても14日以上等の要件があります。よって正しい記述です。"},{"law":"育児休業給付","cat":"出生後休業支援給付金","q":"出生後休業支援給付金の額は、賃金日額に相当する額に出生後休業をした日数(28日を限度)を乗じて得た額の<b>100分の30</b>に相当する額である。","a":false,"exp":"×。法61条の10第6項。出生後休業支援給付金の額は日数(28日限度)を乗じた額の「100分の13」に相当する額である。","page":238,"detail":"×。法61条の10第6項(本文p.238)。本文では出生後休業支援給付金の額は、賃金日額に相当する額に対象期間内に出生後休業をした日数(その日数が28日を超えるときは28日)を乗じて得た額の「100分の13」に相当する額とされています。よって100分の30とする本問は誤りです。"},{"law":"育児休業給付","cat":"育児時短就業給付金","q":"育児時短就業給付金は、被保険者がその<b>2歳に満たない子</b>を養育するための所定労働時間を短縮することによる就業をした場合に、支給対象月について支給される。","a":true,"exp":"〇。法61条の12第1項。2歳に満たない子を養育するための育児時短就業をした場合に支給される。","page":240,"detail":"〇。法61条の12第1項(本文p.240)。本文では育児時短就業給付金は、被保険者がその2歳に満たない子を養育するための所定労働時間を短縮することによる就業(育児時短就業)をした場合に、支給対象月について支給されるとされています。よって正しい記述です。"},{"law":"育児休業給付","cat":"育児時短就業給付金","q":"育児時短就業給付金の額は、原則として、支給対象月の賃金額が「育児時短就業開始時賃金日額×30」の額の100分の90未満である場合、支給対象月の賃金額の<b>100分の10</b>に相当する額である。","a":true,"exp":"〇。法61条の12第6項。賃金額が100分の90未満の場合は賃金額の100分の10に相当する額である。","page":242,"detail":"〇。法61条の12第6項(本文p.242)。本文では育児時短就業給付金の額は、支給対象月の賃金額が「育児時短就業開始時賃金日額×30」の額の100分の90未満である場合、支給対象月の賃金額に100分の10を乗じた額とされています。よって正しい記述です。"},{"law":"育児休業給付","cat":"育児時短就業給付金","q":"育児時短就業給付金の支給を受けることができる者が、同一の就業につき高年齢雇用継続基本給付金の支給を受けたときは、育児時短就業給付金は支給されない。","a":true,"exp":"〇。法61条の12第10項。高年齢雇用継続基本給付金等を受けたときは育児時短就業給付金は支給されない(支給調整)。","page":243,"detail":"〇。法61条の12第10項(本文p.243)。本文では育児時短就業給付金の支給を受けることができる者が、同一の就業につき高年齢雇用継続基本給付金又は高年齢再就職給付金の支給を受けたときは、育児時短就業給付金を支給しないとされています。よって正しい記述です。"},{"law":"雇用保険二事業","cat":"雇用保険二事業","q":"雇用保険二事業は、雇用安定事業及び<b>能力開発事業</b>の2つの事業に区分されている。","a":true,"exp":"〇。法62条等。雇用保険二事業は雇用安定事業及び能力開発事業の2つに区分される。","page":246,"detail":"〇。法62条等(本文p.246)。本文では雇用保険二事業は、雇用安定事業及び能力開発事業の2つの事業に区分されているとされています。よって正しい記述です。"},{"law":"雇用保険二事業","cat":"雇用安定事業","q":"雇用安定事業は、被保険者、被保険者であった者及び<b>被保険者になろうとする者</b>に関して行われる。","a":true,"exp":"〇。法62条1項。雇用安定事業は被保険者等(被保険者・被保険者であった者・被保険者になろうとする者)に関して行われる。","page":246,"detail":"〇。法62条1項(本文p.246)。本文では政府は、被保険者、被保険者であった者及び被保険者になろうとする者(被保険者等)に関して、失業の予防、雇用状態の是正、雇用機会の増大その他雇用の安定を図るため、雇用安定事業を行うことができるとされています。よって被保険者になろうとする者を含むとする本問は正しい記述です。"},{"law":"雇用保険二事業","cat":"助成金","q":"雇用保険二事業として支給される助成金等には、雇用保険法の受給権保護の規定は適用されず、租税その他の公課の対象となる。","a":true,"exp":"〇。法11条、12条参照。二事業に係る給付金には受給権保護・公課の禁止の規定は適用されない。","page":248,"detail":"〇。法11条・12条参照(本文p.248の注意)。本文では雇用保険二事業として支給される助成金等には、雇用保険法の受給権保護の規定は適用されず、租税その他の公課の対象になると明記されています。よって正しい記述です。"},{"law":"雇用保険二事業","cat":"助成金等の不支給","q":"雇用関係助成金は、過去<b>5年以内</b>に偽りその他不正の行為により給付金の支給を受け、又は受けようとした事業主等に対しては支給されない。","a":true,"exp":"〇。則120条の2。過去5年以内に不正受給した事業主等に対しては支給されない。","page":249,"detail":"〇。則120条の2(本文p.249)。本文では雇用関係助成金は、過去5年以内に偽りその他不正の行為により雇用調整助成金その他の雇用保険二事業の規定により支給される給付金の支給を受け、もしくは受けようとした事業主又は事業主団体に対しては支給しないとされています。よって正しい記述です。"},{"law":"雇用保険二事業","cat":"就職支援法事業","q":"政府は、能力開発事業として、求職者支援法に規定する特定求職者に対して<b>職業訓練受講給付金</b>を支給することができる。","a":true,"exp":"〇。法64条。就職支援法事業として特定求職者に職業訓練受講給付金を支給できる。","page":251,"detail":"〇。法64条(本文p.251)。本文では政府は、能力開発事業(就職支援法事業)として、求職者支援法に規定する特定求職者に対して職業訓練受講給付金を支給することができるとされています。よって正しい記述です。"},{"law":"雇用保険二事業","cat":"事業の実施","q":"政府は、雇用安定事業及び能力開発事業の一部を<b>独立行政法人高齢・障害・求職者雇用支援機構</b>に行わせる。","a":true,"exp":"〇。法62条3項、63条3項。雇用安定事業及び能力開発事業の一部を当該機構に行わせる。","page":252,"detail":"〇。法62条3項、63条3項(本文p.252)。本文では政府は、雇用安定事業の一部及び能力開発事業の一部を、それぞれ独立行政法人高齢・障害・求職者雇用支援機構に行わせるとされています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"国庫負担","q":"失業等給付のうち、高年齢求職者給付金、就職促進給付及び高年齢雇用継続給付に要する費用については、<b>国庫負担は行われない</b>。","a":true,"exp":"〇。法66条等。高年齢求職者給付金、就職促進給付、教育訓練給付(休暇給付金除く)、高年齢雇用継続給付には国庫負担はない。","page":256,"detail":"〇。法66条等(本文p.256の注意)。本文では失業等給付のうち高年齢求職者給付金、就職促進給付、教育訓練給付(教育訓練休暇給付金を除く)及び高年齢雇用継続給付に要する費用については、国庫負担は行われないと明記されています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"国庫負担","q":"育児休業給付に要する費用に係る国庫負担の割合は、<b>4分の1</b>である。","a":false,"exp":"×。法66条。育児休業給付及び雇用継続給付(介護休業給付金に限る)の国庫負担割合は「8分の1」である。","page":256,"detail":"×。法66条(本文p.256の表)。本文の国庫負担の表では、育児休業給付に要する費用に係る国庫負担の割合は8分の1とされています(雇用継続給付のうち介護休業給付金も8分の1)。よって4分の1とする本問は誤りです。"},{"law":"費用・不服申立て・その他","cat":"国庫負担","q":"就職支援法事業以外の雇用保険二事業には、国庫負担はなく、事業主が負担する保険料で賄われる。","a":true,"exp":"〇。法。就職支援法事業以外の二事業には国庫負担はなく、事業主負担の保険料で賄われる。","page":257,"detail":"〇。法・本文p.257。本文のポイント解説では、就職支援法事業以外の雇用保険二事業には国庫負担はなく、事業主が負担する保険料で賄われるとされています。なお就職支援法事業に要する費用(職業訓練受講給付金分を除く)は予算の範囲内で国庫が負担します。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"子ども・子育て支援納付金","q":"出生後休業支援給付及び育児時短就業給付に要する費用は、子ども・子育て支援法の規定により政府が徴収する<b>子ども・子育て支援納付金</b>をもって充てるものとされている。","a":true,"exp":"〇。法68条の2。出生後休業支援給付及び育児時短就業給付の費用は子ども・子育て支援納付金をもって充てる。","page":258,"detail":"〇。法68条の2(本文p.258)。本文では出生後休業支援給付及び育児時短就業給付に要する費用並びにこれらの給付に関する事務の執行に要する経費については、子ども・子育て支援法の規定により政府が徴収する子ども・子育て支援納付金をもって充てるとされています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"審査請求","q":"被保険者の資格の取得・喪失の確認に関する処分等に不服のある者は、<b>雇用保険審査官</b>に対して審査請求をし、その決定に不服のある者は労働保険審査会に対して再審査請求をすることができる。","a":true,"exp":"〇。法69条1項。雇用保険審査官への審査請求、労働保険審査会への再審査請求ができる。","page":259,"detail":"〇。法69条1項(本文p.259)。本文では被保険者の資格の取得又は喪失の確認に関する処分、失業等給付等に関する処分等に不服のある者は、雇用保険審査官に対して審査請求をし、その決定に不服のある者は労働保険審査会に対して再審査請求をすることができるとされています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"審査請求期間","q":"審査請求は、処分があったことを知った日の翌日から起算して<b>2か月</b>を経過したときは、することができない。","a":false,"exp":"×。労働保険審査官及び労働保険審査会法。審査請求は処分を知った日の翌日から起算して「3か月」を経過したときはできない。再審査請求が2か月である。","page":259,"detail":"×。労働保険審査官及び労働保険審査会法8条(本文p.259)。本文では審査請求は、処分があったことを知った日の翌日から起算して「3か月」を経過したときはすることができないとされています。2か月を経過したときはできないのは再審査請求(決定書謄本送付の翌日から起算)であり、本問は誤りです。"},{"law":"費用・不服申立て・その他","cat":"審査請求","q":"審査請求をしている者は、審査請求をした日の翌日から起算して<b>3か月</b>を経過しても決定がないときは、審査請求が棄却されたものとみなすことができる。","a":true,"exp":"〇。法69条2項。審査請求日の翌日から3か月経過しても決定がないときは棄却されたものとみなすことができる。","page":259,"detail":"〇。法69条2項(本文p.259)。本文では審査請求をしている者は、審査請求をした日の翌日から起算して3か月を経過しても審査請求についての決定がないときは、雇用保険審査官が審査請求を棄却したものとみなすことができるとされています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"不服申立ての前置","q":"確認等の処分の取消しの訴えは、当該処分についての審査請求に対する雇用保険審査官の決定を経た後でなければ提起することができない。","a":true,"exp":"〇。法71条。処分の取消しの訴えは雇用保険審査官の決定を経た後でなければ提起できない(審査請求前置)。","page":260,"detail":"〇。法71条(本文p.260)。本文では資格の取得又は喪失の確認に関する処分等の取消しの訴えについては、当該処分についての審査請求に対する雇用保険審査官の決定を経た後でなければ提起することができないとされています(審査請求前置)。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"時効","q":"失業等給付等の支給を受け、又はその返還を受ける権利は、これらを行使することができる時から<b>2年</b>を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法74条1項。失業等給付等の支給を受ける権利等は2年の時効で消滅する。","page":262,"detail":"〇。法74条1項(本文p.262)。本文では失業等給付等の支給を受け、又はその返還を受ける権利等は、これらを行使することができる時から2年を経過したときは、時効によって消滅するとされています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"時効","q":"被保険者の資格の取得又は喪失の確認に係る請求をする権利は、2年の消滅時効の対象である。","a":false,"exp":"×。法74条。資格の取得・喪失の確認に係る請求をする権利は、この時効の規定の対象ではない。","page":262,"detail":"×。法74条(本文p.262のポイント解説)。本文では被保険者の資格の取得又は喪失の確認に係る請求をする権利は、この時効の規定の対象ではないと明記されています。よって2年の消滅時効の対象とする本問は誤りです。"},{"law":"費用・不服申立て・その他","cat":"診断","q":"行政庁は、求職者給付の支給を行うため必要があると認めるときは、失業の認定を受けようとする者等に対して、その指定する<b>医師の診断</b>を受けるべきことを命ずることができる。","a":true,"exp":"〇。法78条。求職者給付の支給のため必要があるときは指定する医師の診断を受けるべきことを命ずることができる。","page":264,"detail":"〇。法78条(本文p.264)。本文では行政庁は、求職者給付の支給を行うため必要があると認めるときは、失業の認定を受けようとする者、受給期間の延長に係る申出をした者又は傷病手当の支給を受けようとする者に対して、その指定する医師の診断を受けるべきことを命ずることができるとされています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"罰則","q":"事業主が被保険者に関する届出をせず、又は偽りの届出をした場合等は、<b>6か月以下の拘禁刑又は30万円以下の罰金</b>に処せられる。","a":true,"exp":"〇。法83条。事業主等が届出義務違反等をした場合は6か月以下の拘禁刑又は30万円以下の罰金に処せられる。","page":265,"detail":"〇。法83条(本文p.265)。本文では事業主又は労働保険事務組合が、被保険者に関する届出の規定に違反して届出をせず又は偽りの届出をした場合等は、6か月以下の拘禁刑又は30万円以下の罰金に処せられるとされています。よって正しい記述です。"},{"law":"費用・不服申立て・その他","cat":"証明書の交付","q":"離職した者は、従前の事業主等に対して、求職者給付の支給を受けるために必要な証明書の交付を請求することができる。","a":true,"exp":"〇。法76条3項。離職した者は従前の事業主等に求職者給付の支給に必要な証明書の交付を請求できる。","page":265,"detail":"〇。法76条3項(本文p.265)。本文では離職した者は、従前の事業主又は当該事業主から委託を受けた労働保険事務組合に対して、求職者給付の支給を受けるために必要な証明書の交付を請求することができ、請求があったときは事業主等はこれを交付しなければならないとされています。よって正しい記述です。"}],"choushu":[{"law":"総則・定義","cat":"徴収法の趣旨","q":"徴収法は、労働保険の事業の効率的な運営を図るため、労働保険の保険関係の成立及び消滅、労働保険料の納付の手続、労働保険事務組合等に関し必要な事項を定めるものである。","a":true,"exp":"〇。法1条のとおり。労働保険の事業の効率的な運営を図るため、保険関係の成立・消滅、労働保険料の納付の手続、労働保険事務組合等に関し必要な事項を定めている。","page":12,"detail":"〇。法1条のとおり、徴収法は労働保険の事業の効率的な運営を図るため、労働保険の保険関係の成立及び消滅、労働保険料の納付の手続、労働保険事務組合等に関し必要な事項を定めるものとされている。問題文は条文をそのまま記したものである。なお「労働保険」とは労災保険及び雇用保険の総称をいう(法2条1項)。"},{"law":"総則・定義","cat":"労働保険の定義","q":"「労働保険」とは、労働者災害補償保険及び雇用保険の総称であるが、健康保険もこれに含まれる。","a":false,"exp":"×。法2条1項。労働保険とは労災保険及び雇用保険の総称であり、健康保険は含まれない。","page":12,"detail":"×。法2条1項により「労働保険」とは、労災保険法による労働者災害補償保険(労災保険)及び雇用保険法による雇用保険の総称をいう。健康保険は労働保険には含まれない。健康保険は社会保険に属し徴収法の対象外であるため、本問は誤りである。"},{"law":"総則・定義","cat":"保険年度","q":"徴収法における「保険年度」とは、毎年4月1日から翌年3月31日までをいう。","a":true,"exp":"〇。法2条4項のとおり、保険年度は4月1日から翌年3月31日までをいう。","page":12,"detail":"〇。法2条4項のとおり、「保険年度」とは4月1日から翌年3月31日までをいう。年度更新等の各種期限はこの保険年度を基準として定められており、暦年(1月から12月)とは異なる点に注意する。"},{"law":"総則・定義","cat":"期間の計算","q":"「保険関係が成立した日から10日以内」という場合、保険関係が成立した日を初日に算入して計算する。","a":false,"exp":"×。民法140条。原則として期間の初日は算入せず翌日から起算する。保険関係が成立した日は含めず、その翌日を1日目として計算する。","page":13,"detail":"×。民法140条により、原則として期間を計算する場合には期間の初日は算入せず翌日から起算する(翌日起算)。したがって「保険関係が成立した日から10日以内」という場合は、成立した日は含めず、その翌日を1日目として計算する。本問は初日に算入するとしている点で誤り。"},{"law":"総則・定義","cat":"期間の計算","q":"「保険年度の6月1日から40日以内」という場合は、その期間が午前0時から始まることになるので、6月1日を1日目として計算する。","a":true,"exp":"〇。民法140条ただし書。午前0時から始まるときはその日から起算するため、6月1日を1日目として計算する(当日起算)。","page":13,"detail":"〇。民法140条ただし書のとおり、その期間が午前0時から始まるときはその日から起算する(当日起算)。「保険年度の6月1日から40日以内」のような場合は午前0時から始まるため、6月1日を1日目として計算する。年度更新の納期限はこの当日起算による。"},{"law":"総則・定義","cat":"賃金の定義","q":"「賃金」とは、賃金、給料、手当、賞与その他名称のいかんを問わず、労働の対償として事業主が労働者に支払うものをいう。","a":true,"exp":"〇。法2条2項のとおり。名称のいかんを問わず労働の対償として事業主が労働者に支払うものをいう。","page":14,"detail":"〇。法2条2項のとおり、「賃金」とは、賃金、給料、手当、賞与その他名称のいかんを問わず、労働の対償として事業主が労働者に支払うもの(通貨以外のもので支払われるもののうち厚生労働省令で定める範囲外のものを除く)をいう。労働保険料算定の基礎を明らかにするための定義である。"},{"law":"賃金の範囲","cat":"賃金該当性","q":"労働基準法26条の規定に基づく休業手当は、賃金には該当しない。","a":false,"exp":"×。休業手当(労基法26条に基づくもの)は賃金に該当する。一方、休業補償や解雇予告手当は賃金に該当しない。","page":15,"detail":"×。賃金早見表のとおり、労働基準法26条の規定に基づく休業手当は賃金に該当する。一方、休業補償(労基法上平均賃金の100分の60が最低基準)や解雇予告手当は賃金に該当しない。本問は休業手当を賃金に該当しないとしている点で誤り。"},{"law":"賃金の範囲","cat":"賃金該当性","q":"通勤手当及び家族手当は、いずれも労働保険料の算定基礎となる賃金に該当する。","a":true,"exp":"〇。賃金早見表のとおり、通勤手当及び家族手当はいずれも賃金に該当する。","page":15,"detail":"〇。賃金早見表のとおり、通勤手当及び家族手当はいずれも賃金(労働の対償)に該当し、労働保険料の算定基礎となる賃金総額に算入する。基本給・賞与等とともに賃金に含まれるものとして整理されている。"},{"law":"賃金の範囲","cat":"賃金該当性","q":"労働協約等で支給条件が明確に定められている結婚祝金・死亡弔慰金・災害見舞金は、賃金に該当する。","a":false,"exp":"×。結婚祝金・死亡弔慰金・災害見舞金は、労働協約等で支給条件が明確であるか否かを問わず賃金に該当しない。","page":15,"detail":"×。賃金早見表のとおり、結婚祝金・死亡弔慰金・災害見舞金は、労働協約等で支給条件が明確であるか否かを問わず賃金に該当しない。支給条件が明確であれば賃金に該当するわけではないため、本問は誤りである。"},{"law":"賃金の範囲","cat":"賃金該当性","q":"解雇予告手当及び出張旅費は、いずれも賃金に該当しない。","a":true,"exp":"〇。賃金早見表のとおり、解雇予告手当及び出張旅費はいずれも賃金に該当しない。","page":15,"detail":"〇。賃金早見表のとおり、解雇予告手当及び出張旅費はいずれも賃金に該当しない。出張旅費は実費弁償的性格、解雇予告手当は労働の対償でないためである。なお休業補償・生命保険掛金・作業衣等も賃金に該当しない。"},{"law":"賃金の範囲","cat":"現物給与","q":"通貨以外のもので支払われる現物給与の価額は、全国一律で厚生労働大臣が定めている。","a":false,"exp":"×。則3条、通達。現物給与の価額は都道府県ごとに定められており、労働者の勤務地が所在する都道府県の価額を適用する。","page":14,"detail":"×。則3条及び平25.2.4基労徴発0204第2号により、現物給与の価額は都道府県ごとに定められており、労働者の勤務地(常時勤務する場所)が所在する都道府県の価額を適用する。全国一律ではない。なお派遣労働者は派遣元事業所所在地の都道府県の価額を適用する。"},{"law":"賃金の範囲","cat":"退職金の前払い","q":"労働者が在職中に退職金相当額の全部又は一部を給与や賞与に上乗せして前払いされる場合、原則として一般保険料の算定基礎となる賃金総額に算入する。","a":true,"exp":"〇。通達のとおり。在職中に前払いされる退職金相当額は労働の対償としての性格が明確であり、原則として賃金総額に算入する。","page":15,"detail":"〇。平15.10.1基徴発1001001号等の通達のとおり、労働者が在職中に退職金相当額の全部又は一部を給与や賞与に上乗せして前払いされる場合は、労働の対償としての性格が明確であり経常的収入の意義を有するため、原則として一般保険料の算定基礎となる賃金総額に算入する。退職時に支払われる退職金は算入しない。"},{"law":"総則・定義","cat":"事業の分類","q":"徴収法上、有期事業として扱われるのは労災保険に係る保険関係だけであり、雇用保険に係る保険関係は有期事業として扱われない。","a":true,"exp":"〇。注意書きのとおり。有期事業として扱われるのは労災保険に係る保険関係だけで、雇用保険に係る保険関係は有期事業として扱われない。","page":17,"detail":"〇。p.17の注意書きのとおり、徴収法において有期事業として扱われるのは労災保険に係る保険関係だけであり、雇用保険に係る保険関係は有期事業として扱われない。有期事業の具体例は建設の事業と立木の伐採の事業である。"},{"law":"総則・定義","cat":"二元適用事業","q":"建設の事業及び農林、畜産、養蚕、水産の事業(船員が雇用される事業を除く)は、二元適用事業とされる。","a":true,"exp":"〇。法39条1項、則70条。都道府県・市町村等の事業、港湾運送の事業、農林水産の事業、建設の事業が二元適用事業とされる。","page":18,"detail":"〇。法39条1項、則70条のとおり、二元適用事業は、都道府県・市町村等が行う事業、港湾労働法上の港湾運送の行為を行う事業、農林・畜産・養蚕・水産の事業(船員が雇用される事業を除く)、建設の事業である。本問はこのうち農林水産の事業及び建設の事業を正しく記している。"},{"law":"総則・定義","cat":"暫定任意適用事業","q":"「暫定任意適用事業」とは、事業主が任意加入の申請をして、都道府県知事の認可を受けて保険関係が成立する事業をいう。","a":false,"exp":"×。暫定任意適用事業は、事業主が任意加入の申請をして厚生労働大臣の認可を受けて保険関係が成立する事業である。認可するのは厚生労働大臣である。","page":17,"detail":"×。「暫定任意適用事業」とは、事業主が任意加入の申請をして厚生労働大臣の認可を受けて保険関係が成立する事業をいう(p.17)。認可するのは都道府県知事ではなく厚生労働大臣である(認可権限は都道府県労働局長に委任されている)。本問は誤り。"},{"law":"総則・定義","cat":"権限委任","q":"徴収法に定める厚生労働大臣の権限は、厚生労働省令で定めるところにより、その全部を都道府県労働局長に委任しなければならない。","a":false,"exp":"×。法45条。厚生労働大臣の権限は、その一部を都道府県労働局長に委任することが「できる」のであって、全部を委任しなければならないわけではない。","page":21,"detail":"×。法45条のとおり、徴収法に定める厚生労働大臣の権限は、厚生労働省令で定めるところにより、その「一部」を都道府県労働局長に委任することが「できる」とされている。全部を委任しなければならないわけではないため、本問は誤りである。"},{"law":"保険関係の成立・消滅","cat":"成立時期","q":"労災保険の適用事業の事業主については、その事業が開始された日に、その事業につき労災保険に係る労働保険の保険関係が成立する。","a":true,"exp":"〇。法3条のとおり。労災保険の適用事業については、その事業が開始された日に労災保険に係る保険関係が成立する(法律上当然に成立)。","page":24,"detail":"〇。法3条のとおり、労災保険の適用事業の事業主については、その事業が開始された日に、その事業につき労災保険に係る労働保険の保険関係が成立する。法律上当然に保険関係が成立する強制適用事業である。"},{"law":"保険関係の成立・消滅","cat":"成立届","q":"保険関係が成立した事業の事業主は、その成立した日の翌日から起算して10日以内に、所定事項を政府に届け出なければならない。","a":true,"exp":"〇。法4条の2第1項。保険関係が成立した日(翌日起算)から10日以内に保険関係成立届を提出しなければならない。","page":25,"detail":"〇。法4条の2第1項のとおり、保険関係が成立した事業の事業主は、その成立した日(翌日起算)から10日以内に、成立した日・事業主の氏名等・事業の種類・事業の場所その他所定事項を政府に届け出なければならない。この届書を保険関係成立届という。"},{"law":"保険関係の成立・消滅","cat":"成立届","q":"保険関係成立届は、その成立した日の翌日から起算して20日以内に提出しなければならない。","a":false,"exp":"×。法4条の2第1項。保険関係成立届は成立した日の翌日から起算して10日以内に提出しなければならない。20日ではない。","page":25,"detail":"×。法4条の2第1項により、保険関係成立届はその成立した日(翌日起算)から「10日以内」に提出しなければならない。20日以内ではないため本問は誤りである。提出先は事務の所轄区分により所轄労働基準監督署長又は所轄公共職業安定所長である。"},{"law":"保険関係の成立・消滅","cat":"変更届","q":"保険関係が成立している事業の事業主は、所定の届出事項に変更があったときは、変更が生じた日の翌日から起算して10日以内に、その旨を政府に届け出なければならない。","a":true,"exp":"〇。法4条の2第2項、則5条。届出事項に変更があったときは、変更が生じた日の翌日から起算して10日以内に届け出なければならない。","page":26,"detail":"〇。法4条の2第2項、則5条のとおり、保険関係が成立している事業の事業主は、届出事項のうち所定の事項に変更があったときは、変更が生じた日の翌日から起算して10日以内に、名称・所在地等変更届を提出して政府に届け出なければならない。"},{"law":"保険関係の成立・消滅","cat":"成立票","q":"労災保険に係る保険関係が成立している事業のうち立木の伐採の事業に係る事業主は、労災保険関係成立票を見やすい場所に掲げなければならない。","a":false,"exp":"×。則77条。労災保険関係成立票を掲げなければならないのは、建設の事業に係る事業主である。立木の伐採の事業ではない。","page":27,"detail":"×。則77条により、労災保険関係成立票を見やすい場所に掲げなければならないのは、労災保険に係る保険関係が成立している事業のうち「建設の事業」に係る事業主である。立木の伐採の事業ではないため本問は誤りである。"},{"law":"保険関係の成立・消滅","cat":"雇用保険任意加入","q":"雇用保険暫定任意適用事業について、事業主が任意加入の申請をするには、その事業に使用される労働者の過半数の同意を得なければならない。","a":false,"exp":"×。法附則2条等。雇用保険暫定任意適用事業の任意加入申請には、労働者の2分の1以上の同意が必要である。過半数ではない。","page":28,"detail":"×。法附則2条等により、雇用保険暫定任意適用事業の任意加入申請には、その事業に使用される労働者の「2分の1以上」の同意が必要である。過半数ではない。雇用保険は被保険者に保険料負担が生じるため多数の同意を求めている。"},{"law":"保険関係の成立・消滅","cat":"労災保険任意加入","q":"労災保険暫定任意適用事業については、その事業に使用される労働者の過半数が希望するときは、事業主に任意加入の申請義務が生じる。","a":true,"exp":"〇。法附則2条等。労災保険暫定任意適用事業では、使用される労働者の過半数が希望するときは、事業主に任意加入の申請義務が生じる。","page":28,"detail":"〇。法附則2条等のとおり、労災保険暫定任意適用事業では、その事業に使用される労働者の過半数が希望するときは、事業主に任意加入の申請義務が生じる。労災保険は労働者に保険料負担が生じないため、同意は不要で過半数の希望により申請義務が発生する。"},{"law":"保険関係の成立・消滅","cat":"暫定任意適用の成立日","q":"暫定任意適用事業が任意加入の申請をした場合、厚生労働大臣の認可があった日の翌日にその事業につき保険関係が成立する。","a":false,"exp":"×。法附則2条1項等。任意加入の申請をした場合、厚生労働大臣の認可があった「日」に保険関係が成立する。翌日ではない。","page":29,"detail":"×。法附則2条1項等により、任意加入の申請をした場合、厚生労働大臣の認可があった「日」にその事業につき保険関係が成立する。認可があった日の翌日ではないため本問は誤り(消滅は認可があった日の翌日である点と区別する)。"},{"law":"保険関係の成立・消滅","cat":"暫定任意適用の消滅","q":"労災保険暫定任意適用事業について保険関係を消滅させるには、その事業に使用される労働者の4分の3以上の同意を得る必要がある。","a":false,"exp":"×。法附則4条等。労災保険暫定任意適用事業の消滅には労働者の過半数の同意等が必要である。4分の3以上の同意が必要なのは雇用保険暫定任意適用事業である。","page":31,"detail":"×。法附則4条等により、労災保険暫定任意適用事業の保険関係の消滅には、労働者の「過半数」の同意のほか保険関係成立後1年経過等が必要である。4分の3以上の同意が必要なのは雇用保険暫定任意適用事業の消滅であるため、本問は誤りである。"},{"law":"保険関係の成立・消滅","cat":"暫定任意適用の消滅","q":"労災保険暫定任意適用事業の保険関係を消滅させるには、労災保険に係る保険関係が成立した後1年を経過していることが要件の一つである。","a":true,"exp":"〇。法附則4条等。労災保険暫定任意適用事業の消滅要件には、労働者の過半数の同意のほか、保険関係成立後1年を経過していること等がある。","page":31,"detail":"〇。法附則4条等のとおり、労災保険暫定任意適用事業の消滅要件には、事業主の消滅申請・厚生労働大臣の認可・労働者の過半数の同意のほか、労災保険に係る保険関係が成立した後1年を経過していること等がある。本問はその要件の一つを正しく記している。"},{"law":"保険関係の成立・消滅","cat":"暫定任意適用の消滅日","q":"暫定任意適用事業が保険関係の消滅の申請をした場合、厚生労働大臣の認可があった日の翌日に、その事業についての保険関係が消滅する。","a":true,"exp":"〇。法附則4条1項等。保険関係の消滅の申請をした場合、厚生労働大臣の認可があった日の翌日に保険関係が消滅する。","page":33,"detail":"〇。法附則4条1項等のとおり、保険関係の消滅の申請をした場合、厚生労働大臣の認可があった日の「翌日」に、その事業についての保険関係が消滅する。成立は認可があった日(当日)である点と区別して整理する。"},{"law":"保険関係の一括","cat":"有期事業の一括","q":"有期事業の一括は、労災保険に係る保険関係が成立している建設の事業又は立木の伐採の事業のみが対象となり、雇用保険に係る保険関係については一括されない。","a":true,"exp":"〇。法7条等。有期事業の一括の対象は労災保険に係る建設の事業又は立木の伐採の事業のみで、雇用保険に係る保険関係は一括されない。","page":35,"detail":"〇。法7条等のとおり、有期事業の一括は、労災保険に係る保険関係が成立している建設の事業又は立木の伐採の事業のみが対象であり、雇用保険に係る保険関係については一括されない。本問は対象範囲を正しく記している。"},{"law":"保険関係の一括","cat":"有期事業の一括の要件","q":"有期事業の一括の要件として、それぞれの事業の概算保険料に相当する額が160万円未満であり、かつ建設の事業にあっては請負金額が1億1,000万円未満であることが必要である。","a":false,"exp":"×。則6条。建設の事業の請負金額要件は1億8,000万円未満である。1億1,000万円は有期事業のメリット制の適用要件で用いる額である。","page":36,"detail":"×。則6条により、有期事業の一括の要件は、それぞれの事業の概算保険料相当額が160万円未満であり、かつ建設の事業にあっては請負金額が「1億8,000万円未満」であることである。1億1,000万円は有期事業のメリット制の適用要件で用いる額であり、本問は混同したもので誤り。"},{"law":"保険関係の一括","cat":"有期事業の一括の要件","q":"有期事業の一括が行われるには、それぞれの事業について許認可など一括のための特別な手続が必要である。","a":false,"exp":"×。法7条。有期事業の一括は要件を満たせば法律上当然に行われ、許認可など一括のための特別な手続は不要である。","page":37,"detail":"×。法7条のとおり、有期事業の一括は要件をすべて満たせば法律上当然に行われ、許認可など一括のための特別な手続は必要ない。要件を満たすことで全体が一の事業(一括有期事業)とみなされるため、本問は誤りである。"},{"law":"保険関係の一括","cat":"一括有期事業の報告","q":"一括有期事業の事業主は、次の保険年度の6月1日から起算して50日以内又は保険関係が消滅した日から起算して40日以内に、一括有期事業報告書を提出しなければならない。","a":false,"exp":"×。則34条。一括有期事業報告書は、次の保険年度の6月1日から起算して40日以内、又は保険関係消滅日から起算して50日以内に提出する。日数が逆である。","page":37,"detail":"×。則34条により、一括有期事業報告書は、次の保険年度の6月1日から起算して「40日以内」又は保険関係が消滅した日から起算して「50日以内」に、所轄都道府県労働局歳入徴収官に提出する。本問は40日と50日が逆になっており誤りである。"},{"law":"保険関係の一括","cat":"請負事業の一括","q":"請負事業の一括は、労災保険に係る保険関係が成立している建設の事業のうち数次の請負によって行われる事業について、事業主の申請により行われる。","a":false,"exp":"×。法8条1項。請負事業の一括は、要件を満たせば法律上当然に行われ、事業主の申請は不要である。下請負事業の分離が任意の手続である。","page":38,"detail":"×。法8条1項のとおり、請負事業の一括は、労災保険に係る保険関係が成立している建設の事業のうち数次の請負によって行われる事業について、要件を満たせば法律上当然に行われ、事業主の申請は不要である。申請(共同申請)が必要なのは下請負事業の分離であるため本問は誤り。"},{"law":"保険関係の一括","cat":"請負事業の一括","q":"請負事業の一括が行われると、下請負人が使用する日雇労働被保険者に係る印紙保険料の納付義務も元請負人が負う。","a":false,"exp":"×。法8条1項。雇用保険に係る保険関係は請負事業の一括の対象でないため、下請負人が使用する日雇労働被保険者に係る印紙保険料の納付義務はその下請負人が負う。","page":39,"detail":"×。法8条1項及びp.39注意書きのとおり、雇用保険に係る保険関係は請負事業の一括の対象ではなく事業ごとに徴収法が適用される。したがって下請負人が使用する日雇労働被保険者に係る印紙保険料の納付義務は、その下請負人が負う。元請負人ではないため本問は誤り。"},{"law":"保険関係の一括","cat":"下請負事業の分離","q":"下請負事業の分離を行うには、下請負人の請負に係る建設の事業の請負金額が1億8,000万円以上、又は概算保険料に相当する額が160万円以上であることが必要である。","a":true,"exp":"〇。法8条2項、則9条。下請負事業の分離は、請負金額1億8,000万円以上、又は概算保険料相当額160万円以上の事業が対象となる。","page":40,"detail":"〇。法8条2項、則9条のとおり、下請負事業の分離は、下請負人の請負に係る建設の事業の請負金額が1億8,000万円以上、又は概算保険料に相当する額が160万円以上である事業が対象となる。有期事業の一括の対象とならない規模の事業が該当する。"},{"law":"保険関係の一括","cat":"下請負事業の分離","q":"下請負事業の分離の申請は、元請負人又は下請負人のいずれか一方のみで行うことができる。","a":false,"exp":"×。法8条2項。下請負事業の分離は、元請負人及び下請負人が共同で申請しなければならず、いずれか一方のみでは申請できない。","page":40,"detail":"×。法8条2項及びp.40注意書きのとおり、下請負事業の分離の申請は、元請負人及び下請負人が「共同」で(原則として保険関係成立日の翌日から起算して10日以内に所轄都道府県労働局長へ申請書を提出し厚生労働大臣の認可を受け)行う必要があり、いずれか一方のみでは申請できない。本問は誤り。"},{"law":"保険関係の一括","cat":"継続事業の一括の要件","q":"継続事業の一括の要件として、それぞれの事業が、事業の種類(労災保険率表における事業の種類)を同じくしていることが必要である。","a":true,"exp":"〇。法9条、則10条。継続事業の一括は、事業主が同一人、それぞれが継続事業、保険関係の成立形態が同一、事業の種類が同一であることが要件である。","page":42,"detail":"〇。法9条、則10条のとおり、継続事業の一括の要件の一つとして、それぞれの事業が事業の種類(労災保険率表における事業の種類)を同じくしていることが必要である。ほかに事業主が同一人、それぞれが継続事業、保険関係の成立形態が同一であることが要件である。"},{"law":"保険関係の一括","cat":"継続事業の一括","q":"継続事業の一括については、一括の対象となる事業に地域的制限が設けられている。","a":false,"exp":"×。通達。継続事業の一括では、一括の対象となる事業に地域的制限は設けられていない。","page":42,"detail":"×。昭40.7.31基発901号の通達(p.42注意書き)のとおり、継続事業の一括については、一括の対象となる事業に地域的制限は設けられていない。本問は地域的制限が設けられているとしている点で誤りである。"},{"law":"保険関係の一括","cat":"継続事業の一括の効果","q":"継続事業の一括について厚生労働大臣の認可があったときは、被一括事業の保険関係は消滅し、確定精算の手続を行わなければならない。","a":true,"exp":"〇。法9条、通達。継続事業の一括により被一括事業の保険関係は消滅し、保険関係の消滅による確定精算の手続が必要となる。","page":44,"detail":"〇。法9条及び昭40.7.31基発901号のとおり、継続事業の一括について厚生労働大臣の認可があったときは、指定事業以外の事業(被一括事業)の保険関係は消滅し、保険関係の消滅による労働保険料の確定精算に関する手続を行わなければならない。本問は正しい。"},{"law":"労働保険料の種類・算定","cat":"労働保険料の種類","q":"第1種・第2種・第3種特別加入保険料は労災保険に係る保険料であり、印紙保険料及び特例納付保険料は雇用保険に係る保険料である。","a":true,"exp":"〇。法10条等。特別加入保険料は労災保険に係る保険料、印紙保険料及び特例納付保険料は雇用保険に係る保険料である。","page":48,"detail":"〇。法10条等のとおり、第1種・第2種・第3種特別加入保険料は労災保険に係る保険料、印紙保険料及び特例納付保険料は雇用保険に係る保険料である。p.48のポイント解説で示された区分のとおりであり本問は正しい。"},{"law":"賃金の範囲","cat":"賃金総額","q":"賃金総額には、日雇労働被保険者に係る賃金は含まれない。","a":false,"exp":"×。法11条2項、注意書き。賃金総額には日雇労働被保険者に係る賃金も含まれる。","page":50,"detail":"×。法11条2項及びp.50注意書きのとおり、賃金総額には日雇労働被保険者に係る賃金も含まれる。賃金総額は事業に使用するすべての労働者に支払う賃金の総額であるため、日雇労働被保険者の賃金を除くとする本問は誤りである。"},{"law":"賃金の範囲","cat":"賃金総額の特例","q":"請負による建設の事業で賃金総額を正確に算定することが困難な場合は、請負金額に労務費率を乗じて賃金総額を算定する。","a":true,"exp":"〇。法11条3項、則13条。請負による建設の事業の賃金総額の特例は、請負金額×労務費率により算定する。","page":50,"detail":"〇。法11条3項、則13条のとおり、請負による建設の事業で賃金総額を正確に算定することが困難な場合は、賃金総額の特例により「請負金額×労務費率」で賃金総額を算定する。請負金額は注文者からの支給資材等の価額を加減し、消費税等相当額を除いた額である。"},{"law":"賃金の範囲","cat":"労務費率","q":"建築事業(既設建築物設備工事業を除く)の労務費率は、23%である。","a":true,"exp":"〇。則別表2。建築事業(既設建築物設備工事業を除く)の労務費率は23%である。","page":51,"detail":"〇。則13条・別表2のとおり、建築事業(既設建築物設備工事業を除く)の労務費率は23%である。なお既設建築物設備工事業も23%、その他の建設事業も23%である。本問は正しい。"},{"law":"労働保険料の種類・算定","cat":"労災保険率","q":"労災保険率は、労災保険法の適用を受ける全ての事業の過去5年間の災害率等を考慮して厚生労働大臣が定める。","a":false,"exp":"×。法12条2項。労災保険率は、過去「3年間」の業務災害・複数業務要因災害・通勤災害に係る災害率等を考慮して厚生労働大臣が定める。5年間ではない。","page":53,"detail":"×。法12条2項のとおり、労災保険率は、労災保険法の適用を受ける全ての事業の過去「3年間」の業務災害・複数業務要因災害・通勤災害に係る災害率並びに二次健康診断等給付に要した費用の額等を考慮して厚生労働大臣が定める。過去5年間ではないため本問は誤り。"},{"law":"労働保険料の種類・算定","cat":"労災保険率","q":"労災保険率は、現在、事業の種類ごとに最高1000分の88から最低1000分の3までの間で定められている。","a":false,"exp":"×。則別表1。労災保険率は最高1000分の88から最低1000分の2.5(金融業・保険業・不動産業等)までの間で定められている。最低は1000分の3ではない。","page":53,"detail":"×。則別表1のとおり、労災保険率は最高1000分の88(金属鉱業・非金属鉱業・石炭鉱業)から最低1000分の2.5(金融業・保険業・不動産業、原油・天然ガス鉱業等)までの間で定められている。最低は1000分の3ではないため本問は誤りである。"},{"law":"労働保険料の種類・算定","cat":"労災保険率","q":"労災保険率には、すべての事業の種類において非業務災害率である1000分の0.5が含まれている。","a":false,"exp":"×。則16条2項。労災保険率に含まれる非業務災害率は1000分の0.6である。1000分の0.5ではない。","page":53,"detail":"×。則16条2項のとおり、労災保険率にはすべての事業の種類において非業務災害率である1000分の0.6が含まれている。1000分の0.5ではないため本問は誤り。なお労災保険率が1000分の100を超える事業の種類はない。"},{"law":"労働保険料の種類・算定","cat":"労災保険率","q":"船員を使用して行う船舶所有者の事業に係る労災保険率は、1000分の52とされている。","a":false,"exp":"×。則16条1項。船舶所有者の事業に係る労災保険率は1000分の42である。1000分の52は林業の労災保険率である。","page":54,"detail":"×。則16条1項のとおり、船員を使用して行う船舶所有者の事業に係る労災保険率は1000分の42である。1000分の52は林業の労災保険率であるため本問は誤りである。"},{"law":"一般保険料等","cat":"雇用保険率","q":"令和7年度における雇用保険率は、一般の事業について1000分の14.5とされている。","a":true,"exp":"〇。令和7年度の雇用保険率は、一般の事業1000分の14.5、農林水産・清酒製造の事業1000分の16.5、建設の事業1000分の17.5である。","page":56,"detail":"〇。令和7年度における雇用保険率は、一般の事業1000分の14.5、農林水産・清酒製造の事業1000分の16.5、建設の事業1000分の17.5である(失業等給付費等充当徴収保険率・育児休業給付費充当徴収保険率・二事業費充当徴収保険率の合計)。本問は一般の事業の率を正しく記している。"},{"law":"一般保険料等","cat":"雇用保険率","q":"令和7年度における雇用保険率は、建設の事業について1000分の19.5とされている。","a":false,"exp":"×。令和7年度の建設の事業の雇用保険率は1000分の17.5である。1000分の19.5は弾力的変更前の本則の率である。","page":56,"detail":"×。令和7年度における建設の事業の雇用保険率は1000分の17.5である。1000分の19.5は弾力的変更前の本則(合計)の率であり、令和7年度の率ではないため本問は誤りである。"},{"law":"一般保険料等","cat":"特掲事業","q":"農林水産の事業及び清酒製造の事業は特掲事業に該当するが、建設の事業は特掲事業に該当しない。","a":false,"exp":"×。法12条4項。特掲事業とは農林水産の事業、清酒製造の事業及び建設の事業をいう。建設の事業も特掲事業に該当する。","page":57,"detail":"×。法12条4項のとおり、特掲事業とは農林水産の事業、清酒製造の事業及び建設の事業をいう。建設の事業も特掲事業に該当する。特掲事業は短期雇用特例被保険者が多く失業が生じやすいため一般の事業より高い雇用保険率が設定されている。本問は建設の事業を除いている点で誤り。"},{"law":"一般保険料・特別加入保険料・印紙保険料","cat":"特別加入保険料","q":"第1種特別加入保険料の算定方法は、保険料算定基礎額の総額に第1種特別加入保険料率を乗じて得た額である。","a":true,"exp":"〇。法13条、則21条。第1種特別加入保険料は、保険料算定基礎額の総額×第1種特別加入保険料率により算定する。","page":62,"detail":"〇。法13条、則21条1項のとおり、第1種特別加入保険料の額は、第1種特別加入者(中小事業主等)に係る保険料算定基礎額の総額に第1種特別加入保険料率を乗じて得た額である。本問は算定方法を正しく記している。"},{"law":"一般保険料・特別加入保険料・印紙保険料","cat":"第1種特別加入保険料率","q":"第1種特別加入保険料率は、第1種特別加入者に係る事業についての労災保険率と同一である。","a":true,"exp":"〇。法13条、則21条の2。第1種特別加入保険料率は、現在は労災保険率と同一の率である(減じる率が現在0のため)。","page":65,"detail":"〇。法13条、則21条の2のとおり、第1種特別加入保険料率は、第1種特別加入者に係る事業についての労災保険率と同一の率から二次健康診断等給付に要した費用を考慮して厚生労働大臣が定める率(現在は0)を減じた率であり、減じる率が現在0のため労災保険率と同一である。"},{"law":"一般保険料・特別加入保険料・印紙保険料","cat":"第3種特別加入保険料率","q":"第3種特別加入保険料率は、派遣元・派遣先の事業の種類等に応じて定められており、事業ごとに異なる。","a":false,"exp":"×。則23条の3。第3種特別加入保険料率は、派遣元・派遣先の事業の種類等を問わず、一律に1000分の3である。","page":66,"detail":"×。則23条の3のとおり、第3種特別加入保険料率は、派遣元・派遣先の事業の種類等を問わず一律に1000分の3である。事業ごとに異なるわけではないため本問は誤りである。"},{"law":"一般保険料・特別加入保険料・印紙保険料","cat":"第2種特別加入保険料率","q":"第2種特別加入保険料率は、最高が建設業の一人親方の1000分の52である。","a":false,"exp":"×。則別表5。第2種特別加入保険料率の最高は林業の事業の一人親方の1000分の52である。建設業の一人親方は1000分の17である。","page":65,"detail":"×。則別表5のとおり、第2種特別加入保険料率の最高は林業の事業の一人親方の1000分の52である。建設業の一人親方は1000分の17であるため、最高を建設業の一人親方の1000分の52とする本問は誤りである。"},{"law":"一般保険料・特別加入保険料・印紙保険料","cat":"端数処理","q":"特別加入者とされた期間の月数に1か月未満の端数がある場合は、これを切り捨てる。","a":false,"exp":"×。則22条等。特別加入者とされた期間の月数に1か月未満の端数がある場合は、これを1か月に切り上げる。","page":64,"detail":"×。則22条等(p.64の計算式について)のとおり、特別加入者とされた期間の月数に1か月未満の端数がある場合には、これを「1か月に切り上げる」。切り捨てではないため本問は誤りである。なお算定基礎額に1,000円未満の端数があるときは切り捨てる。"},{"law":"申告・納付・延納","cat":"概算・確定の仕組み","q":"労働保険料(印紙保険料及び特例納付保険料を除く)は、期間の初めに概算額で申告・納付し、期間終了後に確定額を申告して過不足を精算する仕組みをとっている。","a":true,"exp":"〇。労働保険料(印紙保険料・特例納付保険料を除く)は、概算保険料で申告・納付し、確定保険料で過不足を精算する。","page":70,"detail":"〇。労働保険料(印紙保険料及び特例納付保険料を除く)は、保険料算定の対象となる期間の初めに概算額(概算保険料)で申告・納付し、その期間が終了したら確定額(確定保険料)を申告して過不足を精算する仕組みをとっている(p.70)。本問は正しい。"},{"law":"年度更新","cat":"概算保険料の申告・納付","q":"継続事業の事業主は、保険年度ごとに、概算保険料を、その保険年度の6月1日から40日以内(毎年7月10日まで)に納付しなければならない。","a":true,"exp":"〇。法15条1項。継続事業の概算保険料は、6月1日(当日起算)から40日以内、毎年7月10日までに納付する。これを年度更新という。","page":72,"detail":"〇。法15条1項のとおり、継続事業(一括有期事業を含む)の事業主は、保険年度ごとに、概算保険料を概算保険料申告書に添えて、その保険年度の6月1日(当日起算)から40日以内(毎年7月10日まで)に納付しなければならない。この手続を年度更新という。"},{"law":"年度更新","cat":"保険関係成立時","q":"保険年度の中途に保険関係が成立した継続事業に係る概算保険料は、保険関係が成立した日の翌日から起算して20日以内に申告・納付しなければならない。","a":false,"exp":"×。法15条1項。保険年度の中途に保険関係が成立した事業に係る概算保険料は、保険関係が成立した日の翌日から起算して50日以内に申告・納付する。20日ではない。","page":72,"detail":"×。法15条1項のとおり、保険年度の中途に保険関係が成立した継続事業に係る概算保険料は、保険関係が成立した日(翌日起算)から「50日以内」に申告・納付しなければならない。20日以内ではないため本問は誤り(20日以内は有期事業の場合である)。"},{"law":"申告・納付・延納","cat":"賃金総額の見込額の特例","q":"その保険年度の賃金総額の見込額が、直前の保険年度の賃金総額の100分の50以上100分の100以下である場合に、直前の保険年度の賃金総額を当該保険年度の賃金総額の見込額とする。","a":false,"exp":"×。法15条1項、則24条1項。賃金総額の見込額が直前年度の100分の50以上100分の200以下のときに、直前年度の賃金総額を見込額とする。上限は100分の200である。","page":75,"detail":"×。法15条1項、則24条1項のとおり、その保険年度の賃金総額の見込額が直前の保険年度の賃金総額の100分の50以上「100分の200以下」である場合に、直前の保険年度の賃金総額を当該保険年度の賃金総額の見込額とする。上限は100分の100ではなく100分の200であるため本問は誤り。"},{"law":"申告・納付・延納","cat":"申告先","q":"労働保険料の申告は、概算保険料申告書等を所轄都道府県労働局歳入徴収官に提出することにより行う。","a":true,"exp":"〇。則38条1項。労働保険料の申告は、所轄都道府県労働局歳入徴収官に提出して行う。","page":78,"detail":"〇。則38条1項のとおり、労働保険料の申告は、概算保険料申告書・増加概算保険料申告書・確定保険料申告書を所轄都道府県労働局歳入徴収官に提出することにより行う。なお申告書は日本銀行・年金事務所・所轄労働基準監督署長等を経由して提出することもできる。"},{"law":"申告・納付・延納","cat":"納付先","q":"公共職業安定所において、労働保険料を納付することができる。","a":false,"exp":"×。注意書き。公共職業安定所において労働保険料を納付することはできない。納付先は日本銀行又は都道府県労働局収入官吏・労働基準監督署収入官吏である。","page":79,"detail":"×。p.79注意書きのとおり、公共職業安定所において労働保険料を納付することはできない。納付先は日本銀行又は所轄都道府県労働局収入官吏・所轄労働基準監督署収入官吏である。本問は誤りである。"},{"law":"申告・納付・延納","cat":"年金事務所経由","q":"増加概算保険料申告書は、所定の要件を満たせば年金事務所を経由して提出することができる。","a":false,"exp":"×。則38条2項。増加概算保険料申告書は、年金事務所を経由して提出することはできない。年金事務所経由は一般保険料に係る概算・確定保険料申告書が対象である。","page":79,"detail":"×。則38条2項のとおり、増加概算保険料申告書は年金事務所を経由して提出することはできない。年金事務所経由が認められるのは継続事業に係る一般保険料の概算保険料申告書及び確定保険料申告書(口座振替によらない等の要件を満たすもの)であるため、本問は誤り。"},{"law":"申告・納付・延納","cat":"口座振替","q":"認定決定された概算保険料・確定保険料、増加概算保険料、印紙保険料、追徴金等は、口座振替による納付の対象とならない。","a":true,"exp":"〇。則38条の4。口座振替の対象は当初の概算保険料、その延納分、確定保険料であり、認定決定された保険料・増加概算保険料・印紙保険料・追徴金等は対象外である。","page":81,"detail":"〇。則38条の4のとおり、口座振替の対象となるのは継続事業又は有期事業に係る当初の概算保険料、その延納分、及び確定保険料である。認定決定された概算保険料・確定保険料、増加概算保険料、追加徴収に係る概算保険料、印紙保険料、特例納付保険料、追徴金等は口座振替の対象とならない。本問は正しい。"},{"law":"申告・納付・延納","cat":"特定法人の電子申請","q":"事業年度開始の時における資本金の額等が1億円を超える法人等の特定法人は、継続事業に係る概算・増加概算・確定保険料申告書の提出を、原則として電子情報処理組織を使用して行う。","a":true,"exp":"〇。則24条3項等。特定法人は、継続事業に係る概算・増加概算・確定保険料申告書の提出を原則として電子情報処理組織を使用して行う。","page":80,"detail":"〇。則24条3項等のとおり、事業年度開始の時における資本金の額等が1億円を超える法人(ほか相互会社・投資法人・特定目的会社)等の特定法人は、継続事業に係る概算保険料申告書・増加概算保険料申告書・確定保険料申告書の提出を、原則として電子情報処理組織(電子申請)を使用して行うものとされている。本問は正しい。"},{"law":"申告・納付・延納","cat":"概算保険料の認定決定","q":"概算保険料について事業主が申告書を提出しない場合等には、政府が労働保険料の額を決定し通知する。通知を受けた事業主は、その通知を受けた日の翌日から起算して15日以内に納付しなければならない。","a":true,"exp":"〇。法15条3項・4項。概算保険料の認定決定の場合、通知を受けた日(翌日起算)から15日以内に納付する。","page":83,"detail":"〇。法15条3項・4項のとおり、概算保険料について事業主が申告書を提出しないとき又は記載に誤りがあると認められるときは、政府(都道府県労働局歳入徴収官)が労働保険料の額を決定し通知する(認定決定)。通知を受けた事業主は、その通知を受けた日(翌日起算)から15日以内に納付しなければならない。"},{"law":"申告・納付・延納","cat":"増加概算保険料","q":"増加概算保険料は、増加後の賃金総額等の見込額が増加前の見込額の100分の200を超え、かつ概算保険料の差額が13万円以上であるときに納付しなければならない。","a":true,"exp":"〇。法16条、則25条。増加概算保険料は、増加後の見込額が増加前の100分の200を超え、かつ差額が13万円以上のときに納付義務が生じる。","page":84,"detail":"〇。法16条、則25条1項のとおり、増加概算保険料は、増加後の賃金総額等の見込額が増加前の見込額の100分の200を超え、かつ増加後の見込額に基づく概算保険料の額と既納付額との差額が13万円以上であるときに納付しなければならない。本問はこの要件を正しく記している。"},{"law":"申告・納付・延納","cat":"増加概算保険料の納付","q":"増加概算保険料は、賃金総額等の増加が見込まれた日又は一般保険料率が変更された日の翌日から起算して30日以内に申告・納付しなければならない。","a":true,"exp":"〇。法16条。増加概算保険料は、増加等が見込まれた日(翌日起算)から30日以内に申告・納付する。継続事業・有期事業とも同じである。","page":85,"detail":"〇。法16条のとおり、増加概算保険料は、賃金総額等の増加が見込まれた日又は一般保険料率が変更された日(翌日起算)から30日以内に、増加額を増加概算保険料申告書に添えて申告・納付しなければならない。継続事業・有期事業とも申告・納期限は同じである。"},{"law":"申告・納付・延納","cat":"増加概算保険料","q":"増加概算保険料を申告・納付しない場合は、認定決定が行われる。","a":false,"exp":"×。注意書き。増加概算保険料を申告・納付しない場合であっても、認定決定は行われない。","page":85,"detail":"×。p.85注意書きのとおり、増加概算保険料を申告・納付しない場合であっても、認定決定は行われない。したがって認定決定が行われるとする本問は誤りである。"},{"law":"申告・納付・延納","cat":"概算保険料の追加徴収","q":"政府は、保険料率の引上げを行ったときは、追加徴収すべき額が一定額以上である場合に限り、労働保険料を追加徴収する。","a":false,"exp":"×。法17条1項、注意書き。政府は保険料率の引上げを行ったときは、金額の多少を問わず労働保険料を追加徴収する。","page":86,"detail":"×。法17条1項及びp.86注意書きのとおり、政府は保険料率(一般保険料率・各特別加入保険料率)の引上げを行ったときは、金額の多少を問わず労働保険料を追加徴収する。一定額以上の場合に限るわけではないため本問は誤りである。"},{"law":"申告・納付・延納","cat":"延納の要件:継続事業","q":"継続事業の事業主が概算保険料を延納できるのは、納付すべき概算保険料の額が40万円(労災又は雇用の一方のみ成立は20万円)以上であるか、又は労働保険事務組合に労働保険事務の処理を委託している場合である。","a":true,"exp":"〇。法18条、則27条1項。継続事業の延納は、概算保険料40万円(一方のみ成立は20万円)以上、又は事務組合委託の場合に認められる。事務組合委託の場合は額を問わない。","page":87,"detail":"〇。法18条、則27条1項のとおり、継続事業の延納は、納付すべき概算保険料の額が40万円(労災又は雇用の一方のみ成立は20万円)以上であるか、又は労働保険事務組合に労働保険事務の処理を委託している場合に認められる。事務組合委託の場合は概算保険料の額を問わない。本問は正しい。"},{"law":"申告・納付・延納","cat":"延納できない場合","q":"継続事業について、10月1日以降に保険関係が成立した事業は、当該保険年度においては延納することができない。","a":true,"exp":"〇。則27条1項。10月1日以降に保険関係が成立した継続事業は、当該保険年度においては延納できない。","page":87,"detail":"〇。則27条1項のとおり、継続事業について10月1日以降に保険関係が成立した事業は、当該保険年度においては延納することができない。本問は正しい。"},{"law":"申告・納付・延納","cat":"延納の方法:継続事業","q":"継続事業の概算保険料を延納する場合、前年度より引き続き保険関係が成立しているものは、保険年度を4期に分割して納付することができる。","a":false,"exp":"×。則27条。継続事業の延納は、保険年度を3期に分割して納付する。4期ではない。","page":88,"detail":"×。則27条のとおり、継続事業の概算保険料の延納は、保険年度を「3期」に分割して納付する(第1期4月1日〜7月31日、第2期8月1日〜11月30日、第3期12月1日〜翌年3月31日)。4期ではないため本問は誤りである。"},{"law":"申告・納付・延納","cat":"延納の納期限:継続事業","q":"継続事業の延納において、第2期(8月1日～11月30日)の納期限は11月30日、第3期(12月1日～翌年3月31日)の納期限は翌年3月31日である。","a":false,"exp":"×。則27条。継続事業の延納の納期限は、第2期10月31日、第3期翌年1月31日である。各期の末日が納期限ではない。","page":88,"detail":"×。則27条のとおり、継続事業の延納の納期限は、第2期分が10月31日、第3期分が翌年1月31日である(第1期は7月10日)。各期の末日(11月30日、翌年3月31日)が納期限となるわけではないため本問は誤りである。"},{"law":"申告・納付・延納","cat":"延納の納期限:委託事業主","q":"労働保険事務組合に委託している継続事業の委託事業主の概算保険料の納期限は、第2期分が11月14日、第3期分が翌年2月14日である。","a":true,"exp":"〇。則27条。事務組合に委託している継続事業の納期限は、第2期分11月14日、第3期分翌年2月14日である。","page":88,"detail":"〇。則27条のとおり、労働保険事務組合に委託している継続事業の委託事業主(委託に係る概算保険料)の納期限は、第2期分が11月14日、第3期分が翌年2月14日である。委託していない場合(10月31日・翌年1月31日)と区別する。本問は正しい。"},{"law":"申告・納付・延納","cat":"延納の要件:有期事業","q":"有期事業の事業主が概算保険料を延納できるのは、納付すべき概算保険料の額が40万円以上であるか、又は労働保険事務組合に委託している場合である。","a":false,"exp":"×。法18条、則28条1項。有期事業の延納要件は概算保険料の額が75万円以上である。40万円以上は継続事業(両保険成立)の要件である。","page":90,"detail":"×。法18条、則28条1項のとおり、有期事業の延納要件は、納付すべき概算保険料の額が「75万円」以上であるか、又は労働保険事務組合に委託している場合である。40万円以上は継続事業(両保険成立)の要件であるため本問は誤りである。"},{"law":"申告・納付・延納","cat":"延納できない場合:有期事業","q":"有期事業について、事業の全期間が6か月以内のものは、延納することができない。","a":true,"exp":"〇。則28条1項。事業の全期間が6か月以内の有期事業は、延納する実益がないため延納できない。","page":90,"detail":"〇。則28条1項のとおり、有期事業について事業の全期間が6か月以内のものは、延納する実益がないため延納することができない。本問は正しい。"},{"law":"申告・納付・延納","cat":"延納の納期限:有期事業","q":"有期事業の延納の2期目以降の納期限は、事務組合に委託しているか否かにかかわらず一律であり、4月1日～7月31日の期分は3月31日である。","a":true,"exp":"〇。則28条、注意書き。有期事業の延納は、継続事業と異なり事務組合委託の有無にかかわらず納期限は一律で、第1期(4～7月)分は3月31日である。","page":91,"detail":"〇。則28条及びp.91注意書きのとおり、有期事業の延納の2期目以降の納期限は、継続事業と異なり労働保険事務組合に委託しているか否かにかかわらず一律であり、4月1日〜7月31日の期分は3月31日、8月1日〜11月30日の期分は10月31日、12月1日〜翌年3月31日の期分は翌年1月31日である。本問は正しい。"},{"law":"申告・納付・延納","cat":"延納:増加概算保険料","q":"当初の概算保険料を延納していない事業主であっても、増加概算保険料のみを延納することができる。","a":false,"exp":"×。則30条、注意書き。当初の概算保険料を延納している事業主のみが増加概算保険料を延納できる。増加概算保険料だけを延納することはできない。","page":94,"detail":"×。則30条及びp.94注意書きのとおり、当初の概算保険料(認定決定の場合を含む)を延納している事業主のみが、増加概算保険料申告書を提出する際に申請することで増加概算保険料を延納できる。増加概算保険料だけを延納することはできないため本問は誤りである。"},{"law":"年度更新","cat":"確定保険料の申告:継続事業","q":"継続事業の事業主は、保険年度ごとに、確定保険料申告書を、次の保険年度の6月1日から40日以内(毎年7月10日まで)に提出しなければならない。","a":true,"exp":"〇。法19条1項。継続事業の確定保険料申告書は、次の保険年度の6月1日(当日起算)から40日以内、毎年7月10日までに提出する。","page":96,"detail":"〇。法19条1項のとおり、継続事業(一括有期事業を含む)の事業主は、保険年度ごとに、確定保険料申告書を、次の保険年度の6月1日(当日起算)から40日以内(毎年7月10日まで)に提出しなければならない。本問は正しい。"},{"law":"年度更新","cat":"確定保険料の申告:有期事業","q":"有期事業の事業主は、確定保険料申告書を、保険関係が消滅した日から起算して20日以内に提出しなければならない。","a":false,"exp":"×。法19条2項。有期事業の確定保険料申告書は、保険関係が消滅した日(当日起算)から50日以内に提出する。20日以内ではない。","page":97,"detail":"×。法19条2項のとおり、有期事業の事業主は、確定保険料申告書を、保険関係が消滅した日(当日起算)から「50日以内」に提出しなければならない。20日以内ではないため本問は誤りである。なお保険関係が消滅した日とは事業が終了した日の翌日をいう。"},{"law":"年度更新","cat":"確定保険料の認定決定","q":"確定保険料について政府が認定決定したときは、納入告
