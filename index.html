at":"動機づけ理論","q":"ハーズバーグの動機づけ衛生理論において、給与や作業条件、経営方針などは、満たされないと不満の原因となるが満足させても動機づけを生むわけではない<b>衛生要因</b>に分類される。","a":true,"exp":"〇。給与・作業条件・経営方針・人間関係などは衛生要因であり、満たされないと不満の原因となるが満足させても動機づけを生むものではない。","page":289,"detail":"〇。本問はハーズバーグの動機づけ衛生理論における衛生要因の説明として正しい。衛生要因とは、満たされないと不満の原因となるが、満足させられても「動機づけ」を生むわけではないものをいい、経営方針、監督者との関係、作業条件、給与、人間関係などがこれに当たる。一方、満たされなくても不満の原因にはならないが、その満足が職務上の動機づけとなる仕事そのもの・達成感・承認・責任・昇進などは動機づけ要因である。本問の記述はテキストどおりである。"},{"law":"労務管理","cat":"動機づけ理論","q":"マグレガーのX理論・Y理論のうち、人間は本来怠け者であり、企業目標達成のためには強制・命令・処罰による必要があるとするのは<b>Y理論</b>である。","a":false,"exp":"×。これはX理論(性悪説)の内容である。Y理論(性善説)は、人間は生来仕事嫌いではなく、目標のため進んで働くとするものである。","page":290,"detail":"×。本問は「Y理論」とする点が誤りである。人間は本来怠け者であり、企業の目標を達成しようとするためには強制・命令・処罰による必要があるとするのは、X理論(性悪説)の内容である。これに対しY理論(性善説)は、人間は生来仕事嫌いではなく、目標のため進んで働き、自我の欲求・自己実現の欲求が満足できれば献身的に目標達成のために尽くし、条件次第では責任をとろうとし、創意工夫の能力が備わっているというものである。したがって本問はX理論とY理論の対応が逆である。"},{"law":"労務管理","cat":"目標管理","q":"「目標による管理」(目標管理)は、アメリカの経営学者ドラッカーが「現代の経営」において提唱したもので、マグレガーのY理論が理論的基礎を形成している。","a":true,"exp":"〇。目標による管理はドラッカーが「現代の経営」で提唱し、マグレガーのY理論がその理論的基礎を形成している。","page":290,"detail":"〇。本問は目標による管理(目標管理制度)の説明として正しい。目標による管理は、アメリカの経営学者ドラッカーが著した「現代の経営」において提唱されたもので、マグレガーが述べたY理論がその理論的基礎を形成している。具体的には、従業員が自分自身の職務に対して具体的な達成目標を設定し、それを実現するための努力や結果の評価を通して動機づけを図る制度である。本問の記述はテキストどおりである。"},{"law":"労務管理","cat":"教育訓練","q":"職場の上司や先輩が部下や後輩に対し、仕事を通じて職務に必要な知識・技能などを実施する訓練法を<b>Off-JT</b>という。","a":false,"exp":"×。これはOJT(職場内訓練)の説明である。Off-JTは集合教育・通信教育・講習会など、日常業務から離れて行われる教育訓練をいう。","page":276,"detail":"×。本問の説明はOff-JTではなくOJT(On the Job Training・職場内訓練)の説明である。OJTとは、職場の上司や先輩が部下や後輩に対して、仕事を通じて、職務に必要な知識、技能、問題解決能力及び態度などについて実施する訓練法をいう。一方、Off-JT(Off the Job Training・職場外訓練)とは、集合教育、通信教育、講習会など、日常業務から離れて行われる教育訓練をいう。したがって本問は用語の対応が誤っている。"},{"law":"労務管理","cat":"賃金管理","q":"<b>職務給</b>は、職務の困難度や重要度を評価要素として職務ごとに価値の高低を定め、その価値に応じて決定される賃金で、「同一労働同一賃金の原則」に立つものである。","a":true,"exp":"〇。職務給は職務の困難度・重要度を評価要素とし、同一労働同一賃金の原則に立つ。導入には職務分析・職務評価が求められる。","page":282,"detail":"〇。本問は職務給の説明として正しい。職務給とは、職務の困難度や重要度を評価要素として決定される賃金であって、職務ごとに価値の高低を定めて、その価値に応じて決定される賃金をいい、「同一労働同一賃金の原則」に立つものである。職務給を導入するには、原則として全職務について職務分析を行って職務の内容を明らかにし、職務評価によって職務相互間の相対的価値を決定することが求められる。本問の記述はテキストどおりである。"},{"law":"労務管理","cat":"賃金総額管理","q":"賃金総額の決定方法のうち、付加価値を基準として「賃金総額=付加価値×労働分配率」で決定する付加価値配分方式を<b>スキャンロン・プラン</b>という。","a":false,"exp":"×。これはラッカー・プランの説明である。スキャンロン・プランは「賃金総額=売上高×一定の人件費率」で決定する売上高リンクによる生産成果配分方式である。","page":280,"detail":"×。本問の説明はスキャンロン・プランではなくラッカー・プランの説明である。ラッカー・プランは、付加価値を基準にして賃金総額を決定する付加価値配分方式であり、賃金総額＝付加価値×労働分配率で算定する。一方、スキャンロン・プランは、売上高リンクによる生産成果配分方式であり、賃金総額＝売上高×一定の人件費率で算定する。したがって本問は両者の対応が逆であり誤りである。"},{"law":"労務管理","cat":"その他用語","q":"課業の数を増やし仕事の範囲を拡大する「職務の水平的拡大」を<b>職務拡大</b>といい、責任や権限を拡大して仕事の幅を拡大する「職務の垂直的拡大」を<b>職務充実</b>という。","a":true,"exp":"〇。職務拡大は課業数を増やす水平的拡大、職務充実は責任・権限を拡大する垂直的拡大であり、テキストどおりである。","page":292,"detail":"〇。本問は職務拡大と職務充実の説明として正しい。職務拡大とは、課業の数を増やし、仕事の範囲を拡大するもので、「職務の水平的拡大」ともいう。一方、職務充実とは、責任や権限を拡大することで、仕事の幅を拡大するもので、「職務の垂直的拡大」ともいう。本問の記述はテキストの定義どおりである。"},{"law":"労働経済","cat":"労働力調査","q":"<b>労働力人口</b>とは、15歳以上の人口のうち、「就業者」と「完全失業者」を合わせたものをいう。","a":true,"exp":"〇。労働力人口は15歳以上人口のうち就業者と完全失業者を合わせたものである。これ以外の者が非労働力人口となる。","page":298,"detail":"〇。本問は労働力人口の定義として正しい。労働力調査における労働力人口とは、15歳以上の人口のうち、「就業者」と「完全失業者」を合わせたものをいう。これに対し、15歳以上の人口のうち就業者と完全失業者以外の者が非労働力人口となる。本問の記述はテキストの定義どおりである。"},{"law":"労働経済","cat":"労働力調査","q":"<b>労働力率(労働力人口比率)</b>とは、15歳以上の人口に占める「完全失業者」の割合をいう。","a":false,"exp":"×。労働力率は15歳以上人口に占める「労働力人口」の割合である。労働力人口に占める完全失業者の割合は完全失業率をいう。","page":298,"detail":"×。本問は労働力率を「完全失業者の割合」とする点が誤りである。労働力率(労働力人口比率)とは、15歳以上の人口に占める「労働力人口」の割合をいう。一方、労働力人口に占める完全失業者の割合は完全失業率であり、(完全失業者数÷労働力人口)×100(%)で表される。したがって本問は対象の定義が誤っている。"},{"law":"労働経済","cat":"労働力調査","q":"完全失業者とは、仕事がなくて調査週間中に少しも仕事をせず、仕事があればすぐ就くことができ、かつ調査週間中に仕事を探す活動や事業を始める準備をしていた者をいう。","a":true,"exp":"〇。完全失業者は、(1)仕事がなく調査週間中に少しも仕事をしなかった、(2)仕事があればすぐ就ける、(3)調査週間中に求職活動をしていた、の3条件を満たす者をいう。","page":298,"detail":"〇。本問は完全失業者の定義として正しい。完全失業者とは、次の3つの条件を満たす者をいう。すなわち、(1)仕事がなくて調査週間中に少しも仕事をしなかった(就業者ではない)こと、(2)仕事があればすぐ就くことができること、(3)調査週間中に、仕事を探す活動や事業を始める準備をしていた(過去の求職活動の結果を待っている場合を含む)ことである。本問の記述はテキストの定義どおりである。"},{"law":"労働経済","cat":"労働力調査","q":"労働力調査は、厚生労働省が標本調査により、全国の世帯とその構成員を対象に毎月実施している。","a":false,"exp":"×。労働力調査は総務省統計局が実施している。標本調査により全国の世帯とその構成員を対象に毎月実施している点は正しい。","page":300,"detail":"×。本問は実施主体を「厚生労働省」とする点が誤りである。労働力調査は、統計法に基づく基幹統計「労働力統計」を作成するための統計調査であり、総務省統計局において、標本調査により、全国の世帯とその構成員を対象に、毎月実施されている。標本調査により全国の世帯とその構成員を対象に毎月実施されている点は正しいが、実施主体は総務省統計局である。"},{"law":"労働経済","cat":"毎月勤労統計調査","q":"<b>毎月勤労統計調査</b>は、事業所を対象として行われる基幹統計調査であり、調査対象事業所に報告の義務を課し、報告の拒否や虚偽報告について罰則が設けられている。","a":true,"exp":"〇。毎月勤労統計調査は統計法に基づく基幹統計調査で、事業所を対象とし、報告義務があり拒否・虚偽報告には罰則が設けられている。","page":303,"detail":"〇。本問は毎月勤労統計調査の説明として正しい。毎月勤労統計調査は、労働時間の実態を知るうえで有効な統計調査として、事業所を対象として行われている。この調査は統計法に基づいて行われる基幹統計調査であり、調査対象となった事業所に対して報告の義務を課しており、報告の拒否や虚偽報告について罰則が設けられている。本問の記述はテキストどおりである。"},{"law":"労働経済","cat":"就労条件総合調査","q":"<b>就労条件総合調査</b>は、主要産業における企業の労働時間制度・賃金制度等を総合的に調査するもので、常用労働者が30人以上の民営企業から抽出した企業を対象として実施されている。","a":true,"exp":"〇。就労条件総合調査は、民間企業の就労条件の現状を明らかにする目的で、常用労働者30人以上の民営企業から産業・企業規模別に抽出した企業を対象に実施される。","page":304,"detail":"〇。本問は就労条件総合調査の説明として正しい。就労条件総合調査は、主要産業における企業の労働時間制度、賃金制度等について総合的に調査し、我が国の民間企業における就労条件の現状を明らかにすることを目的とした調査で、常用労働者が30人以上の民営企業から、産業、企業規模別に一定の方法により抽出した企業を対象として実施されている。本問の記述はテキストどおりである。"},{"law":"育児・介護休業法","cat":"延長育休（1歳〜1歳6か月）","q":"労働者が1歳から1歳6か月に達するまでの子について育児休業をするには、原則として、1歳到達日において本人<b>または配偶者</b>が育児休業をしていることが必要である。","a":true,"exp":"〇。1歳到達日に本人または配偶者が育休していることが要件（法5条3項）。「本人だけ」ではなく配偶者でもよい点がポイント。","page":142,"detail":"〇。本問は1歳から1歳6か月に達するまでの子に係る育児休業の要件として正しい。この育児休業をするには、当該申出に係る子について、当該労働者又はその配偶者が、当該子が1歳に達する日(1歳到達日)において育児休業をしている場合等に該当する必要がある(法5条3項)。本人だけでなく配偶者が1歳到達日に育児休業をしている場合でも要件を満たす点がポイントであり、本問の記述は条文どおりである。"},{"law":"育児・介護休業法","cat":"延長育休（1歳6か月〜2歳）","q":"1歳6か月から2歳に達するまでの育児休業は、保育所等に入所を希望し申込みをしているが当面入所できない場合など、雇用継続のために特に必要と認められる場合に取得できる。","a":true,"exp":"〇。保育所に入れない・配偶者の死亡等「特に必要と認められる場合」に取得可（法5条4項、則6条の2）。","page":143,"detail":"〇。本問は1歳6か月から2歳に達するまでの子に係る育児休業の要件として正しい。この育児休業は、1歳6か月到達日後の期間について休業することが雇用の継続のために特に必要と認められる場合として厚生労働省令で定める場合に該当すること等を要件とする(法5条4項)。この厚生労働省令で定める場合には、保育所等における保育の利用を希望し申込みを行っているが当面その実施が行われない場合や、養育を行う予定であった配偶者が死亡した場合等が含まれる(則6条の2)。"},{"law":"育児・介護休業法","cat":"延長育休の再申出","q":"1歳到達日後の育児休業は、一度復職した後であっても、同じ子について再度この延長育休を申し出ることができる。","a":false,"exp":"×。「この規定による申出により育児休業をしたことがない場合」に限られる（法5条3項）。＝再度の申出はできない（繰り返し延長の防止）。","page":142,"detail":"×。本問は再度の申出ができるとする点が誤りである。1歳から1歳6か月に達するまでの子に係る育児休業は、当該子の1歳到達日後の期間において、この規定による申出により育児休業をしたことがない場合に限り申し出ることができる(法5条3項)。したがって、一度復職した後に同じ子について再度この延長育休を申し出ることは原則としてできず、繰り返しの延長が防止されている。"},{"law":"育児・介護休業法","cat":"育休開始日の指定","q":"1歳に満たない子に係る育児休業について、開始予定日が「申出日の翌日から起算して1か月を経過する日」より前であるとき、事業主はその経過日までの間で開始予定日を指定できる。","a":true,"exp":"〇。育休は「1か月前」までに申出が原則。遅れた場合、事業主は1月等経過日までで開始日を後ろ倒し指定できる（法6条3項）。","page":145,"detail":"〇。本問は育児休業開始予定日の指定として正しい。事業主は、労働者からの育児休業申出に係る育児休業開始予定日とされた日が、当該申出があった日の翌日から起算して1か月を経過する日(1月等経過日)前の日であるときは、当該育児休業開始予定日とされた日から当該1月等経過日までの間のいずれかの日を育児休業開始予定日として指定することができる(法6条3項)。すなわち申出が1か月前より遅れた場合、事業主は開始日を後ろ倒しに指定できる。"},{"law":"育児・介護休業法","cat":"育休の日付計算","q":"育児休業開始予定日の指定に関し、申出日が3月1日のとき、「1月等経過日」は3月31日である。","a":false,"exp":"×。正しくは4月1日。申出日3/1→翌日3/2起算→1か月の応当日4/2→その前日4/1が1月等経過日。3/31は“その前の日”であって1月等経過日ではない。","page":145,"detail":"×。本問は「1月等経過日」を3月31日とする点が誤りである。1月等経過日とは、育児休業申出があった日の翌日から起算して1か月を経過する日をいう(法6条3項)。申出日が3月1日のときは、その翌日である3月2日から起算し、1か月後の応当日4月2日の前日である4月1日が1月等経過日となる。3月31日はその前の日であって1月等経過日ではないため、本問は誤りである。"},{"law":"育児・介護休業法","cat":"延長育休の開始日指定","q":"1歳から1歳6か月までの子に係る育児休業の場合、事業主が開始予定日を指定できる基準は「2週間を経過する日」である。","a":true,"exp":"〇。延長育休（1歳〜1歳6か月、1歳6か月〜2歳）は原則の「1か月」ではなく「2週間」を経過する日が基準（法6条3項）。","page":145,"detail":"〇。本問は延長育休における開始予定日の指定の基準として正しい。育児休業開始予定日の指定は、原則として申出があった日の翌日から起算して1か月を経過する日が基準となるが、「1歳から1歳6か月に達するまでの子に係る育児休業」(申出が子の1歳到達日以前のものに限る)又は「1歳6か月から2歳に達するまでの子に係る育児休業」(申出が子の1歳6か月到達日以前のものに限る)の場合は、「1か月を経過する日」ではなく「2週間を経過する日」が基準となる(法6条3項)。本問の記述は条文どおりである。"},{"law":"育児・介護休業法","cat":"出生時育児休業","q":"出生時育児休業は、原則として子の出生の日から起算して8週間を経過する日の翌日までの期間内に、<b>4週間以内</b>の期間を定めて取得する。","a":true,"exp":"〇。出生時育休＝出生日から8週間経過日の翌日までの期間内に、4週間以内で取得（法9条の2第1項）。いわゆる“男性版産休”。","page":148,"detail":"〇。本問は出生時育児休業の説明として正しい。出生時育児休業とは、育児休業のうち、原則として子の出生の日から起算して8週間を経過する日の翌日までの期間内に、4週間以内の期間を定めてする休業をいう(法9条の2第1項)。いわゆる男性の産後休業に対応する休業であり、本問の記述は条文どおりである。"},{"law":"育児・介護休業法","cat":"出生時育休の分割","q":"出生時育児休業は、子の出生後8週間以内の期間内であれば、<b>3回</b>に分割して取得することができる。","a":false,"exp":"×。分割は「2回」まで（法9条の2第2項）。8週間以内に2回取得すると、それ以上は申出できない。","page":149,"detail":"×。本問は「3回」に分割できるとする点が誤りである。出生時育児休業は、当該子の出生の日から起算して8週間を経過する日の翌日までの期間内に2回の出生時育児休業をした場合には、それ以上の出生時育児休業申出をすることができない(法9条の2第2項)。すなわち分割取得は2回までであるから、3回に分割して取得できるとする本問は誤りである。なお、この期間内に出生時育児休業をする日数が28日に達した場合も申出ができない。"},{"law":"育児・介護休業法","cat":"出生時育休の拒否","q":"出生時育児休業の申出があった場合、事業主は原則としてこれを拒むことができない。","a":true,"exp":"〇。出生時育休申出は事業主は原則拒めない（法9条の3第1項）。ただし労使協定で雇入れ後1年未満等を除外可。","page":149,"detail":"〇。本問は出生時育児休業申出に対する事業主の義務として正しい。事業主は、労働者からの出生時育児休業申出があったときは、当該出生時育児休業申出を拒むことができない(法9条の3第1項)。ただし、労使協定により、雇入れ後1年未満の労働者その他出生時育児休業をすることができないこととすることについて合理的な理由があると認められる労働者を、対象から除外することができる(法9条の3第2項)。本問は原則を述べたものであり正しい。"},{"law":"育児・介護休業法","cat":"出生時育休の開始日指定","q":"出生時育休の開始予定日の指定について、原則は「申出の翌日から2週間を経過する日」までだが、労使協定で雇用環境整備等を定めれば「2週間を超え<b>1か月以内</b>」に延長できる。","a":true,"exp":"〇。原則「2週間」、労使協定（雇用環境整備等＋期間設定）があれば「2週間超〜1か月以内」に延長可（法9条の3第3項・4項）。","page":150,"detail":"〇。本問は出生時育児休業開始予定日の指定の特例として正しい。事業主は、原則として出生時育児休業申出があった日の翌日から起算して2週間を経過する日(2週間経過日)を基準に開始予定日を指定できる(法9条の3第3項)。ただし、労使協定で、雇用環境の整備等の措置の内容及び事業主が開始予定日を指定できる期間(2週間を超え1か月以内の期間に限る)を定めた場合には、「2週間経過日」が当該期間を経過する日となる(法9条の3第4項)。本問の記述は条文どおりである。"},{"law":"育児・介護休業法","cat":"出生時育休中の就業","q":"出生時育児休業の期間中は、いかなる場合も就業させることはできない。","a":false,"exp":"×。原則は就業不可だが、労使協定があれば休業中に就業可能（労働者の申出・同意が前提、法9条の5）。「いかなる場合も不可」は誤り。","page":151,"detail":"×。本問は「いかなる場合も就業させることはできない」とする点が誤りである。出生時育児休業期間中は原則として就業できないが、労使協定で出生時育児休業期間中に就業させることができるものとして定められた労働者は、就業可能日等を申し出ることができ、事業主が日時を提示して開始予定日の前日までに労働者の同意を得た場合に限り、厚生労働省令で定める範囲内で就業させることができる(法9条の5第2項・第4項)。したがって「いかなる場合も不可」とする本問は誤りである。"},{"law":"育児・介護休業法","cat":"パパ・ママ育休プラス","q":"パパ・ママ育休プラスにより、配偶者が育児休業をしている場合、労働者は1歳<b>2か月</b>に満たない子について育児休業をすることができる。","a":true,"exp":"〇。配偶者が1歳到達日以前に育休していれば、労働者は1歳2か月に満たない子について育休可（法9条の6）。","page":154,"detail":"〇。本問はパパ・ママ育休プラスの説明として正しい。労働者の養育する子について、当該労働者の配偶者が当該子の1歳到達日以前のいずれかの日において当該子を養育するために育児休業をしている場合には、当該労働者は、その養育する1歳2か月に満たない子について、その事業主に申し出ることにより育児休業をすることができる(法9条の6)。本問の記述は条文どおりである。"},{"law":"育児・介護休業法","cat":"パパ・ママ育休プラス","q":"パパ・ママ育休プラスは、育児休業開始予定日が配偶者がしている育児休業期間の<b>初日前</b>である場合にも適用される。","a":false,"exp":"×。開始予定日が「配偶者の育休期間の初日前」の場合は適用しない（適用除外）。配偶者が育休に入る前の先取りはできない（法9条の6）。","page":154,"detail":"×。本問は初日前である場合にも適用されるとする点が誤りである。パパ・ママ育休プラスは、当該申出に係る育児休業開始予定日とされた日が、配偶者がしている育児休業に係る育児休業期間の初日前である場合には、この特例は適用しない(法9条の6)。なお、当該子の1歳到達日の翌日後である場合も適用されない。したがって配偶者が育児休業に入る前に先取りして取得することはできず、本問は誤りである。"},{"law":"育児・介護休業法","cat":"パパ・ママ育休プラス","q":"パパ・ママ育休プラスにより、1人の労働者が取得できる育児休業期間の上限そのものが2か月延長され、最大1年2か月分の休業を取得できる。","a":false,"exp":"×。延びるのは取得の“期限”（1歳2か月まで）であって、1人が取れる総量（上限1年）は変わらない。育児休業等可能日数＝出生日〜1歳到達日までの日数（≒1年）。","page":154,"detail":"×。本問は1人が取得できる育児休業期間の上限そのものが2か月延長されるとする点が誤りである。パパ・ママ育休プラスにより延びるのは取得できる期限(子が1歳2か月に達するまで)であって、1人の労働者が取得できる総量の上限は変わらない(法9条の6)。育児休業等可能日数は、育児休業に係る子の出生した日から当該子の1歳到達日までの日数(おおむね1年)とされており、最大1年2か月分を取得できるわけではない。"}],"shaichi":[{"law":"社会保障・統計","cat":"社会保障制度","q":"1950(昭和25)年の社会保障制度審議会の勧告では、社会保障制度を社会保険、公的扶助、社会福祉及び公衆衛生の4つの内容からなるものとしている。","a":true,"exp":"〇。社会保障制度の内容は、社会保険、公的扶助、社会福祉及び公衆衛生の4つからなる。","page":13,"detail":"〇。1950(昭和25)年の社会保障制度審議会勧告では、社会保障制度を社会保険・公的扶助・社会福祉及び公衆衛生の4つの内容からなるものとしている。本文でも社会保険は保険料を財源とする給付、公的扶助(生活保護)は救貧制度、社会福祉は児童福祉法等による援助、公衆衛生は精神保健福祉法等による公費負担医療などと整理されており、この4本柱の理解が基本となる。"},{"law":"社会保障・統計","cat":"社会保障の機能","q":"社会保障の機能として主に挙げられるのは、「生活安定・向上機能」「所得再分配機能」「<b>経済成長促進機能</b>」の3つである。","a":false,"exp":"×。3つ目は「経済安定機能」であり、景気変動を緩和し経済を安定させる機能である。","page":12,"detail":"×。本文では社会保障の機能として「生活安定・向上機能」「所得再分配機能」「経済安定機能」の3つが主に挙げられている。3つ目は「経済成長促進機能」ではなく、景気変動を緩和し経済を安定させる「経済安定機能」である(平成29年版・令和7年版厚生労働白書)。これらの機能は相互に重なり合っていることが多い。"},{"law":"社会保障・統計","cat":"社会保険","q":"社会保険は、保険事故の危険が多い者ばかりが加入する逆選択を避けることなどを目的として、原則として<b>任意加入</b>としている。","a":false,"exp":"×。社会保険は逆選択を避けることなどを目的として、強制加入を原則としている。","page":11,"detail":"×。本文の「注意」では、保険事故の危険が多い者ばかりが加入する逆選択を避けることなどを目的として、社会保険は強制加入を原則としているとされている。設問の「任意加入」が誤り。社会保険は、共通の事故にさらされる多数の者が集団を構成し保険料を負担しておき、事故時に給付を行う方式を用いて国が社会保障を実現するものである。"},{"law":"社会保障・統計","cat":"社会保障の基本","q":"年金、医療保険、介護保険、雇用保険などの社会保険制度は、国民が相互に連帯して支え合う「共助」を体現した制度である。","a":true,"exp":"〇。共助に当たり、自助や共助でも対応できない困窮に対応するのが公助(公的扶助・社会福祉)である。","page":11,"detail":"〇。本文では、自助(自らの責任と努力)を基本としつつ、自助だけでは対応できないリスクに国民が相互に連帯して支え合うのが「共助」であり、年金・医療保険・介護保険・雇用保険などの社会保険制度はこの共助を体現した制度であるとされている(平成22年版厚生労働白書)。自助や共助でも対応できない困窮に対応するのが公的扶助・社会福祉などの「公助」である。"},{"law":"社会保障・統計","cat":"社会保障給付費","q":"令和5年度の社会保障給付費を部門別にみると、構成割合が最も高いのは医療であり、次いで年金、福祉その他の順となっている。","a":false,"exp":"×。最も高いのは年金(41.6%)で、次いで医療(33.6%)、福祉その他(24.7%)の順である。","page":13,"detail":"×。本文の令和5年度の社会保障給付費の部門別構成割合は、年金41.6%が最も高く、次いで医療33.6%、福祉その他24.7%の順である。設問は医療を最も高いとしている点が誤り。なお令和5年度の社会保障給付費の総額は135兆4,928億円で前年度比1.9%減である。"},{"law":"社会保障・統計","cat":"公的年金","q":"公的年金制度は、現役世代の保険料負担によりその時々の高齢世代の年金給付をまかなう世代間扶養である賦課方式を基本とした仕組みで運営されている。","a":true,"exp":"〇。賦課方式を基本とし、賃金や物価の変化を年金額に反映させながら運営される。","page":18,"detail":"〇。本文では、公的年金制度は現役世代の保険料負担によりその時々の高齢世代の年金給付をまかなう世代間扶養である賦課方式を基本とした仕組みで運営されているとされている(令和7年版厚生労働白書)。賃金や物価の変化を年金額に反映させながら、生涯にわたり年金が支給される保険として機能している。"},{"law":"社会保障・統計","cat":"医療保険沿革","q":"健康保険法は大正11年に制定されたが、関東大震災の発生により、法の施行は昭和2年まで延期された。","a":true,"exp":"〇。大正11年制定、翌年の関東大震災により施行が昭和2年まで延期された。","page":22,"detail":"〇。本文では、政府がドイツに倣い大正11年に「健康保険法」を制定したが、その翌年に関東大震災が発生したことから、法施行は昭和2年まで延期されたとされている(平成23年版厚生労働白書)。沿革表でも大正11年制定、昭和2年全面施行と整理されている。"},{"law":"社会保障・統計","cat":"医療保険沿革","q":"昭和36年4月に全国の市町村が国民健康保険事業を実施し、国民皆保険が達成されたが、これは<b>新国民健康保険法</b>制定の翌年のことであった。","a":false,"exp":"×。新国民健康保険法は昭和33年制定であり、国民皆保険達成は昭和36年4月で、翌年ではない。","page":21,"detail":"×。本文では、新国民健康保険法(新国民健康保険法案)は昭和33年3月提出・同年12月国会通過で、昭和34年1月から施行され、昭和36年4月に国民皆保険の体制が実現したとされている。昭和36年は新法制定の「翌年」ではなく、設問は誤り。新法は昭和36年4月から全市町村に国民健康保険の実施を義務づける内容であった。"},{"law":"社会保障・統計","cat":"医療保険の変遷","q":"被用者本人については、当初10割給付を原則としていたが、昭和59年の改正によって初めて定率1割負担が導入され、平成15年に3割負担となった。","a":true,"exp":"〇。昭和59年に1割、平成9年に2割、平成15年に3割負担となった。","page":23,"detail":"〇。本文では、当初被用者については10割給付を原則としていたが、昭和59年の改正によって初めて定率1割負担が導入され、平成9年に2割負担、平成15年に3割負担となったとされている(平成18年版厚生労働白書)。被扶養者は長く5割給付だったが昭和48年に7割給付とされ、あわせて高額療養費支給制度が発足した。"},{"law":"社会保障・統計","cat":"医療保険体系","q":"我が国の公的医療保険は、被用者保険、国民健康保険、及び<b>65歳</b>以上の高齢者等が加入する後期高齢者医療制度に分けられる。","a":false,"exp":"×。後期高齢者医療制度に加入するのは75歳以上の高齢者等である。65歳以上75歳未満は前期高齢者として扱われる。","page":22,"detail":"×。本文では、我が国の公的医療保険は各種被用者保険と国民健康保険、及び「75歳以上の高齢者等」が加入する後期高齢者医療制度に分けられるとされている。設問の「65歳」が誤り。後期高齢者医療制度は75歳以上等が対象であり、65歳以上75歳未満は前期高齢者として被用者保険・国保で前期財政調整の対象となる。"},{"law":"社会保障・統計","cat":"社会保障協定","q":"社会保障協定における重複適用の回避では、相手国への派遣の期間が5年を超えない見込みの場合は自国の法令のみを適用する。","a":true,"exp":"〇。5年を超えない見込みなら自国法令のみ、5年を超える見込みなら相手国の法令のみを適用する。","page":20,"detail":"〇。本文では、相手国への派遣期間(相手国での就労期間)が5年を超えない見込みの場合は相手国法令の適用を免除し自国の法令のみを適用し、5年を超える見込みの場合は相手国の法令のみを適用するとされている。これにより社会保険の二重加入(重複適用)を回避する適用調整が行われる。"},{"law":"社会保障・統計","cat":"介護保険沿革","q":"介護保険制度は、自立支援、利用者本位、社会保険方式の3つを基本的な考え方として、平成12年に施行された。","a":true,"exp":"〇。平成12年4月に施行され、3つの基本的考え方に基づく。","page":25,"detail":"〇。本文では、高齢者の介護を社会全体で支え合う仕組みとして介護保険制度を創設し、平成12年に介護保険法が施行されたとされている(平成28年版厚生労働白書)。制度の基本的な考え方は、自立支援、利用者本位、社会保険方式の3つである。"},{"law":"国民健康保険法","cat":"目的","q":"国民健康保険法は、国民健康保険事業の健全な運営を確保し、もって社会保障及び国民保健の向上に寄与することを目的とする。","a":true,"exp":"〇。法1条のとおり。","page":28,"detail":"〇。法1条のとおり。本文でも、国民健康保険法は国民健康保険事業の健全な運営を確保し、もって社会保障及び国民保健の向上に寄与することを目的とするとされている。"},{"law":"国民健康保険法","cat":"保険給付の事由","q":"国民健康保険は、被保険者の疾病、負傷、出産又は<b>退職</b>に関して必要な保険給付を行う。","a":false,"exp":"×。疾病、負傷、出産又は死亡に関して必要な保険給付を行う(法2条)。「退職」ではない。","page":28,"detail":"×。法2条のとおり、国民健康保険は被保険者の疾病、負傷、出産又は「死亡」に関して必要な保険給付を行う。設問の「退職」が誤り。本文の「国民健康保険」の項にこの4つの保険事故が明示されている。"},{"law":"国民健康保険法","cat":"保険者","q":"都道府県は、当該都道府県内の市町村とともに国民健康保険を行うものとされ、国民健康保険組合は国民健康保険を行うことができる。","a":true,"exp":"〇。都道府県・市町村は実施義務があり、国民健康保険組合の実施は任意である(法3条)。","page":28,"detail":"〇。法3条のとおり。本文では、❶都道府県は当該都道府県内の市町村(特別区を含む)とともに国民健康保険を行うものとし(実施義務あり)、❷国民健康保険組合は国民健康保険を行うことができる(実施は任意)とされている。"},{"law":"国民健康保険法","cat":"国保組合の設立","q":"国民健康保険組合の設立認可の申請は、<b>10人</b>以上の発起人が規約を作成し、組合員となるべき者300人以上の同意を得て行う。","a":false,"exp":"×。発起人は15人以上である(法17条)。組合員となるべき者は300人以上の同意が必要である。","page":29,"detail":"×。法17条のとおり、認可の申請は「15人以上」の発起人が規約を作成し、組合員となるべき者300人以上の同意を得て行う。設問の発起人「10人」が誤り。組合員となるべき者300人以上という同意要件は正しい。"},{"law":"国民健康保険法","cat":"国保組合の設立","q":"国民健康保険組合を設立しようとするときは、主たる事務所の所在地の<b>厚生労働大臣</b>の認可を受けなければならない。","a":false,"exp":"×。主たる事務所の所在地の都道府県知事の認可を受ける(法17条)。","page":29,"detail":"×。法17条のとおり、国民健康保険組合を設立しようとするときは、主たる事務所の所在地の「都道府県知事」の認可を受けなければならない。設問の「厚生労働大臣」が誤り。組合は設立の認可を受けた時に成立する。"},{"law":"国民健康保険法","cat":"被保険者","q":"都道府県の区域内に住所を有する者は、原則として、当該都道府県が市町村とともに行う国民健康保険の被保険者となる。","a":true,"exp":"〇。法5条。適用除外に該当しない限り被保険者となる。","page":32,"detail":"〇。法5条のとおり。本文では、都道府県の区域内に住所を有する者は、当該都道府県が当該都道府県内の市町村とともに行う国民健康保険の被保険者とするとされている。適用除外事由に該当しない限り被保険者となる。"},{"law":"国民健康保険法","cat":"被保険者の概念","q":"国民健康保険においては、健康保険と同様に「被扶養者」という概念がある。","a":false,"exp":"×。国民健康保険においては「被扶養者」という概念はない。世帯員も各々が被保険者となる。","page":32,"detail":"×。本文の「比較」で、国民健康保険においては「被扶養者」という概念はないと明示されている。健康保険のような被扶養者という扱いはなく、世帯員も各々が被保険者となる。"},{"law":"国民健康保険法","cat":"適用除外","q":"生活保護法による生活保護を受けている世帯(保護を停止されている世帯を除く)に属する者は、都道府県等が行う国民健康保険の被保険者としない。","a":true,"exp":"〇。法6条の適用除外に該当する。","page":33,"detail":"〇。法6条の適用除外に該当する。本文では、生活保護法による生活保護を受けている世帯(その保護を停止されている世帯を除く)に属する者は、都道府県等が行う国民健康保険の被保険者としないと列挙されている。"},{"law":"国民健康保険法","cat":"資格取得","q":"都道府県等が行う国民健康保険の被保険者は、都道府県の区域内に住所を有するに至った日の<b>翌日</b>から、その資格を取得する。","a":false,"exp":"×。住所を有するに至った日（その日）から資格を取得する(法7条)。翌日ではない。","page":33,"detail":"×。法7条のとおり、都道府県等が行う国民健康保険の被保険者は、都道府県の区域内に住所を有するに至った日(その日)から資格を取得する。設問の「翌日」が誤り。適用除外事由のいずれにも該当しなくなった日からも資格を取得する。"},{"law":"国民健康保険法","cat":"届出","q":"都道府県等が行う国民健康保険において、世帯主は被保険者の資格の取得・喪失等を<b>10日</b>以内に市町村に届け出なければならない。","a":false,"exp":"×。届出の提出期限は14日以内である(法9条)。","page":34,"detail":"×。本文の届出の表のとおり、都道府県等の国民健康保険では世帯主が被保険者の資格の取得・喪失等を市町村に「14日以内」に届け出なければならない(法9条1項、則2条)。設問の「10日」が誤り。"},{"law":"国民健康保険法","cat":"資格確認書","q":"資格確認書の有効期限は、交付の日から起算して<b>3年</b>を超えない範囲内において市町村が定める。","a":false,"exp":"×。有効期限は交付の日から起算して5年を超えない範囲内で市町村が定める(則6条)。","page":35,"detail":"×。則6条3項のとおり、資格確認書の有効期限は交付の日から起算して「5年」を超えない範囲内において市町村が定める。設問の「3年」が誤り。資格確認書は電子資格確認を受けることができない状況にある被保険者ごとに作成する。"},{"law":"国民健康保険法","cat":"特別療養費","q":"特別療養費は、保険料を滞納している世帯主等が、納期限から<b>6か月</b>が経過するまでの間に納付の勧奨等を行ってもなお保険料を納付しない場合に支給される。","a":false,"exp":"×。期間は1年間である(法54条の3)。","page":36,"detail":"×。法54条の3・則のとおり、特別療養費は、保険料を滞納している世帯主等が、納期限から厚生労働省令で定める期間(1年間)が経過するまでの間に納付の勧奨等を行ってもなお保険料を納付しない場合に、療養の給付等に代えて支給される。設問の「6か月」が誤り。"},{"law":"国民健康保険法","cat":"保険給付の区分","q":"国民健康保険における出産育児一時金及び葬祭費は、原則として行うものとされる法定任意給付に分類される。","a":true,"exp":"〇。出産育児一時金・葬祭費(葬祭の給付)は法定任意給付であり、特別の理由があれば全部又は一部を行わないことができる。","page":39,"detail":"〇。本文の保険給付の区分のとおり、出産育児一時金・葬祭費(葬祭の給付)は法定任意給付であり、被保険者の出産及び死亡に関し条例又は規約の定めにより行うものとされ、特別の理由があるときはその全部又は一部を行わないことができる。"},{"law":"国民健康保険法","cat":"保険給付の区分","q":"国民健康保険における傷病手当金は、必ず行わなければならない法定必須給付に分類される。","a":false,"exp":"×。傷病手当金は任意給付であり、条例又は規約の定めにより任意に行うことができる給付である。","page":39,"detail":"×。本文の保険給付の区分のとおり、傷病手当金は「任意給付」であり、市町村及び組合が条例又は規約の定めにより任意に行うことができる給付である。設問の「法定必須給付」が誤り。法定必須給付には療養の給付、高額療養費などがある。"},{"law":"国民健康保険法","cat":"一部負担金","q":"国民健康保険の一部負担金は、6歳に達する日以後最初の3月31日以前である者については、療養の給付に要する費用の10分の2である。","a":true,"exp":"〇。義務教育就学前は10分の2である(法42条)。","page":40,"detail":"〇。法42条1項・令27条の2のとおり、6歳に達する日以後最初の3月31日以前である者(義務教育就学前)の一部負担金は療養の給付に要する費用の額の「10分の2」である。"},{"law":"国民健康保険法","cat":"一部負担金","q":"国民健康保険の一部負担金について、70歳に達する日の属する月の翌月以後である現役並み所得者の負担割合は<b>10分の2</b>である。","a":false,"exp":"×。70歳以上の現役並み所得者の負担割合は10分の3である。一般の70歳以上は10分の2である(法42条)。","page":40,"detail":"×。法42条1項・令27条の2のとおり、70歳に達する日の属する月の翌月以後である現役並み所得者(所得145万円以上等)の負担割合は「10分の3」である。設問の「10分の2」が誤り。一般の70歳以上は10分の2である。"},{"law":"国民健康保険法","cat":"給付制限","q":"被保険者が闘争、泥酔又は著しい不行跡によって疾病にかかり、又は負傷したときは、その療養の給付等の全部又は一部を行わないことができる。","a":true,"exp":"〇。法62条。闘争・泥酔・著しい不行跡は「行わないことができる」という任意的給付制限である。","page":42,"detail":"〇。法62条(法59条〜63条)のとおり。本文では、被保険者が闘争、泥酔又は著しい不行跡によって疾病にかかり又は負傷したときは、当該疾病・負傷に係る療養の給付等の全部又は一部を「行わないことができる」とされており、任意的給付制限である。"},{"law":"国民健康保険法","cat":"保険料滞納給付制限","q":"市町村等は、保険給付を受けることができる世帯主等が保険料を滞納し、納期限から<b>1年</b>が経過するまでに勧奨等を行っても納付しない場合、保険給付の支払を一時差し止める。","a":false,"exp":"×。期間は1年6か月である(法63条の2)。","page":43,"detail":"×。法63条の2のとおり、保険料を滞納し、納期限から「1年6か月間」が経過するまでに勧奨等を行ってもなお納付しない場合に、保険給付の全部又は一部の支払を一時差し止める。設問の「1年」が誤り。なお1年6か月が経過しない場合でも一時差止めは行うことができる。"},{"law":"国民健康保険法","cat":"損害賠償請求権","q":"市町村及び組合は、給付事由が第三者の行為によって生じた場合において保険給付を行ったときは、その給付の価額の限度で被保険者が第三者に対して有する損害賠償請求権を取得する。","a":true,"exp":"〇。法64条のとおり。療養の給付の場合は一部負担金相当額を控除した額が限度となる。","page":44,"detail":"〇。法64条1項のとおり。本文では、給付事由が第三者の行為によって生じた場合に保険給付を行ったときは、その給付の価額の限度で被保険者が第三者に対して有する損害賠償請求権を取得するとされている。療養の給付の場合は要する費用から一部負担金相当額を控除した額が限度となる。"},{"law":"国民健康保険法","cat":"不正利得","q":"保険医療機関等が不正の行為によって療養の給付に関する費用の支払を受けたときは、その支払った額を返還させるほか、その額に100分の40を乗じて得た額を支払わせることができる。","a":true,"exp":"〇。法65条。返還額の100分の40の加算がある。","page":45,"detail":"〇。法65条のとおり。本文では、保険医療機関等又は指定訪問看護事業者が偽りその他不正の行為によって療養の給付に関する費用の支払等を受けたときは、その支払った額を返還させるほか、その額に「100分の40」を乗じて得た額を支払わせることができるとされている。"},{"law":"国民健康保険法","cat":"費用負担","q":"国は、都道府県に対し、療養の給付等に要する費用等の合算額の<b>100分の50</b>を療養給付費等負担金として負担する。","a":false,"exp":"×。療養給付費等負担金は100分の32である(法70条)。","page":46,"detail":"×。法70条1項のとおり、国は都道府県に対し、療養の給付等に要する費用等の合算額の「100分の32」を療養給付費等負担金として負担する。設問の「100分の50」が誤り。なお高額医療費負担対象額については別に4分の1を負担する。"},{"law":"国民健康保険法","cat":"事務費","q":"国は、都道府県や市町村に対し、国民健康保険の事務の執行に要する費用を負担する。","a":false,"exp":"×。事務費の国庫負担は組合に対して行われるものであり、都道府県や市町村に対しては行われない(法69条)。","page":46,"detail":"×。法69条・本文「注意」のとおり、事務費の国庫負担は「組合」に対して行われるもので、都道府県や市町村に対しては行われない。設問は逆の趣旨で誤り。"},{"law":"国民健康保険法","cat":"賦課額の限度","q":"国民健康保険の保険料の賦課額の限度は、基礎賦課額が<b>67万円</b>、後期高齢者支援金等賦課額が26万円、介護納付金賦課額が17万円とされている。","a":true,"exp":"〇。令29条の7。基礎67万円、後期高齢者支援金等26万円、介護納付金17万円、子ども・子育て支援納付金3万円である。","page":51,"detail":"〇。令29条の7のとおり。本文では、保険料の賦課額の限度は基礎賦課額が67万円、後期高齢者支援金等賦課額が26万円、介護納付金賦課額が17万円、子ども・子育て支援納付金賦課額が3万円とされている。"},{"law":"国民健康保険法","cat":"賦課期日","q":"市町村による保険料の賦課期日は、当該年度の初日とする。","a":true,"exp":"〇。法76条の2のとおり。","page":52,"detail":"〇。法76条の2のとおり、市町村による保険料の賦課期日は、当該年度の初日とする。"},{"law":"国民健康保険法","cat":"保険料徴収","q":"市町村による保険料の徴収について、特別徴収の対象となるのは老齢等年金給付の額が<b>10万円</b>以上である者等であって、これ未満の者には特別徴収を行わない。","a":false,"exp":"×。老齢等年金給付の額が18万円未満である者は特別徴収を行わない(令29条の12等)。","page":53,"detail":"×。令29条の12等・本文のとおり、老齢等年金給付の額が「18万円未満」である者には特別徴収を行わない。設問の「10万円」が誤り。ほかに国保料と介護保険料の合計が老齢等年金給付額の2分の1を超える者なども特別徴収の対象とならない。"},{"law":"国民健康保険法","cat":"財政安定化基金","q":"都道府県は、市町村から徴収した財政安定化基金拠出金の総額の3倍に相当する額を財政安定化基金に繰り入れ、国はそのうち都道府県が繰り入れた額の3分の1を負担する。","a":true,"exp":"〇。法81条の2。拠出金総額の3倍を繰り入れ、国はその3分の1を負担する。","page":54,"detail":"〇。法81条の2のとおり。本文では、都道府県は当該都道府県内の市町村から徴収した財政安定化基金拠出金の総額の「3倍」に相当する額を財政安定化基金に繰り入れ、国はそのうち都道府県が繰り入れた額の「3分の1」に相当する額を負担するとされている。"},{"law":"国民健康保険法","cat":"審査請求","q":"保険給付に関する処分又は保険料その他の徴収金に関する処分に不服がある者は、<b>社会保険審査会</b>に審査請求をすることができる。","a":false,"exp":"×。国民健康保険審査会に審査請求をする(法91条)。国民健康保険審査会は各都道府県に置かれる。","page":59,"detail":"×。法91条1項のとおり、保険給付に関する処分又は保険料その他の徴収金に関する処分に不服がある者は、「国民健康保険審査会」に審査請求をする。設問の「社会保険審査会」が誤り。国民健康保険審査会は各都道府県に置かれる(法92条)。"},{"law":"国民健康保険法","cat":"審査請求期間","q":"国民健康保険審査会への審査請求は、処分があったことを知った日の翌日から起算して3か月以内に、文書又は口頭でしなければならない。","a":true,"exp":"〇。法99条。3か月以内、文書又は口頭でする。","page":60,"detail":"〇。法99条のとおり。審査請求は、処分があったことを知った日の翌日から起算して3か月以内に、文書又は口頭でしなければならない。ただし正当な理由により期間内にできなかったことを疎明したときはこの限りでない。"},{"law":"国民健康保険法","cat":"時効","q":"保険料その他の徴収金を徴収する権利及び保険給付を受ける権利は、行使することができる時から2年を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法110条。いずれも2年で時効消滅する。","page":60,"detail":"〇。法110条1項のとおり。保険料その他の徴収金を徴収し又は還付を受ける権利及び保険給付を受ける権利は、行使することができる時から2年を経過したときは時効によって消滅する。"},{"law":"国民健康保険法","cat":"国保団体連合会","q":"都道府県の区域を区域とする国民健康保険団体連合会に、その区域内の都道府県及び市町村並びに組合の2分の1以上が加入したときは、その他の者は全て当該連合会の会員となる。","a":false,"exp":"×。3分の2以上が加入したときに、その他の者が全て会員となる(法84条)。","page":57,"detail":"×。法84条のとおり、都道府県の区域を区域とする国民健康保険団体連合会に、その区域内の都道府県及び市町村並びに組合の「3分の2以上」が加入したときに、その他の者は全て当該連合会の会員となる。設問の「2分の1以上」が誤り。"},{"law":"高齢者医療確保法","cat":"目的・制度趣旨","q":"高齢者医療確保法は、その前身である老人保健法を抜本的に見直し、平成20年4月1日から施行された。","a":true,"exp":"〇。老人保健制度の問題点を踏まえ、平成20年4月から施行された。","page":64,"detail":"〇。本文の制度趣旨のとおり。高齢者医療確保法は、その前身である老人保健法を抜本的に見直し、平成20年4月1日から施行された。老人保健制度は現役世代と高齢世代の費用負担関係が不明確であること等が問題点として指摘されていた。"},{"law":"高齢者医療確保法","cat":"医療費適正化計画","q":"厚生労働大臣は、医療費適正化を推進するため、6年ごとに、6年を1期として、全国医療費適正化計画を定めるものとする。","a":true,"exp":"〇。法8条。6年を1期として定める。都道府県医療費適正化計画も同様である。","page":68,"detail":"〇。法8条1項のとおり。本文では、厚生労働大臣は医療費適正化を推進するため、6年ごとに6年を1期として全国医療費適正化計画を定めるとされている。都道府県も医療費適正化基本方針に即して6年ごと・6年1期で都道府県医療費適正化計画を定める。"},{"law":"高齢者医療確保法","cat":"特定健康診査","q":"保険者は、特定健康診査等実施計画に基づき、<b>30歳</b>以上の加入者に対し、特定健康診査を行うものとする。","a":false,"exp":"×。40歳以上の加入者に対し特定健康診査を行う(法20条)。","page":73,"detail":"×。法20条のとおり、保険者は特定健康診査等実施計画に基づき、「40歳以上」の加入者に対し特定健康診査を行う。設問の「30歳」が誤り。加入者が相当の健康診査を受けその結果の提出を受けた等の場合は実施を要しない。"},{"law":"高齢者医療確保法","cat":"特定健康診査等実施計画","q":"保険者は、特定健康診査等基本指針に即して、<b>5年</b>ごとに、5年を1期として、特定健康診査等実施計画を定めるものとする。","a":false,"exp":"×。6年ごとに、6年を1期として定める(法19条)。","page":73,"detail":"×。法19条1項のとおり、保険者は特定健康診査等基本指針に即して、「6年ごとに、6年を1期として」特定健康診査等実施計画を定める。設問の「5年ごと・5年1期」が誤り。"},{"law":"高齢者医療確保法","cat":"後期高齢者医療制度","q":"後期高齢者医療の運営主体は、都道府県の区域ごとに当該区域内のすべての市町村が加入する後期高齢者医療広域連合である。","a":true,"exp":"〇。法48条。広域連合が運営主体(保険者)となる。","page":78,"detail":"〇。法48条のとおり。本文では、市町村は都道府県の区域ごとに当該区域内のすべての市町村が加入する後期高齢者医療広域連合を設けるとされ、広域連合が保険料の決定・医療給付等を行う運営主体(保険者)となる。"},{"law":"高齢者医療確保法","cat":"後期高齢者の被保険者","q":"後期高齢者医療広域連合の区域内に住所を有する<b>65歳</b>以上の者は、当然に後期高齢者医療の被保険者となる。","a":false,"exp":"×。当然に被保険者となるのは75歳以上の者である(法50条)。65歳以上75歳未満は一定の障害状態にある旨の認定を受けた場合に限る。","page":79,"detail":"×。法50条のとおり、当然に後期高齢者医療の被保険者となるのは「75歳以上」の者である。設問の「65歳」が誤り。65歳以上75歳未満の者は、政令で定める程度の障害の状態にある旨の広域連合の認定を受けた場合に限り被保険者となる。"},{"law":"高齢者医療確保法","cat":"被保険者資格喪失","q":"後期高齢者医療の被保険者が、生活保護法による保護を受けている世帯に属するに至ったときは、その該当するに至った日の翌日に資格を喪失する。","a":false,"exp":"×。適用除外（生活保護受給世帯に属する）に該当するに至った日(その日)に資格を喪失する(法53条)。住所を有しなくなった場合とは異なる。","page":80,"detail":"×。法53条のとおり、後期高齢者医療の被保険者が生活保護を受けている世帯に属するに至った(適用除外❶に該当するに至った)ときは、その該当するに至った日(その日)に資格を喪失する。設問の「翌日」が誤り。住所を有しなくなった場合等は翌日喪失で扱いが異なる。"},{"law":"高齢者医療確保法","cat":"一部負担金","q":"後期高齢者医療の一部負担金は、原則として100分の10であるが、一定以上の所得がある者は100分の20、現役並み所得者は100分の30である。","a":true,"exp":"〇。法67条、令7条。原則1割、一定以上所得者2割、現役並み所得者3割である。","page":83,"detail":"〇。法67条1項・令7条のとおり。本文では、一部負担金は原則100分の10、一定以上の所得がある者(所得28万円以上等)は100分の20、現役並み所得者(所得145万円以上)は100分の30とされている。"},{"law":"高齢者医療確保法","cat":"国の負担","q":"国は、後期高齢者医療広域連合に対し、負担対象額等の<b>12分の1</b>に相当する額を負担する。","a":false,"exp":"×。国の負担は12分の3である(法93条)。都道府県・市町村が各12分の1、国の調整交付金が12分の1である。","page":88,"detail":"×。法93条1項のとおり、国は後期高齢者医療広域連合に対し、負担対象額等の「12分の3」に相当する額を負担する。設問の「12分の1」が誤り。本文の負担割合表では国庫負担12分の3、調整交付金12分の1、都道府県12分の1、市町村12分の1である。"},{"law":"高齢者医療確保法","cat":"費用負担割合","q":"後期高齢者医療において、都道府県及び市町村は、それぞれ負担対象総額の<b>6分の1</b>に相当する額を負担する。","a":false,"exp":"×。都道府県・市町村ともに12分の1である(法96条・98条)。","page":89,"detail":"×。法96条・98条のとおり、都道府県・市町村はそれぞれ負担対象総額の「12分の1」に相当する額を負担する。設問の「6分の1」が誤り。国庫負担は12分の3、国の調整交付金は12分の1である。"},{"law":"高齢者医療確保法","cat":"後期高齢者負担率","q":"後期高齢者負担率は、2年ごとに政令で定めることとされており、令和8年度及び令和9年度における後期高齢者負担率は、100分の13.27である。","a":true,"exp":"〇。法100条等。令和8・9年度は100分の13.27である。","page":90,"detail":"〇。法100条2項・国庫負担金の算定等に関する政令のとおり。後期高齢者負担率は2年ごとに政令で定めることとされており、令和8年度及び令和9年度における後期高齢者負担率は100分の13.27である。"},{"law":"高齢者医療確保法","cat":"保険料","q":"後期高齢者医療の保険料を徴収する義務を負うのは後期高齢者医療広域連合であり、保険料率も広域連合の条例で定める。","a":false,"exp":"×。保険料を徴収するのは市町村である(法104条)。保険料率は広域連合の条例で全区域均一に定める。","page":91,"detail":"×。法104条1項のとおり、保険料を徴収しなければならないのは「市町村」である。設問の「後期高齢者医療広域連合」が誤り。保険料率は広域連合が全区域均一の保険料率であること等の基準に従い広域連合の条例で定める。"},{"law":"高齢者医療確保法","cat":"賦課額の限度","q":"後期高齢者医療の保険料の基礎賦課額は<b>67万円</b>を超えることができない。","a":false,"exp":"×。基礎賦課額は85万円を超えることができない(令18条)。子ども・子育て支援納付金賦課額は2万1,000円である。","page":91,"detail":"×。令18条1項のとおり、後期高齢者医療の保険料の基礎賦課額は「85万円」を超えることができない。設問の「67万円」(国保の基礎賦課額)が誤り。子ども・子育て支援納付金賦課額は2万1,000円を超えることができない。"},{"law":"高齢者医療確保法","cat":"賦課期日","q":"後期高齢者医療の保険料の賦課期日は、当該年度の<b>末日</b>とする。","a":false,"exp":"×。賦課期日は当該年度の初日である(法106条)。","page":92,"detail":"×。法106条のとおり、後期高齢者医療の保険料の賦課期日は当該年度の「初日」とする。設問の「末日」が誤り。"},{"law":"高齢者医療確保法","cat":"連帯納付義務","q":"後期高齢者医療の保険料を普通徴収の方法により徴収しようとする場合、世帯主及び配偶者の一方は、被保険者の保険料を連帯して納付する義務を負う。","a":true,"exp":"〇。法108条。世帯主は世帯に属する被保険者の、配偶者は他方の保険料を連帯納付する義務を負う。","page":93,"detail":"〇。法108条2項・3項のとおり。普通徴収の方法によって徴収しようとする場合、世帯主は当該世帯に属する被保険者の保険料を、配偶者の一方は被保険者たる他方の保険料を連帯して納付する義務を負う。"},{"law":"高齢者医療確保法","cat":"審査請求","q":"後期高齢者医療給付に関する処分等に不服がある者は、後期高齢者医療審査会に審査請求をすることができ、審査会は各都道府県に置かれる。","a":true,"exp":"〇。法128条・129条。後期高齢者医療審査会は各都道府県に置かれる。","page":97,"detail":"〇。法128条1項・129条のとおり。後期高齢者医療給付に関する処分等に不服がある者は後期高齢者医療審査会に審査請求をすることができ、後期高齢者医療審査会は各都道府県に置かれる。審査請求の方法等は国民健康保険法の規定が準用される。"},{"law":"高齢者医療確保法","cat":"時効","q":"保険料その他の徴収金を徴収する権利及び後期高齢者医療給付を受ける権利は、行使することができる時から2年を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法160条。いずれも2年で時効消滅する。","page":98,"detail":"〇。法160条1項のとおり。保険料その他の徴収金を徴収し又は還付を受ける権利及び後期高齢者医療給付を受ける権利は、行使することができる時から2年を経過したときは時効によって消滅する。"},{"law":"高齢者医療確保法","cat":"出産育児支援金","q":"令和6年度及び令和7年度における出産育児支援金率は、<b>100分の50</b>とされている。","a":false,"exp":"×。令和6・7年度の出産育児支援金率は100分の7である(法124条の3)。","page":94,"detail":"×。法124条の3・本文の表のとおり、令和6年度及び令和7年度における出産育児支援金率は「100分の7」である。設問の「100分の50」が誤り。令和8年度以降は2年ごとに政令で定める率となる。"},{"law":"介護保険法","cat":"目的","q":"介護保険法は、国民の共同連帯の理念に基づき介護保険制度を設け、もって国民の保健医療の向上及び福祉の増進を図ることを目的とする。","a":true,"exp":"〇。法1条のとおり。","page":102,"detail":"〇。法1条のとおり。本文では、介護保険法は国民の共同連帯の理念に基づき介護保険制度を設け、その行う保険給付等に関して必要な事項を定め、もって国民の保健医療の向上及び福祉の増進を図ることを目的とするとされている。"},{"law":"介護保険法","cat":"保険者","q":"介護保険を行う保険者は、市町村及び特別区である。","a":true,"exp":"〇。法3条。政府は保険者ではない。市町村及び特別区が保険者である。","page":103,"detail":"〇。法3条1項のとおり。本文では、市町村及び特別区は介護保険を行うものとされ、「注意」で政府は保険者ではないと明示されている。"},{"law":"介護保険法","cat":"被保険者","q":"介護保険の第1号被保険者は市町村の区域内に住所を有する<b>40歳以上</b>の者であり、第2号被保険者は40歳以上65歳未満の医療保険加入者である。","a":false,"exp":"×。第1号被保険者は65歳以上の者である(法9条)。","page":108,"detail":"×。法9条のとおり、第1号被保険者は市町村の区域内に住所を有する「65歳以上」の者である。設問の「40歳以上」が誤り。第2号被保険者が40歳以上65歳未満の医療保険加入者である。"},{"law":"介護保険法","cat":"被保険者","q":"介護保険の第2号被保険者は、市町村の区域内に住所を有する40歳以上65歳未満の者であり、医療保険加入者であるか否かは問わない。","a":false,"exp":"×。第2号被保険者は40歳以上65歳未満の「医療保険加入者」でなければならない(法9条)。","page":108,"detail":"×。法9条のとおり、第2号被保険者は市町村の区域内に住所を有する40歳以上65歳未満の「医療保険加入者」でなければならない。設問の「医療保険加入者であるか否かは問わない」が誤り。"},{"law":"介護保険法","cat":"要介護状態","q":"要介護状態とは、日常生活における基本的な動作の全部又は一部について、<b>3か月間</b>にわたり継続して常時介護を要すると見込まれる状態をいう。","a":false,"exp":"×。継続見込期間は6か月間である(法7条1項)。","page":105,"detail":"×。法7条1項・則2条のとおり、要介護状態とは、日常生活における基本的な動作の全部又は一部について「6か月間」にわたり継続して常時介護を要すると見込まれる状態をいう。設問の「3か月間」が誤り。"},{"law":"介護保険法","cat":"要介護者","q":"要介護状態にある<b>40歳以上65歳未満</b>の者は、その原因にかかわらず要介護者に該当する。","a":false,"exp":"×。40歳以上65歳未満の者は、要介護状態の原因が特定疾病によって生じたものである場合に限り要介護者に該当する(法7条3項)。","page":106,"detail":"×。法7条3項のとおり、要介護状態にある40歳以上65歳未満の者は、その要介護状態の原因である障害が「特定疾病」によって生じたものである場合に限り要介護者に該当する。設問の「その原因にかかわらず」が誤り。65歳以上の者は原因を問わず要介護者となる。"},{"law":"介護保険法","cat":"保険給付の種類","q":"介護保険法による保険給付は、介護給付、予防給付及び市町村特別給付の3つである。","a":true,"exp":"〇。法18条。市町村特別給付は条例で定めるものである。","page":110,"detail":"〇。法18条のとおり。本文では、保険給付は被保険者の要介護状態に関する「介護給付」、要支援状態に関する「予防給付」、及び条例で定める「市町村特別給付」の3つとされている。"},{"law":"介護保険法","cat":"介護認定審査会","q":"要介護認定及び要支援認定に係る審査判定業務を行わせるため、<b>都道府県</b>に介護認定審査会を置く。","a":false,"exp":"×。介護認定審査会は市町村に置かれる(法14条)。市町村間の共同設置や都道府県への委託は可能である。","page":111,"detail":"×。法14条のとおり、要介護認定及び要支援認定に係る審査判定業務を行わせるため「市町村」に介護認定審査会を置く。設問の「都道府県」が誤り。委員は市町村長(特別区は区長)が任命し、任期は原則2年である。"},{"law":"介護保険法","cat":"認定の効力","q":"要介護認定は、その申請のあった日にさかのぼってその効力を生じる。","a":true,"exp":"〇。法27条。申請のあった日にさかのぼって効力を生じる。","page":114,"detail":"〇。法27条8項のとおり。要介護認定は、その申請のあった日にさかのぼってその効力を生じる。認定は要介護状態区分に応じた有効期間内に限り効力を有する。"},{"law":"介護保険法","cat":"認定の処分期間","q":"要介護認定の申請に対する処分は、原則として当該申請のあった日から<b>14日</b>以内にしなければならない。","a":false,"exp":"×。原則として申請のあった日から30日以内である(法27条)。","page":114,"detail":"×。法27条11項のとおり、要介護認定の申請に対する処分は、原則として当該申請のあった日から「30日以内」にしなければならない。設問の「14日」が誤り。心身の状況の調査に日時を要する等特別な理由がある場合は延期できる。"},{"law":"介護保険法","cat":"居宅介護サービス費","q":"居宅介護サービス費の支給額は、原則として厚生労働大臣が定める基準により算定した費用の額等の100分の90に相当する額であるが、一定以上所得者は100分の80又は100分の70である。","a":true,"exp":"〇。法41条等。原則9割、一定以上所得者は8割又は7割である。","page":117,"detail":"〇。法41条等のとおり。本文では、居宅介護サービス費の支給額は、厚生労働大臣が定める基準により算定した費用の額等の100分の90に相当する額で、一定以上所得者については合計所得金額に応じて100分の80又は100分の70に相当する額とされている。"},{"law":"介護保険法","cat":"保険給付の調整","q":"介護給付等は、要介護状態等につき、労働者災害補償保険法の規定による給付等であって介護給付等に相当するものを受けることができるときは、政令で定める限度において行わない。","a":true,"exp":"〇。法20条。労災保険等から相当の給付を受けられるときは介護給付等を行わない。","page":125,"detail":"〇。法20条のとおり。本文では、介護給付等は、要介護状態等につき労働者災害補償保険法の規定による給付等であって介護給付等に相当するものを受けることができるときは政令で定める限度において行わないとされている。"},{"law":"介護保険法","cat":"支払方法の変更","q":"市町村は、保険料を滞納している第1号被保険者である要介護被保険者等が、納期限から<b>1年6か月</b>が経過するまでの間に保険料を納付しない場合に、被保険者証に支払方法変更の記載をする。","a":false,"exp":"×。支払方法の変更（現物給付から償還払いへ）は納期限から1年が経過するまでの間に納付しない場合である(法66条)。1年6か月は支払の一時差止めの基準である。","page":123,"detail":"×。法66条1項のとおり、支払方法の変更(現物給付から償還払いへ)は、保険料を滞納している第1号被保険者である要介護被保険者等が納期限から「1年間」が経過するまでに納付しない場合に行う。設問の「1年6か月」が誤り。1年6か月は保険給付の支払の一時差止め(法67条)の基準である。"},{"law":"介護保険法","cat":"介護サービス事業者の指定","q":"指定居宅サービス事業者の指定は、居宅サービスの種類及び事業所ごとに都道府県知事が行い、その指定は6年ごとに更新が必要である。","a":true,"exp":"〇。法70条等。指定居宅サービス事業者は都道府県知事が指定し、6年ごとの更新制である。","page":128,"detail":"〇。法70条の2第1項等のとおり。本文では、指定居宅サービス事業者の指定は居宅サービスの種類及び事業所ごとに都道府県知事が行い、介護サービス事業者の指定・許可は6年ごとに更新が必要とされている。"},{"law":"介護保険法","cat":"介護保険施設","q":"介護老人保健施設及び介護医療院は、いずれも都道府県知事の<b>指定</b>を受けたものである。","a":false,"exp":"×。介護老人保健施設及び介護医療院は都道府県知事の「許可」を受けたものである。指定介護老人福祉施設は「指定」である(法8条等)。","page":130,"detail":"×。本文のとおり、介護老人保健施設及び介護医療院は、いずれも都道府県知事の「許可」を受けたものである。設問の「指定」が誤り。指定介護老人福祉施設(特別養護老人ホーム)は都道府県知事の「指定」を受けたものである。"},{"law":"介護保険法","cat":"国の負担","q":"国は、市町村に対し、介護給付及び予防給付（施設等に係るものを除く）に要する費用の額の<b>100分の25</b>に相当する額を負担する。","a":false,"exp":"×。原則の介護給付・予防給付に対する国の負担は100分の20である(法121条)。施設等に係るものは100分の15である。","page":136,"detail":"×。法121条1項のとおり、原則の介護給付及び予防給付に要する費用に対する国の負担は「100分の20」である。設問の「100分の25」が誤り。介護保険施設及び特定施設入居者生活介護に係るもの等は100分の15である。"},{"law":"介護保険法","cat":"調整交付金","q":"介護保険における国の調整交付金の総額は、各市町村の介護給付及び予防給付に要する費用の額の総額の<b>100分の10</b>に相当する額である。","a":false,"exp":"×。調整交付金の総額は100分の5に相当する額である(法122条)。","page":137,"detail":"×。法122条1項・2項のとおり、調整交付金の総額は各市町村の介護給付及び予防給付に要する費用の額の総額の「100分の5」に相当する額である。設問の「100分の10」が誤り。"},{"law":"介護保険法","cat":"第2号被保険者負担率","q":"令和6年度から令和8年度までの第2号被保険者負担率は、100分の27とされている。","a":true,"exp":"〇。介護保険の国庫負担金の算定等に関する政令。当該期間は100分の27である。","page":137,"detail":"〇。介護保険の国庫負担金の算定等に関する政令5条のとおり。本文では、令和6年度から令和8年度までの第2号被保険者負担率は100分の27とされている。"},{"law":"介護保険法","cat":"保険料","q":"市町村は、第1号被保険者及び第2号被保険者の双方から、それぞれ保険料を徴収しなければならない。","a":false,"exp":"×。市町村は第2号被保険者からは保険料を徴収しない(法129条)。第2号被保険者の保険料は医療保険者が医療保険料とともに徴収する。","page":141,"detail":"×。法129条のとおり、市町村は第2号被保険者からは保険料を徴収しない。設問は誤り。第2号被保険者の保険料は、所属する医療保険制度において医療保険料とともに徴収され、交付金として市町村に交付される。"},{"law":"介護保険法","cat":"保険料率","q":"介護保険の保険料率は、おおむね<b>2年</b>を通じ財政の均衡を保つことができるものでなければならない。","a":false,"exp":"×。介護保険はおおむね3年を通じ財政の均衡を保つ(法129条)。2年は後期高齢者医療である。","page":141,"detail":"×。法129条3項のとおり、介護保険の保険料率は、おおむね「3年」を通じ財政の均衡を保つことができるものでなければならない。設問の「2年」が誤り。2年を通じ財政の均衡を保つのは後期高齢者医療(法104条3項)である。"},{"law":"介護保険法","cat":"保険料徴収","q":"介護保険の保険料の特別徴収について、老齢等年金給付の額が<b>15万円</b>未満である者には特別徴収を行わない。","a":false,"exp":"×。老齢等年金給付の額が18万円未満である者には特別徴収を行わない(令40条等)。","page":142,"detail":"×。令40条等のとおり、特別徴収について、老齢等年金給付の額が「18万円未満」である者には特別徴収を行わない。設問の「15万円」が誤り。老齢等年金給付の支給が停止されている等特別の事情を有する者も対象とならない。"},{"law":"介護保険法","cat":"市町村介護保険事業計画","q":"市町村は、基本指針に即して、3年を1期とする市町村介護保険事業計画を定めるものとされている。","a":true,"exp":"〇。法117条。3年を1期とする。都道府県介護保険事業支援計画も3年を1期とする。","page":143,"detail":"〇。法117条1項のとおり。本文では、市町村は基本指針に即して3年を1期とする市町村介護保険事業計画を定めるとされている。都道府県介護保険事業支援計画も3年を1期とする(法118条1項)。"},{"law":"介護保険法","cat":"審査請求","q":"保険給付に関する処分や保険料その他の徴収金に関する処分に不服のある者は、介護保険審査会に審査請求をすることができ、審査会は各都道府県に置かれる。","a":true,"exp":"〇。法183条・184条。介護保険審査会は各都道府県に置かれる。","page":146,"detail":"〇。法183条1項・184条のとおり。保険給付に関する処分や保険料その他の徴収金に関する処分に不服のある者は介護保険審査会に審査請求をすることができ、介護保険審査会は各都道府県に置かれる。"},{"law":"介護保険法","cat":"先取特権・時効","q":"保険料その他の徴収金の先取特権の順位は国税及び地方税に次ぐものとされ、保険料等を徴収する権利及び保険給付を受ける権利は2年で時効消滅する。","a":true,"exp":"〇。法199条・200条。先取特権は国税・地方税に次ぎ、時効は2年である。","page":147,"detail":"〇。法199条・200条1項のとおり。保険料その他の徴収金の先取特権の順位は国税及び地方税に次ぐものとされ、保険料等を徴収し又は還付を受ける権利及び保険給付を受ける権利は2年で時効消滅する。"},{"law":"船員保険法","cat":"目的・沿革","q":"船員保険制度は、現在は健康保険に相当する給付と労災保険の上乗せの給付を行う制度となっている。","a":true,"exp":"〇。平成22年以降、職務上疾病・年金部門は労災保険へ、失業部門は雇用保険へ統合され、現在の形となった。","page":150,"detail":"〇。本文のとおり。船員保険制度は船員を対象とする総合的な社会保険制度として創設されたが、昭和61年に職務外年金部門が厚生年金保険へ、平成22年に職務上疾病・年金部門が労災保険へ、失業部門が雇用保険へ統合され、現在は健康保険に相当する給付と労災保険の上乗せの給付を行う制度となっている。"},{"law":"船員保険法","cat":"保険者","q":"船員保険は、<b>日本年金機構</b>が管掌する。","a":false,"exp":"×。船員保険は全国健康保険協会が管掌する(法4条)。","page":151,"detail":"×。法4条1項のとおり、船員保険は「全国健康保険協会」が管掌する。設問の「日本年金機構」が誤り。なお被保険者資格の確認・標準報酬の決定・保険料の徴収等は厚生労働大臣が担当する。"},{"law":"船員保険法","cat":"業務分担","q":"船員保険において、被保険者の資格の取得及び喪失の確認、標準報酬月額の決定、保険料の徴収は、厚生労働大臣が担当する。","a":true,"exp":"〇。法5条。これらは厚生労働大臣が担当する。ただし疾病任意継続被保険者に係るものは全国健康保険協会が行う。","page":151,"detail":"〇。法5条のとおり。本文では、被保険者の資格の取得及び喪失の確認、標準報酬月額及び標準賞与額の決定、保険料の徴収は厚生労働大臣が担当するとされている。ただしこれらのうち疾病任意継続被保険者に係るものは全国健康保険協会が行う。"},{"law":"船員保険法","cat":"船員保険協議会","q":"船員保険協議会の委員は<b>20人</b>以内とし、その委員の任期は2年とする。","a":false,"exp":"×。船員保険協議会の委員は12人以内である(法6条)。任期は2年で正しい。","page":151,"detail":"×。法6条2項のとおり、船員保険協議会の委員は「12人以内」である。設問の「20人」が誤り。委員は厚生労働大臣が任命し、その任期は2年とする点は正しい。"},{"law":"船員保険法","cat":"疾病任意継続被保険者","q":"疾病任意継続被保険者となるには、資格喪失の日の前日まで継続して2か月以上被保険者であったもののうち、資格を喪失した日から<b>14日</b>以内に申し出る必要がある。","a":false,"exp":"×。資格を喪失した日から20日以内に全国健康保険協会に申し出る必要がある(法2条)。","page":152,"detail":"×。法2条のとおり、疾病任意継続被保険者となるには、資格喪失日の前日まで継続して2か月以上被保険者であった者が、その資格を喪失した日から「20日以内」に全国健康保険協会に申し出る必要がある。設問の「14日」が誤り。"},{"law":"船員保険法","cat":"資格取得・喪失","q":"船員保険の強制被保険者は、船員として船舶所有者に使用されるに至った日に資格を取得し、船員として使用されなくなるに至ったときはその翌日に資格を喪失する。","a":true,"exp":"〇。法11条・12条。取得は当日、喪失は原則翌日である。","page":153,"detail":"〇。法11条・12条のとおり。強制被保険者は、船員として船舶所有者に使用されるに至った日にその資格を取得し、船員として使用されなくなるに至ったとき等はその該当した日の翌日に資格を喪失する(その日に再取得したときはその日)。"},{"law":"船員保険法","cat":"傷病手当金","q":"船員保険の傷病手当金には、健康保険と異なり待期期間はなく、その支給を始めた日から通算して3年間支給される。","a":true,"exp":"〇。待期期間はなく、支給期間は通算して3年間である(法69条)。","page":156,"detail":"〇。法69条のとおり。本文の「注意」で待期期間はないとされ、支給期間はその支給を始めた日から通算して3年間支給されるとされている。健康保険と異なり待期期間がない点が特徴である。"},{"law":"船員保険法","cat":"出産手当金","q":"船員保険の出産手当金は、産前の支給日数に上限はなく、出産の日後56日以内において職務に服さなかった期間支給される。","a":true,"exp":"〇。法74条。産前の支給日数に上限はない点が健康保険と異なる。","page":157,"detail":"〇。法74条のとおり。本文の「注意」で、産前の支給日数には上限はないとされている。出産の日後56日以内において職務に服さなかった期間支給される。産前の支給日数に上限がない点が健康保険と異なる。"},{"law":"船員保険法","cat":"葬祭料","q":"船員保険の葬祭料は、生計を維持していた者であって葬祭を行うものに対し、政令で定める金額(<b>3万円</b>)を支給する。","a":false,"exp":"×。葬祭料の金額は5万円である(令6条)。","page":158,"detail":"×。令6条のとおり、葬祭料の金額は政令で定める金額「5万円」である。設問の「3万円」が誤り。被保険者等により生計を維持していた者であって葬祭を行うものに支給される。"},{"law":"船員保険法","cat":"行方不明手当金","q":"行方不明手当金は、被保険者が職務上の事由により行方不明になったときに被扶養者に支給されるが、行方不明の期間が<b>3か月</b>に満たないときは支給されない。","a":false,"exp":"×。行方不明の期間が1か月に満たないときは支給されない(法93条等)。支給期間は3か月間を限度とする。","page":161,"detail":"×。法93条等のとおり、行方不明手当金は被保険者が職務上の事由により行方不明になったとき被扶養者に支給されるが、行方不明の期間が「1か月」に満たないときは支給しない。設問の「3か月」が誤り。支給期間は行方不明となった日の翌日から起算して3か月間を限度とする。"},{"law":"船員保険法","cat":"国庫負担","q":"国庫は、職務上の事由又は通勤による疾病等に対する休業手当金に要する費用や障害年金に要する費用の一部等を負担する。","a":true,"exp":"〇。法112条。休業手当金や障害年金に要する費用の一部等を負担する。","page":162,"detail":"〇。法112条のとおり。本文では、国庫は職務上の事由又は通勤による疾病等に対する自宅以外の場所における療養に必要な宿泊・食事の支給に要する費用、休業手当金に要する費用、障害年金に要する費用の一部等を負担するとされている。"},{"law":"船員保険法","cat":"保険料率","q":"船員保険の疾病保険料率は、1000分の<b>10</b>から1000分の<b>35</b>までの範囲内において全国健康保険協会が決定する。","a":false,"exp":"×。疾病保険料率は1000分の40〜130の範囲である。1000分の10〜35は災害保健福祉保険料率である(法122条)。","page":163,"detail":"×。法122条のとおり、疾病保険料率は「1000分の40から1000分の130まで」の範囲内で全国健康保険協会が決定する。設問の範囲は災害保健福祉保険料率(1000分の10〜35)であり誤り。"},{"law":"船員保険法","cat":"時効","q":"船員保険の保険料等を徴収する権利及び傷病手当金を受ける権利は、いずれも2年を経過したときは時効によって消滅する。","a":true,"exp":"〇。法142条。保険料等及び傷病手当金等は2年、その他の保険給付（障害年金・遺族年金等）は5年である。","page":165,"detail":"〇。法142条のとおり。本文では、保険料等を徴収し又は還付を受ける権利及び傷病手当金等の保険給付を受ける権利は2年で時効消滅し、その他の保険給付(障害年金・遺族年金等)を受ける権利は5年で時効消滅するとされている。"},{"law":"児童手当法","cat":"目的","q":"児童手当法は、子ども・子育て支援法に規定する子ども・子育て支援の適切な実施を図るため、児童を養育している者に児童手当を支給することにより、家庭等における生活の安定に寄与すること等を目的とする。","a":true,"exp":"〇。法1条のとおり。","page":168,"detail":"〇。法1条のとおり。本文では、児童手当法は子ども・子育て支援法に規定する子ども・子育て支援の適切な実施を図るため、児童を養育している者に児童手当を支給することにより家庭等における生活の安定に寄与するとともに、次代の社会を担う児童の健やかな成長に資することを目的とするとされている。"},{"law":"児童手当法","cat":"児童の定義","q":"児童手当法における「児童」とは、18歳に達する日以後の最初の3月31日までの間にある者であって、日本国内に住所を有するもの等をいう。","a":true,"exp":"〇。法3条1項のとおり。","page":169,"detail":"〇。法3条1項のとおり。本文では、「児童」とは18歳に達する日以後の最初の3月31日までの間にある者であって、日本国内に住所を有するもの又は留学等内閣府令で定める理由により日本国内に住所を有しないものをいうとされている。"},{"law":"児童手当法","cat":"児童手当の額","q":"児童手当の額は、3歳未満の児童については1人当たり月額<b>10,000円</b>(第3子以降は30,000円)である。","a":false,"exp":"×。3歳未満の児童は1人当たり月額15,000円(第3子以降は30,000円)である。3歳以上が10,000円である(法6条)。","page":174,"detail":"×。法6条・本文の表のとおり、3歳未満の児童は1人当たり月額「15,000円」(第3子以降は30,000円)である。設問の「10,000円」が誤り。10,000円は3歳以上18歳到達後最初の3月31日までの額である。"},{"law":"児童手当法","cat":"児童手当の額","q":"児童手当の額は、3歳以上18歳に達する日以後の最初の3月31日までの児童については1人当たり月額<b>15,000円</b>(第3子以降は30,000円)である。","a":false,"exp":"×。3歳以上は1人当たり月額10,000円である(法6条)。15,000円は3歳未満である。","page":174,"detail":"×。法6条・本文の表のとおり、3歳以上18歳に達する日以後最初の3月31日までの児童は1人当たり月額「10,000円」(第3子以降は30,000円)である。設問の「15,000円」が誤り。15,000円は3歳未満の額である。"},{"law":"児童手当法","cat":"認定","q":"一般受給資格者は、児童手当の支給を受けようとするときは、その受給資格及び児童手当の額について、住所地の市町村長の認定を受けなければならない。","a":true,"exp":"〇。法7条。市町村長の認定を受ける必要がある。","page":176,"detail":"〇。法7条のとおり。本文では、一般受給資格者は児童手当の支給を受けようとするときは、その受給資格及び児童手当の額について住所地の市町村長(特別区の区長を含む)の認定を受けなければならないとされている。"},{"law":"児童手当法","cat":"支給開始","q":"児童手当の支給は、受給資格者が認定の請求をした日の属する月から始め、支給すべき事由が消滅した日の属する月で終わる。","a":false,"exp":"×。支給は認定の請求をした日の属する月の「翌月」から始める(法8条)。終期は支給事由が消滅した日の属する月である。","page":176,"detail":"×。法8条2項のとおり、児童手当の支給は、受給資格者が認定の請求をした日の属する月の「翌月」から始め、支給すべき事由が消滅した日の属する月で終わる。設問の「日の属する月から始め」が誤り。"},{"law":"児童手当法","cat":"児童手当の支払","q":"児童手当は、毎年2月、4月、6月、8月、10月及び12月の6期に、それぞれの前月までの分を支払う。","a":true,"exp":"〇。法8条4項。偶数月の6期に前月までの分を支払う。","page":177,"detail":"〇。法8条4項のとおり。本文では、児童手当は毎年2月、4月、6月、8月、10月及び12月の6期に、それぞれの前月までの分を支払うとされている。"},{"law":"児童手当法","cat":"費用負担","q":"被用者及び被用者等でない者に対する3歳以上児童手当の支給に要する費用について、市町村の負担割合は<b>15分の1</b>である。","a":false,"exp":"×。3歳以上児童手当については市町村の負担は9分の1である(法18条等)。","page":180,"detail":"×。法18条等・本文のとおり、被用者及び被用者等でない者に対する3歳以上児童手当の支給に要する費用について、市町村の負担割合は「9分の1」である。設問の「15分の1」が誤り。9分の7は国、9分の1は都道府県の負担である。"},{"law":"児童手当法","cat":"費用負担","q":"被用者及び被用者等でない者に対する3歳以上児童手当の支給に要する費用について、市町村の負担割合は<b>15分の1</b>である。","a":false,"exp":"×。3歳以上児童手当については市町村の負担は9分の1である。15分の1は被用者等でない者の3歳未満児童手当に係る市町村負担割合である(法18条等)。","page":181,"detail":"×。法18条等・本文のとおり、3歳以上児童手当については市町村の負担は「9分の1」である。設問の「15分の1」が誤り。15分の1は被用者等でない者の3歳未満児童手当に係る市町村(及び都道府県)の負担割合である。"},{"law":"児童手当法","cat":"不正利得・罰則","q":"偽りその他不正の手段により児童手当の支給を受けた者があるときは、市町村長は地方税の滞納処分の例により受給額に相当する金額を徴収でき、不正受給者は3年以下の拘禁刑又は30万円以下の罰金に処せられる。","a":true,"exp":"〇。法14条・31条のとおり。","page":179,"detail":"〇。法14条・31条のとおり。本文では、偽りその他不正の手段により児童手当の支給を受けた者があるときは市町村長が地方税の滞納処分の例により受給額相当額を徴収でき、不正受給者は3年以下の拘禁刑又は30万円以下の罰金に処せられるとされている。"},{"law":"児童手当法","cat":"受給権の保護","q":"児童手当の支給を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができない。","a":true,"exp":"〇。法15条のとおり。","page":179,"detail":"〇。法15条のとおり。本文では、児童手当の支給を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができないとされている。"},{"law":"児童手当法","cat":"時効","q":"児童手当の支給を受ける権利及び不正利得の徴収金を徴収する権利は、これらを行使することができるときから2年を経過したときは、時効によって消滅する。","a":true,"exp":"〇。法23条。いずれも2年で時効消滅する。","page":183,"detail":"〇。法23条1項のとおり。本文では、児童手当の支給を受ける権利及び不正利得の徴収金を徴収する権利は、これらを行使することができるときから2年を経過したときは時効によって消滅するとされている。"},{"law":"社会保険労務士法","cat":"使命","q":"社会保険労務士は、労働及び社会保険に関する法令の円滑な実施を通じて適切な労務管理の確立等に寄与すること等を使命とする。","a":true,"exp":"〇。法1条のとおり。","page":186,"detail":"〇。法1条のとおり。本文では、社会保険労務士は、労働及び社会保険に関する法令の円滑な実施を通じて適切な労務管理の確立及び個人の尊厳が保持された適正な労働環境の形成に寄与すること等を使命とするとされている。"},{"law":"社会保険労務士法","cat":"資格","q":"弁護士となる資格を有する者は、社会保険労務士となる資格を有する。","a":true,"exp":"〇。法3条。社会保険労務士試験に合格した者等のほか、弁護士となる資格を有する者も資格を有する。","page":187,"detail":"〇。法3条のとおり。本文では、社会保険労務士試験に合格した者、免除科目が全部に及び一定の実務経験を有する者のほか、弁護士となる資格を有する者も社会保険労務士となる資格を有するとされている。"},{"law":"社会保険労務士法","cat":"欠格事由","q":"懲戒処分により社会保険労務士の失格処分を受けた者は、失格処分を受けた日から<b>5年</b>を経過しない間は、社会保険労務士となる資格を有しない。","a":false,"exp":"×。失格処分を受けた日から3年を経過しない者が欠格事由に該当する(法5条)。","page":188,"detail":"×。法5条のとおり、懲戒処分により社会保険労務士の失格処分を受けた者は、失格処分を受けた日から「3年」を経過しない間は資格を有しない。設問の「5年」が誤り。罰金以上の刑、登録取消し処分等も同様に3年を経過しない者が欠格事由に該当する。"},{"law":"社会保険労務士法","cat":"欠格事由","q":"懲戒処分により社会保険労務士の失格処分を受けた者は、失格処分を受けた日から<b>5年</b>を経過しない間は、社会保険労務士となる資格を有しない。","a":false,"exp":"×。失格処分を受けた日から3年を経過しない者が欠格事由に該当する(法5条)。","page":188,"detail":"×。法5条のとおり、懲戒処分により失格処分を受けた者は、失格処分を受けた日から「3年」を経過しない者が欠格事由に該当する。設問の「5年」が誤り。本文の欠格事由❸でいずれも3年経過要件で統一されている。"},{"law":"社会保険労務士法","cat":"業務","q":"労働社会保険諸法令に基づいて行政機関等に提出する申請書等の作成は、社会保険労務士の業務に含まれる。","a":true,"exp":"〇。法2条1項。申請書等の作成、提出代行、事務代理等が業務である。","page":188,"detail":"〇。法2条1項のとおり。本文では、労働社会保険諸法令に基づいて行政機関等に提出する申請書、届出書、報告書等の書類(申請書等)を作成すること、その提出に関する手続を代わってすること(提出代行事務)等が社会保険労務士の業務とされている。"},{"law":"社会保険労務士法","cat":"紛争解決手続代理業務","q":"紛争解決手続代理業務は、すべての社会保険労務士が行うことができる。","a":false,"exp":"×。紛争解決手続代理業務は特定社会保険労務士に限り行うことができる(法2条)。","page":190,"detail":"×。法2条のとおり、紛争解決手続代理業務は「特定社会保険労務士」に限り行うことができる。設問の「すべての社会保険労務士」が誤り。特定社会保険労務士は紛争解決手続代理業務試験に合格しその旨の付記を受けた者である。"},{"law":"社会保険労務士法","cat":"補佐人制度","q":"社会保険労務士は、労務管理その他労働社会保険に関する事項について、裁判所において、補佐人として、弁護士である代理人とともに出頭し、陳述をすることができる。","a":true,"exp":"〇。法2条の2。弁護士である代理人とともに出頭・陳述できる。","page":191,"detail":"〇。法2条の2のとおり。本文では、社会保険労務士は事業における労務管理その他の労働に関する事項等について、裁判所において補佐人として弁護士である代理人とともに出頭し陳述をすることができるとされている。"},{"law":"社会保険労務士法","cat":"試験の実施","q":"社会保険労務士試験は、毎年1回以上、<b>全国社会保険労務士会連合会</b>が行う。","a":false,"exp":"×。社会保険労務士試験は厚生労働大臣が行う(法10条)。厚生労働大臣は試験事務(合格決定を除く)を連合会に行わせることができる。","page":192,"detail":"×。法10条のとおり、社会保険労務士試験は毎年1回以上「厚生労働大臣」が行う。設問の「全国社会保険労務士会連合会」が誤り。厚生労働大臣は試験事務(合格の決定に関する事務を除く)を連合会に行わせることができる。"},{"law":"社会保険労務士法","cat":"登録","q":"社会保険労務士となる資格を有する者が社会保険労務士となるには、全国社会保険労務士会連合会に備えられた社会保険労務士名簿に登録を受けなければならない。","a":true,"exp":"〇。法14条の2。登録は連合会が行う。","page":194,"detail":"〇。法14条の2のとおり。本文では、社会保険労務士となる資格を有する者が社会保険労務士となるには社会保険労務士名簿に登録を受けなければならず、名簿は連合会に備えられ、その登録は連合会が行うとされている。"},{"law":"社会保険労務士法","cat":"登録拒否","q":"連合会が登録を拒否しようとする場合においては、資格審査会の議決に基づいてしなければならない。","a":true,"exp":"〇。法14条の6。登録拒否は資格審査会の議決に基づき、申請者に弁明の機会を与える。","page":195,"detail":"〇。法14条の6第2項のとおり。本文では、連合会は登録を拒否しようとする場合においては資格審査会の議決に基づいてしなければならず、あらかじめ当該申請者に通知して弁明する機会を与えなければならないとされている。"},{"law":"社会保険労務士法","cat":"秘密を守る義務","q":"開業社会保険労務士又は社会保険労務士法人の社員は、正当な理由がなくて、その業務に関して知り得た秘密を他に漏らし、又は盗用してはならず、これは社会保険労務士でなくなった後も同様である。","a":true,"exp":"〇。法21条。資格喪失後も守秘義務は継続する。","page":201,"detail":"〇。法21条のとおり。本文では、開業社会保険労務士又は社会保険労務士法人の社員は、正当な理由がなくてその業務に関して知り得た秘密を他に漏らし又は盗用してはならず、これは開業社会保険労務士等でなくなった後も同様であるとされている。"},{"law":"社会保険労務士法","cat":"事務所","q":"開業社会保険労務士は、その業務を行うための事務所を2以上設けてはならない。","a":true,"exp":"〇。法18条。ただし厚生労働大臣の許可を受けたときはこの限りでない。","page":199,"detail":"〇。法18条のとおり。本文では、開業社会保険労務士はその業務を行うための事務所を2以上設けてはならないとされている。ただし特に必要がある場合に厚生労働大臣の許可を受けたときはこの限りでない。"},{"law":"社会保険労務士法","cat":"懲戒の種類","q":"社会保険労務士に対する懲戒処分は、戒告、<b>2年</b>以内の業務の停止、失格処分の3種である。","a":false,"exp":"×。業務の停止は「1年以内」である(法25条)。懲戒処分は戒告・1年以内の業務停止・失格処分の3種である。","page":204,"detail":"×。法25条のとおり、業務の停止は「1年以内」である。設問の「2年以内」が誤り。社会保険労務士に対する懲戒処分は、戒告、1年以内の業務の停止、失格処分(資格を失わせる処分)の3種である。"},{"law":"社会保険労務士法","cat":"懲戒処分","q":"社会保険労務士に対する懲戒処分は、<b>全国社会保険労務士会連合会</b>が行う。","a":false,"exp":"×。懲戒処分は厚生労働大臣が行う(法25条の2等)。連合会が行うのは登録に関する処分である。","page":205,"detail":"×。法25条の2・25条の3のとおり、社会保険労務士に対する懲戒処分は「厚生労働大臣」が行う。設問の「全国社会保険労務士会連合会」が誤り。連合会が行うのは登録に関する処分である。"},{"law":"社会保険労務士法","cat":"懲戒処分の効果","q":"社会保険労務士が失格処分を受けても、社会保険労務士試験の合格という事実が取り消されるわけではない。","a":true,"exp":"〇。失格処分は資格を失わせる処分であって、試験合格の事実を取り消す処分ではない。","page":205,"detail":"〇。法25条等・本文「処分の効果」のとおり。失格処分は社会保険労務士の資格を失わせる処分であって、社会保険労務士試験の合格という事実を取り消す処分ではない。"},{"law":"社会保険労務士法","cat":"罰則","q":"「信用失墜行為の禁止」の規定に違反した場合には、罰則が科せられる。","a":false,"exp":"×。信用失墜行為の禁止の規定に違反しても罰則はない(法32条等参照)。","page":203,"detail":"×。本文「罰則のない規定の例」のとおり、「信用失墜行為の禁止」の規定に違反しても罰則はない。設問は誤り。罰則が科されるのは不正行為の指示等の禁止、秘密を守る義務、業務の制限、名称の使用制限の違反等である。"},{"law":"社会保険労務士法","cat":"聴聞の特例","q":"厚生労働大臣は、戒告又は業務の停止の懲戒処分をしようとするときは聴聞を行わなければならず、聴聞の期日における審理は公開により行わなければならない。","a":true,"exp":"〇。法25条の4。聴聞の審理は公開で行う。","page":206,"detail":"〇。法25条の4のとおり。本文では、厚生労働大臣は戒告又は業務の停止の懲戒処分をしようとするときは聴聞を行わなければならず、聴聞の期日における審理は公開により行わなければならないとされている。"},{"law":"社会保険労務士法","cat":"社会保険労務士法人","q":"社会保険労務士法人の社員は、社会保険労務士でなければならない。","a":true,"exp":"〇。法25条の8。社員は社会保険労務士に限られる。","page":208,"detail":"〇。法25条の8第1項のとおり。本文では、社会保険労務士法人の社員は社会保険労務士でなければならないとされている。出資等をした法人の所有者・経営責任者を指し、勤務社会保険労務士は社員ではない。"},{"law":"社会保険労務士法","cat":"社会保険労務士法人","q":"社会保険労務士法人の財産をもってその債務を完済することができないときは、各社員は、連帯して、その弁済の責任を負う。","a":true,"exp":"〇。法25条の15の3。社員は連帯して弁済責任を負う。","page":210,"detail":"〇。法25条の15の3第1項のとおり。本文では、社会保険労務士法人の財産をもってその債務を完済することができないときは、各社員は連帯してその弁済の責任を負うとされている。"},{"law":"社会保険労務士法","cat":"法人への処分","q":"厚生労働大臣は、社会保険労務士法人が法令に違反し、又は運営が著しく不当と認められるときは、戒告、1年以内の業務の全部又は一部の停止、又は解散を命じることができる。","a":true,"exp":"〇。法25条の24。法人への処分は戒告、業務停止、解散命令の3種である。","page":213,"detail":"〇。法25条の24第1項のとおり。本文では、厚生労働大臣は社会保険労務士法人が法令に違反し又は運営が著しく不当と認められるときは、戒告、1年以内の業務の全部又は一部の停止、又は解散を命じることができるとされている。"},{"law":"社会保険労務士法","cat":"社会保険労務士会","q":"社会保険労務士は、社会保険労務士名簿に登録を受けた時に、当然、社会保険労務士会の会員となる。","a":true,"exp":"〇。法25条の29。登録時に当然入会となる。","page":214,"detail":"〇。法25条の29第1項のとおり。本文では、社会保険労務士は社会保険労務士名簿に登録を受けた時に当然、社会保険労務士会の会員となるとされている。"},{"law":"社会保険労務士法","cat":"名称の使用制限","q":"社会保険労務士でない者は、社会保険労務士又は社労士その他これに類似する名称を用いてはならない。","a":true,"exp":"〇。法26条。名称の使用制限に違反すると罰則がある。","page":202,"detail":"〇。法26条のとおり。本文では、社会保険労務士でない者は社会保険労務士又は社労士その他これに類似する名称を用いてはならないとされている。違反すると100万円以下の罰金の対象となる。"},{"law":"確定給付企業年金法","cat":"目的・沿革","q":"確定給付企業年金法は、確定給付型の企業年金における受給権保護のための制度整備を目的に、平成13年に制定され、平成14年4月から施行された。","a":true,"exp":"〇。受給権保護のため平成14年4月から施行された。","page":218,"detail":"〇。本文の制度趣旨のとおり。確定給付企業年金法は、確定給付型の企業年金における受給権保護のための制度整備を目的に平成13年6月に制定され、平成14年4月から施行された。"},{"law":"確定給付企業年金法","cat":"種類","q":"確定給付企業年金には、規約型企業年金と基金型企業年金の2種類がある。","a":true,"exp":"〇。法2条。規約型と基金型の2種類がある。","page":218,"detail":"〇。法2条のとおり。本文では、確定給付企業年金には規約型(労使合意の年金規約に基づき外部機関で積立)と基金型(母体企業とは別に運営主体となる基金を設立)の2種類があるとされている。"},{"law":"確定給付企業年金法","cat":"実施","q":"規約型企業年金を実施しようとする事業主は、確定給付企業年金に係る規約について厚生労働大臣の<b>認可</b>を受けなければならない。","a":false,"exp":"×。規約型企業年金については規約について厚生労働大臣の「承認」を受ける(法3条)。基金型企業年金（企業年金基金の設立）が「認可」である。","page":220,"detail":"×。法3条1項のとおり、規約型企業年金については規約について厚生労働大臣の「承認」を受ける。設問の「認可」が誤り。企業年金基金(基金型)については当該企業年金基金の設立について厚生労働大臣の「認可」を受ける。"},{"law":"確定給付企業年金法","cat":"加入者","q":"確定給付企業年金を実施する実施事業所に使用される厚生年金保険の被保険者は、原則として加入者となる。","a":true,"exp":"〇。法25条。規約で資格を定めた場合は当該資格を有しない者は加入者としない。","page":221,"detail":"〇。法25条のとおり。本文では、確定給付企業年金を実施する実施事業所に使用される厚生年金保険の被保険者は加入者とするとされている。規約で一定の資格を定めた場合は当該資格を有しない者は加入者としない。"},{"law":"確定給付企業年金法","cat":"給付の種類","q":"確定給付企業年金における法定給付は、老齢給付金及び脱退一時金であり、障害給付金及び遺族給付金は規約で定めるところにより行うことができる任意給付である。","a":true,"exp":"〇。法29条。老齢給付金・脱退一時金が法定給付、障害給付金・遺族給付金が任意給付である。","page":222,"detail":"〇。法29条のとおり。本文では、法定給付として老齢給付金及び脱退一時金が、規約で定めるところにより行うことができる任意給付として障害給付金及び遺族給付金が挙げられている。"},{"law":"確定給付企業年金法","cat":"年金給付の支給期間","q":"確定給付企業年金の年金給付は、終身又は<b>10年</b>以上にわたり、毎年1回以上定期的に支給するものでなければならない。","a":false,"exp":"×。終身又は5年以上にわたり、毎年1回以上定期的に支給するものでなければならない(法33条)。","page":223,"detail":"×。法33条のとおり、年金給付は終身又は「5年以上」にわたり、毎年1回以上定期的に支給するものでなければならない。設問の「10年以上」が誤り。"},{"law":"確定給付企業年金法","cat":"老齢給付金","q":"老齢給付金の支給開始要件として規約で定める年齢は、60歳以上70歳以下の規約で定める年齢に達したときに支給するものでなければならない。","a":true,"exp":"〇。法36条。60歳以上70歳以下の規約で定める年齢である。","page":223,"detail":"〇。法36条2項・本文のとおり。老齢給付金支給開始要件として規約で定める年齢は、60歳以上70歳以下の規約で定める年齢に達したときに支給するものでなければならない。"},{"law":"確定給付企業年金法","cat":"老齢給付金","q":"確定給付企業年金の規約において、<b>30年</b>を超える加入者期間を老齢給付金の給付を受けるための要件として定めてはならない。","a":false,"exp":"×。20年を超える加入者期間を要件としてはならない(法36条)。","page":223,"detail":"×。法36条・令28条のとおり、規約において「20年」を超える加入者期間を老齢給付金の給付を受けるための要件として定めてはならない。設問の「30年」が誤り。"},{"law":"確定給付企業年金法","cat":"脱退一時金","q":"確定給付企業年金の脱退一時金について、支給要件となる加入者期間は<b>5年</b>を超えることはできない。","a":false,"exp":"×。脱退一時金の支給要件となる加入者期間は3年を超えることはできない(法41条)。","page":224,"detail":"×。法41条のとおり、脱退一時金の支給要件となる加入者期間は「3年」を超えることはできない。設問の「5年」が誤り。老齢給付金の受給要件を満たす者には脱退一時金は支給されない。"},{"law":"確定給付企業年金法","cat":"掛金","q":"事業主は、給付に要する費用に充てるため、規約で定めるところにより、年1回以上、定期的に掛金を拠出しなければならない。","a":true,"exp":"〇。法55条。加入者も規約で定めるところにより掛金の一部を負担できる。","page":225,"detail":"〇。法55条1項のとおり。本文では、事業主は給付に要する費用に充てるため規約で定めるところにより年1回以上、定期的に掛金を拠出しなければならないとされている。加入者も規約で定めるところにより掛金の一部を負担できる。"},{"law":"確定給付企業年金法","cat":"財政再計算","q":"事業主等は、少なくとも<b>3年</b>ごとに掛金の額の基準に従って掛金の額を再計算しなければならない。","a":false,"exp":"×。少なくとも5年ごとに掛金の額を再計算する(法58条)。","page":225,"detail":"×。法58条1項のとおり、事業主等は少なくとも「5年」ごとに掛金の額の基準に従って掛金の額を再計算しなければならない。設問の「3年」が誤り。"},{"law":"確定給付企業年金法","cat":"企業年金連合会","q":"企業年金連合会は、確定給付企業年金の中途脱退者及び終了制度加入者等に係る老齢給付金の支給を共同して行うこと等を目的として設立することができ、全国を通じて1個とする。","a":true,"exp":"〇。法91条の2等。全国を通じて1個である。","page":230,"detail":"〇。法91条の2・91条の28のとおり。本文では、企業年金連合会は中途脱退者及び終了制度加入者等に係る老齢給付金の支給を共同して行うこと等を目的に設立することができ、全国を通じて1個とするとされている。"},{"law":"確定給付企業年金法","cat":"基金の解散","q":"企業年金基金は、代議員会において代議員の定数の4分の3以上の多数により議決したとき等は、厚生労働大臣の認可を受けて解散することができる。","a":true,"exp":"〇。法85条。4分の3以上の議決と厚生労働大臣の認可が必要である。","page":229,"detail":"〇。法85条のとおり。本文では、基金は代議員会において代議員の定数の4分の3以上の多数により議決したとき等は厚生労働大臣の認可を受けて解散することができるとされている。"},{"law":"確定給付企業年金法","cat":"報告書の提出","q":"事業主等は、毎事業年度終了後<b>6か月</b>以内に、確定給付企業年金の事業及び決算に関する報告書を作成し、厚生労働大臣に提出しなければならない。","a":false,"exp":"×。事業主等は4か月以内に提出する(法100条)。連合会が6か月以内である。","page":233,"detail":"×。法100条1項のとおり、事業主等は毎事業年度終了後「4か月以内」に確定給付企業年金の事業及び決算に関する報告書を作成し厚生労働大臣に提出しなければならない。設問の「6か月」が誤り。6か月以内は連合会の業務報告書(法100条の2)である。"},{"law":"確定拠出年金法","cat":"目的・沿革","q":"確定拠出年金法は、個人又は事業主が拠出した資金を個人が自己の責任において運用の指図を行い、高齢期にその結果に基づいた給付を受けることができるようにすること等を目的に、平成13年に制定された。","a":true,"exp":"〇。法1条。平成13年6月制定、同年10月施行である。","page":236,"detail":"〇。法1条・本文のとおり。確定拠出年金法は、個人又は事業主が拠出した資金を個人が自己の責任において運用の指図を行い、高齢期にその結果に基づいた給付を受けることができるようにすること等を目的に、平成13年6月に制定され、同年10月から施行された。"},{"law":"確定拠出年金法","cat":"種類","q":"確定拠出年金には、厚生年金適用事業所の事業主が実施する企業型年金と、<b>国民年金基金</b>が実施する個人型年金の2種類がある。","a":false,"exp":"×。個人型年金を実施するのは国民年金基金連合会である(法2条)。","page":236,"detail":"×。法2条のとおり、個人型年金を実施するのは「国民年金基金連合会」である。設問の「国民年金基金」が誤り。企業型年金は厚生年金適用事業所の事業主が実施する。"},{"law":"確定拠出年金法","cat":"企業型年金の実施","q":"厚生年金適用事業所の事業主が企業型年金を実施しようとするときは、過半数労働組合等の同意を得て規約を作成し、規約について厚生労働大臣の承認を受けなければならない。","a":true,"exp":"〇。法3条。過半数労働組合等の同意と厚生労働大臣の承認が必要である。","page":240,"detail":"〇。法3条1項のとおり。本文では、厚生年金適用事業所の事業主が企業型年金を実施しようとするときは、第1号等厚生年金被保険者の過半数で組織する労働組合等の同意を得て規約を作成し、規約について厚生労働大臣の承認を受けなければならないとされている。"},{"law":"確定拠出年金法","cat":"企業型年金加入者","q":"実施事業所に使用される第1号等厚生年金被保険者は、原則として企業型年金加入者となる。","a":true,"exp":"〇。法9条。ただし規約で資格を定めた場合の当該資格を有しない者等は加入者としない。","page":242,"detail":"〇。法9条1項のとおり。本文では、実施事業所に使用される第1号等厚生年金被保険者は企業型年金加入者とするとされている。規約で一定の資格を定めた場合の当該資格を有しない者や老齢給付金の受給権を有する者等は加入者としない。"},{"law":"確定拠出年金法","cat":"拠出限度額","q":"企業型年金の拠出限度額は、他制度加入者以外の者について月額<b>23,000円</b>である。","a":false,"exp":"×。他制度加入者以外の者の拠出限度額は月額55,000円である(令11条)。","page":245,"detail":"×。令11条・本文の表のとおり、企業型年金の拠出限度額は他制度加入者以外の者について月額「55,000円」(年額660,000円)である。設問の「23,000円」が誤り。他制度加入者は55,000円から他制度掛金相当額を控除した額である。"},{"law":"確定拠出年金法","cat":"運用の方法","q":"企業型運用関連運営管理機関等は、対象運用方法を、政令で定める数(35)以下で、かつ、<b>5以上</b>で選定し、企業型年金加入者等に提示しなければならない。","a":false,"exp":"×。上限35以下で、かつ3以上で選定する(法23条、令15条の2)。","page":247,"detail":"×。法23条1項・令15条の2のとおり、企業型運用関連運営管理機関等は対象運用方法を、政令で定める数(35)以下で、かつ「3以上」で選定し提示しなければならない。設問の「5以上」が誤り。上限が35である。"},{"law":"確定拠出年金法","cat":"給付の種類","q":"企業型年金の給付は、老齢給付金、障害給付金及び死亡一時金とされ、経過措置として脱退一時金が設けられている。","a":true,"exp":"〇。法28条等。3つの給付に加え、経過措置の脱退一時金がある。","page":250,"detail":"〇。法28条・附則2条の2のとおり。本文では、企業型年金の給付は老齢給付金、障害給付金及び死亡一時金とされ、これらのほか経過措置として脱退一時金が設けられているとされている。"},{"law":"確定拠出年金法","cat":"老齢給付金","q":"企業型年金の老齢給付金について、60歳以上61歳未満で支給請求するには、原則として10年以上の通算加入者等期間を有することが必要である。","a":true,"exp":"〇。法33条。60歳以上61歳未満は10年、年齢が上がるほど必要年数は短くなる。","page":250,"detail":"〇。法33条1項・本文の表のとおり。企業型年金の老齢給付金について、60歳以上61歳未満で支給請求するには原則として10年以上の通算加入者等期間を有することが必要である。年齢が上がるほど必要年数は短くなり、65歳以上は1月である。"},{"law":"確定拠出年金法","cat":"死亡一時金","q":"死亡一時金を受けることができる遺族の第1順位は、配偶者である。","a":true,"exp":"〇。法41条。配偶者が第1順位である(届出をしていない事実婚の配偶者を含む)。","page":252,"detail":"〇。法41条のとおり。本文では、死亡一時金を受けることができる遺族の第1順位は配偶者であるとされている。配偶者には届出をしていないが事実上婚姻関係と同様の事情にあった者を含む。"},{"law":"確定拠出年金法","cat":"個人型年金","q":"国民年金の第3号被保険者は、個人型年金加入者となることはできない。","a":false,"exp":"×。第3号被保険者は第3号加入者として個人型年金加入者となることができる(法62条)。","page":253,"detail":"×。法62条・本文のとおり、国民年金の第3号被保険者は「第3号加入者」として個人型年金加入者となることができる。設問は誤り。"},{"law":"確定拠出年金法","cat":"個人型年金加入者","q":"国民年金の第1号被保険者であっても、申請免除等により保険料が免除されている保険料免除者は、原則として個人型年金の第1号加入者とならない。","a":true,"exp":"〇。法62条。保険料免除者は第1号加入者とならない。","page":253,"detail":"〇。法62条・本文のとおり。法定免除(生活保護法による生活扶助等を受けるものに限る)、申請免除(全部又は一部)又は学生納付特例により保険料が免除されている者(保険料免除者)は、第1号加入者とならない。"},{"law":"確定拠出年金法","cat":"個人型年金の拠出限度額","q":"個人型年金加入者のうち第1号加入者及び第4号加入者の拠出限度額は、月額68,000円である。","a":true,"exp":"〇。法69条、令36条。第1号・第4号加入者は月額68,000円（付加保険料・国民年金基金掛金を合算した限度額）である。","page":256,"detail":"〇。法69条・令36条・本文の表のとおり。個人型年金加入者のうち第1号加入者及び第4号加入者の拠出限度額は月額68,000円である(国民年金の付加保険料や国民年金基金の掛金の額を合算した限度額)。"},{"law":"確定拠出年金法","cat":"個人型年金の拠出限度額","q":"個人型年金加入者のうち第3号加入者の拠出限度額は、月額<b>68,000円</b>である。","a":false,"exp":"×。第3号加入者の拠出限度額は月額23,000円である。68,000円は第1号・第4号加入者である(令36条)。","page":256,"detail":"×。令36条・本文の表のとおり、第3号加入者の拠出限度額は月額「23,000円」である。設問の「68,000円」が誤り。68,000円は第1号加入者及び第4号加入者の限度額である。"},{"law":"確定拠出年金法","cat":"中小事業主掛金","q":"中小事業主とは、企業型年金及び確定給付企業年金を実施していない厚生年金適用事業所の事業主であって、その使用する第1号厚生年金被保険者の数が300人以下のものをいう。","a":true,"exp":"〇。法55条。第1号厚生年金被保険者300人以下が要件である。","page":255,"detail":"〇。法55条2項のとおり。本文では、中小事業主とは企業型年金及び確定給付企業年金を実施していない厚生年金適用事業所の事業主であって、その使用する第1号厚生年金被保険者の数が300人以下のものをいうとされている。"},{"law":"確定拠出年金法","cat":"脱退一時金","q":"個人型年金における脱退一時金の請求要件の一つとして、その者の個人別管理資産の額が政令で定める額(<b>15万円</b>)以下であること等が必要である。","a":false,"exp":"×。個人型年金の脱退一時金の資産額要件は25万円以下である(令60条)。15万円は企業型年金の経過措置の脱退一時金の額である。","page":258,"detail":"×。令60条のとおり、個人型年金における脱退一時金の資産額要件は個人別管理資産の額が政令で定める額「25万円」以下であること等である。設問の「15万円」が誤り。15万円は企業型年金の経過措置の脱退一時金の資産額要件(令59条)である。"},{"law":"社会保険審査官及び社会保険審査会法","cat":"社会保険審査官の設置","q":"健康保険法、船員保険法、厚生年金保険法、国民年金法等の規定による審査請求の事件を取り扱わせるため、各地方厚生局に社会保険審査官を置く。","a":true,"exp":"〇。法1条。各地方厚生局（地方厚生支局を含む）に置かれる。","page":262,"detail":"〇。法1条のとおり。本文では、健康保険法、船員保険法、厚生年金保険法及び石炭鉱業年金基金法、国民年金法並びに年金給付遅延加算金支給法の規定による審査請求の事件を取り扱わせるため、各地方厚生局(地方厚生支局を含む)に社会保険審査官を置くとされている。"},{"law":"社会保険審査官及び社会保険審査会法","cat":"審査請求期間","q":"社会保険審査官に対する審査請求は、処分があったことを知った日の翌日から起算して<b>60日</b>を経過したときは、原則としてすることができない。","a":false,"exp":"×。原則3か月以内である(法4条)。","page":263,"detail":"×。法4条1項のとおり、社会保険審査官に対する審査請求は、処分があったことを知った日の翌日から起算して原則「3か月」を経過したときはすることができない。設問の「60日」が誤り。正当な事由を疎明したときは3か月経過後もできる。"},{"law":"社会保険審査官及び社会保険審査会法","cat":"執行停止","q":"社会保険審査官に対する審査請求は、原処分の執行を停止する。","a":false,"exp":"×。審査請求は原処分の執行を停止しない（執行不停止の原則）。社会保険審査官は緊急の必要があるときは職権で執行を停止できる(法10条)。","page":263,"detail":"×。法10条1項のとおり、審査請求は原処分の執行を停止しない(執行不停止の原則)。設問は誤り。ただし社会保険審査官は、償うことの困難な損害を避けるため緊急の必要があると認めるときは職権で執行を停止することができる。"},{"law":"社会保険審査官及び社会保険審査会法","cat":"社会保険審査会の組織","q":"社会保険審査会は、委員長及び委員5人をもって組織し、委員長及び委員の任期は、原則として3年とされている。","a":true,"exp":"〇。法21条等。委員長及び委員5人で組織し、任期は原則3年である。","page":265,"detail":"〇。法21条・22条1項のとおり。本文では、社会保険審査会は委員長及び委員5人をもって組織し、委員長及び委員の任期は原則として3年とされている。"},{"law":"社会保険審査官及び社会保険審査会法","cat":"委員の任命","q":"社会保険審査会の委員長及び委員は、両議院の同意を得て、厚生労働大臣が任命する。","a":true,"exp":"〇。法23条。両議院の同意を得て厚生労働大臣が任命する。","page":265,"detail":"〇。法23条1項のとおり。本文では、社会保険審査会の委員長及び委員は、人格が高潔であって社会保障に関する識見を有し、かつ法律又は社会保険に関する学識経験を有する者のうちから、両議院の同意を得て厚生労働大臣が任命するとされている。"}],"oudan":[{"law":"目的等","cat":"連帯理念","q":"国民年金法・高齢者医療確保法・介護保険法は、いずれも目的規定において国民の共同連帯の理念を掲げている。","a":true,"exp":"〇。国年法は国民の共同連帯、高医法・介護法も国民の共同連帯を掲げている。","page":11,"detail":"国民年金法は国民の共同連帯によって防止すると規定する。高齢者医療確保法・介護保険法も国民の共同連帯の理念に基づくと規定する。健保法等にはこの文言はない。"},{"law":"保険者","cat":"保険者の主体","q":"労災保険・雇用保険・国民年金の保険者はいずれも政府である。","a":true,"exp":"〇。労災・雇保・国年いずれも保険者は政府。","page":12,"detail":"労災保険・雇用保険・国民年金の保険者は政府。健康保険は全国健康保険協会と健康保険組合、介護保険は市町村が保険者。"},{"law":"保険者","cat":"船員保険の保険者","q":"船員保険の保険者は全国健康保険協会である。","a":true,"exp":"〇。船員保険の保険者は全国健康保険協会。","page":12,"detail":"船員保険の保険者は全国健康保険協会で、一部の業務については厚生労働大臣が行う。健康保険の保険者は全国健康保険協会と健康保険組合。"},{"law":"保険者","cat":"健康保険組合の設立","q":"健康保険組合の任意設立は、単一組合では700人以上、総合組合では3000人以上を要件とする。","a":true,"exp":"〇。単一組合700人以上、総合組合3000人以上。","page":13,"detail":"健康保険組合の任意設立要件は単一組合700人以上、総合組合3000人以上。設立の認可は厚生労働大臣。強制設立は常時政令で定める数以上。"},{"law":"保険者","cat":"国保組合の設立","q":"国民健康保険組合の設立は、15人以上が発起人となり、組合員となるべき者300人以上の同意を得て、都道府県知事の認可を受ける。","a":true,"exp":"〇。15人以上の発起人、300人以上の同意、認可は都道府県知事。","page":13,"detail":"国民健康保険組合は15人以上が発起人となり、組合員となるべき者300人以上の同意を得る。設立の認可は都道府県知事。健康保険組合の認可は厚生労働大臣。"},{"law":"保険者","cat":"発起人数の比較","q":"国民年金基金連合会は2以上の国民年金基金が発起人となり、企業年金連合会は20以上の事業主及び企業年金基金が発起人となる。","a":true,"exp":"〇。国年基金連合会は2以上、企業年金連合会は20以上の発起人。","page":13,"detail":"国民年金基金連合会は2以上の国民年金基金が発起人。企業年金連合会は20以上の事業主及び企業年金基金が発起人。いずれも認可は厚生労働大臣。"},{"law":"保険者","cat":"協会の役員","q":"全国健康保険協会には理事長1人、理事6人以内及び監事2人を置き、理事長及び監事は厚生労働大臣が任命する。","a":true,"exp":"〇。理事長1人、理事6人以内、監事2人。理事長と監事は厚生労働大臣任命。","page":14,"detail":"全国健康保険協会は理事長1人、理事6人以内及び監事2人を置く。理事長及び監事は厚生労働大臣が任命し、理事は理事長が任命する。"},{"law":"適用","cat":"厚年と健保の船舶","q":"健康保険では船舶は適用事業所とならないが、厚生年金保険では船員として船舶所有者に使用される者が乗り組む船舶は適用事業所となる。","a":true,"exp":"〇。健保では船舶は非適用、厚年では船舶は強制適用事業所。","page":16,"detail":"健康保険では船舶は適用事業所とならない。厚生年金保険では船員として船舶所有者に使用される者が乗り組む船舶が強制適用事業所となる。"},{"law":"適用","cat":"暫定任意適用","q":"労災保険・雇用保険の任意適用に係る名称は暫定任意適用事業であり、健康保険・厚生年金保険は任意適用事業所である。","a":true,"exp":"〇。労災・雇保は暫定任意適用事業、健保・厚年は任意適用事業所。","page":17,"detail":"労災・雇保の任意適用は暫定任意適用事業。健保・厚年の任意適用は任意適用事業所で、適用に係る手続は厚生労働大臣の認可。"},{"law":"適用","cat":"任意脱退の同意","q":"労災保険の任意脱退は労働者の過半数の同意を要件とし、雇用保険・健康保険・厚生年金保険の任意脱退は労働者の4分の3以上の同意を要件とする。","a":true,"exp":"〇。労災は過半数、雇保・健保・厚年は4分の3以上の同意。","page":17,"detail":"労災保険の任意脱退は労働者の過半数の同意。雇用保険・健康保険・厚生年金保険の任意脱退は労働者の4分の3以上の同意を要件とする。"},{"law":"労働者・使用者等","cat":"労働者の定義","q":"労働基準法の労働者は事業に使用される者で賃金を支払われる者をいうが、労働組合法の労働者は職業の種類を問わず賃金・給料その他これに準ずる収入によって生活する者をいう。","a":true,"exp":"〇。労基法は事業に使用され賃金を支払われる者、労組法は収入で生活する者。","page":19,"detail":"労働基準法の労働者は事業に使用され賃金を支払われる者。労働組合法の労働者は賃金・給料その他これに準ずる収入によって生活する者で、定義が異なる。"},{"law":"労働者・使用者等","cat":"使用者の定義","q":"労働基準法の使用者は事業主又は事業の経営担当者その他事業主のために行為をするすべての者をいうが、労働契約法の使用者はその使用する労働者に対して賃金を支払う者をいう。","a":true,"exp":"〇。労基法は広く、労契法は賃金を支払う者に限定。","page":19,"detail":"労働基準法の使用者は事業主又は事業の経営担当者その他事業主のために行為をするすべての者。労働契約法の使用者は使用する労働者に賃金を支払う者をいう。"},{"law":"被保険者","cat":"高年齢被保険者","q":"雇用保険の高年齢被保険者とは、65歳以上の被保険者で短期雇用特例被保険者及び日雇労働被保険者を除いた者をいう。","a":true,"exp":"〇。65歳以上の被保険者(短期・日雇を除く)。","page":22,"detail":"高年齢被保険者は65歳以上の被保険者で、短期雇用特例被保険者及び日雇労働被保険者を除く。一般被保険者はこれらすべて以外の被保険者。"},{"law":"被保険者","cat":"任意継続被保険者","q":"健康保険の任意継続被保険者となるには、資格喪失日の前日まで継続して2か月以上被保険者であったことを要する。","a":true,"exp":"〇。継続して2か月以上の被保険者期間が要件。","page":22,"detail":"任意継続被保険者は、資格喪失の日の前日まで継続して2か月以上被保険者であった者のうち、保険者に申し出て継続して被保険者となった者である。"},{"law":"被保険者","cat":"介護の被保険者","q":"介護保険の第1号被保険者は市町村の区域内に住所を有する65歳以上の者、第2号被保険者は40歳以上65歳未満の医療保険加入者である。","a":true,"exp":"〇。第1号は65歳以上、第2号は40歳以上65歳未満の医療保険加入者。","page":23,"detail":"介護保険の第1号被保険者は市町村の区域内に住所を有する65歳以上の者。第2号被保険者は市町村の区域内に住所を有する40歳以上65歳未満の医療保険加入者。"},{"law":"被保険者","cat":"国年第1号","q":"国民年金の第1号被保険者は、日本国内に住所を有する20歳以上60歳未満の者であって、第2号被保険者及び第3号被保険者に該当しない者である。","a":true,"exp":"〇。国内居住20歳以上60歳未満で第2号・第3号以外。","page":24,"detail":"第1号被保険者は日本国内に住所を有する20歳以上60歳未満の者で第2号・第3号に該当しない者。第3号被保険者は20歳以上60歳未満の被扶養配偶者。"},{"law":"被保険者","cat":"任意加入の年齢比較","q":"国民年金の特例による任意加入被保険者の年齢要件は65歳以上70歳未満、厚生年金保険の高齢任意加入被保険者の年齢要件は70歳以上である。","a":true,"exp":"〇。特例任意加入は65歳以上70歳未満、高齢任意加入は70歳以上。","page":27,"detail":"国民年金の特例任意加入は65歳以上70歳未満で厚生労働大臣へ申出。厚生年金保険の高齢任意加入は70歳以上で、適用事業所は実施機関へ申出、適用事業所以外は厚生労働大臣の認可。"},{"law":"適用除外","cat":"短時間労働者の除外","q":"健康保険・厚生年金保険では、1週間の所定労働時間が通常の労働者の4分の3未満で、週20時間未満又は月額賃金88000円未満等に該当する者は適用除外となる。","a":true,"exp":"〇。4分の3未満かつ週20時間未満又は88000円未満等で適用除外。","page":30,"detail":"通常の労働者の4分の3未満の短時間労働者で、週20時間未満、報酬月額88000円未満、学生等のいずれかに該当する者は健保・厚年の適用除外となる。"},{"law":"適用除外","cat":"特定適用事業所","q":"特定適用事業所とは、同一事業主の適用事業所に使用される特定労働者の総数が常時50人を超える場合のそれぞれの適用事業所をいう。","a":true,"exp":"〇。特定労働者の総数が常時50人超。","page":31,"detail":"特定適用事業所とは、事業主が同一である適用事業所であって、使用される特定労働者の総数が常時50人を超える場合におけるそれぞれの適用事業所をいう。"},{"law":"適用除外","cat":"法人代表者の適用","q":"健康保険・厚生年金保険では法人の代表者には適用ありとされるが、労災保険・雇用保険では法人の代表者には適用しない。","a":true,"exp":"〇。健保・厚年は法人代表者に適用あり、労災・雇保は適用しない。","page":32,"detail":"法人の代表者は、労基・労災・雇保では適用しない。健保・厚年では適用あり。個人事業主はすべての制度で適用しない。"},{"law":"届出等","cat":"資格取得届の期限","q":"健康保険・厚生年金保険の事業主による資格取得に係る届出の提出期限は、事実があった日から5日以内である。","a":true,"exp":"〇。健保・厚年の事業主の資格取得届は5日以内。","page":33,"detail":"健保・厚年の事業主による資格取得・喪失の届出は事実があった日から5日以内(厚年の船員被保険者は10日以内)。雇保の事業主の資格取得届は翌月10日まで。"},{"law":"届出等","cat":"国年の届出期限","q":"国民年金の第1号被保険者及び第3号被保険者の資格取得等の届出は、事実があった日から14日以内である。","a":true,"exp":"〇。国年の第1号・第3号被保険者の届出は14日以内。","page":33,"detail":"国民年金の第1号被保険者・第3号被保険者の届出は事実があった日から14日以内。厚年の事業主は5日以内(船員被保険者は10日以内)。"},{"law":"届出等","cat":"手帳等の交付主体","q":"雇用保険の被保険者証・離職票・日雇労働被保険者手帳の交付主体は、いずれも公共職業安定所長である。","a":true,"exp":"〇。雇保の被保険者証・離職票・日雇手帳は公共職業安定所長が交付。","page":34,"detail":"雇用保険の被保険者証、雇用保険被保険者離職票、日雇労働被保険者手帳の交付主体は公共職業安定所長。安衛法の健康管理手帳は都道府県労働局長。"},{"law":"届出等","cat":"雇用状況の報告期限","q":"高年齢者雇用状況等及び障害者雇用状況の報告は、いずれも6月1日現在の状況を7月15日までに厚生労働大臣に提出する。","a":true,"exp":"〇。高年齢者・障害者の雇用状況とも7月15日までに提出。","page":35,"detail":"高年齢者雇用状況等及び障害者雇用状況は、いずれも6月1日現在の状況を7月15日までに厚生労働大臣に提出する。"},{"law":"許可等の主体","cat":"安衛法の製造許可","q":"労働安全衛生法において、特定機械等の製造の許可主体は都道府県労働局長、製造許可物質の製造の許可主体は厚生労働大臣である。","a":true,"exp":"〇。特定機械等は都道府県労働局長、製造許可物質は厚生労働大臣。","page":37,"detail":"安衛法の特定機械等の製造、有害物質に係る製造等の禁止の例外の許可主体は都道府県労働局長。製造許可物質の製造の許可主体は厚生労働大臣。"},{"law":"許可等の主体","cat":"確定給付企業年金の実施","q":"規約型確定給付企業年金は規約について厚生労働大臣の承認、基金型確定給付企業年金は企業年金基金の設立について厚生労働大臣の認可を受ける。","a":true,"exp":"〇。規約型は承認、基金型は認可。","page":39,"detail":"規約型確定給付企業年金は規約について厚生労働大臣の承認。基金型確定給付企業年金は企業年金基金の設立について厚生労働大臣の認可を受ける。"},{"law":"賃金・報酬","cat":"給付基礎の期間","q":"平均賃金及び給付基礎日額は算定事由発生日以前3か月間、賃金日額は最後の6か月間を基礎として算定する。","a":true,"exp":"〇。平均賃金・給付基礎日額は3か月、賃金日額は6か月。","page":41,"detail":"平均賃金(労基)・給付基礎日額(労災)は算定事由発生日以前3か月間。賃金日額(雇保)は最後の6か月間を180で除す。標準報酬月額(定時決定)は7月1日前3か月間。"},{"law":"賃金・報酬","cat":"標準賞与額の上限","q":"標準賞与額は、健康保険では年度の累計額573万円、厚生年金保険では1か月の額150万円を超える部分を除く。","a":true,"exp":"〇。健保は年度累計573万円、厚年は1か月150万円が上限。","page":42,"detail":"標準賞与額は健康保険では年度の累計額が573万円を超える部分、厚生年金保険では1か月の額が150万円を超える部分を除く。"},{"law":"賃金・報酬","cat":"標準報酬月額の等級","q":"標準報酬月額の等級区分は、健康保険が第1級から第50級、厚生年金保険が第1級から第32級である。","a":true,"exp":"〇。健保は第50級まで、厚年は第32級まで。","page":43,"detail":"標準報酬月額の等級は健康保険が第1級から第50級(下限58000円、上限1390000円)、厚生年金保険が第1級から第32級(下限88000円、上限650000円)。"},{"law":"時効と記録の保存","cat":"記録の保存期間","q":"雇用保険法・健康保険法・厚生年金保険法の記録の保存期間は2年間であるが、労働基準法・労災保険法・徴収法は3年間である。","a":true,"exp":"〇。雇保・健保・厚年は2年、労基・労災・徴収は3年。","page":49,"detail":"記録の保存期間は雇保法・健保法・厚年法・社労士法が2年間。労基法・安衛法・労災法・徴収法が3年間。雇保の被保険者に関する書類は4年間。"},{"law":"給付額の改定等","cat":"改定の措置","q":"国民年金・厚生年金保険・児童手当は、諸事情に著しい変動が生じた場合、変動後の諸事情に応ずるため速やかに改定の措置が講ぜられなければならないと規定する。","a":true,"exp":"〇。国年・厚年・児童手当とも速やかに改定の措置を講ずる旨を規定。","page":50,"detail":"国年・厚年・児童手当は、いずれも著しい変動が生じた場合に変動後の諸事情に応ずるため速やかに改定の措置が講ぜられなければならないと規定する。"},{"law":"給付に係る支給期間及び支払","cat":"年金の支払期月","q":"労災保険の年金たる保険給付、国民年金・厚生年金保険の年金給付は、毎年2月、4月、6月、8月、10月及び12月の6期にそれぞれ前月分まで支払う。","a":true,"exp":"〇。労災・国年・厚年とも2・4・6・8・10・12月の6期払い。","page":54,"detail":"労災の年金たる保険給付、国年・厚年の年金給付、児童手当は毎年2・4・6・8・10・12月の6期にそれぞれ前月分まで支払う。"},{"law":"受給権の保護・公課の禁止","cat":"受給権の保護","q":"労災保険・雇用保険・健康保険・児童手当の保険給付等は、いずれも受給権の譲渡・担保・差押えが不可とされている。","a":true,"exp":"〇。労災・雇保・健保・児童手当とも譲渡・担保・差押え不可。","page":58,"detail":"労災・雇保・健保・年金・児童手当とも受給権の譲渡・担保供与・差押えは不可。労災の特別支給金には受給権の保護規定は適用されない。"},{"law":"未支給の保険給付等","cat":"厚年の請求権者","q":"厚生年金保険の未支給の保険給付の請求権者には、配偶者・子・父母・孫・祖父母・兄弟姉妹のほか、これらの者以外の3親等内の親族が含まれる。","a":true,"exp":"〇。厚年は3親等内の親族まで含まれる。","page":59,"detail":"厚生年金保険の未支給保険給付の請求権者は配偶者・子・父母・孫・祖父母・兄弟姉妹又はこれらの者以外の3親等内の親族。労災・雇保・国年は兄弟姉妹まで。"},{"law":"第三者行為災害","cat":"求償と控除の期間","q":"労災保険の第三者行為災害における求償は災害発生後5年以内、控除は災害発生後7年以内に支給事由が生じた保険給付について行われる。","a":true,"exp":"〇。求償は5年以内、控除は7年以内。","page":62,"detail":"労災の求償は災害発生後5年以内に支給事由が生じ災害発生後5年以内に行った保険給付について行われる。控除は災害発生後7年以内に支給事由が生じ7年以内に支払うべき保険給付を限度とする。"},{"law":"療養に係る給付","cat":"費用負担割合","q":"療養に係る給付の費用負担は、労災保険は通勤災害に限り200円、健康保険・国民健康保険は原則3割、後期高齢者医療は原則1割である。","a":true,"exp":"〇。労災は通勤災害200円、健保・国保3割、後期高齢者1割。","page":74,"detail":"療養に係る給付の費用負担は、労災が通勤災害に限り200円、健保・国保が原則3割、後期高齢者医療が原則1割。"},{"law":"休業に係る給付","cat":"待期の比較","q":"労災保険の休業補償給付の待期は通算して3日、健康保険の傷病手当金の待期は継続した3日である。","a":true,"exp":"〇。労災は通算3日、健保は継続した3日。","page":76,"detail":"休業補償給付(労災)の待期は通算して3日で第4日目から支給。傷病手当金(健保)の待期は継続した3日。労基の休業補償には待期はない。"},{"law":"休業に係る給付","cat":"支給額の比較","q":"労働基準法の休業補償及び労災保険の休業補償給付の支給額は100分の60、健康保険の傷病手当金は3分の2である。","a":true,"exp":"〇。労基・労災は100分の60、健保は3分の2。","page":76,"detail":"休業補償(労基)は平均賃金の100分の60、休業補償給付(労災)は給付基礎日額の100分の60、傷病手当金(健保)は算定の基礎となる額の3分の2。"},{"law":"障害に係る給付","cat":"等級の比較","q":"障害基礎年金の等級は1級・2級、障害厚生年金の等級は1級から3級である。","a":true,"exp":"〇。障害基礎年金は1級・2級、障害厚生年金は1級から3級。","page":78,"detail":"障害基礎年金は1級・2級、障害厚生年金は1級から3級。労災の傷病補償年金は1級から3級、障害補償年金は1級から7級。"},{"law":"死亡に係る給付","cat":"死亡一時金の月数","q":"死亡一時金は、第1号被保険者としての保険料納付済期間等を合算した月数が36月以上ある者の死亡について支給される。","a":true,"exp":"〇。死亡一時金は合算月数36月以上が要件。","page":83,"detail":"死亡一時金は第1号被保険者としての保険料納付済期間の月数等を合算した月数が36月以上ある者が対象。寡婦年金は第1号被保険者期間に係る保険料納付済期間等が10年以上等が要件。"},{"law":"死亡に係る給付","cat":"生計維持の認定額","q":"年金の障害基礎(厚生)年金の加算額等に係る生計維持の認定における厚生労働大臣の定める金額は、年額850万円である。","a":true,"exp":"〇。生計維持の認定額は年額850万円。","page":86,"detail":"年金の加算額等に係る生計維持の認定における厚生労働大臣の定める金額は年額850万円(所得の場合は年間所得655万5千円)。"},{"law":"費用負担","cat":"基礎年金の国庫負担","q":"国民年金において、基礎年金の給付に要する費用の国庫負担割合は2分の1である。","a":true,"exp":"〇。基礎年金の給付の国庫負担は2分の1。","page":99,"detail":"国民年金の基礎年金の給付に要する費用の国庫負担は2分の1。20歳前傷病による障害基礎年金は100分の60(100分の20+その他2分の1)。"},{"law":"保険料","cat":"厚年の保険料率","q":"厚生年金保険の保険料率は1000分の183である。","a":true,"exp":"〇。厚年の保険料率は1000分の183。","page":107,"detail":"厚生年金保険の保険料率は1000分の183。健康保険の協会管掌・組合管掌の一般保険料率は1000分の30から1000分の130までの範囲内。"},{"law":"保険料","cat":"保険料の納付期限","q":"健康保険・厚生年金保険・国民年金の第1号被保険者の保険料の納付期限は、いずれも翌月末日である。","a":true,"exp":"〇。健保・厚年・国年第1号とも翌月末日が納付期限。","page":107,"detail":"健保・厚年の原則の保険料、国民年金の第1号被保険者の保険料の納付期限はいずれも翌月末日。任意継続被保険者の保険料はその月の10日。"},{"law":"督促・延滞金","cat":"延滞金の算定率","q":"労働保険料・健保・厚年・国年の延滞金の算定率は、原則として年14.6パーセントである。","a":true,"exp":"〇。延滞金の算定率は原則年14.6パーセント。","page":113,"detail":"延滞金の算定率は年14.6パーセント(納期限の翌日から一定期間は年7.3パーセント)。徴収法は労働保険料の額、健保・国年は徴収金額、厚年は保険料額が算定の対象。"},{"law":"不服の申立て","cat":"審査請求の期限","q":"労災・雇保・健保・国年・厚年の審査請求は、原則として処分があったことを知った日の翌日から起算して3か月を経過したときはすることができない。","a":true,"exp":"〇。審査請求の期限は原則として処分を知った日の翌日から3か月。","page":116,"detail":"審査請求は原則として処分があったことを知った日の翌日から起算して3か月を経過したときは不可。再審査請求は決定書の謄本が送付された日の翌日から2か月以内。"},{"law":"不服の申立て","cat":"再審査請求の方法","q":"労災・雇保の再審査請求は文書でしなければならないが、健保・国年・厚年の再審査請求は文書又は口頭ですることができる。","a":true,"exp":"〇。労災・雇保は文書、健保・国年・厚年は文書又は口頭。","page":116,"detail":"労災・雇保の再審査請求は文書でしなければならない。健保・国年・厚年の審査請求・再審査請求は文書又は口頭ですることができる。"},{"law":"不服の申立て","cat":"国保の審査機関","q":"国民健康保険の保険給付に関する処分の審査機関は国民健康保険審査会、後期高齢者医療給付に関する処分の審査機関は後期高齢者医療審査会である。","a":true,"exp":"〇。国保は国民健康保険審査会、後期高齢者は後期高齢者医療審査会。","page":116,"detail":"国保の保険給付・保険料等に関する処分の審査機関は国民健康保険審査会。後期高齢者医療給付等に関する処分は後期高齢者医療審査会。介護保険は介護保険審査会。"},{"law":"目的等","cat":"福祉の文言","q":"健康保険法は目的規定で福祉の増進に寄与すると定めている。","a":false,"exp":"×。健保法は福祉の向上である。福祉の増進は労災法・雇保法等の文言。","page":11,"detail":"健康保険法は国民の生活の安定と福祉の向上に寄与することを目的とする。労災法は福祉の増進、雇保法も福祉の増進と規定し、向上ではない。"},{"law":"保険者","cat":"介護の保険者","q":"介護保険の保険者は都道府県である。","a":false,"exp":"×。介護保険の保険者は市町村である。","page":13,"detail":"介護保険の保険者は市町村。後期高齢者医療の実施主体は後期高齢者医療広域連合。国民健康保険の保険者は都道府県及び市町村と国民健康保険組合。"},{"law":"保険者","cat":"国民年金基金の設立","q":"国民年金基金の地域型は1000人以上、職能型は3000人以上を要件とし、設立の認可は都道府県知事が行う。","a":false,"exp":"×。国民年金基金の設立の認可は厚生労働大臣である。","page":13,"detail":"国民年金基金は地域型1000人以上、職能型3000人以上で、設立の認可は厚生労働大臣。都道府県知事が認可するのは国民健康保険組合である。"},{"law":"保険者","cat":"労働保険事務組合","q":"労働保険事務組合の設立認可主体は都道府県労働局長で、委託を予定する事業主が30以上であることを要件とする。","a":false,"exp":"×。労働保険事務組合の設立認可は厚生労働大臣である。","page":13,"detail":"労働保険事務組合は委託を予定する事業主が30以上であることを要件とし、設立の認可は厚生労働大臣が行う。"},{"law":"労働者・使用者等","cat":"安衛法の事業者","q":"労働安全衛生法では、事業を行う者で労働者を使用するものを使用者という。","a":false,"exp":"×。安衛法では事業を行う者で労働者を使用するものを事業者という。","page":19,"detail":"労働安全衛生法の事業者とは、事業を行う者で労働者を使用するものをいう。使用者という概念は労働基準法・労働契約法で用いる。"},{"law":"被保険者","cat":"後期高齢者の被保険者","q":"後期高齢者医療の被保険者は、広域連合の区域内に住所を有する70歳以上の者である。","a":false,"exp":"×。後期高齢者医療の被保険者は75歳以上の者(障害認定を受けた65歳以上75歳未満を含む)。","page":23,"detail":"後期高齢者医療の被保険者は広域連合の区域内に住所を有する75歳以上の者、又は政令で定める障害状態にある旨の認定を受けた65歳以上75歳未満の者である。"},{"law":"被保険者","cat":"高齢任意加入","q":"厚生年金保険の高齢任意加入被保険者は、65歳以上の者であって老齢又は退職を支給事由とする年金給付の受給権を有さない者である。","a":false,"exp":"×。高齢任意加入被保険者は70歳以上の者である。","page":26,"detail":"高齢任意加入被保険者は70歳以上の者で、老齢又は退職を支給事由とする年金給付の受給権を有さない者。65歳以上70歳未満は国年の特例任意加入の年齢。"},{"law":"適用除外","cat":"健保の臨時使用者","q":"健康保険において、2か月以内の期間を定めて使用される者は、定めた期間を超えて引き続き使用されるに至ったときからではなく、当初から被保険者となる。","a":false,"exp":"×。定めた期間を超えて引き続き使用されるに至ったときから被保険者となる。","page":30,"detail":"2か月以内の期間を定めて使用される者で当該期間を超えて使用されることが見込まれないものは適用除外。定めた期間を超えて引き続き使用されるに至ったときから被保険者となる。"},{"law":"届出等","cat":"健康管理手帳","q":"労働安全衛生法の健康管理手帳の交付主体は厚生労働大臣であり、重度の健康障害を生ずるおそれのある業務に従事していた者に離職の際又は離職後に交付する。","a":false,"exp":"×。健康管理手帳の交付主体は都道府県労働局長である。","page":34,"detail":"安衛法の健康管理手帳の交付主体は都道府県労働局長で、重度の健康障害を生ずるおそれのある業務に従事していた者に離職の際又は離職後に交付する。"},{"law":"許可等の主体","cat":"最低賃金の減額特例","q":"最低賃金の減額の特例の許可主体は厚生労働大臣である。","a":false,"exp":"×。最低賃金の減額の特例の許可主体は都道府県労働局長である。","page":37,"detail":"最低賃金の減額の特例は、使用者が都道府県労働局長の許可を受けたときに一定の労働者について適用される。"},{"law":"許可等の主体","cat":"労働者派遣事業","q":"労働者派遣事業は厚生労働大臣への届出で足りるが、シルバー人材センターが行う労働者派遣事業は厚生労働大臣の許可を要する。","a":false,"exp":"×。逆である。労働者派遣事業は許可、シルバー人材センターの労働者派遣事業は届出。","page":38,"detail":"労働者派遣事業は厚生労働大臣の許可。シルバー人材センターが行う労働者派遣事業は厚生労働大臣へ届出。労働組合等が行う無料の労働者供給事業も許可。"},{"law":"賃金・報酬","cat":"標準報酬月額の下限","q":"標準報酬月額の下限は、健康保険が88000円、厚生年金保険が58000円である。","a":false,"exp":"×。逆である。健保の下限58000円、厚年の下限88000円。","page":43,"detail":"標準報酬月額の下限は健康保険が58000円、厚生年金保険が88000円。上限は健保が1390000円、厚年が650000円。"},{"law":"端数処理","cat":"国年の延滞金","q":"国民年金の延滞金は100円未満を切り捨てる。","a":false,"exp":"×。国民年金の延滞金は50円未満を切り捨てる。","page":45,"detail":"国民年金の延滞金は50円未満切捨て、延滞金の計算の基礎となる額は500円未満切捨て。徴収・厚年の延滞金は100円未満切捨て、計算の基礎となる保険料額は1000円未満切捨て。"},{"law":"時効と記録の保存","cat":"健保の時効","q":"健康保険の保険給付を受ける権利の消滅時効に係る期間は5年である。","a":false,"exp":"×。健康保険の保険給付を受ける権利は2年である。","page":47,"detail":"健康保険の保険料等の徴収権・還付を受ける権利・保険給付を受ける権利はいずれも2年。厚年の保険給付を受ける権利は5年。"},{"law":"休業に係る給付","cat":"船員保険の傷病手当金","q":"船員保険の傷病手当金及び休業手当金には待期があり、傷病手当金の支給期間は通算して1年6か月間が限度である。","a":false,"exp":"×。船員保険の傷病手当金等には待期はなく、支給期間は通算して3年間が限度。","page":76,"detail":"船員保険の傷病手当金及び休業手当金には待期はない。傷病手当金の支給期間は通算して3年間が限度。健康保険の傷病手当金は通算して1年6か月間が限度。"},{"law":"障害に係る給付","cat":"障害基礎年金の額","q":"障害基礎年金の1級の額は法定額780900円に改定率を乗じた額の125分の100である。","a":false,"exp":"×。障害基礎年金1級の額は780900円×改定率×125/100である。","page":81,"detail":"障害基礎年金1級は780900円×改定率×125/100、2級は780900円×改定率。1級は2級の1.25倍であり、125分の100ではない。"},{"law":"死亡に係る給付","cat":"遺族厚生年金の額","q":"遺族厚生年金の額は、原則として死亡した者の報酬比例部分の年金額の3分の4である。","a":false,"exp":"×。遺族厚生年金の額は報酬比例部分の年金額の4分の3である。","page":89,"detail":"遺族厚生年金の額は原則として死亡した者の報酬比例部分の年金額の4分の3。中高齢寡婦加算は遺族基礎年金の額の4分の3。"},{"law":"目的等","cat":"目的の対象","q":"厚生年金保険法は、国民の老齢、障害又は死亡について保険給付を行うことを目的とする。","a":false,"exp":"×。厚年は労働者の老齢・障害・死亡。国民を対象とするのは国民年金法。","page":11,"detail":"厚生年金保険法は労働者の老齢、障害又は死亡について保険給付を行う。国民の老齢、障害又は死亡に関して給付を行うのは国民年金法である。"},{"law":"保険者","cat":"船員保険の保険者","q":"船員保険の保険者は健康保険組合である。","a":false,"exp":"×。船員保険の保険者は全国健康保険協会である。","page":12,"detail":"船員保険の保険者は全国健康保険協会で、一部業務は厚生労働大臣が行う。健康保険組合は健康保険の保険者の一つ。"},{"law":"保険者","cat":"国保組合の認可","q":"国民健康保険組合の設立の認可主体は厚生労働大臣である。","a":false,"exp":"×。国民健康保険組合の設立の認可主体は都道府県知事である。","page":13,"detail":"国民健康保険組合の設立の認可は都道府県知事。健康保険組合・国民年金基金等の認可主体が厚生労働大臣である。"},{"law":"保険者","cat":"発起人数","q":"企業年金連合会は2以上の事業主及び企業年金基金が発起人となる。","a":false,"exp":"×。企業年金連合会は20以上の発起人。2以上は国民年金基金連合会。","page":13,"detail":"企業年金連合会は20以上の事業主及び企業年金基金が発起人。2以上の国民年金基金が発起人となるのは国民年金基金連合会。"},{"law":"適用","cat":"健保の船舶","q":"健康保険では、船員として船舶所有者に使用される者が乗り組む船舶は強制適用事業所となる。","a":false,"exp":"×。健康保険では船舶は適用事業所とならない。船舶が強制適用となるのは厚生年金保険。","page":16,"detail":"厚生年金保険では船舶が強制適用事業所となる。健康保険では船舶は適用事業所とならない。"},{"law":"適用","cat":"任意加入の同意","q":"雇用保険の任意加入の申請には、労働者の4分の3以上の同意が必要である。","a":false,"exp":"×。雇用保険の任意加入の申請は2分の1以上の同意。4分の3以上は任意脱退の同意。","page":17,"detail":"雇用保険の任意加入は労働者の2分の1以上の同意。任意脱退は4分の3以上の同意である。"},{"law":"適用","cat":"継続事業の一括","q":"徴収法の継続事業の一括は、厚生労働大臣の承認による。","a":false,"exp":"×。徴収法の継続事業の一括は厚生労働大臣の認可である。承認は健保・厚年の一括。","page":18,"detail":"徴収法の継続事業の一括は厚生労働大臣の認可。健保法・厚年法(船舶以外)の適用事業所の一括が厚生労働大臣の承認である。"},{"law":"労働者・使用者等","cat":"労組法の労働者","q":"労働組合法の労働者とは、事業に使用される者で賃金を支払われる者をいう。","a":false,"exp":"×。それは労働基準法の労働者の定義。労組法は収入によって生活する者。","page":19,"detail":"労働組合法の労働者は職業の種類を問わず賃金・給料その他これに準ずる収入によって生活する者。事業に使用され賃金を支払われる者は労基法の定義。"},{"law":"被保険者","cat":"高年齢被保険者の年齢","q":"雇用保険の高年齢被保険者とは、60歳以上の被保険者をいう。","a":false,"exp":"×。高年齢被保険者は65歳以上の被保険者である。","page":22,"detail":"高年齢被保険者は65歳以上の被保険者(短期雇用特例・日雇労働被保険者を除く)。"},{"law":"被保険者","cat":"国年第2号の年齢","q":"国民年金の第3号被保険者は、第2号被保険者の配偶者であって20歳以上65歳未満の被扶養配偶者である。","a":false,"exp":"×。第3号被保険者は20歳以上60歳未満の被扶養配偶者である。","page":24,"detail":"第3号被保険者は第2号被保険者の被扶養配偶者のうち20歳以上60歳未満の者。65歳未満ではなく60歳未満。"},{"law":"被保険者","cat":"特例任意加入","q":"国民年金の特例による任意加入被保険者は、老齢基礎年金の受給資格があっても加入できる。","a":false,"exp":"×。特例による任意加入は受給資格なしが要件。受給資格があっても加入できるのは任意加入被保険者。","page":25,"detail":"特例による任意加入被保険者は受給資格なしが要件。任意加入被保険者は受給資格があっても加入可能。"},{"law":"被保険者","cat":"厚年の当然被保険者","q":"厚生年金保険の当然被保険者は、適用事業所に使用される65歳未満の者である。","a":false,"exp":"×。当然被保険者は適用事業所に使用される70歳未満の者である。","page":26,"detail":"厚生年金保険の当然被保険者は適用事業所に使用される70歳未満の者。65歳未満ではない。"},{"law":"被保険者","cat":"厚年の種別","q":"厚生年金保険の第2号厚生年金被保険者は、地方公務員共済組合の組合員たる被保険者である。","a":false,"exp":"×。第2号は国家公務員、第3号が地方公務員である。","page":26,"detail":"第2号厚生年金被保険者は国家公務員共済組合の組合員、第3号が地方公務員共済組合の組合員たる被保険者。"},{"law":"適用除外","cat":"健保の季節的業務","q":"健康保険の季節的業務に使用される者は、当初から継続して6か月を超える予定で使用される者は当初から被保険者となる。","a":false,"exp":"×。季節的業務は4か月超予定で当初から被保険者。6か月超は臨時的事業の事業所。","page":30,"detail":"季節的業務に使用される者は4か月を超える予定なら当初から被保険者。臨時的事業の事業所に使用される者は6か月を超える予定なら当初から被保険者。"},{"law":"適用除外","cat":"特定適用事業所","q":"特定適用事業所とは、特定労働者の総数が常時100人を超える場合のそれぞれの適用事業所をいう。","a":false,"exp":"×。特定労働者の総数が常時50人を超える場合である。","page":31,"detail":"特定適用事業所は特定労働者の総数が常時50人を超える場合のそれぞれの適用事業所。"},{"law":"届出等","cat":"雇保の取得届","q":"雇用保険の事業主による資格取得に係る届出は、事実があった日から5日以内である。","a":false,"exp":"×。雇用保険の事業主の資格取得届は翌月10日まで。5日以内は健保・厚年。","page":33,"detail":"雇用保険の事業主による資格取得届は事実のあった日の属する月の翌月10日まで。健保・厚年の事業主の届出が5日以内。"},{"law":"届出等","cat":"国年の届出期限","q":"国民年金の第1号被保険者の資格取得等の届出は、事実があった日から5日以内である。","a":false,"exp":"×。国年の第1号被保険者の届出は14日以内である。","page":33,"detail":"国民年金の第1号被保険者・第3号被保険者の届出は事実があった日から14日以内。厚年の事業主の届出が5日以内。"},{"law":"届出等","cat":"雇用状況の報告","q":"高年齢者雇用状況等及び障害者雇用状況の報告は、6月1日現在の状況を6月30日までに提出する。","a":false,"exp":"×。提出期限は7月15日までである。","page":35,"detail":"高年齢者雇用状況等・障害者雇用状況は6月1日現在の状況を7月15日までに厚生労働大臣に提出する。"},{"law":"許可等の主体","cat":"安衛法の製造許可物質","q":"労働安全衛生法の製造許可物質の製造の許可主体は、都道府県労働局長である。","a":false,"exp":"×。製造許可物質の製造の許可主体は厚生労働大臣である。都道府県労働局長は特定機械等の製造。","page":37,"detail":"製造許可物質の製造の許可主体は厚生労働大臣。特定機械等の製造、製造等禁止の例外の許可主体が都道府県労働局長。"},{"law":"許可等の主体","cat":"職業紹介事業","q":"学校等の行う無料職業紹介事業は、厚生労働大臣の許可を要する。","a":false,"exp":"×。学校等の無料職業紹介事業は厚生労働大臣への届出で足りる。","page":38,"detail":"学校等・特別の法人の行う無料職業紹介事業は厚生労働大臣へ届出。有料・無料職業紹介事業は厚生労働大臣の許可。"},{"law":"許可等の主体","cat":"確定給付の実施","q":"基金型確定給付企業年金の実施は、規約について厚生労働大臣の承認を受ける。","a":false,"exp":"×。基金型は企業年金基金の設立について認可。規約の承認は規約型。","page":39,"detail":"基金型確定給付企業年金は企業年金基金の設立について厚生労働大臣の認可。規約型は規約について承認。"},{"law":"賃金・報酬","cat":"標準賞与額の上限","q":"標準賞与額の上限は、健康保険が1か月150万円、厚生年金保険が年度の累計額573万円を超える部分を除く。","a":false,"exp":"×。逆である。健保は年度累計573万円、厚年は1か月150万円。","page":42,"detail":"標準賞与額は健康保険が年度の累計額573万円を超える部分、厚生年金保険が1か月の額150万円を超える部分を除く。"},{"law":"賃金・報酬","cat":"標準報酬月額の等級数","q":"標準報酬月額の等級区分は、健康保険が第1級から第32級、厚生年金保険が第1級から第50級である。","a":false,"exp":"×。逆である。健保が第50級まで、厚年が第32級まで。","page":43,"detail":"標準報酬月額の等級は健康保険が第1級から第50級、厚生年金保険が第1級から第32級。"},{"law":"端数処理","cat":"延滞金の端数","q":"徴収法・健康保険・厚生年金保険の延滞金は、50円未満を切り捨てる。","a":false,"exp":"×。徴収法・健保・厚年の延滞金は100円未満切捨て。50円未満切捨ては国民年金。","page":45,"detail":"延滞金は徴収法・健保・厚年が100円未満切捨て、国民年金が50円未満切捨て。"},{"law":"時効と記録の保存","cat":"記録の保存期間","q":"労働基準法・労災保険法・徴収法の記録の保存期間は、2年間である。","a":false,"exp":"×。労基・労災・徴収は3年間。2年間は雇保・健保・厚年。","page":49,"detail":"記録の保存期間は労基法・安衛法・労災法・徴収法が3年間、雇保法・健保法・厚年法・社労士法が2年間。"},{"law":"時効と記録の保存","cat":"年金給付の時効","q":"国民年金の死亡一時金を受ける権利の消滅時効に係る期間は5年である。","a":false,"exp":"×。死亡一時金を受ける権利は2年。5年は年金給付を受ける権利。","page":47,"detail":"国民年金の死亡一時金を受ける権利は2年、年金給付を受ける権利は5年。"},{"law":"第三者行為災害","cat":"求償と控除の期間","q":"労災保険の第三者行為災害における求償は災害発生後7年以内、控除は災害発生後5年以内に行われる。","a":false,"exp":"×。逆である。求償は5年以内、控除は7年以内。","page":62,"detail":"労災の求償は災害発生後5年以内、控除は災害発生後7年以内に支給事由が生じた保険給付について行われる。"},{"law":"併給調整","cat":"障害の併給","q":"労災保険の障害補償等年金と障害基礎年金・障害厚生年金が同一事由で支給される場合、障害基礎年金及び障害厚生年金が減額支給となる。","a":false,"exp":"×。減額支給となるのは労災保険の障害補償等年金である。","page":64,"detail":"障害補償等年金(労災)と障害基礎年金・障害厚生年金が同一事由のとき、労災保険の障害補償等年金が減額支給となる。"},{"law":"療養に係る給付","cat":"費用負担割合","q":"療養に係る給付の費用負担は、健康保険・国民健康保険が原則1割、後期高齢者医療が原則3割である。","a":false,"exp":"×。健保・国保は原則3割、後期高齢者医療は原則1割。","page":74,"detail":"療養に係る給付の費用負担は健保・国保が原則3割、後期高齢者医療が原則1割、労災が通勤災害に限り200円。"},{"law":"休業に係る給付","cat":"待期の比較","q":"労災保険の休業補償給付の待期は継続した3日、健康保険の傷病手当金の待期は通算して3日である。","a":false,"exp":"×。逆である。労災は通算3日、健保は継続した3日。","page":76,"detail":"休業補償給付(労災)の待期は通算して3日、傷病手当金(健保)の待期は継続した3日。"},{"law":"障害に係る給付","cat":"等級の比較","q":"障害基礎年金の等級は1級から3級、障害厚生年金の等級は1級・2級である。","a":false,"exp":"×。逆である。障害基礎年金は1級・2級、障害厚生年金は1級から3級。","page":78,"detail":"障害基礎年金は1級・2級、障害厚生年金は1級から3級。"},{"law":"老齢に係る給付","cat":"老齢基礎年金の要件","q":"老齢基礎年金は、受給資格期間が25年以上あり、65歳以上であることが要件である。","a":false,"exp":"×。老齢基礎年金の受給資格期間は10年以上である。","page":92,"detail":"老齢基礎年金は保険料納付済期間と保険料免除期間とを合算した期間が10年以上(受給資格期間)あり、65歳以上であることが要件。"},{"law":"保険料","cat":"厚年の保険料率","q":"厚生年金保険の保険料率は1000分の130である。","a":false,"exp":"×。厚生年金保険の保険料率は1000分の183である。1000分の130は健保一般保険料率の上限。","page":107,"detail":"厚生年金保険の保険料率は1000分の183。健康保険の一般保険料率は1000分の30から1000分の130までの範囲内。"},{"law":"督促・延滞金","cat":"督促の義務","q":"健康保険・厚生年金保険・国民年金では、期限を指定して督促をしなければならないとされる。","a":false,"exp":"×。健保・厚年・国年は督促することができる。督促しなければならないのは徴収法。","page":112,"detail":"徴収法は期限を指定して督促しなければならない。健保・厚年・国年は期限を指定して督促することができる。"}],"keisan":[],"hrou":[{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"完全失業率","q":"2024年の完全失業率は前年差0.1%ポイント低下の2.5%であった。","a":true,"exp":"〇。2024年の完全失業率は人手不足感の強まりなどを背景に2年ぶりに改善し、前年差0.1%ポイント低下の2.5%であった。","page":4,"detail":"完全失業率は2017年に23年ぶりに2%台となり、2017年以降8年間にわたり2%台で推移している。男性は前年差0.1%ポイント低下の2.7%、女性は前年差0.1%ポイント上昇の2.4%であった。"},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"完全失業率","q":"完全失業率は2017年以降、6年間にわたり2%台で推移している。","a":false,"exp":"×。完全失業率は2017年に23年ぶりに2%台となり、2017年以降8年間にわたり2%台で推移している。","page":4,"detail":"見出しでも完全失業率は8年連続で2%台とされている。2024年は前年差0.1%ポイント低下の2.5%であった。"},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"完全失業者数","q":"2024年の完全失業者数は前年差2万人減の176万人であり、3年連続の増加であった。","a":false,"exp":"×。完全失業者数は前年差2万人減の176万人で、3年連続の減少であった。","page":4,"detail":"男性は前年差4万人減の101万人、女性は自発的理由が増加したことなどから前年差3万人増の76万人であった。"},{"law":"雇用情勢(完全失業率・有効求人倍率)","cat":"完全失業者数","q":"2024年の女性の完全失業者数は前年差3万人減の76万人であった。","a":false,"exp":"×。女性の完全失業者数は自
