<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Drill｜社労士○×問題集</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --txt:#e2e8f0; --sub:#94a3b8; --line:#334155;
    --ok:#22c55e; --okbg:#14361f; --ng:#ef4444; --ngbg:#3a1717;
    --acc:#38bdf8; --maru:#3b82f6; --batsu:#f43f5e; --gold:#fbbf24; --weak:#fb7185;
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;}
  .wrap{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  header{padding:12px 16px 8px;display:flex;align-items:center;gap:10px;}
  .homebtn{border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:13px;font-weight:700;
    padding:7px 12px;border-radius:99px;cursor:pointer;white-space:nowrap;display:none;}
  .homebtn:active{transform:scale(.96);}
  header h1{font-size:16px;margin:0;flex:1;letter-spacing:.3px;}
  .timerchip{border:1px solid var(--line);background:var(--card);color:var(--sub);font-size:12px;font-weight:800;padding:7px 11px;border-radius:99px;cursor:pointer;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .timerchip.running{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.5);color:#fca5a5;animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
  /* study card */
  .studycard{background:linear-gradient(160deg,#1e293b,#1b2a3f);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:16px;}
  .studytop{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .studybig{font-size:30px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums;line-height:1.1;}
  .studylbl{font-size:11px;color:var(--sub);margin-top:2px;}
  .stbtn{border:none;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;}
  .stbtn.go{background:var(--ok);color:#06280f;} .stbtn.stop{background:var(--ng);color:#fff;}
  .studysub{display:flex;gap:16px;font-size:12px;color:var(--sub);margin-top:10px;} .studysub b{color:var(--txt);font-size:14px;}
  .daybars{display:flex;gap:5px;align-items:flex-end;height:66px;margin-top:12px;}
  .daybar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;height:100%;}
  .daybar .bmin{font-size:8.5px;color:var(--sub);line-height:1;height:11px;}
  .daybar.today .bmin{color:var(--gold);font-weight:800;}
  .daybar .b2{width:78%;background:var(--maru);border-radius:4px 4px 0 0;min-height:3px;}
  .daybar.today .b2{background:var(--gold);}
  .daybar.future{opacity:.32;}
  .daybar .dl{font-size:9px;color:var(--sub);}
  .spbtn{width:100%;margin-top:12px;padding:11px;border:1px solid rgba(56,189,248,.4);background:rgba(56,189,248,.08);color:#7dd3fc;border-radius:11px;font-size:12.5px;font-weight:800;cursor:pointer;}
  #studylog{margin-top:10px;}
  .sllist{max-height:280px;overflow-y:auto;border-top:1px solid var(--line);padding-top:6px;}
  .slmon{display:flex;justify-content:space-between;font-size:12.5px;font-weight:800;color:#7dd3fc;padding:6px 4px;border-bottom:1px dashed rgba(148,163,184,.25);}
  .slhead{font-size:10.5px;color:var(--sub);margin:8px 4px 2px;letter-spacing:.05em;}
  .slrow{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 4px;border-bottom:1px solid rgba(148,163,184,.12);}
  .slrow .sld{color:var(--sub);} .slrow .slm{color:var(--txt);font-weight:700;font-variant-numeric:tabular-nums;}
  .slempty{font-size:12px;color:var(--sub);padding:10px 4px;text-align:center;}
  .syncstatus{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;margin-left:6px;background:#1f2937;color:#64748b;border:1px solid var(--line);}
  .syncstatus.ok{background:rgba(34,197,94,.16);color:#86efac;border-color:rgba(34,197,94,.4);}
  .syncstatus.err{background:rgba(239,68,68,.16);color:#fca5a5;border-color:rgba(239,68,68,.4);}
  .hstat{font-size:12px;color:var(--sub);padding:0 16px 6px;}
  .hstat b{color:var(--acc);}

  .tabbar{display:none;flex-wrap:wrap;gap:7px;padding:8px 14px;border-bottom:1px solid var(--line);}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--sub);
    padding:7px 12px;border-radius:99px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .tab .cnt{font-size:11px;opacity:.6;margin-left:3px;}
  .tab.active{background:var(--acc);color:#06283d;border-color:var(--acc);}
  .tab.special{border-color:#475569;} .tab.active.special{background:var(--gold);color:#3a2c05;border-color:var(--gold);}

  main{flex:1;padding:16px;display:flex;flex-direction:column;}

  /* ===== 本棚 home ===== */
  .home{display:flex;flex-direction:column;}
  .crossbtns{display:flex;gap:10px;margin-bottom:14px;}
  .crossbtn{flex:1;padding:13px;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;}
  .crossbtn.all{background:var(--maru);color:#fff;} .crossbtn.weak{background:var(--gold);color:#3a2c05;}
  .ov{display:flex;gap:10px;margin-bottom:16px;}
  .ovcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px;text-align:center;}
  .ovnum{font-size:24px;font-weight:900;color:var(--acc);} .ovlbl{font-size:11px;color:var(--sub);margin-top:2px;}
  .shelf{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .book{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px;cursor:pointer;transition:.12s;position:relative;overflow:hidden;}
  .book:active{transform:scale(.98);}
  .book .bnum{position:absolute;top:-6px;right:2px;font-size:42px;font-weight:900;color:rgba(148,163,184,.10);}
  .book .bname{font-size:14.5px;font-weight:800;line-height:1.4;min-height:40px;}
  .book .bbadge{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;margin-top:4px;}
  .badge.weak{background:rgba(251,113,133,.16);color:var(--weak);border:1px solid rgba(251,113,133,.4);}
  .badge.good{background:rgba(34,197,94,.14);color:#86efac;border:1px solid rgba(34,197,94,.35);}
  .badge.none{background:#1f2937;color:#64748b;border:1px solid var(--line);}
  .book .bbar{height:6px;background:var(--line);border-radius:9px;overflow:hidden;margin-top:9px;}
  .book .bbar>div{height:100%;border-radius:9px;}
  .book .bsub{font-size:11px;color:var(--sub);margin-top:6px;}

  /* ===== quiz card ===== */
  .qhead{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--sub);margin-bottom:8px;gap:8px;flex-wrap:wrap;}
  .qhead b{color:var(--txt);font-size:15px;} .qright{display:flex;align-items:center;gap:8px;}
  .remain{background:var(--gold);color:#3a2c05;font-weight:800;font-size:11px;padding:2px 9px;border-radius:99px;white-space:nowrap;}
  .stopbtn{border:1px solid var(--line);background:var(--card2);color:var(--sub);font-size:11px;font-weight:700;padding:5px 10px;border-radius:99px;cursor:pointer;}
  .barwrap{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .bar{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--maru));transition:width .35s;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px 18px;flex:1;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .tag{align-self:flex-start;font-size:11px;font-weight:700;color:var(--acc);background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);padding:3px 9px;border-radius:99px;margin-bottom:12px;}
  .hot{color:#fb923c;font-weight:800;font-size:11px;}
  .q{font-size:18px;line-height:1.75;font-weight:600;flex:1;} .q b{color:#fde68a;font-weight:800;}
  .btns{display:flex;gap:13px;margin-top:16px;}
  .btn{flex:1;border:none;border-radius:16px;padding:18px 0;font-size:28px;font-weight:800;color:#fff;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.95);}
  .maru{background:linear-gradient(160deg,#3b82f6,#2563eb);} .batsu{background:linear-gradient(160deg,#f43f5e,#e11d48);}
  .btn small{display:block;font-size:11px;font-weight:600;opacity:.85;margin-top:2px;}
  .feedback{margin-top:14px;display:none;}
  .verdict{font-size:18px;font-weight:800;padding:11px 14px;border-radius:13px;}
  .verdict.ok{background:var(--okbg);color:#86efac;border:1px solid rgba(34,197,94,.4);}
  .verdict.ng{background:var(--ngbg);color:#fca5a5;border:1px solid rgba(239,68,68,.4);}
  .ansline{font-size:13px;color:var(--sub);margin:11px 2px 4px;} .ansline b{color:var(--txt);}
  .exp{background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:13px 15px;font-size:14.5px;line-height:1.7;} .exp b{color:#fde68a;}
  .ref{margin-top:9px;font-size:12px;color:#7dd3fc;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.25);border-radius:9px;padding:7px 11px;} .ref b{color:#bae6fd;font-weight:800;}
  a.reflink{color:#7dd3fc;text-decoration:none;font-weight:700;} a.reflink:active{opacity:.6;}
  .detail{margin-top:10px;font-size:14px;line-height:1.85;color:#e2e8f0;background:#0b1220;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;} .detail b{color:#fde68a;}
  .lrow .ref{margin-top:7px;}
  .next{width:100%;margin-top:14px;padding:15px;border:none;border-radius:15px;background:var(--acc);color:#06283d;font-size:16px;font-weight:800;cursor:pointer;}
  .sans{font-size:16px;font-weight:700;background:var(--okbg);border:1px solid rgba(34,197,94,.4);color:#bbf7d0;padding:12px 14px;border-radius:13px;}
  .sans b{color:#86efac;font-size:18px;}
  .gradebtns{display:flex;gap:12px;margin-top:14px;}
  .grade{flex:1;border:none;border-radius:14px;padding:15px 0;font-size:16px;font-weight:800;cursor:pointer;}
  .grade.ok{background:var(--ok);color:#06280f;} .grade.ng{background:var(--card2);color:var(--txt);border:1px solid var(--line);}
  .choices{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
  .choice{padding:15px 16px;border:1px solid var(--line);background:var(--card2);color:var(--txt);border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;text-align:left;line-height:1.5;transition:transform .08s;}
  .choice:active{transform:scale(.99);} .choice:disabled{cursor:default;opacity:.95;}
  .choice.ok{background:var(--okbg);border-color:rgba(34,197,94,.5);color:#86efac;}
  .choice.ng{background:var(--ngbg);border-color:rgba(239,68,68,.5);color:#fca5a5;}
  .exbtn{width:100%;margin-top:10px;padding:11px;border:1px dashed var(--line);background:transparent;color:var(--sub);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;}
  .exbtn:active{transform:scale(.98);}
  .autoex{display:inline-block;font-size:11px;font-weight:800;color:#3a2c05;background:var(--gold);padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:middle;}

  /* session result */
  .sresult{display:none;text-align:center;flex:1;flex-direction:column;justify-content:center;padding:10px 6px;}
  .scorebig{font-size:54px;font-weight:900;color:var(--gold);margin:4px 0;} .scorebig span{font-size:22px;color:var(--sub);}
  .grade{font-size:20px;font-weight:800;margin:4px 0;} .gmsg{color:var(--sub);font-size:14px;line-height:1.7;margin-bottom:16px;}
  .rbtns{display:flex;flex-direction:column;gap:10px;}
  .rbtn{padding:14px;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;}
  .rbtn.primary{background:var(--maru);color:#fff;} .rbtn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);}

  /* stats */
  .stats{display:flex;flex-direction:column;}
  .stitle{font-size:13px;font-weight:800;color:var(--sub);margin:6px 2px 10px;display:flex;justify-content:space-between;align-items:center;}
  .lrow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;}
  .lrow:active{transform:scale(.99);}
  .lrow .lname{font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
  .lrow .lname .pct{font-size:13px;font-weight:800;}
  .lbar{height:6px;background:var(--line);border-radius:9px;overflow:hidden;margin-top:7px;} .lbar>div{height:100%;border-radius:9px;transition:width .4s;}
  .lsub{font-size:11px;color:var(--sub);margin-top:5px;}
  .badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:6px;}
  .resetbtn{margin-top:12px;padding:11px;border:1px solid var(--line);background:transparent;color:var(--sub);border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;}
  .empty{text-align:center;color:var(--sub);font-size:14px;line-height:1.8;padding:40px 20px;}
  footer{text-align:center;color:#475569;font-size:11px;padding:12px;}

  /* ===== iPad / tablet (>=760px) ===== */
  @media (min-width:760px){
    .wrap{max-width:960px;}
    header{padding:18px 24px 8px;} header h1{font-size:20px;}
    .hstat{font-size:13.5px;padding:0 24px 8px;}
    .tabbar{padding:10px 22px;gap:8px;}
    .tab{font-size:13.5px;padding:8px 14px;}
    main{padding:24px;}
    /* 本棚は広く多列 */
    .shelf{grid-template-columns:repeat(3,1fr);gap:14px;}
    .book{padding:16px;border-radius:18px;}
    .book .bname{font-size:16.5px;min-height:46px;} .book .bnum{font-size:54px;}
    .crossbtn{font-size:15px;padding:15px;} .ovnum{font-size:28px;}
    /* 読みやすさのため演習・成績は中央寄せ＆最大幅 */
    .qhead,.barwrap,.card,.sresult,.stats{max-width:720px;width:100%;margin-left:auto;margin-right:auto;}
    .card{padding:28px 30px;border-radius:24px;}
    .q{font-size:21px;line-height:1.8;}
    .btn{font-size:34px;padding:24px 0;border-radius:18px;} .btn small{font-size:13px;}
    .exp{font-size:16px;padding:16px 18px;} .ref{font-size:13px;}
    .next{font-size:18px;padding:17px;}
    .lrow .lname{font-size:15px;}
  }
  /* ===== iPad landscape / desktop (>=1100px) ===== */
  @media (min-width:1100px){
    .wrap{max-width:1120px;}
    .shelf{grid-template-columns:repeat(4,1fr);}
    main{padding:28px 32px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="homebtn" id="homebtn" onclick="goHome()">📚 本棚</button>
    <h1 id="title">🔺 Delta Drill</h1>
    <button class="timerchip" id="timerchip" onclick="toggleStudy()">⏱</button>
  </header>
  <div class="hstat" id="hstat"></div>
  <div class="tabbar" id="tabbar"></div>
  <main id="main"></main>
  <input type="file" id="importfile" accept="application/json,.json" style="display:none">
  <footer>🔺 Delta Drill ｜ 社労士○×・全<span id="qtotal"></span>問 ｜ 履歴は端末＋クラウド同期</footer>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

const BOOKDATA={"rkijun":[{"law":"総則","cat":"適用範囲","q":"労働基準法は事業の種類・規模を問わず適用されるから、同居の親族のみを使用する事業や家事使用人についても適用される。","a":false,"exp":"✕。労基法は原則として事業の種類・規模を問わず適用されるが、同居の親族のみを使用する事業及び家事使用人には適用されない(法116条2項)。","page":12,"detail":"【論点：適用除外】労基法は事業の種類・規模を問わず広く適用されるのが原則だが、①同居の親族のみを使用する事業、②家事使用人の2つは明文で適用除外(法116条2項)。「種類・規模を問わず適用」という原則だけを覚えて例外を落とすと誤る。"},{"law":"総則","cat":"属地主義","q":"労働基準法は、日本国内で行われる事業であっても、事業主が外国人である場合には適用されない。","a":false,"exp":"×。日本国内で行われる事業であれば、事業主が外国人であっても労働基準法が適用される。属地主義により国外の支店等には適用されない。","page":12,"detail":"本肢は誤り。p.12の属地主義の説明では「日本国内で行われる事業であれば、事業主が外国人であっても適用されます」とあり、事業主の国籍は適用の有無に影響しない。一方「国外にある支店等であって事業としての実態を備えるものについては適用されません」とされ、適用の基準はあくまで日本国内で行われる事業か否かである。したがって外国人事業主を理由に不適用とする本肢は妥当でない。"},{"law":"総則","cat":"同居の親族","q":"同居の親族とともに同居の親族でない労働者を使用する事業であっても、当該同居の親族については常に労働基準法が適用されない。","a":false,"exp":"✕。同居の親族のみを使用する事業は適用除外だが、他人(同居の親族でない労働者)を使用する事業では、同居の親族も使用従属関係が認められ賃金が支払われる等の実態があれば労働者として適用される。","page":14,"detail":"【論点：同居の親族と適用除外の境界】適用除外は『同居の親族のみ』を使用する事業。他人を常時使用していれば、その同居の親族も、①他の労働者と同様の指揮命令下にあり、②賃金が支払われる等の実態があれば労働者として労基法が適用される。『同居の親族＝常に適用除外』ではない。"},{"law":"総則","cat":"家事使用人","q":"個人家庭における家事を事業として請け負う者に雇われ、その指揮命令の下に家事を行う者は、家事使用人に該当し労働基準法は適用されない。","a":false,"exp":"×。この者は家事使用人に該当せず、労働基準法が適用される。法人に雇われ役職員の家庭で家族の指揮命令下に家事に従事する者は家事使用人に該当する。","page":15,"detail":"本肢は誤り。p.15の通達は「個人家庭における家事を事業として請け負う者に雇われて、その指揮命令の下に当該家事を行う者は、家事使用人に該当しません」とし、この者には労働基準法が適用される。これに対し「法人に雇われ、その役職員の家庭において、その家族の指揮命令の下で家事一般に従事している者」は家事使用人に該当し適用されない(平11.3.31基発168号)。本肢は両者を取り違えており妥当でない。"},{"law":"総則","cat":"国等の事業","q":"行政執行法人の職員は国家公務員であるため、労働基準法は適用されない。","a":false,"exp":"×。行政執行法人の職員は国家公務員であるが、労働基準法が適用される。一般職の国家公務員には適用がない。","page":15,"detail":"本肢は誤り。p.15の注意書きは「行政執行法人の職員については、国家公務員ですが、労働基準法が適用されます」と明記する。一方で「一般職の国家公務員については適用がなく」とされる(法112条等)。なお行政執行法人以外の独立行政法人の職員は国家公務員ではないため労働基準法が適用される。よって行政執行法人職員に不適用とする本肢は妥当でない。"},{"law":"総則","cat":"労働者の定義","q":"法人の代表者(代表取締役)は、賃金を受けていても労働基準法上の労働者に該当する。","a":false,"exp":"×。法人の代表者(代表取締役)は労働者とならない。業務執行権・代表権を持たない法人の重役で工場長等の職にあって賃金を受ける者は労働者となる。","page":17,"detail":"本肢は誤り。p.17の「労働者とならない者」に「法人の代表者(代表取締役)」が挙げられており、賃金を受けていても労働者とはならない。これに対し「業務執行権又は代表権を持たない法人の重役で、工場長・部長等の職にあって賃金を受ける者」は「労働者となる者」に該当する(昭23.3.24基発498号等)。本肢は代表取締役を労働者とする点で妥当でない。"},{"law":"総則","cat":"派遣・出向","q":"移籍型出向の出向労働者については、出向先とのみ労働契約関係があるので、出向先についてのみ労働基準法の適用がある。","a":true,"exp":"〇。移籍型出向では出向先とのみ労働契約関係があるため、出向先についてのみ労働基準法が適用される(昭61.6.6基発333号)。","page":20,"detail":"本肢は正しい。p.20は「移籍型出向の出向労働者については、出向先とのみ労働契約関係があるので、出向先についてのみ労働基準法の適用があります(昭61.6.6基発333号)」と規定する。労働基準法は労働者と労働契約関係にある事業に適用されるため、移籍型では出向先のみが使用者責任を負う。在籍型出向では三者間の取決めに応じ出向元・出向先のいずれかが責任を負う点と区別される。"},{"law":"総則","cat":"派遣労働者","q":"派遣労働者について、労働時間・休憩・休日等の規定は派遣元事業主に適用される。","a":false,"exp":"×。労働時間・休憩・休日等の規定は派遣先に適用される。労働契約・賃金・年次有給休暇・就業規則・災害補償等は派遣元事業主に適用される。","page":20,"detail":"本肢は誤り。p.20は「『労働時間、休憩、休日』等の規定については派遣先に適用し、『労働契約、賃金、年次有給休暇、就業規則、災害補償』等の規定については派遣元事業主に適用します」とする(労働者派遣法44条、昭61.6.6基発333号)。派遣労働者は派遣先が指揮命令を行う特殊な労働関係にあるため、労働時間等は派遣先に適用される。よって派遣元とする本肢は妥当でない。"},{"law":"総則","cat":"労働条件の原則","q":"労働基準法で定める労働条件の基準は最低のものであるから、労働関係の当事者は、この基準を理由として労働条件を低下させてはならず、かつ労働条件の向上を図らなければならない。","a":false,"exp":"✕。労働条件を低下させてはならないのは義務だが、その向上を図ることは『…向上を図るように努めなければならない』という努力義務(法1条2項)であって法的義務ではない。","page":23,"detail":"【論点：義務と努力義務の区別】法1条2項は、最低基準を理由に労働条件を低下させてはならない(義務)とともに、その向上を図るように『努めなければならない』(努力義務)と定める。『向上を図らなければならない』と義務化する点が誤り。語尾『〜するように努めなければならない』＝努力義務。"},{"law":"総則","cat":"均等待遇","q":"使用者は、労働者の国籍、信条、社会的身分又は性別を理由として、労働条件について差別的取扱いをしてはならない。","a":false,"exp":"×。均等待遇(法3条)の差別理由は国籍・信条・社会的身分に限定され、性別は含まれない。性別による差別は男女同一賃金の原則や男女雇用機会均等法による。","page":25,"detail":"本肢は誤り。p.25の均等待遇(法3条)は「使用者は、労働者の国籍、信条又は社会的身分を理由として」差別的取扱いをしてはならないとし、注意書きで「この規定では、『性別』は挙がっていません」と明記する。性別による差別は「男女同一賃金の原則(法4条)及び男女雇用機会均等法による規制」によるとされる。したがって性別を含めた本肢は妥当でない。"},{"law":"総則","cat":"男女同一賃金","q":"労働基準法で性別による差別的取扱いを禁止しているのは、賃金についてのみである。","a":true,"exp":"〇。法4条は賃金についての性別差別を禁止する。賃金以外の労働条件は男女雇用機会均等法で規制される。差別には不利・有利いずれの取扱いも含まれる。","page":26,"detail":"本肢は正しい。p.26の男女同一賃金の原則(法4条)は「使用者は、労働者が女性であることを理由として、賃金について、男性と差別的取扱いをしてはなりません」とし、「労働基準法で性別による差別的取扱いを禁止しているのは、賃金についてだけです」と明記する。賃金以外は男女雇用機会均等法による。通達では差別に「不利に取り扱う場合だけでなく、有利に取り扱う場合も含まれます」とされる(平9.9.25基発648号)。"},{"law":"総則","cat":"強制労働の禁止","q":"強制労働の禁止の規定に違反した使用者には、6か月以下の拘禁刑又は30万円以下の罰金が科される。","a":false,"exp":"×。強制労働の禁止(法5条)違反には労働基準法上最も重い罰則(1年以上10年以下の拘禁刑又は20万円以上300万円以下の罰金)が科される(法117条)。","page":27,"detail":"本肢は誤り。p.27の脚注は強制労働の禁止(法5条)違反に対し「労働基準法上最も重い罰則(1年以上10年以下の拘禁刑又は20万円以上300万円以下の罰金)が科されます(法117条)」と明記する。本肢の「6か月以下の拘禁刑又は30万円以下の罰金」は均等待遇・解雇予告等に科される罰則であり、強制労働の禁止違反の罰則ではない。よって妥当でない。"},{"law":"総則","cat":"中間搾取の排除","q":"労働者派遣は、適法なものであれば中間搾取に該当しないが、違法な労働者派遣は中間搾取に該当する。","a":false,"exp":"×。労働者派遣は、たとえ違法な派遣であっても中間搾取には該当しない。労働関係の外にある第三者が介入するものではないためである。","page":29,"detail":"本肢は誤り。p.29は「労働者派遣については、派遣元と労働者との間の労働契約関係及び派遣先と労働者との間の指揮命令関係を合わせたものが全体として当該労働者の労働関係となるものであり、労働関係の外にある第三者が他人の労働関係に介入するものではない」ため中間搾取に該当しないとし、「たとえ違法な労働者派遣であっても、ここでいう中間搾取には該当しません」と明記する。よって違法派遣を中間搾取とする本肢は妥当でない。"},{"law":"総則","cat":"公民権行使","q":"使用者は、労働者が公民権の行使等に必要な時間を請求した場合でも、権利の行使等に妨げがない限り、請求された時刻を変更することができる。","a":true,"exp":"〇。法7条ただし書により、権利の行使又は公の職務の執行に妨げがない限り、請求された時刻を変更できる。","page":30,"detail":"本肢は正しい。p.30の公民権行使の保障(法7条)は、必要な時間の請求を拒んではならないとしつつ、ただし書で「権利の行使又は公の職務の執行に妨げがない限り、請求された時刻を変更することができます」と規定する。請求自体を拒むことはできないが、妨げのない範囲での時刻変更は認められる。よって本肢は妥当である。"},{"law":"総則","cat":"公の職務","q":"予備自衛官の招集や非常勤の消防団員の職務は、労働基準法7条の「公の職務」に該当する。","a":false,"exp":"×。予備自衛官の招集や非常勤の消防団員の職務は「公の職務」に該当しない。裁判員の職務や労働審判員の職務などは該当する。","page":31,"detail":"本肢は誤り。p.31は「公の職務に該当しないもの」として「予備自衛官の招集」「非常勤の消防団員の職務」を挙げる(令2.2.14基発0214第12号)。これに対し「公の職務に該当するもの」には「裁判員制度における裁判員としての職務」「労働審判手続の労働審判員としての職務」等がある。本肢は該当しないものを該当するとしており妥当でない。"},{"law":"労働契約","cat":"違反契約","q":"労働基準法で定める基準に達しない労働条件を定める労働契約は、その契約全体が無効となる。","a":false,"exp":"×。基準に達しない部分についてのみ無効となり、無効部分は労働基準法で定める基準による(法13条)。契約全体が無効となるのではない。","page":34,"detail":"本肢は誤り。p.34は「労働基準法で定める基準に達しない労働条件を定める労働契約は、その部分については無効となります。この場合、無効となった部分は、労働基準法で定める基準によることとなります(法13条)」と規定する。本文の具体例でも「1日12時間」の定めはその部分のみ無効となり8時間に修正される。契約全体が無効になるのではないため本肢は妥当でない。"},{"law":"労働契約","cat":"契約期間","q":"労働契約は、一定の事業の完了に必要な期間を定めるものであっても、3年(専門的知識等を有する者等は5年)を超える期間について締結することはできない。","a":false,"exp":"✕。契約期間の上限(原則3年・例外5年)の対象外として『一定の事業の完了に必要な期間を定めるもの』があり、これは当該事業に必要な期間まで(3年・5年を超えても)締結できる(法14条1項)。","page":37,"detail":"【論点：契約期間の上限の例外】上限は原則3年(高度専門・満60歳以上は5年)。ただし①期間の定めのないもの、②一定の事業の完了に必要な期間を定めるもの(有期の建設工事等)は上限の対象外で、その事業に必要な期間まで締結できる。例外を落として『常に3年(5年)まで』とする点が誤り。"},{"law":"労働契約","cat":"契約期間の例外","q":"満55歳以上の労働者との間に締結される労働契約は、5年を超えない期間について締結することができる。","a":false,"exp":"×。5年を超えない期間で締結できるのは満60歳以上の労働者との労働契約である。年齢要件は55歳ではなく60歳である(法14条1項)。","page":37,"detail":"本肢は誤り。p.37の例外⑵は「満60歳以上の労働者との間に締結される労働契約」について5年を超えない期間で締結できるとする(法14条1項)。年齢要件は満60歳以上であり、本肢の「満55歳以上」ではない。なお高度の専門的知識等を有する者との労働契約も5年を上限とできる。よって55歳とする本肢は妥当でない。"},{"law":"労働契約","cat":"高度専門知識","q":"高度の専門的知識等を有する労働者であっても、その高度の専門的知識等を必要とする業務に就かない場合の契約期間の上限は3年である。","a":true,"exp":"〇。高度の専門的知識等を有する者でも、その知識等を必要とする業務に就かない場合の契約期間の上限は3年となる。","page":37,"detail":"本肢は正しい。p.37の通達は「高度の専門的知識等を有する労働者が高度の専門的知識等を必要とする業務に就かない場合の契約期間の上限は3年となります」とする。5年の上限が認められるのは、その知識等を必要とする業務に就く場合である(就く者であればその年齢にかかわらず最長5年の契約が可能)。よって業務に就かない場合は3年とする本肢は妥当である。"},{"law":"労働契約","cat":"有期契約の解約","q":"1年を超える期間の定めのある労働契約を締結した労働者(例外該当者を除く)は、契約期間の初日から1年を経過した日以後においては、いつでも退職することができる。","a":true,"exp":"〇。法附則137条により、1年を経過した日以後はいつでも退職できる。契約期間上限が3年の者に限り適用される。","page":39,"detail":"本肢は正しい。p.39は「1年を超える期間の定めのある労働契約を締結した労働者(契約期間の例外⑴、⑵に該当する労働者を除きます)は、所定の措置が講じられるまでの間、民法628条の規定にかかわらず、当該労働契約の期間の初日から1年を経過した日以後においては、その使用者に申し出ることにより、いつでも退職することができます(法附則137条)」と規定する。契約期間上限が3年の者に限り適用される。"},{"law":"労働契約","cat":"雇止めの予告","q":"使用者は、所定の有期労働契約を更新しないこととしようとする場合には、少なくとも契約期間の満了する日の30日前までにその予告をしなければならない。","a":true,"exp":"〇。有期労働契約基準により、少なくとも契約期間満了日の30日前までに予告しなければならない(令5.3.30厚労告114号2条)。","page":41,"detail":"本肢は正しい。p.41の雇止めの予告(令5.3.30厚労告114号2条)は、所定の有期労働契約を更新しないこととしようとする場合「少なくとも当該契約の期間の満了する日の30日前までに、その予告をしなければなりません」と規定する。対象は当該契約を3回以上更新し、又は雇入れの日から起算して1年を超えて継続勤務している者に係るもの等である。よって30日前とする本肢は妥当である。"},{"law":"労働契約","cat":"労働条件明示","q":"使用者が労働条件の明示義務に反して労働条件を明示しなかった場合、その労働契約自体が無効となる。","a":false,"exp":"×。労働条件が明示されなかったとしても、労働契約自体は有効に成立する。明示義務違反となるにとどまる。","page":43,"detail":"本肢は誤り。p.43の注意書きは「労働条件の明示義務に反して労働条件が明示されなかったとしても、労働契約自体は有効に成立します」と明記する(法15条1項)。明示義務違反となるにとどまり、契約そのものが無効になるわけではない。よって労働契約自体が無効になるとする本肢は妥当でない。"},{"law":"労働契約","cat":"明示方法","q":"昇給に関する事項は、絶対的明示事項であるため、書面の交付等により明示しなければならない。","a":false,"exp":"×。絶対的明示事項のうち「昇給に関する事項」は書面の交付等が不要で、口頭による明示でも差し支えない。それ以外の絶対的明示事項は書面の交付等を要する。","page":45,"detail":"本肢は誤り。p.45は「絶対的明示事項のうち『昇給に関する事項』以外の事項については、当該事項が明らかとなる書面の交付により明示しなければなりません」とし、「昇給に関する事項及び相対的明示事項は、『書面の交付等』以外の方法(口頭)で明示しても差し支えありません」と規定する(法15条1項、則5条3項・4項)。昇給に関する事項は書面交付等を要しないため本肢は妥当でない。"},{"law":"労働契約","cat":"即時解除","q":"明示された労働条件が事実と相違する場合、就業のために住居を変更した労働者が契約解除の日から14日以内に帰郷するときは、使用者は必要な旅費を負担しなければならない。","a":true,"exp":"〇。法15条3項により、契約解除の日から14日以内に帰郷する場合、使用者は帰郷旅費を負担しなければならない。","page":47,"detail":"本肢は正しい。p.47は「就業のために住居を変更した労働者が、契約解除の日から14日以内に帰郷する場合においては、使用者は、必要な旅費(帰郷旅費)を負担しなければなりません(法15条2項・3項)」と規定する。これは明示された労働条件が事実と相違した場合の即時解除に伴うものである。通達では「必要な旅費」に移転した家族の旅費も含むとされる(昭22.9.13発基17号)。よって本肢は妥当である。"},{"law":"労働契約","cat":"賠償予定の禁止","q":"使用者は、労働契約の不履行について違約金を定め、又は損害賠償額を予定する契約をしてはならないが、現実に生じた損害について賠償請求することは認められる。","a":true,"exp":"〇。法16条は賠償額の予定を禁止するが、現実に生じた損害の賠償請求は認められる。賠償額予定契約は親権者や身元保証人とも締結できない。","page":48,"detail":"本肢は正しい。p.48の賠償予定の禁止(法16条)は違約金・損害賠償額の予定契約を禁止するが、脚注は「現実に生じた損害について使用者が賠償請求することは認められます」とする(昭22.9.13発基17号)。また注意書きで「賠償額を予定する契約は、労働者だけでなく、その親権者や身元保証人とも締結することはできません」とされる。よって本肢は妥当である。"},{"law":"労働契約","cat":"前借金相殺","q":"使用者は、前借金その他労働することを条件とする前貸の債権と賃金を相殺してはならないが、労働者が自己の意思によって相殺することは禁止されていない。","a":true,"exp":"〇。法17条は使用者による相殺を禁止するが、労働者が自己の意思によって相殺することは禁止されていない。","page":49,"detail":"本肢は正しい。p.49の前借金相殺の禁止(法17条)は使用者が前借金等の前貸債権と賃金を「相殺すること(一方的意思表示により対等額で消滅させること)は、できません」とするが、注意書きで「労働者が自己の意思によって相殺することは禁止されていません」と明記する。よって労働者自身による相殺は妨げられないとする本肢は妥当である。"},{"law":"労働契約","cat":"強制貯金","q":"社内預金として労働者の預金を受け入れる使用者は、利子をつけなければならず、その利率の最低限度は年5厘(年0.5%)である。","a":true,"exp":"〇。社内預金には利子をつけなければならず、利率の最低限度は年5厘(年0.5%)である。上限の制限はない。","page":51,"detail":"本肢は正しい。p.51は社内預金(労働者の預金を受け入れる場合)について「使用者は利子をつけなければなりません」とし、注意書きで「利率の最低限度は年5厘(年0.5%)ですが、上限については制限はありません」と規定する(則6条の3等)。よって最低利率を年5厘とし上限の制限がない点を含め本肢は妥当である。"},{"law":"労働契約","cat":"過半数代表者","q":"労使協定の過半数代表者は、監督又は管理の地位にある者でないこと等の要件を満たす必要があるが、協定締結後にこの要件に該当しなくなっても協定の効力に影響しない。","a":true,"exp":"〇。「監督又は管理の地位にある者でないこと」は協定締結時の要件(協定成立要件)であり、存続要件ではないため、締結後の変動は協定の効力に影響しない。","page":53,"detail":"本肢は正しい。p.53は過半数代表者の要件として「法41条に規定する監督又は管理の地位にある者でないこと」を掲げつつ、これは「協定締結時の要件(協定成立要件)であって、存続要件ではありません。したがって、協定締結後に、『過半数代表者』が『監督又は管理の地位にある者』に該当することとなっても、協定の効力には影響しません」と明記する(則6条の2第1項)。よって本肢は妥当である。"},{"law":"労働契約","cat":"解雇制限","q":"使用者は、産前産後の女性が法65条により休業する期間及びその後14日間は解雇してはならない。","a":false,"exp":"×。解雇制限はその後30日間である。14日間ではない(法19条1項)。業務上の傷病による休業期間及びその後30日間も同様である。","page":56,"detail":"本肢は誤り。p.56の解雇制限期間(法19条1項)は「産前産後の女性が法65条の規定によって休業する期間及びその後30日間」は解雇してはならないと規定する。本肢の「14日間」ではなく30日間である。業務上の傷病による療養のため休業する期間及びその後30日間も同様に解雇制限期間となる。よって14日間とする本肢は妥当でない。"},{"law":"労働契約","cat":"解雇制限の除外","q":"療養補償を受ける労働者が療養開始後3年を経過しても傷病が治らない場合に、使用者が平均賃金1,000日分の打切補償を支払えば、解雇制限期間中であっても解雇できる。","a":false,"exp":"×。打切補償は平均賃金1,200日分である。1,000日分ではない(法19条・81条)。","page":58,"detail":"本肢は誤り。p.58は解雇制限期間中でも解雇できる場合として「療養補償を受ける労働者が療養開始後3年を経過しても業務上の傷病が治らない場合において、使用者が平均賃金1,200日分の打切補償を支払う場合」を挙げる(法19条・81条)。打切補償は平均賃金1,200日分であり、本肢の「1,000日分」ではない。よって妥当でない。"},{"law":"労働契約","cat":"解雇予告","q":"解雇予告について、予告の日数は平均賃金を支払った日数だけ短縮でき、例えば解雇の20日前に予告をする場合には、10日分以上の平均賃金(解雇予告手当)を支払えばよい。","a":true,"exp":"〇。予告の日数は、1日について平均賃金を支払った日数だけ短縮できる(法20条2項)。予告日数＋手当を支払った日数の合計が30日以上となればよく、20日前予告なら10日分以上の手当で足りる。","page":60,"detail":"【論点：予告日数と予告手当の関係】原則は30日前の予告。予告をしないときは30日分以上の平均賃金。両者は併用でき『予告した日数＋平均賃金を支払った日数≧30日』であればよい(法20条)。20日前予告＋10日分手当、即時解雇＋30日分手当などの組合せを計算できるかが論点。"},{"law":"労働契約","cat":"解雇予告の適用除外","q":"試みの使用期間中の者は、14日を超えて引き続き使用されるに至った場合には、解雇予告が必要となる。","a":true,"exp":"〇。試みの使用期間中の者は原則として解雇予告が不要だが、14日を超えて引き続き使用されると解雇予告が必要となる(法21条)。","page":63,"detail":"本肢は正しい。p.63の解雇予告の適用除外(法21条)は「試みの使用期間中の者」を挙げ、例外として「14日を超えて引き続き使用されるに至った場合には、解雇予告が必要です」と規定する。試用期間中は原則として解雇予告が不要だが、14日を超えて引き続き使用されると必要となる。よって本肢は妥当である。"},{"law":"労働契約","cat":"解雇予告の適用除外","q":"季節的業務に4か月以内の期間を定めて使用される者は、その期間を超えて引き続き使用されるに至っても、解雇予告は不要である。","a":false,"exp":"×。当初の契約期間を超えて引き続き使用されるに至った場合には、解雇予告が必要となる(法21条)。","page":63,"detail":"本肢は誤り。p.63の解雇予告の適用除外(法21条)では「季節的業務に4か月以内の期間を定めて使用される者」が挙げられるが、例外として「所定の期間(当初の契約期間のことです)を超えて引き続き使用されるに至った場合には、解雇予告が必要です」と規定する。当初の契約期間を超えて使用されれば解雇予告が必要となるため、不要とする本肢は妥当でない。"},{"law":"労働契約","cat":"退職時の証明","q":"退職時の証明書には、使用者の判断により、労働者が請求しない事項を記入することができる。","a":false,"exp":"×。証明書には労働者の請求しない事項を記入してはならない(法22条3項)。証明事項は使用期間・業務の種類・地位・賃金・退職事由である。","page":64,"detail":"本肢は誤り。p.64の退職時の証明(法22条1項・3項)は「当該証明書には、労働者の請求しない事項を記入してはなりません」と明記する。証明事項は使用期間・業務の種類・その事業における地位・賃金・退職の事由(解雇の場合はその理由を含む)である。使用者の判断で請求しない事項を記入することはできないため本肢は妥当でない。"},{"law":"労働契約","cat":"金品の返還","q":"使用者は、労働者の死亡又は退職の場合において、権利者の請求があったときは、14日以内に賃金を支払い、労働者の権利に属する金品を返還しなければならない。","a":false,"exp":"×。7日以内である(法23条)。14日以内ではない。退職手当はあらかじめ就業規則等で定められた支払時期に支払えば足りる。","page":67,"detail":"本肢は誤り。p.67の金品の返還(法23条)は、労働者の死亡又は退職の場合に権利者の請求があったときは「7日以内に、賃金を支払い、…労働者の権利に属する金品を返還しなければなりません」と規定する。本肢の「14日以内」ではなく7日以内である。なお退職手当はあらかじめ就業規則等で定められた支払時期に支払えば足りる(昭63.3.14基発150号)。よって妥当でない。"},{"law":"賃金","cat":"賃金の定義","q":"使用者が任意的・恩恵的に支払う結婚祝金や死亡弔慰金は、原則として賃金に該当しない。","a":true,"exp":"〇。任意的・恩恵的に支払うものは賃金ではない。ただし労働協約・就業規則等で支給条件が明確に定められ支払義務があるものは賃金となる。","page":70,"detail":"本肢は正しい。p.70は賃金とならないものとして「使用者が任意的・恩恵的に支払うもの」を挙げ、具体例に「結婚祝金・死亡弔慰金・災害見舞金」を示す。ただし注意書きで「あらかじめ、労働協約・就業規則等によって支給条件が明確に定められていて、それに従って使用者に支払義務があるものは賃金となります」とされる。よって原則として賃金に該当しないとする本肢は妥当である。"},{"law":"賃金","cat":"賃金の定義","q":"解雇予告手当は、賃金に該当する。","a":false,"exp":"×。解雇予告手当は賃金に該当しない。ストック・オプション制度から得られる利益や、客から直接受けるチップも原則として賃金とならない。","page":71,"detail":"本肢は誤り。p.71の具体的取扱い❻は「解雇予告手当は、賃金には該当しません」と明記する。同様にストック・オプション制度から得られる利益(❹)や、客から直接受けるチップ(❺)も原則として賃金とならない。本肢は解雇予告手当を賃金に該当するとしており妥当でない。"},{"law":"賃金","cat":"平均賃金","q":"平均賃金は、算定すべき事由の発生した日以前3か月間にその労働者に対し支払われた賃金の総額を、その期間中に現実に労働した日数で除して算定する。","a":false,"exp":"✕。原則の平均賃金は、賃金総額を『その期間の総日数(暦日数)』で除して算定する(法12条1項)。『労働した日数』で除すのは、日給・出来高払制等に係る最低保障額(100分の60)を計算する場合。","page":72,"detail":"【論点：分母の取り違え(総日数か労働日数か)】平均賃金＝事由発生日以前3か月の賃金総額÷総日数(暦日数)。これに対し日給・出来高払制等では『賃金総額÷労働した日数×100分の60』の最低保障がある。原則の分母(総日数)と最低保障の分母(労働日数)を入れ替える典型ひっかけ。"},{"law":"賃金","cat":"平均賃金の起算日","q":"平均賃金の算定における「算定すべき事由の発生した日以前3か月間」には、算定事由発生日が含まれる。","a":false,"exp":"×。事由の発生した日の前日からさかのぼる3か月間であり、算定事由発生日は含まれない。賃金締切日がある場合は直前の締切日から起算する。","page":73,"detail":"本肢は誤り。p.73は「『算定すべき事由の発生した日以前3か月間』とは、事由の発生した日の前日からさかのぼる3か月間のことであり、算定事由発生日は含まれません」と明記する。また算定期間中に賃金締切日がある場合の起算日は直前の賃金締切日となる(法12条2項)。算定事由発生日を含むとする本肢は妥当でない。"},{"law":"賃金","cat":"平均賃金の最低保障","q":"賃金が日給・時間給・出来高払制で定められている場合の最低保障は、賃金総額をその期間中に労働した日数で除した金額の100分の60である。","a":true,"exp":"〇。日給・時間給・出来高払制の場合の最低保障は、労働した日数で除した金額の100分の60である。原則の式と比較し高いほうの金額とする。","page":76,"detail":"本肢は正しい。p.76の最低保障は、賃金が労働した日もしくは時間によって算定され、又は出来高払制その他の請負制で定められている場合、「賃金の総額をその期間中に労働した日数で除した金額の100分の60」を最低保障とする(法12条1項)。本文では「原則の式で計算した額と最低保障の式で計算した額とを比較して、高いほうの金額とします」とされる。よって本肢は妥当である。"},{"law":"賃金","cat":"通貨払の原則","q":"賃金は通貨で支払わなければならないが、労働協約に別段の定めがある場合には、通貨以外のもので支払うことができる。","a":true,"exp":"〇。法24条1項により、労働協約に別段の定めがある場合は現物等で支払える。ただし労働協約の適用を受ける労働者に限られる。","page":78,"detail":"本肢は正しい。p.78の通貨払の原則(法24条1項)は賃金を通貨で支払うことを原則としつつ、例外として「労働協約に別段の定めがある場合」は通貨以外のもの(現物等)で支払えるとする。通達では「労働協約の定めによって通貨以外のもので支払うことが許されるのは、その労働協約の適用を受ける労働者に限られます」とされる(昭63.3.14基発150号)。よって本肢は妥当である。"},{"law":"賃金","cat":"直接払の原則","q":"賃金は直接労働者に支払わなければならないが、労働者の使者に支払うことは直接払の原則に違反しない。","a":true,"exp":"〇。使者への支払は差し支えない。一方、法定代理人や任意代理人(委任を受けた弁護士など)に支払うことは違法である。","page":80,"detail":"本肢は正しい。p.80の直接払の原則(法24条1項)について本文は「労働者の使者に支払うことは差し支えありません」とし、「使者」とは本人の意思を伝達するにすぎない者とする。一方通達では「法定代理人や任意代理人(労働者の委任を受けた弁護士など)に支払うことは、違法となり」とされる(昭63.3.14基発150号)。よって使者への支払が直接払に違反しないとする本肢は妥当である。"},{"law":"賃金","cat":"全額払の原則","q":"賃金からの一部控除は、労働組合費などについて労使協定がある場合に認められ、この労使協定は行政官庁へ届け出る必要はない。","a":true,"exp":"〇。法令に定めがある場合のほか、労使協定がある場合は一部控除できる。この労使協定は行政官庁へ届け出る必要がない。","page":81,"detail":"本肢は正しい。p.81の全額払の原則(法24条1項)は例外として「労使協定がある場合」に社宅の費用・労働組合費などを賃金から控除できるとし、「労使協定は、行政官庁へ届け出る必要はありません」と明記する。法令に別段の定めがある場合(所得税・社会保険料の源泉控除等)も控除できる。よって労使協定で控除でき届出不要とする本肢は妥当である。"},{"law":"賃金","cat":"端数処理","q":"1か月における時間外労働等の各々の時間数の合計の1時間未満の端数は、30分未満を切り捨て、30分以上を1時間に切り上げて処理することができる。","a":true,"exp":"〇。事務処理の便宜上、30分未満切捨て・30分以上1時間切上げの端数処理は5原則に違反しない(昭63.3.14基発150号)。","page":83,"detail":"本肢は正しい。p.83の賃金支払の端数処理は、1か月における時間外労働・休日労働・深夜業各々の時間数の合計の1時間未満の端数について「30分未満切捨て、30分以上を1時間に切上げ」とする。本文は「このような取扱いは、事務処理の便宜を図るため、賃金支払の5原則には違反しないとされています(昭63.3.14基発150号)」と明記する。よって本肢は妥当である。"},{"law":"賃金","cat":"一定期日払","q":"賃金の支払期日について「毎月第4月曜日に支払う」と定めることは、一定期日払の原則上認められる。","a":false,"exp":"×。月7日の範囲で変動する期日の定めは認められない。「月の末日」「土曜日」など特定され周期的に到来するものは差し支えない。","page":84,"detail":"本肢は誤り。p.84の一定期日払の原則について本文は、月給を「月の末日」、週給を「土曜日」などとすることは差し支えないが「『毎月第4月曜日に支払う』とするように月7日の範囲で変動するような期日の定めをすることは認められません」と明記する。第4月曜日は期日が変動するため認められず、本肢は妥当でない。"},{"law":"賃金","cat":"非常時払","q":"使用者は、労働者が非常時払の事由により請求する場合には、賃金の支払期日前であっても、当該賃金計算期間の全期間分(まだ労働していない分を含む)の賃金を支払わなければならない。","a":false,"exp":"✕。非常時払で支払うべきは『既往の労働に対する賃金』に限られる(法25条)。まだ労働していない期間に対応する賃金まで前払する義務はない。","page":85,"detail":"【論点：非常時払は既往の労働分に限る】出産・疾病・災害等の非常の費用に充てるための請求があれば、支払期日前でも賃金を支払う(法25条)。ただし対象は『既往の労働』に対する賃金、つまりすでに働いた分のみ。将来の労働分の前払義務ではない。"},{"law":"賃金","cat":"休業手当","q":"1日の所定労働時間の一部について使用者の責めに帰すべき事由により休業した場合、その日に現実の労働に対して支払われる賃金が平均賃金の100分の60に満たないときは、使用者はその差額を休業手当として支払わなければならない。","a":true,"exp":"〇。一部休業の日についても、現実に支払われる賃金が平均賃金の100分の60に達しないときは、その差額を休業手当として支払う必要がある(法26条、昭27.8.7基収3445号)。","page":86,"detail":"【論点：一部休業と100分の60保障】休業手当は『使用者の責めに帰すべき事由』による休業につき平均賃金の100分の60以上(法26条)。1日の一部だけ休業した場合でも、その日の実労働に対する賃金が平均賃金の60%に満たなければ差額を補填する。全日休業のみが対象ではない。"},{"law":"賃金","cat":"休業手当","q":"天災事変等の不可抗力による休業は、使用者の責めに帰すべき事由による休業に該当し、休業手当の支払が必要である。","a":false,"exp":"×。天災事変等の不可抗力による休業や正当なロックアウトによる休業は、使用者の責めに帰すべき事由に該当しないため休業手当の支払は不要である。","page":87,"detail":"本肢は誤り。p.87は使用者の責めに帰すべき事由に該当しない場合として「天災事変等の不可抗力による休業」「正当なロックアウトによる休業」「休電による休業」を挙げる。これらは使用者の責めに帰すべき事由に該当しないため休業手当の支払は不要である。よって不可抗力による休業を該当するとし支払が必要とする本肢は妥当でない。"},{"law":"賃金","cat":"出来高払の保障給","q":"出来高払制その他の請負制で使用する労働者については、使用者は労働の有無にかかわらず一定額の賃金の保障をしなければならない。","a":false,"exp":"×。保障給は労働時間に応じた一定額のものであり、労働者が労働しなかった場合には支払う義務はない(法27条)。","page":88,"detail":"本肢は誤り。p.88の出来高払制の保障給(法27条)は「使用者は、労働時間に応じ一定額の賃金の保障をしなければなりません」とし、注意書きで「労働者が労働しなかった場合には、この保障給を支払う義務はありません」と明記する。保障給は労働時間に応じた一定額であり、労働の有無にかかわらず支払う義務があるとする本肢は妥当でない。"},{"law":"賃金","cat":"最低賃金","q":"賃金の最低基準については労働基準法が直接その額を定めており、最低賃金法はこれを補完するにとどまる。","a":false,"exp":"✕。賃金の最低額は労働基準法ではなく最低賃金法が定める(労基法28条は最賃法に委ねる旨を規定)。","page":88,"detail":"【論点：最低賃金の根拠法】労基法28条は『賃金の最低基準は最低賃金法の定めるところによる』とし、具体的な最低額は最低賃金法が定める。労基法が直接最低額を定めるのではない。なお最賃額未満の支払いは最低賃金法の罰則(50万円以下の罰金)であり労基法の罰則ではない点も要注意。"},{"law":"労働時間・休憩・休日","cat":"労働時間の概念","q":"参加することが業務上義務づけられている研修・教育訓練の受講時間は、労働時間として扱わなければならない。","a":true,"exp":"〇。業務上義務づけられた研修・教育訓練の受講等は使用者の指揮命令下にあり労働時間として扱う。手待時間も労働時間に当たる。","page":92,"detail":"本肢は正しい。p.92の労働時間の説明は「参加することが業務上義務づけられている研修・教育訓練の受講や、使用者の指示により業務に必要な学習等を行っていた時間」は労働時間として扱わなければならないとする(平29.1.20基発0120第3号)。また「使用者の指示があった場合には即時に業務に従事することを求められ…待機等している時間(いわゆる手待時間)」も労働時間に当たる。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"法定労働時間","q":"常時10人未満の労働者を使用する商業、映画・演劇業(映画製作を除く)、保健衛生業、接客娯楽業の事業については、1週間の法定労働時間を44時間とする特例が認められている。","a":true,"exp":"〇。特例措置対象事業(商業・映画演劇業・保健衛生業・接客娯楽業で常時10人未満)では、週44時間・1日8時間の特例が認められる(法40条、則25条の2)。","page":96,"detail":"【論点：特例措置対象事業の週44時間】原則は週40時間だが、①商業②映画・演劇業(映画製作を除く)③保健衛生業④接客娯楽業で、常時10人未満を使用する事業は週44時間まで(1日は8時間のまま)。業種と『常時10人未満』の要件をセットで押さえる。"},{"law":"労働時間・休憩・休日","cat":"特例措置","q":"常時10人未満の労働者を使用する商業や接客娯楽業の事業についての週44時間の特例措置は、18歳未満の年少者にも適用される。","a":false,"exp":"×。週44時間の特例措置は18歳未満の者(年少者)には適用されない。","page":96,"detail":"本肢は誤り。p.96の特例措置の脚注は「特例措置は、18歳未満の者(年少者)には適用されません」と明記する。週44時間の特例措置の対象は常時10人未満の労働者を使用する商業等の事業であるが、年少者には適用されない。よって年少者にも適用されるとする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"1日の法定労働時間","q":"変形労働時間制を採用していない場合、1週間の労働時間が40時間以内であれば、1日に8時間を超えて労働させても労働基準法違反とはならない。","a":false,"exp":"✕。法定労働時間は『1日8時間』と『1週40時間』の双方が独立した上限(法32条)。変形制によらない限り、週40時間以内でも1日8時間を超えれば時間外労働となる。","page":97,"detail":"【論点：1日と1週の上限は独立】法定労働時間は1日8時間・1週40時間の二本立てで、いずれか一方でも超えれば(変形制等によらない限り)時間外労働。『週40時間以内なら1日は何時間でもよい』は誤り。"},{"law":"労働時間・休憩・休日","cat":"時間計算","q":"労働時間は、事業場を異にする場合においても、労働時間に関する規定の適用については通算するが、この「事業場を異にする場合」には事業主を異にする場合は含まれない。","a":false,"exp":"×。「事業場を異にする場合」には事業主を異にする場合も含まれる(法38条)。副業・兼業の場合に労働時間が通算される。","page":98,"detail":"本肢は誤り。p.98の時間計算(法38条)について本文は「『事業場を異にする場合』とは、事業主を異にする場合をも含みます」と明記する。労働時間は事業場を異にする場合でも通算され、これには副業・兼業のように事業主を異にする場合も含まれる。よって事業主を異にする場合は含まれないとする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"1か月単位変形","q":"1か月単位の変形労働時間制は、労使協定又は就業規則その他これに準ずるものにより採用することができ、事業場の業種・規模を問わず採用できる。","a":true,"exp":"〇。法32条の2により、労使協定又は就業規則等で1か月以内の期間を平均し週平均が法定労働時間を超えない定めをすれば採用でき、業種・規模を問わない。","page":100,"detail":"本肢は正しい。p.100の1か月単位の変形労働時間制の採用要件(法32条の2)は「労使協定又は就業規則その他これに準ずるものにより、1か月以内の一定の期間を平均し1週間当たりの労働時間が法定労働時間を超えない定めをしたとき」に採用できるとし、本文末尾で「事業場の業種・規模を問わず採用することができます」と明記する。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"フレックスタイム制","q":"フレックスタイム制の清算期間は、6か月以内の期間に限られる。","a":false,"exp":"×。清算期間は3か月以内の期間に限られる(法32条の3)。6か月ではない。","page":104,"detail":"本肢は誤り。p.104のフレックスタイム制(法32条の3)の協定事項❷は「清算期間(…3か月以内の期間に限ります)」と規定する。清算期間は3か月以内に限られ、本肢の「6か月以内」ではない。よって妥当でない。"},{"law":"労働時間・休憩・休日","cat":"フレックスタイム制","q":"フレックスタイム制において、コアタイムやフレキシブルタイムは必ずしも定める必要はない。","a":true,"exp":"〇。コアタイム及びフレキシブルタイムは必ずしも定める必要はない。標準となる1日の労働時間は定める必要がある。","page":104,"detail":"本肢は正しい。p.104のフレックスタイム制の協定事項では、コアタイム(❺労働者が労働しなければならない時間帯)及びフレキシブルタイム(❻労働者がその選択により労働することができる時間帯)について注意書きで「❺及び❻は、必ずしも定める必要はありません」と明記する。一方❹「標準となる1日の労働時間」は定める必要がある。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"フレックスタイム制","q":"清算期間が1か月を超えるフレックスタイム制では、1か月ごとに区分した各期間を平均し1週間当たりの労働時間が50時間を超えない範囲内とする必要がある。","a":true,"exp":"〇。清算期間が1か月を超える場合、各1か月ごとの区分期間の週平均が50時間を超えない範囲内とする必要がある(法32条の3第2項)。","page":106,"detail":"本肢は正しい。p.106の清算期間が1か月を超える場合のフレックスタイム制(法32条の3第2項)は「当該清算期間をその開始の日以後1か月ごとに区分した各期間…ごとに当該各期間を平均し1週間当たりの労働時間が50時間を超えない範囲内において」労働させることができると規定する。よって各1か月ごとの区分期間の週平均が50時間を超えない範囲とする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"フレックスタイム制届出","q":"フレックスタイム制の労使協定は、清算期間が1か月以内のものであっても、行政官庁に届け出なければならない。","a":false,"exp":"×。清算期間が1か月以内のものであるときは届け出る必要はない。1か月を超える場合には届出が必要となる(法32条の3第4項)。","page":105,"detail":"本肢は誤り。p.105のフレックスタイム制の労使協定の届出(法32条の3第4項)は「労使協定は、行政官庁に届け出なければなりません。ただし、清算期間が1か月以内のものであるときは、届け出る必要はありません」と規定する。清算期間が1か月以内なら届出は不要であり、1か月を超える場合に届出が必要となる。よって1か月以内でも届出が必要とする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"1年単位変形","q":"1年単位の変形労働時間制の対象期間は、1か月を超え1年以内の期間に限られ、労使協定は行政官庁への届出が必要である。","a":true,"exp":"〇。対象期間は1か月を超え1年以内の期間に限られ、労使協定の行政官庁への届出が必要である(法32条の4)。就業規則による採用はできない。","page":109,"detail":"本肢は正しい。p.109の1年単位の変形労働時間制の採用要件(法32条の4第1項・4項)では「労使協定は、行政官庁(所轄労働基準監督署長)への届出が必要です」とされ、対象期間は協定事項❷で「1か月を超え1年以内の期間に限ります」と規定される。本制度は労使協定によってのみ採用でき就業規則による採用はできない。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"1年単位変形の限度","q":"1年単位の変形労働時間制における労働日数の限度は、対象期間が3か月を超える場合、原則として1年当たり280日である。","a":true,"exp":"〇。対象期間が3か月を超える場合の労働日数の限度は原則1年当たり280日である(則12条の4)。","page":112,"detail":"本肢は正しい。p.112の1年単位の変形労働時間制の労働日数の限度(則12条の4)について本文❶は「労働日数の限度は、対象期間が3か月を超える場合は対象期間について原則として1年当たり280日を限度とします」と規定する。よって対象期間が3か月を超える場合の労働日数の限度を原則1年当たり280日とする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"1年単位変形の限度","q":"1年単位の変形労働時間制における1日の労働時間の限度は12時間、1週間の労働時間の限度は52時間である。","a":false,"exp":"×。1日の労働時間の限度は10時間である。12時間ではない。1週間の労働時間の限度は52時間である。","page":112,"detail":"本肢は誤り。p.112の本文❷は「1日 労働時間の限度は、10時間とします。1週間 労働時間の限度は、52時間とします」と規定する。1日の労働時間の限度は10時間であり、本肢の「12時間」ではない。1週間の限度を52時間とする部分は正しいが、1日の限度の数値が誤っているため本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"1年単位変形の連続労働日数","q":"1年単位の変形労働時間制における連続して労働させる日数の限度は、原則として12日である。","a":false,"exp":"×。連続して労働させる日数の限度は原則6日である。12日は特定期間における連続労働日数(1週間に1日の休日が確保できる日数)である。","page":113,"detail":"本肢は誤り。p.113の連続労働日数について本文❸は「対象期間における連続して労働させる日数の限度は6日です。ただし、特定期間として定められた期間における連続して労働させる日数は1週間に1日の休日が確保できる日数(12日)とします」と規定する。原則の連続労働日数の限度は6日であり、12日は特定期間の場合である。本肢は原則を12日とする点で妥当でない。"},{"law":"労働時間・休憩・休日","cat":"1週間単位変形","q":"1週間単位の非定型的変形労働時間制は、小売業・旅館・料理店・飲食店で、常時使用する労働者数が30人未満の事業について採用できる。","a":true,"exp":"〇。小売業・旅館・料理店・飲食店であって常時使用する労働者数が30人未満の事業で採用できる。労使協定の締結・届出が必要である。","page":114,"detail":"本肢は正しい。p.114の1週間単位の非定型的変形労働時間制の採用要件は、対象事業を「小売業・旅館・料理店・飲食店のいずれかに該当する事業であり、かつ、常時使用する労働者数が30人未満の事業」とする(則12条の5)。また労使協定の締結が必要で、当該協定は行政官庁への届出が必要である。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"1週間単位変形","q":"1週間単位の非定型的変形労働時間制では、1週間の労働時間が40時間を超えない範囲内で、1日について12時間まで労働させることができる。","a":false,"exp":"×。1日について10時間まで労働させることができる。12時間ではない(法32条の5)。","page":114,"detail":"本肢は誤り。p.114の1週間単位の変形労働時間制の効果(法32条の5第1項)は「1週間の労働時間が40時間を超えない範囲内で、1日について10時間まで労働させることができます」と規定する。1日の上限は10時間であり、本肢の「12時間」ではない。よって妥当でない。"},{"law":"労働時間・休憩・休日","cat":"事業場外労働","q":"事業場外労働のみなし労働時間に係る労使協定で定める時間が法定労働時間を超える場合には、行政官庁に届け出なければならない。","a":true,"exp":"〇。協定で定める時間が法定労働時間を超える場合は届出が必要である。法定労働時間の範囲内であれば届出は不要である(法38条の2)。","page":118,"detail":"本肢は正しい。p.118の事業場外労働の「みなし労働時間」に係る労使協定(法38条の2)について本文は、協定で定める時間が法定労働時間を超える場合は「行政官庁(所轄労働基準監督署長)に届け出なければなりません」とし、法定労働時間の範囲内であれば「届出は必要ありません」とする。よって法定労働時間を超える場合に届出が必要とする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"専門業務型裁量労働制","q":"専門業務型裁量労働制の対象業務は、労使当事者間で任意に定めることができる。","a":false,"exp":"×。対象業務は厚生労働省令及び告示で定められた業務に限定され、これら以外の業務を労使で任意に定めても対象とならない。","page":120,"detail":"本肢は誤り。p.120の専門業務型裁量労働制の注意書きは「対象業務は、厚生労働省令及び告示で定められた業務に限定されます。これら以外の業務を労使当事者間で任意に定めたとしても、専門業務型裁量労働制の対象とはなりません」と明記する。対象業務は法令で限定列挙されており、労使で任意に定めることはできない。よって本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"企画業務型裁量労働制","q":"企画業務型裁量労働制は、労使協定の締結により実施することができる。","a":false,"exp":"×。労使協定の締結では実施できない。労使委員会の委員の5分の4以上の多数による議決と決議の行政官庁への届出が必要である(法38条の4)。","page":122,"detail":"本肢は誤り。p.122の企画業務型裁量労働制の注意書きは「労使協定の締結では実施することはできません」と明記する。本制度は「労使委員会がその委員の5分の4以上の多数による議決により…決議をし、かつ、使用者が、当該決議を行政官庁(所轄労働基準監督署長)に届け出た場合」に実施できる(法38条の4第1項)。よって労使協定で実施できるとする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"労使委員会","q":"企画業務型裁量労働制に係る労使委員会の決議は、委員の5分の4以上の多数による議決により行わなければならない。","a":true,"exp":"〇。労使委員会の委員の5分の4以上の多数による議決を要する。これは委員会に出席した委員の5分の4以上の多数による議決で足りる。","page":122,"detail":"本肢は正しい。p.122の企画業務型裁量労働制(法38条の4第1項)は「労使委員会がその委員の5分の4以上の多数による議決により…決議をし」と規定する。p.123の通達では「『5分の4以上の多数による議決』とは、労使委員会に出席した委員の5分の4以上の多数による議決で足ります(平15.12.26基発1226002号)」とされる。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"休憩時間","q":"使用者は、労働時間が8時間を超える場合においては、少なくとも45分の休憩時間を労働時間の途中に与えなければならない。","a":false,"exp":"✕。休憩は、労働時間が6時間を超える場合に少なくとも45分、8時間を超える場合に少なくとも1時間(法34条1項)。8時間超は『1時間』。","page":128,"detail":"【論点：休憩時間の数値境界】6時間以下→不要、6時間超〜8時間以下→45分以上、8時間超→1時間以上。8時間超に『45分』を当てるのが典型ひっかけ。『超える』(その値ちょうどは含まない)という境界の言い回しにも注意。"},{"law":"労働時間・休憩・休日","cat":"休憩の一斉付与","q":"休憩時間を一斉に与えないためには、業種・規模を問わず、労使協定を締結すれば足り、その届出は不要である。","a":true,"exp":"〇。労使協定を締結したときは業種・規模を問わず一斉付与を要しない(届出不要)。運輸交通業・商業等一定の事業も一斉付与の原則が適用されない。","page":130,"detail":"本肢は正しい。p.130の一斉付与(法34条2項)について本文は、労使協定を締結した場合に一斉付与を要しないとし、注意書きで「業種、規模を問わず、労使協定を締結したときは、一斉に休憩を与えることを要しません」と明記する。この労使協定は届出不要である。また運輸交通業・商業等一定の事業も一斉付与の原則の規定が適用されない。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"休憩の自由利用","q":"休憩時間中の労働者の外出について許可制とすることは、事業場内で自由に休息できるのであれば、必ずしも違法ではない。","a":true,"exp":"〇。事業場内で自由に休息できるのであれば外出の許可制は必ずしも違法ではない。警察官等一定の者には自由利用させる必要がない。","page":131,"detail":"本肢は正しい。p.131の自由利用(法34条3項)に関する通達は「休憩時間中の労働者の外出について許可制とすることは、事業場内で自由に休息できるのであれば、必ずしも違法ではありません」とする。また警察官・消防吏員等一定の者には休憩時間を自由に利用させる必要がない。よって事業場内で自由に休息できれば外出許可制が必ずしも違法でないとする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"休日の付与","q":"使用者は、原則として労働者に対して毎週少なくとも1回の休日を与えなければならず、必ず日曜日や祝日を休日としなければならない。","a":false,"exp":"×。毎週少なくとも1回の休日を与えればよく、必ずしも日曜日や祝日を休日とする必要はない(法35条)。","page":132,"detail":"本肢は誤り。p.132の休日の付与(法35条)について本文の原則は「使用者は、労働者に対して、毎週少なくとも1回の休日を与えなければなりません」とし、脚注で「必ずしも日曜日や祝日を休日とする必要はありません」と明記する。毎週少なくとも1回の休日を与えればよく、日曜日や祝日に限定されない。よって日曜・祝日を必須とする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"変形休日制","q":"使用者は、4週間を通じ4日以上の休日を与えれば、毎週1回の休日を与える要件を満たす必要はない。","a":true,"exp":"〇。変形休日制により4週間を通じ4日以上の休日を与えれば毎週1回の要件を満たす必要はない。就業規則等で4週間の起算日を定める必要がある。","page":132,"detail":"本肢は正しい。p.132の休日の付与(法35条)の例外は「使用者は、4週間を通じ4日以上の休日を与えれば、毎週1回の要件を満たす必要はありません(変形休日制)」とする。脚注では「就業規則等で4週間の起算日を定める必要があります」とされる。よって4週4日以上の休日を与えれば毎週1回の要件を満たす必要はないとする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"休日の振替と代休","q":"いわゆる代休の場合、休日に労働させた事実をなくすことはできないので、休日労働に係る割増賃金の支払が必要である。","a":true,"exp":"〇。代休は休日労働後にその代償として労働日の労働を免除するものであり、休日労働の事実は消えず割増賃金の支払が必要である。","page":133,"detail":"本肢は正しい。p.133はいわゆる代休を「休日労働が行われた後に、その代償としてその後の特定の労働日の労働を免除すること」とし、注意書きで「代休の場合、休日に労働させた事実をなくすことはできないので、休日労働に係る割増賃金の支払が必要です(昭63.3.14基発150号)」と明記する。事前に振り替える休日の振替とは異なる。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"災害等の時間外労働","q":"災害その他避けることのできない事由による臨時の必要がある場合の時間外労働は、単なる業務の繁忙その他これに準ずる経営上の必要があれば認められる。","a":false,"exp":"×。単なる業務の繁忙その他これに準ずる経営上の必要は認められない。災害への対応や急病への対応等の人命・公益を保護するための必要が認められる。","page":136,"detail":"本肢は誤り。p.136の災害その他避けることのできない事由の取扱いは、本文❶で「単なる業務の繁忙その他これに準ずる経営上の必要は認められません」と明記する。一方❷で「災害への対応…急病への対応その他の人命又は公益を保護するための必要は認められます」とされる(令元.6.7基発0607第1号)。単なる業務の繁忙では認められないため本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"36協定","q":"使用者は36協定を締結すれば、行政官庁への届出をしなくても、労働時間を延長し又は休日に労働させることができる。","a":false,"exp":"×。届出があって初めて効力が生じる。協定を締結しても届出をしなければ効力は生じない(法36条1項)。","page":138,"detail":"本肢は誤り。p.138の36協定による時間外労働等(法36条1項)の注意書きは「届出があって初めてその効力が生じます。協定を締結したとしても、届出をしなければ効力は生じません」と明記する。36協定は締結に加え行政官庁への届出があってはじめて効力が生じる。よって届出をしなくても延長等ができるとする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"36協定対象期間","q":"36協定における対象期間は、1年間に限られる。","a":true,"exp":"〇。36協定の対象期間は1年間に限られる(法36条2項)。","page":139,"detail":"本肢は正しい。p.139の36協定における協定事項(法36条2項)❷は「対象期間(…1年間に限ります)」と規定する。36協定の対象期間は1年間に限られる。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"限度時間","q":"36協定で定める労働時間の延長の限度時間は、原則として1か月について45時間、1年について320時間である。","a":false,"exp":"×。限度時間は原則1か月45時間、1年360時間である。320時間は1年単位変形(3か月超)の場合の1年の限度時間である(法36条4項)。","page":140,"detail":"本肢は誤り。p.140の労働時間の延長の限度(法36条3項・4項)は限度時間を「1か月について45時間、1年について360時間」とする。本肢の「1年320時間」は誤りで、320時間は1年単位の変形労働時間制(対象期間として3か月を超える期間を定める場合)の1年の限度時間である。よって原則を360時間ではなく320時間とする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"特別条項の上限","q":"特別条項を設ける場合の限度として、1か月について100時間未満、1年について720時間以下が設けられている。","a":true,"exp":"〇。臨時的に限度時間を超えて労働させる場合でも、1か月100時間未満、1年720時間以下の限度が設けられている(法36条5項)。","page":141,"detail":"本肢は正しい。p.141の限度時間を超える労働時間の延長(法36条5項)は、臨時的に限度時間を超えて労働させる場合でも「1か月について100時間未満」「1年について720時間以下」の限度が設けられているとする。この時間は協定事項として協定した時間を含めた限度である。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"特別条項の月数","q":"特別条項を設ける場合、1か月について45時間を超えることができる月数は、1年について4か月以内に限られる。","a":false,"exp":"×。45時間を超えることができる月数は1年について6か月以内に限られる。4か月ではない(法36条5項)。","page":141,"detail":"本肢は誤り。p.141の本文❷は、特別条項を設ける場合「対象期間において労働時間を延長して労働させる時間が1か月について45時間を超えることができる月数(1年について6か月以内に限ります)を定めなければなりません(法36条5項)」と規定する。月数は1年について6か月以内であり、本肢の「4か月以内」ではない。よって妥当でない。"},{"law":"労働時間・休憩・休日","cat":"時間外労働の要件","q":"36協定で定める場合でも、1か月について時間外労働及び休日労働をさせた時間は100時間未満でなければならず、複数月平均は1か月当たり80時間を超えてはならない。","a":true,"exp":"〇。単月100時間未満、複数月(2〜6か月)平均80時間以内の要件を満たす必要がある(法36条6項)。","page":142,"detail":"本肢は正しい。p.142の時間外労働・休日労働の要件(法36条6項)は、❷で「1か月について労働時間を延長して労働させ、及び休日において労働させた時間が100時間未満であること」、❸で各期間の「1か月当たりの平均時間が80時間を超えないこと」を要件とする。単月100時間未満かつ複数月(2〜6か月)平均80時間以内を満たす必要がある。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"有害業務の時間外労働","q":"坑内労働その他健康上特に有害な業務については、1日について労働時間を延長して労働させた時間が2時間を超えてはならない。","a":true,"exp":"〇。健康上特に有害な業務は1日2時間を超える延長ができない(法36条6項)。有害放射線・異常気圧下・重量物取扱い等が該当する。","page":142,"detail":"本肢は正しい。p.142の時間外労働・休日労働の要件(法36条6項)❶は「坑内労働その他厚生労働省令で定める健康上特に有害な業務について、1日について労働時間を延長して労働させた時間が2時間を超えないこと」とする。脚注で「健康上特に有害な業務」には有害放射線・異常気圧下・重量物の取扱い等が該当するとされる。よって1日2時間を超えないとする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"上限規制の適用除外","q":"上限規制は、新たな技術、商品又は役務の研究開発に係る業務については適用しない。","a":true,"exp":"〇。研究開発に係る業務については上限規制を適用しない(法36条11項)。工作物の建設の事業や自動車運転の業務等は暫定措置の対象である。","page":144,"detail":"本肢は正しい。p.144の上限規制の適用除外(法36条11項)は、限度時間等の上限規制を「新たな技術、商品又は役務の研究開発に係る業務については適用しません」と規定する。また暫定措置として工作物の建設の事業・自動車の運転の業務・医業に従事する医師について異なる基準が定められている。よって研究開発業務に適用しないとする本肢は妥当である。"},{"law":"割増賃金","cat":"割増賃金の支払","q":"深夜業の割増賃金は、深夜の時間帯(原則として午後10時から午前5時まで)に労働させた場合に、その労働が時間外労働に該当するか否かにかかわらず支払わなければならない。","a":true,"exp":"〇。深夜割増(2割5分以上)は、午後10時〜午前5時の労働について、時間外労働に当たるか否かと独立に発生する(法37条4項)。所定労働時間内の深夜労働でも支払う。","page":146,"detail":"【論点：深夜割増は時間外と独立】深夜の時間帯は原則午後10時〜午前5時(厚労大臣が必要と認める場合は午後11時〜午前6時)。深夜割増は時間外・休日割増とは別個に発生し、所定労働時間内でも深夜に働けば深夜割増が必要。時間帯の数値と『独立して発生』の2点が論点。"},{"law":"割増賃金","cat":"割増賃金の支払","q":"就業規則で所定労働時間が1日7時間と定められている場合、7時間を超えて1時間労働させたときは、その1時間について割増賃金を支払わなければならない。","a":false,"exp":"×。法定労働時間(8時間)を超えていないため、その1時間について割増賃金の支払は不要である。所定を超えても法定内なら割増は不要である。","page":146,"detail":"本肢は誤り。p.146の割増賃金の支払を要する場合❷の具体例は「就業規則で所定労働時間が1日について7時間と定められている場合、7時間を超えて1時間余分に労働させたとしても、法定労働時間(8時間)を超えていないので、その1時間については割増賃金を支払う必要はありません」とする。所定を超えても法定内なら割増は不要であり、支払が必要とする本肢は妥当でない。"},{"law":"割増賃金","cat":"割増率","q":"時間外労働に対する割増賃金の率は、原則として通常の賃金の計算額の2割5分以上5割以下の範囲内で政令で定める率以上である。","a":true,"exp":"〇。時間外労働の割増率は原則2割5分以上である。1か月60時間を超えた時間外労働については5割以上の率となる。","page":148,"detail":"本肢は正しい。p.148の割増賃金の算定❶は、時間外労働について「通常の労働時間又は労働日の賃金の計算額の2割5分以上5割以下の範囲内でそれぞれ政令で定める率以上の率で計算した割増賃金を支払わなければなりません」とする。ただし1か月60時間を超えた時間外労働は5割以上となる。よって原則2割5分以上5割以下の範囲とする本肢は妥当である。"},{"law":"割増賃金","cat":"60時間超の割増","q":"1か月について延長して労働させた時間が60時間を超えた場合、その超えた時間の労働については通常の賃金の計算額の3割5分以上の率で計算した割増賃金を支払えば足りる。","a":false,"exp":"×。1か月60時間を超える時間外労働は5割以上の割増となる。3割5分以上は休日労働(深夜以外)の率である。","page":148,"detail":"本肢は誤り。p.148の割増賃金の算定❶は「当該延長して労働させた時間が1か月について60時間を超えた場合においては、その超えた時間の労働については、通常の労働時間の賃金の計算額の5割以上の率で計算した割増賃金を支払わなければなりません」とする。60時間超は5割以上であり、本肢の「3割5分以上」は休日労働(深夜以外)の率である。よって妥当でない。"},{"law":"割増賃金","cat":"深夜業の割増率","q":"深夜業に対する割増賃金の率は、通常の賃金の計算額の3割5分以上である。","a":false,"exp":"×。深夜業の割増率は2割5分以上である。3割5分以上は休日労働(深夜以外)の率である。","page":149,"detail":"本肢は誤り。p.149の割増賃金率の表では「深夜業」は「2割5分以上」とされる(法37条4項、則20条)。深夜業の割増率は2割5分以上であり、本肢の「3割5分以上」は休日労働(深夜以外)の率である。よって深夜業を3割5分以上とする本肢は妥当でない。"},{"law":"割増賃金","cat":"休日労働の割増率","q":"法定休日の労働(深夜以外)に対する割増賃金の率は、3割5分以上である。","a":true,"exp":"〇。休日労働(深夜以外)の割増率は3割5分以上である。休日労働かつ深夜労働の場合は6割以上となる。","page":149,"detail":"本肢は正しい。p.149の割増賃金率の表では「休日労働 深夜労働以外 3割5分以上」とされる(則20条等)。法定休日の労働(深夜以外)の割増率は3割5分以上である。なお休日労働かつ深夜労働の場合は6割以上となる。よって本肢は妥当である。"},{"law":"割増賃金","cat":"算定基礎から除外","q":"家族手当、通勤手当、別居手当、子女教育手当、住宅手当は、割増賃金の算定の基礎から除外される。","a":true,"exp":"〇。これらは労働者の個人的事情で支払われるため算定基礎から除外される。ただし家族数にかかわらず一律支給される家族手当等は算入される。","page":152,"detail":"本肢は正しい。p.152の割増賃金の算定の基礎から除外する賃金❶は「家族手当、通勤手当、別居手当、子女教育手当、住宅手当」を挙げ、参考で「労働者の個人的事情で支払われるものであることから除外されています」とする。ただし通達では家族数にかかわらず一律に支給される家族手当は除外されず算入される。よって本肢は妥当である。"},{"law":"割増賃金","cat":"算定基礎の住宅手当","q":"全員に一律で支給される住宅手当は、割増賃金の算定の基礎から除外される。","a":false,"exp":"×。全員一律又は住宅形態ごとに一律に支給される住宅手当は算定基礎に算入しなければならない。住宅費用に一定率を乗じた額を支給する場合は除外できる。","page":152,"detail":"本肢は誤り。p.152の住宅手当に関する通達は「全員に一律で支給される、又は住宅の形態ごとに一律に支給される住宅手当は、割増賃金の算定の基礎に算入しなければなりません」とする(平11.3.31基発170号)。住宅費用に一定率を乗じた額を支給する場合は除外できるが、一律支給は算入を要する。よって一律支給の住宅手当を除外するとする本肢は妥当でない。"},{"law":"割増賃金","cat":"代替休暇","q":"代替休暇は、1か月について60時間を超えた時間外労働に係る5割以上の割増賃金の支払に代えて、労使協定により通常の賃金が支払われる休暇を与えるものである。","a":true,"exp":"〇。法37条3項により、60時間超の時間外労働の5割割増賃金の支払に代えて代替休暇を与えることができる。なお2割5分の割増賃金の支払は必要である。","page":154,"detail":"本肢は正しい。p.154の代替休暇(法37条3項)は、1か月60時間を超えた時間外労働に係る「通常の労働時間の賃金の計算額の5割以上の率で計算した割増賃金」の支払に代えて、労使協定により「通常の労働時間の賃金が支払われる休暇」を与えるものとする。脚注では代替休暇を取得しても2割5分以上の割増賃金の支払は必要とされる。よって本肢は妥当である。"},{"law":"割増賃金","cat":"代替休暇の期間","q":"代替休暇を与えることができる期間は、時間外労働が1か月60時間を超えた当該1か月の末日の翌日から2か月以内とされている。","a":true,"exp":"〇。代替休暇を与えることができる期間は当該1か月の末日の翌日から2か月以内とされる(則19条の2)。単位は1日又は半日である。","page":154,"detail":"本肢は正しい。p.154の代替休暇に係る労使協定で協定すべき内容❸は「代替休暇を与えることができる期間」について「時間外労働が1か月について60時間を超えた当該1か月の末日の翌日から2か月以内とされています(則19条の2第1項)」とする。代替休暇の単位は1日又は半日である。よって当該1か月の末日の翌日から2か月以内とする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"適用除外","q":"林業の事業に従事する者は、労働時間・休憩・休日に関する規定の適用除外とされる。","a":false,"exp":"×。林業の事業に従事する者は適用除外ではない。農業・畜産業・養蚕業・水産業の事業に従事する者は適用除外である。","page":156,"detail":"本肢は誤り。p.156の労働時間等に関する規定の適用除外の注意書きは「林業の事業に従事する者は、適用除外ではありません」と明記する。適用除外となるのは「農業・畜産業・養蚕業・水産業の事業に従事する者」(法41条❶)であり、林業は含まれない。よって林業を適用除外とする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"適用除外","q":"監視又は断続的労働に従事する者を労働時間等の規定の適用除外とするには、使用者が行政官庁(所轄労働基準監督署長)の許可を受けなければならない。","a":true,"exp":"〇。監視又は断続的労働に従事する者は所轄労働基準監督署長の許可を受けた者が適用除外となる。管理監督者や機密の事務を取り扱う者は許可不要である。","page":156,"detail":"本肢は正しい。p.156の適用除外❹は「監視又は断続的労働に従事する者で、使用者が行政官庁(所轄労働基準監督署長)の許可を受けた者」を労働時間等の規定の適用除外とする(法41条)。使用者の恣意的判断を排除するため許可制とされている。一方、監督又は管理の地位にある者や機密の事務を取り扱う者は許可を要しない。よって本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"適用除外と深夜業","q":"管理監督者など労働時間等の規定の適用が除外される者については、深夜業に関する規定も適用されない。","a":false,"exp":"×。適用除外者でも深夜業・年次有給休暇・産前産後に関する規定などは適用される。管理監督者に深夜労働させた場合は割増賃金の支払が必要である。","page":156,"detail":"本肢は誤り。p.156の本文末尾は「これら労働時間等の規定が除外される者も深夜業・年次有給休暇・産前産後に関する規定などは適用されます」とする。p.147の通達でも、管理監督者等に深夜労働させた場合はそれに応じた割増賃金の支払が必要とされる。よって適用除外者に深夜業の規定も適用されないとする本肢は妥当でない。"},{"law":"労働時間・休憩・休日","cat":"高度プロフェッショナル制度","q":"高度プロフェッショナル制度の対象労働者については、労働時間、休憩、休日及び深夜の割増賃金に関する規定が適用されない。","a":true,"exp":"〇。高度プロフェッショナル制度では対象労働者について労働時間・休憩・休日・深夜の割増賃金に関する規定が適用されない(法41条の2)。","page":158,"detail":"本肢は正しい。p.158の高度プロフェッショナル制度(法41条の2)は、所定の決議・届出・対象労働者の同意等の要件を満たした場合「労働時間、休憩、休日及び深夜の割増賃金に関する規定は、対象労働者については適用しません」と規定する。よって労働時間・休憩・休日・深夜の割増賃金に関する規定が適用されないとする本肢は妥当である。"},{"law":"労働時間・休憩・休日","cat":"高度プロフェッショナル制度","q":"高度プロフェッショナル制度の対象労働者の賃金は、年収換算で1,000万円以上であることが必要である。","a":false,"exp":"×。年収換算で1,075万円以上が必要である。1,000万円ではない(法41条の2)。","page":159,"detail":"本肢は誤り。p.159の対象労働者の要件⑵は、賃金を1年間当たりに換算した額が「基準年間平均給与額の3倍の額を相当程度上回る水準として厚生労働省令で定める額(1,075万円)以上であること」とする。年収換算1,075万円以上が必要であり、本肢の「1,000万円以上」ではない。よって妥当でない。"},{"law":"年次有給休暇","cat":"付与要件","q":"使用者は、労働者が雇入れの日から起算して1年間継続勤務し、全労働日の8割以上出勤した場合に、はじめて年次有給休暇を与えなければならない。","a":false,"exp":"✕。最初の年休は、雇入れの日から起算して6か月間継続勤務し、全労働日の8割以上出勤した労働者に10労働日付与される(法39条1項)。1年間ではない。","page":166,"detail":"【論点：最初の付与は6か月】年休の発生要件は『6か月継続勤務＋全労働日の8割以上出勤』で10労働日。以後は1年ごとに加算。最初の付与時期を『1年』とする点が誤り。出勤率8割の数値自体は正しい。"},{"law":"年次有給休暇","cat":"出勤率","q":"出勤率の算定において、業務上負傷し療養のため休業した期間や、産前産後の女性が法65条により休業した期間は、出勤したものとみなされる。","a":true,"exp":"〇。業務上の傷病による休業、育児・介護休業、産前産後の休業の期間及び年休取得日は出勤したものとみなされる。子の看護休暇は含まれない。","page":167,"detail":"本肢は正しい。p.167の出勤日について本文は、出勤率の算定で「業務上負傷し、又は疾病にかかり療養のために休業した期間」「育児休業又は介護休業をした期間」「産前産後の女性が法65条の規定によって休業した期間」「年次有給休暇を取得した日」は出勤したものとみなされるとする(法39条10項)。注意書きで「子の看護休暇を取得した期間は、出勤したものとみなされません」とされる。よって本肢は妥当である。"},{"law":"年次有給休暇","cat":"付与日数","q":"使用者は、付与要件を満たした労働者に対して、継続し又は分割した12労働日の有給休暇を与えなければならない。","a":false,"exp":"×。最初の付与日数は10労働日である。12労働日ではない(法39条1項)。なお未成年訓練生の最低付与日数は12労働日である。","page":170,"detail":"本肢は誤り。p.170の年次有給休暇の付与日数❶は「使用者は、付与要件を満たした労働者に対して、継続し、又は分割した10労働日の有給休暇を与えなければなりません」とする(法39条1項)。最初の付与日数は10労働日であり、本肢の「12労働日」ではない。なお未成年訓練生(p.207)の最低付与日数は12労働日とされる。よって本肢は妥当でない。"},{"law":"年次有給休暇","cat":"比例付与","q":"比例付与の対象となるのは、1週間の所定労働時間が30時間未満であり、かつ週の所定労働日数が4日以下等の労働者である。","a":true,"exp":"〇。週所定労働時間30時間未満かつ週所定労働日数4日以下(又は年間216日以下)の労働者が比例付与の対象となる(法39条3項)。","page":172,"detail":"本肢は正しい。p.172の比例付与の対象となる労働者は「1週間の所定労働時間が30時間未満であり、かつ、次の❶又は❷のいずれかに該当する労働者」とし、❶「週の所定労働日数が4日以下の労働者」❷「1年間の所定労働日数が216日以下の労働者」とする(法39条3項)。よって週所定労働時間30時間未満かつ週所定労働日数4日以下等とする本肢は妥当である。"},{"law":"年次有給休暇","cat":"時間単位年休","q":"使用者は、労使協定により、年次有給休暇について10日の範囲内で時間を単位として与えることができる。","a":false,"exp":"×。時間単位の年次有給休暇は5日の範囲内で与えることができる。10日ではない(法39条4項)。","page":174,"detail":"本肢は誤り。p.174の時間単位の年次有給休暇の付与(法39条4項)は、労使協定で定めた場合「時間を単位として与えることができることとされる有給休暇の日数(5日以内に限ります)」について時間単位で与えることができるとする。時間単位の年休は5日の範囲内であり、本肢の「10日の範囲内」ではない。よって妥当でない。"},{"law":"年次有給休暇","cat":"時季変更権","q":"使用者は、労働者から請求された時季に有給休暇を与えることが事業の正常な運営を妨げる場合には、当該有給休暇を与えないことができる。","a":false,"exp":"✕。この場合に使用者ができるのは『他の時季に与える』こと(時季変更権)であって(法39条5項但書)、年休の付与自体を拒否・消滅させることはできない。","page":176,"detail":"【論点：時季変更権の効果】時季変更権は、請求された時季に与えると事業の正常な運営を妨げる場合に『他の時季に』変更して与える権限。年休を与えない(消滅させる)権限ではない。『与えないことができる』とする点が誤り。"},{"law":"年次有給休暇","cat":"年休の消滅時効","q":"年次有給休暇の請求権は、1年で消滅時効となる。","a":false,"exp":"×。年次有給休暇の請求権は2年で消滅時効となり、翌年に繰り越すことが認められる。1年ではない。","page":177,"detail":"本肢は誤り。p.177の年次有給休暇の請求❹は「年次有給休暇の請求権は、2年で消滅時効となります。つまり、翌年に繰り越すことは認められます」とする。消滅時効は2年であり、本肢の「1年」ではない。よって妥当でない。"},{"law":"年次有給休暇","cat":"計画的付与","q":"使用者は、労使協定により有給休暇を与える時季に関する定めをしたときは、有給休暇の日数のうち3日を超える部分について、その定めにより与えることができる。","a":false,"exp":"×。計画的付与は5日を超える部分について行うことができる。3日ではない(法39条6項)。5日分は個人の意思を尊重できるよう残される。","page":178,"detail":"本肢は誤り。p.178の計画的付与の要件(法39条6項)は「使用者は、労使協定により、有給休暇を与える時季に関する定めをしたときは、有給休暇の日数のうち5日を超える部分については、その定めにより与えることができます」とする。計画的付与は5日を超える部分について行うことができ、本肢の「3日を超える部分」ではない。5日分は個人の意思を尊重できるよう残される。よって妥当でない。"},{"law":"年次有給休暇","cat":"使用者の時季指定","q":"使用者は、付与日数が10労働日以上である労働者について、有給休暇の日数のうち5日については基準日から1年以内の期間に時季を定めて与えなければならない。","a":true,"exp":"〇。年5日の年次有給休暇の時季指定が使用者に義務づけられている(法39条7項)。労働者の時季指定や計画的付与で与えた日数分は時季指定を要しない。","page":179,"detail":"本肢は正しい。p.179の使用者による時季指定(法39条7項)は「使用者は、有給休暇(…日数が10労働日以上である労働者に係るものに限ります)の日数のうち5日については、基準日から1年以内の期間に、労働者ごとにその時季を定めることにより与えなければなりません」とする。労働者の時季指定や計画的付与で与えた日数分は時季指定を要しない(法39条8項)。よって本肢は妥当である。"},{"law":"年次有給休暇","cat":"年休中の賃金","q":"使用者が年次有給休暇中の賃金として標準報酬月額の30分の1に相当する金額を支払うには、労使協定の定めが必要である。","a":true,"exp":"〇。標準報酬月額の30分の1に相当する額により支払うには労使協定の定めが必要である(届出は不要)。平均賃金・通常の賃金との選択を都度任意に行うことはできない。","page":182,"detail":"本肢は正しい。p.182の有給休暇中の賃金(法39条9項)は支払方法の一つとして「健康保険法に規定する標準報酬月額の30分の1に相当する金額」を挙げ、脚注で「これにより支払うには、労使協定の定めが必要です(届出は不要)」とする。注意書きで「その都度、使用者が任意に定めたり、労働者が自由に選択したりすることは認められません」とされる。よって本肢は妥当である。"},{"law":"年次有給休暇","cat":"買上げ","q":"年次有給休暇の買上げの予約をし、これに基づいて年次有給休暇の日数を減じることは、法39条の違反となる。","a":true,"exp":"〇。年休の買上げの予約に基づき日数を減じ又は請求日数を与えないことは法39条違反となる。法定を超える日数の取扱いは当事者間で定められる。","page":183,"detail":"本肢は正しい。p.183の関連規定❷は「年次有給休暇の買上げの予約をし、これに基づいて年次有給休暇の日数を減じ、又は請求された日数を与えないことは、法39条の違反になります」とする(昭30.11.30基収4718号等)。ただし法定を超える日数の取扱いについては当事者間で定めることができる。よって買上げ予約に基づき日数を減じることが法39条違反となるとする本肢は妥当である。"},{"law":"年次有給休暇","cat":"年休管理簿","q":"使用者は、年次有給休暇管理簿を作成し、当該年休を与えた期間中及び当該期間の満了後5年間(当分の間、3年間)保存しなければならない。","a":true,"exp":"〇。年次有給休暇管理簿は当該期間中及び満了後5年間(当分の間3年間)保存しなければならない(則24条の7)。","page":183,"detail":"本肢は正しい。p.183の年次有給休暇管理簿(則24条の7、附則71条)は、使用者が時季・日数・基準日を労働者ごとに明らかにした書類を作成し「当該年次有給休暇を与えた期間中及び当該期間の満了後5年間(当分の間、3年間)保存しなければなりません」とする。よって本肢は妥当である。"},{"law":"年少者・妊産婦","cat":"年少者の定義","q":"労働基準法における「児童」とは、満18歳に満たない者をいい、原則として児童を労働者として使用することはできない。","a":false,"exp":"✕。満18歳に満たない者は『年少者』。『児童』は満15歳に達した日以後の最初の3月31日が終了するまでの者をいう(法56条等)。","page":186,"detail":"【論点：児童と年少者の区別】満18歳未満＝年少者(深夜業・危険有害業務等の保護)。児童＝満15歳到達後最初の3月31日まで(最低年齢の対象)。用語の取り違えを問う。最低年齢は『満15歳に達した日以後の最初の3月31日が終了するまで』使用不可。"},{"law":"年少者・妊産婦","cat":"最低年齢","q":"使用者は、児童が満16歳に達するまで、その児童を使用してはならない。","a":false,"exp":"×。原則として満15歳に達した日以後の最初の3月31日が終了するまで使用してはならない(法56条)。「満16歳に達するまで」ではない。","page":187,"detail":"本肢は誤り。p.187の児童の使用禁止(法56条)❶は「使用者は、児童が満15歳に達した日以後の最初の3月31日が終了するまで、その児童を使用してはなりません」とする。原則として満15歳に達した日以後の最初の3月31日が終了するまで使用が禁止されており、本肢の「満16歳に達するまで」ではない。よって妥当でない。"},{"law":"年少者・妊産婦","cat":"年少者の証明書","q":"使用者は、満18歳に満たない者については、その年齢を証明する戸籍証明書を事業場に備え付けなければならない。","a":true,"exp":"〇。法57条1項により年齢を証明する戸籍証明書を備え付ける。氏名・出生年月日について証明する住民票記載事項の証明書でも足りる。","page":188,"detail":"本肢は正しい。p.188の満18歳に満たない者に係る証明書(法57条1項)は「使用者は、満18歳に満たない者については、その年齢を証明する戸籍証明書を事業場に備え付けなければなりません」とする。通達では氏名及び出生年月日の事項について証明がなされている住民票記載事項の証明書を備えれば足りるとされる(平11.3.31基発168号)。よって本肢は妥当である。"},{"law":"年少者・妊産婦","cat":"未成年者の契約","q":"親権者又は後見人は、未成年者に代わって労働契約を締結することができる。","a":false,"exp":"×。親権者又は後見人は、未成年者に代わって労働契約を締結してはならない(法58条)。労働契約が未成年者に不利な場合は将来に向かって解除できる。","page":189,"detail":"本肢は誤り。p.189の未成年者の労働契約(法58条)❶は「親権者又は後見人は、未成年者に代わって労働契約を締結してはなりません」とする。また労働契約が未成年者に不利であると認める場合には親権者・後見人又は行政官庁が将来に向かって解除できる。親権者等が代わって締結できるとする本肢は妥当でない。"},{"law":"年少者・妊産婦","cat":"年少者の労働時間","q":"満18歳に満たない者(年少者)には、36協定による時間外労働・休日労働の規定や変形労働時間制の規定が適用されない。","a":true,"exp":"〇。年少者には36協定による時間外・休日労働、変形労働時間制、特例措置、高度プロフェッショナル制度の規定が適用されない(法60条)。","page":190,"detail":"本肢は正しい。p.190の年少者に係る労働時間等(法60条1項)は、年少者には「変形労働時間制」「労使協定(36協定)による時間外労働・休日労働」「労働時間及び休憩の特例措置(週44時間制等)」「特定高度専門業務・成果型労働制(高度プロフェッショナル制度)」の規定が適用されないとする。よってこれらが適用されないとする本肢は妥当である。"},{"law":"年少者・妊産婦","cat":"年少者の深夜業","q":"使用者は、満18歳に満たない者を、原則として午後11時から午前6時までの間において使用してはならない。","a":false,"exp":"✕。年少者の深夜業が原則禁止される時間帯は午後10時から午前5時まで(法61条1項)。午後11時〜午前6時は、厚生労働大臣が必要と認める場合に地域・期間を限って認められる特例の時間帯。","page":192,"detail":"【論点：年少者の深夜業の時間帯】原則は午後10時〜午前5時の使用禁止。例外として厚労大臣が必要と認める場合に午後11時〜午前6時とできる。原則と特例の時間帯を入れ替える点が誤り。交替制の満16歳以上男性は適用除外という別論点もセットで。"},{"law":"年少者・妊産婦","cat":"帰郷旅費","q":"満18歳に満たない者が解雇の日から14日以内に帰郷する場合には、使用者はその請求があった場合に限り、必要な旅費を負担しなければならない。","a":false,"exp":"×。帰郷旅費は請求の有無にかかわらず負担しなければならない(法64条)。なお年少者本人の責めに帰すべき事由により解雇され認定を受けたときは負担を要しない。","page":195,"detail":"本肢は誤り。p.195の帰郷旅費(法64条)は「満18歳に満たない者が解雇の日から14日以内に帰郷する場合においては、使用者は、必要な旅費を負担しなければなりません」とし、注意書きで「請求の有無にかかわらず負担しなければなりません」と明記する。本人の責めに帰すべき事由による解雇で認定を受けたときは負担を要しない。請求があった場合に限るとする本肢は妥当でない。"},{"law":"年少者・妊産婦","cat":"妊産婦の定義","q":"労働基準法における「妊産婦」とは、妊娠中の女性及び産後1年を経過しない女性をいう。","a":true,"exp":"〇。妊産婦は妊娠中の女性及び産後1年を経過しない女性をいう(法64条の3)。","page":197,"detail":"本肢は正しい。p.197の妊産婦等の危険有害業務の就業制限(法64条の3)は「妊娠中の女性及び産後1年を経過しない女性(『妊産婦』といいます)」と定義する。妊産婦は妊娠中の女性及び産後1年を経過しない女性をいう。よって本肢は妥当である。"},{"law":"年少者・妊産婦","cat":"産後の休業","q":"使用者は、産後6週間を経過しない女性を就業させてはならない。","a":false,"exp":"×。産後8週間を経過しない女性を就業させてはならない。6週間ではない。産後6週間経過後は本人の請求と医師の支障なしの認定により就業させられる(法65条2項)。","page":198,"detail":"本肢は誤り。p.198の産後の休業(法65条2項)の原則は「使用者は、産後8週間を経過しない女性を就業させてはなりません」とする。産後8週間であり本肢の「6週間」ではない。例外として「産後6週間を経過した女性が請求した場合において、その者について医師が支障がないと認めた業務に就かせることは差し支えありません」とされる。よって妥当でない。"},{"law":"年少者・妊産婦","cat":"軽易業務への転換","q":"使用者は、妊娠中の女性が請求した場合には、他の軽易な業務に転換させなければならないが、産婦は含まれない。","a":true,"exp":"〇。軽易業務転換の対象は妊娠中の女性であり、産婦は含まれない(法65条3項)。新たに軽易業務を創設して与える義務までは課されていない。","page":199,"detail":"本肢は正しい。p.199の軽易な業務への転換(法65条3項)は「使用者は、妊娠中の女性が請求した場合においては、他の軽易な業務に転換させなければなりません」とし、注意書きで「産婦は含まれません」と明記する。通達では新たに軽易な業務を創設して与える義務まで課したものではないとされる。よって対象が妊娠中の女性で産婦は含まれないとする本肢は妥当である。"},{"law":"年少者・妊産婦","cat":"妊産婦の時間外労働","q":"使用者は、妊産婦が請求した場合には、36協定の締結に基づく時間外労働や休日労働をさせてはならない。","a":true,"exp":"〇。妊産婦が請求した場合は時間外労働・休日労働をさせてはならない(法66条2項)。法41条の適用除外者にはこの制限は適用されない。","page":200,"detail":"本肢は正しい。p.200の時間外・休日労働の妊産婦への適用(法66条2項)は「使用者は、妊産婦が請求した場合においては…36条1項の労使協定の締結に基づく時間外労働・休日労働の規定にかかわらず、時間外労働をさせてはならず、又は休日に労働させてはなりません」とする。注意書きで「法41条の規定により労働時間等の規定の適用を除外される者には、この制限は適用されません」とされる。よって本肢は妥当である。"},{"law":"年少者・妊産婦","cat":"妊産婦の深夜業","q":"使用者は、妊産婦が請求した場合には深夜業をさせてはならないが、法41条の適用除外者にはこの制限は適用されない。","a":false,"exp":"×。法41条の適用除外者についても深夜業の規定は適用されるため、妊産婦の深夜業制限は適用される(法66条3項)。","page":200,"detail":"本肢は誤り。p.200の深夜業の妊産婦への適用(法66条3項)の注意書きは「法41条の規定により労働時間等の規定の適用を除外される者についても、深夜業の規定は適用されるので、この制限は適用されます」と明記する。深夜業の制限は適用除外者にも及ぶため、「適用除外者にはこの制限は適用されない」とする本肢は妥当でない。"},{"law":"年少者・妊産婦","cat":"育児時間","q":"生後満1年に達しない生児を育てる女性は、休憩時間のほか、1日2回各々少なくとも45分の育児時間を請求することができる。","a":false,"exp":"×。育児時間は1日2回各々少なくとも30分である。45分ではない(法67条)。1日の労働時間が4時間以内なら1日1回付与で足りる。","page":201,"detail":"本肢は誤り。p.201の育児時間(法67条)は「生後満1年に達しない生児を育てる女性は、法34条の休憩時間のほか、1日2回各々少なくとも30分、その生児を育てるための時間を請求することができます」とする。育児時間は1日2回各々少なくとも30分であり、本肢の「45分」ではない。通達では1日の労働時間が4時間以内なら1日1回付与で足りるとされる。よって妥当でない。"},{"law":"年少者・妊産婦","cat":"生理日の措置","q":"使用者は、生理日の就業が著しく困難な女性が休暇を請求した場合、その者を生理日に就業させてはならないが、当該休暇の日数は就業規則により1か月2日以内に制限することができる。","a":false,"exp":"✕。生理日の措置は、請求があれば必要な日数就業させてはならず、付与日数を就業規則等であらかじめ制限することはできない(法68条)。","page":202,"detail":"【論点：生理日休暇の日数】生理日の就業が著しく困難な女性の請求に対し就業させてはならない。請求できる日数に法律上の上限はなく『2日以内』等と制限することはできない。なお当該休暇を有給とするか無給とするかは当事者の定めによる。"},{"law":"その他","cat":"未成年訓練生の年休","q":"認定職業訓練を受ける未成年者(職業訓練の特例の適用を受ける者に限る)については、年次有給休暇の最低付与日数が12労働日とされる。","a":true,"exp":"〇。法72条により、未成年訓練生の年次有給休暇の最低付与日数は12労働日である。一般労働者(10労働日)より高い基準とされる。","page":207,"detail":"本肢は正しい。p.207の未成年訓練生の年次有給休暇(法72条)は「認定職業訓練を受ける未成年者(職業訓練に関する特例の適用を受ける者に限ります)については、年次有給休暇の最低付与日数が12労働日とされます」とする。本文の表でも継続勤務6か月で12日とされ、一般労働者の10労働日より高い基準である。よって最低付与日数を12労働日とする本肢は妥当である。"},{"law":"その他","cat":"休業補償","q":"労働者が療養のため労働できず賃金を受けない場合、使用者は労働者の療養中、平均賃金の100分の80の休業補償を行わなければならない。","a":false,"exp":"×。休業補償は平均賃金の100分の60である。100分の80ではない(法76条1項)。","page":211,"detail":"本肢は誤り。p.211の休業補償(法76条1項)は「労働者の療養中平均賃金の100分の60の休業補償を行わなければなりません」とする。休業補償は平均賃金の100分の60であり、本肢の「100分の80」ではない。よって妥当でない。"},{"law":"その他","cat":"打切補償","q":"療養補償を受ける労働者が療養開始後3年を経過しても傷病が治らない場合に、使用者が平均賃金1,200日分の打切補償を行えば、その後は補償を行う必要がない。","a":true,"exp":"〇。法81条により、療養開始後3年経過しても治らないとき平均賃金1,200日分の打切補償を行えば以後の補償は不要となり、解雇制限の規定も適用されなくなる。","page":212,"detail":"本肢は正しい。p.212の打切補償(法81条)は「療養補償を受ける労働者が療養開始後3年を経過しても負傷又は疾病が治らない」場合に「使用者が平均賃金1,200日分の支払(打切補償)を行う」と、その後は補償を行う必要がないとする。脚注では打切補償を支払うと解雇制限の規定が適用されなくなるとされる。よって平均賃金1,200日分の打切補償により以後の補償が不要となるとする本肢は妥当である。"},{"law":"その他","cat":"葬祭料","q":"労働者が業務上死亡した場合、使用者は葬祭を行う者に対して平均賃金の90日分の葬祭料を支払わなければならない。","a":false,"exp":"×。葬祭料は平均賃金の60日分である。90日分ではない(法80条)。","page":212,"detail":"本肢は誤り。p.212の葬祭料(法80条)は「労働者が業務上死亡した場合においては、使用者は、葬祭を行う者に対して、平均賃金の60日分の葬祭料を支払わなければなりません」とする。葬祭料は平均賃金の60日分であり、本肢の「90日分」ではない。よって妥当でない。"},{"law":"就業規則","cat":"作成義務","q":"常時10人以上の労働者を使用する使用者は、就業規則を作成して労働者に周知すれば足り、行政官庁への届出までは義務づけられていない。","a":false,"exp":"✕。常時10人以上を使用する使用者は、就業規則を作成し、かつ行政官庁(所轄労働基準監督署長)に届け出なければならない(法89条)。周知(法106条)とは別に届出義務がある。","page":216,"detail":"【論点：就業規則の作成・届出義務】常時10人以上で①作成②届出の双方が義務(法89条)。変更時も同様に届出が必要。これとは別に労働者への周知義務(法106条)もある。『周知すれば届出不要』は誤り。"},{"law":"就業規則","cat":"作成規模","q":"就業規則の作成義務の判断における「常時10人以上」は、企業単位で判断する。","a":false,"exp":"×。常時10人以上は企業単位ではなく事業場単位で判断する。一時的に10人未満になっても10人以上を使用することが常態であれば該当する。","page":216,"detail":"本肢は誤り。p.216の作成規模について本文❶は「常時10人以上とは、企業単位ではなく、事業場単位で判断します」とする。また❷で「一時的に10人未満になっても、10人以上を使用することが常態であること」をいうとされる。判断単位は事業場であり企業単位ではないため、本肢は妥当でない。"},{"law":"就業規則","cat":"作成手続","q":"使用者は、就業規則の作成又は変更について、過半数労働組合又は過半数代表者の同意を得なければならない。","a":false,"exp":"×。就業規則の作成・変更については意見を聴かなければならないが、同意を得る必要はない(法90条)。反対意見でも届出は受理される。","page":222,"detail":"本肢は誤り。p.222の就業規則の作成手続(法90条)は、過半数労働組合又は過半数代表者の「意見を聴かなければなりません」とし、脚注で「『意見を聴く』とは、労働者の団体的意見を求めるということなので、同意を得るとか協議をするとかということまで要求しているものではありません」とする。通達では反対意見でも他の要件を具備する限り効力に影響しないとされる。よって同意を要するとする本肢は妥当でない。"},{"law":"就業規則","cat":"減給の制裁","q":"就業規則で減給の制裁を定める場合、その減給は総額が一賃金支払期における賃金の総額の10分の2を超えてはならない。","a":false,"exp":"×。総額は一賃金支払期の賃金総額の10分の1を超えてはならない。10分の2ではない。1回の額は平均賃金1日分の半額までである(法91条)。","page":224,"detail":"本肢は誤り。p.224の減給の制裁(法91条)は「その減給は、1回の額が平均賃金の1日分の半額を超え、総額が一賃金支払期における賃金の総額の10分の1を超えてはなりません」とする。総額の限度は一賃金支払期の賃金総額の10分の1であり、本肢の「10分の2」ではない。1回の額は平均賃金1日分の半額までである。よって妥当でない。"},{"law":"就業規則","cat":"減給の制裁","q":"出勤停止によりその間の賃金を受けられないことは、減給の制裁に該当する。","a":false,"exp":"×。出勤停止による不就労期間の賃金を受けられないことは減給の制裁ではない。懲戒処分による昇給停止も減給の制裁ではない。","page":225,"detail":"本肢は誤り。p.225の減給の制裁の種類❶は「出勤停止によりその間の賃金を受けられないことは、減給の制裁ではありません」とする。また❷で懲戒処分による昇給停止も減給の制裁ではないとされる。出勤停止による不就労期間の賃金不受領は減給の制裁に該当しないため、該当するとする本肢は妥当でない。"},{"law":"就業規則","cat":"効力の優先順位","q":"労働条件の効力の優先順位は、法令、労働協約、就業規則、労働契約の順である。","a":true,"exp":"〇。効力の優先順位は法令>労働協約>就業規則>労働契約である。就業規則は法令・労働協約に反してはならない(法92条)。","page":226,"detail":"本肢は正しい。p.226の効力の優先順位は「法令 > 労働協約 > 就業規則 > 労働契約」とされる。本文では「就業規則は、法令又は当該事業場について適用される労働協約に反してはなりません(法92条1項)」とされる。よって法令・労働協約・就業規則・労働契約の順とする本肢は妥当である。"},{"law":"その他","cat":"寄宿舎生活の自治","q":"使用者は、事業の附属寄宿舎に寄宿する労働者の私生活の自由を侵してはならず、寮長・室長その他寄宿舎生活の自治に必要な役員の選任に干渉してはならない。","a":true,"exp":"〇。法94条により寄宿舎生活の自治が保障される。外出・外泊につき使用者の承認を受けさせること等は私生活の自由を侵す行為に当たる。","page":230,"detail":"本肢は正しい。p.230の寄宿舎生活の自治(法94条)は「使用者は、事業の附属寄宿舎に寄宿する労働者の私生活の自由を侵してはなりません」とし、「使用者は、寮長、室長その他寄宿舎生活の自治に必要な役員の選任に干渉してはなりません」とする。本文では外出・外泊につき使用者の承認を受けさせること等は私生活の自由を侵す行為に当たるとされる。よって本肢は妥当である。"},{"law":"その他","cat":"寄宿舎規則の同意","q":"使用者は、寄宿舎規則の作成又は変更について、寄宿する労働者の過半数を代表する者の意見を聴けば足り、同意を得る必要はない。","a":false,"exp":"×。寄宿舎規則の起床・就寝等一定事項の作成・変更については過半数代表者の同意を得なければならない(法95条)。意見を聴くだけでは足りない。","page":231,"detail":"本肢は誤り。p.231の寄宿舎規則作成時の同意(法95条2項・3項)は、起床・就寝・外出及び外泊に関する事項等一定事項の作成又は変更について「寄宿舎に寄宿する労働者の過半数を代表する者の同意を得なければなりません」とし、注意書きで「意見を聴くだけでは足りません。同意が必要になります」と明記する。よって意見聴取で足り同意は不要とする本肢は妥当でない。"},{"law":"その他","cat":"申告","q":"労働者が労働基準法違反の事実を行政官庁又は労働基準監督官に申告したことを理由として、使用者がその労働者を解雇その他不利益に取り扱うことは、申告内容の真偽を問わず禁止される。","a":true,"exp":"〇。法104条2項は、監督機関への申告を理由とする解雇その他不利益取扱いを禁止する。申告したこと自体を理由とする不利益取扱いは、結果として申告内容が事実でなかったとしても許されない。","page":237,"detail":"【論点：申告を理由とする不利益取扱いの禁止】労働者は労基法違反の事実を行政官庁・労働基準監督官に申告できる(法104条1項)。これを理由とする解雇等の不利益取扱いは禁止(同2項)。『申告したことを理由とする』点が要件で、申告内容の真偽で例外が認められるわけではない。"},{"law":"その他","cat":"賃金台帳","q":"賃金台帳は、日日雇い入れられる者を除き、すべての労働者について調製しなければならない。","a":false,"exp":"×。賃金台帳は日日雇い入れられる者を含めてすべての労働者について調製しなければならない。労働者名簿は日日雇い入れられる者を除く。","page":238,"detail":"本肢は誤り。p.238の賃金台帳(法108条)の注意書きは「日日雇い入れられる者を含めて、すべての労働者について調製しなければなりません」とする。賃金台帳は日日雇い入れられる者も含めて調製を要する。これに対し労働者名簿(法107条)は日日雇い入れられる者を除く。本肢は賃金台帳から日日雇い入れられる者を除くとしており妥当でない。"},{"law":"その他","cat":"記録の保存","q":"使用者は、労働者名簿、賃金台帳及び労働関係に関する重要な書類を5年間(当分の間、3年間)保存しなければならない。","a":true,"exp":"〇。法109条により5年間(当分の間3年間)保存しなければならない。出勤簿やタイムカード等も3年間保存する。","page":240,"detail":"本肢は正しい。p.240の記録の保存(法109条、附則143条1項)は「使用者は、労働者名簿、賃金台帳及び雇入れ、解雇、災害補償、賃金その他労働関係に関する重要な書類を5年間(当分の間、3年間)保存しなければなりません」とする。本文では出勤簿やタイムカード等の労働時間の記録に関する書類も3年間保存しなければならないとされる。よって本肢は妥当である。"},{"law":"その他","cat":"付加金","q":"裁判所は、解雇予告手当・休業手当・割増賃金の規定違反等の使用者に対し、労働者の請求により、未払金のほかこれと同一額の付加金の支払を命ずることができる。","a":true,"exp":"〇。法114条により付加金の支払を命ずることができる。この請求は違反のあったときから5年以内(当分の間3年以内)にしなければならない。","page":242,"detail":"本肢は正しい。p.242の付加金の支払(法114条)は「裁判所は、…使用者に対して、労働者の請求により…未払金のほか、これと同一額の付加金の支払を命ずることができます」とし、対象は解雇予告手当・休業手当・割増賃金の規定違反及び年次有給休暇中の賃金不払である。「この請求は、違反のあったときから5年以内(当分の間、3年以内)にしなければなりません」とされる。よって本肢は妥当である。"},{"law":"その他","cat":"時効","q":"労働基準法の規定による災害補償その他の請求権(賃金の請求権を除く)は、これを行使することができる時から5年間行わない場合に時効によって消滅する。","a":false,"exp":"×。災害補償その他の請求権は2年間である。5年ではない。賃金請求権は当分の間3年、退職手当は5年である(法115条)。","page":243,"detail":"本肢は誤り。p.243の時効(法115条)は「災害補償その他の請求権(賃金の請求権を除きます)を行使することができる時から2年間行わない場合においては、時効によって消滅します」とする。災害補償その他の請求権は2年間であり、本肢の「5年間」ではない。なお賃金請求権は当分の間3年、退職手当は5年である。よって妥当でない。"},{"law":"その他","cat":"両罰規定","q":"労働基準法の違反行為をした者が事業主のために行為した代理人・使用人等である場合には、行為者のみが罰せられ、事業主は罰せられない。","a":false,"exp":"×。両罰規定により、行為者だけでなく事業主に対しても各罰金刑を科す(法121条)。ただし事業主が違反防止に必要な措置をした場合等を除く。","page":245,"detail":"本肢は誤り。p.245の両罰規定(法121条)は「労働基準法の違反行為をした者が…事業主のために行為した代理人、使用人その他の従業者である場合においては、事業主に対しても各罰金刑を科します(行為者と事業主の両方を罰します)」とする。ただし事業主が違反の防止に必要な措置をした場合等は除かれる。行為者のみが罰せられるとする本肢は妥当でない。"}],"ranzen":[{"law":"総則・目的","cat":"目的","q":"労働安全衛生法は、労働基準法と相まって、労働災害の防止のための危害防止基準の確立、責任体制の明確化、自主的活動の促進の措置を講ずる等その防止に関する総合的計画的な対策を推進することにより、職場における労働者の安全と健康を確保するとともに、快適な職場環境の形成を促進することを目的としている。","a":true,"exp":"〇。法1条のとおり。職場における労働者の安全と健康を確保するとともに、快適な職場環境の形成を促進することを目的とする。","page":13,"detail":"〇。法1条のとおりで正しい。テキストp.13は、労働安全衛生法は労働基準法と相まって、危害防止基準の確立・責任体制の明確化・自主的活動の促進の措置を講ずる等その防止に関する総合的計画的な対策を推進することにより、❶職場における労働者の安全と健康を確保するとともに、❷快適な職場環境の形成を促進することを目的とする、と整理している。設問は本文の目的規定をそのまま述べている。根拠は法1条。"},{"law":"総則・目的","cat":"労働災害の定義","q":"「労働災害」とは、労働者の就業に係る建設物、設備、原材料、ガス、蒸気、粉じん等により、又は作業行動その他業務に起因して、労働者が負傷し、疾病にかかり、又は死亡することをいう。","a":true,"exp":"〇。法2条1号のとおり。労働者が就業に係る各要因や業務に起因して負傷・疾病・死亡することをいう。","page":13,"detail":"〇。法2条1号のとおりで正しい。テキストp.13は、労働災害とは労働者の就業に係る建設物、設備、原材料、ガス、蒸気、粉じん等により、又は作業行動その他業務に起因して、労働者が負傷し、疾病にかかり、又は死亡することをいう、と定義している。設問の文言は本文の定義と一致する。根拠は法2条1号。"},{"law":"総則・目的","cat":"労働者の定義","q":"労働安全衛生法上の「労働者」には、同居の親族のみを使用する事業に使用される者及び家事使用人も含まれる。","a":false,"exp":"×。法2条2号。労働基準法に規定する労働者をいうが、同居の親族のみを使用する事業又は事務所に使用される者及び家事使用人は除かれる。","page":13,"detail":"×。法2条2号により誤り。テキストp.13は、労働者とは労働基準法に規定する労働者をいうとしつつ、同居の親族のみを使用する事業又は事務所に使用される者及び家事使用人を「除く」としている。設問はこれらを「含む」としており逆である。根拠は法2条2号。"},{"law":"総則・目的","cat":"事業者の定義","q":"「事業者」とは、事業を行う者で、労働者を使用するものをいい、法人企業であれば当該法人の代表者を指す。","a":false,"exp":"×。法2条3号、通達。事業者とは法人企業であれば当該法人をいい、法人の代表者ではない。","page":14,"detail":"×。法2条3号及び昭47.9.18発基91号により誤り。テキストp.14は、事業者とは事業を行う者で労働者を使用するものをいい、法人企業であれば当該法人(法人の代表者ではありません)を指すと明記している。設問は法人の代表者を指すとしており誤り。事業経営の利益の帰属主体を義務主体とした点が労基法の使用者と異なる。根拠は法2条3号、通達。"},{"law":"総則・目的","cat":"化学物質の定義","q":"労働安全衛生法上の「化学物質」とは、元素及び化合物をいう。","a":true,"exp":"〇。法2条3号の2のとおり。化学物質とは元素及び化合物をいう。","page":14,"detail":"〇。法2条3号の2のとおりで正しい。テキストp.14は、化学物質とは元素及び化合物をいう、と簡潔に定義している。設問はこの定義どおりである。根拠は法2条3号の2。"},{"law":"総則・目的","cat":"労働者等の責務","q":"労働者は、労働災害を防止するため必要な事項を守るほか、事業者その他の関係者が実施する労働災害の防止に関する措置に協力するように努めなければならない。","a":true,"exp":"〇。法4条のとおり。労働者等は必要な事項を守るほか、労働災害防止措置に協力するよう努めなければならない。","page":17,"detail":"〇。法4条のとおりで正しい。テキストp.17は、労働者及び労働者以外の者で労働者と同一の場所において仕事の作業に従事するものは、労働災害を防止するため必要な事項を守るほか、事業者その他の関係者が実施する労働災害の防止に関する措置に協力するように努めなければならない、としている。設問は本文どおりである。根拠は法4条。"},{"law":"総則・目的","cat":"共同企業体の代表者の届出","q":"2以上の建設業に属する事業の事業者が、一の場所において行われる仕事を共同連帯して請け負った場合、そのうちの1人を代表者として定め、仕事の開始の日の<b>14日前</b>までに、都道府県労働局長に届け出なければならない。","a":true,"exp":"〇。法5条1項、則1条2項のとおり。代表者を定めて仕事開始日の14日前までに都道府県労働局長に届け出る。","page":18,"detail":"〇。法5条1項及び則1条2項のとおりで正しい。テキストp.18は、2以上の建設業に属する事業の事業者が一の場所で行う仕事を共同連帯して請け負った場合、そのうち1人を代表者として定め、仕事の開始の日の14日前までに、当該仕事が行われる場所を管轄する都道府県労働局長に届け出なければならないとしている。設問の14日前・都道府県労働局長は本文と一致する。なお届書は所轄労働基準監督署長を経由する。根拠は法5条1項、則1条2項。"},{"law":"総則・目的","cat":"共同企業体の代表者の変更","q":"共同企業体の代表者の変更は、都道府県労働局長に届け出なくても、その効力を生じる。","a":false,"exp":"×。法5条3項。共同企業体の代表者の変更は、都道府県労働局長に届け出なければその効力を生じない。","page":19,"detail":"×。法5条3項により誤り。テキストp.19は、共同企業体の代表者の変更は、都道府県労働局長に届け出なければ、その効力を生じないと明記している。設問は届け出なくても効力を生じるとしており逆である。変更があった後遅滞なく届書を提出する。根拠は法5条3項。"},{"law":"その他(計画届・監督・罰則)","cat":"労働災害防止計画の公表","q":"厚生労働大臣は、労働災害防止計画を策定したとき、又は変更したときは、遅滞なく、これを公表しなければならない。","a":true,"exp":"〇。法8条のとおり。策定又は変更したときは遅滞なく公表しなければならない。","page":22,"detail":"〇。法8条のとおりで正しい。テキストp.22は、厚生労働大臣は労働災害防止計画を策定したとき、又は変更したときは、遅滞なく、これを公表しなければならないとしている。設問は本文どおりである。なお策定・変更は労働政策審議会の意見をきいて行う。根拠は法8条。"},{"law":"安全衛生管理体制","cat":"総括安全衛生管理者の選任規模","q":"林業、鉱業、建設業、運送業、清掃業においては、常時<b>100人以上</b>の労働者を使用する事業場ごとに総括安全衛生管理者を選任しなければならない。","a":true,"exp":"〇。法10条1項、令2条のとおり。林業・鉱業・建設業・運送業・清掃業は常時100人以上で選任義務が生じる。","page":27,"detail":"〇。令2条のとおりで正しい。テキストp.27の表は、林業、鉱業、建設業、運送業、清掃業については常時100人以上で総括安全衛生管理者の選任義務が生じるとしている。設問の業種・規模はこの区分と一致する。なお製造業等は300人以上、その他の業種は1,000人以上である。根拠は法10条1項、令2条。"},{"law":"安全衛生管理体制","cat":"総括安全衛生管理者の選任規模","q":"製造業においては、常時<b>500人以上</b>の労働者を使用する事業場ごとに総括安全衛生管理者を選任しなければならない。","a":false,"exp":"×。令2条。製造業は常時300人以上で総括安全衛生管理者の選任義務が生じる。500人以上ではない。","page":27,"detail":"×。令2条により誤り。テキストp.27の表は、製造業(物の加工業を含む)は常時300人以上で総括安全衛生管理者の選任義務が生じるとしている。設問は500人以上としており誤り。100人以上は林業・鉱業・建設業等、1,000人以上はその他の業種である。根拠は法10条1項、令2条。"},{"law":"安全衛生管理体制","cat":"総括安全衛生管理者の選任規模","q":"その他の業種(屋内産業・非工業的業種)においては、常時<b>1,000人以上</b>の労働者を使用する事業場ごとに総括安全衛生管理者を選任しなければならない。","a":true,"exp":"〇。令2条のとおり。その他の業種は常時1,000人以上で選任義務が生じる。","page":27,"detail":"〇。令2条のとおりで正しい。テキストp.27の表は、その他の業種(屋内産業・非工業的業種)については常時1,000人以上で総括安全衛生管理者の選任義務が生じるとしている。設問はこの区分どおりである。根拠は法10条1項、令2条。"},{"law":"安全衛生管理体制","cat":"常時使用労働者の意義","q":"「常時……人以上の労働者を使用する」とは、日雇労働者やパートタイマー等の数を含めず、いわゆる常用労働者の数のみで判断する。","a":false,"exp":"×。昭47.9.18基発602号。日雇労働者、パートタイマー等の数を含めて常態として使用する労働者の数で判断し、常用労働者の数のみで判断するものではない。","page":27,"detail":"×。昭47.9.18基発602号により誤り。テキストp.27の通達は、常時……人以上の労働者を使用するとは、日雇労働者、パートタイマー等の数を含めて常態として使用する労働者の数が当該数以上であることをいい、いわゆる常用労働者の数のみで判断するものではないとしている。設問は日雇・パート等を含めないとしており逆である。根拠は昭47.9.18基発602号。"},{"law":"安全衛生管理体制","cat":"総括安全衛生管理者の選任手続","q":"事業者は、選任すべき事由が発生した日から<b>30日以内</b>に総括安全衛生管理者を選任しなければならない。","a":false,"exp":"×。則2条。総括安全衛生管理者は選任すべき事由発生日から14日以内に選任しなければならない。30日以内ではない。","page":29,"detail":"×。則2条により誤り。テキストp.29は、事業者は選任すべき事由が発生した日から14日以内に総括安全衛生管理者を選任しなければならず、選任したときは遅滞なく所轄労働基準監督署長に報告しなければならないとしている。設問は30日以内としており誤り。正しくは14日以内である。根拠は則2条。"},{"law":"安全衛生管理体制","cat":"総括安全衛生管理者の行政措置","q":"労働基準監督署長は、労働災害を防止するため必要があると認めるときは、総括安全衛生管理者の業務の執行について事業者に勧告することができる。","a":false,"exp":"×。法10条3項。総括安全衛生管理者の業務執行について事業者に勧告できるのは都道府県労働局長である。労働基準監督署長ではない。","page":29,"detail":"×。法10条3項により誤り。テキストp.29は、総括安全衛生管理者の業務の執行について事業者に勧告することができるのは「都道府県労働局長」であるとしている。設問は労働基準監督署長としており誤り。労働災害の発生率が高く、不適切な業務執行に基づくと考えられる場合等に勧告できる。根拠は法10条3項。"},{"law":"安全衛生管理体制","cat":"安全管理者の選任規模","q":"林業、鉱業、建設業、運送業、清掃業及び製造業等の一定業種においては、常時<b>100人以上</b>の労働者を使用する事業場ごとに安全管理者を選任しなければならない。","a":false,"exp":"×。令3条。安全管理者を選任すべき業種では常時50人以上で選任義務が生じる。100人以上ではない。","page":30,"detail":"×。令3条により誤り。テキストp.30の表は、安全管理者を選任すべき業種では常時50人以上で選任義務が生じるとしている。設問は100人以上としており誤り。安全管理者の選任規模は50人以上である。根拠は法11条1項、令3条。"},{"law":"安全衛生管理体制","cat":"安全管理者の専属","q":"安全管理者は、その事業場に専属の者を選任しなければならないが、2人以上選任する場合に労働安全コンサルタントがいるときは、当該コンサルタントのうち1人については専属である必要はない。","a":true,"exp":"〇。則4条1項2号のとおり。2人以上選任する場合の労働安全コンサルタント1人は専属でなくてよく、外部委託とすることができる。","page":31,"detail":"〇。則4条1項2号のとおりで正しい。テキストp.31は、安全管理者は専属の者を選任しなければならないが、2人以上選任する場合に労働安全コンサルタントがいるときは、当該労働安全コンサルタントのうち1人については専属である必要はない(1人を外部委託にできる)としている。設問は本文どおりである。根拠は則4条1項2号。"},{"law":"安全衛生管理体制","cat":"安全管理者の専任","q":"建設業、有機化学工業製品製造業、石油製品製造業においては、常時<b>500人以上</b>の労働者を使用する事業場で、安全管理者のうち少なくとも1人を専任の安全管理者としなければならない。","a":false,"exp":"×。則4条1項4号。建設業等は常時300人以上で専任の安全管理者が必要となる。500人以上ではない。","page":32,"detail":"×。則4条1項4号により誤り。テキストp.32の表は、建設業、有機化学工業製品製造業、石油製品製造業については常時300人以上で専任の安全管理者が必要となるとしている。設問は500人以上としており誤り。500人以上は無機化学工業製品製造業・化学肥料製造業等である。根拠は則4条1項4号。"},{"law":"安全衛生管理体制","cat":"専属と専任","q":"「専属の者」とは通常の勤務時間を専ら当該業務を行うために費やす者をいい、「専任の者」とはその事業場のみに勤務する者をいう。","a":false,"exp":"×。専属の者はその事業場のみに勤務する者をいい、専任の者は通常の勤務時間を専ら当該業務に費やす者をいう。定義が逆である。","page":31,"detail":"×。テキストp.31の定義により誤り。本文は、専属の者とは「その事業場のみに勤務する者」、専任の者とは「通常の勤務時間を専ら当該業務を行うために費やす者」と定義している。設問は両者の定義を入れ替えており逆である。根拠はp.31の専属と専任の定義。"},{"law":"安全衛生管理体制","cat":"安全管理者の行政措置","q":"労働基準監督署長は、労働災害を防止するため必要があると認めるときは、事業者に対し、安全管理者の増員又は解任を命ずることができる。","a":true,"exp":"〇。法11条2項のとおり。労働基準監督署長は事業者に対し安全管理者の増員又は解任を命ずることができる。","page":33,"detail":"〇。法11条2項のとおりで正しい。テキストp.33は、労働基準監督署長は、労働災害を防止するため必要があると認めるときは、事業者に対し、安全管理者の増員又は解任を命ずることができるとしている。設問は本文どおりである。総括安全衛生管理者の勧告が都道府県労働局長である点と区別する。根拠は法11条2項。"},{"law":"安全衛生管理体制","cat":"衛生管理者の選任規模","q":"衛生管理者は、業種を問わず、常時<b>100人以上</b>の労働者を使用する事業場ごとに選任しなければならない。","a":false,"exp":"×。令4条。衛生管理者は業種を問わず常時50人以上で選任義務が生じる。100人以上ではない。","page":34,"detail":"×。令4条により誤り。テキストp.34は、衛生管理者の選任規模は業種を問わず常時50人以上の労働者を使用する事業場であるとしている。設問は100人以上としており誤り。正しくは50人以上である。根拠は法12条1項、令4条。"},{"law":"安全衛生管理体制","cat":"衛生管理者の選任人数","q":"常時3,000人を超える労働者を使用する事業場では、衛生管理者を<b>4人以上</b>選任しなければならない。","a":false,"exp":"×。則7条1項4号。3,000人を超える事業場では衛生管理者を6人以上選任しなければならない。4人以上ではない。","page":34,"detail":"×。則7条1項4号により誤り。テキストp.34の選任人数の表は、常時3,000人を超える事業場では衛生管理者を6人以上選任しなければならないとしている。設問は4人以上としており誤り。4人以上は1,000人を超え2,000人以下の事業場である。根拠は則7条1項4号。"},{"law":"安全衛生管理体制","cat":"衛生管理者の専任","q":"常時1,000人を超える労働者を使用する事業場では、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。","a":true,"exp":"〇。則7条1項5号のとおり。常時1,000人超の事業場では衛生管理者のうち少なくとも1人を専任とする。","page":35,"detail":"〇。則7条1項5号のとおりで正しい。テキストp.35は、常時1,000人を超える労働者を使用する事業場では、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならないとしている。設問は本文どおりである。根拠は則7条1項5号。"},{"law":"安全衛生管理体制","cat":"衛生管理者の専任","q":"常時500人を超える労働者を使用する事業場で、坑内労働や健康上特に有害な業務に常時<b>50人以上</b>の労働者を従事させるものでは、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。","a":false,"exp":"×。則7条1項5号。500人超で坑内労働や健康上特に有害な業務に常時30人以上従事させる場合に専任が必要となる。50人以上ではない。","page":35,"detail":"×。則7条1項5号により誤り。テキストp.35は、常時500人を超える事業場で坑内労働や健康上特に有害な業務に常時「30人以上」の労働者を従事させるものについて専任の衛生管理者が必要としている。設問は50人以上としており誤り。正しくは30人以上である。根拠は則7条1項5号。"},{"law":"安全衛生管理体制","cat":"衛生管理者の巡視","q":"衛生管理者は、少なくとも<b>毎週1回</b>作業場等を巡視し、有害のおそれのあるときは、直ちに労働者の健康障害を防止するため必要な措置を講じなければならない。","a":true,"exp":"〇。則11条のとおり。衛生管理者は少なくとも毎週1回作業場等を巡視しなければならない。","page":36,"detail":"〇。則11条のとおりで正しい。テキストp.36は、衛生管理者は少なくとも毎週1回作業場等を巡視し、設備、作業方法又は衛生状態に有害のおそれのあるときは、直ちに労働者の健康障害を防止するため必要な措置を講じなければならないとしている。設問は本文どおりである。根拠は法12条1項、則11条。"},{"law":"安全衛生管理体制","cat":"安全衛生推進者等の選任","q":"安全衛生推進者は、安全管理者を選任すべき業種であって、常時<b>10人以上50人未満</b>の労働者を使用する事業場で選任しなければならない。","a":true,"exp":"〇。法12条の2、則12条の2のとおり。安全衛生推進者は安全管理者選任業種で常時10人以上50人未満の事業場で選任する。","page":38,"detail":"〇。法12条の2及び則12条の2のとおりで正しい。テキストp.38は、安全衛生推進者は安全管理者を選任すべき業種であって常時10人以上50人未満の労働者を使用する事業場で選任しなければならないとしている。設問は本文どおりである。安全管理者選任業種以外は衛生推進者を選任する。根拠は法12条の2、則12条の2。"},{"law":"安全衛生管理体制","cat":"安全衛生推進者等の選任手続","q":"事業者は、選任すべき事由が発生した日から14日以内に安全衛生推進者又は衛生推進者を選任しなければならず、所轄労働基準監督署長への報告義務もある。","a":false,"exp":"×。則12条の3、注意。14日以内の選任は正しいが、安全衛生推進者等については所轄労働基準監督署長への報告義務はない。","page":39,"detail":"×。則12条の3及びp.39注意により誤り。テキストp.39は、安全衛生推進者又は衛生推進者は選任すべき事由が発生した日から14日以内に選任しなければならないとしつつ、注意として所轄労働基準監督署長への報告義務はないと明記している。設問は報告義務があるとしており誤り。根拠は則12条の3、p.39注意。"},{"law":"安全衛生管理体制","cat":"産業医の選任規模","q":"事業者は、業種を問わず、常時<b>100人以上</b>の労働者を使用する事業場ごとに、医師のうちから産業医を選任しなければならない。","a":false,"exp":"×。令5条。産業医は業種を問わず常時50人以上で選任義務が生じる。100人以上ではない。","page":40,"detail":"×。令5条により誤り。テキストp.40は、産業医の選任規模は業種を問わず常時50人以上の労働者を使用する事業場であるとしている。設問は100人以上としており誤り。正しくは50人以上である。根拠は法13条1項、令5条。"},{"law":"安全衛生管理体制","cat":"産業医の選任人数","q":"常時<b>1,000人を超える</b>労働者を使用する事業場では、産業医を2人以上選任しなければならない。","a":false,"exp":"×。則13条1項4号。産業医を2人以上選任しなければならないのは常時3,000人を超える事業場である。1,000人を超える事業場ではない。","page":40,"detail":"×。則13条1項4号により誤り。テキストp.40の選任人数の表は、産業医を2人以上選任しなければならないのは常時3,000人を超える事業場であるとしている。設問は1,000人を超える事業場としており誤り。1,000人以上は専属が必要となる規模である。根拠は則13条1項4号。"},{"law":"安全衛生管理体制","cat":"産業医の専属","q":"常時<b>500人以上</b>の労働者を使用する事業場においては、産業医はその事業場に専属の者を選任しなければならない。","a":false,"exp":"×。則13条1項3号。専属の産業医が必要となるのは常時1,000人以上の事業場、又は一定の有害業務に常時500人以上従事させる事業場である。単に500人以上では専属を要しない。","page":40,"detail":"×。則13条1項3号により誤り。テキストp.40は、専属の産業医が必要となるのは❶常時1,000人以上の事業場、又は❷坑内における業務等一定の有害業務に常時500人以上を従事させる事業場であるとしている。設問は単に500人以上で専属が必要としており誤り。500人以上は有害業務従事の場合に限られる。根拠は則13条1項3号。"},{"law":"安全衛生管理体制","cat":"産業医の巡視","q":"産業医は、原則として、少なくとも<b>毎月1回</b>作業場等を巡視し、有害のおそれがあるときは、直ちに労働者の健康障害を防止するため必要な措置を講じなければならない。","a":true,"exp":"〇。則15条のとおり。産業医は原則として少なくとも毎月1回巡視する(一定の場合は2か月に1回)。","page":41,"detail":"〇。則15条のとおりで正しい。テキストp.41は、産業医は少なくとも毎月1回(一定の情報提供を受け事業者の同意を得ているときは2か月に1回)作業場等を巡視し、有害のおそれがあるときは直ちに必要な措置を講じなければならないとしている。設問は原則毎月1回としており本文どおりである。根拠は則15条。"},{"law":"安全衛生管理体制","cat":"産業医による勧告","q":"産業医は、労働者の健康を確保するため必要があると認めるときは、事業者に対し、労働者の健康管理等について必要な勧告をすることができ、事業者は当該勧告を尊重しなければならない。","a":true,"exp":"〇。法13条5項のとおり。産業医は事業者に勧告でき、事業者は当該勧告を尊重しなければならない。","page":45,"detail":"〇。法13条5項のとおりで正しい。テキストp.45は、産業医は労働者の健康を確保するため必要があると認めるときは、事業者に対し労働者の健康管理等について必要な勧告をすることができ、事業者は当該勧告を尊重しなければならないとしている。設問は本文どおりである。根拠は法13条5項。"},{"law":"安全衛生管理体制","cat":"産業医の勧告と不利益取扱い","q":"事業者は、産業医が勧告をしたことを理由として、産業医に対し、解任その他不利益な取扱いをしてはならない。","a":true,"exp":"〇。則14条4項のとおり。産業医が勧告したことを理由とする解任その他不利益な取扱いは禁止される。","page":45,"detail":"〇。則14条4項のとおりで正しい。テキストp.45は、事業者は産業医が勧告をしたことを理由として、産業医に対し解任その他不利益な取扱いをしないようにしなければならないとしている。設問は本文の不利益取扱いの禁止どおりである。根拠は則14条4項。"},{"law":"安全衛生管理体制","cat":"産業医の選任の対象とならない事業場","q":"事業者は、産業医の選任義務の対象とならない事業場については、医師その他厚生労働省令で定める者に労働者の健康管理等の全部又は一部を行わせなければならない。","a":false,"exp":"×。法13条の2第1項。選任義務の対象とならない事業場では、医師等に健康管理等を行わせるよう努めなければならない努力義務であり、義務ではない。","page":45,"detail":"×。法13条の2第1項により誤り。テキストp.45は、産業医の選任義務の対象とならない事業場については、医師その他厚生労働省令で定める者(保健師)に労働者の健康管理等の全部又は一部を行わせるよう「努めなければならない」努力義務であるとしている。設問は義務としており誤り。根拠は法13条の2第1項。"},{"law":"安全衛生管理体制","cat":"作業主任者の選任","q":"事業者は、高圧室内作業その他の労働災害を防止するための管理を必要とする作業で、政令で定めるものについては、作業主任者を選任しなければならない。","a":true,"exp":"〇。法14条のとおり。政令で定める一定の危険・有害な作業について作業主任者を選任しなければならない。","page":47,"detail":"〇。法14条のとおりで正しい。テキストp.47は、事業者は高圧室内作業その他の労働災害を防止するための管理を必要とする作業で政令で定めるものについては作業主任者を選
