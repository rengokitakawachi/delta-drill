任しなければならないとしている。設問は本文どおりである。事業の種類・規模でなく作業の性質に着目した選任である。根拠は法14条。"},{"law":"安全衛生管理体制","cat":"作業主任者の周知","q":"事業者は、作業主任者を選任したときは、その氏名等を作業場の見やすい箇所に掲示する等により関係労働者に周知させなければならないほか、所轄労働基準監督署長への報告義務がある。","a":false,"exp":"×。則18条、注意。氏名等の周知義務はあるが、作業主任者の選任について所轄労働基準監督署長への報告義務はない。","page":48,"detail":"×。則18条及びp.48注意により誤り。テキストp.48は、作業主任者を選任したときはその氏名及び行わせる事項を作業場の見やすい箇所に掲示する等により関係労働者に周知させなければならないとしつつ、注意として所轄労働基準監督署長への報告義務はないと明記している。設問は報告義務があるとしており誤り。根拠は則18条、p.48注意。"},{"law":"安全衛生管理体制","cat":"衛生委員会の設置","q":"衛生委員会は、業種を問わず、常時<b>100人以上</b>の労働者を使用する事業場ごとに設けなければならない。","a":false,"exp":"×。法18条1項、令9条。衛生委員会は業種を問わず常時50人以上で設置義務が生じる。100人以上ではない。","page":53,"detail":"×。法18条1項及び令9条により誤り。テキストp.53は、衛生委員会の設置規模は業種を問わず常時50人以上の労働者を使用する事業場であるとしている。設問は100人以上としており誤り。正しくは50人以上である。根拠は法18条1項、令9条。"},{"law":"安全衛生管理体制","cat":"安全委員会の設置","q":"安全委員会の設置については、所轄労働基準監督署長に報告する義務がある。","a":false,"exp":"×。注意。安全委員会の設置について所轄労働基準監督署長に報告する義務はない。","page":51,"detail":"×。p.51注意により誤り。テキストp.51は、安全委員会の設置について所轄労働基準監督署長に報告する義務はないと明記している。設問は報告義務があるとしており誤り。なお衛生委員会の設置についても報告義務はない。根拠はp.51注意。"},{"law":"安全衛生管理体制","cat":"委員会の構成員の指名","q":"事業者は、安全委員会の議長となる委員以外の<b>全委員</b>について、労働者の過半数で組織する労働組合等の推薦に基づき指名しなければならない。","a":false,"exp":"×。法17条4項。推薦に基づき指名しなければならないのは議長以外の委員の半数についてである。全委員ではない。","page":52,"detail":"×。法17条4項により誤り。テキストp.52は、事業者は議長となる委員(❶の委員)以外の委員の「半数」について、労働者の過半数で組織する労働組合等の推薦に基づき指名しなければならないとしている。設問は全委員としており誤り。正しくは議長以外の委員の半数である。根拠は法17条4項。"},{"law":"安全衛生管理体制","cat":"委員会の開催・記録保存","q":"事業者は、安全委員会及び衛生委員会を毎月1回以上開催するようにしなければならず、委員会の開催の都度、所定の事項を記録し、これを<b>5年間</b>保存しなければならない。","a":false,"exp":"×。則23条。委員会の記録の保存期間は3年間である。5年間ではない(委員会は毎月1回以上開催は正しい)。","page":53,"detail":"×。則23条により誤り。テキストp.53は、事業者は安全委員会を毎月1回以上開催するようにしなければならず、開催の都度、所定の事項を記録し、これを「3年間」保存しなければならないとしている。設問は5年間としており誤り。毎月1回以上開催は正しいが保存期間は3年間である。根拠は則23条。"},{"law":"安全衛生管理体制","cat":"統括安全衛生責任者の選任","q":"特定元方事業者は、同一の場所において作業を行う作業従事者の数の合計が常時<b>30人以上</b>であるときは、原則として統括安全衛生責任者を選任しなければならない。","a":false,"exp":"×。法15条1項、令7条。統括安全衛生責任者は原則として作業従事者の合計が常時50人以上のときに選任する。30人以上ではない(30人以上はずい道等一定の仕事)。","page":60,"detail":"×。法15条1項及び令7条により誤り。テキストp.60は、統括安全衛生責任者は作業従事者の数の合計が常時50人以上であるときに選任するとしている。設問は30人以上としており誤り。30人以上はずい道等の建設・一定の橋梁・圧気工法の仕事の場合である。根拠は法15条1項、令7条。"},{"law":"安全衛生管理体制","cat":"統括安全衛生責任者の選任","q":"ずい道等の建設の仕事や圧気工法による作業を行う仕事にあっては、作業従事者の数の合計が<b>50人以上</b>の場合に統括安全衛生責任者を選任しなければならない。","a":false,"exp":"×。法15条1項。ずい道等の建設・一定の橋梁・圧気工法の仕事は作業従事者の合計が30人以上の場合に統括安全衛生責任者を選任する。50人以上ではない。","page":60,"detail":"×。法15条1項により誤り。テキストp.60は、ずい道等の建設の仕事、一定の橋梁の建設の仕事、圧気工法による作業を行う仕事にあっては、作業従事者の数の合計が30人以上の場合に統括安全衛生責任者を選任するとしている。設問は50人以上としており誤り。50人以上はその他の仕事の原則規模である。根拠は法15条1項。"},{"law":"安全衛生管理体制","cat":"元方安全衛生管理者の選任","q":"統括安全衛生責任者を選任した事業者であって、建設業に属する事業を行うものは、元方安全衛生管理者を選任しなければならない。","a":true,"exp":"〇。法15条の2第1項のとおり。統括安全衛生責任者を選任した建設業の事業者は元方安全衛生管理者を選任する。","page":62,"detail":"〇。法15条の2第1項のとおりで正しい。テキストp.62は、統括安全衛生責任者を選任した事業者であって建設業に属する事業を行うものは、元方安全衛生管理者を選任しなければならないとしている。設問は本文どおりである。元方安全衛生管理者は専属の者を選任する。根拠は法15条の2第1項。"},{"law":"安全衛生管理体制","cat":"店社安全衛生管理者の選任","q":"建設業の元方事業者は、主要構造部が鉄骨造又は鉄骨鉄筋コンクリート造である建築物の建設の仕事で、作業従事者の数の合計が常時<b>20人以上50人未満</b>であるものについては、店社安全衛生管理者を選任しなければならない。","a":true,"exp":"〇。則18条の6第1項のとおり。鉄骨造等の建築物の建設で常時20人以上50人未満は店社安全衛生管理者を選任する。","page":64,"detail":"〇。則18条の6第1項のとおりで正しい。テキストp.64は、主要構造部が鉄骨造又は鉄骨鉄筋コンクリート造である建築物の建設の仕事であって、作業従事者の数の合計が常時20人以上50人未満であるものについて店社安全衛生管理者を選任するとしている。設問は本文どおりである。根拠は法15条の3第1項、則18条の6第1項。"},{"law":"安全衛生管理体制","cat":"店社安全衛生管理者の巡視","q":"店社安全衛生管理者は、少なくとも<b>毎週1回</b>労働者が作業を行う場所を巡視しなければならない。","a":false,"exp":"×。則18条の8。店社安全衛生管理者の巡視は少なくとも毎月1回である。毎週1回ではない。","page":65,"detail":"×。則18条の8により誤り。テキストp.65は、店社安全衛生管理者は少なくとも毎月1回労働者が作業を行う場所を巡視することとしている。設問は毎週1回としており誤り。p.65の巡視頻度の整理でも店社安全衛生管理者は毎月1回である。根拠は則18条の8。"},{"law":"安全衛生管理体制","cat":"特定元方事業者の巡視","q":"特定元方事業者は、作業場所を少なくとも毎月1回巡視しなければならない。","a":false,"exp":"×。則637条1項。特定元方事業者の作業場所の巡視は、毎作業日に少なくとも1回である。毎月1回ではない。","page":76,"detail":"×。則637条1項により誤り。テキストp.65の巡視頻度の整理及びp.76は、特定元方事業者の作業場所の巡視は「毎作業日に少なくとも1回」であるとしている。設問は毎月1回としており誤り。毎月1回は店社安全衛生管理者の巡視頻度である。根拠は則637条1項。"},{"law":"安全衛生管理体制","cat":"派遣労働者の安全衛生管理体制","q":"安全管理者の選任に係る労働者数のカウントについて、派遣先は派遣労働者を含めてカウントするが、派遣元は派遣している労働者を含めないでカウントする。","a":true,"exp":"〇。労働者派遣法45条のとおり。安全管理者は派遣先で派遣労働者を含めてカウントし、派遣元では含めない。","page":57,"detail":"〇。労働者派遣法45条のとおりで正しい。テキストp.57の表は、安全管理者の労働者数カウントについて、派遣先は派遣労働者を含めてカウントし、派遣元は派遣している労働者を含めないでカウントするとしている。設問は本文の表どおりである。根拠は労働者派遣法45条。"},{"law":"労働者の危険・健康障害の防止","cat":"墜落等による危険の防止","q":"事業者は、高さが<b>1.5メートル以上</b>の箇所で作業を行う場合において墜落により労働者に危険を及ぼすおそれのあるときは、足場を組み立てる等の方法により作業床を設けなければならない。","a":false,"exp":"×。則518条1項。作業床を設けるのは高さ2メートル以上の箇所での作業である。1.5メートル以上ではない。","page":71,"detail":"×。則518条1項により誤り。テキストp.71は、事業者は高さが「2メートル以上」の箇所で作業を行う場合に墜落の危険があるときは、足場を組み立てる等の方法により作業床を設けなければならないとしている。設問は1.5メートル以上としており誤り。正しくは2メートル以上である。根拠は則518条1項。"},{"law":"労働者の危険・健康障害の防止","cat":"昇降設備の設置","q":"事業者は、高さ又は深さが<b>2メートルをこえる</b>箇所で作業を行うときは、原則として、当該作業に従事する労働者が安全に昇降するための設備等を設けなければならない。","a":false,"exp":"×。則526条1項。昇降設備等を設けるのは高さ又は深さが1.5メートルをこえる箇所で作業を行うときである。2メートルではない。","page":71,"detail":"×。則526条1項により誤り。テキストp.71は、事業者は高さ又は深さが「1.5メートルをこえる」箇所で作業を行うときは、安全に昇降するための設備等を設けなければならないとしている。設問は2メートルをこえるとしており誤り。正しくは1.5メートルをこえる場合である。根拠は則526条1項。"},{"law":"労働者の危険・健康障害の防止","cat":"作業面の照度","q":"事業者は、労働者を常時就業させる場所の作業面の照度を、粗な作業については<b>150ルクス以上</b>に適合させなければならない。","a":false,"exp":"×。則604条。粗な作業の照度基準は70ルクス以上である。150ルクス以上は普通の作業の基準である。","page":72,"detail":"×。則604条により誤り。テキストp.72の照度の表は、粗な作業は70ルクス以上であるとしている。設問は粗な作業を150ルクス以上としており誤り。150ルクス以上は普通の作業の基準である(精密な作業は300ルクス以上)。根拠は則604条。"},{"law":"労働者の危険・健康障害の防止","cat":"作業面の照度","q":"事業者は、労働者を常時就業させる場所の作業面の照度を、普通の作業については<b>100ルクス以上</b>に適合させなければならない。","a":false,"exp":"×。則604条。普通の作業の照度基準は150ルクス以上である。100ルクス以上ではない。","page":72,"detail":"×。則604条により誤り。テキストp.72の照度の表は、普通の作業は150ルクス以上であるとしている。設問は普通の作業を100ルクス以上としており誤り。正しくは150ルクス以上である。根拠は則604条。"},{"law":"労働者の危険・健康障害の防止","cat":"危険時の作業中止","q":"事業者は、労働災害発生の急迫した危険があるときは、直ちに作業を中止し、労働者を作業場から退避させる等必要な措置を講じなければならない。","a":true,"exp":"〇。法25条のとおり。労働災害発生の急迫した危険があるときは直ちに作業を中止し労働者を退避させる等の措置を講じる。","page":73,"detail":"〇。法25条のとおりで正しい。テキストp.73は、事業者は労働災害発生の急迫した危険があるときは、直ちに作業を中止し、労働者を作業場から退避させる等必要な措置を講じなければならないとしている。設問は本文どおりである。根拠は法25条。"},{"law":"労働者の危険・健康障害の防止","cat":"事業者の行うべき調査等","q":"事業者は、建設物、設備、原材料等による、又は作業行動その他業務に起因する危険性又は有害性等を調査し、その結果に基づいて、労働者の危険又は健康障害を防止するため必要な措置を講ずるように努めなければならない。","a":true,"exp":"〇。法28条の2第1項のとおり。リスクアセスメントとその結果に基づく措置は努力義務とされている。","page":74,"detail":"〇。法28条の2第1項のとおりで正しい。テキストp.74は、事業者は建設物、設備、原材料等による、又は作業行動その他業務に起因する危険性又は有害性等を調査し、その結果に基づいて必要な措置を講ずるように「努めなければならない」としている。設問はリスクアセスメントとその結果に基づく措置の努力義務どおりである。根拠は法28条の2第1項。"},{"law":"労働者の危険・健康障害の防止","cat":"元方事業者の講ずべき措置","q":"元方事業者が関係請負人等に対し是正のため必要な指示を行う義務に関する規定は、建設業及び造船業に限り適用される。","a":false,"exp":"×。法29条、注意。元方事業者の指導・指示の規定は、業種のいかんを問わず適用される。建設業及び造船業に限られない。","page":76,"detail":"×。法29条及びp.76注意により誤り。テキストp.76は、元方事業者が関係請負人等に対し是正のため必要な指示を行う義務等について、注意として「この規定は業種のいかんを問わず適用される」と明記している。設問は建設業及び造船業に限るとしており誤り。根拠は法29条、p.76注意。"},{"law":"労働者の危険・健康障害の防止","cat":"特定元方事業者の講ずべき措置","q":"特定元方事業者は、協議組織の設置及び運営、作業間の連絡及び調整、作業場所の巡視等に関する必要な措置を講じなければならない。","a":true,"exp":"〇。法30条1項のとおり。特定元方事業者は協議組織の設置運営、作業間の連絡調整、作業場所の巡視等の措置を講じる。","page":76,"detail":"〇。法30条1項のとおりで正しい。テキストp.76は、特定元方事業者は❶協議組織の設置及び運営、❷作業間の連絡及び調整、❸作業場所の巡視(毎作業日に少なくとも1回)等に関する必要な措置を講じなければならないとしている。設問は本文どおりである。根拠は法30条1項。"},{"law":"労働者の危険・健康障害の防止","cat":"重量表示","q":"一の貨物で、重量が<b>500キログラム以上</b>のものを発送しようとする者は、原則として、当該貨物にその重量を表示しなければならない。","a":false,"exp":"×。法35条。重量表示の義務が生じるのは一の貨物で重量が1トン以上のものである。500キログラム以上ではない。","page":81,"detail":"×。法35条により誤り。テキストp.81は、一の貨物で重量が「1トン以上」のものを発送しようとする者は、見やすく容易に消滅しない方法で当該貨物にその重量を表示しなければならないとしている。設問は500キログラム以上としており誤り。正しくは1トン以上である。根拠は法35条。"},{"law":"機械等・危険物・有害物の規制","cat":"特定機械等の種類","q":"クレーンは、つり上げ荷重が<b>5トン以上</b>(スタッカー式クレーンは1トン以上)のものが特定機械等とされている。","a":false,"exp":"×。令12条。クレーンはつり上げ荷重3トン以上(スタッカー式は1トン以上)が特定機械等である。5トン以上ではない。","page":84,"detail":"×。令12条により誤り。テキストp.84の特定機械等の種類は、クレーンはつり上げ荷重が「3トン以上」(スタッカー式クレーンは1トン以上)のものが特定機械等であるとしている。設問は5トン以上としており誤り。5トン以上は就業制限業務(運転)の区分である。根拠は法37条1項、令12条。"},{"law":"機械等・危険物・有害物の規制","cat":"特定機械等の種類","q":"移動式クレーンは、つり上げ荷重が<b>2トン以上</b>のものが特定機械等とされている。","a":false,"exp":"×。令12条。移動式クレーンはつり上げ荷重3トン以上のものが特定機械等とされる。2トン以上はデリックである。","page":84,"detail":"×。令12条により誤り。テキストp.84の特定機械等の種類は、移動式クレーンはつり上げ荷重が「3トン以上」のものが特定機械等であるとしている。設問は2トン以上としており誤り。2トン以上はデリックの区分である。根拠は法37条1項、令12条。"},{"law":"機械等・危険物・有害物の規制","cat":"特定機械等の種類","q":"建設用リフトは、ガイドレールの高さが<b>10メートル以上</b>のものが特定機械等とされている。","a":false,"exp":"×。令12条。建設用リフトはガイドレールの高さが18メートル以上のものが特定機械等である。10メートル以上ではない。","page":84,"detail":"×。令12条により誤り。テキストp.84の特定機械等の種類は、建設用リフトはガイドレールの高さが「18メートル以上」のものが特定機械等であるとしている。設問は10メートル以上としており誤り。正しくは18メートル以上である。根拠は法37条1項、令12条。"},{"law":"機械等・危険物・有害物の規制","cat":"製造許可","q":"特定機械等を製造しようとする者は、あらかじめ<b>都道府県労働局長</b>の許可を受けなければならない。","a":true,"exp":"〇。法37条1項のとおり。特定機械等を製造しようとする者はあらかじめ都道府県労働局長の許可を受ける。","page":84,"detail":"〇。法37条1項のとおりで正しい。テキストp.84は、特定機械等を製造しようとする者はあらかじめ都道府県労働局長の許可を受けなければならないとしている。設問は本文どおりである。なお既に許可を受けたものと同一型式は改めての許可は不要である。根拠は法37条1項。"},{"law":"機械等・危険物・有害物の規制","cat":"検査証の有効期間","q":"ボイラー、第1種圧力容器、エレベーター及びゴンドラに係る検査証の有効期間は、<b>1年</b>である。","a":true,"exp":"〇。法41条1項、ボイラー則37条等のとおり。ボイラー・第1種圧力容器・エレベーター・ゴンドラの検査証の有効期間は1年である。","page":88,"detail":"〇。法41条1項及びボイラー則37条等のとおりで正しい。テキストp.88の有効期間の表は、ボイラー・第1種圧力容器・エレベーター・ゴンドラの検査証の有効期間は1年であるとしている。設問は本文の表どおりである。根拠は法41条1項、ボイラー則37条ほか。"},{"law":"機械等・危険物・有害物の規制","cat":"検査証の有効期間","q":"クレーン、移動式クレーン及びデリックに係る検査証の有効期間は、<b>1年</b>である。","a":false,"exp":"×。法41条1項。クレーン・移動式クレーン・デリックの検査証の有効期間は2年である。1年ではない。","page":88,"detail":"×。法41条1項により誤り。テキストp.88の有効期間の表は、クレーン・移動式クレーン・デリックの検査証の有効期間は「2年」であるとしている。設問は1年としており誤り。1年はボイラー・第1種圧力容器・エレベーター・ゴンドラの有効期間である。根拠は法41条1項。"},{"law":"機械等・危険物・有害物の規制","cat":"性能検査","q":"特定機械等に係る検査証の有効期間の更新を受けようとする者は、厚生労働大臣の登録を受けた登録性能検査機関が行う性能検査を受けなければならない。","a":true,"exp":"〇。法41条2項のとおり。検査証の有効期間の更新を受けようとする者は登録性能検査機関が行う性能検査を受ける。","page":88,"detail":"〇。法41条2項のとおりで正しい。テキストp.88は、特定機械等に係る検査証の有効期間の更新を受けようとする者は、厚生労働大臣の登録を受けた登録性能検査機関が行う性能検査を受けなければならないとしている。設問は本文どおりである。根拠は法41条2項。"},{"law":"機械等・危険物・有害物の規制","cat":"譲渡等の制限","q":"特定機械等以外の機械等で政令で定めるものは、厚生労働大臣が定める規格又は安全装置を具備しなければ、譲渡し、貸与し、又は設置してはならない。","a":true,"exp":"〇。法42条のとおり。政令で定める機械等は規格又は安全装置を具備しなければ譲渡・貸与・設置してはならない。","page":90,"detail":"〇。法42条のとおりで正しい。テキストp.90は、特定機械等以外の機械等で政令で定めるものは、厚生労働大臣が定める規格又は安全装置を具備しなければ、譲渡し、貸与し、又は設置してはならないとしている。設問は本文どおりである。根拠は法42条、別表2、令13条。"},{"law":"機械等・危険物・有害物の規制","cat":"型式検定","q":"プレス機械又はシャーの安全装置や保護帽(物体の飛来等による危険を防止するもの)を製造し、又は輸入した者は、登録型式検定機関が行う型式検定を受けなければならない。","a":true,"exp":"〇。法44条の2第1項、令14条の2のとおり。プレス機械等の安全装置・保護帽等は登録型式検定機関の型式検定を受ける。","page":93,"detail":"〇。法44条の2第1項及び令14条の2のとおりで正しい。テキストp.93は、型式検定の対象に、プレス機械又はシャーの安全装置、保護帽(物体の飛来もしくは落下又は墜落による危険を防止するもの)等が含まれ、これらを製造し又は輸入した者は登録型式検定機関が行う型式検定を受けなければならないとしている。設問は本文どおりである。根拠は法44条の2第1項、令14条の2。"},{"law":"機械等・危険物・有害物の規制","cat":"定期自主検査","q":"事業者は、ボイラーその他の機械等で政令で定めるものについて、定期に自主検査を行い、その結果を記録しておかなければならず、その記録は<b>5年間</b>保存しなければならない。","a":false,"exp":"×。則135条の2。定期自主検査の結果の記録は3年間保存しなければならない。5年間ではない。","page":94,"detail":"×。則135条の2により誤り。テキストp.94は、事業者は定期に自主検査を行いその結果を記録しておかなければならず、結果の記録は「3年間」保存しておかなければならないとしている。設問は5年間としており誤り。正しくは3年間である。根拠は法45条1項、則135条の2。"},{"law":"機械等・危険物・有害物の規制","cat":"製造の許可","q":"労働者に重度の健康障害を生ずるおそれのある物で政令で定めるものを製造しようとする者は、あらかじめ、<b>都道府県労働局長</b>の許可を受けなければならない。","a":false,"exp":"×。法56条。製造許可物質を製造しようとする者は、あらかじめ厚生労働大臣の許可を受けなければならない。都道府県労働局長ではない。","page":97,"detail":"×。法56条により誤り。テキストp.97は、労働者に重度の健康障害を生ずるおそれのある物で政令で定めるものを製造しようとする者は、あらかじめ「厚生労働大臣」の許可を受けなければならないとしている。設問は都道府県労働局長としており誤り。都道府県労働局長の許可は製造等禁止物質の試験研究のための製造等の場合である。根拠は法56条。"},{"law":"機械等・危険物・有害物の規制","cat":"表示等","q":"爆発性の物等で政令で定めるものや製造許可物質を容器に入れ、又は包装して譲渡し、又は提供する者は、その容器又は包装に名称や人体に及ぼす作用等の所定の事項を表示しなければならない。","a":true,"exp":"〇。法57条1項のとおり。ラベル表示対象物等を容器等に入れて譲渡・提供する者は所定の事項を表示しなければならない。","page":98,"detail":"〇。法57条1項のとおりで正しい。テキストp.98は、爆発性の物等で政令で定めるものや製造許可物質を容器に入れ又は包装して譲渡し又は提供する者は、その容器又は包装に名称や人体に及ぼす作用等の所定の事項を表示しなければならないとしている。設問は本文のラベル表示義務どおりである。根拠は法57条1項。"},{"law":"機械等・危険物・有害物の規制","cat":"文書の交付等","q":"通知対象物を譲渡し、又は提供する者は、文書の交付その他の方法により、通知対象物に関する所定の事項を相手方に通知しなければならない。","a":true,"exp":"〇。法57条の2のとおり。通知対象物譲渡者等は文書の交付等の方法により所定事項を相手方に通知しなければならない。","page":100,"detail":"〇。法57条の2のとおりで正しい。テキストp.100は、通知対象物を譲渡し又は提供する者(通知対象物譲渡者等)は、文書の交付その他厚生労働省令で定める方法により通知対象物に関する所定の事項を相手方に通知しなければならないとしている。設問は本文どおりである。根拠は法57条の2。"},{"law":"機械等・危険物・有害物の規制","cat":"通知事項の変更","q":"通知対象物譲渡者等は、通知した事項に変更を行う必要が生じたときは、変更後の事項を、速やかに、相手方に通知しなければならない。","a":false,"exp":"×。法57条の2第2項。通知した事項の変更については、変更後の事項を速やかに相手方に通知するよう努めなければならない努力義務である。","page":101,"detail":"×。法57条の2第2項により誤り。テキストp.101は、通知対象物譲渡者等は、通知した事項に変更を行う必要が生じたときは、変更後の事項を速やかに相手方に通知するよう「努めなければならない」努力義務であるとしている。設問は義務(しなければならない)としており誤り。根拠は法57条の2第2項。"},{"law":"機械等・危険物・有害物の規制","cat":"新規化学物質の製造量の確認","q":"新規化学物質の一の事業場における1年間の製造量又は輸入量が<b>100キログラム以下</b>である旨の厚生労働大臣の確認を受けたときは、有害性の調査及び届出を行う必要はない。","a":true,"exp":"〇。則34条の11のとおり。1年間の製造量又は輸入量が100キログラム以下である旨の確認を受けたときは調査・届出が不要となる。","page":106,"detail":"〇。則34条の11のとおりで正しい。テキストp.106は、新規化学物質の有害性の調査・届出の例外として、一の事業場における1年間の製造量又は輸入量が100キログラム以下である旨の厚生労働大臣の確認を受けたときを挙げている。設問は本文どおりであり、調査・届出は不要となる(確認の有効期間は2年間)。根拠は法57条の4、則34条の11。"},{"law":"就業制限・安全衛生教育","cat":"雇入時等の教育","q":"事業者は、労働者を雇い入れたときは、当該労働者に対し、遅滞なく、安全又は衛生のため必要な事項について教育を行わなければならないが、これは業種を問わず実施しなければならない。","a":true,"exp":"〇。法59条1項、則35条のとおり。雇入時等の教育は業種を問わず、また雇用形態を問わず実施しなければならない。","page":110,"detail":"〇。法59条1項及び則35条のとおりで正しい。テキストp.110は、事業者は労働者を雇い入れたときは遅滞なく安全又は衛生のため必要な事項について教育を行わなければならず、業種を問わず、また雇用形態(正社員かアルバイトか等)を問わず実施しなければならないとしている。設問は本文どおりである。根拠は法59条1項、則35条。"},{"law":"就業制限・安全衛生教育","cat":"雇入時等の教育","q":"事業者は、労働者の作業内容を変更したときも、雇入時の教育と同様の安全衛生教育を行わなければならない。","a":true,"exp":"〇。法59条2項のとおり。作業内容を変更したときも雇入時と同様の教育を行わなければならない。","page":110,"detail":"〇。法59条2項のとおりで正しい。テキストp.110は、労働者の作業内容を変更したときも、雇入時と同様に教育を行わなければならないとしている。作業内容を変更したときとは、異なる作業への転換や作業設備・方法等の大幅な変更があったときをいう。設問は本文どおりである。根拠は法59条2項。"},{"law":"就業制限・安全衛生教育","cat":"特別教育","q":"事業者は、危険又は有害な業務で、厚生労働省令で定めるものに労働者をつかせるときは、当該業務に関する安全又は衛生のための特別の教育を行わなければならない。","a":true,"exp":"〇。法59条3項のとおり。一定の危険又は有害な業務につかせるときは特別教育を行わなければならない。","page":112,"detail":"〇。法59条3項のとおりで正しい。テキストp.112は、事業者は危険又は有害な業務で厚生労働省令で定めるものに労働者をつかせるときは、当該業務に関する安全又は衛生のための特別の教育を行わなければならないとしている。設問は本文どおりである。根拠は法59条3項。"},{"law":"就業制限・安全衛生教育","cat":"特別教育の記録の保存","q":"事業者は、特別教育を行ったときは、受講者、科目等の記録を作成して、これを<b>5年間</b>保存しておかなければならない。","a":false,"exp":"×。則38条。特別教育の記録は3年間保存しなければならない。5年間ではない。","page":113,"detail":"×。則38条により誤り。テキストp.113は、事業者は特別教育を行ったときは受講者、科目等の記録を作成して、これを「3年間」保存しておかなければならないとしている。設問は5年間としており誤り。正しくは3年間である。根拠は則38条。"},{"law":"就業制限・安全衛生教育","cat":"職長等の教育","q":"事業者は、政令で定める業種に属する事業場においては、新たに職務につくこととなった職長その他の作業中の労働者を直接指導又は監督する者(作業主任者を除く)に対し、安全又は衛生のための教育を行わなければならない。","a":true,"exp":"〇。法60条のとおり。政令で定める業種では新たに職務につく職長等(作業主任者を除く)に対し教育を行う。","page":114,"detail":"〇。法60条のとおりで正しい。テキストp.114は、事業者は政令で定める業種に属する事業場においては、新たに職務につくこととなった職長その他の作業中の労働者を直接指導又は監督する者(作業主任者を除く)に対し、安全又は衛生のための教育を行わなければならないとしている。設問は本文どおりである。根拠は法60条。"},{"law":"就業制限・安全衛生教育","cat":"職長等の教育の対象業種","q":"職長等の教育は、建設業及び製造業のほか、電気業、ガス業、自動車整備業、機械修理業等が政令で定める対象業種とされている。","a":true,"exp":"〇。令19条のとおり。職長等の教育の対象業種は建設業・製造業(一部除く)・電気業・ガス業・自動車整備業・機械修理業等である。","page":114,"detail":"〇。令19条のとおりで正しい。テキストp.114の対象業種は、建設業、製造業(一部を除く)、電気業、ガス業、自動車整備業、機械修理業を掲げている。設問はこれらの業種を挙げており本文と一致する。根拠は令19条。"},{"law":"就業制限・安全衛生教育","cat":"派遣労働者に対する安全衛生教育","q":"派遣労働者に対する特別教育及び職長等の教育の実施義務は、派遣元の事業者にある。","a":false,"exp":"×。労働者派遣法45条。派遣労働者に対する特別教育及び職長等の教育の実施義務は派遣先の事業者にある。雇入時の教育は派遣元である。","page":115,"detail":"×。労働者派遣法45条により誤り。テキストp.115の表は、派遣労働者に対する特別教育及び職長等の教育の実施義務は「派遣先」の事業者にあるとしている。設問は派遣元としており誤り。雇入時の教育は派遣元、作業内容変更時の教育は派遣元・派遣先双方が実施義務を負う。根拠は労働者派遣法45条。"},{"law":"就業制限・安全衛生教育","cat":"就業制限","q":"事業者は、クレーンの運転その他の業務で政令で定めるものについては、当該業務に係る免許を受けた者や技能講習を修了した者等でなければ、当該業務に就かせてはならない。","a":true,"exp":"〇。法61条1項のとおり。就業制限業務については免許を受けた者や技能講習を修了した者等でなければ就かせてはならない。","page":116,"detail":"〇。法61条1項のとおりで正しい。テキストp.116は、事業者はクレーンの運転その他の業務で政令で定めるものについては、都道府県労働局長の免許を受けた者、技能講習を修了した者その他厚生労働省令で定める資格を有する者でなければ当該業務に就かせてはならないとしている。設問は本文どおりである。根拠は法61条1項。"},{"law":"就業制限・安全衛生教育","cat":"就業制限業務の資格証明","q":"就業制限業務に就くことができる者は、当該業務に従事するときは、これに係る免許証その他その資格を証する書面を携帯していなければならない。","a":true,"exp":"〇。法61条3項のとおり。就業制限業務に従事するときは免許証その他資格を証する書面を携帯しなければならない。","page":116,"detail":"〇。法61条3項のとおりで正しい。テキストp.116は、就業制限業務に就くことができる者は、当該業務に従事するときは、これに係る免許証その他その資格を証する書面を携帯していなければならないとしている。設問は本文どおりである。根拠は法61条3項。"},{"law":"就業制限・安全衛生教育","cat":"就業制限業務(クレーン)","q":"つり上げ荷重が<b>3トン以上</b>のクレーン(一定のものを除く)の運転の業務は、原則としてクレーン・デリック運転士免許を受けた者でなければ就かせてはならない就業制限業務である。","a":false,"exp":"×。令20条、則別表3。就業制限業務となるのはつり上げ荷重5トン以上のクレーンの運転である。3トン以上ではない(3トン以上は特定機械等の区分)。","page":117,"detail":"×。令20条及び則別表3により誤り。テキストp.117は、就業制限業務となるのはつり上げ荷重が「5トン以上」のクレーンの運転であるとしている。設問は3トン以上としており誤り。3トン以上は特定機械等としての区分であり、就業制限(運転業務)は5トン以上である。根拠は令20条、則別表3。"},{"law":"就業制限・安全衛生教育","cat":"就業制限業務(フォークリフト)","q":"最大荷重が<b>2トン以上</b>のフォークリフトの運転(道路上を走行させる運転を除く)の業務が、フォークリフト運転技能講習を修了した者等でなければ就かせてはならない就業制限業務とされている。","a":false,"exp":"×。令20条、則別表3。就業制限業務となるのは最大荷重1トン以上のフォークリフトの運転である。2トン以上ではない。","page":117,"detail":"×。令20条及び則別表3により誤り。テキストp.117は、就業制限業務となるのは最大荷重が「1トン以上」のフォークリフトの運転(道路上の走行運転を除く)であるとしている。設問は2トン以上としており誤り。正しくは1トン以上で、フォークリフト運転技能講習修了者等でなければ就かせてはならない。根拠は令20条、則別表3。"},{"law":"就業制限・安全衛生教育","cat":"免許試験","q":"衛生管理者、作業主任者又は就業制限業務に就く者に係る免許試験は、厚生労働省令で定める区分ごとに、<b>都道府県労働局長</b>が行う。","a":true,"exp":"〇。法75条1項のとおり。免許試験は厚生労働省令で定める区分ごとに都道府県労働局長が行う。","page":119,"detail":"〇。法75条1項のとおりで正しい。テキストp.119は、免許試験は厚生労働省令で定める区分ごとに都道府県労働局長が行うとしている。設問は本文どおりである。免許は衛生管理者、作業主任者又は就業制限業務に就く者に係るものである。根拠は法75条1項。"},{"law":"就業制限・安全衛生教育","cat":"免許の欠格事由","q":"免許を取り消され、その取消しの日から起算して<b>2年</b>を経過しない者には、原則として免許を与えない。","a":false,"exp":"×。法72条2項。免許を取り消され取消しの日から起算して1年を経過しない者には原則として免許を与えない。2年ではない。","page":119,"detail":"×。法72条2項により誤り。テキストp.119の免許の欠格事由は、免許を取り消され、その取消しの日から起算して「1年」を経過しない者には原則として免許を与えないとしている。設問は2年としており誤り。正しくは1年である。根拠は法72条2項。"},{"law":"健康診断・健康管理","cat":"作業環境測定","q":"事業者は、有害な業務を行う屋内作業場その他の作業場で政令で定めるものについて、必要な作業環境測定を行い、その結果を記録しておかなければならない。","a":true,"exp":"〇。法65条1項のとおり。政令で定める作業場について作業環境測定を行いその結果を記録しておく。","page":124,"detail":"〇。法65条1項のとおりで正しい。テキストp.124は、事業者は有害な業務を行う屋内作業場その他の作業場で政令で定めるものについて、必要な作業環境測定を行い、その結果を記録しておかなければならないとしている。設問は本文どおりである。測定は作業環境測定基準に従って行う。根拠は法65条1項。"},{"law":"健康診断・健康管理","cat":"作業環境測定の記録の保存","q":"作業環境測定の測定結果の記録の保存期間は、原則として<b>3年間</b>であるが、放射線の測定は5年間、土石等の粉じんの測定は7年間である。","a":true,"exp":"〇。則590条等のとおり。測定結果の保存は原則3年間、放射線は5年間、粉じんは7年間とされる。","page":125,"detail":"〇。則590条等のとおりで正しい。テキストp.125の保存期間の表は、原則3年間、放射線の測定は5年間、土石等の粉じんの測定は7年間としている。設問はこの表の区分どおりである。根拠は則590条ほか。"},{"law":"健康診断・健康管理","cat":"作業環境測定の記録の保存","q":"石綿等の濃度の測定結果の記録の保存期間は、<b>30年間</b>である。","a":false,"exp":"×。則590条等。石綿等の濃度の測定結果の記録の保存期間は40年間である。30年間はクロム酸等一定のものである。","page":125,"detail":"×。則590条等により誤り。テキストp.125の保存期間の表は、石綿等の濃度の測定は「40年間」としている。設問は30年間としており誤り。30年間は特定化学物質等のうちクロム酸等一定のものの測定の保存期間である。根拠は則590条ほか。"},{"law":"健康診断・健康管理","cat":"作業の管理","q":"事業者は、労働者の健康に配慮して、労働者の従事する作業を適切に管理するように努めなければならない。","a":true,"exp":"〇。法65条の3のとおり。事業者は労働者の従事する作業を適切に管理するよう努めなければならない努力義務である。","page":126,"detail":"〇。法65条の3のとおりで正しい。テキストp.126は、事業者は労働者の健康に配慮して、労働者の従事する作業を適切に管理するように「努めなければならない」としている。設問は本文の努力義務どおりである。電通事件判決もこの規定に言及している。根拠は法65条の3。"},{"law":"健康診断・健康管理","cat":"一般健康診断の実施","q":"一般健康診断は、事業場の業種、規模を問わず、事業者に医師による健康診断を実施する義務がある。","a":true,"exp":"〇。法66条1項のとおり。一般健康診断は業種・規模を問わず事業者に実施義務がある。","page":128,"detail":"〇。法66条1項のとおりで正しい。テキストp.128は、一般健康診断について、事業場の業種、規模を問わず、事業者は医師による健康診断を実施する義務があるとしている。設問は本文どおりである。根拠は法66条1項。"},{"law":"健康診断・健康管理","cat":"雇入時の健康診断の省略","q":"医師による健康診断を受けた後、<b>3か月</b>を経過しない者を雇い入れる場合に、その者が結果を証明する書面を提出したときは、相当する項目を省略することができる。","a":true,"exp":"〇。則43条のとおり。健康診断を受けた後3か月を経過しない者が結果を証明する書面を提出したときは相当する項目を省略できる。","page":128,"detail":"〇。則43条のとおりで正しい。テキストp.128は、医師による健康診断を受けた後「3か月」を経過しない者を雇い入れる場合に、その者が結果を証明する書面を提出したときは、当該健康診断の項目に相当する項目を省略することができるとしている。設問は本文どおりである。根拠は則43条。"},{"law":"健康診断・健康管理","cat":"定期健康診断","q":"事業者は、常時使用する労働者(特定業務従事者を除く)に対し、<b>6か月以内ごとに1回</b>、定期に、医師による健康診断を行わなければならない。","a":false,"exp":"×。則44条1項。定期健康診断は1年以内ごとに1回行う。6か月以内ごとに1回ではない(6か月以内ごとは特定業務従事者)。","page":129,"detail":"×。則44条1項により誤り。テキストp.129は、定期健康診断は常時使用する労働者(特定業務従事者を除く)に対し「1年以内ごとに1回」行うとしている。設問は6か月以内ごとに1回としており誤り。6か月以内ごとは特定業務従事者の健康診断である。根拠は法66条1項、則44条1項。"},{"law":"健康診断・健康管理","cat":"特定業務従事者の健康診断","q":"事業者は、特定業務従事者に対しては、当該業務への配置替えの際及び<b>1年以内ごとに1回</b>、定期に、医師による健康診断を行わなければならない。","a":false,"exp":"×。則45条1項。特定業務従事者の健康診断は配置替えの際及び6か月以内ごとに1回行う(胸部エックス線検査等は1年以内ごとに1回)。原則1年以内ごとに1回ではない。","page":129,"detail":"×。則45条1項により誤り。テキストp.129は、特定業務従事者に対しては配置替えの際及び「6か月以内ごとに1回」(胸部エックス線検査等は1年以内ごとに1回)健康診断を行うとしている。設問は1年以内ごとに1回を原則としており誤り。原則は6か月以内ごとに1回である。根拠は則45条1項。"},{"law":"健康診断・健康管理","cat":"健康診断の省略基準","q":"定期健康診断において、腹囲の検査は、原則として40歳未満の者について省略することができるが、<b>35歳</b>の者は省略することができない。","a":true,"exp":"〇。厚労告のとおり。腹囲の検査は40歳未満の者について省略できるが、35歳の者は省略できない。","page":130,"detail":"〇。厚労告(平22.12.25厚労告)のとおりで正しい。テキストp.130の省略基準の表は、腹囲の検査は40歳未満の者について省略できるが、注意として「35歳の者は省略することはできません」と明記している。設問は本文どおりである。根拠は則44条2項・3項、厚労告。"},{"law":"健康診断・健康管理","cat":"海外派遣労働者の健康診断","q":"事業者は、労働者を<b>3か月以上</b>海外に派遣しようとするときは、あらかじめ、当該労働者に対し所定の健康診断を行わなければならない。","a":false,"exp":"×。則45条の2。海外派遣労働者の健康診断は6か月以上海外に派遣しようとするときに行う。3か月以上ではない。","page":131,"detail":"×。則45条の2により誤り。テキストp.131は、海外派遣労働者の健康診断は労働者を「6か月以上」海外に派遣しようとするとき(あらかじめ)等に行うとしている。設問は3か月以上としており誤り。正しくは6か月以上である。根拠は則45条の2。"},{"law":"健康診断・健康管理","cat":"給食従業員の検便","q":"事業者は、事業に付属する食堂又は炊事場における給食の業務に従事する労働者に対し、雇入れの際又は配置替えの際だけでなく、定期的にも検便による健康診断を行わなければならない。","a":false,"exp":"×。則47条、注意。給食従業員の検便は雇入れ又は配置替えの際に行うものであり、定期的に行う必要はない。","page":131,"detail":"×。則47条及びp.131注意により誤り。テキストp.131は、給食従業員の検便は雇入れの際又は当該業務への配置替えの際に行うものとし、注意として「定期的に行う必要はありません」と明記している。設問は定期的にも行わなければならないとしており誤り。根拠は則47条、p.131注意。"},{"law":"健康診断・健康管理","cat":"特殊健康診断","q":"事業者は、有害な業務で政令で定めるものに従事する労働者に対し、雇入れの際、配置替えの際及びその後原則6か月以内ごとに1回、定期に、医師による特別の項目についての健康診断を行わなければならない。","a":true,"exp":"〇。法66条2項のとおり。特殊健康診断は雇入れ・配置替えの際及び原則6か月以内ごとに1回行う。","page":132,"detail":"〇。法66条2項のとおりで正しい。テキストp.132は、事業者は有害な業務で政令で定めるものに従事する労働者に対し、雇入れの際、配置替えの際及びその後所定の期間(原則6か月以内)ごとに1回、定期に、医師による特別の項目についての健康診断を行わなければならないとしている。設問は本文どおりである。根拠は法66条2項。"},{"law":"健康診断・健康管理","cat":"臨時健康診断","q":"都道府県労働局長は、労働者の健康を保持するため必要があると認めるときは、労働衛生指導医の意見に基づき、文書により、事業者に対し、臨時の健康診断の実施その他必要な事項を指示することができる。","a":true,"exp":"〇。法66条4項のとおり。都道府県労働局長は労働衛生指導医の意見に基づき臨時の健康診断の実施等を指示できる。","page":133,"detail":"〇。法66条4項のとおりで正しい。テキストp.133は、都道府県労働局長は労働者の健康を保持するため必要があると認めるときは、労働衛生指導医の意見に基づき、必要な事項を記載した文書により、事業者に対し臨時の健康診断の実施その他必要な事項を指示することができるとしている。設問は本文どおりである。根拠は法66条4項、則49条。"},{"law":"健康診断・健康管理","cat":"労働者の受診義務","q":"労働者は、事業者が行う健康診断を受けなければならないが、他の医師等の行う健康診断を受けその結果を証明する書面を提出したときは、事業者の実施する健康診断を受診しなくても差し支えない。","a":true,"exp":"〇。法66条5項のとおり。他の医師等の健康診断を受け結果を証明する書面を提出すれば事業者の健康診断を受診しなくてもよい。","page":134,"detail":"〇。法66条5項のとおりで正しい。テキストp.134は、労働者は事業者が行う健康診断を受けなければならないが、事業者の指定した医師等の健康診断を希望しない場合に、他の医師等の行う健康診断を受けその結果を証明する書面を提出したときは、事業者の実施する健康診断を受診しなくとも差し支えないとしている。設問は本文どおりである。根拠は法66条5項。"},{"law":"健康診断・健康管理","cat":"自発的健康診断","q":"自発的健康診断の結果を提出できる対象労働者は、常時使用され、自ら受けた健康診断を受けた日前6か月間を平均して1か月当たり<b>4回以上</b>深夜業に従事した労働者である。","a":true,"exp":"〇。則50条の2のとおり。1か月当たり4回以上深夜業に従事した労働者が自発的健康診断の結果を提出できる。","page":134,"detail":"〇。則50条の2のとおりで正しい。テキストp.134は、自発的健康診断の結果を提出できる対象労働者は、常時使用され、自ら受けた健康診断を受けた日前6か月間を平均して1か月当たり4回以上深夜業に従事した労働者であるとしている。設問は本文どおりである。提出は受診日から3か月以内に行う。根拠は法66条の2、則50条の2。"},{"law":"健康診断・健康管理","cat":"医師等からの意見聴取","q":"事業者は、健康診断の結果(異常の所見があると診断された労働者に係るものに限る)に基づき、当該労働者の健康を保持するために必要な措置について、医師又は歯科医師の意見を聴かなければならない。","a":true,"exp":"〇。法66条の4のとおり。異常の所見があると診断された労働者について医師又は歯科医師の意見を聴かなければならない。","page":135,"detail":"〇。法66条の4のとおりで正しい。テキストp.135は、事業者は健康診断の結果(異常の所見があると診断された労働者に係るものに限る)に基づき、当該労働者の健康を保持するために必要な措置について、医師又は歯科医師の意見を聴かなければならないとしている。設問は本文どおりである。意見聴取は健診後3か月以内に行う。根拠は法66条の4。"},{"law":"健康診断・健康管理","cat":"健康診断の結果の通知","q":"事業者は、一般健康診断、特殊健康診断及び臨時健康診断を受けた労働者に対し、遅滞なく、当該健康診断の結果を通知しなければならない。","a":true,"exp":"〇。法66条の6のとおり。健康診断を受けた労働者に対し遅滞なく結果を通知しなければならない。","page":136,"detail":"〇。法66条の6のとおりで正しい。テキストp.136は、事業者は一般健康診断、特殊健康診断及び臨時健康診断を受けた労働者に対し、遅滞なく当該健康診断の結果を通知しなければならないとしている。設問は本文どおりである。根拠は法66条の6、則51条の4。"},{"law":"健康診断・健康管理","cat":"健康診断結果報告","q":"常時<b>50人以上</b>の労働者を使用する事業者は、定期健康診断を行ったときは、遅滞なく、所定の事項を所轄労働基準監督署長に報告しなければならない。","a":true,"exp":"〇。則52条のとおり。常時50人以上の労働者を使用する事業者は定期健康診断の結果を所轄労働基準監督署長に報告する。","page":136,"detail":"〇。則52条のとおりで正しい。テキストp.136は、常時50人以上の労働者を使用する事業者は、定期健康診断を行ったときは、遅滞なく、電子情報処理組織を使用して所定の事項を所轄労働基準監督署長に報告しなければならないとしている。設問は本文どおりである。なお特殊健診・歯科健診は使用労働者数にかかわらず報告する。根拠は則52条。"},{"law":"健康診断・健康管理","cat":"保健指導","q":"事業者は、一般健康診断等の結果、特に健康の保持に努める必要があると認める労働者に対し、医師又は保健師による保健指導を行わなければならない。","a":false,"exp":"×。法66条の7。保健指導は医師又は保健師により行うように努めなければならない努力義務である。義務ではない。","page":137,"detail":"×。法66条の7により誤り。テキストp.137は、事業者は一般健康診断等の結果、特に健康の保持に努める必要があると認める労働者に対し、医師又は保健師による保健指導を「行うように努めなければならない」努力義務であるとしている。設問は義務としており誤り。根拠は法66条の7。"},{"law":"健康診断・健康管理","cat":"長時間労働者に対する面接指導の対象","q":"長時間労働者に対する面接指導の対象となる労働者は、休憩時間を除き1週間当たり40時間を超えて労働させた場合におけるその超えた時間が1か月当たり<b>80時間</b>を超え、かつ、疲労の蓄積が認められる者である。","a":true,"exp":"〇。則52条の2第1項のとおり。1か月当たり80時間を超え疲労の蓄積が認められる者が面接指導の対象となる。","page":139,"detail":"〇。則52条の2第1項のとおりで正しい。テキストp.139は、面接指導の対象となる労働者は、休憩時間を除き1週間当たり40時間を超えて労働させた場合のその超えた時間が1か月当たり80時間を超え、かつ、疲労の蓄積が認められる者であるとしている。設問は本文どおりである。なおこの時間には休日労働時間も含まれる。根拠は則52条の2第1項。"},{"law":"健康診断・健康管理","cat":"長時間労働者に対する面接指導の実施","q":"長時間労働者に対する面接指導は、要件に該当する労働者の申出により行うものとされ、事業者は申出があったときは遅滞なく面接指導を行わなければならない。","a":true,"exp":"〇。則52条の3のとおり。長時間労働者に対する面接指導は労働者の申出により行い、申出があれば遅滞なく実施する。","page":140,"detail":"〇。則52条の3のとおりで正しい。テキストp.140は、長時間労働者に対する面接指導は要件に該当する労働者の申出により行うものとし、事業者は申出があったときは遅滞なく面接指導を行わなければならないとしている。設問は本文どおりである。申出は時間算定の期日後遅滞なく行う。根拠は則52条の3。"},{"law":"健康診断・健康管理","cat":"面接指導の結果の記録","q":"事業者は、長時間労働者に対する面接指導の結果に基づき、その結果の記録を作成して、これを<b>5年間</b>保存しなければならない。","a":true,"exp":"〇。法66条の8第3項、則52条の6のとおり。面接指導の結果の記録は5年間保存しなければならない。","page":140,"detail":"〇。法66条の8第3項及び則52条の6のとおりで正しい。テキストp.140は、事業者は長時間労働者に対する面接指導の結果に基づき、その結果の記録を作成して、これを「5年間」保存しなければならないとしている。設問は本文どおりである。記録には医師の意見を記載する。根拠は法66条の8第3項、則52条の6第1項。"},{"law":"健康診断・健康管理","cat":"研究開発業務従事者に対する面接指導","q":"研究開発業務従事者に対する面接指導の対象となる時間は、休憩時間を除き1週間当たり40時間を超えて労働させた場合におけるその超えた時間が1か月当たり<b>100時間</b>とされている。","a":true,"exp":"〇。則52条の7の2第1項のとおり。研究開発業務従事者は1か月当たり100時間を超えた者が面接指導の対象となる。","page":142,"detail":"〇。則52条の7の2第1項のとおりで正しい。テキストp.142は、研究開発業務従事者に対する面接指導の対象となる時間は、休憩時間を除き1週間当たり40時間を超えて労働させた場合のその超えた時間について1か月当たり「100時間」とされている。設問は本文どおりである。根拠は法66条の8の2第1項、則52条の7の2第1項。"},{"law":"健康診断・健康管理","cat":"研究開発業務従事者に対する面接指導","q":"研究開発業務従事者に対する面接指導は、労働者の申出があったときに限り行わなければならない。","a":false,"exp":"×。法66条の8の2。研究開発業務従事者に対する面接指導は、時間の算定の期日後、労働者の申出なしに行わなければならない。","page":142,"detail":"×。法66条の8の2により誤り。テキストp.142は、研究開発業務従事者に対する面接指導について、事業者は時間の算定の期日後、遅滞なく、「労働者の申出なしに」面接指導を行わなければならないとしている。設問は申出があったときに限るとしており誤り。労働者の申出は不要である。根拠は法66条の8の2、則52条の7の2。"},{"law":"健康診断・健康管理","cat":"高度プロフェッショナル制度対象者の面接指導","q":"高度プロフェッショナル制度対象労働者に対する面接指導の対象となる時間は、1週間当たりの健康管理時間が40時間を超えた場合のその超えた時間について、1か月当たり<b>100時間</b>とされている。","a":true,"exp":"〇。則52条の7の4第1項のとおり。高度プロフェッショナル制度対象労働者は健康管理時間の超過が1か月当たり100時間を超えた者が面接指導の対象となる。","page":144,"detail":"〇。則52条の7の4第1項のとおりで正しい。テキストp.144は、高度プロフェッショナル制度対象労働者に対する面接指導の対象となる時間は、1週間当たりの健康管理時間が40時間を超えた場合のその超えた時間について1か月当たり「100時間」とされている。設問は本文どおりである。算定の期日後、申出なしに面接指導を行う。根拠は法66条の8の4第1項、則52条の7の4第1項。"},{"law":"健康診断・健康管理","cat":"ストレスチェックの実施","q":"事業者は、労働者に対し、医師、保健師その他の厚生労働省令で定める者による心理的な負担の程度を把握するための検査(ストレスチェック)を行わなければならない。","a":true,"exp":"〇。法66条の10第1項のとおり。事業者は医師等によるストレスチェックを行わなければならない。","page":147,"detail":"〇。法66条の10第1項のとおりで正しい。テキストp.147は、事業者は労働者に対し、医師、保健師その他の厚生労働省令で定める者(医師等)による心理的な負担の程度を把握するための検査(ストレスチェック)を行わなければならないとしている。設問は本文どおりである。根拠は法66条の10第1項。"},{"law":"健康診断・健康管理","cat":"ストレスチェックの受検義務","q":"労働者には、ストレスチェックを受ける義務がある。","a":false,"exp":"×。注意。労働者には、ストレスチェックを受ける義務はない。","page":147,"detail":"×。p.147注意により誤り。テキストp.147は、注意として「労働者には、検査(ストレスチェック)を受ける義務はありません」と明記している。設問は受検義務があるとしており誤り。健康診断の受診義務とは異なる点に注意。根拠はp.147注意。"},{"law":"健康診断・健康管理","cat":"ストレスチェックの実施頻度","q":"事業者は、常時使用する労働者に対し、<b>1年以内ごとに1回</b>、定期に、所定の項目についてストレスチェックを行わなければならない。","a":true,"exp":"〇。則52条の9のとおり。ストレスチェックは常時使用する労働者に対し1年以内ごとに1回定期に行う。","page":148,"detail":"〇。則52条の9のとおりで正しい。テキストp.148は、事業者は常時使用する労働者に対し、1年以内ごとに1回、定期に、所定の項目についてストレスチェックを行わなければならないとしている。設問は本文どおりである。根拠は則52条の9。"},{"law":"健康診断・健康管理","cat":"ストレスチェックの結果の提供","q":"ストレスチェックを行った医師等は、あらかじめ当該検査を受けた労働者の同意を得ないで、当該労働者の検査の結果を事業者に提供してはならない。","a":true,"exp":"〇。法66条の10第2項のとおり。医師等は労働者の同意を得ないで検査の結果を事業者に提供してはならない。","page":148,"detail":"〇。法66条の10第2項のとおりで正しい。テキストp.148は、医師等は、あらかじめ当該検査を受けた労働者の同意を得ないで、当該労働者の検査の結果を事業者に提供してはならないとしている。設問は本文どおりである。同意は書面又は電磁的記録による。根拠は法66条の10第2項。"},{"law":"健康診断・健康管理","cat":"ストレスチェックの努力義務化","q":"産業医の選任が義務づけられている事業場以外の事業場(50人未満の労働者を使用する事業場)においては、ストレスチェック等の規定の適用について、当分の間、努力義務とされている。","a":true,"exp":"〇。法附則4条のとおり。50人未満の事業場ではストレスチェック等は当分の間、努力義務とされている。","page":148,"detail":"〇。法附則4条のとおりで正しい。テキストp.148は、注意として、産業医の選任が義務づけられている事業場以外の事業場(50人未満の労働者を使用する事業場)においては、ストレスチェック等の規定の適用について当分の間、行うように努めなければならない努力義務とされているとしている。設問は本文どおりである。根拠は法附則4条。"},{"law":"健康診断・健康管理","cat":"ストレスチェックに係る面接指導の記録","q":"事業者は、長時間労働者に対する面接指導の結果に基づき、その結果の記録を作成して、これを<b>3年間</b>保存しなければならない。","a":false,"exp":"×。則52条の6。長時間労働者に対する面接指導の結果の記録は5年間保存しなければならない。3年間ではない。","page":151,"detail":"×。則52条の6により誤り。テキストp.140及びp.151は、長時間労働者に対する面接指導の結果の記録は「5年間」保存しなければならないとしている。設問は3年間としており誤り。正しくは5年間である(ストレスチェックに係る面接指導の記録も5年間)。根拠は則52条の6第1項。"},{"law":"健康診断・健康管理","cat":"検査及び面接指導結果の報告","q":"常時<b>50人以上</b>の労働者を使用する事業者は、1年以内ごとに1回、定期に、ストレスチェック及び面接指導の結果等について、所定の事項を所轄労働基準監督署長に報告しなければならない。","a":true,"exp":"〇。則52条の21のとおり。常時50人以上の事業者は1年以内ごとに1回、検査及び面接指導の結果等を報告する。","page":152,"detail":"〇。則52条の21のとおりで正しい。テキストp.152は、常時50人以上の労働者を使用する事業者は、1年以内ごとに1回、定期に、電子情報処理組織を使用して、検査及び面接指導の結果等について所定の事項を所轄労働基準監督署長に報告しなければならないとしている。設問は本文どおりである。根拠は則52条の21。"},{"law":"健康診断・健康管理","cat":"秘密の保持","q":"健康診断、面接指導、ストレスチェック等の実施の事務に従事した者は、その実施に関して知り得た労働者の秘密を漏らしてはならない。","a":true,"exp":"〇。法105条のとおり。健康診断・面接指導・ストレスチェック等の実施の事務に従事した者は労働者の秘密を漏らしてはならない。","page":153,"detail":"〇。法105条のとおりで正しい。テキストp.153は、健康診断、長時間労働者・研究開発業務従事者・高度プロフェッショナル制度対象労働者に対する面接指導、ストレスチェック又はこれに係る面接指導の実施の事務に従事した者は、その実施に関して知り得た労働者の秘密を漏らしてはならないとしている。設問は本文どおりである。根拠は法105条。"},{"law":"健康診断・健康管理","cat":"健康管理手帳の交付","q":"健康管理手帳は、都道府県労働局長が、がんその他の重度の健康障害を生ずるおそれのある業務で政令で定めるものに従事していた者のうち所定の要件に該当する者からの申請に基づいて交付する。","a":true,"exp":"〇。法67条1項、則53条のとおり。健康管理手帳は都道府県労働局長が所定要件に該当する者からの申請に基づき交付する。","page":154,"detail":"〇。法67条1項及び則53条のとおりで正しい。テキストp.154は、健康管理手帳は都道府県労働局長が、がんその他の重度の健康障害を生ずるおそれのある業務で政令で定めるものに従事していた者のうち、厚生労働省令で定める要件に該当する者からの申請に基づいて交付するとしている。設問は本文どおりである。根拠は法67条1項、則53条。"},{"law":"健康診断・健康管理","cat":"健康管理手帳の譲渡禁止","q":"健康管理手帳の交付を受けた者は、当該健康管理手帳を他人に譲渡し、又は貸与してはならない。","a":true,"exp":"〇。法67条3項のとおり。健康管理手帳の交付を受けた者は当該手帳を他人に譲渡・貸与してはならない。","page":154,"detail":"〇。法67条3項のとおりで正しい。テキストp.154は、健康管理手帳の交付を受けた者は、当該健康管理手帳を他人に譲渡し、又は貸与してはならないとしている。設問は本文どおりである。根拠は法67条3項。"},{"law":"健康診断・健康管理","cat":"病者の就業禁止","q":"事業者は、病毒伝ぱのおそれのある伝染性の疾病にかかった者等についてその就業を禁止しようとするときは、あらかじめ、産業医その他専門の医師の意見をきかなければならない。","a":true,"exp":"〇。法68条、則61条のとおり。一定の疾病にかかった者の就業を禁止する場合は、あらかじめ産業医その他専門の医師の意見をきく。","page":155,"detail":"〇。法68条及び則61条のとおりで正しい。テキストp.155は、病者の就業を禁止しようとするときは、あらかじめ、産業医その他専門の医師の意見をきかなければならないとしている。病毒伝ぱのおそれのある伝染性の疾病にかかった者等が対象となる。設問は本文どおりである。根拠は法68条、則61条。"},{"law":"健康診断・健康管理","cat":"受動喫煙の防止","q":"事業者は、室内又はこれに準ずる環境における労働者の受動喫煙を防止するため、当該事業者及び事業場の実情に応じ適切な措置を講ずるよう努めるものとされている。","a":true,"exp":"〇。法68条の2のとおり。受動喫煙の防止のため実情に応じ適切な措置を講ずるよう努める努力義務である。","page":156,"detail":"〇。法68条の2のとおりで正しい。テキストp.156は、事業者は室内又はこれに準ずる環境における労働者の受動喫煙を防止するため、当該事業者及び事業場の実情に応じ適切な措置を講ずるよう「努めるものとする」としている。設問は本文の努力義務どおりである。根拠は法68条の2。"},{"law":"健康診断・健康管理","cat":"快適な職場環境の形成","q":"事業者は、安全衛生の水準の向上を図るため、作業環境を快適な状態に維持管理するための措置等を継続的かつ計画的に講ずることにより、快適な職場環境を形成するように努めなければならない。","a":true,"exp":"〇。法71条の2のとおり。快適な職場環境を形成するように努めなければならない努力義務である。","page":157,"detail":"〇。法71条の2のとおりで正しい。テキストp.157は、事業者は安全衛生の水準の向上を図るため、作業環境を快適な状態に維持管理するための措置等を継続的かつ計画的に講ずることにより、快適な職場環境を形成するように「努めなければならない」としている。設問は本文の努力義務どおりである。根拠は法71条の2。"},{"law":"その他(計画届・監督・罰則)","cat":"特別安全衛生改善計画","q":"厚生労働大臣は、重大な労働災害が発生した場合において、所定の場合に該当すると認めるときは、事業者に対し、特別安全衛生改善計画を作成し、これを厚生労働大臣に提出すべきことを指示することができる。","a":true,"exp":"〇。法78条1項のとおり。厚生労働大臣は所定の場合に特別安全衛生改善計画の作成・提出を指示できる。","page":160,"detail":"〇。法78条1項のとおりで正しい。テキストp.160は、厚生労働大臣は重大な労働災害が発生した場合において、その再発を防止するため必要がある場合として厚生労働省令で定める場合に該当すると認めるときは、事業者に対し、特別安全衛生改善計画を作成し、これを厚生労働大臣に提出すべきことを指示することができるとしている。設問は本文どおりである。根拠は法78条1項。"},{"law":"その他(計画届・監督・罰則)","cat":"安全衛生改善計画","q":"都道府県労働局長は、労働災害の防止を図るため総合的な改善措置を講ずる必要があると認めるときは、事業者に対し、安全衛生改善計画を作成すべきことを指示することができる。","a":true,"exp":"〇。法79条のとおり。都道府県労働局長は必要があると認めるとき安全衛生改善計画の作成を指示できる。","page":162,"detail":"〇。法79条のとおりで正しい。テキストp.162は、都道府県労働局長は、事業場の施設その他の事項について労働災害の防止を図るため総合的な改善措置を講ずる必要があると認めるときは、事業者に対し安全衛生改善計画を作成すべきことを指示することができるとしている。設問は本文どおりである。特別安全衛生改善計画が厚生労働大臣である点と区別する。根拠は法79条。"},{"law":"その他(計画届・監督・罰則)","cat":"危険・有害作業に係る届出","q":"事業者は、機械等で危険又は有害な作業を必要とするもの等のうち厚生労働省令で定めるものを設置等しようとするときは、その計画を当該工事開始日の<b>30日前</b>までに、労働基準監督署長に届け出なければならない。","a":true,"exp":"〇。法88条1項、則85条のとおり。危険・有害作業に係る機械等の設置等の計画は工事開始日の30日前までに労働基準監督署長に届け出る。","page":166,"detail":"〇。法88条1項及び則85条のとおりで正しい。テキストp.166は、事業者は機械等で危険又は有害な作業を必要とするもの等のうち厚生労働省令で定めるものを設置・移転・主要構造部分の変更をしようとするときは、その計画を当該工事開始日の「30日前」までに労働基準監督署長に届け出なければならないとしている。設問は本文どおりである。根拠は法88条1項、則85条。"},{"law":"その他(計画届・監督・罰則)","cat":"計画届出の免除","q":"法28条の2第1項に規定する措置等を講じているものとして労働基準監督署長が認定した事業者については、危険・有害作業に係る届出の義務が免除される。","a":true,"exp":"〇。法88条1項のとおり。一定の措置を講じているものとして労働基準監督署長の認定を受けた事業者は当該届出義務が免除される。","page":167,"detail":"〇。法88条1項のとおりで正しい。テキストp.167は、法28条の2第1項に規定する措置その他の措置を講じているものとして労働基準監督署長が認定した事業者については、危険・有害作業に係る届出の義務が免除されるとしている。設問は本文どおりである。認定は事業場ごとに所轄労働基準監督署長が行う。根拠は法88条1項。"},{"law":"その他(計画届・監督・罰則)","cat":"計画届出免除の認定の更新","q":"計画届出の免除に係る認定は、<b>5年</b>ごとにその更新を受けなければ、その期間の経過によってその効力を失う。","a":false,"exp":"×。則87条の6第1項。計画届出の免除に係る認定は3年ごとに更新を受けなければ効力を失う。5年ごとではない。","page":167,"detail":"×。則87条の6第1項により誤り。テキストp.167は、注意として、計画届出の免除に係る認定は「3年ごと」にその更新を受けなければ、その期間の経過によってその効力を失うとしている。設問は5年ごととしており誤り。正しくは3年ごとである。根拠は則87条の6第1項。"},{"law":"その他(計画届・監督・罰則)","cat":"特に大規模な建設業の仕事の届出","q":"事業者は、建設業に属する事業の仕事のうち特に大規模な仕事で厚生労働省令で定めるものを開始しようとするときは、その計画を当該仕事開始日の<b>14日前</b>までに、厚生労働大臣に届け出なければならない。","a":false,"exp":"×。法88条2項。特に大規模な建設業の仕事の計画は仕事開始日の30日前までに厚生労働大臣に届け出る。14日前ではない。","page":168,"detail":"×。法88条2項により誤り。テキストp.168は、事業者は建設業に属する事業の仕事のうち特に大規模な仕事で厚生労働省令で定めるものを開始しようとするときは、その計画を当該仕事開始日の「30日前」までに厚生労働大臣に届け出なければならないとしている。設問は14日前としており誤り。高さ300メートル以上の塔の建設等が対象で、30日前までである。根拠は法88条2項。"},{"law":"その他(計画届・監督・罰則)","cat":"建設業等の仕事の届出","q":"事業者は、建設業又は土石採取業に属する事業の仕事で厚生労働省令で定めるものを開始しようとするときは、その計画を当該仕事開始日の<b>30日前</b>までに、労働基準監督署長に届け出なければならない。","a":false,"exp":"×。法88条3項。建設業等の一定の仕事の計画は仕事開始日の14日前までに労働基準監督署長に届け出る。30日前ではない。","page":168,"detail":"×。法88条3項により誤り。テキストp.168は、事業者は建設業又は土石採取業に属する事業の仕事で厚生労働省令で定めるものを開始しようとするときは、その計画を当該仕事開始日の「14日前」までに労働基準監督署長に届け出なければならないとしている。設問は30日前としており誤り。30日前は特に大規模な仕事(厚生労働大臣あて)である。根拠は法88条3項。"},{"law":"その他(計画届・監督・罰則)","cat":"計画の差止め・変更命令","q":"労働基準監督署長又は厚生労働大臣は、計画の届出があった場合において、当該届出に係る事項が労働安全衛生法等に違反すると認めるときは、工事もしくは仕事の開始を差し止め、又は計画を変更すべきことを命ずることができる。","a":true,"exp":"〇。法88条6項のとおり。違反すると認めるときは工事・仕事の開始の差止め又は計画の変更を命ずることができる。","page":169,"detail":"〇。法88条6項のとおりで正しい。テキストp.169は、労働基準監督署長又は厚生労働大臣は、計画の届出があった場合において当該届出に係る事項が労働安全衛生法等に違反すると認めるときは、その届出に係る工事もしくは仕事の開始を差し止め、又は当該計画を変更すべきことを命ずることができるとしている。設問は本文どおりである。根拠は法88条6項。"},{"law":"その他(計画届・監督・罰則)","cat":"使用停止命令等","q":"都道府県労働局長又は労働基準監督署長は、事業者の講ずべき措置等の各規定に違反する事実があるときは、その違反した事業者等に対し、作業の全部又は一部の停止等必要な事項を命ずることができる。","a":true,"exp":"〇。法98条1項のとおり。違反する事実があるとき作業の停止等必要な事項を命ずることができる。","page":171,"detail":"〇。法98条1項のとおりで正しい。テキストp.171は、都道府県労働局長又は労働基準監督署長は、事業者の講ずべき措置等の各規定に違反する事実があるときは、その違反した事業者等に対し、作業の全部又は一部の停止、建設物等の使用の停止又は変更その他労働災害を防止するため必要な事項を命ずることができるとしている。設問は本文どおりである。根拠は法98条1項。"},{"law":"その他(計画届・監督・罰則)","cat":"労働者死傷病報告","q":"事業者は、労働者が労働災害等により死亡し、又は休業をしたときは、休業日数が4日未満であっても、その都度遅滞なく所轄労働基準監督署長に報告しなければならない。","a":false,"exp":"×。則97条。休業日数が4日未満であるときは、四半期ごとに、それぞれの期間における最後の月の翌月末日までに報告すればよい。都度遅滞なくではない。","page":172,"detail":"×。則97条により誤り。テキストp.172は、労働災害等により死亡又は休業をしたときは遅滞なく報告するが、休業日数が4日未満であるときは、四半期(1〜3月、4〜6月、7〜9月、10〜12月)ごとに、それぞれの期間における最後の月の翌月末日までに報告すればよいとしている。設問は4日未満でも都度遅滞なく報告するとしており誤り。根拠は則97条。"},{"law":"その他(計画届・監督・罰則)","cat":"事故報告","q":"事業者は、事業場内で火災又は爆発の事故等所定の事故が発生したときは、負傷した労働者の有無にかかわらず、遅滞なく、報告書を所轄労働基準監督署長に提出しなければならない。","a":true,"exp":"〇。則96条のとおり。所定の事故が発生したときは負傷した労働者の有無にかかわらず報告書を提出する。","page":172,"detail":"〇。則96条のとおりで正しい。テキストp.172は、事業者は事業場又はその附属建設物内で火災又は爆発の事故等所定の事故やボイラーの破裂等の事故が発生したときは、遅滞なく報告書を所轄労働基準監督署長に提出しなければならず、負傷した労働者の有無にかかわらず提出しなければならないとしている。設問は本文どおりである。根拠は則96条。"},{"law":"その他(計画届・監督・罰則)","cat":"罰則","q":"作業主任者の選任義務に違反した者には、6か月以下の拘禁刑又は50万円以下の罰金が科される。","a":true,"exp":"〇。法119条等のとおり。作業主任者の選任義務違反は6か月以下の拘禁刑又は50万円以下の罰金が科される。","page":176,"detail":"〇。法119条等のとおりで正しい。テキストp.176は、6か月以下の拘禁刑又は50万円以下の罰金に該当する違反として、作業主任者の選任義務に違反した者を挙げている。設問は本文どおりである。根拠は法119条等。"},{"law":"その他(計画届・監督・罰則)","cat":"罰則","q":"元方事業者が指導や指示を行う義務の規定や職長等の教育の規定に違反したときは、罰則が科される。","a":false,"exp":"×。罰則の項目のとおり。元方事業者の講ずべき措置(指導・指示)の規定や職長等の教育の規定に違反しても罰則は科されない。","page":177,"detail":"×。p.177の罰則の整理により誤り。テキストp.177は、「元方事業者の講ずべき措置(元方事業者が指導や指示を行う義務)」の規定や「職長等の教育」の規定に違反したとしても、罰則は科されないと明記している。設問は罰則が科されるとしており誤り。根拠はp.177の罰則の項目。"},{"law":"その他(計画届・監督・罰則)","cat":"両罰規定","q":"法人の従業者等がその法人の業務に関して一定の違反行為をしたときは、行為者を罰するほか、その法人に対しても罰金刑を科す。","a":true,"exp":"〇。法122条のとおり。両罰規定により行為者を罰するほか、法人に対しても罰金刑を科す。","page":177,"detail":"〇。法122条のとおりで正しい。テキストp.177は、法人の代表者又は法人もしくは人の代理人、使用人その他の従業者がその法人又は人の業務に関して一定の違反行為をしたときは、行為者を罰するほか、その法人又は人に対してもそれぞれの罰金刑を科すとしている。設問は本文の両罰規定どおりである。根拠は法122条。"}],"rousai":[{"law":"総則","cat":"目的","q":"労災保険は、業務上の事由、複数事業労働者の2以上の事業の業務を要因とする事由又は通勤による労働者の負傷、疾病、障害、死亡等に対し、迅速かつ公正な保護をするため、必要な保険給付を行うことを目的の一つとしている。","a":true,"exp":"〇。法1条。労災保険は業務上の事由・複数業務要因災害・通勤による負傷等に対し迅速かつ公正な保護を行う。あわせて社会復帰の促進等を図り、もって労働者の福祉の増進に寄与することを目的とする。","page":13,"detail":"〇。本問は正しい。法1条は、労災保険が、業務上の事由、複数事業労働者の2以上の事業の業務を要因とする事由又は通勤による労働者の負傷、疾病、障害、死亡等に対し、迅速かつ公正な保護をするため、必要な保険給付を行うとする。あわせて、これらにより負傷・疾病にかかった労働者の社会復帰の促進、当該労働者及びその遺族の援護、労働者の安全及び衛生の確保等を図り、もって労働者の福祉の増進に寄与することを目的とする。本問は迅速かつ公正な保護のための保険給付という目的の一つを述べたもので適切である。"},{"law":"総則","cat":"管掌","q":"労災保険は、都道府県が管掌する。","a":false,"exp":"×。法2条。労災保険は政府が管掌する。都道府県ではない。","page":15,"detail":"×。本問は誤り。法2条は「労災保険は、政府が管掌する」と定めており、都道府県が管掌するのではない。労災保険事業は国(政府)が運営主体となる制度であり、本問は管掌主体を誤っている点で適切でない。"},{"law":"総則","cat":"保険給付の種類","q":"労災保険法による保険給付には、業務災害に関する保険給付、複数業務要因災害に関する保険給付、通勤災害に関する保険給付及び二次健康診断等給付がある。","a":true,"exp":"〇。法7条1項。保険給付は、業務災害・複数業務要因災害・通勤災害に関する保険給付及び二次健康診断等給付の4種である。","page":14,"detail":"〇。本問は正しい。法7条1項により、労災保険法による保険給付は、業務上の負傷・疾病・障害・死亡(業務災害)に関する保険給付、複数事業労働者の2以上の事業の業務を要因とする負傷等(複数業務要因災害)に関する保険給付、通勤による負傷等(通勤災害)に関する保険給付、及び二次健康診断等給付の4種とされている。本問はこの4種を正しく挙げている。"},{"law":"総則","cat":"被保険者概念","q":"労災保険には、健康保険や厚生年金保険と同様に被保険者という概念がある。","a":false,"exp":"×。保険料の全額を事業主が負担し、事故が起きたときは事業主の災害補償に代わり労災保険が給付を行う仕組みから、労災保険には被保険者という概念はない。","page":12,"detail":"×。本問は誤り。労災保険は、保険料の全額を事業主が負担し、労働者が災害にあったときに事業主の災害補償に代わって労災保険が労働者に保険給付を行う仕組みである。テキストp.12はこの仕組みから「労災保険には被保険者という概念はありません」と明記しており、健康保険や厚生年金保険と同様に被保険者という概念があるとする本問は適切でない。"},{"law":"総則","cat":"二次健診事務","q":"保険給付のうち二次健康診断等給付に関する事務は、所轄労働基準監督署長が行う。","a":false,"exp":"×。則1条等。二次健康診断等給付に係る事務に限り、所轄都道府県労働局長が行う。所轄労働基準監督署長ではない。他の保険給付は原則として所轄労働基準監督署長が行う。","page":15,"detail":"×。本問は誤り。則1条等によれば、労災保険に関する事務は原則として所轄労働基準監督署長が行うが、二次健康診断等給付に係る事務に限り、所轄都道府県労働局長が行う。テキストp.15の注意書きも「保険給付のうち二次健康診断等給付に関する事務は、都道府県労働局長が行います」とする。したがって所轄労働基準監督署長が行うとする本問は適切でない。"},{"law":"総則","cat":"国庫補助","q":"国庫は、予算の範囲内において、労働者災害補償保険事業に要する費用の一部を補助しなければならない。","a":false,"exp":"×。法32条。国庫は予算の範囲内で費用の一部を補助することが「できる」とされており、義務ではない。「補助しなければならない」とする点が誤りである。","page":16,"detail":"×。本問は誤り。法32条は「国庫は、予算の範囲内において、労働者災害補償保険事業に要する費用の一部を補助することができる」と定めており、補助は政府の任意であって義務ではない。「補助しなければならない」とする本問は、できる規定を義務と誤っている点で適切でない。"},{"law":"総則","cat":"保険料負担","q":"労災保険の保険料は、事業主と労働者が折半して負担する。","a":false,"exp":"×。労災保険の保険料は、事業主が全額負担する。労働者の負担はない。","page":16,"detail":"×。本問は誤り。テキストp.16によれば、労災保険の保険料は事業主が全額負担し、労働者の負担はない。これは保険の仕組み上、災害補償責任を負う事業主が保険料を支払うことによる。事業主と労働者が折半して負担するとする本問は適切でない。"},{"law":"総則","cat":"適用単位","q":"労災保険法は、個々の労働者ごとに適用される。","a":false,"exp":"×。法3条1項。労災保険法は「事業」ごとに適用され、個々の労働者ごとに適用されるのではない。","page":17,"detail":"×。本問は誤り。法3条1項により、労災保険法は労働者を使用する「事業」を適用事業とし、適用は事業ごとに行われる。テキストp.17も「労災保険法は『事業』ごとに適用されます。個々の『労働者』ごとに適用されるのではありません」とする。個々の労働者ごとに適用されるとする本問は適切でない。"},{"law":"総則","cat":"強制適用","q":"適用除外や暫定任意適用事業に該当しなければ、届出の有無にかかわらず、当然に労災保険法が適用される。","a":true,"exp":"〇。このように当然に適用される事業を強制適用事業という。届出の有無は適用に関係しない。","page":17,"detail":"〇。本問は正しい。テキストp.17の注意書きは、適用除外又は暫定任意適用事業に該当しなければ、届出の有無にかかわらず当然に労災保険法が適用され、このように当然に適用される事業を強制適用事業というとする。届出の有無は適用に関係しないので本問は適切である。"},{"law":"総則","cat":"暫定任意適用事業","q":"個人経営の農業のうち、常時10人未満の労働者を使用する事業は、原則として暫定任意適用事業に該当する。","a":false,"exp":"×。整備政令17条等。個人経営の農業で原則として暫定任意適用事業に該当するのは、常時「5人未満」の労働者を使用する事業である。10人未満ではない。","page":18,"detail":"×。本問は誤り。整備政令17条等及びテキストp.18によれば、個人経営の農業(畜産・養蚕を含む)のうち暫定任意適用事業に該当するのは、原則として常時5人未満の労働者を使用する事業である。常時10人未満とする本問は人数の基準を誤っている点で適切でない。"},{"law":"総則","cat":"適用労働者","q":"不法就労の外国人労働者には、労災保険法は適用されない。","a":false,"exp":"×。適用労働者は国籍を問わず、不法就労であるか否かも問わない。適用事業に使用される労働者であれば労災保険法が適用される。","page":20,"detail":"×。本問は誤り。テキストp.20によれば、適用労働者は性別・年齢を問わず、国籍も問わず、不法就労であるか否かも問わない。適用事業に使用される労働者であれば労災保険法が適用される。したがって不法就労の外国人労働者には適用されないとする本問は適切でない。"},{"law":"総則","cat":"派遣労働者","q":"派遣労働者は、派遣先事業主の事業に係る保険関係により適用を受ける。","a":false,"exp":"×。派遣労働者は、派遣元事業主の事業に係る保険関係により適用を受ける。派遣先ではない。","page":20,"detail":"×。本問は誤り。テキストp.20は「派遣労働者は、派遣元事業主の事業に係る保険関係により適用を受けます」とする。派遣先事業主の事業に係る保険関係により適用を受けるとする本問は適切でない。"},{"law":"総則","cat":"適用除外","q":"国家公務員及び地方公務員の事務部門(非現業)の官公署の事業には、労災保険法は適用されない。","a":true,"exp":"〇。法3条2項。官公署の事業(労働基準法別表1に掲げる事業を除く)は適用除外とされ、非現業の官公署を指す。適用除外は法律上当然に行われる。","page":21,"detail":"〇。本問は正しい。法3条2項により、官公署の事業(労働基準法別表1に掲げる事業を除く)には労災保険法が適用されない。テキストp.21はこれを国家公務員及び地方公務員の事務部門(一般職・非現業)の役所を指すと説明し、適用除外は許可・認可・承認等を要せず法律上当然に行われるとする。本問は適切である。"},{"law":"業務災害・通勤災害","cat":"業務上の判断","q":"「業務上の事由による」と認定されるためには、業務遂行性と業務起因性の2つの条件を満たす必要がある。","a":true,"exp":"〇。業務上と認定されるには、業務遂行性があることと業務起因性があることの2つの条件を満たす必要がある。","page":24,"detail":"〇。本問は正しい。テキストp.24は、業務上の事由によると認定されるためには、業務遂行性があることと業務起因性があることの2つの条件を満たす必要があるとする。本問はこの2要件を正しく述べている。"},{"law":"業務災害・通勤災害","cat":"業務起因性","q":"業務起因性が成立するためには、その前提として業務遂行性が認められなければならない。","a":true,"exp":"〇。業務起因性が成立するためには、その前提として業務遂行性が認められなければならない。両者は相当因果関係の有無により判断される。","page":25,"detail":"〇。本問は正しい。テキストp.25は、業務起因性が成立するためにはその前提として業務遂行性が認められなければならないとする。業務起因性とは事業主の支配下にあることに伴う危険が現実化したものと経験則上認められること、すなわち業務と傷病等との間に相当因果関係があることをいう。本問は適切である。"},{"law":"業務災害・通勤災害","cat":"休憩時間中の災害","q":"休憩時間中の災害は、事業場施設又はその管理に起因することが証明されない限り、一般には私的行為に起因するものと推定され、業務起因性が認められない。","a":true,"exp":"〇。昭30.5.12基発298号等。休憩時間中の災害は事業場施設等に起因することが証明されない限り、一般に私的行為と推定され業務起因性は認められない。","page":28,"detail":"〇。本問は正しい。テキストp.28(昭30.5.12基発298号)によれば、休憩時間中の災害は、事業場施設又はその管理に起因することが証明されない限り、一般には私的行為に起因するものと推定され業務起因性が認められない。ただし就業中であれば業務行為に含まれたであろう生理的必要行為等は業務付随行為として判断される。本問は原則を正しく述べている。"},{"law":"業務災害・通勤災害","cat":"出張中の災害","q":"出張中は、特別の事情がない限り、一応その出張過程全般を業務行為とみる。","a":true,"exp":"〇。出張中は特別の事情がない限り出張過程全般を業務行為とみるため、積極的な私用・私的行為等を除き一般に業務遂行性が認められる。","page":29,"detail":"〇。本問は正しい。テキストp.29によれば、出張中は特別の事情がない限り一応その出張過程全般を業務行為とみるため、出張中の個々の行為については積極的な私用・私的行為・恣意的行為等であるものを除き、一般に出張に当然又は通常伴う行為として業務遂行性が認められる。本問は適切である。"},{"law":"業務災害・通勤災害","cat":"業務上の疾病","q":"業務上の疾病の範囲は、労働基準法施行規則別表1の2に掲げる疾病とされている。","a":true,"exp":"〇。労働基準法75条、則35条、別表1の2。業務上の疾病の範囲は厚生労働省令で定めるとされ、労働基準法施行規則別表1の2に掲げる疾病とされている。","page":32,"detail":"〇。本問は正しい。労働基準法75条、則35条、別表1の2及びテキストp.32によれば、業務上の疾病の範囲は厚生労働省令で定めるとされ、具体的には労働基準法施行規則別表1の2に掲げる疾病とされている。本問はこの範囲を正しく述べている。"},{"law":"業務災害・通勤災害","cat":"脳・心臓疾患","q":"脳・心臓疾患の認定基準において、「発症前の長期間」とは、発症前おおむね1年間をいう。","a":false,"exp":"×。令5.10.18基発1018第1号。「発症前の長期間」とは、発症前おおむね6か月間をいう。1年間ではない。","page":35,"detail":"×。本問は誤り。令5.10.18基発1018第1号及びテキストp.35は、脳・心臓疾患の認定基準における「発症前の長期間」とは発症前おおむね6か月間をいうとする。1年間とする本問は期間を誤っている点で適切でない。"},{"law":"業務災害・通勤災害","cat":"脳・心臓疾患","q":"脳・心臓疾患の認定基準では、発症前1か月間ないし6か月間にわたって1か月当たりおおむね45時間を超える時間外労働が認められない場合であっても、業務と発症との関連性は強いと評価される。","a":false,"exp":"×。令5.10.18基発1018第1号。発症前1か月ないし6か月にわたって月おおむね45時間を超える時間外労働が認められない場合は、業務と発症との関連性が「弱い」と評価される。","page":35,"detail":"×。本問は誤り。令5.10.18基発1018第1号及びテキストp.35によれば、発症前1か月間ないし6か月間にわたって1か月当たりおおむね45時間を超える時間外労働が認められない場合は、業務と発症との関連性が「弱い」と評価される。45時間を超えて長くなるほど関連性が強まる。関連性が強いと評価されるとする本問は適切でない。"},{"law":"業務災害・通勤災害","cat":"精神障害認定","q":"心理的負荷による精神障害の認定基準では、対象疾病の発病前おおむね3か月の間に、業務による強い心理的負荷が認められることが要件の一つである。","a":false,"exp":"×。令5.9.1基発0901第2号。発病前「おおむね6か月」の間に業務による強い心理的負荷が認められることが要件の一つとされている。3か月ではない。","page":36,"detail":"×。本問は誤り。令5.9.1基発0901第2号及びテキストp.36によれば、心理的負荷による精神障害の認定基準では、対象疾病の発病前おおむね6か月の間に業務による強い心理的負荷が認められることが要件の一つとされている。発病前おおむね3か月とする本問は期間を誤っている点で適切でない。"},{"law":"業務災害・通勤災害","cat":"異常な出来事","q":"異常な出来事と発症との関連性については、通常、負荷を受けてから48時間以内に症状が出現するとされている。","a":false,"exp":"×。令5.10.18基発1018第1号。異常な出来事は通常、負荷を受けてから24時間以内に症状が出現するとされ、発症直前から前日までの間を評価期間とする。","page":36,"detail":"×。本問は誤り。令5.10.18基発1018第1号及びテキストp.36によれば、異常な出来事と発症との関連性については、通常、負荷を受けてから24時間以内に症状が出現するとされ、発症直前から前日までの間を評価期間とする。48時間以内とする本問は時間を誤っている点で適切でない。"},{"law":"業務災害・通勤災害","cat":"複数業務要因災害","q":"複数業務要因災害とは、複数事業労働者の2以上の事業の業務を要因とする負傷、疾病、障害又は死亡のことである。","a":true,"exp":"〇。法7条1項。複数業務要因災害とは、複数事業労働者の2以上の事業の業務を要因とする負傷・疾病・障害又は死亡をいう。","page":39,"detail":"〇。本問は正しい。法7条1項及びテキストp.39によれば、複数業務要因災害とは、複数事業労働者の2以上の事業の業務を要因とする負傷・疾病・障害又は死亡のことである。本問は定義を正しく述べている。"},{"law":"業務災害・通勤災害","cat":"複数業務要因災害","q":"複数業務要因災害に関する保険給付については、それぞれの就業先が労働基準法上の災害補償責任を負う。","a":false,"exp":"×。令2.8.21基発0821第1号。複数業務要因災害は、それぞれの就業先の業務上の負荷のみでは因果関係が認められないため、いずれの就業先も労働基準法上の災害補償責任は負わない。","page":39,"detail":"×。本問は誤り。令2.8.21基発0821第1号及びテキストp.39によれば、複数業務要因災害は、それぞれの就業先の業務上の負荷のみでは業務と疾病等との間に因果関係が認められないことから、いずれの就業先も労働基準法上の災害補償責任は負わないものとされている。それぞれの就業先が災害補償責任を負うとする本問は適切でない。"},{"law":"業務災害・通勤災害","cat":"通勤災害","q":"通勤災害とは、労働者の通勤による負傷、疾病、障害又は死亡のことである。","a":true,"exp":"〇。法7条1項。通勤災害とは、労働者の通勤による負傷・疾病・障害又は死亡をいう。","page":41,"detail":"〇。本問は正しい。法7条1項及びテキストp.41によれば、通勤災害とは、労働者の通勤による負傷・疾病・障害又は死亡のことである。本問は定義を正しく述べている。"},{"law":"業務災害・通勤災害","cat":"通勤の定義","q":"通勤とは、労働者が就業に関し、所定の移動を合理的な経路及び方法により行うことをいい、業務の性質を有するものを含む。","a":false,"exp":"×。法7条2項。通勤は所定の移動を合理的な経路及び方法により行うことをいい、業務の性質を有するものは「除く」。","page":42,"detail":"×。本問は誤り。法7条2項及びテキストp.42によれば、通勤とは、労働者が就業に関し、所定の移動を合理的な経路及び方法により行うことをいい、業務の性質を有するものは「除く」ものとされる。業務の性質を有するものを含むとする本問は適切でない。"},{"law":"業務災害・通勤災害","cat":"就業に関し","q":"遅刻や早退をしただけでは、就業との関連性は失われない。","a":true,"exp":"〇。平28.12.28基発1228第1号。遅刻や早退をしただけでは就業との関連性は失われない。","page":42,"detail":"〇。本問は正しい。平28.12.28基発1228第1号及びテキストp.42によれば、「就業に関し」とは移動行為が業務に就くため又は業務を終えたことにより行われることをいい、遅刻や早退をしただけでは就業との関連性は失われない。本問は適切である。"},{"law":"業務災害・通勤災害","cat":"合理的な方法","q":"単なる免許証不携帯や免許証更新忘れによる無免許運転の場合は、必ずしも合理性を欠くものとして取り扱う必要はない。","a":true,"exp":"〇。平28.12.28基発1228第1号。免許を一度も取得したことがない者の運転等は合理性を欠くが、単なる免許証不携帯・更新忘れによる無免許運転は必ずしも合理性を欠くものとして扱う必要はない。","page":43,"detail":"〇。本問は正しい。平28.12.28基発1228第1号及びテキストp.43によれば、免許を一度も取得したことがない者の運転や泥酔運転等は合理的な方法と認められないが、単なる免許証不携帯や免許証更新忘れによる無免許運転の場合などは必ずしも合理性を欠くものとして取り扱う必要はない。本問は適切である。"},{"law":"業務災害・通勤災害","cat":"単身赴任者の住居","q":"単身赴任者が週末等に家族の住む自宅へ帰り出勤する場合、自宅との往復に反復・継続性(おおむね毎週1回以上)が認められるときに、通勤として取り扱われる。","a":false,"exp":"×。平28.12.28基発1228第1号。単身赴任者の自宅との往復は、「おおむね毎月1回以上」の反復・継続性が認められるときに通勤として取り扱われる。毎週1回以上ではない。","page":44,"detail":"×。本問は誤り。平28.12.28基発1228第1号及びテキストp.44によれば、単身赴任者などが週末等に家族の住む自宅へ帰り出勤する場合、赴任先の就業場所と自宅との往復に反復・継続性(おおむね毎月1回以上)が認められるときに通勤として取り扱われる。おおむね毎週1回以上とする本問は頻度を誤っている点で適切でない。"},{"law":"業務災害・通勤災害","cat":"逸脱・中断","q":"通勤の経路を逸脱し又は移動を中断した場合は、その逸脱・中断の間に限り通勤とせず、その後の移動は通勤となる。","a":false,"exp":"×。法7条3項。逸脱・中断の間「及びその後の移動」は通勤としない。原則として、逸脱・中断後は通勤に戻らない。","page":48,"detail":"×。本問は誤り。法7条3項及びテキストp.48によれば、通勤の経路を逸脱し又は移動を中断した場合は、その逸脱・中断の間「及びその後の移動」は通勤としない。原則として逸脱・中断後は通勤に戻らない。逸脱・中断の間に限り通勤とせずその後の移動は通勤となるとする本問は適切でない。"},{"law":"業務災害・通勤災害","cat":"逸脱・中断の例外","q":"逸脱・中断が日常生活上必要な行為であって厚生労働省令で定めるものをやむを得ない事由により最小限度のもので行う場合は、当該逸脱・中断の間を除き、合理的な経路に復した後は通勤と認められる。","a":true,"exp":"〇。法7条3項。日常生活上必要な行為をやむを得ない事由で最小限度行う場合は、当該逸脱・中断の間を除き、合理的な経路に復した後は通勤と認められる。","page":48,"detail":"〇。本問は正しい。法7条3項及びテキストp.48によれば、逸脱・中断が日常生活上必要な行為であって厚生労働省令で定めるものをやむを得ない事由により行うための最小限度のものである場合は、当該逸脱・中断の間を除き、合理的な経路に復した後は通勤と認められる。本問は適切である。"},{"law":"業務災害・通勤災害","cat":"日常生活上必要な行為","q":"病院又は診療所において診察又は治療を受ける行為には、人工透析など比較的長時間を要する医療を受ける行為も含まれる。","a":true,"exp":"〇。則8条、平28.12.28基発1228第1号。診察・治療を受ける行為には人工透析など比較的長時間を要する医療を受ける行為も含まれる。","page":48,"detail":"〇。本問は正しい。則8条、平28.12.28基発1228第1号及びテキストp.48によれば、日常生活上必要な行為の一つである「病院又は診療所において診察又は治療を受けることその他これに準ずる行為」には、人工透析など比較的長時間を要する医療を受ける行為も含まれる。本問は適切である。"},{"law":"業務災害・通勤災害","cat":"ささいな行為","q":"通勤経路上の駅構内でジュース等を立飲みする行為を行う間は、逸脱又は中断とされず、その後の移動も通勤とされる。","a":true,"exp":"〇。平28.12.28基発1228第1号。経路上でジュース等を立飲みする等のささいな行為を行う間は逸脱・中断とされず、その後の移動も通勤とされる。","page":49,"detail":"〇。本問は正しい。平28.12.28基発1228第1号及びテキストp.49によれば、経路上の駅構内でジュース等を立飲みする等のささいな行為を行う間は逸脱又は中断とされず、その間及びその後の移動についても通勤とされる。本問は適切である。"},{"law":"給付基礎日額","cat":"原則","q":"給付基礎日額は、原則として労働基準法12条の平均賃金に相当する額である。","a":true,"exp":"〇。法8条1項。給付基礎日額は、原則として労働基準法12条の平均賃金に相当する額である。","page":52,"detail":"〇。本問は正しい。法8条1項及びテキストp.52によれば、給付基礎日額は、原則として労働基準法12条の平均賃金に相当する額であり、算定事由発生の日以前3か月間に支払われた賃金の総額をその期間の総日数で除して算定する。本問は適切である。"},{"law":"給付基礎日額","cat":"端数処理","q":"給付基礎日額に1円未満の端数があるときは、これを切り捨てる。","a":false,"exp":"×。法8条の5。給付基礎日額に1円未満の端数があるときは、これを1円に「切り上げる」。","page":53,"detail":"×。本問は誤り。法8条の5及びテキストp.53によれば、給付基礎日額に1円未満の端数があるときは、これを1円に「切り上げる」。切り捨てるとする本問は端数処理の方向を誤っている点で適切でない。"},{"law":"給付基礎日額","cat":"最低保障額","q":"平均賃金相当額が自動変更対象額を超えるときは、給付基礎日額は自動変更対象額とされる。","a":false,"exp":"×。法8条2項等。平均賃金相当額が自動変更対象額に「満たない」ときに、給付基礎日額は自動変更対象額とされる。なお令和7年8月1日以後の自動変更対象額は4,250円である。","page":56,"detail":"×。本問は誤り。法8条2項等及びテキストp.56によれば、平均賃金相当額が自動変更対象額に「満たない」ときに、給付基礎日額は自動変更対象額(最低保障額)とされる。なお令和7年8月1日以後の自動変更対象額は4,250円である。自動変更対象額を超えるときとする本問は適切でない。"},{"law":"給付基礎日額","cat":"年齢階層別限度額","q":"休業給付基礎日額への年齢階層別の最低限度額・最高限度額は、休業補償給付等を支給すべき事由が生じた日が療養開始日から起算して1年を経過した日以後である場合に適用される。","a":false,"exp":"×。法8条の2第2項。休業給付基礎日額の年齢階層別限度額は、療養開始日から起算して「1年6か月」を経過した日以後に支給事由が生じた場合に適用される。1年ではない。","page":61,"detail":"×。本問は誤り。法8条の2第2項及びテキストp.61によれば、休業給付基礎日額への年齢階層別の最低限度額・最高限度額は、休業補償給付等を支給すべき事由が生じた日が療養を開始した日から起算して「1年6か月」を経過した日以後である場合に適用される。1年とする本問は期間を誤っている点で適切でない。"},{"law":"給付基礎日額","cat":"特別加入者","q":"特別加入者に係る給付基礎日額には、スライド制も年齢階層別の最低限度額・最高限度額も適用されない。","a":false,"exp":"×。特別加入者の給付基礎日額には、スライド制は適用されるが、年齢階層別の最低限度額・最高限度額は適用されない。","page":61,"detail":"×。本問は誤り。テキストp.61によれば、特別加入者に係る給付基礎日額には、スライド制は適用されるが、年齢階層別の最低限度額・最高限度額は適用されない。スライド制も適用されないとする本問は適切でない。"},{"law":"給付基礎日額","cat":"年金給付基礎日額","q":"年金給付基礎日額には、年金たる保険給付を支給すべき事由がある場合に、支給開始当初から年齢階層別の最低限度額・最高限度額が適用される。","a":true,"exp":"〇。法8条の3第2項。年金給付基礎日額は、支給開始当初から年齢階層別の最低限度額・最高限度額が適用される。休業給付基礎日額とは適用時期が異なる。","page":65,"detail":"〇。本問は正しい。法8条の3第2項等及びテキストp.65によれば、年金給付基礎日額については、年金たる保険給付を支給すべき事由がある場合に支給開始当初から年齢階層別の最低限度額・最高限度額が適用される。療養開始後1年6か月経過後に適用される休業給付基礎日額とは適用時期が異なる。本問は適切である。"},{"law":"給付基礎日額","cat":"完全自動賃金スライド制","q":"年金給付基礎日額のスライド制は、平均給与額が100分の110を超え又は100分の90を下回った場合に限り適用される。","a":false,"exp":"×。年金給付基礎日額は平均給与額の変動幅にかかわらずスライド制が適用され、わずかな変動でもスライド改定が行われる(完全自動賃金スライド制)。10%超の変動要件があるのは休業給付基礎日額である。","page":63,"detail":"×。本問は誤り。テキストp.63によれば、年金給付基礎日額は平均給与額の変動幅にかかわらずスライド制が適用され、変動した比率がわずかであってもスライド改定が行われる(完全自動賃金スライド制)。100分の110を超え又は100分の90を下回るという10%超の変動要件があるのは休業給付基礎日額(法8条の2第1項)である。本問は適切でない。"},{"law":"給付基礎日額","cat":"一時金の給付基礎日額","q":"一時金の給付基礎日額には、年金給付基礎日額と同様のスライド制が適用されるが、年齢階層別の最低限度額・最高限度額は適用されない。","a":true,"exp":"〇。法8条の4。一時金の給付基礎日額には年金と同様のスライド制が適用されるが、年齢階層別の最低限度額・最高限度額は適用されない。","page":66,"detail":"〇。本問は正しい。法8条の4及びテキストp.66によれば、一時金の給付基礎日額には年金給付基礎日額と同様のスライド制が適用されるが、年齢階層別の最低限度額・最高限度額は適用されない。本問は適切である。"},{"law":"療養(補償)給付","cat":"種類","q":"療養補償給付には、療養の給付と療養の費用の支給があり、被災労働者がいずれかを選択して受給できる。","a":false,"exp":"×。法13条。療養補償給付は原則として現物給付(療養の給付)として行われ、被災労働者が選択して受給できるものではない。療養の費用の支給は補完的役割である。","page":72,"detail":"×。本問は誤り。法13条及びテキストp.72によれば、療養補償給付は原則として現物給付(療養の給付)として行われ、療養の給付と療養の費用の支給のいずれかを被災労働者が選択して受給できるものではない。療養の費用の支給は現物給付の補完的役割を果たすものである。選択して受給できるとする本問は適切でない。"},{"law":"療養(補償)給付","cat":"治ゆ","q":"いったん治ゆ(症状固定)した傷病が再発した場合であっても、再び療養の給付を受けることはできない。","a":false,"exp":"×。療養補償給付は傷病が治ゆするまで支給されるが、治ゆ後に再発した場合は、再び療養の給付を受けることができる。","page":74,"detail":"×。本問は誤り。テキストp.74によれば、療養補償給付は傷病が治ゆするまで支給されるが、治ゆ(症状固定)後に再発した場合は、再び療養の給付を受けることができる。再発の要件として、症状の悪化と当初の傷病との相当因果関係、症状の明らかな悪化、療養による改善見込みが認められることを要する。再び受けることはできないとする本問は適切でない。"},{"law":"療養(補償)給付","cat":"費用負担","q":"業務災害に係る療養補償給付では、労働者から療養に要する費用(一部負担金)を徴収する。","a":false,"exp":"×。療養補償給付では労働者から療養に要する費用(一部負担金)を徴収しない。一部負担金が徴収されるのは通勤災害の療養給付である。","page":74,"detail":"×。本問は誤り。テキストp.74によれば、業務災害に係る療養補償給付では、労働者から療養に要する費用(一部負担金)を徴収しない。一部負担金が徴収されるのは通勤災害の療養給付(法31条2項)であり、その額は原則200円である。徴収するとする本問は適切でない。"},{"law":"療養(補償)給付","cat":"支給期間","q":"療養補償給付は、傷病が治ゆするか又は死亡してその傷病について療養の必要がなくなるまでの間、支給される。","a":true,"exp":"〇。療養補償給付は、傷病が治ゆするか又は死亡して療養の必要がなくなるまでの間支給される。治ゆとは症状固定で治療の必要がなくなった状態をいう。","page":74,"detail":"〇。本問は正しい。テキストp.74によれば、療養補償給付は、傷病が治ゆするか又は死亡してその傷病について療養の必要がなくなるまでの間支給される。ここで治ゆとは、症状が安定し疾病が固定した状態になって治療の必要がなくなった場合をいう。本問は適切である。"},{"law":"休業(補償)給付","cat":"支給要件","q":"休業補償給付は、労働者が業務上の負傷又は疾病による療養のため労働することができないために賃金を受けない日に支給される。","a":true,"exp":"〇。法14条1項。休業補償給付は、業務上の負傷又は疾病による療養のため労働できず賃金を受けない日に支給される。","page":77,"detail":"〇。本問は正しい。法14条1項及びテキストp.77によれば、休業補償給付は、労働者が業務上の負傷又は疾病による療養のため労働することができないために賃金を受けない日に支給される。なお1日の一部について労働することができない場合も支給対象となる。本問は適切である。"},{"law":"休業(補償)給付","cat":"支給開始","q":"休業補償給付は、休業した日の第3日目から支給される。","a":false,"exp":"×。法14条1項。休業補償給付は、支給要件を満たした日の第4日目から支給される。最初の3日間は待期期間である。","page":79,"detail":"×。本問は誤り。法14条1項及びテキストp.79によれば、休業補償給付は、支給要件を満たした日の第4日目から支給される。最初の3日間は待期期間であり支給されない。第3日目から支給されるとする本問は適切でない。"},{"law":"休業(補償)給付","cat":"待期期間","q":"休業補償給付の待期期間3日間は、継続している場合に限り成立し、断続している場合は待期期間とされない。","a":false,"exp":"×。休業補償給付は、継続していると断続しているとを問わず、実際に休業した日の第4日目から支給される。待期期間は断続でも成立する。","page":79,"detail":"×。本問は誤り。テキストp.79によれば、休業補償給付は、継続していると断続しているとを問わず、実際に休業した日の第4日目から支給される。すなわち待期期間3日間は断続していても成立する。継続している場合に限り成立するとする本問は適切でない。"},{"law":"休業(補償)給付","cat":"支給額","q":"休業補償給付の額は、休業1日につき給付基礎日額の100分の80に相当する額である。","a":false,"exp":"×。法14条1項。休業補償給付の額は、休業1日につき給付基礎日額の100分の「60」に相当する額である。100分の80ではない。なお待期期間3日間は事業主に休業補償の責任がある。","page":80,"detail":"×。本問は誤り。法14条1項及びテキストp.80によれば、休業補償給付の額は、休業1日につき給付基礎日額の100分の60に相当する額である。100分の80とする本問は給付率を誤っている点で適切でない。なお待期期間3日間については事業主に労働基準法の規定による休業補償の責任がある。"},{"law":"休業(補償)給付","cat":"支給額","q":"休業補償給付の額は、休業1日につき給付基礎日額の100分の60に相当する額である。","a":true,"exp":"〇。法14条1項。休業補償給付の額は、休業1日につき給付基礎日額の100分の60に相当する額である。","page":80,"detail":"〇。本問は正しい。法14条1項及びテキストp.80によれば、休業補償給付の額は、休業1日につき給付基礎日額の100分の60に相当する額である。例えば給付基礎日額が10,000円であればその100分の60の6,000円が支給される。本問は適切である。"},{"law":"休業(補償)給付","cat":"賃金を受けない日","q":"全部労働不能の場合、平均賃金の100分の80未満の金額しか受けない日は「賃金を受けない日」となる。","a":false,"exp":"×。全部労働不能の場合、賃金の全部を受けない日又は平均賃金の100分の「60」未満の金額しか受けない日が「賃金を受けない日」となる。","page":78,"detail":"×。本問は誤り。テキストp.78によれば、全部労働不能の場合、賃金の全部を受けない日、又は平均賃金の100分の「60」未満の金額しか受けない日が「賃金を受けない日」となる。100分の80未満とする本問は割合を誤っている点で適切でない。"},{"law":"休業(補償)給付","cat":"支給制限","q":"労働者が刑事施設に拘禁されている場合(厚生労働省令で定める場合に限る)には、休業補償給付は支給されない。","a":true,"exp":"〇。法14条の2、則12条の4。刑事施設等に拘禁され、又は少年院等に収容されている場合は、休業補償給付は支給されない。これらの期間は待期期間にも含まれない。","page":82,"detail":"〇。本問は正しい。法14条の2、則12条の4及びテキストp.82によれば、労働者が刑事施設・労役場等に拘禁され、又は少年院その他これに準ずる施設に収容されている場合(厚生労働省令で定める場合に限る)には、休業補償給付は支給されない。これらの期間は待期期間にも含まれない。本問は適切である。"},{"law":"傷病(補償)年金","cat":"支給要件","q":"傷病補償年金は、療養の開始後1年を経過した日において、負傷又は疾病が治っておらず、かつ障害の程度が傷病等級に該当するとき等に支給される。","a":false,"exp":"×。法12条の8第3項。傷病補償年金は、療養開始後「1年6か月」を経過した日において治っておらず傷病等級(第1級〜第3級)に該当するとき等に支給される。1年ではない。","page":83,"detail":"×。本問は誤り。法12条の8第3項及びテキストp.83によれば、傷病補償年金は、療養の開始後「1年6か月」を経過した日において、負傷又は疾病が治っておらず、かつ障害の程度が傷病等級(第1級から第3級)に該当するとき等に支給される。1年とする本問は期間を誤っている点で適切でない。"},{"law":"傷病(補償)年金","cat":"支給決定","q":"傷病補償年金は、労働者の請求に基づき支給される。","a":false,"exp":"×。則18条の2。傷病補償年金は労働者の請求に基づくものではなく、所轄労働基準監督署長の職権により支給が決定される。","page":83,"detail":"×。本問は誤り。則18条の2及びテキストp.83によれば、傷病補償年金は労働者の請求に基づくものではなく、支給要件に該当することとなったときに所轄労働基準監督署長の職権により支給が決定される。労働者の請求に基づくとする本問は適切でない。"},{"law":"傷病(補償)年金","cat":"支給額","q":"傷病補償年金の第1級の支給額は、給付基礎日額の313日分である。","a":true,"exp":"〇。法別表1。傷病補償年金は第1級が給付基礎日額の313日分、第2級が277日分、第3級が245日分である。","page":86,"detail":"〇。本問は正しい。法別表1及びテキストp.86によれば、傷病補償年金の支給額は、第1級が給付基礎日額の313日分、第2級が277日分、第3級が245日分である。本問は第1級を正しく述べている。"},{"law":"傷病(補償)年金","cat":"支給額","q":"傷病補償年金の第3級の支給額は、給付基礎日額の277日分である。","a":false,"exp":"×。法別表1。傷病補償年金の第3級は給付基礎日額の245日分である。277日分は第2級の額である。","page":86,"detail":"×。本問は誤り。法別表1及びテキストp.86によれば、傷病補償年金の第3級は給付基礎日額の245日分である。277日分は第2級の額であり、本問は支給額を誤っている点で適切でない。"},{"law":"傷病(補償)年金","cat":"打切補償","q":"療養開始後3年を経過した日において傷病補償年金を受けている場合、使用者は当該3年を経過した日に労働基準法の規定により打切補償を支払ったものとみなされる。","a":true,"exp":"〇。療養開始後3年を経過した日に傷病補償年金を受けている等の場合、使用者は打切補償(平均賃金の1,200日分)を支払ったものとみなされ、解雇制限が解除される。","page":87,"detail":"〇。本問は正しい。テキストp.87によれば、当該負傷又は疾病に係る療養の開始後3年を経過した日において傷病補償年金を受けている場合等には、使用者は当該3年を経過した日に労働基準法の規定により打切補償(平均賃金の1,200日分)を支払ったものとみなされ、解雇制限が解除される。本問は適切である。"},{"law":"障害(補償)給付","cat":"支給区分","q":"障害の程度が障害等級第1級から第7級までに該当するときは障害補償年金、第8級から第14級までに該当するときは障害補償一時金が支給される。","a":true,"exp":"〇。法15条2項。障害等級第1級〜第7級は障害補償年金、第8級〜第14級は障害補償一時金が支給される。","page":89,"detail":"〇。本問は正しい。法15条2項及びテキストp.89によれば、障害の程度が障害等級第1級から第7級までに該当するときは障害補償年金、第8級から第14級までに該当するときは障害補償一時金が支給される。本問は支給区分を正しく述べている。"},{"law":"障害(補償)給付","cat":"支給額","q":"障害補償年金の第1級の支給額は、給付基礎日額の313日分である。","a":true,"exp":"〇。法15条2項、別表1。障害補償年金第1級は給付基礎日額の313日分、第7級は131日分である。","page":89,"detail":"〇。本問は正しい。法15条2項、別表1及びテキストp.89によれば、障害補償年金は第1級が給付基礎日額の313日分であり、第7級は131日分である。本問は第1級の額を正しく述べている。"},{"law":"障害(補償)給付","cat":"支給額","q":"障害補償一時金の第8級の支給額は、給付基礎日額の391日分である。","a":false,"exp":"×。別表2。障害補償一時金の第8級は給付基礎日額の503日分である。391日分は第9級の額である。","page":89,"detail":"×。本問は誤り。別表2及びテキストp.89によれば、障害補償一時金の第8級は給付基礎日額の503日分である。391日分は第9級の額であり、本問は支給額を誤っている点で適切でない。"},{"law":"障害(補償)給付","cat":"併合繰上げ","q":"同一の業務災害による2以上の身体障害のそれぞれが第8級以上に該当するときは、重い方の障害等級を3級繰り上げる。","a":false,"exp":"×。則14条3項。第8級以上に該当する身体障害が2以上あるときは、重い方の障害等級を「2級」繰り上げる。第5級以上が2以上のときに3級繰り上げる。","page":91,"detail":"×。本問は誤り。則14条3項及びテキストp.91によれば、第8級以上に該当する身体障害が2以上あるときは、重い方の障害等級を「2級」繰り上げる。3級繰り上げるのは第5級以上に該当する身体障害が2以上あるときである。3級繰り上げるとする本問は適切でない。"},{"law":"障害(補償)給付","cat":"加重","q":"既存障害が業務災害によるもので障害補償年金を受けている者が加重を受けた場合、同一労働者が同時に2以上の障害補償年金を受ける権利を有することもある。","a":true,"exp":"〇。則14条5項。既存障害が業務災害で障害補償年金を受けている場合、加重により同一労働者が同時に2以上の障害補償年金を受ける権利を有することもある。","page":92,"detail":"〇。本問は正しい。則14条5項及びテキストp.92によれば、加重の取扱いがされる際の既存障害は原因を問わず、既存障害が業務災害によるもので障害補償年金の支給を受けている場合には、加重により同一労働者が同時に2以上の障害補償年金を受ける権利を有することもある。本問は適切である。"},{"law":"障害(補償)給付","cat":"前払一時金","q":"障害補償年金前払一時金の請求は、同一事由について1回限り行うことができる。","a":true,"exp":"〇。則附則27項。障害補償年金前払一時金の請求は、同一事由について1回限り行うことができる。","page":97,"detail":"〇。本問は正しい。則附則27項及びテキストp.97によれば、障害補償年金前払一時金の請求は、同一事由について1回限り行うことができる。本問は適切である。"},{"law":"障害(補償)給付","cat":"前払一時金","q":"障害補償年金前払一時金が支給された場合、障害補償年金はその支給が停止されない。","a":false,"exp":"×。法附則59条3項。障害補償年金前払一時金が支給された場合、障害補償年金はその支給が停止される。前払いした分を年金の支給停止で埋め合わせる。","page":98,"detail":"×。本問は誤り。法附則59条3項及びテキストp.98によれば、障害補償年金前払一時金が支給された場合、障害補償年金はその支給が停止される。前払一時金支給後の各月に支給されるべき年金額の合算額が前払一時金の額に達するまでの間、支給停止される。支給が停止されないとする本問は適切でない。"},{"law":"障害(補償)給付","cat":"差額一時金","q":"障害補償年金差額一時金は、受給権者が早期に死亡した場合にも労働基準法に規定する災害補償の額に相当する額を最低限保障するために設けられた。","a":true,"exp":"〇。障害補償年金差額一時金は、受給権者が早期に死亡した場合にも、所定の額を最低限保障するために設けられたものである。","page":100,"detail":"〇。本問は正しい。テキストp.100によれば、障害補償年金差額一時金は、受給権者が早期に死亡した場合にも労働基準法に規定する災害補償の額に相当する額(障害等級ごとに定められた最高限度額)を最低限保障するために設けられたものである。本問は適切である。"},{"law":"障害(補償)給付","cat":"差額一時金欠格","q":"障害補償年金の受給権者を故意に死亡させた者は、障害補償年金差額一時金を受けることができる遺族としない。","a":true,"exp":"〇。法附則58条5項。障害補償年金の受給権者を故意に死亡させた者は、障害補償年金差額一時金を受けることができる遺族としない。","page":101,"detail":"〇。本問は正しい。法附則58条5項及びテキストp.101によれば、障害補償年金の受給権者を故意に死亡させた者は、障害補償年金差額一時金を受けることができる遺族としない。本問は欠格事由を正しく述べている。"},{"law":"介護(補償)給付","cat":"支給要件","q":"介護補償給付は、休業補償給付を受ける権利を有する者であって、常時又は随時介護を要する状態にあり、現に介護を受けている間支給される。","a":false,"exp":"×。法12条の8第4項。介護補償給付は、「障害補償年金又は傷病補償年金」を受ける権利を有する者で、所定の障害により常時又は随時介護を要し現に介護を受けている間支給される。休業補償給付の受給権者ではない。","page":102,"detail":"×。本問は誤り。法12条の8第4項及びテキストp.102によれば、介護補償給付は「障害補償年金又は傷病補償年金」を受ける権利を有する者であって、その支給事由となる障害により常時又は随時介護を要する状態にあり、現に介護を受けている間支給される。休業補償給付を受ける権利を有する者とする本問は適切でない。"},{"law":"介護(補償)給付","cat":"支給対象","q":"介護補償給付は、介護を行う親族等に対して支給される。","a":false,"exp":"×。介護補償給付は、介護を必要とする被災労働者に対して支給するものであり、介護を行う親族等に支給するものではない。","page":103,"detail":"×。本問は誤り。テキストp.103の注意書きによれば、介護補償給付は、介護を必要とする被災労働者に対して支給するものであり、介護を行う親族等に支給するものではない。介護を行う親族等に対して支給されるとする本問は適切でない。"},{"law":"介護(補償)給付","cat":"支給されない場合","q":"病院又は診療所に入院している間は、介護補償給付は支給されない。","a":true,"exp":"〇。法12条の8第4項、則18条の3の3。障害者支援施設に入所(生活介護)している間や病院・診療所に入院している間等は、介護補償給付は支給されない。","page":103,"detail":"〇。本問は正しい。法12条の8第4項、則18条の3の3及びテキストp.103によれば、障害者支援施設に入所(生活介護)している間、厚生労働大臣が定める施設に入所している間、病院又は診療所に入院している間は、介護補償給付は支給されない。本問は適切である。"},{"law":"介護(補償)給付","cat":"支給単位","q":"介護補償給付は、週を単位として支給される。","a":false,"exp":"×。法19条の2。介護補償給付は、月(暦月)を単位として支給される。週単位ではない。","page":103,"detail":"×。本問は誤り。法19条の2及びテキストp.103によれば、介護補償給付は、月(暦月)を単位として支給される。週を単位とするとする本問は適切でない。"},{"law":"遺族(補償)給付","cat":"受給者の範囲","q":"遺族補償年金を受けることができる遺族は、労働者の死亡の当時、その収入によって生計を維持していた配偶者、子、父母、孫、祖父母及び兄弟姉妹とされている。","a":true,"exp":"〇。法16条の2。遺族補償年金を受けることができる遺族は、死亡の当時その収入により生計を維持していた配偶者・子・父母・孫・祖父母・兄弟姉妹である。","page":106,"detail":"〇。本問は正しい。法16条の2及びテキストp.106によれば、遺族補償年金を受けることができる遺族は、労働者の死亡の当時その収入によって生計を維持していた配偶者・子・父母・孫・祖父母及び兄弟姉妹である。本問は受給者の範囲を正しく述べている。"},{"law":"遺族(補償)給付","cat":"年齢要件","q":"夫は、労働者の死亡の当時、原則として55歳以上であれば、遺族補償年金の受給資格を有する。","a":false,"exp":"×。法16条の2等。夫が遺族補償年金の受給資格を有するには、原則として労働者の死亡の当時「60歳以上」(暫定措置により55歳以上)であることが必要である。妻には年齢要件はない。","page":106,"detail":"×。本問は誤り。法16条の2等及びテキストp.106によれば、夫が遺族補償年金の受給資格を有するには、原則として労働者の死亡の当時60歳以上(暫定措置により55歳以上)であることが必要である。妻には年齢要件はない。原則として55歳以上で受給資格を有するとする本問は適切でない。"},{"law":"遺族(補償)給付","cat":"年齢要件","q":"子・孫が遺族補償年金の受給資格を有するには、労働者の死亡の当時、20歳未満であることが必要である。","a":false,"exp":"×。法16条の2。子・孫は、18歳に達する日以後の最初の3月31日までの間にあることが必要である。20歳未満ではない。","page":106,"detail":"×。本問は誤り。法16条の2及びテキストp.106によれば、子・孫が遺族補償年金の受給資格を有するには、労働者の死亡の当時、18歳に達する日以後の最初の3月31日までの間にあることが必要である。20歳未満とする本問は要件を誤っている点で適切でない。"},{"law":"遺族(補償)給付","cat":"胎児","q":"労働者の死亡の当時胎児であった子が出生したときは、将来に向かって、死亡の当時その収入によって生計を維持していた子とみなされる。","a":true,"exp":"〇。法16条の2第2項。死亡の当時胎児であった子が出生したときは、将来に向かって生計維持の子とみなされる。","page":107,"detail":"〇。本問は正しい。法16条の2第2項及びテキストp.107によれば、労働者の死亡の当時胎児であった子が出生したときは、将来に向かって、その子は労働者の死亡の当時その収入によって生計を維持していた子とみなされる。本問は適切である。"},{"law":"遺族(補償)給付","cat":"年金額","q":"遺族補償年金の額は、遺族が妻1人のみの場合は、その妻の年齢にかかわらず常に給付基礎日額の175日分である。","a":false,"exp":"×。法16条の3、別表1。遺族1人は原則153日分で、妻1人かつ55歳以上又は障害状態にある場合に175日分となる。常に175日分ではない。","page":109,"detail":"×。本問は誤り。法16条の3、別表1及びテキストp.109によれば、遺族補償年金は遺族1人の場合、原則として給付基礎日額の153日分であり、妻1人で55歳以上又は厚生労働省令で定める障害の状態にある場合に限り175日分となる。妻の年齢にかかわらず常に175日分とする本問は適切でない。"},{"law":"遺族(補償)給付","cat":"年金額","q":"遺族補償年金の額は、遺族1人の場合、給付基礎日額の153日分である。","a":true,"exp":"〇。法16条の3、別表1。遺族補償年金は遺族1人で給付基礎日額の153日分(妻1人で55歳以上等は175日分)、4人以上で245日分である。","page":109,"detail":"〇。本問は正しい。法16条の3、別表1及びテキストp.109によれば、遺族補償年金は遺族1人で給付基礎日額の153日分(妻1人で55歳以上等は175日分)、2人で201日分、3人で223日分、4人以上で245日分である。本問は遺族1人の額を正しく述べている。"},{"law":"遺族(補償)給付","cat":"年金額","q":"遺族補償年金の額は、遺族4人以上の場合、給付基礎日額の223日分である。","a":false,"exp":"×。別表1。遺族補償年金は遺族4人以上で給付基礎日額の245日分である。223日分は遺族3人の場合の額である。","page":109,"detail":"×。本問は誤り。別表1及びテキストp.109によれば、遺族補償年金は遺族4人以上で給付基礎日額の245日分である。223日分は遺族3人の場合の額であり、本問は支給額を誤っている点で適切でない。"},{"law":"遺族(補償)給付","cat":"失権","q":"遺族補償年金の受給権者が婚姻(事実婚を含む)をしたときは、その受給権は消滅する。","a":true,"exp":"〇。法16条の4。受給権者が婚姻(届出をしない事実上の婚姻関係を含む)をしたときは、遺族補償年金の受給権は消滅(失権)する。","page":112,"detail":"〇。本問は正しい。法16条の4及びテキストp.112によれば、遺族補償年金の受給権者が婚姻(届出をしていないが事実上婚姻関係と同様の事情にある場合を含む)をしたときは、その受給権は消滅(失権)する。本問は適切である。"},{"law":"遺族(補償)給付","cat":"失権","q":"遺族補償年金の受給権者が直系血族である祖父母の養子となった場合は、失権する。","a":false,"exp":"×。法16条の4。直系血族又は直系姻族以外の者の養子となったときに失権する。祖父母は直系血族であるため、その養子となっても失権しない。","page":112,"detail":"×。本問は誤り。法16条の4及びテキストp.112によれば、受給権者が直系血族又は直系姻族以外の者の養子となったときに失権する。祖父母は直系血族であるため、その養子となっても失権しない。失権するとする本問は適切でない。"},{"law":"遺族(補償)給付","cat":"前払一時金","q":"遺族補償年金前払一時金の額は、給付基礎日額の200日分、400日分、600日分、800日分、1,000日分又は1,200日分のうち、受給権者が選択する額である。","a":false,"exp":"×。法附則60条2項。遺族補償年金前払一時金は、給付基礎日額の200・400・600・800・1,000日分のうち選択する額であり、1,200日分はない。1,200日分は障害補償年金前払一時金(第1級)の選択肢である。","page":114,"detail":"×。本問は誤り。法附則60条2項及びテキストp.114によれば、遺族補償年金前払一時金の額は、給付基礎日額の200日分、400日分、600日分、800日分又は1,000日分のうち受給権者が選択する額であり、1,200日分の選択肢はない。1,200日分は障害補償年金前払一時金(第1級)の選択肢である。1,200日分を含むとする本問は適切でない。"},{"law":"遺族(補償)給付","cat":"一時金","q":"遺族補償一時金は、労働者の死亡の当時、遺族補償年金を受けることができる遺族がない場合に、給付基礎日額の1,000日分が支給される。","a":true,"exp":"〇。法16条の6。労働者の死亡の当時、遺族補償年金を受けられる遺族がない場合、遺族補償一時金として給付基礎日額の1,000日分が支給される。","page":116,"detail":"〇。本問は正しい。法16条の6及びテキストp.116によれば、労働者の死亡の当時、遺族補償年金を受けることができる遺族がない場合には、遺族補償一時金として給付基礎日額の1,000日分が支給される。本問は適切である。"},{"law":"遺族(補償)給付","cat":"欠格","q":"労働者を故意に死亡させた者は、遺族補償給付を受けることができる遺族としない。","a":true,"exp":"〇。法16条の9。労働者を故意に死亡させた者は、遺族補償給付を受けることができる遺族としない。","page":118,"detail":"〇。本問は正しい。法16条の9及びテキストp.118によれば、労働者を故意に死亡させた者は、遺族補償給付を受けることができる遺族としない。本問は欠格事由を正しく述べている。"},{"law":"葬祭料","cat":"支給額","q":"葬祭料は、315,000円に給付基礎日額の30日分を加えた額(原則)と、給付基礎日額の60日分(最低保障額)のうち、いずれか高い方の額が支給される。","a":true,"exp":"〇。法17条、則17条。葬祭料は、315,000円＋給付基礎日額の30日分と、給付基礎日額の60日分のうち、いずれか高い方の額が支給される。","page":119,"detail":"〇。本問は正しい。法17条、則17条及びテキストp.119によれば、葬祭料は、315,000円に給付基礎日額の30日分を加えた額(原則)と、給付基礎日額の60日分(最低保障額)のうち、いずれか高い方の額が支給される。本問は適切である。"},{"law":"複数業務要因災害","cat":"給付の種類","q":"複数業務要因災害に関する保険給付の名称には、「複数事業労働者」が冠される。","a":true,"exp":"〇。法20条の2。複数事業労働者療養給付・複数事業労働者休業給付等、名称に「複数事業労働者」が冠される。","page":122,"detail":"〇。本問は正しい。法20条の2及びテキストp.122によれば、複数業務要因災害に関する保険給付は、複数事業労働者療養給付、複数事業労働者休業給付、複数事業労働者傷病年金、複数事業労働者障害給付、複数事業労働者介護給付、複数事業労働者遺族給付、複数事業労働者葬祭給付であり、名称に「複数事業労働者」が冠される。本問は適切である。"},{"law":"複数業務要因災害","cat":"休業給付","q":"複数事業労働者休業給付は、賃金を受けない日の第1日目から支給される。","a":false,"exp":"×。法20条の4第2項。複数事業労働者休業給付は、賃金を受けない日の「第4日目」から支給される。第1日目からではなく、待期3日間がある。","page":123,"detail":"×。本問は誤り。法20条の4第2項及びテキストp.123によれば、複数事業労働者休業給付は、2以上の事業の業務を要因とする負傷又は疾病による療養のため労働することができないために賃金を受けない日の「第4日目」から支給される。待期3日間がある。第1日目から支給されるとする本問は適切でない。"},{"law":"複数業務要因災害","cat":"打切補償","q":"複数業務要因災害による休業は、労働基準法19条で規定する解雇制限の適用を受けないため、打切補償の問題は生じない。","a":true,"exp":"〇。複数業務要因災害による休業は労働基準法19条の解雇制限の適用を受けないため、労働基準法81条の打切補償の問題は生じない。","page":123,"detail":"〇。本問は正しい。テキストp.123によれば、複数業務要因災害による休業は、労働基準法19条で規定する解雇制限の適用を受けないため、労働基準法81条で規定する打切補償の問題は生じない。本問は適切である。"},{"law":"通勤災害","cat":"給付の種類","q":"通勤災害に関する保険給付の名称には、「補償」という言葉が含まれない。","a":true,"exp":"〇。法21条。通勤災害に関する保険給付には「補償」が含まれない。労働基準法に規定する災害補償に基づくものではないためである。","page":128,"detail":"〇。本問は正しい。法21条及びテキストp.128によれば、通勤災害に関する保険給付の名称には「補償」という言葉が含まれない。これは、これらの給付が労働基準法に規定する災害補償に基づくものではないためである。本問は適切である。"},{"law":"通勤災害","cat":"休業給付","q":"通勤災害の場合、待期期間の3日間については事業主に休業補償の義務が生じる。","a":false,"exp":"×。通勤災害の場合、待期期間の3日間について事業主に休業補償の義務は生じない。業務災害とは異なる。","page":129,"detail":"×。本問は誤り。テキストp.129によれば、通勤災害の場合、待期期間の3日間について事業主に休業補償の義務は生じない。これは業務災害において待期期間3日間につき事業主に労働基準法上の休業補償責任があるのと異なる点である。義務が生じるとする本問は適切でない。"},{"law":"通勤災害","cat":"一部負担金","q":"政府は、療養給付を受ける労働者から、500円を超えない範囲内で厚生労働省令で定める額を一部負担金として徴収する。","a":false,"exp":"×。法31条2項。療養給付を受ける労働者からは、「200円」を超えない範囲内で定める額を一部負担金として徴収する。原則200円(日雇特例被保険者は100円)である。","page":131,"detail":"×。本問は誤り。法31条2項及びテキストp.131によれば、政府は療養給付を受ける労働者から、「200円」を超えない範囲内で厚生労働省令で定める額を一部負担金として徴収する。原則200円(健康保険の日雇特例被保険者は100円)である。500円を超えない範囲とする本問は金額を誤っている点で適切でない。"},{"law":"通勤災害","cat":"一部負担金免除","q":"第三者の行為によって生じた事故により療養給付を受ける者からは、一部負担金が徴収されない。","a":true,"exp":"〇。則44条の2第1項。第三者行為災害による療養給付を受ける者、療養開始後3日以内に死亡した者等、特別加入者からは一部負担金が徴収されない。","page":131,"detail":"〇。本問は正しい。則44条の2第1項及びテキストp.131によれば、第三者の行為によって生じた事故により療養給付を受ける者、療養の開始後3日以内に死亡した者その他休業給付を受けない者、同一の通勤災害について既に一部負担金を納付した者からは、一部負担金が徴収されない。本問は適切である。"},{"law":"通勤災害","cat":"一部負担金時効","q":"政府の一部負担金を徴収する権利は、これを行使することができる時から2年間行使しないと、時効により消滅する。","a":true,"exp":"〇。法31条4項。一部負担金を徴収する権利は、行使できる時から2年間行使しないと時効により消滅する。","page":132,"detail":"〇。本問は正しい。法31条4項及びテキストp.132によれば、政府の一部負担金を徴収する権利は、これを行使することができる時から2年間行使しないと、時効により消滅する。本問は適切である。"},{"law":"通勤災害","cat":"業務災害との違い","q":"通勤災害による休業期間は、年次有給休暇付与の要件である8割以上の出勤した日数として取り扱われる。","a":false,"exp":"×。通勤災害による休業期間は、年次有給休暇付与の要件である8割以上の出勤日数としては取り扱われない。業務災害の場合は取り扱われる。","page":132,"detail":"×。本問は誤り。テキストp.132の業務災害と通勤災害との違いの表によれば、通勤災害による休業期間は、年次有給休暇付与の要件である8割以上の出勤した日数としては取り扱われない。8割以上の出勤日数として取り扱われるのは業務災害の場合である。取り扱われるとする本問は適切でない。"},{"law":"通勤災害","cat":"二次健診","q":"二次健康診断等給付は、業務上の事由による脳血管疾患及び心臓疾患の発症を予防するための保険給付である。","a":true,"exp":"〇。法26条1項。二次健康診断等給付は、業務上の事由による脳血管疾患及び心臓疾患の発症を予防するための保険給付である。","page":136,"detail":"〇。本問は正しい。法26条1項及びテキストp.136によれば、二次健康診断等給付は、業務上の事由による脳血管疾患及び心臓疾患の発症を予防するための保険給付である。本問は制度趣旨を正しく述べている。"},{"law":"通勤災害","cat":"二次健診請求期限","q":"二次健康診断等給付の請求は、やむを得ない理由があるときを除き、一次健康診断を受けた日から6か月以内に行わなければならない。","a":false,"exp":"×。則18条の19。二次健康診断等給付の請求は、やむを得ない理由があるときを除き、一次健康診断を受けた日から「3か月以内」に行わなければならない。6か月ではない。","page":138,"detail":"×。本問は誤り。則18条の19及びテキストp.138によれば、二次健康診断等給付の請求は、天災その他やむを得ない理由があるときを除き、一次健康診断を受けた日から「3か月以内」に行わなければならない。6か月以内とする本問は期間を誤っている点で適切でない。"},{"law":"通勤災害","cat":"二次健診給付方法","q":"二次健康診断等給付は、現金で支給されることもある。","a":false,"exp":"×。則等。二次健康診断等給付は現物給付であり、現金で支給されることはない。","page":137,"detail":"×。本問は誤り。則等及びテキストp.137の注意書きによれば、二次健康診断等給付は現物給付であり、現金で支給されることはない。健診給付病院等において二次健康診断及び特定保健指導が行われる。現金で支給されることもあるとする本問は適切でない。"},{"law":"通則・その他","cat":"年金証書","q":"年金証書は、所轄都道府県労働局長が、年金たる保険給付の支給の決定の通知をするときに、当該受給権者に交付する。","a":false,"exp":"×。則20条。年金証書は、「所轄労働基準監督署長」が年金たる保険給付の支給決定の通知をするときに受給権者に交付する。所轄都道府県労働局長ではない。","page":142,"detail":"×。本問は誤り。則20条及びテキストp.142によれば、年金証書は、「所轄労働基準監督署長」が、年金たる保険給付の支給の決定の通知をするときに、当該受給権者に交付する。所轄都道府県労働局長とする本問は交付主体を誤っている点で適切でない。"},{"law":"通則・その他","cat":"死亡の推定","q":"船舶が沈没した際現にその船舶に乗っていた労働者の生死が3か月間わからない場合には、その船舶が沈没した日に当該労働者は死亡したものと推定される。","a":true,"exp":"〇。法10条。船舶が沈没した際現に乗っていた労働者の生死が3か月間わからない場合等は、その船舶が沈没した日に死亡したものと推定される。航空機も同様である。","page":146,"detail":"〇。本問は正しい。法10条及びテキストp.146によれば、船舶が沈没・転覆・滅失・行方不明となった際現にその船舶に乗っていた労働者等の生死が3か月間わからない場合等には、その船舶が沈没等した日に当該労働者は死亡したものと推定される。航空機の事故についても同様である。本問は適切である。"},{"law":"通則・その他","cat":"死亡の推定","q":"死亡の推定の規定は、船舶又は航空機に関する事故に限らず、すべての事故に適用される。","a":false,"exp":"×。法10条。死亡の推定の規定は、船舶又は航空機に関する事故に限って適用される。","page":146,"detail":"×。本問は誤り。法10条及びテキストp.146の注意書きによれば、死亡の推定の規定は、船舶又は航空機に関する事故に限って適用される。すべての事故に適用されるとする本問は適切でない。"},{"law":"通則・その他","cat":"受給権の保護","q":"保険給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることはできない。","a":true,"exp":"〇。法12条の5。保険給付を受ける権利は、譲渡・担保供与・差押えができない。また労働者の退職によって変更されることもない。","page":153,"detail":"〇。本問は正しい。法12条の5及びテキストp.153によれば、保険給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができない。また、保険給付を受ける権利は労働者の退職によって変更されることもない。本問は適切である。"},{"law":"通則・その他","cat":"非課税","q":"租税その他の公課は、保険給付として支給を受けた金品を標準として課することはできない。","a":true,"exp":"〇。法12条の6。租税その他の公課は、保険給付として支給を受けた金品を標準として課することができない。","page":153,"detail":"〇。本問は正しい。法12条の6及びテキストp.153によれば、租税その他の公課は、保険給付として支給を受けた金品を標準として課することができない。本問は非課税の規定を正しく述べている。"},{"law":"通則・その他","cat":"支給制限","q":"労働者が故意に負傷、疾病、障害もしくは死亡又はその直接の原因となった事故を生じさせたときは、政府は保険給付を行わない。","a":true,"exp":"〇。法12条の2の2第1項。労働者が故意に負傷等又はその直接の原因となった事故を生じさせたときは、政府は保険給付を行わない。","page":154,"detail":"〇。本問は正しい。法12条の2の2第1項及びテキストp.154によれば、労働者が故意に負傷、疾病、障害もしくは死亡又はその直接の原因となった事故を生じさせたときは、政府は保険給付を行わない。本問は適切である。"},{"law":"通則・その他","cat":"支給制限","q":"労働者が故意の犯罪行為又は重大な過失により事故を生じさせたときは、政府は保険給付の全部又は一部を行わないことができる。","a":true,"exp":"〇。法12条の2の2第2項。故意の犯罪行為もしくは重大な過失等により事故を生じさせた等のときは、政府は保険給付の全部又は一部を行わないことができる。","page":154,"detail":"〇。本問は正しい。法12条の2の2第2項及びテキストp.154によれば、労働者が故意の犯罪行為もしくは重大な過失により、又は正当な理由がなくて療養に関する指示に従わないこと等により事故を生じさせた等のときは、政府は保険給付の全部又は一部を行わないことができる。本問は適切である。"},{"law":"通則・その他","cat":"支給制限内容","q":"故意の犯罪行為又は重大な過失による支給制限では、所定の保険給付について支給のつど給付額の20%相当額が支給制限される。","a":false,"exp":"×。昭52.3.30基発192号。休業給付・傷病年金・障害給付等について、支給のつど給付額の「30%」相当額を支給制限する。20%ではない。","page":155,"detail":"×。本問は誤り。昭52.3.30基発192号及びテキストp.155によれば、故意の犯罪行為又は重大な過失による支給制限では、休業(補償)給付・傷病(補償)年金・障害(補償)給付等について、支給事由の存する間、支給のつど給付額の「30%」相当額が支給制限(減額支給)される。20%とする本問は割合を誤っている点で適切でない。"},{"law":"通則・その他","cat":"事業主費用徴収","q":"事業主が労災保険に係る保険関係成立届の提出について行政機関からの指導等を受けたにもかかわらず、10日以内に提出を行わない場合、故意と認定され、保険給付の額の100%に相当する額が徴収される。","a":true,"exp":"〇。平17.9.22基発0922001号等。指導等を受けて10日以内に成立届を提出しない場合は故意と認定され、保険給付の額の100%が徴収される。","page":157,"detail":"〇。本問は正しい。平17.9.22基発0922001号等及びテキストp.157によれば、事業主が労災保険に係る保険関係成立届の提出について行政機関からの指導等を受けたにもかかわらず10日以内に提出を行っていない場合、故意と認定され、保険給付の額の100%に相当する額が徴収される。本問は適切である。"},{"law":"通則・その他","cat":"事業主費用徴収","q":"事業主が行政機関から指導等を受けた事実はないものの、保険関係成立の日から1年を経過してなお保険関係成立届を提出していない場合、重大な過失と認定され、保険給付の額の100%に相当する額が徴収される。","a":false,"exp":"×。平17.9.22基発0922001号等。指導等の事実はないが成立の日から1年を経過しても成立届未提出の場合、重大な過失と認定され保険給付の額の「40%」が徴収される。100%は故意の場合である。","page":157,"detail":"×。本問は誤り。平17.9.22基発0922001号等及びテキストp.157によれば、行政機関から指導等を受けた事実はないものの、保険関係成立の日から1年を経過してなお保険関係成立届を提出していない場合は、重大な過失と認定され、保険給付の額の「40%」に相当する額が徴収される。100%が徴収されるのは故意の場合である。100%とする本問は適切でない。"},{"law":"通則・その他","cat":"事業主費用徴収","q":"事業主の故意又は重大な過失によって生じさせた業務災害の原因である事故については、保険給付の額の50%に相当する額が徴収される。","a":false,"exp":"×。則44条等。事業主が故意又は重大な過失によって生じさせた業務災害の事故については、保険給付の額の30%に相当する額が徴収される。50%ではない。","page":158,"detail":"×。本問は誤り。則44条等及びテキストp.158によれば、事業主が故意又は重大な過失によって生じさせた業務災害の原因である事故については、保険給付の額の30%に相当する額が徴収される。50%とする本問は割合を誤っている点で適切でない。"},{"law":"通則・その他","cat":"費用徴収対象外","q":"療養補償給付、介護補償給付及び二次健康診断等給付に係る費用は、事業主からの費用徴収の対象に含まれない。","a":true,"exp":"〇。令5.7.20基発0720第1号。療養補償給付・介護補償給付・二次健康診断等給付に係る費用は、費用徴収の対象に含まれない。","page":158,"detail":"〇。本問は正しい。令5.7.20基発0720第1号及びテキストp.158によれば、療養補償給付・複数事業労働者療養給付・療養給付、介護補償給付・複数事業労働者介護給付・介護給付、二次健康診断等給付に係る費用は、事業主からの費用徴収の対象に含まれない。本問は適切である。"},{"law":"通則・その他","cat":"社会保険との調整","q":"社会保険の年金給付と労災保険の保険給付が同一事由により支給されるときは、労災保険の保険給付が一定率を乗じて減額支給される。","a":true,"exp":"〇。法14条2項。社会保険の年金給付と労災保険の保険給付が同一事由により支給されるときは、社会保険は全額支給され、労災保険が政令で定める率を乗じて減額支給される。","page":160,"detail":"〇。本問は正しい。法14条2項及びテキストp.160によれば、社会保険(厚生年金保険・国民年金)の年金給付と労災保険の保険給付が同一事由により支給されるときは、社会保険の年金給付は減額されることなく全額支給され、労災保険の保険給付は併給される社会保険の年金給付の種類に応じた政令で定める率を乗じて減額支給される。本問は適切である。"},{"law":"通則・その他","cat":"社会保険との調整","q":"労災保険の一時金たる保険給付については、厚生年金保険等から同一事由による保険給付が行われると、支給調整が行われる。","a":false,"exp":"×。労災保険の一時金たる保険給付については、厚生年金保険等から同一事由による保険給付が行われても、支給調整は行われない。","page":160,"detail":"×。本問は誤り。テキストp.160によれば、労災保険の一時金たる保険給付については、厚生年金保険等から同一事由による保険給付が行われたとしても、支給調整は行われない。支給調整が行われるとする本問は適切でない。"},{"law":"通則・その他","cat":"第三者行為","q":"政府は、保険給付の原因である事故が第三者の行為によって生じた場合に保険給付をしたときは、その給付の価額の限度で、被災者が第三者に対して有する損害賠償請求権を取得する。","a":true,"exp":"〇。法12条の4第1項。政府は第三者行為災害で保険給付をしたとき、その給付の価額の限度で損害賠償請求権を取得する(代位取得)。","page":163,"detail":"〇。本問は正しい。法12条の4第1項及びテキストp.163によれば、政府は、保険給付の原因である事故が第三者の行為によって生じた場合に保険給付をしたときは、その給付の価額の限度で、保険給付を受けた者が第三者に対して有する損害賠償の請求権を取得する(代位取得)。本問は適切である。"},{"law":"通則・その他","cat":"第三者行為","q":"第三者行為災害における求償は、災害発生後7年以内に支給事由が生じた保険給付を限度に行われる。","a":false,"exp":"×。令2.3.30基発0330第33号。求償は、災害発生後5年以内に支給事由が生じ、かつ5年以内に行った保険給付を限度に行われる。なお控除の期間は7年以内である。","page":163,"detail":"×。本問は誤り。令2.3.30基発0330第33号及びテキストp.163によれば、求償は、災害発生後5年以内に支給事由が生じた保険給付であって、災害発生後5年以内に保険給付を行ったものを限度に行われる。なお控除を行う期間は災害発生後7年以内である。7年以内とする本問は求償の期間を誤っている点で適切でない。"},{"law":"通則・その他","cat":"第三者行為","q":"保険給付を受けるべき者が、第三者から同一の事由について損害賠償を受けたときは、政府はその価額の限度で保険給付をしないことができる。","a":true,"exp":"〇。法12条の4第2項。被災者が第三者から同一事由について損害賠償を受けたときは、政府はその価額の限度で保険給付をしないことができる(控除)。","page":164,"detail":"〇。本問は正しい。法12条の4第2項及びテキストp.164によれば、保険給付を受けるべき者が、第三者から同一の事由について損害賠償を受けたときは、政府はその価額の限度で保険給付をしないことができる(控除)。本問は適切である。"},{"law":"社会復帰促進等事業","cat":"事業の種類","q":"社会復帰促進等事業には、社会復帰促進事業、被災労働者等援護事業及び安全衛生確保等事業がある。","a":true,"exp":"〇。法29条1項。社会復帰促進等事業は、社会復帰促進事業・被災労働者等援護事業・安全衛生確保等事業の3つからなる。","page":172,"detail":"〇。本問は正しい。法29条1項及びテキストp.172によれば、社会復帰促進等事業は、社会復帰促進事業、被災労働者等援護事業及び安全衛生確保等事業の3つからなる。本問は事業の種類を正しく述べている。"},{"law":"社会復帰促進等事業","cat":"アフターケア","q":"アフターケアを受けるには、所轄労働基準監督署長に申請をし、アフターケア手帳の交付を受けなければならない。","a":false,"exp":"×。令6.3.25基発0325第3号。アフターケアを受けるには、「所轄都道府県労働局長」に申請しアフターケア手帳の交付を受けなければならない。所轄労働基準監督署長ではない。","page":173,"detail":"×。本問は誤り。令6.3.25基発0325第3号及びテキストp.173によれば、アフターケアを受けるには、「所轄都道府県労働局長」に申請をし、アフターケア手帳の交付を受けなければならない。所轄労働基準監督署長とする本問は申請先を誤っている点で適切でない。"},{"law":"社会復帰促進等事業","cat":"援護事業","q":"未払賃金の立替払事業は、被災労働者等援護事業として行われる。","a":false,"exp":"×。法29条1項。未払賃金の立替払事業は、安全衛生確保等事業として行われる。被災労働者等援護事業ではない。","page":174,"detail":"×。本問は誤り。法29条1項及びテキストp.174によれば、未払賃金の立替払事業は、安全衛生確保等事業として行われる。被災労働者等援護事業として行われるとする本問は適切でない。"},{"law":"特別支給金","cat":"性質","q":"特別支給金は、災害補償そのものであり、保険給付の一部として支給される。","a":false,"exp":"×。特別支給金は、災害補償そのものではなく、被災労働者等への見舞金・援護金的なものとして、保険給付に付加して支給される。","page":175,"detail":"×。本問は誤り。テキストp.175によれば、特別支給金は、災害補償そのものではなく、被災労働者等への見舞金・援護金的なものとして、保険給付に付加して支給されるものである。災害補償そのものであり保険給付の一部として支給されるとする本問は適切でない。"},{"law":"特別支給金","cat":"種類","q":"療養補償給付や介護補償給付、葬祭料に対応する特別支給金は設けられていない。","a":true,"exp":"〇。特別支給金規則等。療養給付・介護給付・二次健康診断等給付や葬祭料に対応する特別支給金は設けられていない。これらは原則実費を支給するためである。","page":175,"detail":"〇。本問は正しい。特別支給金規則等及びテキストp.175によれば、療養補償給付・複数事業労働者療養給付・療養給付、介護補償給付・複数事業労働者介護給付・介護給付及び二次健康診断等給付や、葬祭料・複数事業労働者葬祭給付・葬祭給付に対応する特別支給金は設けられていない。これらは原則として実費を支給するものだからである。本問は適切である。"},{"law":"特別支給金","cat":"休業特別支給金","q":"休業特別支給金の支給額は、1日につき、休業給付基礎日額の100分の40に相当する額である。","a":false,"exp":"×。特別支給金規則3条。休業特別支給金は、休業4日目から1日につき休業給付基礎日額の100分の「20」に相当する額が支給される。100分の40ではない。","page":178,"detail":"×。本問は誤り。特別支給金規則3条及びテキストp.178によれば、休業特別支給金は、賃金を受けない日の第4日目から、1日につき休業給付基礎日額の100分の「20」に相当する額が支給される。100分の40とする本問は割合を誤っている点で適切でない。"},{"law":"特別支給金","cat":"傷病特別支給金","q":"傷病特別支給金の第1級の支給額は、114万円である。","a":true,"exp":"〇。特別支給金規則5条の2、別表1の2。傷病特別支給金は第1級114万円、第2級107万円、第3級100万円である。","page":178,"detail":"〇。本問は正しい。特別支給金規則5条の2、別表1の2及びテキストp.178によれば、傷病特別支給金は第1級114万円、第2級107万円、第3級100万円である。本問は第1級の額を正しく述べている。"},{"law":"特別支給金","cat":"傷病特別支給金","q":"傷病特別支給金の第3級の支給額は、107万円である。","a":false,"exp":"×。特別支給金規則5条の2、別表1の2。傷病特別支給金は第1級114万円、第2級107万円、第3級「100万円」である。107万円は第2級の額である。","page":178,"detail":"×。本問は誤り。特別支給金規則5条の2、別表1の2及びテキストp.178によれば、傷病特別支給金は第3級が「100万円」である。107万円は第2級の額であり、本問は支給額を誤っている点で適切でない。"},{"law":"特別支給金","cat":"遺族特別支給金","q":"遺族特別支給金の支給額は、200万円である。","a":false,"exp":"×。特別支給金規則5条。遺族特別支給金の支給額は300万円である。遺族が2人以上の場合は300万円をその人数で除して得た額となる。","page":180,"detail":"×。本問は誤り。特別支給金規則5条及びテキストp.180によれば、遺族特別支給金の支給額は300万円である。遺族が2人以上の場合は300万円をその人数で除して得た額となる。200万円とする本問は金額を誤っている点で適切でない。"},{"law":"特別支給金","cat":"ボーナス特別支給金","q":"特別加入者に対しては、特別支給一時金は支給されるが、ボーナス特別支給金は支給されない。","a":true,"exp":"〇。特別支給金規則19条。特別加入者には特別支給一時金は支給されるが、特別給与を基礎とするボーナス特別支給金は支給されない。","page":181,"detail":"〇。本問は正しい。特別支給金規則19条及びテキストp.181によれば、特別加入者に対しては、特別支給一時金は支給されるが、特別給与を算定の基礎とするボーナス特別支給金は支給されない。本問は適切である。"},{"law":"特別支給金","cat":"算定基礎年額","q":"算定基礎年額の特例として、特別給与の総額が、年金給付基礎日額に365を乗じた額の100分の20相当額と150万円のうちいずれか低い額を超える場合には、その低い額が算定基礎年額となる。","a":true,"exp":"〇。特別支給金規則6条。特別給与の総額が、年金給付基礎日額×365の100分の20相当額と150万円のうちいずれか低い額を超える場合は、その低い額を算定基礎年額とする。","page":181,"detail":"〇。本問は正しい。特別支給金規則6条及びテキストp.181によれば、特別給与の総額が、年金給付基礎日額に365を乗じた額の100分の20相当額と150万円のうちいずれか低い額を超える場合には、その低い額を算定基礎年額とする(特例)。本問は適切である。"},{"law":"特別支給金","cat":"不服申立て","q":"特別支給金に関する決定について不服がある場合、労働者災害補償保険審査官に審査請求をすることができる。","a":false,"exp":"×。特別支給金については、保険給付と異なり、労働者災害補償保険審査官に審査請求をすることはできない。","page":185,"detail":"×。本問は誤り。テキストp.185の保険給付と特別支給金の相違点によれば、特別支給金については、保険給付と異なり、労働者災害補償保険審査官に審査請求をすることはできない。審査請求をすることができるとする本問は適切でない。"},{"law":"特別支給金","cat":"損害賠償との調整","q":"被災労働者が労災保険から受領した特別支給金は、その損害額から控除することができる。","a":false,"exp":"×。平8.2.23最高裁判決(コック食品事件)。特別支給金は被災労働者の損害をてん補する性質を有するとはいえず、損害額から控除することはできない。","page":185,"detail":"×。本問は誤り。平8.2.23最高裁判決(コック食品事件)及びテキストp.185によれば、特別支給金は被災労働者の損害をてん補する性質を有するということはできず、被災労働者が労災保険から受領した特別支給金をその損害額から控除することはできない。控除することができるとする本問は適切でない。"},{"law":"特別加入","cat":"種類","q":"特別加入の種類には、中小事業主等の特別加入、一人親方等の特別加入及び海外派遣者の特別加入がある。","a":true,"exp":"〇。特別加入の種類は、中小事業主等・一人親方等・海外派遣者の3つである。","page":188,"detail":"〇。本問は正しい。テキストp.188によれば、特別加入の種類は、中小事業主等の特別加入、一人親方等の特別加入及び海外派遣者の特別加入の3つである。本問は適切である。"},{"law":"特別加入","cat":"中小事業主","q":"卸売業・サービス業の事業については、常時100人以下の労働者を使用する事業主が、中小事業主等の特別加入の対象となる。","a":true,"exp":"〇。法33条、則46条の16。卸売業・サービス業は常時100人以下、金融業・保険業・不動産業・小売業は常時50人以下、その他は常時300人以下である。","page":189,"detail":"〇。本問は正しい。法33条、則46条の16及びテキストp.189によれば、中小事業主等の特別加入の対象となる中小事業主は、金融業・保険業・不動産業・小売業が常時50人以下、卸売業・サービス業が常時100人以下、その他の業種が常時300人以下の労働者を使用する事業主である。本問は卸売業・サービス業について正しく述べている。"},{"law":"特別加入","cat":"中小事業主","q":"金融業・保険業・不動産業・小売業の事業については、常時100人以下の労働者を使用する事業主が、中小事業主等の特別加入の対象となる。","a":false,"exp":"×。則46条の16。金融業・保険業・不動産業・小売業の事業は、常時50人以下の労働者を使用する事業主が対象である。100人以下ではない。","page":189,"detail":"×。本問は誤り。則46条の16及びテキストp.189によれば、金融業・保険業・不動産業・小売業の事業については、常時50人以下の労働者を使用する事業主が中小事業主等の特別加入の対象である。常時100人以下とする本問は人数の基準を誤っている点で適切でない。"},{"law":"特別加入","cat":"加入要件","q":"中小事業主等が特別加入するためには、労働保険事務組合に労働保険事務の処理の委託を行っていることが必要である。","a":true,"exp":"〇。法33条、34条1項。中小事業主等の特別加入には、保険関係の成立、労働保険事務組合への委託、包括加入、政府の承認が必要である。","page":190,"detail":"〇。本問は正しい。法33条、34条1項及びテキストp.190によれば、中小事業主等が特別加入するためには、その事業について保険関係が成立していること、労働保険事務組合に労働保険事務の処理の委託を行っていること、中小事業主及び家族従事者等を包括して加入すること、事業主が申請を行い政府の承認を受けることが必要である。本問は委託要件を正しく述べている。"},{"law":"特別加入","cat":"一人親方加入要件","q":"一人親方等が特別加入するには、加入しようとする者が一人親方等の団体の構成員となっていなくてもよい。","a":false,"exp":"×。法35条1項。一人親方等が特別加入するには、加入しようとする者が一人親方等の団体の構成員となっていることが必要である。個別の加入申請はできない。","page":196,"detail":"×。本問は誤り。法35条1項及びテキストp.196によれば、一人親方等が特別加入するには、加入しようとする一人親方等が一人親方等の団体の構成員となっていることが必要である。団体の構成員となっていなくてもよいとする本問は適切でない。"},{"law":"特別加入","cat":"一人親方加入","q":"一人親方等は、個別に特別加入の申請を行うことができる。","a":false,"exp":"×。法35条1項。一人親方等は団体の構成員となり、団体が申請を行う必要があり、個別に加入申請を行うことはできない。","page":197,"detail":"×。本問は誤り。法35条1項及びテキストp.197によれば、一人親方等の特別加入の申請は一人親方等の団体が行うものであり、一人親方等は個別に加入申請を行うことはできない。個別に申請を行うことができるとする本問は適切でない。"},{"law":"特別加入","cat":"海外派遣","q":"海外出張は海外派遣に該当しないため、特別加入をしなくとも労災保険が適用される。","a":true,"exp":"〇。昭52.3.30基発192号。海外出張はこの海外派遣に該当しないので、特別加入をしなくとも労災保険が適用される。","page":198,"detail":"〇。本問は正しい。昭52.3.30基発192号及びテキストp.198によれば、海外出張はこの海外派遣に該当しないので、特別加入をしなくとも労災保険が適用される。本問は適切である。"},{"law":"特別加入","cat":"海外派遣要件","q":"海外派遣者が特別加入するには、事業主が労働保険事務組合に労働保険事務の処理を委託することが要件となる。","a":false,"exp":"×。法36条1項。海外派遣者の特別加入では、労働保険事務組合への委託は要件ではない。これは中小事業主等の特別加入との相違点である。","page":199,"detail":"×。本問は誤り。法36条1項及びテキストp.199によれば、海外派遣者の特別加入の要件は、派遣元の団体又は事業主の事業について継続事業として保険関係が成立していること、及び申請を行い政府の承認を受けることであり、事業主が労働保険事務組合に労働保険事務の処理を委託することは要件ではない。これは中小事業主等の特別加入との相違点である。委託が要件とする本問は適切でない。"},{"law":"特別加入","cat":"給付基礎日額","q":"特別加入者に対して支給される保険給付に係る給付基礎日額については、年齢階層別の最低限度額・最高限度額は適用されない。","a":true,"exp":"〇。則46条の20等。特別加入者の給付基礎日額には、年齢階層別の最低限度額・最高限度額は適用されない。","page":200,"detail":"〇。本問は正しい。則46条の20等及びテキストp.200によれば、特別加入者に対して支給される保険給付に係る給付基礎日額については、年齢階層別の最低限度額・最高限度額は適用されない。本問は適切である。"},{"law":"特別加入","cat":"特別加入者の給付","q":"特別加入者には、二次健康診断等給付は支給されない。","a":true,"exp":"〇。令6.4.26基発0426第2号等。特別加入者は労働安全衛生法の適用を受けず定期健康診断の対象とならないため、二次健康診断等給付は支給されない。","page":202,"detail":"〇。本問は正しい。令6.4.26基発0426第2号等及びテキストp.202によれば、特別加入者は労働安全衛生法の適用を受けず定期健康診断の対象となっていないため、二次健康診断等給付は支給されない。本問は適切である。"},{"law":"特別加入","cat":"通勤災害","q":"個人タクシー業者など自動車を使用して行う旅客運送の事業を行う一人親方等には、通勤災害に関しては労災保険が適用されない。","a":true,"exp":"〇。則46条の22の2等。自動車を使用して行う旅客・貨物運送の事業を行う者等は、住居と就業場所との往復の実態が明確でない等から、通勤災害に関し労災保険が適用されない。","page":201,"detail":"〇。本問は正しい。則46条の22の2等及びテキストp.201によれば、自動車を使用して行う旅客又は貨物の運送の事業を行う一人親方等(個人タクシー業者等)は、住居と就業の場所との間の往復の実態が明確でないこと等から、通勤災害に関しては労災保険が適用されない。本問は適切である。"},{"law":"不服申立て・その他","cat":"審査請求","q":"保険給付に関する決定に不服のある者は、労働者災害補償保険審査官に対して審査請求をし、その決定に不服のある者は、労働保険審査会に対して再審査請求をすることができる。","a":true,"exp":"〇。法38条1項。保険給付に関する決定の不服は、労働者災害補償保険審査官への審査請求、その決定の不服は労働保険審査会への再審
