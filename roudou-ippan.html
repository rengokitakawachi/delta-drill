<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>労働一般常識 ○×問題集</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --txt:#e2e8f0; --sub:#94a3b8; --line:#334155;
    --ok:#22c55e; --okbg:#14361f; --ng:#ef4444; --ngbg:#3a1717;
    --acc:#38bdf8; --maru:#3b82f6; --batsu:#f43f5e; --gold:#fbbf24; --weak:#fb7185;
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;}
  .wrap{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  header{padding:12px 16px 6px;}
  header h1{font-size:17px;margin:0;letter-spacing:.3px;display:flex;align-items:center;gap:8px;}
  .hstat{font-size:12px;color:var(--sub);margin-top:4px;}
  .hstat b{color:var(--acc);}

  /* tab bar */
  .tabbar{display:flex;flex-wrap:wrap;gap:7px;padding:10px 14px;border-bottom:1px solid var(--line);}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--sub);
    padding:7px 12px;border-radius:99px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s;}
  .tab .cnt{font-size:11px;opacity:.6;margin-left:3px;}
  .tab.active{background:var(--acc);color:#06283d;border-color:var(--acc);}
  .tab.special{border-color:#475569;}
  .tab.active.special{background:var(--gold);color:#3a2c05;border-color:var(--gold);}

  main{flex:1;padding:16px;display:flex;flex-direction:column;}

  /* quiz card */
  .qhead{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--sub);margin-bottom:8px;}
  .qhead b{color:var(--txt);}
  .qright{display:flex;align-items:center;gap:10px;}
  .stopbtn{border:1px solid var(--line);background:var(--card2);color:var(--sub);font-size:11px;font-weight:700;padding:5px 10px;border-radius:99px;cursor:pointer;}
  .stopbtn:active{transform:scale(.95);}
  .barwrap{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .bar{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--maru));transition:width .35s;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px 18px;
    flex:1;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .tag{align-self:flex-start;font-size:11px;font-weight:700;color:var(--acc);background:rgba(56,189,248,.12);
    border:1px solid rgba(56,189,248,.3);padding:3px 9px;border-radius:99px;margin-bottom:12px;}
  .q{font-size:18px;line-height:1.75;font-weight:600;flex:1;}
  .q b{color:#fde68a;font-weight:800;}
  .btns{display:flex;gap:13px;margin-top:16px;}
  .btn{flex:1;border:none;border-radius:16px;padding:18px 0;font-size:28px;font-weight:800;color:#fff;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.95);}
  .maru{background:linear-gradient(160deg,#3b82f6,#2563eb);} .batsu{background:linear-gradient(160deg,#f43f5e,#e11d48);}
  .btn small{display:block;font-size:11px;font-weight:600;opacity:.85;margin-top:2px;}
  .feedback{margin-top:14px;display:none;}
  .verdict{font-size:18px;font-weight:800;padding:11px 14px;border-radius:13px;}
  .verdict.ok{background:var(--okbg);color:#86efac;border:1px solid rgba(34,197,94,.4);}
  .verdict.ng{background:var(--ngbg);color:#fca5a5;border:1px solid rgba(239,68,68,.4);}
  .ansline{font-size:13px;color:var(--sub);margin:11px 2px 4px;} .ansline b{color:var(--txt);}
  .exp{background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:13px 15px;font-size:14.5px;line-height:1.7;}
  .exp b{color:#fde68a;}
  .ref{margin-top:9px;font-size:12px;color:#7dd3fc;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.25);border-radius:9px;padding:7px 11px;}
  .ref b{color:#bae6fd;font-weight:800;}
  .lrow .ref{margin-top:7px;}
  .next{width:100%;margin-top:14px;padding:15px;border:none;border-radius:15px;background:var(--acc);color:#06283d;font-size:16px;font-weight:800;cursor:pointer;}

  /* session result */
  .sresult{display:none;text-align:center;flex:1;flex-direction:column;justify-content:center;padding:10px 6px;}
  .scorebig{font-size:54px;font-weight:900;color:var(--gold);margin:4px 0;}
  .scorebig span{font-size:22px;color:var(--sub);}
  .grade{font-size:20px;font-weight:800;margin:4px 0;} .gmsg{color:var(--sub);font-size:14px;line-height:1.7;margin-bottom:16px;}
  .rbtns{display:flex;flex-direction:column;gap:10px;}
  .rbtn{padding:14px;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;}
  .rbtn.primary{background:var(--maru);color:#fff;} .rbtn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);}

  /* stats */
  .stats{display:none;flex-direction:column;}
  .ov{display:flex;gap:10px;margin-bottom:16px;}
  .ovcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;}
  .ovnum{font-size:26px;font-weight:900;color:var(--acc);} .ovlbl{font-size:11px;color:var(--sub);margin-top:2px;}
  .stitle{font-size:13px;font-weight:800;color:var(--sub);margin:6px 2px 10px;display:flex;justify-content:space-between;align-items:center;}
  .lrow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:.12s;}
  .lrow:active{transform:scale(.99);}
  .lrow .lname{font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
  .lrow .lname .pct{font-size:13px;font-weight:800;}
  .lbar{height:6px;background:var(--line);border-radius:9px;overflow:hidden;margin-top:7px;}
  .lbar > div{height:100%;border-radius:9px;transition:width .4s;}
  .lsub{font-size:11px;color:var(--sub);margin-top:5px;}
  .badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:6px;}
  .badge.weak{background:rgba(251,113,133,.16);color:var(--weak);border:1px solid rgba(251,113,133,.4);}
  .badge.good{background:rgba(34,197,94,.14);color:#86efac;border:1px solid rgba(34,197,94,.35);}
  .badge.none{background:#1f2937;color:#64748b;border:1px solid var(--line);}
  .resetbtn{margin-top:12px;padding:11px;border:1px solid var(--line);background:transparent;color:var(--sub);border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;}
  .empty{text-align:center;color:var(--sub);font-size:14px;line-height:1.8;padding:40px 20px;}
  footer{text-align:center;color:#475569;font-size:11px;padding:12px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚖️ 労働一般常識 ○×問題集</h1>
    <div class="hstat" id="hstat"></div>
  </header>
  <div class="tabbar" id="tabbar"></div>
  <main id="main"></main>
  <footer>社労士 労務管理その他の労働一般常識／全<span id="qtotal"></span>問・履歴は端末に自動保存</footer>
</div>

<script>
// 問題バンク（5エージェント生成 + 既存育休14問）
const A1 = [
  {"law":"労働施策総合推進法","cat":"再就職援助計画","q":"再就職援助計画の作成が必要となる「厚生労働省令で定める事業規模の縮小等」とは、経済的事情による事業規模の縮小等であって、一の事業所において、常時雇用する労働者について1か月の期間内に<b>30人以上</b>の離職者を生ずることとなるものである。","a":true,"exp":"〇。一の事業所において1か月の期間内に30人以上の離職者を生ずる場合が該当する（則7条の2）。再就職援助計画の作成が義務付けられる。"},
  {"law":"労働施策総合推進法","cat":"再就職援助計画","q":"事業主は、再就職援助計画を作成したときは、遅滞なく、これを<b>厚生労働大臣</b>に提出し、その認定を受けなければならない。","a":false,"exp":"×。提出先・認定権者は「公共職業安定所長」である（法24条3項、則7条の4）。厚生労働大臣ではない。"},
  {"law":"労働施策総合推進法","cat":"中途採用情報の公表","q":"常時雇用する労働者の数が<b>300人を超える</b>事業主は、雇い入れた通常の労働者等の数に占める中途採用により雇い入れられた者の数の割合を定期的に公表しなければならない。","a":true,"exp":"〇。常時雇用労働者数が300人を超える事業主に中途採用比率の定期公表が義務付けられている（法27条の2第1項）。"},
  {"law":"労働施策総合推進法","cat":"治療と就業の両立支援","q":"事業主は、疾病、負傷その他の理由により治療を受ける労働者について、その治療と就業との両立を支援するため、相談に応じ適切に対応するために必要な体制の整備その他の必要な措置を講じなければならない。","a":false,"exp":"×。これは「講ずるよう努めなければならない」とされる努力義務である（法27条の3第1項）。義務ではない。"},
  {"law":"労働施策総合推進法","cat":"外国人雇用状況の届出","q":"事業主は、新たに外国人を雇い入れた場合又はその雇用する外国人が離職した場合には、その者の氏名、在留資格、在留期間その他の事項について確認し、当該事項を<b>厚生労働大臣</b>に届け出なければならない。","a":true,"exp":"〇。外国人雇用状況の届出は厚生労働大臣に対して行う（法28条1項）。届書の提出先は事業所の所在地を管轄する公共職業安定所の長である（則12条）。"},
  {"law":"労働施策総合推進法","cat":"パワハラ防止措置","q":"事業主は、職場において行われる優越的な関係を背景とした言動であって業務上必要かつ相当な範囲を超えたものによりその雇用する労働者の就業環境が害されることのないよう、相談に応じ適切に対応するために必要な体制の整備その他の雇用管理上必要な措置を講じなければならない。","a":true,"exp":"〇。パワハラに関する雇用管理上の措置義務である（法30条の2第1項）。事業主に義務付けられている。"},
  {"law":"労働施策総合推進法","cat":"パワハラ・調停","q":"都道府県労働局長は、パワハラに関する雇用管理上の措置等に定める事項についての労働者と事業主との間の紛争について、当事者の双方又は一方から調停の申請があり解決のために必要があると認めるときは、<b>紛争調整委員会</b>に調停を行わせるものとする。","a":true,"exp":"〇。調停は紛争調整委員会に行わせる（法30条の6第1項）。この紛争調整委員会は個別労働関係紛争解決促進法に規定するものである。"},
  {"law":"労働施策総合推進法","cat":"大量雇用変動の届出","q":"大量雇用変動の届出は、大量雇用変動がある日の少なくとも<b>2か月前</b>に、大量離職届を当該事業所の所在地を管轄する公共職業安定所の長に提出して行わなければならない。","a":false,"exp":"×。届出期限は大量雇用変動がある日の少なくとも「1か月前」である（則9条）。2か月前ではない。"},
  {"law":"職業安定法","cat":"定義（労働者供給）","q":"「労働者供給」とは、供給契約に基づいて労働者を他人の指揮命令を受けて労働に従事させることをいい、労働者派遣法に規定する労働者派遣に該当するものは含まれない。","a":true,"exp":"〇。労働者供給の定義どおりであり、労働者派遣に該当するものは除かれる（法4条8項）。"},
  {"law":"職業安定法","cat":"事業者の定義","q":"「労働者供給事業者」とは、厚生労働大臣に<b>届出をして</b>労働者供給事業を行う労働組合等をいう。","a":false,"exp":"×。労働者供給事業者は厚生労働大臣の「許可」を受けて労働者供給事業を行う労働組合等をいう（法4条12項）。届出ではない。"},
  {"law":"職業安定法","cat":"求人の申込み","q":"公共職業安定所、特定地方公共団体及び職業紹介事業者は、求人の申込みは原則として全て受理しなければならないが、その内容が法令に違反する求人の申込み等の不受理事由に該当する場合は受理しないことができる。","a":true,"exp":"〇。求人の申込みは全て受理が原則だが、内容が法令違反である等の不受理事由に該当するものは受理しないことができる（法5条の6第1項）。"},
  {"law":"職業安定法","cat":"有料職業紹介事業","q":"有料の職業紹介事業を行おうとする者は、厚生労働大臣に<b>届出</b>をしなければならない。","a":false,"exp":"×。有料の職業紹介事業を行おうとする者は厚生労働大臣の「許可」を受けなければならない（法30条1項）。届出ではない。"},
  {"law":"職業安定法","cat":"有料職業紹介事業","q":"有料職業紹介事業の許可の有効期間は当該許可の日から起算して<b>3年</b>であり、更新を受けた場合の有効期間は<b>5年</b>である。","a":true,"exp":"〇。有料職業紹介事業の許可の有効期間は3年、更新後は5年である（法32条の6第1項・5項）。無料職業紹介事業は当初から5年である点と区別する。"},
  {"law":"職業安定法","cat":"無料職業紹介事業","q":"職業安定機関及び特定地方公共団体の行うものを除く無料の職業紹介事業を行おうとする者は、学校等及び特別の法人の行うものを除き、厚生労働大臣の許可を受けなければならず、その許可の有効期間は当該許可の日から起算して<b>5年</b>である。","a":true,"exp":"〇。無料職業紹介事業は厚生労働大臣の許可が必要で、有効期間は当初から5年である（法33条1項・3項）。"},
  {"law":"職業安定法","cat":"労働者の募集（委託募集）","q":"労働者を雇用しようとする者が、その被用者以外の者をして<b>報酬を与えて</b>労働者の募集に従事させようとするときは、その旨を厚生労働大臣に届け出なければならない。","a":false,"exp":"×。報酬を与えて行う委託募集は厚生労働大臣の「許可」が必要である（法36条1項）。報酬を与えることなく行う場合が届出である（同条3項）。"},
  {"law":"職業安定法","cat":"特定募集情報等提供事業","q":"特定募集情報等提供事業を行おうとする者は、氏名又は名称及び住所その他の事項を厚生労働大臣に<b>届け出</b>なければならない。","a":true,"exp":"〇。特定募集情報等提供事業は厚生労働大臣への届出制である（法43条の2第1項）。許可ではない点に注意する。"},
  {"law":"職業安定法","cat":"労働者供給事業","q":"労働組合等が厚生労働大臣の許可を受けた場合は、無料の労働者供給事業を行うことができ、その許可の有効期間は<b>3年</b>である。","a":true,"exp":"〇。労働者供給事業は労働組合等が厚生労働大臣の許可を受けて行うことができ、有効期間は3年である（法45条、則32条3項）。"},
  {"law":"労働者派遣法","cat":"用語の定義","q":"「派遣元事業主」とは、労働者派遣事業の<b>届出をした</b>者をいう。","a":false,"exp":"×。「派遣元事業主」とは労働者派遣事業の「許可」を受けた者をいう（法2条4号）。届出ではない。"},
  {"law":"労働者派遣法","cat":"派遣禁止業務","q":"何人も、港湾運送業務、建設業務、警備業務及び一定の医療関係業務については、労働者派遣事業を行ってはならない。","a":true,"exp":"〇。港湾運送業務・建設業務・警備業務及び政令で定める医療関係業務は派遣禁止業務である（法4条1項、令2条）。"},
  {"law":"労働者派遣法","cat":"許可の有効期間","q":"労働者派遣事業の許可の有効期間は当該許可の日から起算して<b>3年</b>であり、更新を受けた場合の有効期間は<b>5年</b>である。","a":true,"exp":"〇。労働者派遣事業の許可の有効期間は3年、更新後は5年である（法10条1項・4項）。"},
  {"law":"労働者派遣法","cat":"関係派遣先への派遣割合","q":"派遣元事業主は、関係派遣先に労働者派遣をするときは、関係派遣先への派遣割合が<b>100分の80以下</b>となるようにしなければならない。","a":true,"exp":"〇。いわゆるグループ企業（関係派遣先）への派遣割合は100分の80以下とする必要がある（法23条の2）。"},
  {"law":"労働者派遣法","cat":"事業所単位の派遣可能期間","q":"派遣先は、当該派遣先の事業所その他派遣就業の場所ごとの業務について、派遣元事業主から派遣可能期間を超える期間継続して労働者派遣の役務の提供を受けてはならず、この派遣可能期間は原則として<b>1年</b>とされている。","a":false,"exp":"×。事業所単位の派遣可能期間は原則「3年」である（法40条の2第2項）。過半数労働組合等の意見聴取により3年を限り延長できる。"},
  {"law":"労働者派遣法","cat":"日雇労働者の派遣","q":"労働者派遣法における「日雇労働者」とは、日々又は<b>30日以内</b>の期間を定めて雇用する労働者をいう。","a":true,"exp":"〇。日雇労働者とは日々又は30日以内の期間を定めて雇用する労働者をいう（法35条の4第1項）。原則としてこの日雇労働者の労働者派遣は禁止される。"},
  {"law":"労働者派遣法","cat":"派遣元責任者","q":"派遣元事業主は、派遣労働者数が100人以下のときは1人以上、100人を超え200人以下のときは2人以上の派遣元責任者を選任しなければならない。","a":true,"exp":"〇。派遣元責任者は派遣労働者数100人以下で1人以上、100人超200人以下で2人以上選任する（則29条）。"},
  {"law":"労働者派遣法","cat":"管理台帳の保存","q":"派遣元事業主は派遣元管理台帳を、派遣先は派遣先管理台帳を、それぞれ<b>3年間</b>保存しなければならない。","a":true,"exp":"〇。派遣元管理台帳・派遣先管理台帳はいずれも3年間の保存義務がある（法37条2項、42条2項）。"},
  {"law":"労働者派遣法","cat":"労働契約申込みみなし","q":"労働契約の申込みをしたものとみなされた労働者派遣の役務の提供を受ける者は、当該申込みに係る行為が終了した日から<b>1年</b>を経過する日までの間は、当該申込みを撤回することができない。","a":true,"exp":"〇。みなされた労働契約の申込みは、行為終了日から1年を経過する日まで撤回できない（法40条の6第2項）。"},
  {"law":"労働者派遣法","cat":"離職労働者の受入れ禁止","q":"派遣先は、労働者派遣に係る派遣労働者が当該派遣先を離職した者であるときは、当該離職の日から起算して<b>1年</b>を経過する日までの間は、当該派遣労働者に係る労働者派遣の役務の提供を受けてはならない。","a":true,"exp":"〇。離職後1年を経過する日までは、その者を離職した派遣先での派遣として受け入れることはできない（法40条の9第1項）。60歳以上の定年退職者等は適用除外となる。"}

const A2 = [
  {"law":"高年齢者雇用安定法","cat":"定義","q":"高年齢者雇用安定法における「高年齢者」とは、60歳以上の者をいう。","a":false,"exp":"×。正しくは「55歳以上の者」をいう（法2条1項、則1条）。「高年齢者等」のうち中高年齢者は45歳以上の者を指す。"},
  {"law":"高年齢者雇用安定法","cat":"定年","q":"事業主がその雇用する労働者の定年の定めをする場合には、当該定年は、原則として60歳を下回ることができない。","a":true,"exp":"〇。原則として定年は60歳を下回ることができない（法8条）。例外として坑内作業の業務に従事する労働者については60歳未満の定年を定めることができる。"},
  {"law":"高年齢者雇用安定法","cat":"雇用確保措置","q":"定年(65歳未満のものに限る)の定めをしている事業主は、その雇用する高年齢者の65歳までの安定した雇用を確保するため、定年の引上げ、継続雇用制度の導入、定年の定めの廃止のいずれかの措置を講じなければならない。","a":true,"exp":"〇。高年齢者雇用確保措置は3つのいずれかを講じなければならない義務である（法9条1項）。"},
  {"law":"高年齢者雇用安定法","cat":"就業確保措置","q":"定年(65歳以上70歳未満のものに限る)の定めをしている事業主は、65歳から70歳までの安定した雇用を確保するため、定年の引上げ等の措置を講じなければならない。","a":false,"exp":"×。65歳から70歳までの高年齢者就業確保措置は努力義務であり、「講ずるよう努めなければならない」とされている（法10条の2第1項）。65歳までの雇用確保措置の義務とは異なる。"},
  {"law":"高年齢者雇用安定法","cat":"創業支援等措置","q":"創業支援等措置として高年齢者と委託契約その他の契約(労働契約を除く)を締結する場合、過半数労働組合等の同意を得る必要がある。","a":true,"exp":"〇。創業支援等措置を講ずるには、過半数労働組合(ない場合は過半数代表者)の同意を厚生労働省令で定めるところにより得る必要がある（法10条の2第1項）。"},
  {"law":"高年齢者雇用安定法","cat":"多数離職の届出","q":"事業主は、同一の事業所において、再就職援助対象高年齢者等が所定の理由により1か月以内の期間に10人以上離職する場合には、あらかじめ多数離職届を公共職業安定所長に提出しなければならない。","a":false,"exp":"×。正しくは「5人以上」離職する場合である（法16条、則6条の2）。多数離職届は離職が生ずる日の1か月前までに提出する。"},
  {"law":"高年齢者雇用安定法","cat":"雇用状況等の報告","q":"事業主は、毎年、6月1日現在における定年、継続雇用制度等の状況を、翌月15日までに、高年齢者雇用状況等報告書により報告しなければならない。","a":true,"exp":"〇。毎年6月1日現在の状況を翌月(7月)15日までに、管轄公共職業安定所の長を経由して厚生労働大臣に報告する（法52条1項、則33条1項）。"},
  {"law":"高年齢者雇用安定法","cat":"シルバー人材センター","q":"都道府県知事は、所定の基準に適合すると認められる高年齢者就業援助法人を、その申請により、市町村の区域ごとに1個に限り、シルバー人材センターとして指定することができる。","a":true,"exp":"〇。都道府県知事が市町村の区域(必要な場合は2以上の市町村の区域)ごとに1個に限り指定する（法37条1項）。"},
  {"law":"障害者雇用促進法","cat":"定義","q":"障害者雇用促進法における「精神障害者」には、発達障害がある者は含まれない。","a":false,"exp":"×。精神障害(発達障害を含む)がある者であって厚生労働省令で定めるものをいい、発達障害は精神障害に含まれる（法2条6号）。「障害者」「精神障害者」いずれの定義でも発達障害は精神障害に含まれる。"},
  {"law":"障害者雇用促進法","cat":"差別禁止","q":"事業主は、賃金の決定、教育訓練の実施等の待遇について、労働者が障害者であることを理由として、障害者でない者と不当な差別的取扱いをしてはならない。","a":true,"exp":"〇。募集・採用以外の事項についての差別禁止規定である（法35条）。なお積極的差別是正措置として障害者を有利に取り扱うことは差別に該当しない。"},
  {"law":"障害者雇用促進法","cat":"合理的配慮","q":"合理的配慮の提供は事業主の努力義務であり、過重な負担を及ぼす場合であっても可能な限り措置を講ずるよう努めなければならない。","a":false,"exp":"×。合理的配慮の提供は事業主の義務である。ただし事業主に過重な負担を及ぼすこととなるときは、措置を講ずる必要はない（法36条の3）。"},
  {"law":"障害者雇用促進法","cat":"障害者雇用率","q":"令和8年7月からの一般事業主の障害者雇用率は、原則として100分の2.7である。","a":true,"exp":"〇。原則(令和8年7月～)の一般事業主の雇用率は100分の2.7(対象労働者37.5人以上で雇用義務発生)である（法43条2項、令2条）。経過措置(令和8年6月30日まで)は100分の2.5。"},
  {"law":"障害者雇用促進法","cat":"法定雇用障害者数の算定","q":"重度身体障害者又は重度知的障害者である労働者(週所定労働時間30時間以上)は、その1人をもって2人を雇用したものとみなす。","a":true,"exp":"〇。重度身体障害者・重度知的障害者である労働者は1人で2人とカウントする（法43条4項等）。同じく重度の短時間労働者は1人で1人とみなす。"},
  {"law":"障害者雇用促進法","cat":"特例子会社","q":"特例子会社制度における親事業主の認定は、厚生労働大臣ではなく都道府県労働局長が行う。","a":false,"exp":"×。子会社についての基準適合の認定は厚生労働大臣が行う（法44条1項）。関係会社・関係子会社・特定事業主の各特例も同様に厚生労働大臣の認定による。"},
  {"law":"障害者雇用促進法","cat":"調整金","q":"独立行政法人高齢・障害・求職者雇用支援機構は、常時100人を超える一般事業主で法定雇用率を超えて対象障害者を雇用する者に対し、その超える1人当たり月額29,000円の障害者雇用調整金を支給する。","a":true,"exp":"〇。常時100人超の事業主に対し超過1人当たり月額29,000円(単位調整額)の調整金を支給する（法50条1項等）。"},
  {"law":"障害者雇用促進法","cat":"報奨金","q":"障害者雇用報奨金は、雇用する労働者数が常時100人以下の一般事業主に対し、所定数を超える1人当たり月額29,000円を支給する。","a":false,"exp":"×。報奨金の額は超える1人当たり月額21,000円である（法附則4条3項）。月額29,000円は常時100人超の事業主に支給される調整金の単位調整額である。"},
  {"law":"障害者雇用促進法","cat":"納付金","q":"障害者雇用納付金は、雇用率が法定雇用率に満たない一般事業主から、法定雇用率に満たない1人当たり月額50,000円を徴収する。ただし常時100人以下の事業主には当分の間適用されない。","a":true,"exp":"〇。法定雇用率未達の事業主から不足1人当たり月額50,000円を徴収するが、常時100人以下の事業主には当分の間適用されない（法53条、附則4条1項）。"},
  {"law":"障害者雇用促進法","cat":"紛争解決","q":"障害者に対する差別の禁止(募集・採用)に係る紛争についても、都道府県労働局長は調停の対象として紛争調整委員会に調停を行わせることができる。","a":false,"exp":"×。調停の対象からは労働者の募集及び採用についての紛争は除かれる（法74条の7第1項）。募集・採用についての紛争は紛争解決の援助の対象にはなる。"},
  {"law":"青少年の雇用の促進等に関する法律","cat":"目的","q":"青少年の雇用の促進等に関する法律は、青少年について適職の選択並びに職業能力の開発及び向上に関する措置等を総合的に講ずることにより、雇用の促進等を図ることを目的とする。","a":true,"exp":"〇。適職の選択並びに職業能力の開発・向上等の措置を総合的に講じ、雇用の促進等を図ることを目的とする（法1条）。"},
  {"law":"青少年の雇用の促進等に関する法律","cat":"事業主の責務","q":"事業主は、青少年について、その有する能力を正当に評価するための募集及び採用の方法の改善等を講ずることにより、雇用機会の確保及び職場への定着を図るよう努めなければならない。","a":true,"exp":"〇。事業主は募集・採用方法の改善、情報提供、職業能力の開発・向上等により雇用機会の確保及び職場への定着を図るよう努めなければならない（法4条1項）。"},
  {"law":"青少年の雇用の促進等に関する法律","cat":"ユースエール認定","q":"厚生労働大臣は、常時雇用する労働者の数が500人以下の事業主からの申請に基づき、青少年の雇用管理が優良である旨の認定(ユースエール認定)を行うことができる。","a":false,"exp":"×。認定の対象は常時雇用する労働者の数が300人以下の事業主に限られる（法15条）。認定事業主はユースエール認定マークを付することができる。"},
  {"law":"男女雇用機会均等法","cat":"差別禁止","q":"事業主は、労働者の募集及び採用について、その性別にかかわりなく均等な機会を与えなければならない。","a":true,"exp":"〇。募集・採用について性別にかかわりなく均等な機会を与えなければならない（法5条）。なおこの差別禁止規定の違反について罰則はない。"},
  {"law":"男女雇用機会均等法","cat":"間接差別","q":"労働者の募集又は採用に関する措置であって、労働者の身長、体重又は体力に関する事由を要件とするものは、間接差別となるおそれがある措置として厚生労働省令で定められている。","a":true,"exp":"〇。身長・体重・体力要件、転勤要件、転勤経験要件の3つが間接差別となるおそれがある措置として定められている（法7条、則2条）。"},
  {"law":"男女雇用機会均等法","cat":"不利益取扱い禁止","q":"事業主は、その雇用する女性労働者が妊娠したこと、出産したこと等を理由として、当該女性労働者に対して解雇その他不利益な取扱いをしてはならない。","a":true,"exp":"〇。妊娠・出産、産前産後の休業等を理由とする解雇その他不利益取扱いは禁止される（法9条3項）。妊娠中及び出産後1年を経過しない女性に対する解雇は原則無効とされる。"},
  {"law":"男女雇用機会均等法","cat":"セクハラ措置","q":"職場におけるセクシュアルハラスメントの雇用管理上の措置について、当該セクシュアルハラスメントには同性に対するものは含まれない。","a":false,"exp":"×。職場におけるセクシュアルハラスメントには同性に対するものも含まれる（令2.1.15厚労告6号）。事業主は相談体制の整備等の雇用管理上必要な措置を講じなければならない。"},
  {"law":"男女雇用機会均等法","cat":"母性健康管理措置","q":"事業主は、妊娠中の女性労働者について、妊娠23週までは4週に1回、24週から35週までは2週に1回、36週から出産までは1週に1回、健康診査等を受けるために必要な時間を確保できるようにしなければならない。","a":true,"exp":"〇。妊娠週数の区分に応じ、~23週は4週、24~35週は2週、36週~出産は1週ごとに1回必要な時間を確保する。ただし医師等が異なる指示をしたときはその指示による（法12条、則2条の4）。"},
  {"law":"男女雇用機会均等法","cat":"紛争解決","q":"性別を理由とする差別の禁止(募集・採用)に係る紛争は、苦情の自主的解決の対象にも調停の対象にもならないが、紛争の解決の援助の対象にはなる。","a":true,"exp":"〇。募集・採用に係るものは自主的解決(×)・調停(×)の対象外だが、紛争の解決の援助(○)の対象となる（法15条～18条）。"},
  {"law":"男女雇用機会均等法","cat":"調停","q":"調停は、紛争調整委員会の委員のうちから、会長があらかじめ指名した5人の調停委員が行う。","a":false,"exp":"×。調停は会長があらかじめ指名した3人の調停委員が行う（法19条）。調停案の作成は調停委員の全員一致をもって行う。"}

const A3 = [
  {"law":"育児・介護休業法","cat":"要介護状態","q":"育児・介護休業法における「要介護状態」とは、負傷、疾病又は身体上もしくは精神上の障害により、2週間以上の期間にわたり常時介護を必要とする状態をいう。","a":true,"exp":"〇。要介護状態とは負傷・疾病・身体上もしくは精神上の障害により2週間以上の期間にわたり常時介護を必要とする状態をいう（法2条3号、則2条）。"},
  {"law":"育児・介護休業法","cat":"対象家族","q":"介護休業の「対象家族」には、配偶者(事実婚を含む)、父母及び子、配偶者の父母のほか、これらに準ずる者として祖父母、兄弟姉妹及び孫が含まれる。","a":true,"exp":"〇。対象家族は配偶者(事実上婚姻関係と同様の事情にある者を含む)、父母及び子(これらに準ずる祖父母・兄弟姉妹・孫を含む)並びに配偶者の父母をいう（法2条4号、則3条）。"},
  {"law":"育児・介護休業法","cat":"介護休業の期間","q":"介護休業期間は、対象家族1人につき、原則として介護休業開始予定日から起算して93日から既にした介護休業日数を差し引いた日数を経過する日までの間とされている。","a":true,"exp":"〇。介護休業期間は介護休業開始予定日から起算して93日から当該対象家族についての介護休業日数を差し引いた日数を経過する日までを限度とする（法15条1項）。"},
  {"law":"育児・介護休業法","cat":"介護休業の再申出","q":"介護休業申出が撤回され、かつ撤回後になされる最初の介護休業申出も撤回された場合には、その後になされる当該対象家族についての介護休業申出を、事業主は拒むことができる。","a":true,"exp":"〇。撤回後の最初の再申出まで撤回された対象家族については、その後の介護休業申出を事業主は拒むことができる（法14条2項）。"},
  {"law":"育児・介護休業法","cat":"介護休業終了予定日の変更","q":"介護休業申出をした労働者は、介護休業終了予定日とされた日の1か月前の日までに申し出ることにより、介護休業終了予定日を1回に限り後の日に変更することができる。","a":false,"exp":"×。正しくは「2週間前の日まで」である。介護休業終了予定日の2週間前の日までに申し出ることにより1回に限り後ろ倒し変更ができる（法13条、則27条）。"},
  {"law":"育児・介護休業法","cat":"介護休暇","q":"介護休暇は、要介護状態にある対象家族が1人の場合は一の年度において5労働日、2人以上の場合は10労働日を限度として取得することができる。","a":true,"exp":"〇。介護休暇は対象家族1人につき5労働日、2人以上の場合は10労働日を限度として取得できる（法16条の5第1項）。"},
  {"law":"育児・介護休業法","cat":"子の看護等休暇","q":"子の看護等休暇の対象となるのは、小学校就学の始期に達するまでの子を養育する労働者である。","a":false,"exp":"×。正しくは「9歳に達する日以後の最初の3月31日までの間にある子（小学校第3学年修了前の子）」を養育する労働者が対象である（法16条の2第1項）。"},
  {"law":"育児・介護休業法","cat":"時間外労働の制限","q":"小学校就学の始期に達するまでの子を養育する労働者等が請求した場合、事業主は、原則として1か月について24時間、1年について150時間を超えて労働時間を延長してはならない。","a":true,"exp":"〇。時間外労働の制限の制限時間は1か月について24時間、1年について150時間である（法17条1項、18条1項）。"},
  {"law":"育児・介護休業法","cat":"深夜業の制限","q":"深夜業の制限の請求に係る制限期間は、1か月以上1年以内の期間に限られる。","a":false,"exp":"×。深夜業の制限の制限期間は「1か月以上6か月以内」である。なお所定外労働の制限・時間外労働の制限の制限期間は1か月以上1年以内である（法19条2項、20条1項）。"},
  {"law":"育児・介護休業法","cat":"所定労働時間の短縮措置","q":"育児のための所定労働時間の短縮措置は、3歳に満たない子を養育する労働者(1日の所定労働時間が6時間以下の者を除く)を対象とし、1日の所定労働時間を原則として6時間とする措置を含むものでなければならない。","a":true,"exp":"〇。3歳未満の子を養育する労働者（1日の所定労働時間が6時間以下の者を除く）に対し、1日の所定労働時間を原則6時間とする短縮措置を含めて講じなければならない（法23条1項、則72条・73条）。"},
  {"law":"育児・介護休業法","cat":"育休取得状況の公表","q":"常時雇用する労働者の数が1,000人を超える事業主は、毎年少なくとも1回、その雇用する労働者の育児休業の取得の状況を公表しなければならない。","a":false,"exp":"×。テキストでは、公表義務の対象は「常時雇用する労働者の数が300人を超える事業主」とされている。これらの事業主は毎年少なくとも1回、育児休業の取得の状況を公表しなければならない（法22条の2）。"},
  {"law":"育児・介護休業法","cat":"紛争解決","q":"都道府県労働局長は、苦情の自主的解決の対象となる事項等に係る紛争について、当事者の双方又は一方から調停の申請があり、解決のために必要があると認めるときは、紛争調整委員会に調停を行わせるものとする。","a":true,"exp":"〇。当事者の双方又は一方からの調停申請があり必要と認めるときは、都道府県労働局長は紛争調整委員会に調停を行わせる（法52条の5第1項）。"},
  {"law":"パートタイム・有期雇用労働法","cat":"定義","q":"「短時間労働者」とは、1週間の所定労働時間が同一の事業主に雇用される通常の労働者の1週間の所定労働時間に比し短い労働者をいい、1週間の所定労働時間が何時間未満という要件は特にない。","a":true,"exp":"〇。短時間労働者は通常の労働者に比し1週間の所定労働時間が短い労働者をいい、何時間未満という具体的な要件はない（法2条）。"},
  {"law":"パートタイム・有期雇用労働法","cat":"文書交付","q":"事業主が短時間・有期雇用労働者の雇入れ時に文書の交付等により明示すべき「特定事項」には、昇給の有無、退職手当の有無、賞与の有無、雇用管理の改善等に関する相談窓口が含まれる。","a":true,"exp":"〇。特定事項は、昇給の有無・退職手当の有無・賞与の有無・雇用管理の改善等に関する相談窓口の4つである（法6条1項、則2条1項）。"},
  {"law":"パートタイム・有期雇用労働法","cat":"差別的取扱いの禁止","q":"「通常の労働者と同視すべき短時間・有期雇用労働者」とは、職務の内容が通常の労働者と同一であり、かつ雇用関係終了までの全期間において職務の内容及び配置の変更の範囲が通常の労働者と同一の範囲で変更されることが見込まれる者をいう。","a":true,"exp":"〇。職務内容同一であることに加え、雇用関係終了までの全期間で職務の内容及び配置の変更範囲が通常の労働者と同一範囲と見込まれること（人材活用の仕組みが同じ）を満たす者をいう（法9条）。"},
  {"law":"パートタイム・有期雇用労働法","cat":"福利厚生施設","q":"事業主が短時間・有期雇用労働者に対しても利用の機会を与えなければならない福利厚生施設は、給食施設、休憩室及び更衣室である。","a":true,"exp":"〇。利用機会付与義務の対象となる福利厚生施設は、給食施設・休憩室・更衣室である（法12条、則）。"},
  {"law":"パートタイム・有期雇用労働法","cat":"短時間・有期雇用管理者","q":"事業主は、常時5人以上の短時間・有期雇用労働者を雇用する事業所ごとに、短時間・有期雇用管理者を選任するよう努めるものとされている。","a":false,"exp":"×。正しくは「常時10人以上」である。常時10人以上の短時間・有期雇用労働者を雇用する事業所ごとに選任するよう努めるものとされる（法17条、則6条）。"},
  {"law":"パートタイム・有期雇用労働法","cat":"通常の労働者への転換","q":"事業主は、通常の労働者への転換を推進するため、その雇用する短時間・有期雇用労働者について、所定の措置のいずれかを講じなければならない。","a":true,"exp":"〇。通常の労働者の募集の周知、配置希望の申出機会の付与、転換のための試験制度の設置等のいずれかの措置を講じなければならない（法13条）。"},
  {"law":"パートタイム・有期雇用労働法","cat":"説明義務","q":"事業主は、その雇用する短時間・有期雇用労働者から求めがあったときであっても、通常の労働者との間の待遇の相違の内容及び理由を説明する義務は負わない。","a":false,"exp":"×。事業主は、短時間・有期雇用労働者から求めがあったときは、通常の労働者との待遇の相違の内容及び理由等を説明しなければならない（法14条2項）。"},
  {"law":"次世代育成支援対策推進法","cat":"行動計画","q":"一般事業主であって、常時雇用する労働者の数が100人を超えるものは、行動計画策定指針に即して一般事業主行動計画を策定し、厚生労働大臣にその旨を届け出なければならない。","a":true,"exp":"〇。常時雇用する労働者の数が100人を超える一般事業主には行動計画の策定・届出が義務付けられている（100人以下は努力義務）（法12条1項・5項）。"},
  {"law":"次世代育成支援対策推進法","cat":"効力","q":"次世代育成支援対策推進法は、令和17年3月31日限りで、その効力を失う。","a":true,"exp":"〇。次世代育成支援対策推進法は令和17年3月31日限りで効力を失う（時限立法）。"},
  {"law":"次世代育成支援対策推進法","cat":"認定","q":"厚生労働大臣の定める認定マークである「くるみんマーク」「トライくるみんマーク」は、特例認定一般事業主に付されるものである。","a":false,"exp":"×。「くるみん」「トライくるみん」は通常の認定一般事業主の表示であり、特例認定一般事業主の表示は「プラチナくるみんマーク」である。"},
  {"law":"次世代育成支援対策推進法","cat":"特例認定","q":"特例認定一般事業主については、一般事業主行動計画の策定等の規定は適用されないが、毎年少なくとも1回、次世代育成支援対策の実施の状況を公表しなければならない。","a":true,"exp":"〇。特例認定一般事業主には行動計画策定等の規定は適用されないが、毎年少なくとも1回、次世代育成支援対策の実施状況の公表義務がある（法15条の3）。"},
  {"law":"女性活躍推進法","cat":"行動計画","q":"一般事業主であって、常時雇用する労働者の数が100人を超えるものは、事業主行動計画策定指針に即して一般事業主行動計画を定め、厚生労働大臣に届け出なければならない。","a":true,"exp":"〇。テキストでは、常時雇用する労働者の数が100人を超える一般事業主に行動計画の策定・届出が義務付けられている（100人以下は努力義務）（法8条1項・7項）。"},
  {"law":"女性活躍推進法","cat":"情報公表","q":"常時雇用する労働者の数が300人を超える一般事業主は、女性の職業選択に資するよう、男女の賃金の額の差異や管理的地位にある労働者に占める女性割合等の所定の情報を定期的に公表しなければならない。","a":true,"exp":"〇。常時雇用する労働者数300人超の一般事業主は、男女の賃金差異・管理職女性割合等の所定情報を定期的に公表しなければならない（法20条1項）。"},
  {"law":"女性活躍推進法","cat":"認定","q":"女性活躍推進法に基づく認定一般事業主に付される認定マークを「プラチナえるぼしマーク」といい、特例認定一般事業主に付されるものを「えるぼしマーク」という。","a":false,"exp":"×。逆である。認定一般事業主の表示が「えるぼしマーク」、特例認定一般事業主の表示が「プラチナえるぼしマーク」である。"}
];
const A4 = [
  {"law":"最低賃金法","cat":"目的","q":"最低賃金法は、賃金の低廉な労働者について、賃金の最低額を保障することにより、労働条件の改善を図り、もって、労働者の生活の安定、労働力の質的向上及び事業の公正な競争の確保に資するとともに、国民経済の健全な発展に寄与することを目的とする。","a":true,"exp":"〇。設問のとおり、最低賃金法の目的として正しい（法1条）。"},
  {"law":"最低賃金法","cat":"最低賃金の効力","q":"最低賃金の適用を受ける労働者と使用者との間の労働契約で最低賃金額に達しない賃金を定めるものは、その労働契約の全部について無効となる。","a":false,"exp":"×。無効となるのは最低賃金額に達しない「その部分」についてであり、契約全部ではない。無効となった部分は最低賃金と同様の定めをしたものとみなされる（法4条）。"},
  {"law":"最低賃金法","cat":"最低賃金の競合","q":"労働者が2以上の最低賃金の適用を受ける場合は、これらにおいて定める最低賃金額のうち最高のものにより最低賃金の効力の規定を適用する。","a":true,"exp":"〇。競合する場合は最高額が適用される（法6条1項）。"},
  {"law":"最低賃金法","cat":"最低賃金の種類","q":"最低賃金法に定める最低賃金には、都道府県ごとに定められる地域別最低賃金と、特定の産業について定められる特定最低賃金がある。","a":true,"exp":"〇。最低賃金には地域別最低賃金と特定最低賃金がある（法9条、15条）。"},
  {"law":"最低賃金法","cat":"減額の特例","q":"高年齢により著しく労働能力が低い者であることのみを理由として、使用者は都道府県労働局長の許可を受けて最低賃金の減額の特例の適用を受けることができる。","a":false,"exp":"×。高年齢により著しく労働能力が低い者というだけでは、最低賃金の減額の特例の対象とはならない。対象は精神身体の障害により著しく労働能力の低い者、試の使用期間中の者等である（法7条）。"},
  {"law":"最低賃金法","cat":"派遣中の労働者","q":"労働者派遣法に規定する派遣中の労働者については、その派遣元の事業の事業場の所在地を含む地域について決定された地域別最低賃金により最低賃金の効力の規定を適用する。","a":false,"exp":"×。派遣中の労働者については、派遣元ではなく「派遣先」の事業の事業場の所在地を含む地域について決定された地域別最低賃金が適用される（法13条）。"},
  {"law":"最低賃金法","cat":"特定最低賃金","q":"特定最低賃金において定める最低賃金額は、当該特定最低賃金の適用を受ける使用者の事業場の所在地を含む地域について決定された地域別最低賃金において定める最低賃金額を上回るものでなければならない。","a":true,"exp":"〇。特定最低賃金額は当該地域の地域別最低賃金額を上回らなければならない（法16条）。"},
  {"law":"賃金の支払の確保等に関する法律","cat":"貯蓄金の保全措置","q":"事業主（国及び地方公共団体を除く）は、労働者の貯蓄金をその委託を受けて管理する場合において、貯蓄金の管理が労働者の預金の受入れであるときは、毎年3月31日における受入預金額について、同日後1年間を通ずる貯蓄金の保全措置を講じなければならない。","a":true,"exp":"〇。毎年3月31日の受入預金額について、同日後1年間を通ずる保全措置を講じなければならない（法3条）。"},
  {"law":"賃金の支払の確保等に関する法律","cat":"退職手当の保全措置","q":"事業主は、就業規則等で労働者に退職手当を支払うことを明らかにしたときは、その退職手当の支払に充てるべき額として厚生労働省令で定める額について、貯蓄金の保全措置に準ずる措置を講じなければならない。","a":false,"exp":"×。退職手当の保全措置は「講ずるように努めなければならない」とされる努力義務である（法5条）。"},
  {"law":"賃金の支払の確保等に関する法律","cat":"遅延利息","q":"事業主は、退職した労働者の賃金（退職手当を除く）の全部又は一部を退職の日（退職日後に支払期日が到来する賃金にあっては当該支払期日）までに支払わなかった場合には、その翌日から支払日までの期間につき、まだ支払われていない賃金の額に<b>年14.6%</b>を乗じて得た金額を遅延利息として支払わなければならない。","a":true,"exp":"〇。退職労働者の賃金に係る遅延利息は年14.6%である（法6条、令1条）。"},
  {"law":"賃金の支払の確保等に関する法律","cat":"立替払","q":"未払賃金の立替払により立替払される賃金は、原則として、未払賃金の総額の100分の60相当額である。","a":false,"exp":"×。立替払される賃金は、原則として未払賃金の総額の100分の80相当額である（令4条）。"},
  {"law":"賃金の支払の確保等に関する法律","cat":"立替払","q":"未払賃金の立替払の対象となるのは、1年以上の期間にわたって労働者災害補償保険の適用事業に該当する事業の事業主が破産手続開始の決定を受ける等した場合である。","a":true,"exp":"〇。1年以上労災保険の適用事業に該当する事業の事業主が破産手続開始の決定を受ける等したことが要件である（法7条）。"},
  {"law":"中小企業退職金共済法","cat":"目的","q":"中小企業退職金共済法は、中小企業の従業員について、中小企業者の相互扶助の精神に基づき、その拠出による退職金共済制度を確立し、もってこれらの従業員の福祉の増進と中小企業の振興に寄与することを目的とする。","a":true,"exp":"〇。設問のとおり目的として正しい（法1条）。"},
  {"law":"中小企業退職金共済法","cat":"掛金月額","q":"被共済者1人につき、掛金月額は5,000円（短時間労働被共済者は2,000円）以上30,000円以下とされている。","a":true,"exp":"〇。掛金月額は5,000円（短時間労働被共済者は2,000円）以上30,000円以下である（法4条2項）。"},
  {"law":"中小企業退職金共済法","cat":"退職金の支給","q":"機構は、被共済者が退職したときはその者に退職金を支給するが、掛金の納付月数が6か月未満の場合には退職金を支給しない。","a":false,"exp":"×。退職金を支給しないのは掛金の納付月数が「12か月」未満の場合である（法10条1項）。"},
  {"law":"労働組合法","cat":"目的・免責","q":"労働組合の団体交渉その他の行為であって労働組合法の目的を達成するためにした正当なものであっても、暴力の行使は、いかなる場合においても労働組合の正当な行為とは解釈されない。","a":true,"exp":"〇。正当な行為には刑法35条が適用され犯罪は成立しないが、暴力の行使はいかなる場合も正当な行為とは解釈されない（法1条2項）。"},
  {"law":"労働組合法","cat":"労働者","q":"労働組合法上の「労働者」とは、職業の種類を問わず、賃金、給料その他これに準ずる収入によって生活する者をいい、失業者は含まれない。","a":false,"exp":"×。労働組合法上の労働者には失業者も含まれる（法3条）。"},
  {"law":"労働組合法","cat":"不当労働行為","q":"労働者が労働組合に加入しないこと、又は労働組合から脱退することを雇用条件とすること（黄犬契約）は、不当労働行為に該当する。","a":true,"exp":"〇。黄犬契約は不当労働行為に該当する（法7条2号）。"},
  {"law":"労働組合法","cat":"不当労働行為","q":"使用者が雇用する労働者の代表者と団体交渉をすることを正当な理由がなくて拒むことは、不当労働行為に該当する。","a":true,"exp":"〇。正当な理由のない団体交渉拒否は不当労働行為に該当する（法7条2号）。"},
  {"law":"労働組合法","cat":"労働協約","q":"労働組合と使用者又はその団体との間の労働条件その他に関する労働協約は、書面に作成し、両当事者が署名し、又は記名押印することによってその効力を生ずる。","a":true,"exp":"〇。労働協約は書面に作成し両当事者が署名又は記名押印することで効力を生ずる（法14条）。"},
  {"law":"労働組合法","cat":"労働協約の期間","q":"労働協約には、5年を超える有効期間の定めをすることができず、5年を超える有効期間を定めた場合は5年の有効期間の定めをしたものとみなされる。","a":false,"exp":"×。労働協約には「3年」を超える有効期間の定めをすることができず、3年を超える定めをした場合は3年の有効期間としたものとみなされる（法15条）。"},
  {"law":"労働組合法","cat":"一般的拘束力","q":"一の工場事業場に常時使用される同種の労働者の4分の3以上の数の労働者が一の労働協約の適用を受けるに至ったときは、当該工場事業場に使用される他の同種の労働者に関しても、当該労働協約が適用される。","a":true,"exp":"〇。4分の3以上の労働者が適用を受けるに至ったときは他の同種の労働者にも適用される（法17条）。"},
  {"law":"労働組合法","cat":"審査","q":"労働委員会は、不当労働行為の申立てが行為の日（継続する行為にあってはその終了日）から2年を経過した事件に係るものであるときは、その申立てを受けることができない。","a":false,"exp":"×。正しくは「1年」を経過した事件に係るものであるときは申立てを受けることができない（法27条2項）。"},
  {"law":"労働組合法","cat":"罰則","q":"使用者が不当労働行為を行った場合、直ちに労働組合法上の罰則が適用される。","a":false,"exp":"×。直ちに罰則が適用されるわけではなく、救済命令等が確定判決によって支持された場合になお違反があったときに初めて罰則が適用される（法28条）。"},
  {"law":"労働関係調整法","cat":"目的","q":"労働関係調整法は、労働組合法と相まって、労働関係の公正な調整を図り、労働争議を予防し、又は解決して、産業の平和を維持し、もって経済の興隆に寄与することを目的とする。","a":true,"exp":"〇。設問のとおり目的として正しい（法1条）。"},
  {"law":"労働関係調整法","cat":"調整方法","q":"労働委員会が行う労働争議の調整方法には、斡旋、調停及び仲裁があり、このうち仲裁による仲裁裁定は労働協約と同一の効力を有する。","a":true,"exp":"〇。調整方法は斡旋・調停・仲裁の3つで、仲裁裁定は労働協約と同一の効力（法的拘束力）を有する。"},
  {"law":"労働関係調整法","cat":"調停","q":"調停は、使用者を代表する調停委員、労働者を代表する調停委員及び公益を代表する調停委員から成る調停委員会を設けて行い、調停委員会は調停案を作成して関係当事者に示し、その受諾を勧告する。","a":true,"exp":"〇。調停は三者構成の調停委員会で行い、調停案を作成して受諾を勧告する。受諾の諾否は当事者の自由である。"},
  {"law":"労働関係調整法","cat":"公益事業の予告","q":"公益事業に関する事件につき関係当事者が争議行為をするには、その争議行為をしようとする日の少なくとも30日前までに、労働委員会及び厚生労働大臣又は都道府県知事にその旨を通知しなければならない。","a":false,"exp":"×。公益事業の争議行為の予告期間は、少なくとも「10日」前までである（法37条1項）。"},
  {"law":"個別労働関係紛争解決促進法","cat":"目的・定義","q":"個別労働関係紛争解決促進法における「個別労働関係紛争」には、労働者の募集及び採用に関する事項についての個々の求職者と事業主との間の紛争も含まれる。","a":true,"exp":"〇。個別労働関係紛争には募集及び採用に関する求職者と事業主との間の紛争も含まれる（法1条）。"},
  {"law":"個別労働関係紛争解決促進法","cat":"助言指導","q":"都道府県労働局長は、個別労働関係紛争に関し、当事者の双方又は一方からその解決につき援助を求められた場合には、当該紛争の当事者に対し、必要な助言又は指導をすることができる。","a":true,"exp":"〇。都道府県労働局長は当事者に対し必要な助言又は指導をすることができる（法4条1項）。"},
  {"law":"個別労働関係紛争解決促進法","cat":"あっせん","q":"都道府県労働局長は、労働者の募集及び採用に関する事項についての紛争を含むすべての個別労働関係紛争について、当事者からあっせんの申請があった場合は紛争調整委員会にあっせんを行わせる。","a":false,"exp":"×。あっせんは「労働者の募集及び採用に関する事項についての紛争を除く」個別労働関係紛争について行われる。助言指導と異なり募集採用は対象外である（法5条1項）。"},
  {"law":"個別労働関係紛争解決促進法","cat":"適用除外","q":"労働施策総合推進法、労働者派遣法、男女雇用機会均等法等に規定する紛争については、各法により、個別労働関係紛争解決促進法の助言及び指導、あっせん等の規定の適用が除外されている。","a":true,"exp":"〇。これらの個別法に規定する紛争は各法により本法の助言指導・あっせん等の適用が除外されている（法4条1項ほか）。"},
  {"law":"労働契約法","cat":"目的","q":"労働契約法は、労働者及び使用者の自主的な交渉の下で、労働契約が合意により成立し、又は変更されるという合意の原則その他労働契約に関する基本的事項を定めることにより、労働者の保護を図りつつ、個別の労働関係の安定に資することを目的とする。","a":true,"exp":"〇。設問のとおり目的として正しい（法1条）。"},
  {"law":"労働契約法","cat":"安全配慮","q":"使用者は、労働契約に伴い、労働者がその生命、身体等の安全を確保しつつ労働することができるよう、必要な配慮をするものとする。","a":true,"exp":"〇。使用者の安全配慮義務として正しい（法5条）。"},
  {"law":"労働契約法","cat":"就業規則の不利益変更","q":"使用者は、労働者と合意することなく、就業規則を変更することにより、労働者の不利益に労働契約の内容である労働条件を変更することはできないが、変更後の就業規則を労働者に周知させ、かつ変更が合理的なものであるとき等は、この限りでない。","a":true,"exp":"〇。原則として合意なき不利益変更はできないが、周知と変更の合理性等の要件を満たす場合は変更が認められる（法9条、10条）。"},
  {"law":"労働契約法","cat":"無期転換","q":"同一の使用者との間で締結された2以上の有期労働契約の通算契約期間が3年を超える労働者が無期労働契約の締結の申込みをしたときは、使用者は当該申込みを承諾したものとみなされる。","a":false,"exp":"×。無期転換の要件は通算契約期間が「5年」を超える場合である（法18条1項）。"},
  {"law":"労働契約法","cat":"通算契約期間","q":"有期労働契約の契約期間が満了した日と次の有期労働契約の初日との間に6か月以上の空白期間があるときは、当該空白期間前に満了した有期労働契約の契約期間は、原則として通算契約期間に算入しない。","a":true,"exp":"〇。原則として空白期間が6か月以上であるときは、その前の契約期間は通算契約期間に算入しない（法18条2項）。"},
  {"law":"労働契約法","cat":"雇止め法理","q":"有期労働契約の更新の申込み等に対し、使用者が当該申込みを拒絶することが客観的に合理的な理由を欠き、社会通念上相当であると認められないときは、使用者は従前の有期労働契約と同一の労働条件で当該申込みを承諾したものとみなされる。","a":true,"exp":"〇。雇止め法理の規定として正しい（法19条）。"},
  {"law":"労働契約法","cat":"適用除外","q":"労働契約法は、国家公務員及び地方公務員のほか、家事使用人についても適用が除外されている。","a":false,"exp":"×。労働契約法の適用除外は、国家公務員及び地方公務員、使用者が同居の親族のみを使用する場合の労働契約であり、「家事使用人」は適用除外されていない（法21条）。"},
  {"law":"職業能力開発促進法","cat":"目的・基本計画","q":"厚生労働大臣は、職業能力の開発に関する基本となるべき計画（職業能力開発基本計画）を策定するものとされている。","a":true,"exp":"〇。厚生労働大臣は職業能力開発基本計画を策定する（法5条1項）。"},
  {"law":"職業能力開発促進法","cat":"認定職業訓練","q":"事業主等は、厚生労働大臣の認定を受けて、職業訓練（認定職業訓練）を実施することができる。","a":false,"exp":"×。認定職業訓練は「都道府県知事」の認定を受けて実施することができる（法13条、24条）。"},
  {"law":"職業能力開発促進法","cat":"技能検定","q":"技能検定は実技試験及び学科試験によって行われ、技能検定に合格した者は、技能士と称することができる。","a":true,"exp":"〇。技能検定は実技試験及び学科試験により行い、合格者は技能士と称することができる（法44条、50条1項）。"},
  {"law":"求職者支援法","cat":"特定求職者","q":"求職者支援法における「特定求職者」とは、公共職業安定所に求職の申込みをしている者（雇用保険法に規定する被保険者である者及び受給資格者である者を除く）のうち、労働の意思及び能力を有し、職業訓練その他の支援措置を行う必要があると公共職業安定所長が認めた者をいう。","a":true,"exp":"〇。特定求職者の定義として正しい（法2条）。"},
  {"law":"求職者支援法","cat":"給付金","q":"職業訓練受講給付金として支給を受けた金銭は、課税の対象となる。","a":false,"exp":"×。職業訓練受講給付金として支給を受けた金銭は非課税である。また、支給を受ける権利は譲渡・担保供与・差押えができない（法10条ほか）。"},
  {"law":"労働時間等設定改善法","cat":"事業主の責務","q":"事業主は、その雇用する労働者の労働時間等の設定の改善を図るため、健康及び福祉を確保するために必要な終業から始業までの時間の設定（勤務間インターバル）等の必要な措置を講ずるように努めなければならない。","a":true,"exp":"〇。勤務間インターバルの設定等は努力義務として規定されている（法2条1項）。"},
  {"law":"労働時間等設定改善法","cat":"設定改善委員会","q":"労働時間等設定改善委員会において、その委員の3分の2以上の多数による議決により所定の事項について決議が行われたときは、当該事項に係る労働基準法に規定する労使協定に代替することができる。","a":false,"exp":"×。労使協定に代替できる決議は、委員の「5分の4」以上の多数による議決による（法7条）。"},
  {"law":"労働時間等設定改善法","cat":"設定改善委員会","q":"労働時間等設定改善委員会の決議のうち、時間外労働・休日労働に係る決議については届出が必要であるが、その他の決議は届出を要しない。","a":true,"exp":"〇。時間外労働・休日労働に係る決議は届出が必要で、その他の決議は届出を要しない（法7条）。"}
];
const A5 = [
  {"law":"労務管理","cat":"評価誤差","q":"人事考課における評定誤差のうち、ある特定の考課要素の印象から、被考課者の全体の印象を判断してしまう傾向を<b>ハロー効果</b>という。","a":true,"exp":"〇。ハロー効果は、特定の考課要素の印象で被考課者全体の印象を判断してしまう傾向であり、テキストの定義のとおりである。"},
  {"law":"労務管理","cat":"評価誤差","q":"被考課者を全体として実際の成績よりも甘く評価してしまう傾向を<b>中央化傾向</b>という。","a":false,"exp":"×。これは寛大化傾向の説明である。中央化傾向とは、考課者が被考課者の集団に対して多数の者を「標準」と(中央に)評価することをいう。"},
  {"law":"労務管理","cat":"評価誤差","q":"評価項目間に論理的に類似した項目がある場合に、特定の要素が優れていると他の関連する要素も優れていると評価してしまう傾向を<b>論理誤差</b>という。","a":true,"exp":"〇。論理誤差は、論理的に類似した項目間で特定要素が優れていると関連要素も優れていると評価してしまう傾向であり、テキストどおりである。"},
  {"law":"労務管理","cat":"評価誤差","q":"考課者が自分と反対の特性を持つ被考課者を過大又は過小に評価する傾向を<b>論理誤差</b>という。","a":false,"exp":"×。これは対比誤差の説明である。論理誤差は、論理的に類似した項目で特定要素が優れていると関連要素も優れていると評価してしまう傾向をいう。"},
  {"law":"労務管理","cat":"科学的管理法","q":"アメリカのF.W.テーラーは、時間研究・動作研究によって標準作業時間と標準作業量を定め、これを基準とする<b>差別的出来高給制</b>を提唱した。","a":true,"exp":"〇。テーラーの科学的管理法(テーラーシステム)では、時間研究・動作研究により標準を定め、達成者には高い賃率、未達成者には低い賃率を適用する差別的出来高給制を提唱した。"},
  {"law":"労務管理","cat":"人間関係論","q":"アメリカのウェスタン・エレクトリック社のホーソン工場で行われた一連の実験(ホーソン実験)は、<b>テーラー</b>らが中心となって行ったもので、人間関係論発展の契機となった。","a":false,"exp":"×。ホーソン実験は、メイヨー、レスリスバーガーらが行った実験である。テーラーは科学的管理法を提唱した人物であり、ホーソン実験とは別である。"},
  {"law":"労務管理","cat":"人間関係論","q":"ホーソン実験では、人間の作業能率を左右するのは照明などの物理的環境や賃金などの条件ではなく、同僚や上司との間に作られる<b>インフォーマルな人間関係</b>であることが明らかにされた。","a":true,"exp":"〇。ホーソン実験では、作業能率を左右するのは物理的環境や賃金ではなくインフォーマルな人間関係であること等が明らかにされた。"},
  {"law":"労務管理","cat":"動機づけ理論","q":"<b>マズロー</b>は、欲求を低次から、生理的欲求・安全の欲求・社会的欲求・承認の欲求・自己実現の欲求の5段階に分け、最高次の自己実現の欲求は完全に満たされることのない最も強いモチベーションになるとした。","a":true,"exp":"〇。マズローの欲求5段階説のとおりである。欲求は低次から順を追って現れ、自己実現の欲求が最も強いモチベーションになるとした。"},
  {"law":"労務管理","cat":"動機づけ理論","q":"人間の欲求を、満足要因(動機づけ要因)と不満足要因(衛生要因)の2つに大別したのは、<b>マグレガー</b>である。","a":false,"exp":"×。満足要因と衛生要因の2つに大別したのはハーズバーグ(動機づけ衛生理論)である。マグレガーはX理論・Y理論を唱えた人物である。"},
  {"law":"労務管理","cat":"動機づけ理論","q":"ハーズバーグの動機づけ衛生理論において、給与や作業条件、経営方針などは、満たされないと不満の原因となるが満足させても動機づけを生むわけではない<b>衛生要因</b>に分類される。","a":true,"exp":"〇。給与・作業条件・経営方針・人間関係などは衛生要因であり、満たされないと不満の原因となるが満足させても動機づけを生むものではない。"},
  {"law":"労務管理","cat":"動機づけ理論","q":"マグレガーのX理論・Y理論のうち、人間は本来怠け者であり、企業目標達成のためには強制・命令・処罰による必要があるとするのは<b>Y理論</b>である。","a":false,"exp":"×。これはX理論(性悪説)の内容である。Y理論(性善説)は、人間は生来仕事嫌いではなく、目標のため進んで働くとするものである。"},
  {"law":"労務管理","cat":"目標管理","q":"「目標による管理」(目標管理)は、アメリカの経営学者ドラッカーが「現代の経営」において提唱したもので、マグレガーのY理論が理論的基礎を形成している。","a":true,"exp":"〇。目標による管理はドラッカーが「現代の経営」で提唱し、マグレガーのY理論がその理論的基礎を形成している。"},
  {"law":"労務管理","cat":"教育訓練","q":"職場の上司や先輩が部下や後輩に対し、仕事を通じて職務に必要な知識・技能などを実施する訓練法を<b>Off-JT</b>という。","a":false,"exp":"×。これはOJT(職場内訓練)の説明である。Off-JTは集合教育・通信教育・講習会など、日常業務から離れて行われる教育訓練をいう。"},
  {"law":"労務管理","cat":"賃金管理","q":"<b>職務給</b>は、職務の困難度や重要度を評価要素として職務ごとに価値の高低を定め、その価値に応じて決定される賃金で、「同一労働同一賃金の原則」に立つものである。","a":true,"exp":"〇。職務給は職務の困難度・重要度を評価要素とし、同一労働同一賃金の原則に立つ。導入には職務分析・職務評価が求められる。"},
  {"law":"労務管理","cat":"賃金総額管理","q":"賃金総額の決定方法のうち、付加価値を基準として「賃金総額=付加価値×労働分配率」で決定する付加価値配分方式を<b>スキャンロン・プラン</b>という。","a":false,"exp":"×。これはラッカー・プランの説明である。スキャンロン・プランは「賃金総額=売上高×一定の人件費率」で決定する売上高リンクによる生産成果配分方式である。"},
  {"law":"労務管理","cat":"その他用語","q":"課業の数を増やし仕事の範囲を拡大する「職務の水平的拡大」を<b>職務拡大</b>といい、責任や権限を拡大して仕事の幅を拡大する「職務の垂直的拡大」を<b>職務充実</b>という。","a":true,"exp":"〇。職務拡大は課業数を増やす水平的拡大、職務充実は責任・権限を拡大する垂直的拡大であり、テキストどおりである。"},
  {"law":"労働経済","cat":"労働力調査","q":"<b>労働力人口</b>とは、15歳以上の人口のうち、「就業者」と「完全失業者」を合わせたものをいう。","a":true,"exp":"〇。労働力人口は15歳以上人口のうち就業者と完全失業者を合わせたものである。これ以外の者が非労働力人口となる。"},
  {"law":"労働経済","cat":"労働力調査","q":"<b>労働力率(労働力人口比率)</b>とは、15歳以上の人口に占める「完全失業者」の割合をいう。","a":false,"exp":"×。労働力率は15歳以上人口に占める「労働力人口」の割合である。労働力人口に占める完全失業者の割合は完全失業率をいう。"},

const QUESTIONS = [].concat(A1,A2,A3,A4,A5,MINE).map((x,i)=>({id:i, page:PAGES[i], ...x}));
const LAW_ORDER = ["労働施策総合推進法","職業安定法","労働者派遣法","高年齢者雇用安定法","障害者雇用促進法","青少年の雇用の促進等に関する法律","男女雇用機会均等法","育児・介護休業法","パートタイム・有期雇用労働法","次世代育成支援対策推進法","女性活躍推進法","最低賃金法","賃金の支払の確保等に関する法律","中小企業退職金共済法","労働組合法","労働関係調整法","個別労働関係紛争解決促進法","労働契約法","職業能力開発促進法","求職者支援法","労働時間等設定改善法","労務管理","労働経済"];

const byLaw = {}; LAW_ORDER.forEach(l=>byLaw[l]=[]); QUESTIONS.forEach(q=>{ (byLaw[q.law]=byLaw[q.law]||[]).push(q); });
document.getElementById('qtotal').textContent = QUESTIONS.length;

/* ===== history (localStorage) ===== */
const HKEY='roui_quiz_v1';
let H = load();
function load(){ try{ return JSON.parse(localStorage.getItem(HKEY))||{perQ:{}}; }catch(e){ return {perQ:{}}; } }
function save(){ try{ localStorage.setItem(HKEY, JSON.stringify(H)); }catch(e){} }
function rec(id, ok){
  const p = H.perQ[id] || {seen:0,correct:0,lastOK:null};
  p.seen++; if(ok) p.correct++; p.lastOK=ok; H.perQ[id]=p; save();
}
function lawStat(law){
  let seen=0,correct=0,distinct=0;
  byLaw[law].forEach(q=>{ const p=H.perQ[q.id]; if(p){ seen+=p.seen; correct+=p.correct; distinct++; } });
  return {seen,correct,distinct,total:byLaw[law].length, acc: seen? correct/seen : null};
}
function overall(){
  let seen=0,correct=0,distinct=0;
  QUESTIONS.forEach(q=>{ const p=H.perQ[q.id]; if(p){ seen+=p.seen; correct+=p.correct; distinct++; } });
  return {seen,correct,distinct,total:QUESTIONS.length, acc: seen? correct/seen:null};
}

/* ===== state ===== */
let curTab='stats', session=null;
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
function weakPool(){
  const wrong = QUESTIONS.filter(q=> H.perQ[q.id] && H.perQ[q.id].lastOK===false);
  const weakLaws = LAW_ORDER.filter(l=>{ const s=lawStat(l); return s.seen>=3 && s.acc<0.7; });
  const fromLaws = QUESTIONS.filter(q=> weakLaws.includes(q.law) && !(H.perQ[q.id]&&H.perQ[q.id].lastOK===true));
  const ids=new Set(); const pool=[];
  [...wrong,...fromLaws].forEach(q=>{ if(!ids.has(q.id)){ ids.add(q.id); pool.push(q);} });
  return shuffle(pool).slice(0,25);
}

/* ===== render ===== */
const main=document.getElementById('main');
function refHTML(item){ return item.page? `<div class="ref">📖 ${BOOK} <b>P.${item.page}</b></div>` : ''; }
function renderHeader(){
  const o=overall();
  document.getElementById('hstat').innerHTML = o.seen
    ? `累計 <b>${o.seen}</b>問回答 ・ 正答率 <b>${Math.round(o.acc*100)}%</b> ・ 出題済 <b>${o.distinct}/${o.total}</b>`
    : `まだ回答履歴がありません。下のタブから始めましょう 👇`;
}
function renderTabs(){
  const tb=document.getElementById('tabbar'); tb.innerHTML='';
  const specials=[['stats','📊 成績'],['weak','⭐ 苦手克服'],['all','🎲 総合(50)']];
  specials.forEach(([k,label])=>{
    const b=document.createElement('div'); b.className='tab special'+(curTab===k?' active':'');
    b.textContent=label; b.onclick=()=>selectTab(k); tb.appendChild(b);
  });
  LAW_ORDER.forEach(l=>{
    const b=document.createElement('div'); b.className='tab'+(curTab===l?' active':'');
    b.innerHTML=`${LABEL[l]||l}<span class="cnt">${byLaw[l].length}</span>`;
    b.onclick=()=>selectTab(l); tb.appendChild(b);
  });
}
function selectTab(k){
  curTab=k; renderTabs();
  if(k==='stats'){ session=null; renderStats(); }
  else if(k==='weak'){ const p=weakPool(); if(!p.length){ renderEmptyWeak(); } else startSession(p,'⭐ 苦手克服'); }
  else if(k==='all'){ startSession(shuffle(QUESTIONS).slice(0,50),'🎲 総合ランダム'); }
  else { startSession(shuffle(byLaw[k]), LABEL[k]||k); }
}
function startSession(list,title){ session={list,title,idx:0,score:0,wrong:[]}; renderCard(); }
function stopSession(){
  const s=session;
  if(s && s.idx>0 && s.idx<s.list.length){ if(!confirm(`ここまで ${s.idx}問 回答しました（履歴は保存済み）。中断して成績画面に戻りますか？`)) return; }
  session=null; selectTab('stats');
}
function renderCard(){
  const s=session, item=s.list[s.idx];
  main.innerHTML=`
    <div class="qhead"><span>${s.title}　<b>${s.idx+1}</b>/${s.list.length}</span><span class="qright">正解 <b>${s.score}</b><button class="stopbtn" onclick="stopSession()">■ 中断</button></span></div>
    <div class="barwrap"><div class="bar" style="width:${s.idx/s.list.length*100}%"></div></div>
    <div class="card">
      <div class="tag">${item.law}・${item.cat}</div>
      <div class="q">${item.q}</div>
      <div class="btns" id="btns">
        <button class="btn maru" onclick="answer(true)">⚪︎<small>正しい</small></button>
        <button class="btn batsu" onclick="answer(false)">✕<small>誤り</small></button>
      </div>
      <div class="feedback" id="fb">
        <div class="verdict" id="vd"></div>
        <div class="ansline">正解：<b id="ca"></b></div>
        <div class="exp" id="exp"></div>
        <div class="ref" id="ref"></div>
        <button class="next" id="nx"></button>
      </div>
    </div>`;
}
function answer(choice){
  const s=session, item=s.list[s.idx], ok=(choice===item.a);
  rec(item.id, ok);
  if(ok) s.score++; else s.wrong.push(item);
  document.getElementById('btns').style.display='none';
  const vd=document.getElementById('vd'); vd.className='verdict '+(ok?'ok':'ng'); vd.innerHTML=ok?'⭕ 正解！':'❌ 不正解…';
  document.getElementById('ca').textContent=item.a?'⚪︎（正しい）':'✕（誤り）';
  document.getElementById('exp').innerHTML=item.exp;
  document.getElementById('ref').innerHTML = item.page? `📖 ${BOOK} P.${item.page}` : '';
  document.getElementById('fb').style.display='block';
  const nx=document.getElementById('nx'); nx.textContent=(s.idx===s.list.length-1)?'結果を見る →':'次の問題 →'; nx.onclick=next;
  renderHeader();
}
function next(){ const s=session; s.idx++; if(s.idx>=s.list.length){ endSession(); } else renderCard(); }
function endSession(){
  const s=session, pct=s.score/s.list.length;
  let grade,msg;
  if(pct===1){grade='🏆 パーフェクト！';msg='全問正解。完璧です！';}
  else if(pct>=0.85){grade='🌸 合格圏';msg='よく仕上がっています。間違えた論点だけ詰めましょう。';}
  else if(pct>=0.6){grade='📖 あと一歩';msg='苦手タブで弱点を重点復習しましょう。';}
  else {grade='💪 復習しよう';msg='テキストを読み直してから再挑戦を。';}
  let wlist='';
  if(s.wrong.length){ wlist='<div class="stitle" style="margin-top:14px">❌ 復習ポイント</div>'+
    s.wrong.map(w=>`<div class="lrow" style="cursor:default"><div class="lname" style="font-size:13px">${w.law}・${w.cat}</div><div class="lsub" style="color:#cbd5e1">${w.exp}</div><div class="ref">📖 ${BOOK} P.${w.page}</div></div>`).join(''); }
  main.innerHTML=`
    <div class="sresult" style="display:flex">
      <div style="color:var(--sub);font-size:13px">${s.title} の結果</div>
      <div class="scorebig">${s.score}<span> / ${s.list.length}</span></div>
      <div class="grade">${grade}</div><div class="gmsg">${msg}</div>
      <div class="rbtns">
        <button class="rbtn primary" onclick="selectTab('${curTab}')">🔄 もう一度</button>
        <button class="rbtn ghost" onclick="selectTab('stats')">📊 成績を見る</button>
      </div>
      ${wlist}
    </div>`;
}
function renderEmptyWeak(){
  main.innerHTML=`<div class="empty">⭐ まだ苦手データがありません。<br>各分野のタブを解くと、間違えた問題や正答率の低い分野が<br>ここに集まり、集中的に復習できます。<br><br>まずは「🎲 総合(50)」か各法律のタブから始めましょう！</div>`;
}
function accColor(acc){ if(acc===null) return '#475569'; if(acc>=0.8) return '#22c55e'; if(acc>=0.6) return '#fbbf24'; return '#fb7185'; }
function renderStats(){
  const o=overall();
  const rows=LAW_ORDER.map(l=>({l,...lawStat(l)}));
  rows.sort((a,b)=>{
    if(a.seen===0&&b.seen===0) return LAW_ORDER.indexOf(a.l)-LAW_ORDER.indexOf(b.l);
    if(a.seen===0) return 1; if(b.seen===0) return -1;
    return a.acc-b.acc;
  });
  let html=`<div class="stats" style="display:flex">
    <div class="ov">
      <div class="ovcard"><div class="ovnum">${o.distinct}<span style="font-size:14px;color:#64748b">/${o.total}</span></div><div class="ovlbl">出題済み</div></div>
      <div class="ovcard"><div class="ovnum">${o.seen}</div><div class="ovlbl">累計回答</div></div>
      <div class="ovcard"><div class="ovnum">${o.acc!==null?Math.round(o.acc*100)+'%':'—'}</div><div class="ovlbl">正答率</div></div>
    </div>
    <div class="stitle"><span>分野別の成績（タップで演習開始）</span><span style="font-weight:600">弱い順</span></div>`;
  rows.forEach(r=>{
    let badge = r.seen===0 ? '<span class="badge none">未着手</span>'
      : r.acc>=0.8 ? '<span class="badge good">得意</span>'
      : (r.seen>=3 && r.acc<0.6) ? '<span class="badge weak">苦手</span>' : '';
    const pct = r.acc!==null?Math.round(r.acc*100)+'%':'—';
    html+=`<div class="lrow" onclick="selectTab('${r.l}')">
      <div class="lname"><span>${LABEL[r.l]||r.l}${badge}</span><span class="pct" style="color:${accColor(r.acc)}">${pct}</span></div>
      <div class="lbar"><div style="width:${r.acc!==null?r.acc*100:0}%;background:${accColor(r.acc)}"></div></div>
      <div class="lsub">出題 ${r.distinct}/${r.total} ・ 回答 ${r.seen} ・ 正解 ${r.correct}</div>
    </div>`;
  });
  html+=`<button class="resetbtn" onclick="resetHist()">🗑 履歴をリセット</button></div>`;
  main.innerHTML=html;
}
function resetHist(){ if(confirm('回答履歴をすべて消去します。よろしいですか？')){ H={perQ:{}}; save(); renderHeader(); renderStats(); } }

/* init */
renderHeader(); renderTabs(); selectTab('stats');
</script>
</body>
</html>
